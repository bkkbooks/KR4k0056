body:
  text: 第十一回劉毅論上中正九品乙巳太康六年初陳群奏帝以吏部不能審核天下之士故令郡國各置中正之官州置大中正皆取本土之人任朝廷官德充才盛者為之使詮次等級以為九品有言行修著則升之道義虧缺則降之吏部憑之以補百官行之漸久中正或非其人好弊日滋太尉劉毅入朝上疏曰今陛下立中正定九品高下任意榮辱在手操人主之威福奪天朝之權勢公無考校之資私無告姦之忌因心百態營求萬端廉讓之風滅爭訟之俗成竊為天朝恥之中正之設損政有八高下遂強弱是非隨興衰一人之身旬日異狀上品無寒門下品無勢族一也重其任而輕其人使駁論橫於州裏嫌隙結于大臣二也優劣異地首尾倒置三也禁人訴訟使受枉不獲上聞四也采譽於台府納毀於流言五也抑功實而隆虛名長浮華而廢考績六也不問才之所宜而但第為九品七也各任愛憎以植其私天下之人焉得不懈德行而鋭人事八也由此論之職名中正實為姦府事名九品而有八損古今之失莫大於此臣愚以為宜罷中正面除九品拼魏氏之弊法更立一代之美制也晉武帝覽之大悅雖善其言終不能改也卻説侍中王濟因諫武帝宜親齊王之事免官久之今齊王已薨武帝因謂何嶠曰我將罵王濟而後官之何如嶠曰王濟俊爽恐不可屈武帝使人宣至責讓之曰卿知愧否王濟曰尺布鬥粟之謠常為陛下愧之他人能令親者疏臣不能令親者疏以此愧陛下耳武帝默然淚下以王濟為侍中卻説齊王攸死天咎屢見河南荊揚大水八月朔日食冬慕容廆兵五萬寇遼西遼西郡守章明以兵拒戰敗死失去州郡太廟殿陷星隕如雨或者以為齊王死屈故有是變慕容廆既寇遼西武帝甚憂之群臣奏宜下詔招安封其為鮮卑都督則彼自降武帝從之使使捧詔往遼西令東夷校尉以節封慕容廆為鮮卑都督令來降使人領詔入遼西見東夷校尉何龕使人以書通知慕容廆廆大悅即以士大夫禮巾衣詣府門降何龕龕恐其詐乃嚴軍以見之廆即出乃改服戎衣而入左右問其故廆曰主人不以禮待客客何為哉龕聞甚慚焉於是龕持節開詔讀之廆跪聽宣訖謝恩而起於是廆降晉受鮮卑都督印綬收兵徙居徒河西山去訖卻説武帝極意聲色遂致成疾時楊駿秉權忌諸王有變心生一計密奏帝曰陛下龍體不安自是主弱臣強倘不豫何以制之宜封建諸王都督各鎮此萬全之計也帝從之以汝南王司馬亮為大司馬都督豫州諸軍事使鎮許昌又徙皇子南陽王司馬柬為秦王使其都督關中以司馬瑋為楚王使其都督荊州以司馬允為淮南王使其都督揚江二州諸軍事並假節令其歸國非宜喚不許入朝又立皇子司馬義為長沙王立司馬穎為成都王司馬晏為吳王司馬熾為豫章王司馬演為代王立皇孫司馬遹為廣陵王武帝以才人謝玖賜太子司馬衷衷納之生皇孫司馬通年五歲宮中曾夜失火武帝大驚登樓以望時皇孫司馬遹乃牽武帝裾入暗中而言曰暮火倉卒宜避非常不可令照見人主武帝聞言由是奇之次日武帝領皇孫司馬遹觀豕牢遹言于武帝曰豕甚肥何不殺以享士而使久費五穀武帝嘉其説遂使烹之因撫其背謂廷尉傅祗曰此兒當興我家次日早朝會武帝謂群臣曰朕皇孫司馬遹聰敏非常前觀失火之戒後上烹豕之言好似吾太祖宣帝之才也朕觀太子不才意欲廢之今見皇孫如此明慧故不易之於是群臣上賀皆稱萬歲武帝乃大會群臣於淩雲台尚書衛瓘知太子司馬衷庸才不堪政事每欲陳啓廢之事未敢發言因此朝會佯醉入跪武帝床前曰臣欲有所啓武帝曰卿所言何耶欲言而止者三乃以手撫床曰此座可惜武帝意悟因謬曰卿真大醉於是瓘不敢復言而武帝了然在心乃悶悶歸宮密謂皇后楊氏曰今太子不堪大統此事若何楊後對曰古來神器立嫡以長不問賢愚豈可動乎時武帝疾甚知太子不才然恃皇孫司馬遹明敏故無廢立之心先用王祐謀以太子母弟柬瑋允分鎮要害又恐楊氏之逼以王祐為北軍中侯典禁兵又與皇孫遹高選僚佐以散騎常侍劉實志行清素命為之傅以輔皇孫又封宗室數人淮南相劉頌疏曰陛下以法禁素寬未可遽革然矯時救弊亦宜以漸譬猶行舟維不橫截迅流當漸靡而往稍向所趨然後得濟也臣聞為社稷計莫如封建親賢然宜審量事勢使諸侯率義而行者其力足以維持京邑包藏禍心者其勢不足以有為陛下宜與通達古今之士共籌之周之諸侯有罪身誅而國存漢之諸侯有罪或無子者國隨以亡今宜反漢循周則下固而上安矣天下至大萬事至衆是以聖王執要於上委務於下非惡勞而好逸誠以政體宜然也夫以居事別能否甚難也以成敗論功罪甚易也今陛下精于進始而略於考終此政之所以未善也人主誠能居大執要考功罪於成敗之後則上下各得其所安矣古者六卿分職冢宰為正自漢氏以來凡列執事丞相都總今尚書制斷諸卿奉成于古制為太重使出家事付外寺使得專之尚書統領綱紀歲終考功校簿而行賞罰斯亦可矣今動皆受成於上故上之所失不得復以罪下歲終事功不建不知所責也夫細故謬妄人情之所必有而悉苛以法則朝野無完人矣近世為監司者類大綱不振而微纖必舉盡由畏避豪強而又懼職事之曠則謹密綱以羅微使奏效相接狀似盡公實則撓法是以聖主不善碎密之案必責凶猾之奏則政之姦自然擒矣夫創業之勳在於立教定制使遺風系人心余烈匡幼弱後世憑之雖昏猶明雖愚若智乃足尚也至夫修飾官署凡諸作役此將來所不須于陛下而自能者也今動所不須以傷所憑竊以為過矣
