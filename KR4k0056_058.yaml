body:
  text: 第五十六回張方劫駕入長安河間王顒聞惠帝車駕還洛陽聚衆謀士商議將到洛陽李含進曰昔晉文公納周襄王而諸侯影從漢高帝為義帝發喪而天下歸正近白天子蒙塵將軍首興義兵徒以河間擾亂未遑遠赴鑾輿旋轉建都榛蕪誠因此時奉主上以從人望大順也秉至公以服天下大略也迎主上入長安以致英俊大功也四方雖有逆節其何能焉若不早定使英雄生心後雖為慮亦已無及顒乃大喜收軍起程忽仆射荀藩自外入來顒便請問朝廷之事若何藩曰殿下興義兵以除暴亂入朝天子輔翼王室此王霸之功也以下諸將人殊志異未必服從今留匡弼事勢不便惟有移駕去長安然朝廷播越新還舊京遠近觀望冀得安生今復移駕不厭衆心夫行非常之事乃有非常之功願算其多者行之顒執其手大笑曰此孤之本志也又曰王浚在此大臣在朝事節若何藩曰易也以書與浚且安其心大臣聞之則曰洛陽無糧欲車駕暫幸長安轉運糧食稍易可無缺乏懸隔之憂大臣聞此皆欣然也顒大喜曰願公早晚相從有不可行者教之自當拜謝顒意決命張方率五千騎先去臨行囑咐其計方答曰臣自能之於是方迎至帝前帝問曰卿來何方奏曰臣奉河間王命聞烏桓國王攻鄴使臣引兵五千前來保駕自隨後引大兵來迎帝曰河間王乃朕之親可為社稷之臣也言訖保帝還洛陽宮奔衆復還百官復集卻説王浚與騰見穎劫帝走還洛陽乃引衆入鄴暴掠一空復各回鎮時劉淵聞穎去鄴歎曰不用吾言徒自奔潰真無才也然吾與之有言矣不可不救因此淵欲發兵攻鮮卑烏桓劉宣等諫曰晉人奴隸禦我今其骨肉相殘是天棄彼而使我復呼韓邪之業也鮮卑烏桓我之族類可以為援奈何擊之淵曰善大丈夫當為漢高魏武呼韓邪何足效哉宣等稽首曰非所及也自是淵發兵救穎
