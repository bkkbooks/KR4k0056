body:
  text: 第六十三回祁弘奉駕還洛陽卻説祁弘等率群臣入內奏曰臣等奉東海王命引兵至此迎請陛下車駕回洛陽舊都帝曰遊子思故鄉朕欲還洛久矣卿等既來保朕目下即行於是惠帝詔集百官文武皆起行山徑又狹不堪車駕帝乃乘牛車而行百官步走跋涉艱難當東海王越引群臣道左拜迎帝車駕入洛陽還宮命工修葺宮室殿宇復太廟社稷台省六月立皇后羊氏以東海王越為太傅録尚書事以范陽王虓為司空命其鎮鄴城帝輒與群臣論衆務講議經籍晉室悠悠百二秋何事干戈戰不休只因骨肉相殘害致使胡人竊位羞卻説李雄占據益州國富兵強群臣勸進大位於是雄即帝位國號大成追尊父李特曰景皇帝時范長生至成都雄感前恩門迎執板人內拜為丞相尊之曰範賢至是以為天地太師時諸將恃恩互爭班位尚書令閻式請效漢晉故事立百官制度雄從之
