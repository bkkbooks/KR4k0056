body:
  text: 第二五三回謝玄率兵救彭城卻説秦王堅命諸將分道寇晉當秦將彭超曰宜攻沛郡太守戴邍于彭城後長驅大進堅然之超又曰願更遣重將攻淮南為棋劫之勢東西並進丹陽不足平也秦王堅從之使俱難率步騎七萬寇淮陽盱眙八月超兵至攻彭城未下晉帝聞知大驚遣人以詔命右將軍毛武生率衆鎮姑孰以禦之秦王堅又使韋鍾以兵圍魏興攻太守吉挹于西城晉謝玄聞知率衆萬余來救彭城軍至四口欲遣使報戴邍令共合兵夾擊而不可得部曲將田弘知其意請曰將軍之討欲使人報戴公令其合兵但無人去臣請沒水潛行玄大悅使行至水邊被秦人彭超所獲將酒與食以金帛厚賂與弘曰你入彭城只道南人已敗逃回去了弘偽許之既走城下告遂曰南軍垂至勉而待之秦人大怒射殺之彭超輜重盡在留城謝玄以計令人揚言遣軍一萬人攻留城取其糧草超聞之解彭城圍乃引兵保輜重戴邍率衆出城來見謝玄謝玄與其全師而還超復據彭城留徐褒守之自以兵南攻盱眙俱難又克淮陰城無晉兵乃回留邵保戍之秦軍韋鍾攻拔魏興太守吉挹不言不食而死秦王堅聞知歎曰周孟威不屈于前丁顔遠潔己于後吉祖沖閉口而死何晉室之多忠臣也初挹參軍史穎迍回得挹臨終手疏歸晉帝以其忠後贈益州刺史初秦將俱難彭超二人攻拔盱眙執內史毛璪之遂圍田洛于三阿去廣陵百里朝廷大震謝安命臨江列戍而守之謝玄自以將兵二萬來救三阿城難超二人聞其兵來必疲倦不與諸軍傳飧將兵排悉與玄交戰玄兵飽食勇力向前未三合俱難彭超大敗退保盱眙六月玄又進攻之難超又敗退屯淮陰玄謂諸將曰難超兵窮勢寡卒無鬥志宜速進兵得一人乘潮上流燒淮橋則彼自走何謙曰末將願往於是使何謙率舟二百乘潮上流夜焚淮橋難超見燒淮橋恐後難退以兵退屯淮北玄謙合兵追之戰於君川難超兵無鬥志被玄大破之難超北走僅以身免玄已殺退難超之兵命人戍守乃率衆還廣陵玄領徐州刺史秦王堅大怒征超下廷尉超遂自殺難削職為民
