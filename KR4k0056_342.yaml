body:
  text: 第三三九回劉裕發兵討休之乙卯十一年正月劉裕收司馬休之次子文寶兄子文祖賜其自死訖裕自領荊州刺史將兵擊之以將軍劉道鄰監留府事劉穆之兼右仆射命國事皆決于穆之時雍州刺史魯宗之自疑不為裕之所容與其子竟陵太守魯軌起兵助休之二月休之知次子文寶等被害發兵討裕又遣人上表罪狀劉裕裕乃勒兵拒之裕又以密書令人招休之録事韓延之為內應延之不允令人回書曰辱疏知以譙王前事親率軍馬遠履西畿良增歎息司馬平西體國忠貞款懷待物以公有匡復之勳國家蒙賴推德委誠每事詢仰譙王見劾自表遜位又奏廢之所不盡者命耳而公以此遽興甲兵所謂欲加之罪何患無辭劉裕足下海內之人誰不見足下此心而欲欺誑國士自謂處懷期物自有由來夫劉藩死於閭闔方諸葛斃于左右甘言詫方伯襲之以輕兵今又伐人之君陷人以利真可謂處懷期物自有由來矣吾誠鄙劣嘗聞道于君子以平西之至德寧可無授命之臣乎假令天長喪亂九流渾濁當與臧洪遊於地下耳劉裕開視其書以示將佐曰事人當如此矣諸將佐皆默然時韓延之以裕父名翹字顯宗乃更其子曰翹以為不臣之意劉裕遂使參軍檀道濟朱齡石將步騎五萬出襄陽江夏太守劉虔之聚糧以待魯軌被道濟攻擊殺之取其糧以給三軍裕又使壻徐逵之蒯恩沈淵等以軍三萬出江夏口與軌戰逵之未嘗經戰一見敵兵強盛欲走因此衆潰大敗而死裕聞之大怒三月裕率諸將濟江休之兵臨峭岸裕軍士在岸下無能登者裕自披甲欲登岸諸將諫之不從裕怒甚盛主簿謝晦向前抱持裕曰主公不可登險裕抽劍指晦曰我斬卿晦曰天下可無晦不可無公將軍胡藩以刀頭穿岸裂容足指使三軍騰之而上隨者稍衆直前力戰休之兵稍欲退裕以兵乘之休之兵遂大潰裕以大衆攻克江陵休之宗之皆敗而走魯軌留守石頭見司馬休之衆潰大敗料事不濟不敢接戰來守石城劉裕直遣兵攻破石城休之與魯宗之軌等懼走奔秦宗之素得民心士民爭為之衛送出境追兵盡境而還休之至長安拜降秦王興以為揚州刺史使侵擾襄陽復使宗之將兵克襄陽未至宗之已卒劉裕知休之奔降于秦乃令衆將還建康奏帝以穆之為左仆射
