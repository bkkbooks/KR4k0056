body:
  text: 第二九九回李皓自稱西涼王卻説西涼王李皓字玄盛小名長生隴西成紀人漢前將軍李廣十六世孫祖仕張軌父早卒遺腹生皓皓少而好學其性沈敏寬和通涉經史頗習武藝誦孫吳兵法嘗與呂光太史令郭磨及其同母弟宋繇同宿窘謂繇曰君後當位極人臣李君有國土之分家有騧草馬生白額駒及其時也呂光來京兆段業自稱涼州牧聞皓之名署皓為效穀令會敦煌太守孟敏卒於是護軍郭謙等以皓溫毅有惠政推為敦煌太守其時宋繇亦仕段業聞皓已立乃辭段業而歸敦煌乃入見李皓言曰兄忘郭黁之言耶白額駒今已生矣如何不早建其大業也懸曰吾已得志待弟來謀幸爾到此吾之大業濟矣於是乃與宋繇共謀霸有秦涼二州遂遷都於酒泉郡自稱為秦涼二州牧皓乃勸民稼穡五穀豐登百姓樂業是時白狼白駒白雀白雉白鳩皆自然棲於園囿宋繇以白祥自至金精所誕皆應因上言曰昔太史令郭磨曾言白祥若起明公可以登基今日瑞已應矣明公宜登王位以乘其時皓曰吾無才德何敢為之必須請命于晉然後方可自立宋繇曰今若如此則衆士民必離臣等諸將為明公開台建業離鄉土棄親戚咸指望明公即位以圖榮貴今日失其所望則散而去明公與誰人成其事耶皓始從之遂自立
