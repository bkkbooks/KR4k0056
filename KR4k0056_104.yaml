body:
  text: 第一一回邵續棄子歸晉室卻説王浚所署樂陵太守邵續因王浚死而附石勒勒以其子邵義為督護渤海太守劉胤聞浚被殺乃棄郡依續謂續君子晉之忠臣奈何從賊以自汙乎言未訖會段匹磾使人以書邀續同歸江東續從之回書使人復命左右曰君歸江東其如令嗣邵義何續泣曰我豈能顧子而為叛臣乎因殺異議者數人於是續已知決定使劉胤來江東見左丞相睿具説歸晉之事睿大悅以劉胤為參軍遣使拜邵續為平原太守石勒聞知邵續歸江東乃殺邵義石勒見邵續去江東自率衆來圍之續使人求救于段匹磾匹磾自以五萬軍來救勒乃引軍退還襄國續出城謝段匹磾及犒勞其卒匹磾亦還薊訖是時襄國大飢穀二升值銀一斤石勒甚憂之時五月太尉涼州牧西平公張軌寢疾集文武將佐於臥內吩咐曰吾將不豫汝等文武將佐忠輔吾世子張實務安百姓上思報國下以寧家言訖而卒長史張蹇即主喪事訖乃使使入朝表世于張實攝父之位憨帝詔實為都督刺史西平公諡軌曰武穆
