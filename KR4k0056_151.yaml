body:
  text: 第一四八回元帝崩太子即位元帝因王敦作逆憂憤成病將篤乃召司空王導入內受遺詔輔政王導入內囑曰朕自琅玡王得遇卿至此不幸病篤諒已難逃天命朕聞神堯以一旅取天下吾以天下不能討五胡而雪三帝之恥朕所恨在此愧見先帝於九泉之下耳言訖而昏徐徐又醒謂王導曰太子篤厚恭謹可任大事汝等宜輔佐之各盡忠義之心以圖滅胡之計勿少忘焉言訖而崩帝年四十七歲在位十六年而崩帝性簡儉沖素容納直言初鎮江東頗以酒廢事王導深以為言帝命酌引觴覆之於是遂絶不飲有司嘗奏太極殿廣室宜施絳帳帝曰漢文集上書皂囊為帷遂令冬施青布夏施青練帷帳將拜貴人有司請市雀叉帝以煩費不許所幸鄭夫人衣無文彩耳始先秦時有望氣者雲五百年後金陵有王者氣故始皇東遊以厭之改其地曰秣陵塹其山以絶其勢及孫權之稱號自謂當之孫盛以為始皇逮於孫氏四百三十七載考其替數猶為未及元帝之渡江也乃五百二十六年真人正應在於此矣天意人事又符中興之兆太安之際童謠五馬浮渡江一馬化為龍識者以為吳越當興王者是歲元帝與四王司馬氏共渡江帝竟登大位焉初玄石圖有牛繼馬後之説故宣帝深忌牛氏遂以二榼共一口以貯酒帝先食佳者而以毒酒鴆其將牛金而恭王妃夏侯氏竟通小吏牛氏而生元帝亦有符雲矣元帝既崩司空王導與百官舉哀發喪葬于建平喪事畢乃扶太子司馬紹登基於太極殿百官山呼萬歲禮畢分列兩班改年號為太寧百官上尊號肅宗明皇帝群臣皆上賀帝命光祿寺排宴宴畢群臣加封王導為郡公進位太保劍佩上殿入朝不趨贊拜不辭導受職謝恩盡忠王室竭力輔政太子即位尊所生母荀氏為建安君史説明帝諱紹字道幾乃元帝長子在位三年壽二十七歲幼而聰哲為元帝所異年幼時帝坐置膝上適長安有使來元帝因問之曰汝謂日與長安孰遠對曰長安近不聞人從日邊來居然可知也元帝異之明日宴群臣又問之明帝對曰日近元帝失色曰何乃異前問之言明帝又對曰舉目則見日不見長安由是益奇之元帝為晉王立為王太子及即帝位立為皇太子帝性至孝有文武才時王敦欲誣以不孝而廢之大會百官而問中庶子溫嶠曰皇太子以何德稱聲色俱厲必欲使有言嶠對曰鈎深致遠蓋非淺局所量以禮觀之可稱為孝矣敦謀逆遂止今元帝崩乃即帝位
