body:
  text: 第三十七回孫秀害潘嶽石崇卻説潘嶽字安仁滎陽人也少以才穎見稱鄉邑號為奇童謂是終賈之儔也先是武帝時帝躬藉田潘安仁曾作賦以美其事曰五輅鳴鸞九旗揚旆有邑老田父或進而稱曰損益隨時理有常然高以下為基人以食為天正其末者端其本善其後者慎其先今聖上圖匱于豐防儉於逸展三時之宏務期倉廩於盈溢固堯湯之用心而存救之要術也潘嶽因此才名冠世為衆所疾遂棲遲十年出為河陽令自負其才鬱鬱不得志後遷為給事黃門侍郎嶽性輕躁趨世利與石崇等事賈謐每候其出與石崇輒望塵而拜惜湣懷文嶽之辭也謐二十四友嶽為其首謐晉書限斷亦嶽之辭也其母曾誚之曰爾當知足而於沒不已乎嶽終不能改既仕宦不達乃自作間居賦其賦曰嶽讀汲黯傳至司馬安四至九卿而良史書之題以巧宦之目未嘗不慨然而歎也曰嗟乎巧誠有之拙亦宜然仆自弱冠涉於知命之年八徙官而一進階耳再免一除名一不拜職遷者三而已矣雖通塞有時抑亦拙者之效也昔通人和長輿之論餘也固曰拙於用多稱多者吾豈敢言拙則信而有征方俊乂在官百工惟時掘者可以絶意乎寵榮之事矣太夫人在堂有贏老之疾尚何能違膝下色養而眉屑從鬥筲之役乎於是覽止足之分舒浮雲之志築室種樹逍遙自得池沼足以漁釣租稅足以代耕灌園鬻蔬供朝夕之膳牧羊酤酪俟伏臘之賈孔子曰孝乎惟孝友于兄弟此亦拙者之為政也潘嶽美姿容少時曾挾彈出洛陽道遊婦人遇之者皆連手縈繞投之以果遂滿車而歸時張載生甚醜陋每行遇小兒以瓦石擲之委頓而返嶽先事賈謐謐薦為黃門侍郎而嶽常輕孫秀因此購隙秀既得志每有殺嶽之心未得其便至是朝中倫秀秉政遂存害嶽之意焉秀又聞石崇有愛妾名曰緑珠色美而豔又善吹笛秀使人來崇家求之此時石崇正與緑珠在金園別館方登涼亭臨清流集群姬在側使人直入涼臺見崇曰孫侍中聞足下家有美妾極善歌舞使某求一足下意允否崇曰有乃盡出其婦數十人以示使皆蘊蘭麝披羅縠祟謂使人曰子所擇佳者即以奉承使人曰君諸姬服禦麗則麗矣然吾受侍中之命止索緑珠不知誰是石崇勃然曰緑珠乃吾所愛不可得也使人曰君侯博古通今察遠照邇侍中之暴君侯已知願加三思勿使噬臍無及崇曰不必多言矣竟不許使人出回報孫秀説崇不肯孫秀大怒乃入見趙王司馬倫曰昨聞石崇與潘嶽二人密謀要與淮南王允等報仇若不早除將至亂矣司馬倫曰嶽崇有異卿可誅之秀既得命即出府堂矯詔使介士二百人收石祟與潘嶽二家時石崇正與緑珠宴於樓上介士到曰奉詔收二人速下樓石崇大驚哭謂緑珠曰我今為汝得罪不知遂駕何所緑珠亦泣曰君侯為妾得罪妾當效死君前豈敢奉事二姓為君羞耶言訖自投於樓下而死介士逼崇急行崇曰吾不過流徙交廣何相逼耶言訖與行及執至東市方知處斬石祟大哭歎曰奴輩利吾家財耳收者答曰知財能為禍何不早散之崇默然不語時介士執潘嶽至謂之曰安仁卿何説復爾耶嶽淚曰可謂白首同所歸矣嶽先題金穀詩雲投分寄石友白首同所歸今果應其讖故潘嶽言之俄而監斬官到將二人並家屬盡斬之籍沒崇之家財焉卻説河內太守劉頌見政出群下付託非人乃草具所陳於惠帝曰頠惟萬載之事理在二端天下大器一安難傾一傾難正故慮經後世者必精下之政使萬世賴耳表上及陳政要休付與人宜親萬機惠帝曰不能行矣因此朝野不安大亂焉
