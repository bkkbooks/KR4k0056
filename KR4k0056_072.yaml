body:
  text: 第七十回石勒以兵下趙魏戊辰二年正月朔日食漢王淵遣輔漢將軍石勒領兵五萬下趙魏幽州都督王浚心甚憂之朝廷亦知遣使詔王浚討之王浚既受詔恐力不及即忙使人往朔方穆帝處借兵同討當穆帝得浚書與諸部大人商議回書與使人還隨即點兵起行亦至趙郡王浚聞朔方兵至即忙發兵亦至趙地次日忽望見塵頭蔽日軍馬漫山塞野而來浚視之乃五原穆帝之兵浚大喜直至中軍下道拜迎穆帝亦下馬答之浚説前日乞師之事帝曰君休煩惱吾兄弟代你雪恥言訖下令安營以酒相待言曰吾令將軍為前部吾自引大兵至後應浚曰謹領尊命言訖即辭出收拾軍馬迤邐前行卻説石勒軍至上黨忽聽得豁喇炮響陳後喊起使高貢探之北軍殺到當先一將豹頭環眼燕頷虎須乃朔方西鄉人也姓許名諸持刀殺來高貢戰不利退入陳走北將沖來呼延攸大怒來鬥許諸正鬥之間陳外喊聲起大軍來到攸拖畫戟引兵向東走北軍兩下殺來人困馬乏又一軍來當頭攔路乃王浚也橫刀躍馬截住去路攸與浚交鋒背後張目趕上攸衝開路慌忙奔走石勒引軍殺至走人上黨城中王浚與穆帝直追至城下高叫石勒打話勒令堅壁四門自上城頭王浚在馬上以鞭揖勒勒以手答之浚曰近聞卿降漢掠趙故領兵至此若能倒戈投降共扶晉室不失封候之位若復愚迷不省打破城池玉石俱焚悔之晚矣勒曰汝且暫退尚容商議穆帝曰限汝三日不降以兵攻城言訖退兵下寨歸石勒亦退歸內與呼延攸高貢等議曰不如乘其下寨未定沖出走回至國城去若在此裏無糧草外無救兵必被所擒耳攸等曰即今日便行石勒曰今日乃凶神之日不可出城待來日戌亥之時可以上馬領兵開西門走計議已定各準備走路次日傳令約束行李器械至夜令呼延攸為前部自領後軍開西門大喊殺出呼延攸當先聽得一聲鼓響一將當先攔住去路大叫休要走了石勒攸視之乃許諸攸與戰十數合乃衝開血路而逃石勒亦催後軍殺出遇許諸攔路無心戀戰沖路而去許諸乃引兵趕殺石勒引兵趕上王彌一處同走又遇王浚殺一陳衝開血路奔走回國去訖王浚穆帝見勒兵去遠亦不追趕鳴金收兵各自安營次日王浚以牛酒犒勞代兵以金帛拜謝穆帝乃引兵回國去訖王浚亦收軍還鎮三月太傅越奏懷帝殺清河王覃帝不敢阻群臣無不嗟歎
