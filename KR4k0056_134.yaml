body:
  text: 第一三一回宇文氏攻慕容廆十一月平州刺史崔毖以士民多歸慕容廆心甚不平乃密遣人陰説高句麗段氏宇文氏約使起兵共攻之毖所親高瞻力諫曰慕容氏部下軍多將廣智足深謀更兼霸地千裏糧料山積攻之難克退之結怨莫若含忍以候其變然後可為之毖不從發使去三國訖不旬日皆執兵而至於是宰牛殺馬犒勞三國之兵訖三國合兵共五十三萬次日起行來伐慕容廆兵至城下廆諸將請擊之廆曰彼為崔毖所從邀一切之利軍勢初合其鋒甚鋭不可與戰當固守以挫之彼烏合而來未相歸服久必攜二然後擊之破之必矣諸將默然於是三國進兵攻棘城廆令將士閉門自守並不出戰過數日計以牛酒使人獨勞宇文氏請兵退和宇文氏受之崔毖段氏二國果疑宇文氏與廆有謀各引兵歸時宇文氏士卒二十余萬連營四十裏其大將悉獨官曰二國獨歸吾獨取之因是進兵慕容廆使人召使其子慕容翰將兵人屯於徒河翰人歸城內見父廆曰彼衆我寡難以取勝兒欲為奇兵於外伺其間而擊之若並兵為一取得專意攻城非策之得也魔從之翰選精兵三千騎屯於五十裏之外悉獨官聞之曰翰遠歸而不入城或能為患當先取之於是分遣五千騎擊翰翰計以三千精兵伏于暗穀中又使人假為段氏使者逆于道假説大路有伏兵不可行宇文氏信之引兵從小路進發至翰設伏之處將過大半一聲鼓響伏兵從暗穀中殺出翰自以兵出迎塞住去路宇文氏兵被翰殺死十停去其七停餘者盡被殺之翰忙使人入城報廆使出兵擊其前又使部將乘勝徑進襲其後自於中間接應前後於是廆知翰勝進兵乃自披挂率衆出城大戰前鋒始交後兵接戰兩下夾攻殺傷甚衆戰至十五合翰率二千騎從旁直入其營縱火焚之風起火發宇文之兵燒死大半宇文之衆大敗折去三十萬人悉獨官僅以身免而還廆盡俘其衆獲皇帝玉璽三紐崔毖聞之懼奔高麗廆入于平州不忍絶其類反以其子崔仁鎮遼東官府百姓安堵如故廆以高瞻為將軍瞻稱疾不就廆數臨其家候之撫其心曰君之疾在此不在彼也今晉室喪亂孤欲與諸君共靖世難擁戴帝室奈何以華夷之異介然疏之哉夫立功立事惟問志何如耳瞻猶不起廆頗不平瞻以憂卒於是廆引衆還鎮使裴嶷奉表並將所得玉璽詣建康獻之
