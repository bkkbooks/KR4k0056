body:
  text: 第一七九回石虎弒主自即位十二月趙丞相石虎欲篡位乃集百官於朝堂謂曰孤自受將略以來南征北討東蕩西除百戰而有千傷十死僥幸一生論吾之勳足高一時成大趙之業者乃我也若無吾一人安得至於今日耶今聖上晏駕不遺詔立我而立弱弘倘外窺兵誰能當之我欲廢之汝諸大臣其意雲何斯時石弘懦弱石虎強盛黨多父子並執大權衆臣皆畏其勢乃對曰臣等正欲上請廢立未敢發言丞相言之無不可也虎見百官聽從乃退還府趙王石弘聞知其議恐禍滅族乃自齎璽綬步詣魏宮請禪其位於虎虎曰帝王大業天下自當有議何為自論耶虎不受璽綬弘見推卻乃流涕回宮謂太后程氏曰石虎欲謀大位先帝真無復遺種矣言訖母子對泣於是尚書省奏魏台請依唐虞禪讓之事虎曰弘愚暗昧居喪無禮不可以君萬國便宜廢之何禪讓也言訖即領府兵入命武士扶弘下殿曰汝素居喪無禮不諳政事難奉宗廟是以廢之弘並不辭乃下階立於臣列於是丞相虎自登禦座百官與弘同拜山呼虎以弘為海陽王自稱居攝趙天王改元建武時尚方令作司南車成構思精微虎賜其爵關內侯時衆役繁興軍旅不息加以久旱因此谷貴金二斤買米二鬥虎聞長樂魏國有田疇未辟桑業不修下詔貶其守宰虎既即大位已定陰使人弒程太后及石弘一家不留一人果然勒種無遺姚弋仲聞之稱疾不賀虎纍使召之乃至正色謂虎曰弋仲嘗謂大王命世英雄奈何把臂受託而反奪之耶虎心雖不平然察其誠實亦不之罪矣卻説慕容仁反據遼東慕容皓親率三軍去討軍至遼東城仁亦率衆出迎兩下會戰仁大敗乃棄城引家屬出奔別處皓遂領衆入城欲悉坑遼東之民高詡諫曰今元惡猶存始克此城遽加夷滅則未下之城無歸善之路不若赦之為安皓以為然止之乙未咸康元年正月朔成帝加冠群臣朝賀三月司徒導贏疾不堪朝會成帝與群臣達其府導排宴待帝與朝臣於內室帝拜導及其妻曹氏侍中孔坦密諫曰陛下初加元服動宜顧禮時帝方委政於導坦復言曰陛下春秋已長聖境日躋宜博納朝臣詔咨善道而導惡之即出坦為廷尉坦明知即辭以疾去職還第於是罷宴成帝還宮時桓景諂巧導親愛之會熒惑守南斗經旬導謂將軍陶回曰熒惑犯南斗而南斗乃揚州分野今妖孽處之吾當遜位以厭天譴回曰明公以明德作輔與桓景造象使熒惑何以退舍導深愧之略疏桓景使人辟太原王溕為椽吏王述為中兵屬史説王述字懷祖年三十尚未知名人或謂之癡時導以門第辟為中兵屬及見導無他言惟問江東米價如何述張目不答導曰王椽不癡人何言癡耶嘗見導每發言一座莫不贊美述正色曰人非堯舜安能每事盡善導改容謝之王溕字沖祖善隸書美姿容嘗覽鏡自照稱其父字曰王文開生如此兒耶居貧帽敗自入市買之嫗悅其貌美遺以新帽不問取價時人以為達與沛國劉大協齊名友善協嘗稱溕性明通而自然有節溕雲劉君知我勝我自知當司徒王導聞二子之名而辟之四月趙王石虎親令晨官及六軍南遊臨江而還有遊騎十余至曆陽太守劉耽大驚以為石虎必來為寇忙使人入建康上表稱虎軍至近不言多少宜速為救朝廷震懼成帝既加司徒王導為司馬都督征討諸軍事令其備拒趙兵是日帝自觀兵廣莫門分命放將去救曆陽及分兵戍慈湖南渚郗鑒聞知亦使廣陵相陳光將兵五千入衛朝廷俄聞趙騎至少又已去了成帝遂解嚴導亦解司馬詔責耽輕妄免官九月趙王石虎與百官商議乃遷都於鄴城初趙王石勒以天竺僧佛圖澄能預言成敗屢有應驗敬事之及虎即位奉之尤謹衣以綾錦乘以雕輦朝會之日太子諸公扶澄上殿國人化之爭造寺廟削髮出家於是百姓或避賦役為姦宄詔問曰佛外國所奉裏中小人無爵秩者應得事奉著作郎王度等議上言曰王者祭祀典禮俱存佛外國之神非天子所應祀也今宜禁公卿以下毋得詣佛寺燒香禮拜且漢魏惟聽西域人立寺都邑漢人皆不得出家今令趙人為沙門者皆返初服虎不聽詔曰朕生自邊鄙忝居諸夏至於饗祀令應從俗其夷趙百姓樂事佛者特聽之於是百姓都爭入寺出家卻説成王李班之舅羅演等欲殺成王李期復立班之子事覺遂收演等及班母羅氏殺之期自得志輕舊臣信任景賽姚華田褒中常侍許浯等刑賞大政皆決於數人而褒無他才先嘗勸雄立期為太子故此有寵由是朝綱隳紊雄業衰矣卻説代王紇那先入宇文部招集亡散五萬人復來爭位翳槐聞之莫敢當其鋒乃引衆奔趙去了於是紇那復占朔方
