body:
  text: 第一四六回王導執表涕周顗自此王導復預朝政後因人中書省行檢中書故事忽見周顗救己之文殷勤款至詞意懇切導執表流涕歸告其諸子曰吾雖不殺伯仁伯仁由我而死幽冥之中負此良友也言訖子數十人皆信個個流涕史説周顗好酒多失元帝初立時補吏部尚書頃之以醉酒為有司所糾白衣領職太興初轉尚書仆射庾亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽而唐突西子也帝宴群公於西堂帝酒酣從容謂百官曰今日君臣共集何如堯舜時耶顗因醉厲聲曰今雖同人王何得復比聖世帝大怒詔付廷尉將加戮纍日方赦之初顗以雅望獲海內盛名後頗以酒失為仆射略為醒日時人號為三日仆射庾亮曰周侯末年所謂鳳德之衰也顗在中朝時能飲酒一石及過江雖日醉每稱無對偶有舊識從北來顗遇之欣然乃出酒二石共飲各大醉及顗醒使人視客已腐脅死矣而顗性寬裕而友愛過人其弟嵩嘗因酒瞋目謂顗曰兄才不及弟何乃橫得盛名以所燃蠟燭投之顔色無忤徐曰阿奴火攻固出下策耳先王導甚重之嘗枕膝而指其腹曰卿此中何所有也顗答曰此中空洞無物然足容卿輩數百人導亦不為忤王敦素憚顗每見顗輒面熱雖冬月扇面手不得休敦使繆恆籍沒顗家收得素簏數枚盛敗絮而已及酒五瓶米數石在位者服其清約顗遇害時年五十四歲人人盡歎惜之史説祖納字士元乃祖逖之兄也幼有操行能清言文義可觀性至孝少孤貧常自炊爨以養母時王敦聞之乃使人遣其二婢代奉養母辟為從事中郎時人戲之曰奴價倍婢納應之曰百里奚何必輕於五羊皮耶王敦既為相以為軍咨祭酒時納好與人奕棋王隱言之曰禹惜寸陰不聞棋數納對曰以忘優耳隱曰古人遭逢則以功達其道若其不遇則以言達其道君少長五部遊宦四方華裔成敗皆當聞見胡不記述而有裁成何必憂圍棋而後忘憂也於是納不復下棋旦日入朝乃奏於帝曰自古小國之有史官況于中華安可不置帝納之使納修晉史其弟平西將軍祖約領軍鎮守豫州不能馭衆邊地多叛聞長城戴洋善風角有才識使人召至以為中興軍永昌元年四月庚辰有大風起自東南飛砂折木洋出聞之人謂約曰今年十月必有賊獄治罪到譙城將軍宜防之約未應當主簿王振言曰天道高遠豈人先知今戴洋妄造謠言扇惑民心宜以洋收獄治罪約從之乃命左右執戴洋收獄治罪不得與食待其自死於是左右執洋入獄中連絶食五十日不死左右與説話言語如昔左右人報知祖約曰吾知其有神術安能害之乃赦其出即罵王振曰你進讒言險害神人令左右執振斬之洋急救曰若殺此人臣請歸山約曰振昨日曾訴君于我何反救之洋曰振不識風非有夙嫌振往時垂飢死洋養活之振猶尚遺忘夫處富貴而不棄貧賤者固其難矣約義而釋之卻説王敦在石頭聞卓起兵大懼時卓兄子甘印為敦參軍敦乃遣印歸説卓使旋軍卓雖慕忠義而多疑少決及印至説猶豫逗留及聞戴淵周顗死流涕謂印曰吾之所憂正為今日若徑據武昌敦勢逼必劫天子以絶四海之望不知更思後圖吾據敦上流敦亦不敢復危社稷也於是即令旋軍樂道融曰今公兵斷彭澤使敦上下不得相赴其衆自然離散可一戰擒敦也將軍起義兵而中止竊為將軍不取也卓不從道融憂憤而死卓本寬和忽更強塞徑還襄陽意氣騷擾識者知其將死也王敦既得志改易百官及諸軍鎮惟意所欲將都武昌謝鯤曰公若朝天子使君臣釋然則物情相和悅服矣敦競不朝而去四月竟還武昌
