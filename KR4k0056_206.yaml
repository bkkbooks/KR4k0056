body:
  text: 第二三回桓溫率師入伐蜀十一月桓溫召諸將商議伐漢諸將佐皆以為不可惟江夏相袁喬曰夫經略大事固非常情所及耳智者了于胸中不必待衆言皆合也今為天下患胡蜀二寇而已蜀雖堅固比胡為弱將欲除之宜先其易者李勢無道人民不附且恃險遠不修武備宜以精兵萬人輕騎疾趨比其覺之我已出其險要可一戰而擒也蜀地富饒戶口蕃庶諸葛武侯用之抗衡中原若得而有之國之大利也溫曰論者以大軍既西胡必覬覦喬曰此似是而非胡聞我萬里遠征必以為內有重兵決不敢動縱有侵犯沿江諸軍足以拒守必無憂也溫大悅曰君謀乃吾志也戒嚴旦日不待詔命拜表即行委長史范汪以留事朝廷得表聞溫伐漢皆以蜀道險遠衆少而深入多以為憂惟劉惔以為必克衆問其故惔曰以博知之溫善博者也不必得則不為但恐得蜀之後專制朝廷耳衆服其論
