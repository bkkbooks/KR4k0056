body:
  text: 第一二六回劉曜石勒討靳準卻説靳準自料不能迎敵石勒使侍中蔔泰送乘輿禦服請和于石勒勒大怒將蔔泰囚之使人送與漢主曜曜釋之謂泰曰先帝末年實亂大倫司空行伊霍之權使朕及此其功大矣並早迎大駕者當悉以政事相委況免死乎汝可回以白之蔔泰還以曜語與言之靳準不從將軍喬泰等見準不從引兵入城將準誅之推靳明為主又遣卜泰奉傳國玉璽降漢石勒大怒進軍攻靳明明率兵出與勒戰大敗回城不敢復後交兵十一月日夜出高三丈晉帝以王敦為荊州刺史又詔群卿各陳得失禦史中丞熊遠上疏曰胡賊猾夏梓宮未還而不能遣軍進討一失也群宮不以仇賊未報為恥務在調戲酒食而已二失也選官用人不求實德惟尚清談選求才幹惟事請托當官者以治事為俗吏奉法為苛刻盡禮為諂諛從容為高妙放蕩為達士驕蹇為簡雅三失也世所惡者陸沈泥滓時所善者翺翔雲霄是以萬機未整風俗為薄朝廷以從順為善相違見貶安得朝有辨爭之臣士無祿仕之志乎古之取士敷奏以言今光祿不試甚違古義又舉賢不出世族用法不及權貴是以才不濟務姦無所懲若此道不改求以救亂難矣先是帝欲慰悅人心州郡秀孝至者不試皆署吏尚書陳頵亦上言宜循舊制試以經策帝從之仍詔不中科者刺史太守免官於是秀孝皆不敢行有到者托疾三年無就試者帝欲特除孝廉已到者官尚書郎孔坦謂曰近郡懼纍君父皆不敢行遠郡冀於不試冒昧來赴若加除署是為謹身者失分僥幸者得官頽風傷教忍從此始不若一切罷之而為之延期使得就學則法均而令信矣帝從之待至七年而試卻説晉司馬煥乃鄭夫人所生之子時年二歲矣沾疾將危晉帝甚愛之封琅玡王而卒帝命備吉凶儀服營起園陵功費甚廣右常侍孫霄諫曰古者凶荒殺禮況今喪亂憲章舊制猶宜節省而典禮所無安崇飾如是乎竭已疲之民營無益之事殫已困之財修無用之費此臣之所不安也帝不從正欲退殿忽聞報彭城內史周撫叛降石勒帝大怒即詔下邳內史劉遐泰山太守徐龕二人引兵討之卻説石勒見靳明不出親驅大衆攻平陽甚急靳明遣使求救于劉曜曜佯許之使人以一萬軍迎之明不知是計以為是實況石勒攻得甚緊明乃率平陽士女一萬五千棄城奔漢來降劉曜被曜虜去收靳氏男女二百人皆斬之石勒見靳明奔曜乃引衆入平陽焚其宮室修其故陵收粲以下百餘口葬之撥守置戌而歸襄國雲大興二年二月劉遐徐龕各以兵二萬來擊周撫相持月餘互各勝負初掖人蘇峻屢被漢兵攪擾不能得安乃率鄉裏結壘自保遠近之人多來附之衆至二萬餘人曹嶷惡其強盛將發兵攻之峻覺率兵浮海助劉遐共擊周撫是日交鋒蘇峻驟馬與周撫交鋒不兩合撫敗劉遐徐龕各收兵還鎮劉遐奏蘇峻討撫之功晉帝降詔以峻為晉陵內史鷹揚將軍峻自是歸晉
