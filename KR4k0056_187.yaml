body:
  text: 第一八四回李壽殺其主李期四月成王期驕虐日甚多所誅殺大臣皆不自安而期忌壽之威名使其出屯涪城壽懼不免每當入朝常詐為邊書辭以警急既而使出屯涪趣裝即行卻説李壽字武考乃李驤之子也官封車騎將軍因成王期疑忌其威使出屯涪心甚怨望於是欲自立恐力不及問長史任調曰主上托孤於我以期不堪嗣國是以班為東宮委吾立之今期弒班代之驕虐殘殺果應主上易簀之言吾欲廢此殘主自取天下其事若何任調言曰李期逆父弒主驕虐殘害百姓明公若興義兵討之孰不來應壽曰吾恐謀事不成反招其咎任調曰可使蔔者占之壽曰然於是遣使出府召蔔者入內筮之蔔者投卦成曰乾卦因賀曰將軍主有數年天子之分恐後不延任調曰一日尚為足而況數年乎壽曰朝聞道夕死可矣任侯之言策之上也因此每日論計劃策商議自立之計而猶豫未發初巴西處士龔壯父叔皆為李特所殺欲報仇積年不除喪壽聞其賢數以禮辟之而壯不應其時聞期刑政紊亂而來見壽壽問自安之計壯曰蜀民本皆晉臣足下若能發兵西取成都稱臣于晉不但自安則福流子孫名垂不朽豈徒脫今日之禍而已哉壽然之次日壽領兵五萬來襲成都時壽世子李勢為翊軍校尉聞父起兵至乃開門率衆納壽遂克成都屯兵宮門奏殺大臣數人縱兵大掠數日乃定用調之計矯太後任氏令廢期為縣令幽之期愧自縊而死當羅恆解思明等勸壽用壯策立壽遂從任調等之言自稱為帝改元曰漢興元年尊父驤帝號更以舊廟為大成廟盡殺成臣李雄諸子不留一人以李勢為王太子以任調為大將軍以安車束帛征龔壯為太師壯不至誓不出仕壽見其不詣又以厚贈壯無所受
