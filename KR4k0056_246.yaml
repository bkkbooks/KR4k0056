body:
  text: 第二四三回王謝新亭迎桓溫癸酉二月謝安與王坦之同群臣商議使人持詔書報知丞相桓溫使人臨行謝安密囑若問如此如此對之使人得其語來姑孰呈上詔書桓溫讀訖問之曰文帝臨崩有何遺詔使人曰聖上崩世遺詔國家之事一稟于丞相囑咐太子登位敕丞相如諸葛武侯故事別無餘言桓溫因是令使人還朝使人去訖丞相溫既知簡文帝崩世群臣立太子登基心中大怒恨文帝曰汝乃會稽散人吾立汝為帝臨終當禪位還我爾不然以吾為周公居攝事如何遺詔為諸葛武侯故事也遂問計于郗超郗超曰帝遺詔丞相為諸葛武侯故事卻是虛謬也必是謝安王坦之之謀丞相來日入朝先使人去京師入內召謝安王坦之二人自來新亭候接同議攻北大謀二人欣然肯來必無他意若是不到必有異謀丞相入朝先收此二人然後廢武帝大事定矣溫曰倘二人來如何區處超曰丞相于壁衣中置埋伏刀斧手於兩邊我在帳中聽言語動靜如若不善即呼刀斧手出殺之如無拒丞相之意不可妄行恐失民心宜與之好同人京師把握朝權待其加公九錫然後可議大謀溫曰然計議已定使人入朝召王謝二人迎至新亭同議國事溫一邊收拾軍馬起程稱脫來赴山陵止停新亭以待二人卻説孝武帝設朝文武班齊萬歲禮畢忽近侍奏大司馬桓溫有使至稱其來赴山陵及朝新帝召謝安王坦之二人來新亭候接其餘群臣十裏外迎接帝謂謝安王坦之曰今大司馬來朝召卿二人必有他故此事如何時群臣皆曰今桓溫來朝必有異心故召王謝二人至新亭以害之然後來篡大位望陛下陳兵以備休使謝王二人遠迎當王坦之心中甚懼曰此事實真若臣等去接正中其謀只有謝安神色不變謂坦之曰若依君等與之議則誤國家之大事反危社稷也桓溫雖有不臣之志未敢便行彼疑有遺詔加他九錫恐吾二人藏之故召吾二人問明吾與君不去溫疑是實心背朝廷晉柞存亡決於此行帝意遂決曰二卿可前去迎群臣曰謝王二公去臣等亦請同行帝曰若有不禮卿等速使人先報宮廷以備不虞群臣曰然因此謝安王坦之與群臣同行時禦史中丞高嵩戲謂謝安曰卿屢違朝旨高臥東山諸人每相與言安石不肯出將如蒼生何今日之危百姓亦將如卿何安雖有愧色亦謂嵩曰桓溫劍雖鋒利不能便誅吾也吾豈比深源睥睨社稷聞難欲去位以避之汝何相嘲耶言訖與坦之接至新亭坐候一時桓溫與諸將至其時日已落西溫軍將扎住行營安歇次日桓溫令郗超埋伏刀斧手於帳兩邊超伏於帳後以聽謝王二人動靜謝安王坦之二人先進入見桓溫各施禮畢溫命二人坐坦之驚得汗流沾衣倒執手版安從容就席談笑自若安坐定竊見壁衣中皆伏刀斧手即謂桓溫曰安聞諸侯有道守在四鄰明公何須壁後置人耶溫笑曰正是不能不爾耳溫因此遂命刀斧手退郗超正臥帳後聽謝王二人言語忽然風起吹動帳開謝安看見笑曰郗生可謂入幕之賓矣如何不出一見超慌忙走出相見各行禮畢遠遠坐住是以不能行計只得相陪當謝安言于溫曰先王崩世遺詔明公行蜀漢諸葛武侯故事我等正欲涓吉承迎乘輿入朝輔政今幸丞相車駕來至迎接不及望丞相恕愆溫曰我有何德敢慕武侯安曰丞相盛德巍巍何謂無也雖伊尹周公弗能及耳因此溫與安相悅攀話笑語移日當溫又問曰先帝已崩君等以何議諡安曰臣等以其平易不訾門簡慈惠愛民曰文諡為簡文皇帝言汔安取自所作諡議與溫看訖溫以其諡示群下曰此謝安石碎金也衆曰果經緯天地之才因談論至日昃謝安王坦之二人拜辭而出桓溫亦送出來見百官皆拜於道側溫命百官人中軍相見時百官入中軍見溫中軍大陳兵衛百官朝士有位望者皆戰栗失色只得入見拜禮畢溫曰勞百官遠迎即便還朝免此伺候於是百官朝士辭桓溫而歸朝卻説桓溫次日至山陵拜汔不及入朝忽然得病連臥二十四日不能起坐晉孝武猝聞知桓溫連日寢疾不見乃使謝安王坦之二人來視其疾安與坦之直入臥內二人施禮訖曰連日不見公顔何期尊體欠安溫曰人有旦夕禍福故有是爾溫又渭安曰孤昔滅蜀都克壽春多負勤勞如江南無孤一人正不知幾人稱霸幾人王天下碎裂矣今新帝登位豈識我之大功而以我為丞相未加九錫此所以吾愧之吾今疾甚日下就回姑孰汝將此語與聖上稟知安曰明公功蓋天下德播華夷莫道封王禪位皆宜明公今還貴鎮保重尊體我等與衆臣保奏孝武加公九錫必矣於是溫大悅使二人清還謝安王坦之直辭歸去桓溫令郗超領衆一同還朝卻洗安言於坦之曰吾觀丞相桓溫不久必亡適問所議九錫之事密緩藏之在心延而視之只我與君知也不可漏泄若溫病瘥加封其王如不起即息其議坦之曰此計可矣因此二人密緩其事延待看之桓溫還姑孰疾病轉添召弟桓沖並子桓熙至床前囑沖曰吾自總角便知用兵之道至弱冠屢立邊功縱橫天下二十餘年矣今吾不濟托汝後事吾世子桓熙才弱不堪重任四子桓禕極是蠢愚不辨菽麥幼子桓玄異而有志今年五歲汝善導而襲之吾死之後汝不能不代領其衆其權可要自執休付他人自取滅亡之患言訖淚如雨下桓沖又曰吾兄百世後諸子之中誰襲兄職溫曰桓玄雖幼可以立之沖問安坦之二人何如所在溫曰渠等不為汝所處分也言訖而亡桓沖即時收殮殯葬直寫表申奏朝廷乃以少子桓玄為嗣襲封南郡公桓沖自代溫任盡忠王室時群下王珣等欲沖入朝誅除朝中元宰把執時權沖不從卻説桓玄字敬道一名靈寶是桓溫之子也其母馬氏與同輩嘗夜坐於月下忽見流星墜于銅盆水中如二寸火球湛然明淨同輩競以瓢撈獨馬氏得而吞之若有感遂有妊面生玄玄生時有光照室使人筮占占者奇之故小名靈寶桓溫甚重愛之臨終立以為嗣時年五歲桓沖立為南郡公
