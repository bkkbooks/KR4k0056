body:
  text: 第三三八回熾磐乘虛執虎台甲寅十年五月秦廣平公姚弼有寵于秦王興言無不從然左右掌機要者皆其黨也仆射梁喜等言於興曰父子之際人所難言然君臣之義不薄于父子故臣等不敢默然廣平公弼潛有奪嫡之志陛下寵之過也無賴之徒輻輳附之道路皆言陛下將有廢立之意信有之乎興曰豈有此耶喜曰苟無之則陛下愛弼者適所以禍之願遷其左右損其威權非特安弼乃所以安宗社也秦王興不應會興有疾弼乃潛聚衆將作亂將軍劉羌哭泣以告興梁喜等又復請誅弼不得已乃免弼尚書令還第姚宜入朝流涕上疏請斥散凶徒以絶禍端興皆不聽卻説唾契汗乙弗等謀反南涼南涼王傉檀欲討之孟愷諫曰今年飢饉未可輕動慰撫雜部足食繕兵待時而動傉檀不從謂太子曰蒙遜不能猝來熾磐兵少易禦汝謹守樂都吾不過一月即還矣乃率騎七千襲乙弗大破之未及還西秦王熾磐聞之率步騎二萬襲樂都虎台憑城拒守熾磐以兵四面攻之一夕而城自崩潰熾磐入樂都執徙虎台及其文武百姓一萬余戶於枹罕傉檀兄子樊尼馳走以告傉檀傉檀將士聞亂各皆逃散惟樊尼不去傉檀曰四海之廣無所棲身與其聚而同死不若分而獲全汝吾長兄之子也宗部之所寄蒙遜方招懷士民存亡繼絶汝其從之必納為孝矣吾所適不容寧見妻子而死於是樊尼遂歸降於熾磐只有難陰利鹿從之傉檀謂曰吾之親屬皆散卿何獨留利鹿對曰臣有老母在家非不思歸然委質為臣忠孝之道難以兩全臣不才不能為陛下泣血而求救於鄰國敢離左右乎於是君臣對泣時傉檀諸城皆降於熾磐獨尉賢政屯浩文明亹固守不下熾磐使人謂之曰樂都已潰卿之妻子皆在吾所獨守一城將何為也賢政等答曰吾受涼王厚恩為國藩屏雖知樂都已陷妻子成擒不知主上存亡不敢歸命妻子小事焉能動心若貪一時之利而忘委付之重者大王亦安用之於是熾磐乃遣虎台以手書諭之賢政賢政乃謂虎台曰汝為儲嗣不能盡節面縛於人棄父忘君墮萬世之業賢臣義士豈效汝乎傉檀至左南無處棲身乃降於熾磐熾磐聞傉檀至遣使郊迎待以上賓之禮以為丞相歲餘鴆之並殺虎台復稱秦王置百官南涼自烏孤至傉檀共三世凡十九年至此而終八月魏王嗣遣謁者於什門使于燕誡其勿辱君命什門去至和龍不肯入見曰大魏皇帝有詔須馮王出受然後敢入燕王馮跋不出使人牽其手逼令其入什門入不拜跋使人按其項什門曰馮君若拜受詔則吾自以賓主之禮相見何苦見逼耶馮跋大怒幽執什門欲其降之什門終不屈之衣冠敝壞略盡蟣虱被體馮跋遺之衣冠什門不受九月晉荊雍都督司馬休之頗得江漢民心子譙王文思在建康性凶暴好通輕俠劉裕惡之有司奏文思擅殺國吏詔誅其黨而宥文思司馬休之聞之使人上疏謝罪請解所任裕不許而執文思送之只令其自訓勵欲使殺之休之但上表廢文思以書陳謝裕不悅使江州刺史孟懷玉兼督豫章六郡以備之
