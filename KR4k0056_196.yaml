body:
  text: 第一九三回漢修宮廷殺仆射翔歸燕呈上璽綬百官朝賀皓大悅燕王皓既受封為王乃以子恪為度遼將軍率一萬五千人去鎮平郭恪既受命至鎮撫舊懷新屢破高麗之兵高麗畏之不敢入境自此邊地安然民皆樂業卻説成王壽初以儉約寬惠得蜀人心服李閡還盛稱説鄴中繁庶宮殿裝飾又言趙王虎以刑殺禦下故能控制境內壽慕之亦大修宮室人有小過輒殺以立威當仆射蔡興李録諫之皆坐直諫而死因是民疲於賦役思亂者衆矣
