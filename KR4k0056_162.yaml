body:
  text: 第一五九回戴洋風角占神通卻説司徒王導有疾經月不愈長史李仁視導疾因説曰近聞長城有一人姓戴名洋字國流年十二遇疾死五日而蘇説死時天使其為凡藏吏授符録給吏從幡麾將上蓬萊昆侖積石大室恆廬衡等山既而遣歸逢一父老謂之曰汝後當得道為貴人所識及長遂善風角為人短陋而朴野妙解占候蔔數無不應驗天下人人敬之如神司徒何不使人召來問蔔吉凶導曰既有此人煩卿召來於是李仁去請戴洋來見王導參拜畢導問疾之因洋對曰君侯本命在申金為土使之王而為申石頭空治火光照天要為金火相燦水火相煎以故受疾耳若能遷喬病即瘥耳導移居東府病果瘥重賞洋卻説後趙王勒遣將軍石生率衆三萬寇掠河南青州刺史李矩潁川太守郭默引兵拒戰數敗於生矩默乃使人持書降于趙趙王曜使劉嶽呼延謨率兵五萬圍石生於金鏞城石生被困遣人回襄國求救後趙王勒又使石虎率二萬精騎求救石生值虎兵至金鏞與劉嶽交鋒大戰五十余合劉嶽大敗而退呼延謨又出戰不十合被虎斬之趙王曜聞呼延謨被殺自率精兵二萬前來救應與虎交戰未上三合曜軍無故而潰曜亦敗走遂居長安劉嶽被石虎執而殺之趙王曜因此忿怒成疾郭默南奔建康李矩亦率衆南歸卒于魯陽於是青豫徐兗之地咸皆入于後趙以淮為境矣卻説代王賀傉始執國政以諸部多未服乃築城於東木根山徙居之
