body:
  text: 第二四六回姚萇以兵下涼州丙子太元元年是歲北涼亡卻説張天錫初殺其侄張玄靚自立為涼王改元鳳凰天錫在位荒於酒色不親庶務黜世子大懷而立嬖妾之子大豫人情憤怨秦王堅以天錫臣道未純遣將軍姚萇梁熙等將兵臨西河尚書郎梁殊曰未可動兵可先使人征其來京如不朝方可討之於是堅使梁殊奉詔征之曰如有違命即進師撲討梁殊至姑臧天錫會官屬謀之官屬皆怒曰吾世事晉國忠節著於海內今一旦委身賊廷醜莫大焉且河西天險若悉境內精兵右招西域北引胸奴以拒之何遽知其不捷也天錫攘袂大言曰孤意決矣言降者斬乃謂秦使梁殊曰君欲生歸乎死歸乎殊曰君先降秦秦王遣吾征君君不去莫道殺吾其不久且自將殺耳辭氣不屈天錫怒曰殺之其母嚴氏泣曰秦王橫制天下兵不留行汝若降之猶可延數年之命今既抗衡又殺其使者亡無日矣天錫使將軍馬建率衆二萬拒秦三月秦王堅聞天錫殺其使以姚萇為揚武將軍將兵五萬前來伐涼史説姚萇字景茂乃弋仲二十四子也其兄死了恐孤不能立乃率諸弟降于苻生苻生被殺苻堅代位甚親寵萇故使其伐涼令其立功此時姚萇荀萇二將領兵直至涼州逼城下寨時涼王張天錫方飲酒聞秦兵攻城驚得面如土色左右曰今秦兵甚強難以拒敵不如早降以安百姓天錫於是令四門立起降字旗錫引諸官開城門面縛至姚萇寨中投降姚萇大喜置酒相待次日領衆入城百姓耆老香花迎接姚萇以善言撫慰天錫命左右殺牛宰馬犒勞秦軍一面使人以金寶名馬進貢入秦來降秦王堅聞涼王來降受其寶物頒詔封錫為歸義侯抽回姚萇等三軍人馬俱各還秦
