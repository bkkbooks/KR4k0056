body:
  text: 第八十六回彜指王導管夷吾卻説司徒掾周顗字伯仁乃安東將軍周俊之子也因洛陽陷晉帝被虜秦王西行聞琅邪王睿招賢乃來江東投之是日睿正與王導等文武同議興復之事忽門吏報司徒掾周顗來投王即令請入顗即入府堂拜見琅邪王曰臣為帝被北虜故來投依殿下同謀恢復睿大喜曰吾正商議起兵今得卿來戮力其事成矣言訖以顗為軍咨祭酒前軍騎都尉言未畢門吏入報譙國桓彜來投睿命人拜見訖睿以為安東將軍桓彜字茂叔性通朗早獲盛名亦因避亂投奔見睿微弱心中憂懼不樂而謂周顗曰我以中州多故來此求全今見主上單弱如此將何以濟正論間忽見王導勸琅邪王曰殿下謀興復之計宜用賢人君子與之圖事荊揚晏安戶口殷實為政務在清靜克己勵節匡主邦寧於是情好日隆朝野傾心天下可圖大業必成矣睿從容謂導曰卿乃吾之蕭何也於是號王導為仲父加為輔國將軍導又上箋曰今者臨郡不問賢愚豪賤皆加號輒有鼓蓋動見相準時有不得者或為恥辱天宮混雜朝野頽毀導忝荷重任不能崇浚山海而開創亂源叨竊名位取紊彜典謹送還鼓蓋崇重典物請從導始庶令雅俗區別群無惑矣睿觀之曰從卿所雲須臾又上言十數條皆立國安邦之策桓彜見其言大喜復謂周顗曰向見管夷吾無復憂矣次日琅邪王作新亭始成大排筵席會集諸多賢士同飲至晚又命設燈燭來飲至半醉忽司徒周凱舉杯欷歔而言曰風景不殊舉目有江河之異言訖潸然淚下諸名士曰足下何故發悲
