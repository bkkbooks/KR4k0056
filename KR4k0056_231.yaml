body:
  text: 第二二八回晉哀帝登龍即位五月晉穆帝因疾而崩時年十九而無嗣在位十七年廟號孝宗百官舉哀葬于永平陵是時孝宗無子群臣立成帝子琅玡王司馬丕為皇帝立皇后王氏尊何太后為穆皇后改元隆和卻説哀帝名丕字千齡成帝長子初封為琅玡王及穆帝崩無嗣大臣迎丕立之在位四年改元者二曰隆和及興寧史説中書侍郎范寧字武子少博學多所通覽時以浮虛相標儒雅日潛寧以為其源始于王弼何晏二人之罪深於桀紂寧乃著論非之曰王何蔑棄典文幽沈仁義遊辭浮説波蕩後生使縉紳之徒翻然改轍以至禮壞樂崩中原傾覆遺風餘俗至今為患桀紂縱暴一時適足以喪身覆國為後世戒豈能回百姓之視聽哉故吾以為一世之禍輕歷代之患重自喪其惡小迷衆之罪大也是以人皆以此論貶之太過吾觀貶之宜也十二月秦王苻堅下詔命牧伯守宰各舉孝悌廉直文學政事察其所舉得人者賞之非其人者罪由是人人莫敢妄舉而請托不行當是之時內外文官率皆稱職田疇修辟倉庫充實道不拾遺盜賊屏息因是鳳凰集于東闕秦王苻堅大喜平旦召王猛苻融入露臺悉屏去左右密議大赦境內王猛苻融親送紙筆秦王堅自為赦文正持筆間忽有一大蒼蠅自穿牖孔而入鳴聲甚大集於筆端堅驅之復來忽然去之秦王堅在內為赦文俄而長安城中街上有一黑衣小兒大叫曰今日官家大赦天下須臾小兒去了因此街巷市里人人相告曰官家有赦境內由是喧哄有司聞知入朝奏請聞赦何事秦王堅大驚謂融猛曰孤與卿議於禁中又無屬垣之耳事從何泄也遂問群臣曰其聞赦事何處得來群臣奏曰長安城中士民在城中傳説官家有赦不知何人先説也猛奏曰可令武士出朝門外執城中百姓入來問之必知端的秦王堅曰卿言是也堅即使武士出去捉之不一時武士擁得老者四五人至殿下秦王堅問百姓曰誰人説道朕有赦出你可從實説來老者咸曰有一小人衣黑衣大呼於市曰今官家有大赦須臾不見堅知神泄其事於是遣老者還秦王堅即遣使頒書大赦境內時秦王堅謂群臣王猛等歎曰其向蒼蠅身狀非常吾固惡之諺曰欲人弗知莫若勿為聲無細而弗聞事未形而必著者此之謂也於是秦王堅命廣修學宮集郡國學生通一經以上充之公卿以下子孫並遣入學受業其有學為通儒才堪幹事清修廉直孝悌力田者皆旌表之於是天下號秦多士壬戌隆和元年正月征西大將軍桓溫與長史孟嘉等議曰吾欲威振朝廷群臣不服何計可施嘉曰為明公計可上表詐請遷都洛陽以試之朝廷若從公請不待立威而群臣自服若不允百官逆異於公正如昔日指鹿為馬以察百官也溫曰其計大善次日使人入朝上疏曰江東自先帝立今六十餘年氣數已衰落矣洛陽舊都乃霸業之所士民思之已久請皇帝陛下與百僚俱各促裝治日北徙洛陽以實河南都之則中原指日可得矣卻説晉哀帝得桓溫疏讀訖大驚謂群臣曰今大將軍桓溫主意遷都其事若何時群臣皆懼溫勢不敢言異人情疑懼雖知不可莫敢先諫惟有散騎常侍孫綽上疏曰昔中宗龍飛惟信順協於天人實賴萬里長江畫而守之耳今自喪亂以來六十餘年河洛丘墟函夏蕭條士民播流江表已經數世存者老子長孫亡者丘隴成行雖北風之思感其素心目前之憂實為交切植根外數十年矣一朝頓欲拔之驅蹴於空荒之地瞻望萬里逾險浮深離墳墓棄祖業田宅不可復售舟車無從而得舍安樂之國適他鄉國家所宜深慮也晉帝覽疏猶豫當散騎常侍王述曰陛下休憂桓溫欲以虛聲威振朝廷耳非實事也但從之自無事矣於是遣使人去回説從之治吉起行卻説使人既還報于桓溫曰帝與群臣皆樂從之聽將軍之請願遷洛陽溫大悅問孟嘉曰先生計果奇百官不敢拒意而今朝廷要遷洛陽倘若遷之則秦燕乘此起兵而國家亂我等事務未備事皆危矣嘉曰此事易耳將軍可復使人入朝再奏曰遷之宜矣而關中殘破宜先使人修理若移洛陽鍾虡權且暫停候再擇期於是溫從之復使人入朝奏知其事暫且停止晉帝遂問常侍王述日其事若何計議回之王述曰臣自作書回復無勞聖意於是王述領使人出朝歸第作書與使帶回去復桓溫桓溫得書開讀曰永嘉不兢暫都江左方當蕩平區宇旋軫舊京若其不爾宜改遷園陵不應先事鍾虡桓溫讀畢謂衆曰朝廷大臣明知不可而懼我莫敢言之既如此權罷遷都暫且停止
