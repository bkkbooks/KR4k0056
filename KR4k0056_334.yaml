body:
  text: 第三三一回惠度計迎斬盧循卻説交州刺史杜惠度聞知盧循失番禺引兵來交州心生一計密令部將宋喜以五百人各帶刀斧埋伏城外飛雲寺內聽擊盞為號追斬盧循宋喜得令依計前去埋伏訖又令偏將季本引兵三千去寺後山谷埋伏以炮為號接應殺賊季本得令亦去埋伏了惠度自己領著一百餘人牽羊攜酒前來一百裏外詐作迎接盧循盧循見探馬報説交州刺史杜惠度以羊酒前來降接循喚到馬前恐其是計不敢下馬見惠度拜伏在地十分殷勤方急下馬相見惠度言曰大王名震天下與百姓除殘誰不仰慕今罹小難後必大興杜某遭劉裕執權久任不遷吾意欲叛恨無盟主今得大王車駕來臨聚義必成循亦曰將軍肯相輔助取得晉朝天下與公平分子孫同榮言訖惠度呈上羊酒禮物循虛推受了二人並馬而行行了一日來到飛雲寺前惠度下馬請曰今日已晚到城還有三十余裏權在飛雲寺內安歇來日進城循曰可於是循令衆將兵屯在寺外自領親屬一百餘人人寺中安歇循到寺內衆僧百餘人鳴鍾擊鼓出來迎接及入方丈裏上坐定衆僧磕頭出外惠度令安排筵席進來惠度親自把盞下禮相陪勸得盧循父子數人大醉惠度擊破玉盞須臾宋喜引刀斧手五百人搶入方丈內將盧嘏盧循父子並家屬一百余人皆斬取其首級已了就內放起炮來寺後季本引伏兵殺出寺前賊兵睡著那裏得知卻被伏兵將賊兵一千餘人盡皆坑之不留一人惠度至次日平明方鳴金收軍回入交州以牛酒賞賜軍士令人將盧循並家屬首級一百餘人送建康送與晉帝請功卻説晉帝設朝文武班齊近臣奏曰交州刺史杜惠度斬盧循父子並家屬一百余口將首級遣人送來請功今使臣在午門之外未敢擅進晉帝聞奏命使臣回去將循父子首級號令四門旨出號令訖忽荊州刺史劉道規使舍人上表稱疾求歸致仕帝披覽畢以表示問諸臣諸臣上言曰竊見劉道規為吏清正德及於民遠近莫不瞻仰今雖微疾不可放其回裏帝聽之不從其請初劉毅任京口貧困與知識射於東堂司徒長史瘐悅命仆挑酒肴與朋友後至奪其處乘涼而飲衆皆避之毅獨不去見悅廚饌甚盛不以及毅毅從悅求子鵝炙又不與至悅為江州刺史毅懷前恨因求兼督江州詔許之毅即奏交州內地以治民為職不當置軍府耗民力宜罷軍府移鎮豫章惟潯陽接蠻可即州府千兵以助郡戍於是解悅都督徙悅鎮豫章而以親將趙恢守潯陽悅府文武三千悉人毅府符攝嚴峻悅至豫章忿恨卒
