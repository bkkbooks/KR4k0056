body:
  text: 第三一六回勃勃封尸髑髏台三年卻説赫連勃勃魁岸美風儀性辨慧秦王興見而奇之與論大事寵遇逾於勳舊興弟雍曰勃勃不可近近則噬人也興曰勃勃有濟世之才吾方與之平天下奈何逆忌之言訖乃以為將軍使助沒奕幹鎮高平伺魏間隙雍固爭曰勃勃乃貪猾不仁輕為去就恐終為邊患興乃止久之竟配以雜虜二萬餘落使鎮朔方會魏王圭歸所虜秦將于秦興歸賀狄幹以報之勃勃大怒遂謀叛秦柔然獻馬于秦勃勃掠取之襲殺沒奕幹而並其衆自為夏後氏之苗裔稱大夏天王置百官卻説勃勃本姓劉衛辰之子改姓赫連是胸奴右賢王去卑之後劉元海之族也被魏所滅降秦而叛自為天王也時夏王勃勃共破三部降其衆以萬數進攻秦之三城以北諸戍斬秦將楊丞姚石生等諸將皆曰陛下欲經營關中宜先固其根本使人心有所憑系高平險固饒沃可以定都勃勃曰吾大業草創姚興亦一時之雄未可圖也今專固一城彼必並力於我亡可立待不如以驍騎風馳出其不意救前則擊後救後則擊前使彼疲於奔命我則遊食自若不及十年嶺北河東盡為我有待興既死嗣子暗弱徐取長安在吾計中矣於是侵掠嶺北諸城秦王興乃歎曰吾不用黃藐之言以至於此而勃勃求婚于南涼傉檀不許勃勃大怒率騎三萬擊破傉檀傉檀敗走文臣武將死者十有六七勃勃使人搬積其尸而封之號曰髑髏台雲是辱傉檀也卻説南燕王超母妻猶在秦遣封愷使于秦求母與妻還之秦王興謂愷曰昔苻氏太樂諸伎悉入于燕燕今稱藩若送伎即送還其母妻乃可得也愷以是言還燕報於超超與群臣議之段暉曰陛下嗣守社稷不宜以私親之故遂降尊號但太樂先代遺者不可與也不如掠吳口與之張華曰侵掠鄰國兵連禍結非國家之福也陛下慈親在人掌握豈可顧惜虛名不為之屈乎於是超乃使韓范聘於秦稱藩奉表于秦秦使韋宗報聘張華請北面受封暉曰燕七聖重光奈何一旦為豎子屈節超曰吾為太后屈願諸君勿復言遂北面受詔又使華獻太樂伎一百二十人於秦秦王興乃還超之母妻厚其資禮而遣之於是超得母還國而養之
