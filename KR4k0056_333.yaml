body:
  text: 第三三回盧循敗回取番禺卻説盧循敗後星夜走回番禺至始興始知孫處先攻破番禹及父引家屬逃在始興心中大驚即領諸將佐入城見父哭説敗兵之事及問番禺如何失了被賊所陷父嘏説孫處詐稱渠帥韓焰道你攻破建康令他前來迎接家屬因此諸隘守將信之不提防他直至城下叫開城門殺了守城軍吏比及知時措手不及我只得領家屬從後門逃出奔此安身待你回來商議目今孫處孤軍守番禺民衆不附甚是易攻不如收殘兵再復其城方可聚衆前去報仇也循曰既然如此可速進兵於是循即領諸將殘兵連更帶夜殺奔番禺直至城下屯營卻説孫處正坐府堂忽有探馬來報説盧循敗回引殘兵來取番禺目今兵屯城下孫處聞知其事急喚部將至從耳邊道計如此如此諸將得計而出便傳令衆軍五更造飯平明大小三軍人馬盡皆出城城上要處虛插旌旗遙張聲勢軍分三門而出只留陳矯部一千兵守城傳令訖諸將各個遵令而行至次日卻説盧循自陳兵於番禺城周邊住當日晉兵分著三門而出循即自上將台看時但見城上牆邊都是虛插旌旗無人守護又見軍士腰下各束包袱盧循心中暗忖晉兵必是預先準備走路遂下將台傳令兩軍分為左右兩翼如前後得勝盡力追趕直待鳴金方許退步就令韓焰領著後軍吾親自取城當日對陳鼓聲大振孫處出馬在陳前搦戰循自至門旗下揮鞭指問誰人向前一將應聲出馬乃韓焰也與孫處交鋒戰到二十餘合處乃敗走孫仁拍馬向前大呼姓名搦盧循來戰循不出乃使周恭出馬與仁戰上十餘合仁又敗走陳勢大亂後軍先退孫處孫仁兄弟二人押後盧循指點兩翼軍沖出晉兵佯為大敗而走盧循自率大軍追趕至番禺城下晉軍皆不入城都望西北而走韓焰周恭引前部徑趕盧循見番禺城門大開城上又無軍馬指點衆軍搶城數十騎當先而進盧循在後加鞭縱馬而入到甕城道邊城上敵樓上陳矯張見盧循親自先入暗暗喝彩道孫將軍妙算言訖打一聲梆子響處兩邊弓弩齊發箭如雨下爭先入門的都跌落陷馬坑去盧循急勒馬回一弩箭正射中右臂循乃翻身落馬晉兵即從門內殺出來奔盧循循卻得衆軍將死命救出去了城中軍士突出賊兵自相踐踏落塹填坑者無數循急令鳴金收軍孫處引三路兵殺得賊兵皆棄戈大敗而走走至一百余裏方且屯住收其敗兵南走交州去訖孫處亦迫百里方歸番禺屯扎卻説徐道覆被劉道規殺敗走屯湓口數月聞循敗走始興乃引衆亦來始興見盧循時循已去番禺因此只在始興屯住而已卻説兗州刺史劉藩聞徐道覆據始興乃與偏將盂懷玉部兵一萬來取始興兵至離城一百里下寨次日召孟懷玉及諸將至密授與計諸將依計各自出寨準備而行行不數十裏徐道覆探知其來亦引兵至正相遇著兩下各自排成陳勢始完了徐道覆出馬手提大刀厲聲高叫叛國之賊焉敢侵吾境界對陳中一簇黃旗而出旗幟分開有一輛四輪車車中端坐一人頭戴銀盔身披金甲手執羽扇用扇招道覆曰吾乃兗州刺史劉藩也燕王百萬之衆被吾略施小計克復燕京今來招安汝等何故不早降徐道覆大笑曰廣固鏖兵乃劉裕之謀也于汝何事今來欺吾言罷輪刀徑殺過來劉藩故作急回車望陳中走陳門復閉道覆徑沖過來陳勢忽分兩下而走道覆遙望中央一簇黃旗料是劉藩只望黃旗而追轉過山腳黃旗扎住忽然分開中央不見四輪車一員將挺矛躍馬直取道覆大呼曰吾乃燕人孟懷玉賊將休走道覆掄刀來迎戰不數合氣力不加撥回馬走懷玉從後趕來喊聲大舉兩下兵將復合道覆沖出前面一軍截住去路道覆措手不及驚慌落馬被擒當下懷玉拿來寨中見劉藩藩坐帳中見推道覆至喝令推出斬訖將首級號令軍門領兵入城出榜安民撥兵守禦自引諸將復回兗州鎮守更説晉自中興以來朝綱弛紊權門兼併百姓流離則不能系其産業桓玄頗欲釐改竟不能行既而劉裕作輔大示軌則豪強肅然遠近禁止由是黎庶僅俱綏靖
