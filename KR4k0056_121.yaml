body:
  text: 第一一八回元帝頒詔赦天下卻説晉中宗元皇帝司馬睿字景文乃宣帝曾孫琅玡王司馬覲之子初為安東將軍因湣帝被偽漢劉聰所弒諸將固勸乃即大位於建康國號東晉改元建武元年在位十六年壽四十六昔魏文帝篡漢任司馬氏為相世執魏政魏明帝時寶石負圖有石馬七乃犧牛之像時又有牛繼馬後之謠按司馬懿啓封于晉至湣帝方及七代應七馬數也懷湣二帝值五胡亂華為賊劉聰所虜帝乃琅玡王也同西陽王羕等五王渡江來父老裹糧而歸之遂據地建康而為都焉是為東晉元帝時有五馬浮渡江一馬化為龍之説其帝實非司馬氏也乃琅玡秦王妃夏侯氏因與小吏牛金私通所生而冒司馬姓實牛姓是也是應牛繼馬後之讖也元帝既即大位乃赦天下其餘文武增一等帝與文武商議欲賜諸吏投刺勸進者加位二等民投刺者皆除吏凡二十余萬人散騎常侍熊遠曰陛下應天繼統率土歸戴豈獨近者情重遠者輕不若依漢法遍賜天下恩爵以為普晉且可以息檢竅之煩塞巧偽之端也帝不從群臣又請更立太子司馬紹為皇太子帝從之紹仁孝喜文辭好武藝且好賢禮士容受規諫與庾亮溫嶠等為布衣之交亮豐格峻整善談老莊帝器重之庾亮妹為紹妃使亮侍講東宮帝好刑名家以韓非書賜太子紹亮諫曰申韓刻薄傷化不足法聖心太子納之史説劉隗字大連彭城人少有文翰因避亂渡江帝以為從事中郎帝既即位委以重任深器重之時廬江太守梁龕明日該除婦服今日請客奏伎當丞相長史周顗等數十餘人知龕有喪服未滿而宴會非禮乃會劉隗入見元帝奏梁龕慢服之愆因上曰夫嫡妻長子皆期杖居廬故周景王有三年之喪既除而宴古訓猶在況龕匹夫暮飲朝除慢服之愆宜肅紀律請免龕之官帝納之減龕俸一月於是群臣無不憚之
