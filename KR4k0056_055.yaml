body:
  text: 第五十三回王浚起兵討司馬穎卻説東海王越用孫惠計遣人結連幽州都督王浚及荊州刺史及其弟東贏公司馬騰等各起兵討穎二人得越檄俱各募兵候應先是齊王冏成都王穎河間王顒募兵共討趙王倫時王浚擁衆挾兩端所部士民不得赴三王召募顒深恨之欲圖害不克至是又詐稱詔征浚入鄴來害之浚已料知乃遂遣人會鮮卑段務勿塵烏桓羯末及荊州刺史東贏公騰同起兵二十余萬前來討穎卻説穎在鄴人報王浚結連烏桓國王及鮮卑段務等起大軍前來攻鄴都可作急拒敵穎急聚文武議事時王戎上言曰烏桓鮮卑不可輕敵只宜求和穎問衆謀士曰戰和二者孰利石超曰浚等無用之輩耳何必求和戎曰將軍錯矣吾觀王浚任用賢才更兼士廣兵強田許乃智謀之士也為之謀主沈逢以為忠臣也任其軍事貢良宋醜勇冠三軍何以為無用之人也石超笑曰公知其一未知其二浚兵中立法不整田堅剛而犯上田許貪而不治沈已專而無謀逢紀果而無用其勢不相容必生內變貢良宋醜匹夫之勇一戰而可擒矣其餘碌碌等輩縱有數百何足道哉是以知王浚無用矣戎默然穎曰皆不出石君之所料耳喚前後兩軍官聽令差前將軍劉代後將軍田忠領兵五萬打吾旗號出北路防王浚當吩咐田忠不可輕進吾自引十萬大軍出城拒敵待我殺退方勒兵來破王浚劉代田忠領兵去了卻説穎領兵離都兩軍隔八十裏各深溝高壘以守之次日穎遣石超領兵五萬去擊王浚超得令領衆即行八月穎恨東安王司馬繇前令其迎帝請罪之言乃命人執繇斬之繇兄子琅邪王司馬睿沈敏有度量現為左將軍與東海參軍王導善導識量清遠以朝廷多故每勸睿之國及繇被殺時睿從帝在鄴恐禍及己自將逃歸穎先敕關津但有貴宦過者無得放出睿私逃至河陽為津吏所獲從者宋典自後來以鞭佯拂睿而笑曰令長官禁庶人汝亦被拘耶吏被詐以為果是庶民聽其去之於是睿與宋典以計瞞守吏得至洛陽迎太妃夏侯氏歸國去訖張方勒兵復入京城廢皇后羊氏並皇太子覃而自守之卻説惠帝在鄴城以公府為宮室一日穎聞五部寇邊即入內伏地奏曰今朔方胸奴之外五部數十余國不服王化屢屢虜掠邊境殺害軍民今有劉淵者乃胸奴冒頓之後漢朝之甥兒為冠軍將軍有次子劉聰驍勇絶人博涉經史又善屬文能彎二百斤弓文武皆通現為精弩將軍此父子二人有萬夫不當之勇可封他為左賢王令其總攝諸部則五部不敢再犯矣望陛下聖鑒帝從之當群臣議曰不可彼夷狄之人人面獸心見利則棄君親臨財則忘仁義投之遐遠猶懼外侵處於封畿窺我中隙昔幽後不綱胡塵暗于戲水襄王失禦戎馬生於關洛至於示強弱少兵權體興衰知利害于我中華未可量也況元海乃人傑必致青雲之上聰以殊才不居庸劣之下今委之以兵令之歸國有若策馬鴻騫乘機豹變非為我用乃為我患也以臣等鄙見實為不可司馬穎曰日今東贏公騰二子為亂況且朝廷兵衰將老若不重用此人去敵誰人能討二子耶惠帝曰卿宜從便而行不必再議既如此即以劉淵為左賢王令其統領諸部言訖穎謝恩即宣劉淵至封為左賢王淵即謝恩出朝群臣曰亂天下者此人也珠簾放下文武退班
