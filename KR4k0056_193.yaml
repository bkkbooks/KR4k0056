body:
  text: 第一九回趙人入寇陷沔邾九月趙王虎將軍夔安率兵七萬來攻沔南及邾城初陶侃在武昌議者以江北有邾城宜分戍之侃每不答而言者不已侃乃度木橋引將佐語之曰我所以當寇者長江耳邾城隔在江北內無所倚外接群夷夷中利深晉人貪利夷不堪命必引虜入寇此乃致禍之由也若羯虜有可乘之會又不資於此矣衆服其言至是庾亮欲伐趙使毛寶樊峻戍之虎果然使夔安等將兵來攻毛寶使將陳忠五人率兵五千出拒兵至江北岸畔忽見塵頭起處一軍阻住為頭首將夔安挺槍拍馬而出與陳忠並不打話互相交戰三十餘合不分勝敗忽聞東南角上喊聲大振桃豹引兵衝突而來忠急分兵不及又與雄一軍沖橫而來忠與四人共五將竭力死戰不能抵擋大敗而逃忠同五將被二路軍馬包圍而來皆被殺死餘兵無主俱皆逃走二人得勝將二萬輕騎來攻邾城毛寶聞前軍已陷不敢出戰急遣人求救於庾亮亮不即時遣兵去救因此被安等攻陷邾城毛寶樊峻二人突圍出城趙兵後追前無船渡皆赴江而死夔安既陷邾城率衆進寇江夏義陽二城皆降安等又進圍石城竟陵太守李陽以兵七千人拒敵大敗而退時庾亮猶欲遷鎮聞邾城陷乃止卻説趙王室貴戚豪恣石虎患之知李矩忠直不懼豪惡虎擢矩為禦史中丞由是內外肅然虎口朕聞良臣如猛虎高步曠野而豺豹避路今得中丞信然十月卻説燕王皓自以稱王未受晉命遂使長史劉翔來建康獻捷論功且言權假王位之意更請刻期大舉共平中原晉帝從之時慕容皓又遣慕容恪慕容霸擊宇文部霸年十三勇冠三軍所向無敵丁亥六年正月司空庾亮疾篤召弟庚翼至臥所囑之曰吾曆官至司空人臣之位極矣汝於吾死之後善事主上勿生異心負吾清名也此權今交付於汝其柄不可移於他人自取禍也言訖而卒史説庾翼字稚恭乃庾亮弟也豐儀秀逸少有經綸大略因是庾亮臨死以權付彼翼既代亮率領其衆舉哀收殮殯葬于武昌定金山此時友人何充聞知亮死已葬欷歔歎曰埋玉樹於地中使人情何能已庾亮既死成帝即以何充為中書令庾翼都督江荊等州事時人疑翼年老不能繼其兄翼乃悉心為治戍政嚴明數年之間公私充實皆稱其才卻説慕容翰自密雲山外人宇文部降於逸豆歸豆歸忌翰才名欲害之翰佯狂乞食舉國賤之不復省録以故得往來自由山川形便皆默記之時燕王朝以翰因猜嫌出奔雖在他國常潛為燕計乃使商人王車通市于宇文部因而得入宇文部見翰稱説燕王使車迎殿下歸國翰與王車遂竊逸豆歸名馬攜其二子逃歸皓大喜厚遇之翰亦無二志矣三月卻説趙王虎遣使遺漢王壽書欲連兵入寇于晉共分江南壽大喜即回書賞使約定大舉使使去了壽集舟師大閲于成都龔壯諫曰陛下與胡通孰若與晉通胡豹狼也既滅晉不得不北面事之若與爭天下則強弱不敵危亡之勢也群臣亦皆叩頭泣諫壽乃止壯以為人之行莫大于忠孝既報叔父之仇又欲使壽仕晉壽不從乃詐稱病龔壯遂辭歸以文籍自娛終身不復到成都矣
