body:
  text: 第二一回石鑒殺遵而自立昔趙王遵之發李城也謂石閔曰汝努力事成獲大位以汝為太子既定而立衍為太子閔猶未免為恨而閔素驍勇屢立戰功既總內外兵權乃撫循殿中將士中書令孟準勸遵誅之先除後患遵見閔權重眼前無與計者密召義陽王石鑒等入宮與鄭太后前同商議誅閔太后曰不可石閔屢有大功國之所賴更兼未有過惡若誅之晉燕必來幹境遵猶豫令鑒且退容再計議石閔聞遵召鑒入宮乃自詣宮外等候鑒果出閔問主上與君議何事鑒不敢瞞以實告閔閔大怒曰吾以德立汝汝以怨報我即歸第使人召李農至謂曰今主上無道欲殺我與卿吾欲廢立請卿議之農曰明公何得其語耶閔曰今日主上召義陽王入宮議欲誅我及卿義陽王告我農曰經目之事猶恐末真背後之言豈足深信明公息怒容某試問之閔曰其事是實不必去問農欲出閔劫之不與出第於是李農只得與閔同謀使將軍蘇彥周成率甲士五千人先入宮執趙王石遵及太子衍弒之後李農與石閔率百官入殿推義陽王石鑒即位鑒既登大位以石閔為大將軍李農為大司馬並録尚書事時遵在位一百八十日俄而被害卻説流民相率西歸路由枋頭經過聞蒲洪為趙王所廢其流民入推蒲洪為王洪納之於是洪威名大振衆至十數萬趙王鑒聞知懼其逼鄴與百官朝議以計之於是乃遣使以洪為雍州牧令其往鎮洪得鑒命會官屬議當主簿程朴謂曰使君權且與趙連和分境而治然後圖之洪怒曰吾不堪為天子耶引朴斬之不受趙命十二月卻説褚裒伐趙不克還至京口每聞哭聲甚多以問左右左右對曰皆代陂死者之家也裒慚憤發疾而卒僚佐奏聞朝廷褚後哀哭爾後朝廷以苟羡代監徐兗軍事羡時年二十八歲中興方伯未有如羡之年少者也
