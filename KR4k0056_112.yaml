body:
  text: 第一九回湣帝出降于劉曜漢劉曜既陷北地諸郡乃集大衆來攻長安時安定太守焦嵩新平太守竺恢引兵來救長安皆畏漢兵強盛不敢進兵相國司馬保使胡嵩以二萬人援長安至靈台正遇漢兵至兩下交鋒連戰五十餘合被嵩出奇兵沖陳漢兵大敗十傷其六劉曜不敢戀戰引衆沖入長安胡嵩既勝破曜之衆恐國復振則麴索二家勢盛乃引兵還槐裏坐觀勝敗劉曜引兵寇長安胡嵩如何不救觀其時借得龍泉劍將此姦臣不義碗劉曜聞胡嵩退去乃驅兵攻陷長安外城麴允索綝引軍退守小城內外斷絶城中飢甚百姓將士亡逃不可制惟涼州義衆千人守死不移太倉有麥數十斛允屑之為粥以進至是湣帝泣謂允曰今窮厄如此外無救援當忍恥出降以活士民因歎曰誤我者麴索二公也近臣奏曰長安軍民扶老攜幼哭聲振動天地各自逃生潰去目今兵微將寡難以迎敵若投降可保百姓言未了禦屏風後轉出一人乃湣帝八子甚封北地王帝生子九人皆懦惟甚自幼英氣過人時甚出殿前大喝曰偷生鼠輩豈妄議社稷大事自古豈有降天子哉可斬此人臣請出戰帝曰今大臣議皆可降汝仗血氣之勇欲令滿城流血耶甚曰此輩未嘗見其干預政事今妄起亂言甚非其理臣竊料長安之兵有數萬琅邪王全師皆在江南若有人去召必來解救內外夾攻可獲全勝豈聽鼠輩之言輕棄先君之基業乎帝叱之曰汝小兒豈識天時也甚叩頭大哭曰若理窮力極禍敗必至便當父子背城一戰同死社稷以報先君可也帝令拖下殿階甚叩頭大哭曰吾祖宗不容易得社稷一旦棄之吾寧死不降也湣帝庸才信淺謀不思守國欲降仇當時若聽太子語未必山河掃地休湣帝令推出宮門便作降書使侍中宗敞送降書於曜被索綝聞知潛留敞在府密使其子去説曜曰殿下若許索綝以車騎儀同萬戶郡公者請以城降曜即斬其子使人送之曰帝王之師以義行也孤將兵十五年未嘗以詭計取人必窮兵極勢然後取之今綝所言如此天下之惡逆也輒相為戮之綝大驚遂放敞見耀曜受之降次日湣帝乃乘羊車肉袒而縛銜璧輿櫬出降群臣號泣攀車帝亦悲不自勝禦史中丞吉朗歎曰吾智不能謀勇不能死何忍君臣相隨北面事賊虜乎言訖乃自殺帝亦哭與辛賓出東門謁大司馬曜軍前投降時耀知晉帝來降領兵入城至東門道主見湣帝與群臣伏道請降曜下馬扶起晉主令左右焚櫬受璧遷晉帝及公卿于其營令兵衛之自入長安屯扎三軍次日令中將軍李益送湣帝及公卿並庫藏寶貝玉璧來平陽見漢主聰聰大喜臨光極殿湣帝稽首於前麴允伏地慟哭聰大怒命囚之允大哭一場乃自殺聰歎悔不及以湣帝為光祿大夫封懷安候以劉曜為太宰假黃鉞督陝西諸軍事封秦王贈麴允車騎將軍溢節湣侯將索綝斬於市曹聰賜晉帝與公卿居館驛使軍衛之月給俸米史説先湣懷太子妃王氏乃太尉王衍之女也字惠風貞婉有志節先與湣懷太子為妻後太子既廢惠風與父王衍居于金墉其父王衍因太子廢請絶婚惠風不肯道忠臣不事二君烈女不嫁二夫即請乘輿號哭而歸為太子行行路人皆為之流涕稱其烈女其時漢劉曜既得長安又領兵來攻洛陽洛陽吏士軍民聞風奔潰無人守城劉曜入洛陽城盡收晉之宗室悉行誅戮因見王氏惠風有貌曜不忍殺之以惠風賜其部將喬屬為妻屬大喜拜謝領惠風歸帳命左右整備筵席要與成親因攜惠風手同坐風拔其所佩劍在手拒屬曰吾乃晉太尉公之女皇太子之妃生為晉婦死作晉鬼安肯從汝胡狗為妻言訖以劍刺喬屬喬屬大怒取左右利刃將風殺之可憐忠烈女到此一命休有詩歎曰晉亡宗室盡遭擒堪歎王妃貞烈行朝中徒有許多士豈及金墉一婦人幹氏寶曰晉之亡也樹立失權付託非人四維不張而苟且之政多也夫基廣則難傾根深則難拔理節則不亂膠結則不遷昔之有天下所以能長久用此道也今晉之興也創業立本固異於先代矣加以朝寡純德之人鄉乏不二之老風俗淫僻恥尚失所學者以莊老為宗而黜六經談者以虛蕩為辨而賤名檢持身者以放浪為道而狹節信進仕者以苟得為貴而鄙居正當官者以望空為高而笑勤恪是以劉頌屢言治道傅成每糾邪正皆謂之俗吏其倚仗虛曠依阿無心者皆名重海內禮法刑政於此大壞國之將亡本必先顛其此之謂乎故觀阮籍之行而覺禮教崩弛之由察庾純賈充之爭而見師尹之多辟考平吳之功而知將帥之不讓思郭欽之謀而寤戎狄之有釁聽傅玄劉毅之言而得百官之邪核傅鹹之奏錢神之論而知寵賂之彰民風國勢如此雖以中庸之君守文之主治之猶懼致亂況惠帝以放蕩之行臨之哉懷帝承亂得位羈以強臣湣帝奔播之後徒守虛名天下之勢既去非命世之雄才不能復以取之矣歷年圖曰武帝既遷魏祚席捲全吳續禹膺服恃其治安荒於酒色以開基之始不為遠圖崇尚浮華敗棄禮法惠帝昏愚不辨菽麥譬之萬金之寶棄之中衢無人守之安得不為他人有乎禍起于閨門成於宗室骨肉相殘胡羯氐羌鮮卑爭承其弊剖裂中原話齏醢生民積骸成丘流血成淵幾三百年豈不哀哉
