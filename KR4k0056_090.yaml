body:
  text: 第八十七回導指流涕似楚囚顗曰吾淚者為晉天下也今遭單于流毒中國殘害百姓吾等朝夕難保想晉先帝降吳滅蜀定有天下子孫相承數十餘年不想今日喪于單于聖主被虜不能復仇吾等欲舍此七尺無用之軀與胡人死戰雪恥誠恐孤力不加無益于國猶然發悲耳諸多舊臣名士皆掩面大哭座中一人愀然變色曰諸公所哭還能哭得胡兵退耶否也公等當共戮力王室克復神州何至作楚囚對泣耶衆視之乃仲父王導各收淚羞愧而言曰承君之言是也於是席散次日陳頵遣王導書曰中華所以頽敝者正以取才失所先名望而後實事浮競驅馳互相貢薦加有老莊之俗傾惑朝野養望者為弘雅政事者為俗夫人欲制遠先由近始今宜改章明賞信罰拔卓茂於密縣顯朱色於桐鄉然後大業可舉中興可冀耳王導覽之竟不能從
