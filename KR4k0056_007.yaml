body:
  text: 第七回拓跋力微霸長川卻説竇龍二人得力微回書撫掌大笑曰你原來今番中吾計策也即時遣甘宇為先鋒自與徐丁為二隊淩蒙為後隊共計五萬水陸並進望長川進發龍與虎二人自在船上時復歡笑將謂力微中計迤邐而行前軍已至川口龍虎叫問前面有人迎接否人報力微令王苻來見竇龍喚王苻入船中問勞軍如何王苻曰主公皆準備停當但錢糧陸續起運龍曰駙馬何在苻曰在長川城門外相待與大王把盞龍虎曰今為汝家事勞軍之禮休得輕意王苻領了言語先回去了竇虎將戰船密密排於河上依次而進看看至林安並不曾見有一隻船又無人迎接河面上靜蕩蕩的忽哨船回報長川城上插兩面白旗並不見一個人影竇龍二人並牽戰馬親自上岸跨馬帶徐丁甘宇一班兒軍官並虎賁千餘人徑往長川來到城邊不見動靜竇龍二人乃勒住馬令前軍大叫城上守門軍將曰誰在城上今有沒鹿回部竇龍二位大王親自在此請汝主駙馬相見忽一聲梆子響白旗倒處二面紅旗豎起城上軍人一齊排立刀槍敵樓上于龍出曰大王此行端的取北川如何竇龍等曰吾替汝王取北川相贈以為嫁奩之資于龍曰吾主人已知大王投餌釣鱗之計故使吾等安排軍馬守城大王休來竇龍聞知勒馬便回探馬報曰四路皆有埋伏軍馬一齊殺到關明從河陵殺來張因從豈居殺來黃由從河安殺來魏正從長川小路殺來四路正不知多少軍馬喊聲遠近振十餘裏皆言要捉二位大王竇龍二人大驚墜于馬下左右急救得扶起上馬時四面軍馬殺將攏來龍虎忙率軍馬拼死殺出那裏衝突得出四面軍馬擁至將龍虎二人殺訖餘兵無主各自潰去力微方始退陳鳴金收軍入城是日于龍張因二人獻竇龍兄弟首級力微令人收拾尸首一同葬於城東十五裏地內當力微既誅了竇龍兄弟乃議招軍招其部衆其諸部大人悉引衆前來降順因此得控弦之士二十余萬人次日諸部大人商議尊拓跋力微為神元皇帝總統部衆大封功臣至是知定襄之盛樂有天子之氣乃引諸部大人復遷都于盛樂城始起覬覦中原之志因遣太子沙漠汗入中原奉貢就使觀中原風土如何意欲吞併沙漠汗領父命帶名馬珠玉來中國不數月來到京都以金寶駿馬朝見晉武帝武帝大悅受其貢禮乃留沙漠汗在洛陽太學中讀書居歲餘沙漠汗思歸乃上殿奏曰父母在不遠遊遊些有方臣父母春秋已高乞回奉養武帝聞奏欲令人送其歸國當大臣衛瓘奏曰沙漠汗資質雄異不可遣歸恐為後患今若放他回去正如龍歸大海虎入深山將不可服矣不如留之使以金帛賂其國中諸部大人令其間諜神元使彼父子不親棄之不取此乃中華之福不然貽患後世矣武帝猶豫沙漠汗來屢上表要還武帝沈吟欲不放其歸胸奴方強恐其擾境欲放其還恐其有異見沙漠汗辭表情切只得多以金帛賜之用十分恩義結之遣人護送其還當沙漠太子得聖旨準放其還即忙入朝拜辭武帝次早登程行數月來至陰館城先遣人入國報父神元神元設位近臣奏曰太子沙漠汗先年入貢中國觀覘虛實今差人來報回國已至陰館神元大喜曰既太子歸國諸部大人可去陰館迎接諸部大人即出以酒饌來陰館迎接參拜太子訖各以酒把盞酒至半酣沙漠汗仰視空中忽有一隻飛鳥其時沙漠汗在中國帶得彈子在袖中便以左手拈弓右手搭彈望空中一放正中飛鳥頸子上死落在地時胸奴諸部大人不識彈子又不見羽箭以為沙漠汗空弓射得鳥落諸部大人俱各大驚皆以為神密相謂曰今太子入中國被服同南更兼有此奇術射不用箭他日神元萬歲後太子統國必然變易舊俗吾等必不得志亦難保善終矣不如先走入朝奏知萬歲説太子今回國臣等觀動靜必有二意更兼學得有奇術空弓射落飛鳥又帶南人而還臣恐太子篡位爭權變易舊俗國不得安諸部大人計議已定就辭太子沙漠汗先馳還內以前所議之計奏知神元神元大驚曰既如此當如之何諸部大人奏曰聖上更有賢子不若除之免其後患陛下不納臣盲諸部各散神元無奈因言當即除之於是諸部大人矯神元詔出朝將太子沙漠汗執下暴其罪曰太子沙漠汗奉晉數年不思還國事親今反帶南人而歸必有叛心此乃大不孝也今封鴆酒一壺黃羅五尺寶劍一口命其自盡沙漠汗聽見其詔大哭一場乃飲鴆酒而亡因此沙漠汗被害神元悔之乃命收葬諡曰文皇帝
