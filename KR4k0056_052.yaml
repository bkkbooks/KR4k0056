body:
  text: 第五十回劉沈死節于長安卻説司馬顒屯兵于鄭邑為東軍聲援忽聞劉沈兵起急退入長安乃使人召張方回軍方聞知掠洛中官私奴婢萬余人而回沈軍已渡渭水顒急領兵出城與沈交戰二十餘合顒兵大敗走入長安沈使衛博皇甫淡以精兵五千漏夜追襲顒兵大半入城衛博等混戰已入城門後軍未至顒將張輔見其後軍未至急令閉城門四下湧戰衛博皇甫淡獨力難敵措手不及被張輔所殺乃領得勝之兵出城正遇沈軍來輔勇為身先沈軍望後便退被輔麾兵一擊殺得沈軍十去其七各自潰散劉沈猶自死戰與張輔交鋒三十餘合寡不敵衆被輔獲之餘衆各自逃散卻説劉沈被輔所獲押至司馬顒帳前顒欲招其降劉沈謂顒曰知己之惠輕君臣之誼重沈不可違天子之詔量強弱以苟全投袂之日期之必死菹醢之戮其甘如薺顒大怒命左右斬之新平太守張光數為沈獲計攻顒顒使人執至詰之曰汝與劉沈設計攻我今日何如光曰雍州不用鄙計故令大王得有今日顒壯之乃表為右司馬不説張光歸順於顒且説成都王穎使張方以兵廢皇后羊氏並太子司馬覃于光城因此朝野失望民心騷動卻説廣陵度支陳敏及周圯以兵來攻石冰兵至建康冰猶未降以軍拒戰當日陳敏出馬與石冰相殺二人戰未十合東北周圯一彪人馬搶風殺來正欲分兵西南一路賀循一彪人馬先至軍前冰措手不及被陳敏衝突入陳斬之餘衆盡伏地而降於是揚徐二州平靜周圯賀循等皆散衆還家不言功賞朝廷以陳敏為謹陵相
