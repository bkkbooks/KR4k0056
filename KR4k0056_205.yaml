body:
  text: 第二二回李奕舉兵攻成都卻説漢王李勢驕奢淫侈不恤政事罕接公卿信任左右讒説並進刑罰苛濫於是中外分心太保李奕自從晉壽舉兵反衆至十萬圍繞成都漢王勢自率禁兵登城助戰李奕見勢自登城上親自披挂至城下數勢之罪被勢執弓射之中奕項而死漢兵見奕被射死了乃開城門出擊大敗奕衆還自是西至犍為梓潼布滿山谷十余萬落虜掠四野不可禁制大為民患加以飢饉四境蕭條
