body:
  text: 第二九八回涼王卒誡諸子和卻説涼王呂光疾甚立太子呂紹為天王自號太皇乙太原公呂纂為太尉當山公呂弘為司徒光謂太子紹曰今三鄰構隙吾歿之後使纂統六軍弘管朝政汝恭己無為委重二兄庶幾可濟若兩相猜忌則蕭牆之變至矣又謂纂弘曰永業才非撥亂直以立嫡有常偎居元首汝兄弟輯睦則名流萬世若內自相圖則禍不旋踵弘纂泣曰兒不敢反光卒紹祕不發喪纂排闥入哭盡哀而出紹懼以位讓之纂不許曰陛下自宜保重光弟子呂超見呂弘惡狠謂紹曰纂為將積年威震內外臨喪不哀步高視遠必有異志宜早除之紹曰先帝言猶在耳奈何違之縱使圖我我視死如歸終不忍有此意也弘聞知謂纂曰主上暗弱未堪多難況宜為社稷計不可拘小節也弘纂於是夜率壯士一千攻廣夏門左將軍齊從抽劍直前砍纂中額左右擒之纂曰義士也勿殺呂超聞變急率卒二千赴難衆素憚纂威不戰自潰纂自入升殿呂紹遂自殺呂超見衆散逃奔廣武纂以弘兵強以位讓之弘不受纂乃即天王位以弘為大都督録尚書事纂叔父呂方乃呂超之父鎮廣武纂遣使謂曰呂超實忠臣義勇可嘉但不識權變之宜方賴其用可以此意諭之超遂上疏陳謝纂乃復其爵位相待如初後涼王紹既自殺因此呂纂遂自立為後涼王後又自立為天王國號大涼改元咸德元年卻説當山公呂弘呂光之季子與呂纂殺紹自立恐己不為所容乃起兵東苑來攻呂纂纂遣將軍權德率兵出討德與呂弘交戰未上十合弘衆潰散弘乃單騎奔外呂弘之妻子均被士卒奪去是日呂纂聞知權德大勝呂弘敗走笑謂群臣曰今日之戰何如侍中房咎正色對曰天禍涼室釁起戚藩雖弘自取夷滅亦由陛下無棠棣之義且弘妻陛下之弟婦也弘女陛下之侄女也奈何使無賴小人辱為婢妾天地神明豈忍見此也言訖乃歔欷流涕涼王改容謝曰是朕之過也卿乃吾之直臣也於是召弘妻女及男女入居東宮厚其撫養將所辱弘妻之士卒斬之時弘走見叔父呂方方見之大哭曰天下甚寬何為至此遂執呂弘送與呂纂纂使力士拉殺之卻説呂超不奉朝命引兵五萬欲伐鮮卑思盤思盤聞知大驚與諸將商議諸將曰主公與後涼王自來無仇必然是呂超擅自起兵可使人星夜去見新王呂纂願稱藩臣以障涼國被必抽回其兵可保吾境無患矣思盤曰卿言有理因是使人持書入姑臧呈與涼王呂纂纂覽畢始知呂超擅伐鮮卑乃謂使人曰吾還報與汝主知道吾與汝國乃唇齒之邦必無相攻之理呂超起兵朕實不知朕即使人抽回其兵從今和好如初不須憂疑汝急回白汝主吾旦日請與超會面講和宜速來之使人得其意語即歸去訖涼王即使人往邊召呂超還朝問曰鮮卑思盤與吾國無仇如何擅伐不待朕知不看昔日功勞及先王之面今朝必然斬你從今以後休得如此超懼謝罪而出來見兄右將軍呂隆隆曰呂纂謀逆弒君自立吾甚不平無人幫附待弟回來計議今弟既回必須殺此跋扈超曰來日吾即辭纂還廣武城起兵來汝可以兵內應誅此不義隆曰汝去再來難定吾聞呂纂旦日使人請鮮卑主思盤宴必然大會群臣與弟待其宴會時吾自勸纂飲醉弟可藏刀侍於左右將纂刺死其餘文武不敢逆耳超然之次日呂纂果排宴大會群臣於內殿纂日與超對飲飲得大醉呂隆又來勸酒纂又飲因此昏醉被超利刃將纂殺之因大叫群臣曰呂纂謀逆篡位吾故殺之與汝大臣無干今將軍呂隆有先人之志漢祖之德宜立襲位汝等大臣所議何如群臣皆曰殿下乃太祖之弟自宜即位何必計議呂超曰吾因公殺此逆賊吾若自取大位卻被天下人笑我篡位汝諸大臣休忤吾意於是大臣扶呂隆上殿登座呂隆推讓呂超至再至三方始受位諸大臣皆呼萬歲國號大涼改元神鼎元年初呂纂嗜酒好獵太常楊穎嘗諫之不悛會超擅攻鮮卑思盤纂命超及思盤入朝講和超懼至姑臧深自結於殿中監杜尚纂見超責之曰卿恃兄弟桓勢乃敢欺朕要當斬卿天下乃定吾不忍殺汝也因引超及思盤及群臣宴於內殿超兄中領軍隆數勸纂酒纂醉超取劍擊殺之纂後楊氏命禁兵討之杜尚止之皆舍仗不戰而散超讓位於隆隆遂即天王位以超都督中外録尚書事楊後將出宮超恐其挾珍寶命索之後曰爾兄弟不義手刃相屠我旦夕死人又安用寶為超又問玉璽何在後曰已毀之矣後有美色超將納之謂其父桓曰後若自殺禍及卿宗桓以告後後曰大人賣女與呂氏是圖富貴一之已甚其可再乎遂自殺桓懼奔走河西去了
