body:
  text: 第一六五回郗鑒王舒赴國難卻説郗鑒字道徽高平人少孤貧博覽經籍躬耕壟畝吟詠不倦以儒雅著名初鑒值永嘉之亂在鄉里貧甚飢餒其鄉有黃長者以鑒名德傳請供給之時兄子邁外甥周翼幼小鑒常攜之就食黃長者曰今各自飢饉吾以君賢欲共相濟耳恐不能兼有所存於是鑒後獨往食食訖以飯著兩頰邊還家吐與二兒食因此養得二人復存後同過江邁位至護軍翼位至剡縣令鑒投事元帝帝遂以為廣陵太守其時鑒任廣陵城兵微糧少逼近胡寇人無固志俱各散心忽得檄書至即流泣謂衆曰今主上幼小被蘇賊叛逆汙亂朝廷吾欲起兵以死報國汝等盡忠同赴國難不得推延於是將士爭勇向前因是遣將軍夏侯長等間行謂嶠曰或聞賊欲挾天子東入會稽當先立營壘屯據要害既防其越逸又斷其糧然後清野堅壁以待賊賊攻城不拔攻野無掠必自潰矣嶠聞其計深以為然五月陶侃自將兵至潯陽溫嶠同庾亮商議出兵當諸將謂嶠曰陶公此來必誅庾公以謝天下然後討峻庾公宜避之庾聞其言大驚欲往別鎮去溫嶠止之曰不可公宜負荊自責見侃侃必不傷於公今欲去反搆成冤於是亮用嶠計出迎詣侃拜謝侃驚止曰庾元規乃拜陶士行耶昔君侯修石頭以禦老子今日反求見府亮引咎自責曰主上遺詔托輔司徒王導及中書令卞壺等親王大臣親自所見豈敢裁除修築石頭以防諸胡豈疑於君若有此意天地不容言訖淚下侃乃釋然曰前言戲之耳因此溫嶠亦來相見會議次日三人遂同起兵直奔建康共率精兵四萬旌旗七百餘裏峻知恐建康不固乃自姑孰還朝次日入內集百官謂曰今陶侃起兵要劫天子必傷百官今建康兵甲未精城郭不固難以堅持不如暫徙石頭候太平還都王導出曰建康雖則兵城未備乃興王之所況太廟諸陵在爾豈可一旦離之石頭雖固宮省台司全無可居甚不可移蘇峻要徙王導固爭不從峻曰吾意已決逆令者斬於是百官不敢吐言成帝哀泣從之次日峻備車請帝升車時大雨泥濘劉超鍾雅步侍左右峻給馬與之二人皆不肯乘而慨慷悲哀峻心惡之帝與群臣既至石頭峻以倉屋為帝宮室與成帝居之峻黨日肆醜言當超雅與荀嵩華恆虞潭等常侍不離帝側值飢饉米貴峻聞遺超一無所受繾綣朝夕臣節愈恭雖居困厄之中猶啓成帝授孝經論語王導見峻逆衆而劫上遷都乃密令張闓以太后詔諭三吳以起義兵會稽內史王舒得太后詔使督護庾冰將兵一萬西渡浙江前來討峻於是吳興太守虞潭吳國內史蔡謨義興太守顧衆等皆起兵應之虞潭之母孫氏性聰敏識鑒過人忽聞各處起兵討峻謂潭曰主上受困於石頭汝當捨生取義勿以吾老為念速起兵討峻言訖乃遣家僮從軍鬻其環珮以給軍資蘇峻聞知大驚忙遣部將管商等引兵五千拒之
