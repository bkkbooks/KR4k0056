body:
  text: 第三二九回道覆以兵寇江陵卻説盧循屯在丹陽城至七月庚申謂將士曰今劉裕固守石頭不與我戰其計欲勞我師待我糧盡退而擊之安可坐中其謀不如兵還潯陽別圖後計言訖傳令起行徐道覆進言曰今劉裕與我抗而不戰者必有密謀破吾軍也不如急去攻之使其謀無所就豈可退兵與其後追也循不聽道覆曰既是退兵可與吾兵二萬去攻江陵荊州就取其糧草前來供給三軍不然糧盡難以爭戰循曰可於是以兵二萬戰將數員與道覆前往江陵荊州去訖自以兵徐退以水軍舳艫泊西岸屯住卻説劉裕坐中軍聞探馬回報説盧循退兵泊西岸徐道覆引兵襲江陵荊州裕得其語大喜曰道覆去遠吾計成矣言訖即喚輔國將軍王仲德謂曰你引一千精兵多張旌旗後追隨數裏屯扎待他退你後追他屯住你亦屯住不可與戰使彼心疑不敢還潯陽只屯西岸我自有計破也又喚建威將軍孫處至曰你可引五千兵陰從海道去襲番禺攻其家也處欲臨行裕誡之曰我這裏十二月必破賊軍料卿亦足至番禺就宜緊攻先傾其巢窟也使賊聞知慮主思歸耳處領諾領兵從海道去訖又喚偏將軍王平謂曰你星夜領五千兵抄小路去賊兵之前砍伐近山樹木結大柵數百浮於河上橫塞河路就準備完訖屯西河港內朝夕擂鼓使賊疑不敢歸又喚監軍孟懷玉謂曰你可引兵二千準備船隻一千以硫磺焰硝引火之物裝船上面待吾進兵賊人必來占住西岸待他泊住西岸你將船隻浮河上流待東北風起放火順下西岸縱兵擊之又喚諸葛長民謂曰你領五千兵看河內火起為號引兵進攻賊之旱寨賊走放火焚之計排已定傳令已訖使劉毅監太尉留府鎮守自以兵登舟南塘屯扎等待風起卻説刺史劉道規正坐廳間忽左右報徐道覆引兵二萬來攻江陵道規即喚左右副將至以計附耳低言説如此如此諸將士得計即時準備軍馬依計星夜由小路埋伏去訖次日道規自將兵五千前來排戰卻説徐道覆軍馬至江陵離城七十裏下寨正坐帳中忽探馬報説荊州刺史劉道規引軍馬前來挑戰道覆即時傳令便差渠帥韓焰先來出哨隨即全身披挂騎雪蹄烏騅馬仗著雙鞭大驅人馬奔江陵城在路上正遇道規與戰不上三合道規佯輸走還道覆見他敵弱追趕五十裏之程遠遠望見道規許多人馬殺奔回來徐道覆即排開軍馬先鋒韓焰來與徐道覆商議曰正南上一隊步兵不知是何處來道覆曰休問只管沖將過去韓焰引五千軍馬飛過前去又見東南一隊軍來卻欲分兵西南上又堆起一隊來旗竿招展呐喊喧天韓焰又引兵回來對徐道覆曰南邊兩隊軍又都是晉兵旗號道覆曰這廝不出來廝殺必有計策説猶未了只聽得北面上一聲炮響道覆曰此必是晉兵計策我和你且把人馬分作兩處去鬥我去殺北邊你去殺南邊正在分兵之際只見四路又起兵來道覆心更慌忙四面八方火炮掀天金鼓雷鳴晉兵飛圍過來道覆兵皆惶潰亂竄道覆見有埋伏急忙勒轉馬頭望東北大路殺來遇著道規交戰戰上二十余合無心戀戰只得拼死盡力殺開血路直沖過去望東北而逃劉道規引得勝兵迫數十裏不著方回以牛酒賞勞三軍不再絮煩是時徐道覆被劉道規用四面埋伏之計殺得片甲不留只收得幾千殘兵回屯湓口是年十一月孫處從海道至番禺悉領兵登岸自詐為渠帥韓焰令兵改為賊兵旗號詐説盧循攻破建康著他回接父親及家屬往京因此直至城下依計誘開城門城中無備直殺入城卻説盧循父盧嘏正坐府中聞報晉兵詐稱韓焰誘開城門殺近府前嘏大驚急引家屬開走後門逾牆逃奔始興而去孫處入內令軍士搜捉盧嘏不見將其婦女盡斬出榜安撫百姓懼其殘殺皆閉門不開次日孫處始令百餘騎貼榜文遍告諸處及三軍如有妄殺一人者夷其三族妄取民間一件物者定按軍法如此軍法嚴明與民秋毫無犯次日天明百姓家家開門焚香迎接處又傳令告報但有原任官吏依舊録用及在邊將士家亦照舊給俸不缺由是番禺百姓皆感其德傾心歸命於處處乃屯鎮其城犒賞三軍十二月已卯忽起東風裕喚諸將人內問前日令安排準備埋伏物件等項如何諸將答曰齊備裕曰既齊今日各個依計進兵不可遲延言訖拔寨起行依計殺奔前來盧循正在水寨與諸將説前面有埋伏後面有追兵如何可退還潯陽正議間聞晉兵殺來急令水軍頭目引兵從方江而下占住西岸諸兵得令各以船泊西岸忽報上流有數千小船至言未畢其船將近水寨只隔一裏水面忽然間其船一齊發火火趁風威風助火勢船如箭發焰煙漲天一千隻火船撞入水寨所撞之處盡皆釘住隔江炮響四下火船齊到但見方江面上火逐風飛一派通紅漫天徹地盧循回看岸上營寨幾處火起卻説孟懷玉將船放火順流賊寨自跳在小船中背後數十人駕舟百餘冒煙突火來殺盧循循見勢急欲爬上岸口時張放駕一小舟來乃扶循下得船時那只大船已自著火了張放遂呼集數百隻船萬餘人保護盧循在於小船中飛奔岸口當劉裕望見穿絳紅袍者下船引衆船走料是盧循即出腳踏在船頭手執利刃厲聲大叫曰妖賊休走劉裕在此等你多時循乃連聲大呼衆船回與裕戰不下數合裕乃大敗而退盧循引兵趕來將次趕上被張放拈弓搭箭覷得劉裕較近一箭射去而裕在火光之中那裏聽得見弓弦響箭來正中肩窩翻身下水當有偏將急救方得活命其時滿河火滾因風水之勢在中流蹙之天下大雨雷聲大震水熱如湯流入龍宮龍王大驚急問水族如何水熱如湯當時水族對説妖賊謀叛劉裕以火攻焚其舟因此水熱如湯目今劉裕反敗與賊龍王謂水族曰劉裕當興宋祚你可引衆水族以萬鈞神弩陰矢射妖賊助他一陳於是水族依令以神弩來陰助劉裕暗射妖賊當者無不即死賊衆方潰劉裕見自軍中忽然有萬鈞之弩所發矢中賊疑必天助遂令衆軍並力攻擊所向莫不摧陷殺得賊人大敗走下流去了又被木柵攔住循令偏將拒住伏兵自揮兵盡力拆毀木柵乃得退走還潯陽裕以兵緊隨後追循見晉兵追至甚急復走至豫章令軍人悉力為柵在左裏拒之其時劉裕同部將景申引大軍將次來到左右正與賊兵對陳交鋒之際裕急忙持號幡麾兵去戰忽然幡竿折斷幡沈于水衆軍將鹹以為不祥且請退兵明日交戰劉裕笑謂諸將曰往時定荊之戰如是今乃復見必破賊矣諸將休疑火速進兵衆將士因此鋭氣百倍悉力攻其木柵俄而柵拆晉兵殺入柵來盧循見晉兵亂人莫能擋抵唬得心膽俱裂鼠竄狼奔引左右心腹掉舟急逃奔回番禺去訖因此諸兵無主俱各亂竄劉裕見循去遠又傳令諸將曰歸師勿掩窮寇勿追宜即收兵自乃大叫曰盧兵肯降者免戮不順者即誅言未訖賊兵皆倒戈卸甲撑船來降裕乃大喜即傳令鳴金收軍旋師屯于豫章安撫百姓忽報晉帝遣侍中黃門薛仁以牛酒財帛前來勞師裕聞知即出案接待同坐以財帛牛酒賜諸將士給賞三軍辛亥七年春正月南涼王傉檀又欲伐北涼護軍孟愷諫曰蒙遜新並姑臧凶勢正盛不可攻也傉檀不聽發兵五萬分五路俱進兵至番禾苕藋掠五千餘戶而還將軍屈右曰今既獲利宜倍道旋師早度險危蒙遜若輕猝至大敵外逼徙戶內叛此危亡之道也又不退俄而昏霧風雨蒙遜兵至大敗而走不敢還城蒙遜以兵進圍樂都劫取其子染以為質蒙遜始引兵而還傉檀勢窮只得以其子為質降二月劉裕收軍振旅而還京次日入朝拜見晉帝奏説破盧循之功帝大喜改封裕為大將軍領揚州牧裕受職謝恩而退
