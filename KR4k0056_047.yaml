body:
  text: 第四十六回張昌攻殺新昌王卻説新昌王司馬歆都督荊州為政嚴急失蠻夷心因此義陽蠻張昌聚黨五千人欲為亂會荊州以調發武勇兵討李流流民憚遠征皆不欲行詔書督逼卻説張昌初得石冰以兵五千降著其為前部來寇揚州刺史陳徽調兵出戰皆敗走於是陳徽引腹心數百逃遁因是諸郡盡沒江州武陵零陵豫章武昌等處州郡皆為張昌所破昌更置牧守皆賊盜小人專以劫掠為務劉弘大驚急使陶侃等領軍三萬去擊張昌侃引軍至竟陵驅軍出戰張昌以兵拒迎兩下各自結陳侃自將出陳前大罵張昌逆夷何敢謀反張昌大怒舞刀便砍佩以槍來迎二人在陳鬥至二十餘合張昌氣力不加勒馬便走陶侃揮軍追殺殺得張昌大敗逃於下雋山而其衆悉降陶侃惟石冰尚據臨淮卻説陶侃自幼孤貧為郡都郵長沙太守方嗣見而異之命其子與結交後舉孝廉至洛陽郎中令楊晫薦之于顧榮侃由是知名既克張昌劉弘謂曰吾昔為羊公參軍謂吾後當居其處今觀卿必繼於老夫矣時荊州守宰多缺弘請補選朝廷詔許之弘敘功銓德隨才授任人皆服其公當上表以皮初為襄陽太守朝廷議以初望淺更用弘壻夏侯陟補弘下教曰凡治一國宜以一國為心必若姻親然後可用則荊州十郡安得有十女壻然後為政哉乃復表姻親舊制不得相濫皮初之勳宜先酬之朝廷詔聽之於是勸課農桑寬刑省賦公私給之百姓愛悅
