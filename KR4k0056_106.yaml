body:
  text: 第一三回周訪擊斬賊張彥三月卻説王敦遣陶侃等討杜韜侃既以兵討杜韜前後共數十戰皆勝杜將士多死於是韜使使來江南請降于左丞相睿受其降遣人以韜為巴東監軍韜既受睿命為巴東監軍陶侃攻之不已韜不勝憤怒復反遣其將張彥攻陷豫章郡周訪以軍來擊彥彥即出城拒迎與訪交戰不上數合彥被周訪拍馬沖陳而斬之彥衆遂降於訪訪遂入屯豫章時平陽血雨三日于漢東宮延明殿太弟劉乂心甚惡之太子太傅崔瑋太子太保許遐説乂曰今相國威權逾于東宮殿下非徒不得立也朝夕且有不測之危不如早為之計乂弗從舍人告於漢主聰聰大怒即選一人誅之使將軍卜抽將兵五千監守東宮乂大驚急遣人上表乞為庶人且請以劉粲為嗣蔔抽監住不能得出産漢青州刺史曹嶷盡得齊魯間郡縣自鎮臨淄有衆十餘萬臨河置戍石勒聞之使人入平陽稱曹嶷有專據東方之志請為討之漢主聰與近臣議恐勒滅嶷不可復製因此不許勒遂不敢行卻説漢主劉聰納中護軍靳準二女月光月華立月光為上皇后以劉貴妃與月華為左右皇后當陳元達知立三後入內苦諫曰自三皇五帝以至於今未有一國而立三後非為禮也今陛下不思求賢專事寵女誠恐社稷危矣漢主怒而不聽元達又奏月光素有穢行聰亦不聽月光得悉元達所奏慚愧自殺聰以是恨元達乃遷元達為禦史大夫喝令速行元達滿面羞慚而出曰忠言逆耳庸君不納於是悶悶回第去訖
