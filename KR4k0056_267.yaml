body:
  text: 第二六四回慕容垂大破秦兵甲申九年正月朔長樂公苻丕大會賓客令人請慕容農同飲使人回説不知去向丕始知其去使人四出尋之乃知其在列人已起兵矣卻説慕容農又驅列人士民為卒斬桑榆插地為兵裂襜裳於竿為旗使趙秋説屠各子及康東烏桓等人各率部衆數千赴之攻破館陶收其軍資器械取康台收馬數千匹於是步騎雲集衆至數萬乃推農為驃騎大將軍監統諸將設立郡署上下肅然農以父垂未至不敢行賞趙秋曰軍無賞士不往今之來者也皆欲立功規利宜承制封拜以廣中興之業農從之於是赴者相繼農號令整肅軍無喧譁士民喜悅長樂公聞知大怒使石越來討之農曰石越有智勇之名今不南拒大軍而來此是畏王而淩我也必不設備可以計取之衆將皆曰今大兵至宜治列人之城以治之農曰今已起義兵對敵固當以山河為城池何必列人之城治也越至列人之西農參軍趙謙曰越遠來疲倦請急擊之農曰彼軍有甲在外我軍有甲在心晝戰則士卒見其外貌而憚之不如待暮擊之可以必克即令戰士嚴備以待毋得妄動石越既至令士卒立柵壁壘農笑曰越兵精士衆不乘其初至之鋭以擊我乃更立柵吾知其無能為也至暮農令軍士鼓噪出陳於城西守門將劉木率壯士四百人當先毀柵而入石越無備見兵入寨慌上馬兩軍相遇石越持槍躍馬走出大罵逆賊秦王有何負汝發兵謀襲慕容農大怒拍馬更不打話手執大杆刀直取石越兩馬相交戰不十余合石越被慕容農一刀斬于馬下揮兵進擊殺死秦兵大半其餘盡皆逃奔毛當在後陳聞石越敗急欲上馬農大隊湧至措手不及亦被亂軍所殺秦兵大敗以此秦人騷動盜賊群起慕容垂招軍買馬積草屯糧不過半年衆至十萬起兵前來關東先遣人報知慕容鳳丁零翟斌三人聞報自來迎接人寨敘談衷曲各訴契闊之情共議復燕之計丁零曰若復燕可使人往鄴報知前將軍慕容農令其起兵相應我這裏一面以兵先取鄴城垂曰聞農起兵將至吾亦遣人報知君言正合我心當即寫書使田山去列人州會慕容農一齊起兵田山領書去了慕容垂與諸將發兵來攻鄴城田山以書見慕容農農讀書訖即時以兵來會時垂兵二十萬餘人兵至鄴郡弟慕容德子慕容寶上言曰今天下兵起皆為燕故吾兄乘此早稱尊號庶使人無異望士有歸心若不早立尊號則士民解體大業難定矣垂曰然於是慕容垂自稱為燕王以世子慕容寶為王太子以弟慕容德為車騎大將軍封范陽王又拜王公百余人使其率衆二十余萬長驅攻鄴史説慕容德字玄明皓之少子也狀貌雄偉額有日角偃月重文博覽群書學多才藝兄垂常與共論國家大謀言必切至垂謂之曰汝器識長進非復吳下阿蒙也及慕容暐敗徙于長安秦王苻堅以為張掖太守苻堅敗之於晉德乃從垂至鄴因勸垂稱號垂乃以慕容德為車騎大將軍兵至鄴慕容農兵亦至聞後燕王到自引親隨從人入中軍參見燕王燕王垂大悅曰得卿來助大業成矣於是後燕王垂封慕容農為上將軍命其以兵與慕容德同屯次日會兵攻鄴城當長樂公苻丕見燕兵勢大不敢出戰使兵堅守各門遂召問韓晃等將曰今慕容垂兵多將廣難以與敵攻城用何計可以破之韓晃曰慕容垂鋭氣正盛石越之兵新亡誰人再敢與戰若守此城城郭不固兵甲不堅不如退守中城使人問垂如何起兵於是丕遣薑讓來説問垂如何起兵讓奉丕命來見慕容垂未及開言垂曰孤受主上不世之恩故欲保全長樂公使其赴京師然後修復舊業永為鄰好若不以鄴城見讓當窮極兵勢恐單馬求生亦不可得也讓厲色責之曰將軍不容于家國投命聖朝燕之尺土將軍豈有分乎主上與將軍種殊類別一見傾心親如宗戚寵勳逾舊一旦因王師小敗遽有異心長樂公受分陝之任寧肯拱手輸將以百城之地乎將軍欲裂冠毀冕自可極其兵勢但惜將軍以七十之年懸首白旗高世之忠更為逆鬼耳垂默然左右請殺之垂曰彼各為其主耳何罪禮而歸之讓上覆秦王堅並持垂表領送長樂公丕歸長安時堅聞知後見表大怒切恨之時苻丕見垂兵至料不能敵乃自領後軍至一更盡大開東門殺出以兵退入中城傳令三軍堅守城池不許出戰次日天明後燕王聞苻丕已走引衆入城扎住大軍卻説秦北地長史慕容泓聞慕容垂攻鄴乃引親屬百余人亡奔關東收集鮮卑九千人起兵還屯華陰招集亡命平陽太守慕容沖聞慕容垂稱王關東亦招軍買馬積草屯糧衆至二萬屯於平陽卻説秦王苻堅在宮中聞長樂公苻丕告急文書至及知慕容垂慕容泓等各起兵叛秦心中大驚謂夫人張氏曰朕若用朝臣之言豈有今日之事耶有何面目見朝臣乎言訖命群臣計議命將去討
