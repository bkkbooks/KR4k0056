body:
  text: 第二十八回王氏惠風守貞節太子妃王氏字惠風乃太尉王衍之女有貞婉志節當太子遹見廢王衍上表離婚不與女兒説知只令其休隨太子往金墉別行改嫁豪士惠風曰婦人再醮在百姓家有志之女亦所不為況台閣之女皇儲之妃動為天下不取而敗壞人倫忍心害理貽萬世之笑罵乎即叱車仗同太子往金塘不提史説閻纘字纘伯巴西人也博覽墳典堅持雅節其父早逝繼母不慈力事之彌謹鄉里以孝稱國子祭酒鄒湛薦為祕書監未就及聞皇太子被賈後所廢閻纘使家人輿棺詣闕上書理太子之冤惠帝設朝纘自至禦榻前上書惠帝覽之曰臣纘伏念前太子遹生於聖父而至此者由於長養深宮沈淪富貴受饒先帝父母驕之每見選師傅下至群吏率取膏梁擊鍾鼎食之家希有寒門儒素如衛綰周文石奮踈廣洗馬舍人亦無汲黯之比者使不見事父事君之道所以致敗也臣素寒門無力仕宦不經事東宮情不私遹念昔楚國處女諫其主曰有龍無尾言年四十未有太子臣當備近職雖未能自結天日情同閹寺悾悾之誠皆為國計以死獻忠伏須刑誅永康元年惠帝覽畢流涕而懼賈後終不能納而遣閻纘暫還纘號泣出朝群臣無不欷歔者太子既廢衆情忿怒衛瓘督司馬雅曾給事東宮與殿中郎士猗等欲謀廢賈後以復太子當士猗謂雅曰若行此事必須交當權者方為得計不然禍反纍族雅曰右將軍趙王倫執掌兵權性貪冒可藉以濟事其府中有一個嬖人姓孫名秀可去見此人而説之必然克濟士猗曰如此吾即往説之於是士猗來見孫秀曰今國無嫡嗣社稷將危矣久聞足下與趙王奉事中宮若前太子之廢公與趙王必預知之今大臣將舉事禍必相及何不與趙王先謀之乎秀曰君言是也待見趙王白之因是孫秀入府以士猗之言與趙王詳述趙王倫大悅曰正合吾心即使人請通事令史張林到府商議使為內應張林從之期日將發孫秀入止之曰且緩之臣竊見太子聰明剛猛若還東宮必不受制於人明公黨與賈後今雖能建大功太子必謂公居奇貨冀免罪耳心詎深德於公不若遷緩其期賈後必害太子然後廢後為太子報仇豈徒免禍更可以大得忠矣趙王倫然之於是孫秀因使人行反間計言殿中欲廢賈後迎太子賈後聞知大驚恐再復太子先使人將司馬遹更幽於許昌復矯詔使黃門孫慮與太醫令程據和藥來害太子孫慮奉賈後偽詔至許昌謂太子曰今聖上有詔命殺殿下臣不敢加刃謹上藥酒請殿下自裁言訖搗藥和於酒內請太子飲太子不肯飲走至廁被孫慮以舂藥杵錐殺之於是太子被弒天下之人盡皆冤之自此之後賈後恣意專政矣三月尉氏雨血妖星現南方太白晝見中台星折當張華少子韙勸華曰天道示變大亂將作大人宜早遜位免受其患華曰天道幽遠豈能盡應不如靜以待之是以不聽
