body:
  text: 第二六二回呂光率兵伐西域卻説先車騎將軍呂光率兵七萬去伐龜茲將至其地聞秦王苻堅寇晉光意欲更須後命抽回部將杜進曰節下受任赴機宜之速行何更留乎於是光傳令進兵行至流沙三百余裏地下無水掘井四十餘丈亦無泉出軍皆渴甚將士失色皆來稟光光曰吾聞李廣以精誠玄感飛泉湧出吾等豈獨無感致乎皇天必將有濟諸軍不足憂也言訖命排香案親自祈告天地俄而天降大雨平地水深三尺遂得進焉時焉耆國國王率其旁國降光光受而慰之引兵直至龜茲國帛純聞秦將呂光以兵來寇其國遣大將金德率兵二萬出城來戰金德受命即出領兵金德上陳使開山大斧有萬夫不當之勇更有五子精通武藝騎射過人長曰金瑛次曰金瑤三曰金瓊四曰金琪五曰金琚俱各英雄是時金德領主命引本部軍馬八萬來迎前至鳳鳴坡相遇呂光兩下各自布陳金德兵擺開門旗下金德出馬五子列於兩邊厲聲大罵反國之賊敢侵吾境呂光縱馬挺槍大怒而出單搦金德交鋒長子金瑛挺槍與呂光交戰戰不三合呂光刺死金瑛于馬下次子金瑤大怒又縱馬一口刀來與呂光交戰光乃抖擻精神施逞平日虎威驟坐下馬交馬未五合呂光斬瑤于馬下全然不懼第四子金琪見二兄俱敵光不過也驟坐下馬輪手中兩口日月刀與金瓊金琚三人圍住呂光光在中央獨戰三將無移時金琪中槍翻身落馬二將慌救呂光倒拖槍便走金瓊驟住馬收了戟取箭射之被呂光用槍連抵瓊射三箭皆不中瓊操了戟奮力趕來將及趕到卻被呂光一箭射中面門應弦墜馬而死金琚隨後趕來一刀砍下呂光施放不中弓箭皆棄閃過其刀生擒金琚歸陳殺之復取了槍刀坐了馬殺過對陳金德見五子皆喪于呂光之手心膽皆裂急走入陳躲避西域兵素聞呂光之名又見如此之雄誰敢交鋒馬到處喝聲陳開皆紛紛亂走曳兵倒退呂光匹馬單槍沖入西陳如入無人之境參軍段業見呂光大勝率秦兵一掩西域兵大敗而去金德險被擒捉棄馬步行而逃入城呂光收軍回寨諸將賀曰某聞將軍少年如此英雄不想壽已四旬精神尚在今日陳前獨誅五將世之罕有呂光曰吾孤軍懸入若不力誅其將則功難成汝等諸將各宜效力共成大功言訖傳令教軍攻城卻説金德敗回入城哭見帛純道秦兵勢大不能抵擋五子皆已喪命龜茲王帛純曰似此怎生奈何金德曰不如收拾珍寶逃避陰穀待其師老然後擊之帛純從之命宮人收拾珍寶使金德殺開城門領親屬逃避去訖呂光見龜茲國王逃走了亦不追趕遂引兵入城宰馬殺牛大饗土卒犒勞三軍是時龜茲附近王侯來降者共三十余國呂光皆撫而遣之還國乃使人尋討鳩摩羅什史説鳩摩羅什乃天竺人世為相國其父鳩摩羅炎持身有大節將嗣相位乃避辭出家東度蔥嶺龜茲王聞其名郊迎之請為國師時王有妹年二十才悟明敏諸國交下聘並不許及見羅炎心欲留之乃逼以其妹妻羅炎炎既與王妹匹配王妹遂有娠羅什在胎其母慧解倍常生下羅什及年七歲遂與母俱出家羅什從師受經日誦千偈偈有三十二字凡三萬三千言義亦自通西域諸國鹹服羅什始攜母至講説諸經諸王皆長跪坐側令羅什踐而登焉苻堅聞之密有迎羅什之意因是乃遣呂光等率兵西伐龜茲光臨行苻堅謂曰若獲羅什即馳驛送之今呂光既破其國乃使人尋得鳩摩羅什並其母至光見其年少美色以凡人戲之欲強妻以龜茲王女羅什與母拒而不從堅辭甚苦光曰道士之操不愈先父何所固辭乃閉之密室飲以醇酒至酣乘醉入室強逼羅什不得已遂妻之呂光迷戀龜茲國不思歸期及見龜茲宮室壯麗命參軍段業著龜宮賦以頌之龜茲國人奢侈厚於養生家有葡萄酒或至千斛經十年不壞士卒淪沒酒藏者相繼矣由是呂光留戀無有歸心耳卻説乞伏國仁隴西鮮卑人父司繁降于秦苻堅使鎮勇士川卒國仁代鎮其地聞秦王堅敗于晉乃謀反自稱大單于秦河二州牧自勇士川至都于金城聚衆一二萬人不聽秦命改號建羲元年國號西秦卻説乞伏國仁為秦前將軍從秦王堅寇江南國仁叔父步頽聞秦師大敗乃率隴西謀叛秦王堅聞知使國仁以兵五千討之國仁遂與叔父步頽合兵十萬餘人謀叛經略秦境卻説慕容垂領兵至安陽其子慕容寶曰父親欲建中興之業獨力難成吾之舊將皆在長樂公苻丕處父親不如入城只佐參苻丕私與皇甫真等同議興兵之策垂曰此計大善汝率兵先行吾自入參苻丕密會舊將同議興兵之策於是慕容垂自引從人入安陽參苻丕使其子寶率兵西行
