body:
  text: 第九回劉毅對帝似桓靈辛醜太康二年三月武帝詔選吳孫皓宮人五千入宮內朝夕淫樂遊宴怠於政事其掖庭殆將萬人衛從常乘羊車恣其羊車之所至便宴寢其宮其時武帝既乘羊車遊寢宮庭宮人競以竹葉插戶鹽汁灑地以引帝車入宮於是後宮亂寵無次序矣卻說皇后楊氏其父楊駿字文長宏農人也官拜車騎將軍時武帝以後寵封楊駿爲臨晉侯當中書令褚碧與尚書郎郭弈等諫之曰夫封建諸侯所以藩屏王室也後妃所以供粢盛宏內教也今後父楊駿雖有國戚之尊卻無汗馬之勞安可封侯二人因上表稱楊駿小器不可以任社稷之重恐亂天下之始武帝怒而不聽益寵楊駿於是楊駿勢傾天下任意橫行卻說武帝自太康以後天下無事不復留心萬機惟耽酒色請謁公行楊駿與弟楊珧楊濟勢傾朝野公卿大夫無有不憚之者故時人號爲三楊時太尉何曾因朝回第謂諸子弟曰今皇上以吾爲太尉吾每宴見未嘗聞經國遠圖惟說平生常事非貽厥孫謀之道也及身而已後嗣其殆乎汝輩可以免指諸孫曰此屬必及於難矣壬寅太康五年武帝設朝君臣禮畢武帝問司錄校尉劉毅曰朕可方漢之何帝卿實言之毅曰桓靈似陛下耳武帝曰朕何至於此毅曰桓靈賣官錢入官庫今陛下賣官錢入私門以此言之殆不如也是時武帝賣官錢入宮故毅言之當武帝大笑曰桓靈之世不聞此言今朕有直臣故爲勝之耳因賜毅金二十斤時毅糾劾豪貴無所顧忌人皆憚之
