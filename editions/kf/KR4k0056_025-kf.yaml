body:
  text: 第二十五回孟觀領軍伐萬年卻說洛陽巴氏李特李庠李流兄弟三人皆有武才善騎射性任俠州党皆重之因齊萬年反關中薦饑洛陽天水等六郡之民流移入漢州者數萬家道路有疾病窮乏者李特兄弟賑救之由是頗得衆心後與其流民至漢中上書朝廷乞寄食巴蜀有司奏知惠帝詔群臣朝議張華諫曰今流民甚衆宜遣人持節慰勞且監察之勿令入劍閣無至亂也帝曰然於是遣侍禦史李芯持節入漢川慰勞流民芯既入漢川流民特等以倡金千兩賂芯乞表與衆入蜀芯既受其賂上表言流民十余萬口非漢中一郡所能賑贍蜀有倉儲宜令就食朝廷從之由是流民散在梁益不可禁止李特至劍閣歎息曰劉禪有如此地面經於人豈比庸才耶遂起窺竊蜀中之意卻說粱王肜恨周處劾己之仇故不以兵接應周處力戰死之梁王肜堅壁不戰使人持表奏知朝廷惠帝甚憂之張華奏曰陛下勿慮臣舉一人可討平氐羌帝國卿舉誰人華曰殿中將軍孟觀沈毅有文武才若用之可克萬年於是惠帝以孟觀爲征討將軍領兵三萬去討萬年孟觀既受兵符即日收拾起行至涇陽五十裏外下寨次日大隊軍馬前進齊萬年已知其來亦以兵出迎兩軍相見俱各矢石交攻孟觀身騎駿馬手搦長槍親擋矢石出與齊萬年交戰兩馬相接兵器齊發戰上十余合齊萬年大敗而逃孟觀奮不顧身勒兵趕殺一連大戰十數陣殺得氐兵十損七八無敢抵敵直趕至梁山齊萬年計窮力盡驅殘兵回謂孟觀曰趕人不可趕上我今與你死戰擋我者死避我者生言訖飛刀便戰孟觀舉槍便迎不數合氐兵自潰晉兵擁前把齊萬年擒住時孟觀始令鳴金收軍押送齊萬年奏凱回朝次早面君惠帝詔斬萬年于市封孟觀爲大將軍不提十一月賈謐侍奉東宮對太子倨傲甚不爲禮成都王司馬穎入見叱之曰太子乃天下之副汝何得慢因是賈謐懷恨次日入宮見賈後曰成都王勇健過人衆僚有望不若出之鎮外免生內憂賈後曰既如此若出之亦宜有備謐曰封河間王司馬顒爲鎮西將軍使鎮關中以防之賈後曰汝且退吾告聖上爲之是夜賈後以賈謐言告惠帝帝大驚次日詔出成都王司馬穎爲平北將軍令其鎮鄴以河間王司馬顒爲鎮西將軍使其駐關中二王受詔各自之鎮初武帝作石函之制非至親不得鎮關中司馬顒乃安平獻王司馬孚之孫孚乃懿之弟也頤輕財愛士朝廷以爲賢故用之鎮關中也卻說南風淫虐日甚裴頠與賈模及張華議曰皇后淫汙後宮吾奏帝廢之更立謝淑妃爲後此事如何模華曰主上自無廢黜之意若吾等專行之倘上心不以爲然將若之何且諸王方強朋黨各異廢之且禍起身死國危無益社稷頠曰誠如公言然中宮逞其昏虐亂可立待張華曰卿二人于中宮皆親戚言或見信宜數爲陳說倘因之戒庶無大悖則天下尚未至亂吾曹得以優遊卒歲而已於是頠旦夕人說其從母廣成君郭槐令戒諭賈後以親厚太子模亦數爲後言禍福賈後反以模爲敗己而疏之賈模因此得疾憂憤而卒賈後奏惠帝以裴頠爲尚書仆射又詔專任門下事頠雖後親屬雅望素隆四海惟恐其不居權位頗上表固辭或謂之曰君可以言當盡言于中宮言而不從當遠引而去倘二者不立雖有十表難以免矣頠不能從
