body:
  text: 第一一五回周訪楊口破杜曾卻說鄭板等因王敦留陶侃乃與杜曾諸將拒王廙衆心不一攀懼請降於是攀曾降王廙請以兵擊第五猗以自贖罪廙從之自將赴荊州留長史鎮楊口壘竟陵內史朱伺謂廙曰杜曾猾賊也外示屈服宜大部分未可便西廙矜厲自用以伺爲老怯遂行而去荊州杜曾果還攻陷楊口乘勝徑造沔口晉王聞知使豫章太守周訪擊之訪集衆八千進至沔陽使將軍李桓督左甄許朝督右甄自領中軍次日交戰杜曾以衆先攻左右甄周訪自陣後射雉以安衆心傳令其衆曰一甄敗鳴三鼓二甄敗鳴六鼓曾與二甄戰自旦至申兩甄皆敗訪始選精銳八百人自行酒與衆飲之敕不得妄動忽聞鼓音乃進杜曾之兵未至三十步訪遂親鳴鼓將兵皆騰踴奔出八百精銳躍出沖陣曾衆大潰訪追擊之曾兵大敗十傷其七訪追殺至夜諸將請待明日訪曰杜曾驍勇能戰向者吾以計使彼勞我逸故克之若待來日安得勝也宜及其衰乘之可滅也言訖鼓行而進遂定漢沔杜曾走保武當縣而據之王廙始得至荊州以功表知晉王晉王遷訪爲梁州刺史命其屯襄陽又遣使以劉琨爲太尉是年十一月征南將軍司戴邈上疏請立太學其疏曰喪亂以來庫序隳廢議者或謂平世尚文遁亂尚武此言似之而實不然今王業肇建萬物權輿正宜篤道崇儒以勵風化耳晉王覽之猶豫王導亦上曰宜設庫序擇賢子弟並入于學選博學修禮之士而爲之師化成俗定莫尚於此晉王始納之乃令設太學命宿儒師之史說郭璞字景純河東人也好經術博學有高才而訥於言論詞賦爲中國冠好古文奇字深曉陰陽星曆有郭公者客居河東精于蔔筮璞從之受業公以青囊中書九卷與之由是遂洞五行天文蔔筮之術禳災轉禍通致無方雖京房管輅不能過也璞門人趙載嘗竊青囊經未及讀而爲火所焚璞既精通天文及蔔筮之術見惠帝時政出群下乃與筮之知難將作於是避地東南來聞抵將軍趙固會固所乘良馬死惜之憂悶不出府堂璞善能治活乃至門下喚門吏人報吏曰趙將軍因死良馬心憂不樂豈遑迎接賓客乎足下暫退來日相見璞曰敬爲此事而來你可通報我能活馬耳吏驚人通報趙固曰門外有一先生要見將軍我道將軍死馬心下煩惱你可來日相見其先生道他能令此馬再活固曰豈有此人與吾請進吏即出曰將軍在堂請先生人見郭璞進與固相見禮畢固問曰先生高姓貴表願聞大名璞曰學生姓郭名璞乃河東人也聞將軍良馬已死特來醫治固曰馬已死了何以能活璞曰須得健夫二三十人皆持長竹竿往東行三十裏有一丘林社稷者處其中有一神物似獸在於中林巢樹使衆人持竿打拍必得此物將歸能救此馬即活趙固曰若還活得此馬重酬先生言訖使三十餘人依璞所言各持長竿至丘林打拍果獲一獸似猴將歸放馬屍旁此獸一見死馬便噓吸其鼻頃之馬奮起嘶鳴食亦如常其獸忽然不見因此趙固奇之將銀十錠酬謝欲留之璞不從受其酬金複出遊行來至廬江汪吉家借宿開店蔔筮見吉家有一少婢生得嬌美心甚愛之無由而得乃私取小豆三鬥至夜繞吉宅前後撒之不知念甚咒文次日吉早晨出來開門見赤衣人數幹圍其屋汪吉急入內取兵器與衆出來掩殺忽不見心甚惡之乃請璞蔔卦璞投卦曰君家不宜畜此少婢其婢主招邪耳可令人將于東南二十裏外賣之慎勿爭價吾代君書符去捉則妖怪可除也吉從之令人將婢去東南發賣璞密使人將銀去買之時璞與吉書符投于井中數千赤衣人皆反自縛投于井中遂滅其迹吉大悅以錢酬謝郭璞璞出東南取其婢爲妾始渡江南來謁王導導素聞其名深敬重之引爲參己軍事次日王導令其筮江南之事所言皆驗如眼親見因此而薦于晉王曰有一賢土自北而來姓郭名璞乃河東人也通聖好術博學多才上曉天文下識地理諸子百家陰陽曆數蔔筮術數無所不曉現在臣家大王宜重用之晉王曰既有此人何不召來見吾導即使從人召郭璞朝見晉王晉王曰孤聞王導談足下之德敬召以問德政得失何如時陰陽錯謬刑獄繁興璞上疏曰夫寅畏者所以向福怠傲者所以招禍宜蕩除瑕贊陽布德則民仰戴歸心矣晉王納之以璞爲尚書郎其後璞言便宜多所匡益而郭璞性輕易不修威儀嗜酒好色時或過友人幹寶寶誡之曰君貪杯好淫此非適性之道也璞曰吾所受有本根用之常恐不得盡卿乃憂酒色之爲害乎
