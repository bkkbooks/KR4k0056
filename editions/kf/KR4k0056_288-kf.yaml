body:
  text: 第二八五回燕太子慕容寶立初燕王垂先段氏生子令寶後段氏生子朗鑒愛諸姬子麟農隆柔熙寶初爲太子有美稱已而荒怠中外失望後段氏嘗言於垂曰今國步多艱太子非有濟世之才也遼西高陽二王陛下之賢子宜擇一人付以大業趙王麟奸詐強愎必爲國患宜早圖之寶善事垂左右左右多譽之者故垂以爲賢謂後段氏曰汝欲使我爲晉獻公乎段氏泣而退告其妹范陽王妃曰太子不才天下所知吾爲社稷言之主上乃以吾爲驪姬何其哀哉太子必喪社稷范陽王有非常器度若燕祚未盡其在王乎寶麟聞而恨之至是寶使麟謂段氏曰宜早自裁以全段宗段氏怒曰汝兄弟不難逼弑其母況能守先業乎且吾豈愛死但念國亡不久耳遂自殺寶麟以段氏謀廢嫡統無太后道不宜成喪中書令眭邃揚言於朝曰子無廢母之禮漢安思閻後親廢順帝猶得配享太廟況先後暖昧之言乎乃成喪卻說後秦給事古成詵風韻秀雅確然不群每以天下是非以爲己任時京兆尹韋高居母喪慕阮藉之爲人無哀作樂飲酒彈琴詵聞之而泣曰父母之恩厚重天地無以報德反此亂倫吾當以私刃斬此不孝之子以崇風教之明遂持劍欲來殺高高聞懼逃匿終身不敢見詵後秦王興聞知擢爲黃門侍郎六月三河王呂光自即皇帝大位以世子呂紹爲太子國號大涼改元龍飛元年置百官遣使拜禿烏孤爲益州牧烏孤謂使者曰呂王諸子貪淫三甥暴虐遠近翻怨吾安可違百姓之心受不義之名乎留其鼓吹習儀謝而遣之不受其命
