body:
  text: 第一五六回明帝私視王敦營明帝在營密聞近侍報王敦複作亂兵至湘陰帝不與百官計議自密乘巴滇駿馬微行至湘陰探察王敦營寨正觀之際敦營中有軍士出見帝單騎窺伺營寨而軍士見帝顔貌頗不俗疑非常人即入報王敦時敦病正晝寢夢紅日環其營寨王敦驚起曰此必黃須鮮卑取來也帝母荀氏乃燕氏人帝狀類外氏須黃故敦謂黃須鮮卑奴也正欲使人訪察捉之忽軍士入報適間有一人黃須單騎在營外窺探至今未去也王敦曰正是鮮卑奴也急喚傅玩至說與帝狀令其出領五騎各帶利刃追著殺之取得首級來封千戶侯與你五人得令即出各騎駿馬帶長槍利刃領五騎來追明帝明帝見營內紛紜想有人追乃急馳去時馬有遺糞在地帝恐追人察冷熱追著不便取水輒灌之爲冷而走見逆旅賣食老嫗在門首立以趕馬七寶鞭與嫗曰吾將此寶物送與婆婆倘後有騎馬來追者可以此鞭示之道吾去遠也老嫗接鞭在手明帝忙拍馬去俄而傅玩五騎追至問老嫗曰適有一黃須後生並無跟隨之人騎一大馬在此過麽老嫗以七寶鞭示之曰去得好遠失落此鞭在地被我拾得傅玩等認之乃帝之七寶鞭也因此傅玩在此稽留遂久心猶未信因見馬糞在地以手試之糞已冷矣遂信老嫗之言去遠而止不追勒馬而歸明帝僅得免其大難自回轉營去訖傅玩引五騎回營報說明帝去遠追之不及王敦聞知病反加增時沈充錢鳳定謀以宿衛尚多使人上表奏令三番休二時明帝已回宮以溫嶠爲中書令議討王敦王敦使人探知心甚惡之恐其爲明帝謀己乃使人請溫嶠爲左司馬嶠不敢辭乃朝拜明帝辭別帝欲阻之嶠曰陛下休留臣臣自能複返就觀動靜耳嶠即行事敦敦悅之嶠僞爲勤敬乃綜其府事時爲密謀以附其欲結錢鳳爲之聲譽每曰錢世儀精神滿腹嶠素有藻鑒之名鳳甚悅深欲結好會丹陽尹缺嶠言於敦曰京尹咽喉之地公宜自選敦然之問誰可者溫薦錢鳳可錢風薦溫嶠可溫嶠僞辭敦不聽遂使人表用嶠使覘伺朝廷消息時王敦行事不待朝廷應允表人即除朝廷亦不敢逆敦遂使溫嶠爲京尹嶠恐既去而鳳後間之乃因王敦作宴飲嶠餞別酒至鳳鳳未即飲嶠佯醉以手版擊鳳幘墜地作色曰錢鳳何人溫太真行酒乃敢不飲鳳意不樂敦以嶠爲醉而釋之嶠將別拜敦佯爲涕泗橫流出園後複入者再三似不忍離去之狀而行後鳳果謂敦曰溫嶠與朝廷甚密而與庾亮深交今此去未可信也敦曰太真昨醉小加聲色卿何得便爾相讒耶言罷不聽溫嶠既得脫身至建康盡以逆謀告知明帝與庾亮畫策討之王敦聞知嶠泄己之謀大怒曰吾乃爲小物所欺因遣人與弟王導書曰太真別來幾日作如是事當募人擒殺之以拔其舌方息吾丹田一點火耳導以是書見明帝帝乃加導爲大都督領揚州刺史又使溫嶠與將軍卞敦應援郗鑒分督諸軍討敦鑒奏請曰臣等出討望陛下詔臨淮太守蘇峻兗州刺史劉遐等率軍入衛京廷帝然之詔峻遐率兵入城明帝自領禁兵屯於中堂
