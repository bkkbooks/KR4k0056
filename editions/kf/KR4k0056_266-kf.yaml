body:
  text: 第二六三回慕容垂謀複稱燕卻說慕容垂來見長樂公丕丕親自出迎之趙秋密勸垂就座殺丕因據鄴起兵垂不從丕還欲謀襲擊垂當侍郎姜讓諫曰垂反形未著而擅殺之恐非所宜也不如以上賓待之嚴兵衛之密表情狀聽敕而後圖之則可也丕從之乃館垂於鄴西驛令守之垂潛與燕故臣皇甫真等曰今秦王敗於肥水之上其銳氣已墜不能複振吾以計脫身至此以參長樂公爲名來見卿等一面同議中興之策再複燕柞共滅強秦今被苻丕令人監我於鄴西舍不與我去卿等以爲何如皇甫真等曰複燕宜乘此時奈我等皆無兵權不知殿下部下還有多少兵垂曰未上萬人真曰殿下速使人以書往關東使舊將丁零翟斌二人起兵先叛秦王必然詔殿下興兵去討乘此機會可以脫此招集人馬若上十萬以討丁零爲名所過郡邑必然以牛酒郊迎王師因其無備可下諸郡再移書報知各處燕王必然回應待應舉兵向長安大業指日可定矣垂曰然得卿同行事方有成真曰吾若隨殿下去長樂公必疑反爲不美垂曰既如此吾來日就發書與二人就去再當會公言訖辭歸於是垂密使人送書與丁零翟斌令其起兵作亂零斌得書聚二萬餘人騷擾秦境關東守將上表告急于秦王苻堅問文武曰今丁零翟斌謀反文武之中誰人肯去討此跋扈權冀曰國兵新敗京師之衆不可調遣宜固守根本可使人齎詔遣冠軍將軍慕容垂起兵去討可得兩便秦王堅曰如何兩便翼曰慕容垂父子焉肯久爲人臣必有異謀使其討丁零翟斌正如兩虎相鬥必有一傷從其自滅慕容垂滅得丁翟亦好丁翟滅慕容垂亦好此不爲之兩便乎秦王堅曰然於是使驛馳詔書來北鄙詔慕容垂去以兵討丁零翟斌垂得詔並不推辭只道軍糧稀少因此慕容垂謂使人曰卿回朝托煩善言奏知使人去了垂徑將詔書來見苻丕稱主上令其討丁翟之亂以兵符乞兵起行丕猶豫當石越言於丕曰垂有恢復舊業之心今複資之以兵以爲虎添翼者也丕曰垂在此常恐爲肘腋之變吾置之於外不猶愈乎今主上之命焉敢違之思半晌乃以羸兵敝鎧給之又遣苻飛龍率氐騎一千爲副將密戒飛龍曰垂爲三軍之帥卿爲謀垂之將行矣勉之飛龍曰謹領密旨言訖遂統兵行當垂辭丕曰臣欲人鄴拜辭祖廟而去告知殿下丕曰卿今有急不及拜廟火速前去垂見丕不許乃潛服而入亭吏禁之垂怒斬亭吏而去石越言於丕曰垂反形已露可因此除之丕曰淮南之敗垂侍衛乘輿此功不可忘也越退告人曰公父子好爲小仁不顧大計終當爲人擒時丕留慕容農及楷淮紹於鄴爲質垂行離安陽關聞丕與飛龍謀欲殺己因怒激其衆曰吾盡忠於苻氏而苻氏專欲圖吾父子吾雖欲已得乎乃於河內募兵旬日間有衆八千夜襲飛龍氐兵氐兵不備盡被殺之垂以書遺秦王堅言其故而慕容鳳等亦各率部曲歸翟斌會秦豫州牧太原公苻暉領毛當討斌鳳被斌鳳合兵擊敗斬之垂遂濟河焚橋有衆三萬遣人告子農等令舉兵農等遂以晦日將數十騎微服密出鄴奔列人止于烏桓魯利家利爲之置饌農笑而不食利謂其妻曰惡奴郎貴人家貧無以饌之奈何妻曰郎有雄才大志今無故而來必將有異非爲飲食來也君亟出遠望以備非常利從之農笑謂曰吾欲集兵列人以圖興複卿能從我乎利曰死生惟郎家命農乃詣烏桓與張驤說之驤再拜曰得舊主而奉之安敢不起於是即招軍買馬衆至九千人起兵來會合慕容垂
