body:
  text: 第一四一回石勒召封仇人爵卻說後趙王勒乃上党武鄉羯人思欲歸以省親張賓諫之乃止勒乃使人悉召武鄉耆老諸人赴襄國耆老諸人皆至後趙王勒大排筵宴自與耆老論年齒而坐歡飲語及平生無不快活先是石勒未遂時與鄰居李陽常爭麻池叠相毆擊至是李陽不敢來見勒因謂父老曰李陽壯士也何以不來毆麻是吾布衣之恨孤方崇信于天下甯仇一匹夫乎即又使人去請李陽李陽乃至拜伏於地請罪勒喜扶起與其醉謔引陽臂而笑曰孤昔饜卿老拳卿亦飽孤毒手言訖賜甲第一區拜陽爲參軍都尉又與衆曰武鄉吾之豐沛萬歲以後魂靈當遊之耳複以貲帛給賞父老以鄉比豐沛複之三世後趙王勒以民始複業資儲未豐乃重禁釀郊祀宗廟皆醴酒行之於是數年間無複釀酒者慕容廆聞中國無主遣使過海入建康勸元帝即位元帝既登大位以廆忠慎始遣謁者去大棘城以慕容廆爲都督吉平二州諸軍事封遼東公謁者得詔前來棘城封公廆聞知使人迎接入城排香案跪聽披讀詔書受其印綬望南謝恩訖大排宴會款待謁者次日以金寶名馬與謁者還朝以作進貢之物廆乃始立郡以統流亡准冀州人爲冀陽郡豫州人爲成周郡青州人爲營兵郡並州人爲庾國郡於是推舉賢才委以庶政廆始承制除官府置僚屬立子皝爲世子作東賢使皝與諸生同受業廆覽政之暇親臨教之皝雄毅多權略善經術國人稱之因是廆徙子慕容朝鎮遼東以慕容仁鎮平郭而翰撫安民夷甚有威惠
