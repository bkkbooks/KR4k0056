body:
  text: 第二三七回王猛舉兵伐燕國初王猛屢勸秦王務須殺慕容垂堅不肯猛思一計欲害之至是王猛欲令其伐燕也故請垂子慕容令參其軍事以爲向導將行猛自造辭慕容垂垂留飲酒猛從容謂垂曰今當遠別卿何以贈我使我睹物思人垂解佩刀贈之猛受之而辭去至洛陽賂垂所親使詐謂垂使者謂令書曰吾之父子來此以逃死也今王猛疾人如仇秦王亦心難測度東門此來悔悟吾今還東汝可速發令得書疑之躊躇終日又不可審複乃走奔燕去於是王猛上表稱令叛狀垂懼之而忙出走及藍田秦王堅知之遣騎兵追之爲追騎所獲來見秦王堅堅勞之曰卿家國失和委身投朕賢子心不忘本亦各其志然燕之將亡非令所能存惜其徒入虎口耳且父子兄弟罪不相及卿何爲懼過而狼狽如是乎待之如舊垂始安不遁燕人以令叛而複還疑爲反間徙之沙城卻說秦將王猛攻打洛陽洛陽守將武威王築聞知大驚乃使人入朝取救兵燕王暐聞知大驚急使宣太傅慕容評問之評曰陛下高枕無憂臣自遣將點兵拒之言訖評與安樂王臧點起精兵二十萬來救洛陽安樂王臧自新樂發兵一萬人進而屯滎陽猛遣梁成鄧羌擊走之燕州刺史武威王築等俱被猛圍住洛陽內無糧草外無救援及聞臧敗乃開門出城降猛納之安撫軍民乃將兵七千而去留鄧羌鎮金墉以桓殷伐羌戍陝城而還秦王堅因猛伐燕有功以猛爲司徒錄尚書事封平陽郡侯猛固辭曰今燕吳未平戎車方駕而始得一城遽受三事之賞若克殄二寇將何以加之堅曰苟不暫慰聯心何以顯卿謙光之美遂寢尚書司徒之命五月慕容令自度終不能免密謀起兵沙城中謫戍士卒數千人皆厚撫之率以東襲威德城處之諸戍皆應將襲龍城弟慕容麟遂使其下以殺令死之秦王猛督諸軍複伐燕秦王堅送猛於灞上曰今委卿以關東之任當先破壺關平上黨長驅取鄴所謂疾雷不及掩耳吾隨親督萬衆繼卿星發舟軍糧運水陸俱進卿勿以爲後慮也猛曰臣仗威靈奉成算滅殘胡如風掃葉不煩鑾輿親犯塵霧但速敕所司部置鮮卑之所堅大悅而返六月王猛與鄧羌楊安等以兵大進來至壺關守將田明聞秦兵至乃移兵出屯城外次日正在寨中納悶忽報正南上秦兵到了旗下乃大將楊安田明乃令軍大出親與楊安對陣兩軍對圍田明橫槍立馬於陣前秦軍中楊安躍馬而出手執鋼刀厲聲大罵逆賊敢拒天兵田明大怒挺槍躍馬直取楊安兩馬相交戰不數十合田明被楊安一刀砍于馬下燕軍大敗而走安率衆趕散殘兵次後王猛大驅軍馬殺過壺關城所過郡邑皆望風降附因此燕人大震卻說黃門侍郎封孚參問司徒長史車胤曰今秦伐燕事將何如胤歎曰鄴必亡矣吾之家屬今在南平茲將爲秦虜吾驗占越得歲星而吳伐之卒受其禍今福德在燕秦雖得志而燕之複建不過一紀耳史說車胤字武子南平人也恭勤不倦博覽多通家貧無油夏月則取練盛螢火數十以照書以夜繼日而讀及長風姿美朗機悟敏速甚有鄉曲之譽先桓溫在荊州聞名引爲主簿稍遷征西長史朝廷知名又遷司徒長史又善於宴會每盛坐大宴而胤不在衆嘉賓皆雲無車公不進矣又善天文是時秦兵伐燕封孚故以問之後果應其所言九月秦將王猛進兵潞州時燕王使太傅慕容評以四十萬兵至先立大營而謂諸將曰燕兵雖衆而勇猛不及秦軍秦軍雖精壯而糧草不如吾兵彼軍無糧利在急戰吾兵有靠宜且緩守今猛懸軍深入不如持久待其糧盡而擊之則秦兵自敗矣汝等各使軍人守住險隘不許有失時燕王聞知使人催戰
