body:
  text: 第一七六回石虎殺劉後石堪石虎既自爲相以舊臣皆補散任虎之親黨者皆居要職勒太后劉氏謂彭城王石堪曰先帝甫晏駕未久而丞相遽相淩藉如此將若之何堪曰宮省之內無可爲者請奔兗州舉兵誅之言訖辭太后微服輕騎以兵百人襲兗州不克南奔譙城石虎聞之遣將軍林因率兵五千追而獲之解還襄國虎大怒執太后劉氏及石堪殺之文武暗嗟莫敢誰何太后劉氏有膽略佐勒建功業有李後之風時石生鎮關中石朗鎮洛陽聞勒死石虎爲變殺太后及彭城王各舉兵二萬討虎石生遣使降晉而蒲洪西附張駿石虎乃自率兵攻朗朗與虎交鋒被執斬之虎乘勝向長安來攻石生石生麾下將吏叛斬生降虎關中既平虎遣麻秋領其兵去討蒲洪洪懼來降虎說虎徙關中豪傑及氐羌以實東方虎從之徙十萬余戶於關東以洪爲龍驤將軍流民都督居枋頭以弋仲爲奮武將軍西羌大都督居躡頭虎自還建魏台如魏武輔漢故事卻說慕容皝初嗣位用法嚴峻國人不安主簿皇甫真切諫之不聽皝兄翰庶母弟仁皆有勇略屢立戰功得志有寵於紞皝忌之遂有相圖之意翰知乃與子出奔段氏段遼素聞其才甚愛重之慕容仁據平郭皝遣兵去討大敗而還於是仁遂有遼西之地段遼及鮮卑皆應之皝無奈彼何追思真言以真爲平州別駕卻說段遼得慕容翰甚愛重之翰亦傾心吐膽說皝國中虛實因是段遼遣其弟段蘭與慕容翰領兵二萬共攻柳城二人領命引兵起行來攻柳城慕容皝聞之以慕容汗爲將點兵一萬來救與蘭軍相遇交戰汗軍大敗而還蘭欲乘勝追之翰恐遂滅弟國乃止之曰吾與君受命之日只求其捷若貪進取敗有何顔面不若罷之蘭曰此追則汗已成擒矣時卿慮遂滅弟之國耳翰曰吾投身相依無複還理國之存亡與我何有但我爲大國計乃命所部欲獨還蘭不得已從之回兵來見段遼遼喜重賞二人
