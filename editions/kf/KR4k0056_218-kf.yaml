body:
  text: 第二一五回魏王冉閔圍趙王二月魏王冉閔親率大軍二萬圍趙王石祗于襄國趙王祗大驚調兵固守城池閔驅士卒攻百餘日不下祗危急乃去帝號稱王遣太尉張舉乞師于燕許送傳國璽於雋張舉去訖又遣將軍張春求救于姚弋仲春奉命見弋仲稱趙王求之事弋仲從之遣子姚襄領兵一萬五千去救襄國臨行弋仲戒曰冉閔寡仁背義屠滅石氏我受人厚遇當爲複仇病不能自行故命汝去汝才十倍于閔若不能成擒必不復見我也襄拜領其言即領兵前去卻說張舉至薊城次日入見燕王雋稱石祗說乞師退魏兵及許送傳國玉璽之事雋大喜即使悅綰將兵一萬去救襄國魏王聞知大驚亦使中郎將常煒至燕見雋議抽兵勿救於趙亦許送璽雋乃使封裕詰璽所在裕問煒曰前日趙使張舉來說玉璽在襄國今子至又道玉璽在汝鄴子言詐乎煒曰璽實在鄴公能奏過燕王抽兵回國吾欲即將送至燕王雋曰張舉言在襄國何也煒曰彼求救妄誕之辭也大王豈可信之也雋乃又使裕私誘煒煒辭不變左右文武請殺之雋曰彼不憚殺身以救其主忠臣也使人引出就館安下又使其鄉人往勞之且曰君何以不實言璽之所在燕王怒欲處君於遼羯之地奈何煒曰吾結髮以來尚不欺布衣況大王乎曲意苟合性所不能直情盡言雖役東海不敢避也遂向壁不復言雋聞其言乃囚之于龍城後既知張舉之妄乃殺舉而釋常煒之囚三月姚襄及趙汝陰王石琨各引兵來救襄國二處之兵長驅而進魏王冉閔聞知有救兵至大驚即忙遣將軍胡睦引兵一萬至長蘆拒姚襄孫威引兵一萬出黃丘拒石琨胡睦至長蘆被姚襄用火攻殺敗而回孫威至黃丘被石琨用伏兵計殺敗而還魏王閔見二將敗還大怒喝退欲自出擊之衛將軍王泰諫曰今襄國未下外救兵雲集若我出戰必腹背受敵此危道也不若固壘以挫其鋒徐觀其釁而擊之可也言未畢忽道士法饒進曰太白入昴當殺胡王大王若出百戰百克不可失也閔信其說攘袂大言曰吾戰決矣敢阻吾者斬言訖乃悉衆出戰時襄琨合兵來攻次日兩下交兵大戰未見勝負忽燕悅綰適以燕兵至聞二處交兵乃驅士卒于魏陣後隔數裏疏布騎卒曳柴揚塵以恐魏兵魏兵望之疑有伏兵懼欲退兵襄琨揮軍追戰悅綰以軍攔擊趙王石祗見救兵到亦引兵出城後沖之因是魏兵大敗閔與十餘騎出垓心走還鄴城魏之將士死者十余萬人趙王得三處救兵至得解其危即備牛酒勞軍及重賞二將而去留汝陰王石琨同保襄國卻說姚襄還人見其父弋仲弋仲問獲得冉閔否襄告閔走回鄴城弋仲怒責其不擒冉閔喝左右將襄杖一百襄被責忍痛而退卻說閔之爲趙相也所徙者以雍荊之民及氐羌蠻數百萬口以趙法禁不行各還本土道路交錯互相殺掠其能達者十有二三中原大亂因以饑疫人人相食無複耕者趙王祗聞之遣其將劉顯率兵四萬人攻鄴兵未至鄴魏王閔已使人探知乃集諸將率衆出屯城外預先伏步卒五千人於穀中以待顯至劉顯自恃志意不以閔爲懼驅士卒直抵城外只隔十裏之程閔見其兵謂衆曰今劉顯遠來必待食以我逸之衆而攻彼勞之兵可獲劉顯料必無難諸將踴躍稱善遂揚聲播鼓躍武驅兵出戰顯果無備被閔一擊大敗而退五裏伏兵大起被閔擊斬首三萬餘級顯走還又被穀中埋伏之兵出殺回拒恐不能走心中大懼乃密遣心腹人去清降閔不允顯使人去求殺趙王祗以自救閔始從之乃引兵還鄴遣人抽回伏兵與歸顯方得脫引殘兵回趙去訖卻說秦王健分遣使者問民疾苦搜羅雋異寬輕重之稅施離宮之禁罷無用之器去侈靡之服凡趙之重刑不便民之政皆除之四月杜洪遣使召梁州刺史司馬勳起兵擊秦使人直抵梁州告勳勳大悅即率步騎兵三萬赴之秦王健已知乃遣梁安領軍五萬禦之于五丈原兩軍交戰勳不能勝相持十數日勳屢敗乃退歸南鄭秦王健恨長史賈玄碩始者不上尊號銜之至此計使人告玄碩與勳通謀收而殺之卻說劉顯自攻鄴敗還歸趙與部伍謀以兵夜攻入內弑其趙王石祗而自立爲趙王以統其衆是以魏徐兗荊洛諸州複歸於晉室
