body:
  text: 第八十五回賈疋複晉取長安卻說安定太守賈疋字音龍與馮翊太守索綝字安夷護軍麹允盡散家財召募義兵謀複晉室旬日間募得義兵五萬來取長安時雍州刺史麹持聞索綝興義兵亦率衆十萬會之同攻長安劉曜大驚急使劉粲以兵五萬屯新豐自以大衆出黃丘正遇索綝之軍至兩下各立陣腳晉陣麹允出馬陣前大罵曰戎犬擋吾者死避吾者生惱得劉曜性發親自持刀拍馬走出陣前更不打話直取麹允二人交戰十餘合不分勝敗索綝揮軍夾攻劉曜抵敵不住撥開兵器勒馬望本陣而走索驅軍掩殺漢兵大敗死者大半時劉粲在新豐不能接應及聞劉曜兵敗忙引兵來救又被麹持麹允殺敗而逃粲兵亦損去大半而還因此義兵之勢大振關西胡晉之兵翕然回應閻鼎在密聽知索綝等在長安謀複晉室乃奉秦王業入關來據長安以號令四方共討劉聰其荀藩周顗等皆山東人不欲西行至中途逃散周顗逃奔江東獨鼎領衆保秦王業至藍田使人告賈疋疋發兵五千迎之入於雍城使梁綜以兵一萬衛之疋複同綝允等墳長安
