body:
  text: 第二一一回冉閔監主殺胡羯卻說趙王石鑒既即大位其兵權盡屬石閔李農二人而鑒坐立不安乃密謂樂平王石苞曰閔農二人欺朕太甚慶賞刑律皆非朕意卿若能率部下討之必以其位封汝苞諾而出即點部下五百人各持兵器于夜攻閔府石閔已知使府內衛兵堅閉不出苞欲放火焚燒恐延及宮殿攻不克而還趙王鑒懼僞若不知者夜欲殺閔召將軍孫伏都劉銖等入曰閔農二人甚實倡狂朕欲討之故使樂平王苞去攻卿等若懷忠義亦宜戮力討之伏都劉銖等曰臣等亦結有羯士三千欲誅閔農久矣未得尊旨莫敢自行既陛下欲誅此跋扈吾即討之鑒曰卿好自爲之勿慮無報也於是伏都等出宮率二千人攻閔農其時石閔被石苞所攻不克而去已知石鑒之謀見又遣孫伏都劉銖來攻乃急漏夜召集諸將士卒各披挂俟遣用而謂李農曰今石鑒遣孫伏都石苞等攻我只有先下手爲強奈六軍大半羌胡羯人怎肯從吾君有何謀可急施之農曰大權在明公掌握孰敢不從可遣偏將軍王簡領甲士五千先入宮守住石鑒不與其出入亦不許百官入朝下令於城中曰孫劉構逆反黨伏誅良善一無預也今日以後與公同心者留不同心者任所之門不禁去者任其所之顧者別同討滅石氏然後盡誅羯氏明公自取大業有何不可閔曰將軍良策符合我心於是二人計議已定吩咐王簡諸將各領計而行計排已定孫伏都劉銖率羯士三千人來攻石閔大開府門驅甲士一擊殺死羯士三千不留一人伏都劉銖亦被閔斬之孫劉既死王簡領兵入宮圍住趙王石鑒鑒私逃入禦龍觀王簡亦率衆守鑒於禦龍觀石閔懸食給之乃下令於城中曰羯賊縱暴戕刈百姓今將滅之願同心者留不願者任從其行於是趙人百里內悉入城胡羯去者填門競出閔農知胡之不爲己用遂率趙人誅胡羯無貴賤男女少長皆斬之死者二十余萬其有屯戍四方者閔皆命趙人爲將帥誅之其有高鼻多須至有濫死者又何止十余萬人卻說燕王雋聞石氏內亂乃遣人來見涼王張重華約會擊趙重華許之
