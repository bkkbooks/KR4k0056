body:
  text: 第三八回劉裕起兵討桓玄時桓玄聞謝景仁之才名乃宣見謂文武曰司馬庶人父子雲何不取遂令景仁年三十而方爲著作郎耶因而言訖以景仁爲中兵參軍景仁謝恩群臣始散卻說桓修聞玄即位乃同劉裕來建康至次日入朝見玄拜舞已畢桓玄大喜乃以修爲撫軍大將軍劉裕爲中軍參軍就命二人起兵東征盧循修裕二人謝恩出外即日起行還京口起兵次日桓玄設朝乃謂司徒王謐曰昨見劉裕風骨不凡蓋人傑也朕錯用之以東征王謐奏曰陛下龍眼不舛劉裕叛心無有陛下何思何慮也玄曰卿言亦是於是罷朝玄乃退入後宮見皇后劉氏說及命劉裕東征之事皇后劉氏有智鑒謂玄曰吾前日在殿后觀見劉裕朝陛下其人龍行虎步瞻視不凡恐後不爲人下不如早除之以免後患也玄言曰吾方欲定中原非彼莫可用者俟關河平定然後別謀之耳後曰其事亦未可泄漏也卻說劉裕與桓修至半路入見修以稟修還京口托以金瘡疾痛不堪步從請將軍先行容瘥來趕修聞說言曰既如此你可從船上來趕我言訖修乃即先行於是劉裕出外乃與何無忌一同乘船回京口意欲商議建興複之計因謂無忌日吾欲誅桓玄迎晉帝以安天下君有何策可以教之無忌曰可陰結義士托以遊獵爲名傳說受晉帝密詔討桓玄待衆集計定先斬桓修以徇義軍然後大驅衆士天下誰不服從爲我而殺玄也裕曰其計甚善怎奈無人堪與吾共大事者無忌曰有一人與君同姓名毅乃是彭城沛人也字熙樂少有大志因見桓玄篡位常懷不平若此人同舉義兵則大事成矣現居京口裕曰既然如此你可與其說知令其同舉義兵無忌日可耳因是二人同舟回至京口上岸各自回室安歇次日劉裕令人召何無忌至謂曰昨日之謀極妙宜速爲之君言京口劉毅勇而有謀我欲與他同舉義兵未知其人意下如何你可往說之令其招兵無忌日吾即往說之言訖即行來見劉毅毅聞何無忌至出門前迎入到草廳之上各施禮畢分賓主而坐無忌佯爲欷欺潸然出涕不已劉毅問曰公何故淚耶無忌日晉室不幸罹桓玄之篡吾乃晉臣意欲興義兵討此跋扈恨無人戮力相成是以淚耳毅曰吾亦有不平之鳴無忌曰桓氏強盛其可圖乎毅曰天下自有強弱正患無英才之人耳故患無人可爲盟主無忌日天下草澤之中非無英才也吾推一人未知合君意否毅曰你且莫說待我說出一人與公看相合否也無忌曰你且說甚人毅曰依我所見惟有劉下邳公意亦此人否也無忌鼓掌而笑答曰吾主意亦是此人毅曰既我二人心合你可說劉下邳邀其同舉義兵無忌日吾先去參說你可隨後來同議言訖辭還具以毅言告裕裕乃大喜即令無忌去請毅至相見禮訖三人定謀聚合義徒一百餘人以候大舉甲辰三年時有平昌孟昶爲桓弘主簿從建康還家裕往問之曰草野當有英雄起兵討桓玄卿願聞乎昶曰今日英雄有誰正當是卿耳於是裕請其同往見毅無忌與其相會於是昶及裕弟道規諸葛長民等相與合謀起兵時道規爲桓弘參軍裕使毅說道規昶共殺桓弘據廣陵起兵長民爲刁逵參軍使其殺刁逵據曆陽起兵各自領計去訖無忌夜草起兵文其母密窺之泣曰吾不及東海呂母明矣汝能如此吾複何恨當劉裕以百餘人托以遊獵與無忌合收徒衆得二百餘人詰旦京口門開無忌著傳詔服稱敕使居前徒衆從之齊入即斬桓修以徇義兵遂出榜安民無忌等共推裕爲盟主裕問無忌日急須一府主簿何由得之無忌日無過劉道民道民者東莞劉穆之也裕曰吾亦識之即馳信召焉穆之聞京口歡噪之聲晨起出陌頭適與裕會直視裕者久之返室壞布裳爲褲往見裕裕曰始舉大義須一軍吏甚急卿謂誰堪其選穆之曰倉猝之際略當見無逾於我者裕笑曰卿能自屈吾事濟矣即以穆之爲坐署主簿
