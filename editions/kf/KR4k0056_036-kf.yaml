body:
  text: 第三十五回趙王司馬倫執權卻說趙王司馬倫既廢賈後及誅張華等乃自專國政總握兵權自爲相國以孫秀爲侍中時百官俱聽命於倫而倫素曠達無智策複受制於秀於是孫秀威權震於朝廷天下皆事秀而無求於倫卻說孫秀乃琅訝小吏累官于趙國以諂媚自達秀既執機衡遂恣其奸謀多殺忠良以逞私欲於是京邑君子不樂其生秀之諸黨皆登卿相並列大封其餘同謀者皆超階越次不可勝紀至於奴卒廝役亦加以爵位每朝會貂蟬盈座故人爲之諺曰貂不足狗尾續而秀以苟且之惠取悅人情府庫之儲不充於賜金銀冶鑄不給於私故有白版之侯君子恥服其章百姓亦知其不終矣孫秀既立非常之事司馬倫愈敬重焉當孫秀人見趙王倫曰斬草不除根萌芽依舊發今賈後雖廢爲庶人猶在金墉若不剿除後必爲患殿下可速矯詔誅之趙王倫曰卿計正合孤心你可密地使人持詔殺之於是孫秀乃僞詔使王全齎金屑酒來金墉殺賈後使者領命到金墉入內請賈後跪聽宣詔賈後不聽王全開讀其詔曰賈氏專權廢弑皇太后無婦之道謀弑皇太子無母之慈禍亂國家淫惡昭著至忠之臣見遭誅戮讒佞之輩反授權柄致使天下之人謗朕不君謂天地所厭人神共怒今賜金屑酒一壺賜其自盡勿得推故賈後雖不肯跪然耳聽其宣讀聽訖大罵趙王司馬倫逆賊將酒飲之而死王全收斂方始還都報知趙王司馬倫倫大悅重賞王全
