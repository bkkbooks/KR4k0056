body:
  text: 第一二四回劉約死去複還魂卻說漢主聰子劉約死去一指尚溫遂不敢殯殮忽然蘇醒對宮人言見祖父劉元海於不周山經五日複從至昆侖山三日而返於不周山見諸王公卿將相死者悉在宮室宮室甚是雄壯號曰象珠離國當元海謂約曰東北有遮須夷國無王久待汝父爲之王耳汝父後三年當來來後中國大亂汝且還後年當來見汝不日約拜辭而歸道遇一猗尼渠余國國王引約人宮與約皮囊一枚曰與吾遺漢皇帝因謂約曰劉郎後年來必見過當以小女相妻約歸置皮囊於幾上俄而蘇起使左右去幾上取皮囊開之有一方白玉題文曰猗尼渠余國大王敬信遮須夷國大王歲在攝提當相見也劉約馳將此玉呈上聰看及見元海之言一一奏上漢王聰聽此說大悅曰吾不懼死矣後聰死果將此玉同葬焉時東宮鬼哭赤虹經天或奏曰上下當爲三分願陛下早爲之所漢王弗聽怒入後宮悶悶不已遂寢疾遣使征劉曜石勒受遺詔輔政二人皆固辭不至於是聰乃以劉曜爲丞相領雍州牧石勒爲大將軍領幽冀牧上洛王劉景濟南王劉驥並錄尚書事以靳准爲大司空皆叠奏事次日將危召太子劉粲並靳准入臥所流涕滿面囑以後事准亦涕泣曰陛下善保龍體不須煩惱聰曰朕今日不豫以太子托卿卿宜盡忠王室不懷二心准叩頭曰臣安敢不竭股肱之力效忠貞之志陛下將息龍體臣等必盡犬馬之報是夜聰崩計在位九年改元者三宮人報知太子太子與百官舉哀發喪已畢靳准與群臣扶太子劉粲登位爲漢主俱各山呼萬歲君臣禮畢國號大漢漢王封靳准爲大將軍錄尚書事一應軍國大事皆決于靳准漢主粲晨夜烝淫奸宿劉聰之後靳氏宣氏樊氏王氏等妃此五皇后皆年未滿二十並有國色故粲貪烝不出理政靳准見漢王粲淫亂無道陰有異志私謂粲曰邇聞上洛濟南諸王欲行伊霍之事陛下宜早圖之粲信之使人收劉景劉驥殺之粲遊宴後宮軍國之事一決於准
