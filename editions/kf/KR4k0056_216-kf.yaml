body:
  text: 第二一三回燕王擊趙拔薊城卻說燕王慕容雋與慕容霸慕容輿將兵二十萬分三道出塞以伐趙趙守將皆走雋遂拔薊城集諸將欲悉坑其士卒慕容霸諫曰坑之不可趙爲暴虐王興師伐之將以拯民於塗炭而撫有中州也今方始得薊而坑其士卒恐不可以爲王師之先聲而求大功之首務雋乃釋之遷徙其都於薊城時中州士女相繼而至雋撫納之次日又催軍至范陽太守李産欲引兵爲石氏拒燕而衆兵莫爲其用燕率兵入城令長出降雋納之悉置幽州郡縣守宰乃引兵還薊卻說魏王冉閔先以讖文改姓李氏至是複自姓爲冉氏因以李農爲太宰錄尚書事遣使持節赦諸軍欲以爲己用諸軍皆不從初趙故將麻秋爲苻洪所獲以爲軍師將軍秋說洪曰冉閔石祗方相持中原未可平也不如先收關中基業已固然後東征天下洪然之麻秋身雖歸洪而心欲自立乃思謀以鴆匿於酒饌中請洪赴宴飲食之待洪死以並其衆謀排已定令人請苻洪洪果至因飲酒中毒而歸將死急呼其子苻健入臥榻前囑之曰吾今日因麻秋所請赴宴飲酒中毒恐必難起吾所以未入關者以爲中州可定今不幸爲豎子所害中州非汝兄弟所能辦我死汝即率衆入關言終而卒健大哭收葬其父使人收麻秋斬之以祭父魂健代統其衆乃去王號稱晉征北大將軍官爵遣使入建康告喪請命卻說新興王石抵鎮襄國趙之舊臣公侯伯尉因石閔滅胡羯皆逃奔襄國勸石祗即位於是祗即皇帝大位改元永寧以姚弋仲爲右丞相待以殊禮弋仲子襄雄略多才只以爲驃騎大將軍又遣使以苻健爲鎮南大將軍祗既稱帝諸夷據州郡擁兵者皆應之卻說魏王冉閔既登大位士民未附乃謀將李農殺之遣使持首臨江告晉曰逆胡亂中原今已誅之能共討者可遣軍來也朝廷莫辨真僞不應五月卻說王朗聞趙亂乃自卒衆離長安以赴洛陽其司馬杜洪反即自稱晉征北將軍以據長安時西夷夏衆皆應之當苻健欲取之未暇乃先治宮室於枋頭課民種麥示無西意既而自稱征西大將軍都督關中雍州刺史與諸將議謀悉衆而西以魚遵爲前鋒引兵五千爲浮梁以濟孟津又遣弟輔國將軍苻雄率衆五千自潼關入遣兄子苻菁領衆七千自軹關入臨別健謂菁曰若汝不捷汝死河北我死河南不復相見既濟汝可焚橋吾自率大衆隨苻雄而進言訖菁引衆相辭而去健亦起兵而行卻說魚遵既爲前鋒率衆伐木起造各處浮橋苻雄以五千衆打破潼關時杜洪聞苻健率兵自潼關來急遣張先領五千軍來潼關迎戰兩軍會戰於潼關之北張先失地利大敗走還長安杜洪大懼分兵固守長安不敢複出
