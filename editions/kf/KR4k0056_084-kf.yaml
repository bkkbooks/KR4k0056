body:
  text: 第八十一回司馬睿招百六掾是時海內大亂獨江東地面差安中國士民避亂者多南渡江從之鎮東司馬王導說琅邪王睿曰今天下大亂殿下宜招其賢俊與之謀事可禦群凶也睿曰然於是從之招納忠賢得掾屬百餘人故時人謂之百六掾刁協字玄亮渤海人也少好經籍博聞強記琅邪王睿以爲長史卞壺字望之濟陰人也壺弱冠有名譽轉遷禦史中丞睿以爲司馬庾亮字元規美姿容善談論睿以爲西曹掾賀循字彥先會稽山陰人也言行進止必以禮讓睿以爲安東將軍周訪宇士達汝南人也少沈毅謙而能讓睿以爲參鎮揚烈將軍與兵一千二百令其屯于潯陽又得陳煩陶侃甘卓數十人皆相附焉睿既承荀藩之檄承制署置獨江州刺史華鐵及豫州刺史裴憲二人不從其命睿大怒使人命王敦甘卓周訪合兵去擊裴憲華軼憲鐵聞王敦甘卓等來二人乃合兵來迎次日兩軍相遇大戰三十餘合軼憲之衆大敗而走華軼被周訪追及斬之裴憲單騎逃走幽州其從盡被王敦殺散鳴金收軍入城屯住遣人報知琅邪王王得捷音大喜以甘卓爲湘州刺史周訪爲潯陽太守又以陶侃爲武昌太守命王敦總督其軍七月大司馬王浚在幽州設壇告類立皇太子稱受中詔承制封拜備置百官列置征鎮自領尚書令告類如泰誓武王伐商王制言天子將出皆雲類於上帝
