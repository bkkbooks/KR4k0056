body:
  text: 第二八七回魏王舉兵大伐燕卻說魏王珪潛使叔孫建于栗磾以兵五千先去開韓信故道自率大軍共四十萬南出馬邑大舉來討後燕王慕容寶旌旗絡繹二千餘裏鼓行而前人馬皆驚軍至界首始傳詔右將軍封真引兵二萬從東道襲幽州真得詔領兵望東道而去九月戊午魏大軍至陽曲魏王引諸將上西山觀晉陽不遠即下山大驅軍馬進發後燕並州牧遼西王慕容農使人打探聞魏王珪起傾國之兵五十萬從晉陽而來慕容農大驚乃引衆出戰不勝棄城走還中山魏王珪率兵入屯並州至冬十一月驅兵又行大軍已至真定真定守宰陳人皆出投降益助糧草魏王軍威勢大聞者皆驚自常山以東守宰或棄城奔竄或詣軍門拜投因之燕之諸郡皆望風附魏惟中山鄴信都三城不下爲燕死守時天寒冷魏王傳詔令六軍權屯休進以待來春因此諸軍皆據城而屯住魏王珪軍至晉陽慕容農以兵出與魏軍戰敗投奔司馬慕輿嵩司馬慕輿嵩私降于魏閉門拒農農大泣遂東走還魏獲其妻子燕軍盡沒農獨與三騎逃回中山魏遂取並州初建台省置刺史尚書郎以下官悉用儒生爲之故凡土大夫詣軍門者皆引入存慰使人人盡言少有才用鹹加擢敘以張恂等爲諸郡守招撫離散勸課農桑燕王寶聞魏軍將至與百官議於東堂苻漠曰魏軍勢大若縱之直入則吾軍不能敵也宜據險以拒之眭邃曰魏多騎兵馬上齎糧不過旬日宜令郡縣聚民千家爲一堡清野以待之彼不過六旬食儘自退而走矣封懿曰魏兵數十萬民雖築堡不能自固是以聚兵及糧以資之也且動搖民心示之以弱不如阻關拒戰趙王麟曰魏鋒不可當宜先守中山待其敝而乘之於是寶命修城積粟爲持久之備悉以軍事委麟拒魏初魏王珪使冠軍將軍于栗磾潛從晉陽開韓信故道自井陘趨中山進攻常山拔之郡縣皆降惟中山鄴信都三城爲燕守珪命東平公儀攻鄴冠軍王建攻信都珪自進攻中山既而謂諸將曰中山城固急攻則傷土久圍則費糧不如先取信都然後圖之乃引兵而南軍于魯口高陽太守崔宏不敢出拒奔走海渚珪素聞其名使吏兵追獲以爲黃門侍郎與張兗對掌機要創立法度制律令屈遵降以爲中書令出納號令兼總文誥卻說魏東平王拓跋儀奉珪令以兵二萬來攻鄴燕范陽王慕容德曰敵衆我寡彼強我弱何以迎敵諸將曰拓跋儀自入吾境屢獲大勝必謂吾不敢動儀來遠涉艱難士卒疲病可選精銳夜攻擊之可擒儀矣德然其計使南安王慕容青等以兵一萬五千人去擊魏兵至更儀兵至鄴北十裏內正安營青兵馳入混戰魏兵大亂自相踐踏殺死者五六千人儀大敗走還魏東平王儀既攻鄴被燕范陽王德使南安王青等夜攻破之以軍遠屯新城青等使人請添兵追擊之別駕韓訁卓曰古人先計而後戰魏軍不可擊者四懸軍遠客利在野戰一也深入近畿屯兵死地二也前鋒既敗後陣方固三也彼衆我寡不敵四也我軍自戰其地動而不勝衆心難定城隍未修敵來無備不如深溝高壘以自固待其師老然後擊之德從之召青等引兵還城丁酉正月晉帝加冠軍王珣爲尚書令王國寶爲左仆射二月魏賀訥聞儀兵敗遣弟賴盧率兵二萬來會東平公儀攻鄴賴盧自以王舅不受儀節度儀司馬丁建陰遣人與燕通建從內而間之因此二人不和會賴盧營失火建乘間謂儀曰賴盧燒營爲變矣儀懼遂引兵而退賴盧亦退建率衆來見德降燕且言儀師老可擊於是范陽王德以兵漏夜追擊儀兵大敗十損其七退屯別地三月魏王珪詔令大軍並進攻中山使冠軍將軍王建左軍將軍李粟率兵五萬去攻信都又使東平公拓跋儀率兵五萬複攻鄴都三將臨行魏王珪謂曰信鄴桑棗之木乃生民之本不可傷伐留與養命三將得詔語各領部兵依詔前去時中山饑甚戊午日魏大軍至鉅鹿之柏離塢次二日六軍都至滹沱水因雨大不堪進兵就傍岸安營卻說後燕王慕容寶聞魏兵屯於滹沱水邊傍岸下營急與文武商議文武曰今吾聞魏軍屯於滹沱水邊其勢易攻正當乘其勞頓今晚領傾國之兵去劫其營攻其無備彼退又有水阻不能還可令其三軍盡爲魚矣則拓跋珪亦成擒耳燕王寶曰此計甚妙於是燕王寶傳詔令六軍文武俱各披挂至夜去劫魏營大軍十萬人文武盡依計而行是夜月明如晝燕王寶以軍二十萬俱各出城驅馳將到魏營燕王寶命鳴鑼擊鼓喊殺連天殺入魏營魏兵果無準備自亂混戰殺散魏王珪在中軍聽得喊聲大起鼓噪喧天知是燕兵劫寨急忙起來不及衣冠蓬頭跣足親自擊鼓聚集衆將俄而左右及諸軍將士稍集傳令張兗排設奇陣點起火把高照營內張兗叔孫建等分頭縱騎沖出正遇崔逞交馬一合便把崔逞殺去其餘燕軍見有準備俱各亂退不分隊伍被魏王揮兵掩殺殺得燕兵都棄刀槍各自逃生燕兵大敗燕王寶收軍走還中山魏王珪六軍獲得器械十數萬捉得崔逞閔亮二人二人請降魏王赦之而受其降初燕清河王會表求赴國難而無行意遣將軍庫宥官偉餘崇將兵五千爲前鋒偉屯兵盧龍近百日會不發崇等不敢行燕王寶怒使人切責之會不得已以治行簡練爲名複留月餘偉使輕軍前行通道且張聲勢諸將皆畏避不欲行餘崇奮言曰今巨寇滔天京都危迫匹夫猶思致命以救君父諸君荷國寵任而更惜生乎若社稷傾覆臣節不守死有餘辱諸君安居於此崇請當之偉給步騎五百人崇至漁陽遇魏兵擊卻之衆心稍振會始乃上道至是月始達薊城魏王圍中山既久城中將士皆欲出戰高陽王隆曰拓跋珪雖獲小利然屯兵經年士馬損傷大半人心思歸諸部離散若因我之逸乘彼之衰往無不克如持重不決將士氣喪事久變生雖欲用之不可得也寶然之獨趙王麟每阻其議隆成列而罷者數四衆大恨麟麟以兵劫北地王精使率禁兵殺寶精以義卻之麟怒殺精出奔西山依丁零餘衆於是城中震駭寶恐麟奪合軍據龍城乃召隆及遼西王農謀走保龍城隆曰今欲北遷亦事之宜然龍城地狹民貧若以中國之用取足於中難望有助若節用愛民務農訓兵數年之中公私充實而趙魏之間厭苦寇暴民思燕德庶幾返旆克復故業如其不能則憑險固自守亦足以優遊養銳耳寶然之遂夜與太子策及隆農等率萬餘騎出赴會軍城中無主百姓惶惑魏王珪聞知寶走了欲夜入城將軍王建志在擄掠乃言恐士卒盜府庫之物請俟明旦珪乃止燕開封公詳欲走未行城中立以爲主閉門拒守魏王珪率衆攻之不拔使人臨城諭之士庶皆曰群小無知恐複如參合之衆故苟延旬月之命是以不降耳魏王珪顧王建大罵而唾其面複令攻城
