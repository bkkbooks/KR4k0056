body:
  text: 第二七三回姚萇執縊秦王堅卻說姚萇與伊詳率大隊人馬來到新平吳忠將苻堅擒至解見姚萇姚萇謂苻堅曰陛下平素英雄今日如何被人所執可將傳國玉璽授我免汝今日之死秦王苻堅嗔目叱萇曰傳國玉璽已送還晉矣不可得也你若殺吾願求快刀姚萇又曰今陛下何不效爲堯舜禪位於我我必以善待陛下不亦善乎秦王苻堅曰吾無仁讓汝無德受聖賢之事奈何擬之耶吾求先死汝休得饒舌姚萇見苻堅不屈使人將秦王苻堅于新平佛寺縊殺之堅時年四十八歲在位二十七年中山公苻詵及張夫人並自殺死伊詳吳忠二人因勸姚萇上尊號姚萇始自立爲後秦王改元白雀二年萇以伊詳爲丞相以吳忠爲大將軍屯于新平卻說晉會稽王道子專權讒諛孝武帝疏放舊臣太保謝安恐爲所讒思以遠害之計次日乃入朝奏于武帝曰廣陵饑困不時作亂臣請出兵鎮撫之孝武帝曰卿乃國之元老朕欲委以朝政不可遠離朕使別將去守之安曰會稽王道子有公輔之量必能安撫社稷何用臣爲因此孝武帝不得已與兵二萬與謝安出鎮廣陵卻說謝安出鎮廣陵造築新城領家屬盡來居之又築埭於城北偶及疾篤喚子孫謝琰謝琨至臥所謂曰昔桓溫在時吾嘗懼不全忽夢乘桓溫之車行十六裏見一白雞而回吾想乘溫輿者代其位也行十六裏止者今經十六年也白雞主酉今年太歲在酉吾疾不必起也汝等盡忠王室勿懷異心負吾所志言訖而薨於是謝琰等合室舉哀收殮埋葬使人入報於朝廷孝武帝聞知謝安已薨乃下詔諡曰文靖公先是築新城又築埭于城北後人追思之取名爲召伯埭卻說孝武帝見太保安薨乃以會稽王司馬道子錄尚書事孝武帝朝夕與道子蒱酒食肉不理朝政百姓無不怨之卻說長樂公苻丕守鄴被後燕慕容垂所攻走出西赴長安入至晉陽使報至長安不守秦王苻堅已死苻丕號啕大哭而爲發喪徐成等上言曰既秦王崩世殿下宜即大位以安衆心收集散亡之卒而舉中興丕從之乃即皇帝大位都于晉陽以徐成爲大都督命其招集諸兵卻說後燕王垂既得鄴都百姓潰散城中空虛至十二月與群臣商議遷都於中山乃即皇帝大位國號後燕改元建興
