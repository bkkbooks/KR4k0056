body:
  text: 第二十九回王戎與世同浮沈丁巳永康七年九月惠帝賈後以尚書左仆射王戎爲司徒阮瞻爲太子舍人王戎弟王衍爲尚書令樂廣爲河南尹胡母輔之爲樂安太守謝鯤爲長史畢卓爲工部侍郎此數人皆以清談任顯故賈後用之史說王戎宇浚沖琅琊人也父王渾乃西涼州刺史戎幼而穎悟神采秀徹視目不眩裴楷見而旨之曰戎眼爛爛如岩下電年六七歲嘗與群兒戲於道旁見李樹多實群兒競趨之戎獨不往人問其故戎曰樹在道旁而多李必苦李也群兒取之果苦人皆異之阮籍素與渾爲友時戎年十五隨渾在邸舍戎少籍二十歲而籍一見與之交結阮籍每適渾家俄傾輒去過見戎良久然後出謂王渾曰浚沖清賞非卿倫也共雅育不如共阿戎談及渾卒西涼州故吏賻贈錢帛凡數百萬戎辭而不受由是顯名其時王戎既爲三公與時浮沈無所匡救委事寮宷輕出遊畋性複貪吝廣收八方田園水碓周遍天下積寶貨錢不知萬計每自執牙籌晝夜算計恒若不足而務鄙吝不自奉養故天下之人謂之膏盲之疾戎家有好李常出貨賣恐人得種恒鑽其核以此毫無聞望凡所賞拔專事虛名卻說阮咸之子阮瞻字千里性清虛寡欲自得於懷讀書不甚研求而默識其要善彈琴人聞其能多往求聽不問貴賤長幼皆爲之彈也與司徒王戎乃通家因來造謁王戎戎命坐待茶罷因問瞻曰聖人重名教老莊明自然其旨同異瞻答曰將無同鹹奇之嗟歎良久即辟之爲掾吏時人謂之三語掾後爲太子舍人不信陰陽素執無鬼論人莫能難自謂此理足以辯正幽明忽一日有一客來相訪通姓名問寒暄之禮畢聊譚於名理客甚有才辯與之言良久又談鬼神之事反復甚苦客遂屈乃作色曰鬼神之事古今聖賢皆有其傳君何獨言無也汝不信仆便是鬼言終客變異形須臾消滅不見瞻默然意色甚惡後歲餘而亡年三十歲卻說惠帝賈後聞王衍樂廣二人皆善清談宅心事外名重當時乃征衍爲尚書令廣爲河南尹二人談論終日義理愈精言如瓶瀉口若懸河是故朝野之人多慕效之
