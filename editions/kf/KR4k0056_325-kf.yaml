body:
  text: 第三二二回玄文獻計塞五龍南燕王慕容超自與所幸魏夫人上登天門觀晉兵虛實群臣皆隨城邊燕王超見晉王師之盛心有憂色而魏夫人握燕王超之手涕淚交流燕王超起視對泣時參軍韓訁卓因諫曰今陛下遭百逆之會正是勉強之秋而反對女子悲泣何其鄙也超乃拭目謝之曰帝王興廢何代無之惟恨在我罹此艱險故發悲耳卿等盡忠退得晉兵高官任選朕不負伊訁卓曰劉裕孤軍懸久目下雖銳久必自衰宜固此城待其衰而出攻必能破之也燕王超從之詔命六師緊守城池並不出戰時劉裕大會諸將商議攻城之策中軍將玄文上言曰昔趙攻曹嶷望氣者以爲澠水帶城非可攻拔若塞五龍口城必有陷石季龍從之而嶷請降從慕容恪之圍段龕亦如之而龕亦降後無幾又震開之今舊基猶在明公可塞之則城中必有降者若攻恐難拔也裕從之即使一軍擔泥運土填塞五龍口城中士民男女相患腳疾弱病重者大半因此城中士民相繼出降
