body:
  text: 第二三九回秦王堅赦慕容暐堅聞燕王暐與慕容評走奔龍城急喚遊騎左右將軍郭慶曰可以兵萬五千追來郭慶以兵追至高陽慕容評見後有追兵大至白軍不滿一千乃單騎自逃性命往北去訖郭慶追至殺散燕兵巨武執住燕王慕王暐縛之燕王暐喝曰汝何小人敢縛天子巨武曰梁山巨武奉詔縛賊何謂天子耶言訖把暐縛之與郭慶收兵解暐回鄴城入見秦王堅堅曰吾以兵到此汝何不降反逃走乎燕王暐曰狐死首丘吾欲效之歸死于先人之墳墓耳荷苻堅哀之命放釋之而謂曰你可還宮率文武出降免汝之罪因此暐入宮召集文武百官出降于秦王苻堅堅皆赦之燕太傅慕容評走奔高句麗高句麗執送于秦凡得郡百五十七戶二百四十六萬口九白九十九萬以燕宮人珍寶分賜將士初琛使秦歸篩疑梁琛與秦謀收系於獄至是堅召釋之曰卿不能見機而作反爲身禍可謂智乎琛對門臣聞機者動之微吉凶之先見者也如臣愚暗實所不及耳爲臣莫如忠爲子莫如孝是以烈十臨危不改見死不避以殉君親彼于機者心達安危身擇去就不顧家國臣即使知之尚不忍爲況非所及耶堅又聞悅綰之忠恨不及見拜其子爲郎中堅以猛爲使持節都督關東六州諸軍事冀州牧鎮鄴悉以評第中之物賜之守令有缺令以便宜補授將士封賞各有差州縣守長皆因其舊以燕申紹與韋儒俱爲繡衣使者循行關東觀省風俗勸課農桑賑恤窮困收葬死亡旌表節行燕政有不便於民者皆變除之十二月秦王堅恐舊燕王暐爲患乃遷慕容暐及其百官並鮮卑四萬余戶于長安王猛上表留梁琛爲主簿堅從之次日與僚屬等宴語及燕吏猛曰人心不同昔梁君專美本朝郝君征說國弊參軍馮誕曰敢問取臣之道何先猛口郝君知幾爲先誕曰然則明公賞丁公而誅季布也猛聞大笑而已秦王苻堅封暐爲新興侯以評爲給事中皇甫真爲奉車都尉燕故太史黃泓曰燕必中興其在吳王乎恨吾老不及耳初燕王以宜都王桓將兵爲評後繼聞敗走和龍攻遼東後降秦秦追擊而殺之留其子鳳年十一陰有復仇之志鮮卑丁零有氣幹者皆傾身與之交權翼見謂曰兒方以才望自顯勿效爾父不識天命風厲色曰先生欲建忠而不遂此乃人臣之節君侯之言豈勸獎忠臣之義乎翼斂容謝之次日入言於堅曰鳳慷慨有才器但狼子野心恐終不爲人耳宜速除之堅不聽
