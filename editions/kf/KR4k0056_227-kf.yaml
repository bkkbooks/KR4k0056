body:
  text: 第二二四回太后歸政于穆帝丁巳升平元年晉穆帝加冠設朝太后歸政自徙居於崇德宮文武百僚集賀於是帝命排宴賞群臣不必重敘卻說姚襄將圖關中進兵屯杏城羌胡及秦民歸之者五萬余戶遂據黃落秦王生遣廣平王苻黃眉東海王苻堅二人以兵討之襄堅壁不戰鄧羌謂黃眉曰襄爲桓溫所敗銳氣喪矣然其爲人強狠若鼓噪揚旗直壓其壘彼必忿怒而出可以一戰擒也眉從之率騎五百壓其壘門而陣揚武耀威叫喊怒駡索襄出戰襄怒以兵出戰羌佯敗走襄追至太原東海王兵亦至羌回騎擊之黃眉等以大衆繼戰襄兵大敗姚襄被擒而斬之弟萇率其衆降秦求以郡公禮葬襄秦王許之於是黃眉等還長安生不之賞數辱之黃眉怒欲謀弑生生密知即將黃眉誅之
