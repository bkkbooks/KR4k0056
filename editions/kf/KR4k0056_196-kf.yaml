body:
  text: 第一九三回漢修宮廷殺仆射翔歸燕呈上璽綬百官朝賀皝大悅燕王皝既受封爲王乃以子恪爲度遼將軍率一萬五千人去鎮平郭恪既受命至鎮撫舊懷新屢破高麗之兵高麗畏之不敢入境自此邊地安然民皆樂業卻說成王壽初以儉約寬惠得蜀人心服李閡還盛稱說鄴中繁庶宮殿裝飾又言趙王虎以刑殺禦下故能控制境內壽慕之亦大修宮室人有小過輒殺以立威當仆射蔡興李錄諫之皆坐直諫而死因是民疲於賦役思亂者衆矣
