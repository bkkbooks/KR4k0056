body:
  text: 第一六八回侃將誅峻於石頭九月卻說蘇峻心腹路永賈寧二人勸峻盡誅朝中諸大臣更樹腹心而峻雅敬司徒王導故不許之於是永寧二人以峻不聽其計更貳於峻乃有離峻之心王導竊知之使袁耽誘永寧曰卿二人忠事蘇公蘇公無重於卿故卿等雖進忠言反見逆耳今天下兵集豈能拒之不久必敗卿爲其党將安歸乎依吾之見不若早投西軍則身安而家可保也永甯二人默然至晚皆奔白石西軍而降溫嶠受之嶠與峻久相持不決而嶠軍食盡見貸於侃侃怒曰若屢戰失利糧草又盡焉可以決勝負吾雖有糧草留應自軍若少更假於誰君既食盡暫且罷兵吾自西歸任君何如嶠曰凡師克在和古之善教也光武之濟昆陽曹公之拔官渡以寡敵衆仗義故也峻約小豎凶逆滔天何憂不滅明公奈何舍垂成之功設進退之計乎且天子幽懷社稷危殆乃臣子肝腦塗地之日嶠與公盡受國恩事若克濟則主臣俱存如其不捷當灰身以報先帝耳今之事勢義無旋踵譬騎虎安可中下哉以一違衆西返人心必沮衆必敗事則義旗將回指於公耳毛寶亦說侃曰軍政有進無退惟直整齊三軍示衆必死而已亦謂退無所據終至滅亡可試與寶兵斷賊資糧若不立效然後公去人心不恨矣侃然其說委兵五千遣之斷絕峻之糧道寶既引兵去了金陵太守李陽謂侃曰溫公貸糧仁公執不假與設若不濟公雖有粟安得而食諸乎侃然之乃分粟五萬石以餉嶠軍於是嶠軍得食衆心始安卻說毛寶引兵五千使人探知峻軍糧草皆積聚于句容姑孰寶率兵直抵句容姑孰屯所放火燒之於是峻軍乏食侃遂不去時蘇峻使韓晃領兵二萬進攻大業壘郗鑒參軍曹納曰大業京口扡之蔽也一旦若不固守則賊兵至故請還廣陵以俟後舉鑒大怒會僚佐責納將欲斬之久而哀告衆請釋放因此衆心固守使人求救於侃侃將分兵去救大業長史殷羨曰吾兵不習步戰不如急攻石頭峻必抽回其軍則大業不救自解矣侃然之於是侃督水軍二萬攻石頭庾亮溫嶠見侃向石頭亦率步兵一萬從白石南上攻峻旱寨峻見嶠亮步兵南上自同將匡孝引兵二萬來迎時侃將趙胤當先奄至峻令匡孝出戰兩馬相交不上十合趙胤敗走回陣峻見匡孝殺敗胤言曰孝能破賊我更不如時峻先未出陣飲酒大醉及見孝勝乃親自持刀拍馬將入數千人迎戰乘醉突陣三沖不得入忙跑馬趨至白木坡馬躓被侃部將彭世李千等見之遂率步兵三千追及斬之衆軍皆稱蘇峻死峻軍大潰世千等既斬蘇峻碎割之以焚其骨世千持首級來見陶侃侃令號令軍門蘇峻既死其部下司馬任護等立峻弟蘇逸爲主閉城自守峻雖已死其衆猶遐溫嶠乃創建行台廣招兵馬布告遠近凡故吏二千石以下皆令赴台告祭皇天後土及先帝之靈以期三軍要得石頭城於是至者雲集嶠與侃亮祝祭訖聲氣激揚流涕覆面情動三軍皆欷歔願以死戰
