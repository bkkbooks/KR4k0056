body:
  text: 第十七回司馬亮專權執政卻說文成王專權凡有軍國大事不議於衆只與衛瓘獨斷當禦史中丞傅鹹諫曰往從駕殿下見語卿不識韓非逆鱗之言耶而欲摩天子逆鱗自知所陳誠名欠瓘觸猛獸之須耳所以敢言庶殿下當識其不勝區區前摩天子逆鱗欲以盡忠今猛獸觸之須非敢爲惡必將以此見怒望殿下聽臣以察微言也汝南王司馬亮怒而不納愈肆橫行先司馬亮與東安王司馬繇不相推服司馬亮及此秉政乃密啓賈後稱東安王司馬繇之兵權太重更有異志宜早廢之免貽後患然後使楚王瑋代領其兵萬無一失也賈後從之即矯詔稱東安王司馬繇謀叛之故廢爲庶人司馬繇受枉見亮勢大莫敢誰何只得忍氣吞聲而已繇既廢賈後即召楚王司馬瑋人代繇之職楚王司馬瑋既代東安王領兵專立威名惠帝亦忌之更常忤汝南王司馬亮之意司馬亮尋以亂易亂如何是好欲奪其權柄無計可施心實憚之乃召衛瓘議曰楚王司馬瑋用事專立刑威更甚於繇欲奪其權智識不及卿可有計殺此跋扈否瓘曰司馬瑋其實無過焉能害之要削其權臣有一計汝南王亮曰何計請道其詳瓘曰殿下來日入朝奏聖上稱楚王司馬瑋功多更兼勇略雙全可封其爲大將軍令其之國使鎮西地盜賊不敢擾境瑋既出外國事任殿下所行亮曰卿計正合我心議計已定明日入朝奏聞
