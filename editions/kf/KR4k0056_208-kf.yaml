body:
  text: 第二五回石宣謀父不遂誅戊申四年八月趙王虎次子石韜有寵於虎虎常欲立之以太子宣居長猶豫未決宣知虎意欲立弟韜乃謂左右賈柸趙生曰今上欲立韜汝能爲我殺韜吾當以韜國邑分封汝等韜死主上必臨喪吾因行大事蔑不濟矣柸生諾出各藏利刃聞韜出遊龍華寺佛舍中趙生隨入將韜殺之而逃親隨人各無寸兵不敢追捕即收殮其屍回朝奏知趙王虎虎大哭哀痛氣絕久之方蘇欲自臨觀其喪司空李農諫曰害秦公者未知何人蠻輿未敢輕出既而乃止使人出訪其事方知是太子石宣謀殺之虎即出殿集文武囚宣殺之鄴北家屬縱火焚訖虎登中台觀之取灰分置諸門交道中殺其妻子九人宣幼子方數歲虎亦愛之抱之而泣意欲赦之大臣李農等言不肯取殺之兒挽虎衣大叫至於絕帶虎因此得病東宮衛土高力以萬餘人走戍涼州卻說燕王慕容皝庶兄慕容翰性豪雄多權略猿臂工射膂力過人皝深忌之先因廆崩世皝嗣位翰乃奔投段氏後又奔宇文部爲思家鄉與商人王車而逃宇文歸聞知使勁騎百餘去追捉慕容翰翰知後有追兵即立而待遙謂追者曰吾之弓矢汝曹足知莫來相逼自取死也若不信汝可立于百步之外豎刀看吾射中刀環者汝便宜返如不中可前來電追兵乃立于百步之外以刀豎起翰便以左手挽弓右手搭箭連發三箭皆中刀環追兵驚異皆散走回去因是翰得逃命歸國來見燕王皝皝大喜以爲右衛將軍因伐宇文部爲流矢所中臥病數月後便瘥因在家試騁馬演刀被人密告燕王皝稱翰在家演武將欲爲亂皝雖藉翰勇略然心終忌之因是誣其謀逆遂使人以鴆酒賜死翰曰吾負罪出奔既而複還死已晚矣然羯賊跨據中原吾不自量欲爲國家蕩一區夏此志不遂抱此遺恨言訖飲藥而卒可憐志士遭害抱恨而亡是時國人見翰飲鴆而死無不冤之時燕王皝引兵出畋於西鄙山至濟河忽見二父老身著朱衣乘坐白馬立於其前舉手揮皝曰此非獵所王宜還也言訖奄忽不見皝秘之在心不與衆言遂過濟河連日大獲走獸又見一白兔馳過皝馳射之忽然失腳翻身跌落崖下衆官救起身帶重傷方對文武訴說前見父老指揮之事文武曰既如此火速回朝言訖即時換馬回宮因此得病十分沈重喚太子入內囑之曰我聞人之將死其言也善鳥之將死其鳴也哀故以語汝今中原未平方資英傑以經世務恪智勇兼濟才堪重任汝其委之陽士秋志高行潔忠於貞固可托大事也尚其切記我言不可忽忘汝善待之囑訖徐徐氣絕而薨百官舉哀發喪立太子慕容雋爲燕王慕容雋字宣英皝之第二子初廆嘗言我積德累仁子孫當有中原既而皝生慕容雋廆曰此兒骨相不凡我家得之必有興王者矣雋姿貌魁偉博覽圖書有文武幹略及皝身死衆臣立之僭即燕王之位諡父皝曰文明
