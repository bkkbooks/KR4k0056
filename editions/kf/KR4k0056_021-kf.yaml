body:
  text: 第二十一回陸雲縣治若神明卻說陸雲領職到任肅然下不欺上市無二價一日祭祀歸忽聽見一人被殺在地無人告發雲即使人拘喚鄰衆究問死者姓名因拘死者之妻監禁十日故無所問而遣其婦出密令從人隨婦後竊聽從人欲行雲謂曰其婦此去不出十裏當有男子候之若與婦人語便縛來見我從人領其言私跟婦人而去不過數裏果有一男子候其婦人問曰因何得出婦人未及答被從去人縛了送來見雲雲問曰你如何殺人其男子不肯招認雲怒曰汝分明與死者之妻通姦共殺其夫汝何得抵賴於是其男子婦人默然不敢爭論遂供招償命由是軍民百姓皆稱其爲神因此郡守嫉其才能屢以言責雲乃去官歸政百姓追思圖寫形像配食縣社焉卻說陸機自過江以來家音斷絕資訊無通時機有駿犬名曰黃耳甚愛之既而羈寓京師久無家問機笑謂犬曰我家絕無書信汝能齎書取消息否其犬搖尾作聲有若肯去於是作書一封以竹簍盛之而系其頸犬果尋南路走遂至其家得通消息又帶回書以還洛陽自此以後得犬送書家音頻通不勞人送矣元康二年二月皇后賈氏弑故皇太后楊氏于金墉城時太後尚有待禦十余人賈後悉奪之絕膳八日而卒綱目發明雲子不可以廢母婦不可以廢姑前已書廢太后爲庶人而此猶書故太后者不與其廢也卻說皇太后屈死之後天下大饑東海雨雹荊揚青兗豫徐州大水十月武庫火災識者以爲天道已變王道亂應果若矣
