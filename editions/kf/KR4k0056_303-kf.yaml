body:
  text: 第三回燕王德議立太子庚子四年是歲西秦降于後秦王卻說南燕王慕容德即皇帝大位都廣固更名裕德因謂文武曰朕今年邁無嗣大不幸也吾聞不孝有三無後爲大今貴爲天子富有天下若不早定東宮朕崩之後是遺禍於宗室也吾欲擇宗族中有德者立之卿等議何人堪任大事也時尚書郎魯邃上言曰陛下之兄北海王慕容納之子名超字祖明仁德久著臣聞慕容暐降秦王苻堅之時被苻堅徙于長安苻堅被後秦王姚萇所害長安爲姚興所都姚萇已死其子興嗣位其弟姚紹有知人之鑒見超異之勸姚興授以爵位姚興信之召慕容超入見超恐姚興相害凡有所問深自晦匿鹹推不知因此姚興鄙之謂弟姚紹曰諺雲妍皮不裹癡骨汝胡妄語耶由是姚興勿用至今還在長安陛下何不使人迎來立之爲太子則南燕社稷幸甚矣南燕王德曰非卿所舉則朕忘矣於是德使人往長安召慕容超超聞德有召遂不告知母妻即與使者入廣固朝見南燕王德德與語大悅遂立爲太子命居東宮卻說南涼禿發烏孤河西鮮卑人也八世祖匹孤匹孤卒其子壽闐立初壽闐之在孕其母相掖氏因寢而産於被中鮮卑謂被爲禿發因而氏焉五世祖樹機能據有涼州之地至烏孤嗣位呂光自立爲涼王使人署烏孤爲冠軍大將軍烏孤自稱西平王改元號太初徙都樂都烏孤身死其弟利鹿孤爲衆所立爲武威王至是禿發利鹿孤改稱河西王國號南涼改元爲建和元年次日大會宴以賞群臣因謂文武曰戎車屢駕無辟境之功務修賢彥而下猶蓄滯豈任非所才將吾不明所致也祠部郎中史嵩對曰今取士拔才必先弓馬文章學藝爲無用之資非所以徠遠人垂不朽也爲今之計大王宜建學校選耆德碩儒以訓習子弟則賢士爭趨至也利鹿聞說善之於是以白元沖趙誕爲博士祭酒以教胄子由此賢人稍進
