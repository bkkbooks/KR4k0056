body:
  text: 第二八六回孝武暴崩立太子卻說北魏左司馬許謙上言于魏王拓跋珪曰臣近聞鳳凰來儀蛟龍出見此乃大王之德故有此瑞也今大王德比唐虞明方文武可即皇帝大位以安士民群臣皆曰司君之言是也於是魏王珪從之稱尊號遂即皇帝位國號大魏改元皇始元年始建天子旌旗出警入蹕加封大臣卻說晉孝武帝秋九月起造清暑殿居之始爲長夜之飲太史令奏長星見國將亡孝武帝心甚惡之乃入華林園舉酒對天祝之曰長星長星勸汝一杯酒自古寧有萬歲天子耶是時太白連年經天地震水旱災異屢變孝武不以爲意不能改也時帝嗜酒荒淫內殿外人罕得進見張貴人寵冠後宮時年近三十帝戲之曰汝以年亦當廢也吾意欲更屬少者已而醉寢清暑殿貴人使婢以被蒙帝面而弑之重賂左右謂帝暴疾崩時太子暗弱會稽王道子昏荒遂不復推問王國寶夜叩禁門欲入內殿王爽侍中曰大行晏駕皇太子未至敢入者斬國寶乃王爽之弟也帝既崩太子入內與群臣發喪殯葬山陵孝武帝在位二十一年壽三十五而暴崩太子即位道子進位太傅揚州牧假黃鉞太子幼而不慧口不能言至於寒暑饑飽亦不能辨飲食寢興皆非己出母弟琅玡王德文常侍左右爲之調度初國寶党附道子驕縱不法武帝惡之國寶懼遂更媚于帝道子大怒以劍擲之及帝崩國寶複事道子同王緒共爲邪謀道子又倚爲心腹遂兼管朝權威震內外王恭入赴山陵每正色直言道子憚之深布心腹而王恭每及政時輒厲聲色道子遂欲圖之朝臣勸恭誅國寶王珣曰彼罪逆未彰今先事而發必失朝野之望者其不改惡布天下然後順衆必除之亦無不濟也恭乃止既而謂珣曰比來視君一似胡廣珣曰王陵廷爭陳平緘默且問歲晏何如耳王陵與王恭還鎮謂道子曰主上諒暗塚宰之任伊周所難惟大王親萬機納直言放鄭聲遠佞人國寶等愈懼
