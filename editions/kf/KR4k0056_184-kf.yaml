body:
  text: 第一八一回趙作大武東西宮卻說趙王石虎興工作大武殿于襄國又作東西富於鄴皆砌以文石以漆灌瓦金鐺銀楹珠簾玉壁窮極之巧選士民之女以實之服珠玉被綺縠者萬餘人教宮人占星雲氣馬步射以女騎千人爲鹵簿皆著紫綸巾蜀錦褲執羽儀鳴鼓吹打遊宴以自隨於是境內大旱粟二鬥值金一斤百姓騷然而虎用兵不息百役並興徙洛陽鍾虡九龍翁仲銅駝飛廉於鄴又于鄴南投石於河以作飛橋工費數千萬億竟不能成其時白虹出是大社鳳陽門虎大驚下書曰蓋古明王之理天下也政以鈎平爲首化以仁義爲本故能允協人和緝熙人物朕以眇傳君臨萬邦台輔百官其各上封事極言無隱虎雖書示下人無敢言丁酉三年趙王石虎自稱趙天王左校令成公段作庭僚盤炙人虎試而悅之至是五百余人人上尊號庭僚油灌下盤死者二十余人虎惡之腰斬成公段卻說晉國子祭酒袁環太常馮懷以江左寢安入朝請興學校成帝從之而立太學徵集生徒而土大夫習尚老莊儒術終不能用
