body:
  text: 第二二五回苻堅備儀聘王猛卻說秦王苻生夜夢大魚食蒲又聞長安謠言東海大魚化爲龍男皆爲王女爲公生疑謠應魚遵將遵殺之及夷其子孫十餘人時生飲酒無晝夜多所殺戮自以眇目諱言殘缺偏只少無不具之類誤犯而死者不可勝數剝人面皮使人歌舞以爲樂群臣保一日如度十年時宗室及大臣親戚忠良殺害略盡死者不可勝記史說東海王苻堅字永固乃苻洪季子苻雄之子也其母苟氏嘗遊漳水祈子于西門豹祠其夜夢於神交因而有孕十二月而生堅焉生堅時有神光自天燭其庭堅背有赤紋隱起成字曰草付臣又土及長臂垂過膝目有紫光祖洪奇而愛之史說堅幼年七歲聰好敏施舉措不失機徐統謂之曰此兒有霸王之相又密謂之曰苻郎爾後當大貴堅曰誠如公言不敢忘德八歲請就家學洪曰汝夷狄異類但知飲酒今乃來學耶欣然許之初健之入關也夢天神遣使者送來朱衣赤冠命拜堅爲龍驤將軍健至翌日就拜堅爲龍驤將軍堅博學多藝有經濟大志後封東海王與薛贊權翼善于時苻生爲長夜之飲誅殺大臣當贊翼二人密說堅曰主上猜忌暴虐中外離心方今秉主秦祀者非殿下而誰願早爲計勿使他姓得之堅曰主上雖無道君也若殺之自取則成天下萬代之駡名耳贊翼曰殿下執小義必後噬臍無及堅猶豫以問尚書呂婆樓曰主上無道薛贊權翼叫孤自取其業其事若何婆樓曰此事可行仆刀環上人耳不足以辦大事仆裏舍有一賢士北海人也姓王名猛其人有王佐之才謀略不世之出征西大將軍桓溫屢請不起現隱華山殿下宜請咨之堅曰吾備聘禮卿可代我請之呂婆樓欣然領諾於是堅備金帛之禮作書使尚書呂婆樓往華山聘王猛呂婆樓即出上馬帶從人來華山到莊門外下馬扣門問曰王先生在莊上否童子入去不一時王猛出迎入內在草堂講禮訖呈上禮物而言曰今東海王苻堅久聞先生大名無緣拜會敬備薄禮命予來聘望乞就行猛曰山野狂夫無甚奇才何勞貴人親臨若有下問召仆趨至甚爲惶恐言訖置酒相待在莊上同宿一宵次日王猛收拾琴書與呂婆樓一同前來入見東海王苻堅一見猛遂握手相語歡若平生談論少項勝如舊識邀入後堂講禮問寒暄畢苻堅下拜曰秦室鄙胄單于愚人久聞先生大名如雷灌耳是以昨日使尚書呂婆樓敬造仙莊已呈賤名文幾未審覽否王猛答禮曰北海田夫疏慵成性今蒙殿下見召下情不勝感激見大王有愛民憂國之心但恨猛年幼才疏不堪治政有誤下問苻堅曰呂尚書之言權參軍之語豈虛謬哉望先生不棄鄙賤曲賜見教王猛曰呂尚書世之高才王猛乃一村夫耳安可以談天下事二公差舉而大王舍美玉就頑石此乃誤矣苻堅曰夫古聖賢學成文武之業當立身行道揚名于後世以顯父母可謂孝矣救民於水火之中致君於堯舜之化此謂忠矣世人望先生久矣堅愚魯得賜教之實爲萬幸也王猛笑曰大王慨然欲聞愚論盡當剖露願聞其志苻堅乃屏去左右起席而謝曰今主上無道殺戮無辜士民生怨中外離心孤不度德量力欲伸大義於天下誠恐不然吾志在天下而智術短淺遂用猖獗至於今日志猶未已請計將安用王猛答曰主上失德吏民各懷二心可早圖之免彼晉燕來侵若緩延之久則生亂堅又曰吾欲統一六合自趙末以來豪傑並起跨州連郡者不可勝數猛曰桓溫比于姚襄則名齊而衆寡然溫能克襄以強爲弱非爲天時亦人謀也今溫已擁百萬之衆挾天子以令諸侯誠然不可與爭鋒晉王已據有江東之地已立數世國險而民富賢能爲之用此可與援而不可圖也今鄴城千里爲慕容雋所據此乃用武之地而其雋先立長子有才而死之今立次子慕容暐爲嗣吾聞鄴城人談暐好遊絲竹之樂卻無略德之聲慕容雋一死彼必不能守而期智慧之士思得明君大王既帝室之胄信義著于四方攬召英雄思賢若渴若跨有關中保其險阻外結晉主內修政理天下有變則命一上將將鄴中之軍以向平域大王舉長安之衆以出建康百姓各簞食壺漿以迎大王則北方之域盡爲大王有也誠如是霸業可興秦國大可成矣堅離坐扳手而謝之曰先生之言金石之論使堅撥雲霧而見青天也恨見先生之晚矣又謂曰孤之遇卿若劉玄德之遇孔明也苻堅自此重猛食則同幾臥則同榻終日議論天下大事其時王猛年三十一而出仕也當秦太史令康歡言于秦王生曰昨夜三月並出孛星入太微東升自去自去月上旬沈陰不雨以至於今將有下人謀上之禍生大怒曰汝以妖言惑朕令武士捕殺之乃入宮飲酒夜醉謂宮女曰苻法兄弟亦不可信明日當除之苻法亦苻雄之子苻堅之兄是夜苻法身體因倦隱幾而臥夢見神人告之說主生明日必殺汝也苻法驚寤心悸之忽宮女來報知此信法大驚急出問梁平老平老邀法見堅謂堅曰今主上失德上下嗷嗷人懷二志目今晉燕伺隙而動臣恐禍發之日家國俱亡聞宮女報說見主上明日要殺皇兄苻法今皇兄邀臣來見殿下此殿下之家事也宜早圖之否則必遭其害堅謂苻法曰你先引親隨之人各執利刃入宮吾後便來於是苻法與梁平老等引壯士三百人潛入雲龍門苻堅亦率麾下兵三千人鼓噪繼進時宿衛將士皆執兵器而立見是苻堅各舍杖歸堅同法入宮苻生猶昏寐未寤被堅令甲士執出殺之苻生死年二十三歲在位二年到此被堅弑之次日王猛與呂婆樓等立東海王苻堅爲秦皇帝堅讓兄苻法法不受曰汝嫡嗣且賢吾何敢當於是堅令去皇帝號而爲秦天王改元永興元年遣人盡誅幸臣趙韻董榮等三百餘人以子苻羌爲皇太子兄苻法爲丞相弟苻融爲陽平公次子還爲長樂公王猛薛贊爲中書侍郎權翼呂婆樓爲給事黃門侍郎與猛贊並掌機密以梁平老爲尚書郎以李威爲左仆射卻說堅母苟氏思苻法爲堅之長德而且賢又深得衆心懼後爲變乃遣人召入宮內以鴆殺之少頃堅入宮見已殺法在地急問左右左右具以苟氏之言對之堅涕泗滂沱悲慟吐血左右勸曰死者不可複生何必哭之以傷貴體堅拭淚而言曰吾兄賢明有德何故殺之言訖遂令收斂殯葬諡曰哀王又封其子陽爲東海公秦王堅與文武出遊自臨晉登龍門顧指而謂群臣曰美哉山河之固婁敬有言關中四塞之國真不虛也權翼薛贊對曰吳起有言在德不在險願陛下追踵唐虞懷遠以德山河之固不足恃也堅大悅乃領衆還長安十一月秦王堅私行至尚書省率問諸政之事丞相程卓無以爲對以是見其文案不治次日免左丞相程卓以王猛代之爲左丞相於是王猛親寵愈密朝政莫不由之戊午二年二月下旬王猛趨朝出來因遇特進樊世乃氐之豪傑也其先有大勳於苻氏自負氣倨傲乃辱猛曰吾輩與先帝共興事業不預時權君無汗馬之勞何敢專營大任是我爲耕稼而君食之乎猛曰方當使君爲宰夫安直耕稼而已世大怒曰要當懸汝首于長安城不爾者終不處於世也猛忍氣回家次日猛侵晨早先入朝奏知樊世辱己之事與秦王堅堅怒曰必須殺死此老氐然後百僚可整俄而世至便與王猛爭論於堅前欲以牙笏擊猛秦王堅大怒曰投鼠須當避其器我跟前尚如此逞強發命將世斬之武士將世斬首傳首至殿前於是公卿以下無不懼猛是日又改甘露元年又以王猛爲中書令京兆尹猛與中丞鄭羌協規齊志數旬之間有貴戚豪強者被猛羌按察其過以罪誅死二十餘人於是豪右屏氣路不拾遺風化大行百姓安堵堅始歎曰今日始知治天下之法有天下之爲尊也九月秦境大旱秦王堅自減膳撤樂命後妃以下悉去羅紈使守宰開山澤之利公私共之息兵養民後旱不爲災矣
