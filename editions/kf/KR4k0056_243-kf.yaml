body:
  text: 第二四回王猛辭賞不受封前燕始慕容以武帝太康六年稱公至暐在位十一年至此太和五年被秦王滅之自廆至暐共八十五年耳卻說秦王苻堅既克燕京已定改號建元元年大赦秦境封鄧羌爲司隸校尉及楊安徐成張蠔等爲大將軍進王猛爲清河郡侯又加爲丞相都督中外諸軍事猛上表固辭不肯受職秦王堅渭王猛曰即若螭蟠布衣朕龍潛弱冠屬世事紛紜朕奇卿於暫見擬卿爲臥龍卿亦異朕於一言回考築之雅志豈不精契神交千載之會雖傅岩入夢薑公寤兆今古一時亦不殊也今天下初定彜倫始敘朕且欲從容于上勞卿心於下弘濟之務非卿而誰耶固辭亦不許耳王猛曰陛下仁德上如堯舜名姓已應圖讖有天之福得獲燕邦而燕京之克乃將佐之力群帥之能則小臣何功之有敢受此祿也猛至再至三固辭不受秦王堅重四重五要其受之王猛終不受猛爲政公平拔幽滯顯賢才外修六業內崇儒學勸課農桑教以廉恥於是兵強國富垂及升平猛之力也卻說秦王苻堅既得鄴都朝夕與群臣狩于西山樂而忘歸旬余不返宮內宮內伶人王洛叩馬諫曰千金之子坐不垂堂萬乘之重行不履危故文帝馳車袁公止轡孝武好畋相如獻規陛下爲蒼生父母何可盤于遊畋若禍起不測者其如宗廟何其如太后何秦王堅大悅閂晉文公悟愆於虞人朕今聞罪于王洛是吾之過言訖重賞王洛即馳回宮自此以後遂不復畋秦王堅欲以兵討涼州恐勞傷軍民乃命王猛爲書諭天錫猛遣人送書與天錫曰昔貴先公稱藩于劉石者惟審於強弱也今秦之盛勢振中外關東既平將移兵河右恐非六郡士民所得抗也君能首降可保境祿無危天錫得書大懼遣使稱藩于秦秦王堅複使人拜天錫爲涼州刺史西平公辛未咸安元年正月秦王堅與丞相王猛商議徙關東豪傑及離夷十五萬戶於關中處烏桓于馮翊北地丁零翟斌於新安澠池卻說吐谷渾王辟奚聞秦王堅滅燕恐來攻己乃遣使送馬千匹金銀五百斤于秦秦以辟奚爲泓川侯辟奚好學仁厚而無威權第三弟專恣國人患之長史鍾惡地與司馬乞宿雲收殺之辟奚由是發病恍惚命世子視連日吾禍及同生何以見之於地下國事汝自治之吾餘年殘命寄食而已遂以憂卒視連立不飲酒不遊畋者七年軍國之事委之將佐惡地諫以爲人主當自娛樂建威布德視連泣曰孤以先世以來以仁孝忠恕相承先王念友愛之不終悲憤而亡孤雖篡業屍存而已聲色遊娛豈可安也威德之建當付之將來耳時王猛以潞州之功請秦王堅以鄧羌爲司隸秦王堅下詔曰司隸之職董牧皇畿吏責甚重非所以優禮名將光武不以吏事處功臣實貴之也羌有廉李之才朕方委以征伐之任北平匈奴南蕩揚越羌之任也司隸何盡其才乃封鎮軍將軍位特進羌雖不悅無敢忤旨
