body:
  text: 第四十二回司馬穎起兵討齊王卻說齊王司馬冏既得志選舉不公任用嬖佞忠諫者遠直諫者誅仗義之功反成罪釁因是中外失望士不傾心時齊王冏初征顧榮爲大司馬主簿辟張翰爲大司馬東曹掾二人皆應命而至史說顧榮字彥先吳國人也因就職見齊王冏擅權驕恣恐失職禍延及己於是終日酣醉不綜府事因上言諫齊王司馬冏曰臣忝在治下不敢不告臣聞古人有言曰謙受益滿招損又曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功今殿下舉動之間驕恣不法勢壓群下此豈君子之盛節也如以學業驕人歟則仲尼曰如有周公之才之美使驕且吝其餘不足觀也已如以富貴者驕人歟則子貢曰貧賤者驕人且富貴者安敢驕人乎伏望殿下居廉有終永保令譽勿使馬援之笑子陽也又曰且勢有時而盡勢盡則傾如揚雄所謂旦握兵權而爲卿相夕失勢則爲匹夫者轉眼寵辱反掌榮枯豈不畏哉惟殿下安分見機平易自處則鬼神亦將害盈而福廉矣臣以此故不避斧鉞之誅以獻逆耳之言也齊王怒而不納顧榮憂患來造馮熊友人馮熊聞榮朝夕飲酒不理政事乃見其至以言諫曰茲蒙足下過愛以獻藥語切莫見怪夫酒之爲物固可合歡亦能喪性故古人比之狂藥非佳味也古今以嗜酒致禍者往往可鑒此劉伶荷臿自隨畢卓盜釀被縛君子所以不取也今足下湛於麯蘖日夜銜杯此非賢人君子之所好者願足下察其善惡自示勸懲勤於聽事休敗駿德也榮答曰子讀一卷儒書知得千古遺事豈不識酒之爲禍敗德也子知其一不知其他今齊王冏驕恣擅權不久必敗敗則吾在其府主事誠恐城門失火殃及池魚楚國亡猿禍延林木是以放性酣醉以消憂患耳熊曰既若此吾有脫君之計不必憂榮曰何計熊乃近于榮耳畔言不數句語未一時只見顧榮曰妙矣因語畢各散數日馮熊因見齊王長史葛旟曰顧榮好酒不綜府事王府大事固非酒客所能辦君何不言之齊王遷其外以免誤政務旟曰吾正欲言幸君先施因此葛旟入府以其事告與齊王冏冏曰吾重其名以故用之今既如此便遷之因是以顧榮改授中書侍郎顧榮用馮熊之計出爲中書侍郎在職廉能不復飲酒葛旟因見問曰君何前醉而後醒耶榮恐事覺怕齊王疑詐以罪又複更飲因與州裏楊彥明日吾爲齊王主簿恒慮禍及見刃與繩每欲自殺但人不知耳史說張翰字季鷹乃吳下人也見齊王司馬冏專制驕奢任用小人故與同郡顧榮曰久必齊王自用不納忠諫爲今禍敗吾欲求去故來造謁執事旦日定行矣榮見其說執翰手愴然曰吾亦欲與子菜南山之菰飲三江之水耳言訖因見秋風起乃思吳中菰萊蓴羹鱸魚膾歎曰人生貴得適志何能羈官數千里以要名爵乎語畢二人過數日相邀命駕而歸卻說齊王司馬冏宴會群臣議軍國之事酒行三巡董艾言于齊王曰侍中稽紹善於絲竹殿下可使其爲一操以助歡樂齊王冏促命左右進琴命紹品操稽紹推而不受冏曰今日爲歡何故若此紹進對曰明公匡複社稷當軌物作則垂之於後紹雖粗鄙忝備常伯腰綬冠冕鳴玉殿首豈可操執絲竹以爲伶人之事若釋公服侍私宴所不敢辭也由是齊王冏不敢強命其彈只令大臣暢飲至夜方散卻說李庠驍勇而得衆心趙廞深忌之欲殺而無罪曾庠勸廞稱尊號廞乘此以庫爲大逆命斬之以其兄李特爲督將特大怒遂以其兵入攻執趙廞而斬之乃遣使詣洛陽上表陳趙廞違詔殺耿膝之罪狀特故誅之請以另調吏守益州初粱州刺史羅尚聞廞謀反上表稱廞素非雄才不須兵討敗亡可待以此朝廷不曾致討廞被誅朝廷以羅尚爲益州刺史詔去訖羅尚即以家屬往任益州李特使弟李驤以珍寶金銀迎羅尚尚受之以驤爲騎督使人請李特二人並郡守等會筵于成都時廣漢太守辛冉入蜀因說尚曰李特兄弟爲盜賊後必有異宜因此會而斬之不然後必爲患尚先受其賂故不從
