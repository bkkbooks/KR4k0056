body:
  text: 第四回北魏祖逢天女配卻說北魏之先出自黃帝黃帝之子昌意昌意之子受封北國有大鮮卑山因此以爲號其後世爲君長統幽都之北廣漠之野畜牧遷徙射獵爲業淳樸爲俗簡易爲化不爲文字刻木結繩記事而已時事遠近人相傳授如史官之紀錄焉黃帝以土德王北俗謂土爲拓謂後爲跋故以爲氏其裔始均事堯時逐女魃于弱水北人賴其勳舜後命爲曰祖厯三代至秦漢獯鬻獫狁山戎匈奴之屬累代爲害中州而始均之裔不南下是以載籍無聞積六十七代至成皇帝諱毛方統國三十六大姓九十九威振北方宣帝南遷大澤方千百餘裏厥土昏冥沮洳謀更南遷未行而崩獻皇帝時有神人言此地荒遐宜徙建都邑獻帝年老仍以位授子聖武皇帝命南移山谷高深九灘八阻於是欲止有神獸似馬其聲似牛導引歷年乃出始居匈奴故地其策略多出宣獻二帝故時人並號曰推寅蓋俗雲鑽研之義傳至拓跋詰汾爲人孤弱諸部各散卻說北魏聖武姓拓跋諱詰汾曾親耕於山澤忽一日歘見輜軿自天降下詰汾奔前去觀見一婦人生得千嬌百媚萬種風流前來相見謂詰汾曰吾乃上界天女玉帝因見君祖宗積德敕吾降凡與君爲室君不嫌醜陋乃妾之幸耳詰汾曰蒙天帝賜有姻緣何德以當之言畢遂與施祿相攜手回第設筵相待至夜二人成親歡會三日天女辭曰吾今請還天宮不敢久留吾昔受命於天只許三日姻緣今已滿足吾去之後期年周時與君後會於前日相見之處不可遺忘言畢相辭欲行詰汾不忍相離因留戀之而天女化清風不見後詰汾自天女歸天之後光陰似箭日月如梭不覺一載猛然思起天女臨別之言至是日依然徑入山澤伺候不霎時見天女駕五彩祥雲自天下來抱著一個小兒近前與詰汾相見曰別來無恙幸不失信以此抱小兒授與詰汾又曰此是君之子乃當世帝王也君宜善撫育之言畢欲行詰汾接得小兒拖住天女曰一日夫妻百夜恩情自卿歸天之後忘食失寢要想一會不能得見今蒙降臨何忍言去可同我歸第再敘一夜明早歸天未遲天女曰此乃天帝之敕與君姻緣只能在此遇豈敢再延語終化清風不見因是詰汾垂淚抱著小兒歸家恩養取名力微黃帝修德上天知敕降神女爲裔妻不覺明年産真主北代從斯作帝畿
