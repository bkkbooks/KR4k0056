body:
  text: 第三七回南涼禿發傉檀立卻說南涼王利鹿孤在位三年而卒群臣奔涼州立其弟禿發傉檀爲涼王帶領其衆國號南涼都于樂都改元弘昌元年卻說晉輔國將軍袁虔之先與桓玄同志齊名素不相睦及聞桓玄得志恐不爲其所容乃棄官引家屬入長安來降後秦王姚興興聞其來降親臨東堂命群臣引進虞之虔之入見禮訖秦王姚興因與閒話而謂虔之曰桓玄雖晉臣其實晉賊其才度定不如父焉能辦成大事也虔之曰玄不如其父遠矣今既握朝權必將行篡奪既非命世之才適足爲他人驅除耳此天以機授之陛下願速加經略廊清吳楚秦王興大悅以虔之爲大司農次日秦王興駕至逍遙園引諸沙門聽鳩摩羅什演說佛經羅什通辨夏言尋覓正經多有乖謬不與胡本相應秦王興親與羅什及沙門僧衆等八百餘人更出大品羅什持胡本秦王興執舊經以相考校因此續出諸經並諸論三百餘卷今傳新經皆羅什所譯秦王興既托意於佛道公卿以下莫不欽附沙門州郡化之事佛者十室而九矣卻說孫恩自被劉裕擊敗複聚衆一萬來寇臨海太守辛景以伏兵擊敗之恩勢窮兵盡及所擄三吳男女死亡殆盡恐爲官軍所獲乃自赴海而死其党從死者以百數世人謂之水仙餘者數千人複推恩妹婿盧循爲王循湛之曾孫也神采清秀雅有才藝少時沙門惠遠嘗謂之曰君雖禮涉風素而志存不軌如何時桓玄欲安撫東土乃遣人以循爲永嘉太守循雖受命而寇盜不已五月秦王姚興大發諸軍十萬使義陽公姚平等將兵以伐魏興自將大軍繼之平以兵攻魏柴壁拔之魏王珪聞知即遣長孫肥爲前鋒自將大軍五萬繼後以禦之平使健將率精騎二百戰魏軍肥率一千逆擊盡擒之平乃退兵珪追及於柴壁平以軍馬入城固守魏軍圍之興將兵四萬來救之將據天渡運糧以饋平軍魏博士李先曰兵法上者爲敵所棲下者爲敵所困秦皆犯之可使奇兵先據天渡柴壁可不戰而取也珪命軍士增重圍內防姚平出外防姚興入當將軍安同曰汾東有蒙坑東西三百餘裏蹊徑不通姚興來從汾西直臨柴壁如此虛聲勢相接重圍雖固不能制也不如爲浮梁渡汾西遠圍以拒之虜至無所施其智力矣珪從之率步兵三萬爲浮梁渡汾西逆擊興于蒙坑之南興見有備乃退走四十余裏平亦不敢出興屯汾西柘材從汾上流東平欲以毀浮梁魏人皆鈎取爲薪不能得進姚興糧竭矢盡晝夜突圍領衆不得出乃率麾下大兵赴水鹹從沈死其餘二萬餘人皆欲斂手被魏人所擒興力不能救舉軍衝突遣使求和于魏王珪珪不許乘勢進取蒲扳會柔然謀反魏王珪乃引兵還癸卯二年卻說桓玄聚衆朝士商議欲廢銅錢而用穀帛時西閣祭酒孔琳之議曰洪範八政以貨資食豈不以交易之所資爲用之至要者乎故聖人制無用之財既無毀敗之費又省難運之苦此錢之所以嗣功龜貝歷代不廢者也穀帛爲寶本充衣食今分以爲貨則致損甚多又勞毀于商販之手耗棄于割藏之用此之爲弊著於已試故鍾繇曰巧僞之人竟濕穀之利制簿絹以充資魏世制以嚴刑弗能禁也是以司馬以之爲用錢非圖豐國亦所以省刑今既用而廢之則百姓頓亡其財是有錢無糧之人皆坐受饑困此斷之之弊也魏明帝時錢廢用穀四十年矣以不便於人故舉朝大議精才達政之士莫不以宜複用錢足以明穀帛之難用也桓玄又曰既錢不可易可複用肉刑以制嚴刑繼之琳之又曰唐虞象刑夏禹立辟蓋浮薄既異教化不同書曰世輕世重言隨時也夫三代風淳而事簡故罕蹈刑辟近世俗巧而務殷故動陷憲典若三千行于叔世必有踴貴之尤此五帝不相循法肉刑不可悉複者也漢文有仁惻之意開自新之路雖曰稽古創制號稱刑措然名輕而實重反更傷人故孝景帝嗣位輕之以緩緩而人慢又不禁邪期於刑罰之中所以見美於昔兵荒之後罹法更多棄市之刑本斬右趾漢文一謬承而弗革所以前賢悵恨議之而末辨鍾繇陳群之意雖小有不同欲以右趾代棄市若從其言則所活者衆降死之生誠爲輕法可以全其性命蕃其産育仁既濟物功亦益衆又今所患逋逃爲先屢叛不克宜令逃身靡所亦以肅戒未犯永絕惡源至於餘條且宜依舊不可更改耳桓玄遂不悅因怒還第九月殷仲文卞範之二人勸玄早受禪玄劍履上殿入朝不趨直至殿前謂晉主曰朝廷無玄一人不知幾人稱帝幾人稱王今玄還位丞相陛下何不知恩帝曰是朕之失即命會冊玄爲相國總百揆封楚王加九錫玄大悅號楚國置丞相以下官玄弟桓謙私問彭城內史劉裕曰楚王勳德隆重朝野之情鹹稱宜有禪讓卿以爲何如劉裕曰楚王勳德蓋世晉室民望久移乘運禪代有何不可謙即喜曰卿謂之可即可耳南燕臣高雅之上表請南燕王德伐桓玄言曰既未能廓清吳會亦可以收江北之地韓範亦上疏曰晉室衰亂戎馬單弱重以桓玄悖逆上下離心拓地定功正宜今日失時不取彼國有豪傑誅玄更修德政則無望矣德因命諸將講武於城西率領步卒三十七萬人騎五萬三千匹車萬七千乘正欲起行公卿皆以玄新得志未可以圖於是乃止十一月桓玄佯以表請歸藩使人奏帝帝作手詔止之留又詐言錢塘臨平湖開江州甘露降使百僚集賀爲己受命之符又以前世皆有隱士恥獨無之計求得皇甫謐六世孫希之爲署並給其資帛用使其獨居山林遣人征爲著作郎又使固辭然後下詔旌禮號曰高士時人謂之充隱又欲廢錢而用穀帛及複肉刑制開無憲卒無所施性複貪鄙時人有書法好畫及佳園宅必假蒲博而取之尤愛珠玉未嘗離手至是卞範之爲禪詔逼帝書之帝勿從玄自入言曰汝爲君不道四海混亂吾父子披堅執銳百戰千傷保此社稷與汝享祚數十餘年今吾年將老汝何不發一言帝曰王欲朕位何必動怒容付與伊玄回怒作喜曰陛下肯爲堯舜吾即退也遣司徒王謐禪帝位於玄帝無奈居永安宮百官勸進玄築壇于九井山北即帝位改元永始封帝爲平固王遷于潯陽玄入建康宮登禦座而地忽陷群下失色殷仲文曰將由陛下聖德深厚地不能載故如是耳桓玄大悅玄既即大位臨朝聽訟親問囚徒罪無輕重多得原放有于輿乞者時或恤之以其祖彜以上名位不顯不復追尊獨納桓溫神主於太廟四時祀之時卞范之謂玄曰宗廟之祭上不及祖有以知楚德之不長矣玄性苛細好自矜伐正事或一字片辭之謬必加糾察以示聰明或手注直官或自用令史詔令紛紜有司奉答不暇而紀綱不治奏案存積不能知也又性好遊畋更繕宮室朝野騷然思亂者衆益州刺史毛璩起兵傳檄郡縣列玄罪狀兵屯白帝城
