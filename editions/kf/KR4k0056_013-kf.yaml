body:
  text: 第十三回後父楊駿獨秉政史說孝惠帝乃世祖武皇帝之長子名衷字正度在位十七年後因中毒而崩卻說武帝疾篤時楊駿獨侍禁中人臣皆不得在武帝左右駿因以私意改易要盡樹其心腹武帝少間正色謂楊駿曰何得便爾時汝南王司馬亮尚未之國武帝知之令作詔以司馬亮與楊駿同輔政事且欲擇朝士有名望者佐之會武帝複迷亂皇后楊氏奏以楊駿輔政不能言帝頷之皇后使召華廙何劭等作詔授駿太尉都督諸軍錄尚書事駿受詔仍趣汝南王司馬亮赴鎮武帝少蘇又伺汝南王來未左右言未至遂崩既而太子衷即位駿入居太極殿擁虎賁百人自衛及汝南王亮得知帝崩不敢臨喪乃哭于大司馬門外使人上表求葬帝訖方行往鎮駿恐其有變密使人以兵圖之亮探知乃星夜以兵馳赴許昌去訖始獲免其難五月楊駿自知素無美望欲普進封爵以求媚於衆奏帝詔增群臣爵位有差將軍傅咸謂駿曰未有帝王始崩而臣下論功者也於理有所不可駿不從詔中外群臣各增位賜爵有差複租調一年散騎侍郎何攀言曰帝正位東宮二十余年今承大業而頒賞行爵優於革命之初輕重不倫且大晉蔔世無窮制當垂後若有爵必進則數世之後莫非公卿矣無乃不可乎駿不從自以爲太傅大都督假黃鉞錄朝政百官總己以聽當傅鹹謂駿曰諒闇不行久矣今上謙沖委政於公而天下不以爲善懼明公未易當也周公大聖猶致流言況上春秋非成王之年乎進退之宜明公當審之楊駿不從楊濟聞知遺傅鹹書曰諺雲生子癡了官事官事未易了也傅鹹回書曰衛公有言酒色殺人甚於作直坐酒色死人不爲悔而逆畏以直致禍者當由矯枉過正或不中篤而欲以厲爲聲故致忿耳安有悾悾忠益而反見怨疾乎濟得書默然卻說楊駿見賈後險悍多權略忌之乃以外甥段廣管機密張劭典禁兵凡有詔命與帝省訖入呈太后然後得行之時馮翊太守孫楚謂駿曰明公以外戚居伊霍之任而不與宗室共參萬機禍至無日矣駿亦不從駿姑子宏訓少府蒯欽數以直言犯駿人爲之懼欽曰楊文長雖暗猶知人無罪不可殺不過疏我我得疏乃可以免不然與俱族矣楊駿聞東部王彰賢使人往匈奴辟王彰爲司馬使人去王彰聞知乃逃不受其友怪而問之彰曰自古一姓二後鮮有不敗況楊太傅昵近小人疏遠君子專權自恣乎吾逾海以避之猶恐及禍奈何應其辟乎且武帝不爲社稷大計嗣子既不克負荷受遺複非其人天下之亂可立待也八月廣陵王司馬遹既立爲太子帝以何劭裴循王戎張華楊濟和嶠爲師保惠帝初爲太子時和嶠曾言于武帝曰太子有淳古之風而末世多僞恐不了陛下家事武帝不則聲後又與荀勖同侍武帝武帝曰太子近進卿可俱詣之嶠勖二人去謁太子無有經國之言惟自樂而已二人即還見武帝荀勖曰今太子明識雅度嶠曰太子聖質如前武帝不悅而起及是以和嶠爲少保從太子遹入朝賈後在簾內使惠帝問之曰臣昔謂朕不了家事今定如何嶠曰臣昔事先帝曾有是言言之不效國之福也何必曰更
