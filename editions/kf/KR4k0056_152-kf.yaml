body:
  text: 第一四九回郭璞葬致天子問卻說尚書郎郭璞因母死居憂去職在家將母柩櫬下葬于暨陽近河漫水百余步當友人王用謂璞曰君何葬母地近河他日洪水漂蕩則母骸將爲魚矣璞曰卿不必憂不久當即爲陸矣用不信後因洪水走推別處反沙漲去墓十裏皆爲田於是用深敬之因父棺未埋亦請郭璞代他擇吉安葬璞與擇地葬其父後郭外東陵龍耳上埋訖私謂王用曰其地甚吉不出三年當致天子相問也時明帝聞知郭璞嘗與人擇葬吉效如神尚未深信乃自微服裝作庶人引從者私出宮門來觀其所葬之地如何恰好來至東陵遇王用掃墳帝問曰此墳誰替你擇葬用曰乃是郭璞帝佯嚇之曰何以葬于龍角此法當夷族既是璞葬有何吉應用曰郭璞道此葬龍耳不出三年當致天子也帝曰出天子耶用曰當致天子問耳帝異其效乃歸宮次日詔郭璞起複以爲尚書郎凡事皆與議之璞素與桓彜友善彜常造之或璞在廁間便入相見時值歲除璞穰燈知來年有大難至正月欲行掩法怕人窺見正在廁間請祝彜又至璞曰卿來他處自可但不可廁上相尋耳若相尋必客主有殃彜笑辭歸旦璞在廁行掩法彜飲得大醉詣璞家數尋不見至廁果遇璞正在廁行掩法彜竊而觀之見璞裸體披發口銜刀設醊回首忽見彜在撫心大驚出曰此天命不可逃也吾每囑卿勿來廁間反更如是豈但禍吾卿亦有殃不能免彜聽言被嚇酒已半醒因曰我被酒誤矣二人歔欷一回各別去是歲璞因王敦反被害後彜因蘇峻反死史說璞撰前後筮驗六十餘事名爲洞林又抄京費諸家要撮更撰新林一篇韻一篇注釋爾雅又注三蒼萬言穆天子傳山海經楚辭並所作詩賦誄頌亦數萬言皆傳於後世卻說後趙右長史張賓卒後趙王勒哭之慟曰天不欲成吾事耶何奪吾右侯之早也因謂文武曰張賓闊達大節謀無不中算無餘策成吾業者賓之勳也雖子房蕭何不過其才耳卿輩年齒與朕等輩惟有侯年少吾欲托以後事不期如此天滅使朕心腹崩裂矣言訖又淚如雨親往吊祭哭之而歸以程通代爲右長史勒每與遐謀議有所不合輒歎曰右侯舍我去豈非酷乎因是流涕彌日矣肅宗明皇帝太甯甲申元年三月後趙王勒使桃豹孔長等寇彭城下邳等徐州刺史卞敦退保盱眙王敦欲謀篡使人諷朝廷征己明帝舉手詔征之敦遂徐移鎮姑孰屯蕪湖以王導爲司徒自領揚州牧敦欲爲逆弟王彬諫之甚苦敦變色目左右將殺之彬正色曰君昔歲殺兄今又殺弟耶敦乃止之
