body:
  text: 第二十四回周處戰死在羌陣七年正月將軍周處領軍至涇陽氐羌齊萬年以兵七萬屯梁山梁王肜夏侯駿謂周處曰今氐兵皆屯梁山你可領五千兵去擊之處曰軍無後繼必敗不惟身亡爲天朝恥今日以五千兵去戰彼七萬若無後援何以取勝梁王曰你速去攻吾自以大兵後應於是周處以五千人欲飽飧出戰粱王故使人促之曰氐兵甚弱不必傳飧令速進兵周處憤怒驅兵而出與齊萬年遇於六陌坡周處全身披挂手執長槍出陣與齊萬年交戰大戰五十餘合不分勝負自旦至暮兩軍混戰其如氐兵十倍於我加之兵未得食五千人所存無幾處複奮勇攻擊戰得弓盡弦絕救兵不至軍士曰眼見得粱王欲陷將軍故一卒不援不若引退以避其鋒周處按劍曰是吾效節致粱王若受王命之日也遂力戰而死殘軍涕泣逃散梁王肜與夏侯駿等聞周處力戰而死皆不敢出戰只得堅壁守住險要使人請救不提史說李特字玄休巴郡西宕渠人其先廩君之苗裔昔武洛鍾離山崩有石穴二所其一赤如丹一黑如漆有人出於赤穴者名曰務相姓巴氏有出於黑穴者凡四姓曰釋氏樊氏柏氏鄭氏共五姓俱出皆爭爲神於是相約以劍刺石穴屋能著者爲廩君四姓皆莫能著獨務相氏之劍懸焉四氏不肯服務相氏又以土爲船雕畫之而浮于水曰若其船浮者爲廩君四氏亦以土爲船放于水即沈務相氏之船又獨浮於是四氏遂尊稱務相氏爲廩君五姓共上土船當夷水而下至於鹽陽鹽陽水神乃一女子出止廩君不得行廩君以矢射之中鹽神鹽神死複乘土船下及夷城因居之秦並天下以爲黔中郡巴人呼賊爲賨因謂賨人焉漢高祖更名其地爲巴郡漢末賨人自巴郡宕渠遷於漢中魏武帝克漢中特祖將五百餘家歸之武帝遷之於洛陽因居之爲易姓李氏焉
