body:
  text: 第二七九回後秦王還斬苟曜辛卯十六年五月秦王登及後秦王萇相持苟曜密使人見秦王登許爲內應登以兵自曲牢赴之軍於馬頭源後秦王萇率衆逆戰登擊破之斬其右將軍吳忠萇收欲複戰姚碩德曰陛下慎于輕戰是以大敗每欲以計取之今戰失利而更前何也萇曰登用兵遲緩不識虛實今輕兵直進此必苟曜與之有謀而來也緩之則其謀得成故及其未合擊之必勝遂進兵複戰登大敗退兵屯於郿城秦王登退屯後秦王萇如陰密以拒之謂太子興曰苟耀聞吾北行必來見汝稱彼詐降苻登之事欲來惑汝汝執誅之萇既行曜果至長安興誅之萇進兵敗登于安定城東登退據路承堡萇置酒高會諸將皆曰若值魏武王不令此賊至今陛下將牢太過耳萇笑曰吾不如亡兄有四身長八尺五寸臂長過膝人望而畏之一也將十萬之衆望麾而進前無橫陣二也溫古知今講論道藝收羅英儒三也董率大衆人盡死力四也所以得建立功業驅策諸賢者正望算略中一片耳壬辰十七年三月燕王垂以兵五萬擊翟釗翟釗大驚又以兵一萬來拒垂又遣使求救于西燕西燕王永問於群臣尚書郎鮑遵曰今垂釗相持不可與解使兩寇相弊吾乘其後此卞莊子之策也侍郎張騰曰垂強釗弱何弊之乘不如速救之以成鼎足之勢今我引兵趨中山晝多設疑兵夜多設火炬垂懼必而自救我沖其前釗躡其後此大妙之計不可失也永曰遵言是也遂不從騰議時垂軍至黎陽臨河欲濟釗乃列兵南岸以拒之垂遣別將將兵虛屯爲疑乃自徙營就西津去黎陽西四十裏計爲牛皮船百餘隻僞列兵仗溯流而上釗引兵趨之垂潛遣王鎮等自黎陽津夜以牛皮船濟營于河南北立營成列釗還攻垂垂命堅壁勿戰釗兵往來大喝攻營不拔將引兵退去鎮等率兵出戰慕容農自西津濟以兵夾攻大破之盡獲其衆及所統七郡三萬餘戶釗命長子降西燕歲餘謀反後被慕容永所殺垂以章武王宙鎮滑台崔蔭爲司馬蔭明敏強正善規諫宙甚憚之簡刑法輕賦役流民歸之戶口滋息卻說晉殷仲堪雖有時譽資望猶淺到官好行小惠綱目不舉南郡公桓玄負其才以雄豪自處朝廷疑而不用年二十三始拜洗馬玄嘗詣琅玡王道子值其酣醉張目謂衆客曰桓溫晚途欲作賊雲何桓玄伏地汗流不能起由是不自安而切齒于道子後出補義興太守鬱鬱不得志歎曰父爲九州伯兒爲五湖長遂棄官歸國上疏自訟不報桓氏累世臨荊州玄複豪橫士民畏之嘗與仲堪廳事前戲馬以矟擬仲堪參軍劉邁曰馬矟有餘而精理不足玄不悅既出仲堪謂邁曰卿狂人也玄必使人殺卿卿宜避之我豈能相救耶仲堪即使邁避去玄果使人迫之不及矣征虜參軍胡藩過江陵見仲堪曰玄志奢侈狂妄君侯待太過非計也藩內弟羅企生爲仲堪功曹藩謂曰殷侯倒戈授人必及於禍君不早去悔無及矣羅企生遂同藩而歸
