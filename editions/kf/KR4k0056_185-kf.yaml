body:
  text: 第一八二回趙王虎殺太子邃卻說趙太子邃虎甚愛之謂群臣曰司馬兄弟自相殘滅故使朕得於如此如朕有殺阿鐵理否群臣皆默而不言既而邃驕而殘忍好裝飾美姬斬其首與賓客傳觀又烹其肉共食之時虎亦荒耽酒色喜怒不常因使邃省司尚書事誚責笞捶月至再三邃私謂中郎子李顔曰官家難稱吾欲行冒頓之事卿從我乎顔等伏不敢對邃計遂稱疾不視事虎欲去視邃疾佛目澄謂曰陛下不宜往東宮虎問之澄故不答虎思其東宮有謀乃自還宮命所親信女尚書親爲己往視察之邃以虎至抽劍擊之虎知大怒收顔等詰之顔具言虎狀遂殺顔三十餘人即詔廢邃殺之並其男女二十六人並埋一坑虎於是召次子石宣立爲東宮
