body:
  text: 第二二一回王猛披褐謁桓溫史說王猛字景略北海劇人少貧賤以鬻畚爲業嘗貨畚於洛陽乃有一人貴買其畚而雲無銀自言家離此不遠可隨我去取銀於你猛利其價而從之行不覺路遠忽至深山見一父老鬚髮皓然據胡床而坐左右十餘人其人引猛進猛拜之父老曰王公何緣拜也因此乃十倍償其畚銀遣人送之猛既出返視之乃嵩岳高山也猛始知其父老者乃嵩之神稱其王公者知後必當貴由然自重也猛豐資俊偉謹重嚴毅器度雄遠尤善好學倜儻有大志不屑細務是以浮華之士鹹輕笑之猛悠然自得隱于華山從師王佐先生是以胸懷佐世之才希遇龍顔之主由然斂翼待時候風雲而起時猛忽聞桓溫入關而披褐謁之直入中軍一見桓溫便談當世之務捫虱而言旁若無人溫異而問之曰吾今奉天子之命將銳卒十萬爲百姓除殘賊而三秦豪傑未有至者何也猛答曰公不遠千里深入敵境今長安咫尺而不渡灞水百姓未知公心所以不至也溫聽訖默然無以應徐曰江東無卿比也於是溫重猛賜其車馬欲署猛爲謀軍祭酒猛辭曰本欲扶佐明公掃滅妖塵奈本師年老無人奉養且今病重待其百歲後即來聽教耳言訖拜辭而去溫堅意留之不住只得與回時王猛辭桓溫回見師父王佐先生曰我謁桓溫桓溫賜車馬拜我高官吾以師父年老力辭得還王佐曰你與桓溫豈並世哉不必懷憂更在此間一年必有人來聘你富貴非輕何用遠涉而隨他人乎猛從其言卻說桓溫初起兵時糧食不敷諸將以爲憂溫曰諸君勿憂吾大軍若到秦境麥熟可取爲糧何必爲慮乎諸將以爲然及至此而麥悉被秦人芟之因此溫軍絕食至六月參軍孟嘉上言曰三軍無食何以用兵不如暫退待來年麥熟再整兵來與戰溫曰奈關中百姓相隨與我安忍棄之嘉曰可令人遍告百姓有願相隨同行不願者從便時關中百姓若老若幼皆齊聲應曰我等就死亦隨將軍還晉言訖關中計有三千餘戶皆號泣先行次後桓溫下令三軍拔寨起行卻說秦王健聞知桓溫退乃遣苻雄率兵一萬追溫趕至戰于白虎源桓溫兵思歸無心戀戰因是不利大敗死者萬餘人初溫指望秦麥爲糧既而清野以待之溫軍乏食徙關中三千餘戶而歸又補秦太子苻萇等隨後追擊溫至潼關溫軍屢敗失亡不計數時苻雄率兵方攻司馬勳溫交大敗並還漢中昔溫之屯灞上順陽太守薛珍勸溫徑進逼長安溫弗從珍以偏師獨濟頗有所獲及溫退乃顯言於衆自矜其勇而咎溫之持重溫聞知殺之時秦太子萇追桓溫中流矢死淮南王苻生幼無一目性魯暴其祖苻洪常戲之曰吾聞瞎者只一淚生怒引佩刀自刺目出血曰此亦一淚也洪大驚鞭之生曰素性愛刀槊以不堪鞭棰洪謂健曰此兒狂悖宜早除之不然必破人家可將殺之健曰兒自應改何可遽爾及長力舉千鈞手格猛獸走及奔馬擊刺騎射冠絕一時強後欲立太子晉王柳秦王健以讖文有三羊五眼至是乃立生爲太子
