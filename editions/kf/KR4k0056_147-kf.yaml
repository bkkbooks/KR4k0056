body:
  text: 第一四四回王導待罪于闕下元帝聞王敦兵將至使人征戴淵劉隗領兵入衛建康二將皆應命而至帝使百官出迎于道劉隗岸幘大言意氣自若與百官刁協等入朝元帝君臣禮畢隗協平身帝曰王敦作逆故召卿等還迎王敦是時劉隗刁協大驚急奏曰王敦作逆其弟王導並家屬數百人今在建康城內若敦兵至此導必爲內應不如先誅王導等族衆然後以兵去迎帝曰容朕三思後行隗協見帝不許心中愈驚司空王導聞兄王敦作亂見劉隗刁協奏請盡誅王氏心中大恐乃率其從弟中領軍王遽左衛將軍王廙侍中王侃王彬及宗族群從昆弟子侄二十余人每旦詣闕待罪值仆射周顗入朝導呼仆射謂曰伯仁吾以百口累卿望速救耳顗直入不顧而見帝奏曰司空王導聞兄王敦謀逆今領兄弟宗族二十余人闕下待罪臣見王導平素忠誠必無叛心若與敦私有異志安肯身留建康自陷也望陛下看其草創之功以赦如今無貳之愆帝曰朕亦思王導無叛之意可原其心納其言而赦之周顗先是飲酒而入及辭出還未醒當周顗見納其奏即出王導猶在闕前待罪見顗出又呼而問之顗不與言顧左右曰今年殺諸賊奴取金印如鬥大系肘後言訖即出乃使人上表明導無罪言甚切至王導不之知而心甚恨之元帝又見周顗上表乃下詔赦王導等二十餘人無罪賜朝服召入朝見之導稽首奏帝曰賊臣逆子何代無之不意今日近出臣族帝下殿執導手曰茂弘朕方寄卿以百裏之命安忍罪之於是君臣惠愛如初三月帝以王導爲前鋒大都督以戴若思爲驃騎大將軍詔曰王導以大義滅親可以之爲安東時節假之將軍又以周顗爲尚書左仆射王遽爲右仆射次日帝乃命劉隗刁協戴若思等領軍去迎將軍周劄素愛儉好利帝使劉隗領兵屯金城使周劄屯石頭城二人領詔去訖時敦軍至石頭欲先攻劉隗杜弘謂敦曰劉隗死士多未可易克周劄少謀兵不爲用攻之必敗劄若敗則隗走矣敦從之使弘爲前鋒將軍以軍二萬先攻石頭周劄果開城門納弘弘軍一湧而人於城屯住於是王敦入據石頭歎曰吾不得複爲盛德事矣謝鯤曰何爲其然也但使自今已往日忘日去耳元帝聞石頭失守詔命劉隗刁協戴淵周顗王導等分頭接戰於是協隗淵等領兵來石頭挑戰王敦聞探事人回報王導爲都督驃騎大將軍總領諸軍事又令刁協劉隗戴若思領兵十萬前來迎敵自令軍馬將到石頭敦忙喚周撫鄧嶽二人整軍馬去戰於是二人以軍出城排陣是日兩軍相遇劉隗出馬大罵王敦朝廷何負你故敢謀反周撫大怒拍馬出戰更不打話挺槍便刺劉隗以刀來迎二人交戰戰到二十餘合隗敵周撫不住走回本陣戴若思忙持刀接住周撫交戰戰三十餘合不分勝負鄧岳見周撫贏不得若思亦拍馬掄斧沖出陣幫護周撫三人在垓心交戰戰不過五合若思敵不過二人勒馬便回本陣被王敦麾兵一擊殺得晉兵大敗抛戈棄鼓倒旗失金亂潰奔走各自逃生王敦等連追數十餘裏方始下令收軍還城當劉隗刁協得戴若思保護走回建康入太極殿見元帝曰王敦勢大難以迎敵因此大敗而回是時劉魄刁協二人在帝前流涕帝亦攜二人手垂淚因謂隗協二人曰今王敦謀逆爲汝二人汝二人乘其未還可引本屬朕給與兵符避禍免遭其難刁協泣曰臣當死守不敢有避元帝曰事逼矣安可不行乃命有司給兵符人馬與二人二人流涕拜辭元帝出領家屬帶人馬出城而逃元帝見二人去了心中憂悶無人去退敦兵當太子司馬紹欲自率將士決戰溫嬌執鞚諫曰殿下國之儲副奈何以身輕天下抽劍斬鞚乃止敦雖知劉刁走了仍擁兵不朝放士卒劫掠宮省奔散惟將軍劉超按兵直衛及侍中二人侍帝側元帝遣使謂敦曰劉刁二人皆奔外國去矣公若不忘本朝於此息兵則天下尚共安矣如其不然朕當歸琅玡以避賢路敦部下禁兵未肯退當司空王導奏曰陛下不須煩惱臣請詔加王敦爵位臣與百官去說其罷兵彼自退矣元帝從之
