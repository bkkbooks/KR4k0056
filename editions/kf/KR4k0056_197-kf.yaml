body:
  text: 第一九四回成帝崩立琅玡王成帝壬寅八年正月朔日食豫州刺史庾懌與江州刺史王充之有隙會充之回朝因過豫州懌以毒酒送王充之充之覺其毒以其酒與犬飲即斃充之即歸朝密奏其過惡成帝怒曰大舅已亂天下小舅複欲爾耶懌使人竊聽之恐帝加罪乃自鴆飲而死六月成帝不豫時帝有二子丕弈皆在繈褓帝自幼沖嗣位既長頗有勤儉之意至是疾篤或詐爲尚書符敕宮門無得內入宰相庾冰何充等入內視疾入宮見此符敕皆不敢入庾冰曰此必詐矣即遣人先入推問果然衆始能入臥前庾冰問曰陛下龍體若何帝曰朕恐旦夕必歸陰欲召卿托以後事朕今崩後丕奕幼沖難以臨朝欲遺調詔太后垂簾卿宜盡心輔政休負朕言冰半晌不答自思帝二子皆在繈褓恐上易世之後親屬愈疏爲人所間乃對曰目今石氏在趙甚是倡狂李壽居蜀屢懷不仁天下未安四海紛紜若立幼沖恐非社稷之計先聖有雲國有強敵宜立長君今陛下之弟琅玡王嶽有仁德之風不若立其爲嗣天下萬幸也帝曰卿言至當何充曰父子相傳先王舊典且今將如孺子何於是帝詔冰充等及武陵王晞會稽王昱尚書令諸葛恢並受顧命而崩冰代爲舉哀發喪立帝同母弟琅玡王岳爲康帝改號建元孝康皇帝名岳字世同乃成帝同母弟也初封琅玡王在位二年按諡法溫柔好樂曰康岳既即皇帝大位諒陰不言委政於冰充二人而謂曰朕嗣洪業乃卿二人之舉也充曰陛下龍飛臣冰之力也若如臣議不睹升平之世帝有慚色時帝年二十一頗留心萬機務在簡約雄武之度雖有愧于前王勤儉之德足追踵於往烈矣何充出朝謂庾冰曰公勸先帝嗣今上果應郭璞之讖雲冰曰郭璞雲何充曰郭璞有言曰立始之際丘山傾立者建也始者元也丘山主上諱也然傾者恐不吉冰乃翟然歎曰如有吉凶豈改易所能救乎君可勿露二人言罷而散七月康帝封成帝子丕爲琅玡王弈爲東海王就葬成帝于興平陵康帝自徒行送喪至閶闔門始坐輦輿既葬畢乃自回宮十月燕王皝乃率百官領家屬遷于龍城時有白龍黑龍各一見於龍山近侍奏知燕王皝皝親率群臣觀之備儀太牢祀之於山上須臾二龍交合嬉翔解角而去皝大悅歸宮新宮曰和龍宮又命建造佛寺於山上名曰龍翔寺賜大臣子弟爲官又立東庠于舊宮以行鄉射之禮帝常親臨東庠考試學生其有經通秀異者擢充近侍是歲始不用晉年號自稱十二年
