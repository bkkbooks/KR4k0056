body:
  text: 第一七五回趙王勒卒太子立自此趙王勒寢疾中山王石虎人待矯詔群臣親戚皆不得入時秦王石宏彭城王石堪將兵在外虎恐其擁兵在外不能行事乃計使其還勒疾小瘳見宏驚曰吾使汝二人處藩鎮正備今日汝何故在此耶虎懼前奏曰秦王思慕陛下暫還視疾耳今遣還之宏出虎仍留之不遣至是勒疾篤遺命曰大雅兄弟宜善相保司馬氏汝輩前車也中山王宜深思周霍勿爲將來口實言訖卒年六十歲在位十五年改元者二太和建平勒未卒時天靜風輕而塔上一鈴猶鳴佛圖澄謂衆曰鈴音雲國有大喪不出今年至是果應其言大臣徐光等領百官舉哀發喪將勒靈柩停于東陽山谷未及安葬是夜權瘞忽不見莫知所往意者以其爲神因是光等複備其儀衛文物虛葬于高平陵卻說石虎欺勒已死乃與子邃謀劫太子弘使人收程遐徐光下廷尉使其子邃將兵入宿衛弘大懼急讓位於虎虎曰汝休辭讓且登其位汝若不堪重任天下自有大義何足豫論弘乃即位改元延熙元年時虎即殺程遐徐光自爲丞相魏王大單于加九錫
