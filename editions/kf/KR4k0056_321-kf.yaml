body:
  text: 第三一八回劉裕抗表伐南燕己酉五年正月南燕王超正旦朝會群臣歎太樂不備超曰孤每恨朝會缺此樂音吾與卿等大臣商議掠晉人以補伎韓訁卓曰先帝以舊京傾覆戢翼三齊陛下不養士息民伺釁恢復而更侵掠鄰國以廣仇敵可乎超曰吾志已定不聽卿言遂使公孫五樓兄歸將兵寇宿豫拔之大掠而去簡男女二千五百人教之以樂五樓等總朝政宗親並居顯要內外無不憚之五月太尉劉裕聞南燕王慕容超大掠宿豫男女二千餘人乃大怒將欲伐燕朝廷不許劉裕抗表要伐南燕朝議皆以爲不可惟孟昶謝晦臧熹勸行裕以昶監南府事苻氏之敗王猛孫鎮惡來奔騎射不能及人而有謀略善果斷善論軍國大事或薦之於裕裕語悅之因留宿明日謂參佐曰吾聞將門有將信然即以爲中軍參軍史說王鎮惡北海人也祖王猛仕苻堅位兼將相鎮惡以五月生家人以俗忌欲令出繼疏宗其祖猛曰此兒非常昔孟嘗君惡月生而相齊是兒亦將興吾門矣故取名爲鎮惡年十三有大志而苻氏敗寓食龜池人李方家方善遇之鎮惡謂方曰若遇英雄主要取萬戶侯宜當相厚報耳至是劉裕召爲參軍果應其言矣四月裕以劉毅鎮姑孰自領衆欲行當毅聞知固止之曰昔苻堅侵境謝太傅猶不自行宰相遠出傾動根本公既受輔朝政豈可遠離宜委別將討之劉裕猶豫謝景仁獨上言曰公建桓文之烈應天人之心雖業高振古而德刑未樹正宜推亡存固廣振威略平定之後養銳息徒然後觀兵洛汭修覆陵寢可也豈有縱敵貽患者哉裕曰然於是引軍速行史說王曇首太保弘之弟也幼而素讓以兄弟分財曇首惟取圖書而已因劉裕聚兵討慕容超與弟王球前來投伍劉裕因謂曰卿並膏粱世德乃能屈之於戎旅耶曇首答曰既從神武自使懦夫立志耳時謝晦在座曰仁者果有勇也裕大悅以爲鎮西長史裕率舟師自淮入泗軍至下邳留輜重步進至琅玡所過皆築城留兵守之王鎮惡謂裕曰燕人若塞大峴之險或堅壁清野大軍深入不惟無功將不能自歸奈何劉裕曰吾慮之熟矣鮮卑貪婪不知遠計近利虜獲退惜禾苗謂我孤軍遠人不能持久不過進據臨朐退守廣固彼不能守險清野敢爲諸軍保之言訖明日出行
