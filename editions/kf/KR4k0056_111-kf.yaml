body:
  text: 第一八回梁緯夫妻死恩義七月漢劉曜攻拔北地郡以兵進至涇陽麹允欲以軍救之被劉曜計使百姓于道反間紿允曰郡城已陷去無及也因此允逗留衆懼而潰被曜引衆來追允軍寡弱大敗而還複集將士萬人來取北地郡允性仁厚無威權專以爵位悅人諸郡太守皆領征鎮村塢主帥小者猶假銀青將軍之號然恩不及下故諸將軍驕恣而土卒離怨於是劉曜進至涇陽河北諸城悉潰如入無人之境忽諸將獲晉將軍魯克梁緯至曜命釋其縛與酒飲之曰吾得子天下不足定也克曰身爲晉將國家喪敗不敢求生若蒙公恩速死爲幸曜曰忠義士也吾不殺汝因賜劍與其自裁魯克梁緯接劍皆自刎而死曜深惜之歎嗟不已諸將又獲將梁緯之妻辛氏至曜見辛氏美色欲以爲妻辛氏不從哭之曰妾夫已死義不獨生且一婦人而事二夫將軍何取之乎曜曰此貞女聽其自裁辛氏亦求劍自殺曜悲哀不已皆以禮葬之卻說漢主聰立故張皇後侍婢樊氏爲上皇后三後之外佩皇后璽綬者複七人嬖寵用事刑賞紊亂大將軍劉敷數涕切諫聰怒曰汝欲乃公速死即何以朝夕生來哭人也敷歸憂憤而卒時漢大蝗民流殍者什五六石勒聞知遣將屯並州招納流民歸之者二十萬戶聰知遣使讓之勒不受命
