body:
  text: 第二六一回安玄破秦百萬兵卻說謝安得朱序說秦軍中之備細乃升帳聚大小將校聽令安曰吾自受命以來未嘗出戰今已識秦之動靜矣吾欲先取洛澗一營誰人敢去言未畢桓伊等一齊出盡言願往安皆令退獨喚階下一人姓劉名牢之字道堅彭城人也沈毅多計驍猛無敵現爲參軍安甚重之故喚牢之曰汝領五千精銳去攻洛澗第一屯乃是秦將梁成之營今晚便要成功吾自提兵來救應牢之領軍去了又令謝玄桓伊二人各以兵三千抄小路奔下流埋伏待梁成兵敗走回汝二人各以兵截住斷其歸路待牢之趕至兩下合兵接應二人亦各引兵去了卻說劉牢之領精兵五千趨洛澗隔十裏一望秦軍梁成阻澗爲營牢之身先渡水精兵後隨鼓噪直前成聽見鼓響知有兵至忙令士卒阻洛爲陣以待晉兵當牢之當先上岸殺死十余人秦兵奔潰梁成持槍直取牢之牢之輪刀便迎兩馬相交軍器並舉二人交鋒戰上五合梁成被牢之一刀砍于馬下亂殺秦兵秦揚州刺史爲王顯見梁成死了忙領殘兵走奔下流正遇謝玄交馬一合被玄捉住桓伊橫殺秦兵俄而牢之領兵夾攻秦之士卒爭赴淮水死者萬五千人淮水爲之不流於是謝玄盡收得秦之器械軍資收軍來見謝安又安傳令水陸三軍盡進屯於肥水之東秦王堅聞梁成死了前鋒有失遂傳令叫苻融率兵過肥水而陣晝夜分巡以守江岸卻說謝安既破秦之前鋒命水陸並進屯於肥水下住營寨至夜召謝玄入謂曰今秦王敗其前鋒必不敢進彼欲退恐天下之人恥笑必然猶豫爾可急攻之吾今先回城以安聖上之心汝領諸將徐徐進去吾想朱序在內必定相應玄曰叔父穩便回騎侄自斟酌而行於是謝安回建康朝見晉帝曰臣托陛下洪福破其前鋒臣慮陛下隱憂群臣震恐先回報捷陛下高枕無患日下管取破秦必矣帝曰東南有卿朕何憂焉卻說謝玄欲交戰秦兵逼水而陣因此晉軍不得渡心中悶悶乃思忖一計次日使能言快語軍人直至肥水岸邊遙喚陽平公苻融曰吾奉都督將令拜上將軍將軍遠涉吾境懸軍深入而置陣逼水此乃持久之計非欲速戰者也若移陣少卻使吾兵得渡以決勝負不亦善乎何必久守而廢糧草耶苻融聞其言即入城具以謝玄之言報知秦王苻堅苻堅遂問諸將曰汝等主意若何諸將徐成等曰我衆彼寡不如遏之使其不得上可爲萬全之計也秦王曰不然如此則自勞王師也吾便引兵少卻使彼兵半渡我以鐵騎數十萬向水擊而殺之蔑有不勝融曰陛下神見諸將不及於是苻融即出傳令是夜移營卻陣十裏之程屯住又令徐成選鐵甲軍五萬待迎時玄打探軍人聞秦兵移陣即忙報于謝玄大喜曰破秦必矣今夜即行桓伊等曰秦兵勢大何以破之玄曰此計但瞞不過王猛今天幸此人已死使吾成大功矣彼兵一百余萬連下百余營今卻陣必然混亂吾乘其亂而攻之可擒苻堅也於是大集諸將聽令即點水路進兵雲是夜半東南風大作可用船載茅草依計而行令劉牢之領十數支軍攻江北岸桓伊領十數支軍攻江南岸每人各茅草一束內藏硫黃焰硝皆帶火種草挑於槍刀之上但到秦營近林者因順風舉火秦兵四十營只燒十營間三屯則彼兵必自亂矣乘亂之時以兵擊之各帶行糧不許暫退連更曉夜直拿住秦苻堅方止諸將得令皆去依行卻說秦王當日自出城中尋思破晉之計忽見中軍帳前無風旗幡自倒權翼曰此凶兆也莫非有晉兵今晚劫寨秦王未信有軍報曰上山遠遠望見晉兵已出渡水而東去了秦王曰此疑兵也只管移營令徐成引兵馬五萬去迎黃昏左側東風驟起權翼回報水北岸寨中火起秦王便叫探視張蠔也來回報望見水寨中火起秦王即喚徐成親往水北岸張蠔親往江南看其虛實如晉兵到可急回二將領兵去了初更左側喊聲動地西屯軍馬齊奔禦營軍自相踐蹈死者無數後面晉兵殺到正不知多少軍馬秦王急急上馬引軍奔走火光連天而起江南江北照耀如同白日苻融引手下數百騎正逢晉將桓伊被伊軍圍住亂箭射死謝琰引軍來趕秦王堅望西奔走前面一軍來到爲首乃是晉將謝玄秦王大慌前謝玄後謝琰兩軍夾攻四下無路忽聞喊聲張蠔引軍殺入救秦王出急上戰船與張蠔等將船棹開中流被玄令軍人在岸上射之萬弩齊發秦王中箭倒在船上衆將救醒奔逃時朱序後與部下從軍在秦軍中大叫秦軍大敗秦王死了因此秦軍及禦林軍奔潰而走其時秦軍因移陣大亂隊伍不齊況兵退不復立住因此大敗秦王中矢單舸走過西河下時天色已明正走間前面又一軍到張蠔出馬迎之乃秦將徐成合兵一處後面晉兵大至前到一山乃停馬山張蠔引軍上山山下喊聲大震謝玄人馬大隊已到周回把山圍住秦王停住曰死據其山秦王遙望己兵自相蹈藉死者蔽野塞川重疊死屍塞江而下肥水爲之不流圍及至次日晉兵越厚四面放火燒山軍馬亂竄忽見火光中一將引數千騎殺上山來秦王視之乃鄧羌也羌曰四下火光逼近不可久停請陛下走回欲再收兵秦王曰誰可斷後傅刪曰臣願舍死以擋之其日黃昏張蠔在後鄧羌在前冒煙突火而下留傅刪擋後晉兵見秦王時各皆要爭功並進軍突火而來秦王叫從行軍士盡脫衣甲疊於山路而焚之以絕後軍方走得脫謝玄謝琰桓伊劉牢之會朱序之兵乘勝追擊無不一當十百當千殺得秦兵大敗自相踐踏死者漫山塞野其走者聞風聲鶴唳皆以爲晉兵且至晝夜不能停息草行露宿重以饑凍死者十去七八謝玄追至青岡方傳令鳴金收軍獲得秦王堅乘輿及雲母車儀蓋器械軍資珍寶堆積如山俱各立冊抄記留獻朝廷次日玄作書使人見叔父謝安報捷時謝安正與王羲之圍棋驛人持書與安安令驛人去了安一面圍棋一面拆書看其書已知謝玄已破秦矣遂將書放在床上了無喜色下棋如故王羲之問曰書中何事安曰小兒輩遂已破秦羲之曰宜速報朝廷何事於棋言訖辭出謝安既罷棋入內過戶限心甚喜不覺屐齒之折直入宮見帝奏曰臣子侄托陛下洪福齊天已破秦師百萬於肥水之上獲得秦王雲母車及軍資寶貝今進獻朝廷帝曰朕得卿子侄等輩破此強秦天下幸甚從今以後朕何憂焉即加封謝安爲太保於是降詔進謝玄爲前將軍假節鉞令其振旅還鎮京口是時秦之諸軍皆潰散惟慕容垂所將三萬人獨全卻說秦王堅奔走淮北淮北饑甚又無糧草百姓進壺飧豚髀供給秦王堅受食之大悅曰較公孫豆粥劉秀麥飯有加無減堅以帛賞百姓百姓辭曰陛下厭樂安苦自取危困民爲陛下子陛下爲民父安有子飼其父而求報乎弗顧而去堅謂張夫人曰吾今有何面目治天下乎潸然流涕當秦王堅聞諸軍皆潰惟慕容垂三萬人全師淮南乃領千騎奔垂探事軍人報曰今有秦王堅大敗引殘軍千騎前來見將軍當世子慕容寶謂父慕容垂曰五木之祥今其至矣又曰秦王兵敗委身於我是天借之以複燕柞此時不可有失也垂曰汝言是也然秦王待我甚厚今兵敗以赤心投命于我何可害之若氐運必窮吾當懷集關東以複先業耳時諸將佐皆勸垂殺堅垂不從遂自出中軍迎秦王堅入內悉以兵符還秦王堅堅大悅收集離散乃使子苻丕同燕之舊將丁零守長樂與垂等北至洛陽衆複十余萬百官儀物軍資略備當慕容垂言于秦王堅曰北鄙之民聞王師不利輕相煽動臣請奉詔書以鎮安陽聚集軍糧以圖再舉報仇就因便入展拜先祖廟陵以盡臣等一點孝心陛下聖意雲何秦王堅曰從卿所請領兵往鎮垂謝恩拜辭即出領兵起行權冀諫秦王曰國兵新破四方皆有離心宜徵集名將置之京師以固根本垂勇略過人世家東夏固以避禍而來其心豈止欲作冠軍而已哉譬如養鷹饑則附人飽則颺去豈可解其所縱任其所欲也秦王堅曰卿言是也然朕已許之匹夫猶不食言何況萬乘乎若天命有興廢固非智力所能移也翼又曰陛下重小信而輕社稷臣見其往而不返關東之亂自此始矣堅亦不聽
