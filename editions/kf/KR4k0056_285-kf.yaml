body:
  text: 第二八二回慕容垂舉兵伐魏卻說北魏王拓跋珪大集文武商議安內之策當叔孫建曰安內之策莫若富國強兵則敵自服而內始安今國內狹隘兵卒十萬糧無支年若欲安內必須叛燕侵取附寨諸部方可聚兵魏王珪曰然奈國內無良將堪領大兵而行攻討建曰臣舉一人氣度魁傑武力絕倫常用丈八蛇矛每嫌細短後令匠人大做之猶嫌其輕複輟大鈴於刀下其弓力倍加常人常以矛刺人遂貫而高舉又常以一手插矛於地馳馬僞退敵人爭取拔不能彼引弓射之一矢連射二三人人皆怕之每從先帝征討先登陷陣敵無衆寡莫敢擋其鋒因此勇冠一時乃陛下宗室陳留王拓跋虔也陛下若用此人爲將征討諸部無不克也魏王珪從之宣陳留王拓跋虔至謂曰安平公叔孫建稱卿有文武之才薦卿爲將攻討諸部以兵五萬委卿前去征討附近諸部拓跋虔曰臣願盡犬馬之勞前去攻討諸部不得其地不敢生還言畢即出點起軍馬來犯燕境卻說後燕王設朝群臣奏知北代魏王拓跋珪謀叛遣陳留王拓跋虔以兵五萬犯境燕王垂聞奏即宣太子慕容寶遼西王慕容農趙王慕容麟至曰今魏拓跋珪謀叛以拓跋虔爲將犯境汝可率兵八萬自五原去伐魏王散騎常侍高湖諫曰魏與燕世爲婚姻結好久矣間以求馬不獲而留其弟曲在於我矣奈何遽擊之拓跋珪勇而有謀幼曆艱難兵精馬壯未易敵也太子年少氣壯必小魏而易之萬一不如所欲傷將損兵願陛下察之垂怒免湖之官即日令慕容寶等領兵起行斯時魏王珪聞知乃問僚佐張兗言於珪曰燕狃於屢勝有輕我心宜羸形以驕之乃可克也珪遂從之悉徙部落畜産日渡河千餘裏以避之燕軍至五原降魏別部三萬余家收穄田百余萬斛進軍臨河造船爲濟具
