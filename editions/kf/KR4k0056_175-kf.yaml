body:
  text: 第一七二回陶侃興兵討郭默庚寅五年春正月郭默使人傳劉胤首于建康王導明知郭默誣害劉胤而以默驍勇難制乃梟胤首於大航以默爲江州刺史陶侃聞之奮袂起曰此必詐也即自將兵討之上表言默罪狀與司徒王導書曰默殺江州即用爲方州害宰相即用爲宰相乎導收胤首答侃書曰默據上流之勢加以船艦成資故包含隱忍以待足下豈非遵養時晦以定大事者耶侃得書笑曰是乃遵養時賊也侃兵至江州默部下將縛默以降陶侃命斬之收兵還鎮二月後趙群臣請勒即皇帝位勒乃稱大趙天王行皇帝事立妃劉氏爲王后世子弘爲太子宏爲大單于中山公虎爲太尉進爵爲王虎怒私謂其子邃曰吾身當矢石二十餘年以成大趙之業大單于當以授我乃與黃吻婢子念之令人氣塞不能寢食待主上晏駕後不足複留種也
