body:
  text: 第二四四回苻堅舉兵取漢中卻說秦王苻堅聞簡文帝崩桓溫又死遂與群臣商議取江南之計當王猛上言曰江南急未可攻宜先取漢中以得勝之兵再取江南可一鼓而下也秦王堅曰正合吾意遂使鄧羌爲都督徐成楊安張蠔爲副將領兵十萬分三隊而去次日鄧羌楊安將征西軍士分爲三隊前部先鋒徐成後隊張蠔押運糧草即將起程早有細作報入漢中魯榮忙使人至梁州喚弟魯衛回來商議退敵之計衛曰漢中最險陽平關我去當依山傍林下千餘寨柵迎敵秦兵兄在漢甯盡發糧草接應魯榮遣大將楊仕楊欽帶五千軍馬以助其弟即日便起到陽平關下寨已定與鄧羌兩邊相持半月餘各不相勝羌傳令退軍徐成進曰敵勢未必強公何自退焉羌曰吾料賊兵每日提備急難取勝吾退軍回賊兵必定趕之吾分輕騎抄襲其後勝賊必矣成等曰都督神機莫可測也於是楊安張蠔分兩路各引輕騎三千取小路去取陽平關後鄧羌大軍盡拔寨起行楊欽聽知秦兵退請楊仕商議曰今羌退兵可乘勢擊之仕曰鄧羌詭計極多未必真實不可追趕楊欽曰你不去我當自去楊仕苦諫不從楊欽起五寨人馬前進是日大霧漫天對面皆不相見楊欽軍至半路紮住卻說楊安軍抄過山後見重霧垂空又聞馬嘶人語恐有伏兵急催人馬速行正說間到楊欽寨前內有幾個守寨兵土聽得馬蹄響只道是楊欽兵回開門納入軍馬一湧而入放起火來五寨軍士大亂盡皆棄寨而走當楊仕將及霧散之時來探消息五寨一齊火起楊仕引兵來敵與楊安戰不數合背後張蠔兵到楊仕殺開一條路望漢甯巴州而逃楊欽正要回時已被楊安張蠔占定寨了背後秦兵趕殺兩下來攻楊欽等軍大潰而走又被秦兵後追無心戀戰領了敗軍投陽平關魯衛知二將敗走各營已失半夜棄關奔南鄭巴州去訖羌得了陽平關諸寨魯衛楊仕來見魯榮言二將失了隘口魯榮大怒欲斬楊仕仕曰某曾勸楊欽休追秦兵欽不肯聽從故有此敗仕再乞一軍前去搦戰必斬秦兵如不勝願依軍令斬首階下榮命即去楊仕上馬引二萬軍離南鄭往漢甯巴州而去卻說楊安勸鄧羌進兵羌言不可安曰安乞一軍前去哨路羌即令安領五千騎望南鄭路上來正迎楊仕兩軍擺開仕遣裨將昌倚出馬與安交戰不兩合被安一刀砍於馬下楊仕自挺槍出與安鬥三十合以上不分勝負安撥回馬走仕趕來被安使拖刀計斬楊仕于馬下軍衆大敗而回羌知安已斬楊仕即時催軍直逼成都城下下寨魯榮驚得手足無措忙與弟魯衛收拾庫中寶物不敢回朝乃領從兵五千棄城走入南蠻去訖鄧羌見魯榮走令諸將勿追引衆入城分兵守定又遣楊安與朱彤以兵二萬人入寇梓潼涪城史說梓潼太守姓周名虓字孟威素有節操聞苻堅遣楊安等以兵來寇恐梓潼不固乃引衆退守涪城又憂不能保全使副將劉仁率步騎送母妻還南將至江陵被楊安細作竊知報與楊安知之安謂朱彤曰今周虓送母妻還國卿領一軍星夜從間道去追獲其母妻則周虓自然降矣彤曰將軍率兵向涪城吾引一軍星夜去追於是朱彤率精兵五千抄小路先抵江陵南路未及半日只見劉仕引一千兵送虓母妻到被朱彤獲之勒兵回見楊安同致涪城楊安將虓之妻母到城下高叫周虓曰君早納降保全母妻不失孝道如若不降先殺汝母妻然後攻城周虓見母妻被縛在城下乃號泣謂衆曰吾欲盡忠奈母親被劫若不出降必受其害哀哀父母生我劬勞無以報恩反貽以禍人子之心何以安乎言訖遂下城開門納降因此楊安等將兵入據涪城使朱彤押送周虓其母妻與羌大軍還京來見秦王苻堅堅大悅以周虓爲尚書郎虓固辭不受曰虓受晉國厚恩以至今日但老母見獲失節於此母子獲全秦之惠也雖公侯之貴不以爲榮況郎任乎堅乃止遂使人監視不與還國虓每見堅或箕踞而坐呼之爲氐賊嘗值元會儀衛甚盛堅問之曰晉朝元會與此何如虓攘臂厲聲曰犬羊相聚何敢比擬天朝秦人見虓不屈屢請殺之堅待之彌厚
