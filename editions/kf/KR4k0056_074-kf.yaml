body:
  text: 第七十二回何曾一曰費萬錢卻說太傅司馬越集諸將士商議國事當劉輿潘滔因說越曰散騎常侍王延尚書何綏太史令高堂沖並參機密公若不早除之後必有謀明公之心越曰此數人皆無罪何計殺之二人曰若不誣之以謀反何以誅之越曰然於是越引一班兒謀士並甲士三千回朝越既入京師中書監王敦謂所親曰太博越專執威權而選用表請尚書猶以舊制裁之今來必有所誅初帝爲太弟也與繆播善及即位委以心膂帝舅王延尚書何綏太史高堂沖等帝皆親用之此數人量必難保越及至果遣甲士三千人入宮執播延綏十余人於帝側帝問越何以收此數人越答此十餘人謀反故來誅之言訖越命將播延十余人付廷尉明正其罪而殺之帝歎息流涕而已綏乃何曾之孫也初何曾侍武帝之宴退而謂諸子曰主上開創大業吾每宴見未常聞經國遠圖惟說平生常事非貽厥孫謀之道也及身而已後嗣其殆乎汝輩猶可以免指諸孫曰此屬必死於難及綏死其兄嵩哭之曰我祖殆聖乎曾日食萬錢猶雲無下筋處其子劭日食二萬綏及弟機羨汰侈尤甚與人書疏詞禮簡做王尼見綏書常謂人曰伯蔚居於亂世而矜豪乃爾其能免乎人曰伯蔚聞卿言必相圖害尼曰伯蔚所聞我言自己死矣伯蔚者乃綏之字也及此果死耳卻說太尉劉寔見朝廷危亂連年請老朝廷不許劉坦言古之養老以不事爲優不以吏之爲重宜聽寔所請於是帝下詔寔以疾就第複以王衍爲太尉太傅越以頃來興事多由殿省乃奏宿衛有侯爵者皆罷帝只得從之於是越更使何倫王秉引東海國兵數百人入宿衛以防內變卻說漢主劉淵又遣劉景將兵五萬人寇黎陽縣縣令王堪引兵拒之大敗而逃走奔延津於是景以衆入城怒百姓不開門納其大兵乃令諸兵將黎陽男女三萬餘人沈之於河皆淹死之漢主淵聞知大怒曰劉景何面目來見朕耶且天道豈能容平吾所欲除者司馬氏也細民何罪而故黜之也由此劉景未敢歸國焉
