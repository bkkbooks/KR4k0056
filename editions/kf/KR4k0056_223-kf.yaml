body:
  text: 第二二回桓溫率衆出伐秦甲寅十年卻說揚州刺史大將軍殷浩連年北伐出師屢敗糧械都盡朝野生怨卻說征西將軍桓溫少與殷浩齊名及長溫素忌於浩忽聞殷浩北伐被降人姚襄殺敗山桑乃遣人入朝上疏數浩之罪晉帝得疏讀曰按大將軍殷浩過蒙朝恩叨竊非分以兵北伐三年損折軍將過其半未曾取得尺寸之土空竭國家無限鬥斛之存致使華夏鼎沸黎元珍瘁社稷傾危之憂將及若不加罪則海內士民怨變臣請廢浩江左始安卻說晉帝看疏畢不得已降詔遣使免浩爲庶人徙之於東陽信安縣以王述爲揚州刺史卻說殷浩被帝遣使降詔兔爲庶人徙于信安浩雖被黜吟詠不輟雖家人不見有流放之戚但終日書空作礎礎怪事四字而已時浩外甥韓伯隨至徙所經歲辭歸浩送韓伯至渚側詠曹顔遠詩雲富貴他人合貧賤親戚離因而泣下分手回歸卻說征西將軍桓溫謂郗超曰殷浩有德有言向爲令仆足以儀刑百揆朝廷用違其才耳桓溫欲以浩爲尚書令遣人以書告之浩得書大喜欣然回書寫已了慮有謬誤閉開十數次竟達空函與來人歸溫見大怒由是遂絕之浩久不得溫書以爲惑己後憂一月而卒桓溫自黜殷浩之後內外大權一握在手事無巨細要行即行要止即止朝中大臣各懼其勢凡有萬機皆先咨知桓溫既握重權行事皆不奏帝是時桓溫有平天下之志遂問謀于參軍孟嘉九月九日溫宴諸將于龍山時僚佐畢集軍士盡著戎服忽有大風至吹落孟嘉頂上之帽嘉不知覺諸官皆笑溫因命孫盛作文嘲之嘉即答之其文甚美嘉好酣飲愈多不亂溫因謂嘉曰酒有何好而卿嗜之嘉曰公未得酒中趣耳時桓溫問之曰孤今聚有豪傑之衆胸蘊文武之才幸挾震主之威意欲經營天下愁有不賞之功此事如何可以保全後世也嘉曰竊見晉室不可複業胡人不可盡除爲將軍計不如挾天子而令諸侯收三秦取漢中如不克即入蜀而據其地宜鼎足而立以觀天下之釁今者北方誠多務不如因其多務剿滅三秦進伐苻氏盡關中所極據而有之然後建號以圖天下此裔帝之業也溫曰今盡力一方冀以輔晉室耳此言非所及也嘉曰人皆可以爲堯舜但恐將軍不肯爲耳溫大喜披衣起謝曰承教誨富貴同享也於是桓溫意決乃統步騎四萬伐秦使人上表不待詔許拜表即行自以兵從襄陽入均口南鄉步兵自浙川取武關又命司馬勳以軍出子午谷伐秦軍將至灞上桓溫遣司馬勳以銳兵五千倍道而進攻上洛此無備被勳攻陷獲秦荊州刺史郭敬又進攻青泥破之秦王健聞知大懼乃使太子荷萇等率衆五萬拒溫戰于藍田秦兵大敗溫轉戰而前進至灞上萇等率兵五千退屯城南健與老弱六千退守長安小城悉發精兵三萬遣大將軍雷弱兒等與萇合兵以拒溫溫以精兵二萬分二翼而進與秦兵相遇複戰于藍田雷弱兒大敗退五十裏別屯溫大軍進屯灞上時三輔郡縣皆來降溫溫撫諭居民使安堵複業民爭持牛酒迎勞男女夾路觀之耆老有垂泣者曰不圖今日複睹官軍矣卻說姚襄聞知桓溫大敗秦兵于藍田恐其攻己乃遣人降燕燕王慕容雋納之方知桓溫敗秦與群臣議封諸王以待拒晉群臣皆奏可於是燕王雋以恪爲大司馬錄尚書事封太原王評爲司徒封上庸王霸爲吳王德爲梁公暐爲中山王陽騖爲司空初燕王皝奇霸之才故名之曰霸將以爲世子群臣諫而止然寵遇猶逾於世子由是雋惡之以其嘗墜馬折齒更名曰缺尋以其應讖文更名曰垂遷侍中錄留台事徙鎮龍城垂大得東北之衆燕王雋愈惡之遂召還京五月卻說江西流民郭石等千餘人執陳留內史官劉任降于姚襄建康震駭帝以尚書周閔爲中軍將軍以兵屯中堂謝尚自曆陽還帝詔入衛京師因江候守
