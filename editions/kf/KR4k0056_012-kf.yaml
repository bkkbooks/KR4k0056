body:
  text: 第十二回武帝托孤立惠帝庚戌永熙元年四月晉武帝臥疾將篤遂詔車騎將軍楊駿入宮內臥所武帝曰朕今不豫以皇太子顧托于公公宜念朕椒房之親殫心盡力輔佐皇子駿曰陛下善保龍體以重天下之望臣敢不效忠貞之節而報今日殊遇之恩帝又謂近臣曰卿等各懷忠義之心以上政治之方輔佐皇儲惟望始終如一言訖而崩太子與諸大臣俱各涕淚次早舉哀停梓富於別殿武帝崩時年五十五歲廟號世祖在位二十五年改元者三泰始十年咸寧五年太康十年史說武帝善謀能斷大事承魏氏奢侈刻弊之後百姓思古之遺風武帝乃勵以恭儉有司曾奏禦牛青絲紖斷重費民財武帝即下詔命以青麻代之至平吳之後天下晏然遂怠於政事耽於酒宴寵愛後黨親貴當權舊臣不得專任彜章紊廢請謁公行矣卻說武帝既崩楊駿與大臣舉哀發喪喪事已畢以武帝櫬柩殯于峻陽陵乃立太子司馬衷爲孝惠皇帝改元永康元年惠帝既即大位以楊駿爲太傅總攝朝政於是百官鹹聽駿命惠帝又以賈氏南風爲皇后以才人謝玖爲太妃以其子司馬遹爲皇太子其餘大臣俱各加贈封賞
