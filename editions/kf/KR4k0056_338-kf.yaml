body:
  text: 第三三五回劉裕封函取成都卻說西蜀譙縱佔據益州屢爲邊患劉裕既平江陵意欲討之因問諸將曰吾欲征討西蜀譙縱誰可爲將代吾伐之時王鎮惡上言曰臣舉一人可以討之裕曰誰人可爲大將鎮惡曰有一人姓朱名齡石字伯兒浦縣人也少好學不事行檢曾與明公舉義同討桓玄而克京城以功見封爲西陽太守此人有武幹之才謀略之策若欲伐蜀以此人爲將可擒譙縱矣裕從之召齡石入內問曰吾先伐蜀以劉敬宣屢出無功今王鎮惡舉卿有文武之才吾欲用卿爲元帥去討譙縱卿敢當此職乎齡石曰重蒙拔擢幸至西守常思報效莫及今有西役何敢辭命願受明公神策去征裕曰劉敬宣往年出黃虎無功而退賊人聞卿兵至以爲卿應從外水往而料卿當出其不意猶從內水來也必然重兵守涪城以備內道若向黃虎正墮其計今卿率領衆將宜從外水取成都疑兵出內水此制敵之奇也此計莫可漏泄一泄恐有內備裕因書計封筒盛以錦囊內付與齡石收之謂曰卿若至白帝城可開視之依計而行言訖裕以猛將十員兵十五萬授與齡石齡石率衆即行去訖檀道濟等言於裕曰齡石資名尚輕非爲譙縱之敵益州定不能克何不別選良將去也劉裕曰昔吳陸遜今晉謝玄俱未嘗經過戰事而能破敵百萬之衆何況齡石屢執戰功耶因是裕勿聽衆不敢言卻說朱齡石領水軍舟艦起行來至白帝城乃開劉裕所授錦囊取出封函拆而視之見計畢傳令衆軍悉從外水取成都又喚臧熹朱牧曰汝二人以一軍取廣漢二人領兵二萬去訖又喚弟超石曰你以羸弱五千乘高艦五十隻以作疑兵由內水去攻黃虎超石亦領舟艦去訖齡石自率大軍望外水進攻成都卻說譙縱使人來荊州探知劉裕以朱齡石爲元帥發兵前來伐蜀即忙召集諸將謂大將軍譙道福曰今劉裕使朱齡石以兵來取西蜀吾料齡石之謀略必謂劉敬宣往年未嘗以兵出黃虎無功而退今番彼必以大衆出內水從黃虎而進公可以重兵戍涪城以備內水道福領命率衆去訖縱又喚秦州刺史侯暉仆射譙詵領兵一萬五千去屯彭模夾水爲城以禦晉兵計排已定了各自引兵去訖
