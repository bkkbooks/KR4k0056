body:
  text: 第三三七回劉裕東府斬長民卻說諸葛長民聞知劉裕有文書來說回京即時聚集王用相吳蘭等衆商議依計而行令人引兵埋伏去訖自排飲饌引領百官來新亭迎候頻日不見其來又等至次日忽見塵頭起處一簇轎馬約有千人飛奔前來至近長民心道必是劉裕到亭視之是參軍王鎮惡鎮惡與長民相見便問劉公來到不曾王鎮惡答曰他在後與我相遲二日起程言訖辭了長民衆軍行至京城之下屯住長民信鎮惡之言與公卿只在新亭等候卻說劉裕探知長民出迎新亭連夜馳入東府坐住點鼓聚集官吏曉諭長民反因此收其兵符密授丁旿之計如此如此丁旿得計依計而行即令人出叫參軍王鎮惡引衆入城屯紮府前又令人前至新亭報說劉公從水路而還叫公卿回來議事使人得令將此言即去報知長民公卿以下公卿聞之大驚長民與衆急還至府門入府內不見劉裕只見丁旿自內慢出坐於廳上長民大怒曰汝等小人何敢無禮言猶未了被丁旿向前推倒拔所佩之劍斬之人首落地衆皆大驚便欲來斬丁旿時劉裕急出府堂坐定大喝不得無禮長民謀亂故令丁旿殺之言訖衆各向前行禮拜伏在地裕令衆官且散只留下王用相吳蘭黃顧程輯四人夜宴四人魂不附體皆立於階下餘公卿以下皆散裕問四人曰你四人整日到諸葛長民家商議不知何事用相曰無非只是人情禮節而已裕曰然紙中寫者何事用相等皆諱無甚事裕乃喚出慶童對證用相曰汝於何處見來慶童曰你回避了我衆人和五人一處畫字如何賴得用相曰此賊與長民侍妾通姦誣陷主人今陷我等不可聽也裕曰既有證見何爲陷也言訖喝令左右將四人去斬首號令言未了武士即將四人梟首號令回來報知裕乃喚參軍王鎮惡龍驤將軍蒯恩等一班人皆入裕出義狀示之王鎮惡曰明公今日何如裕曰據此情形吾欲廢其君而吊其民擇有德者而立之鎮惡曰不可明公威服四海號令天下蓋有晉家苗裔故也征討有名賞罰有制軍民鹹助所以常勝不如存之俾絕往古來今之議論也裕曰既不然吾欲將長民一家老小誅之必欲得其書罪惡以示於衆鎮惡曰丞相之意如何裕曰不誣之以謀反豈能族誅乎鎮惡曰事已至此釋之恐難裕意遂決連夜盡收長民家小及弟黎民付廷尉問罪明白拿王用相等五家老小入官明正反逆之罪次日判赴各門處斬良賤死者五百余口內外官民無不嗟歎時裕得丁旿而誅長民時人爲之語曰勿跋扈付丁旿七月朱齡石等大軍往白帝城取出一函書見曰卿衆軍悉從外水取成都臧熹從內水取廣漢老弱乘高鑒從內水向黃虎齡石遂從其計於是諸軍倍道兼行譙縱果使譙道福以重兵守涪城齡石從內水至平模去成都三百里住縱遣侯暉夾岸築城以拒齡石謂劉鍾曰今賊嚴兵固險攻之未必能猝拔且我意欲養威蓄銳靜伺其隙然後乘時而攻則彼當其懈我居其逸策之無不勝矣君意以爲何如鍾曰不然前聲言大衆從內水道福不敢出涪城今大軍猝至候暉之徒已破膽矣所以阻兵守險是其懼不敢戰也因而攻之其勢必克若緩兵相守彼將知吾虛實涪軍忽來並力拒我求戰不獲軍食無資三萬餘人悉爲譙子虜耳宜急攻之齡石從之七月以兵攻其北城克之執斬侯暉南城亦自驚潰於是齡石令三軍舍船步進以攻賊營賊營將次望風潰逃譙縱棄城出走尚書令馬耽封府庫以待晉師齡石遂入成都誅譙縱親百余人余皆安堵使複其業縱走出拜墓其女曰走必不免也不如死于先人之墓可也縱不從投道福道福不納而去縱大哭一場乃自縊而死齡石聞縱死了乃送馬耽於越雋耽曰朱侯不送我京師欲滅口耶我必不免乃自引繩而死了宗人收葬之朱齡石遣人入建康報捷晉帝大悅下詔以齡石進監梁秦州六郡諸軍事因此西蜀平靜
