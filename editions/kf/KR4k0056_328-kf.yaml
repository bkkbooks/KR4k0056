body:
  text: 第三二五回道規焚書固江陵當劉道規聞知桓謙等兵至即聚集江陵諸將商議諸將驚懼盡皆失色道規謂衆曰吾東來文武足以濟事汝等畏刀避劍之徒欲去者吾不相禁因喝令夜開門隨其自遁衆咸憚服莫有去者次日雍州刺史魯宗之聞桓謙寇江陵乃率部下兵從襄陽來救江陵兵至城下叫門劉道規命人開門與魯宗之入諸將皆曰宗之以兵遠來其心未可知也使其屯兵城外不可與入道規曰人以赤心援我我若疑之反爲亂矣遂不聽乃自單身出城迎入府內共議破敵之策由是宗之之衆感激悅服皆願效命而出戰當諸將曰劉公自保江陵使將軍檀道濟到彥之領兵二萬共擊荀林道規曰非吾自行不決而委他人因是乃使魯宗之以兵守江陵委以心腹自率諸將以兵十萬進軍長驅至枝江迎著桓謙兩軍相遇交戰十合謙軍大敗而逃道規率兵連追二百里桓謙被道濟殺之旬林被劉遵追及斬之盡收得桓謙軍械輜重於內擒得一篋文書道規啓篋視之乃自己部下及江陵士庶降謙之書數百紙皆言江陵虛實備細道規不問盡皆焚之因此衆始大安道規複以兵還江陵時魯宗之聞徐道覆大軍至恐寡不敵衆自引兵走還襄陽去訖時百姓聞流言盧循已克京師遣道覆來爲江州刺史江陵士庶聞道規已破桓公及焚其處書等因此江陵士庶感其焚書之恩德爲備守城池無複二志保全江陵道規聞道覆將至星夜馳還江陵密謂劉遵曰今道覆兵將至汝可引一萬軍爲遊兵出屯江漢口以拒道覆前軀如若不勝收屯爲犄角之勢使其不敢逼城下營方可破之遵依計而去到彥之等鹹曰明公不宜割此有力之兵置於無用之地可留保守江陵如何分拆軍威之勢道規曰能善將兵今敵不敢近城者莫若犄角勢分此兵使其疑感莫能進逼然後以計破之勝之必矣於是衆服其論遵先得令以兵出屯漢口以迎敵兵道規自與諸將士等領軍三萬離城三百里拒迎其時道覆不從大路來與道規不相遇密從故道抄小徑奄至城下呐喊佯言建康已克江陵何不早降若緩攻破城池玉石俱焚言未畢軍人報漢口有兵提防道覆不敢攻城離城三十裏安營其時城中無一卒戍守士庶皆感道規焚書之恩無有二意俱各竭力調撥民兵晝夜登城巡視把守各門次日道覆驅兵大進攻打城池城上百姓各以灰瓶石子打下軍不敢進連攻數日不下忽聽得鼓噪喧天正西路上人馬奄到旗上書得分明大將劉道規道覆大驚急忙傳令三軍擺開與戰道覆自與道規交鋒連鬥五十餘合道規力乏欲走又聽得東路一彪人馬奄至回頭視之認是遊軍劉遵旗號心中大悅壯氣愈加又挺刀與戰當道覆見有伏兵更兼日晚又昏不敢戀戰撥轉馬頭尋路走還檀道濟見徐兵走驅車連夜追殺道覆欲退被劉遵遊軍橫挾兩路攔擊殺得徐兵潰竄傷亡死者不計其數道覆只存二百騎逃走道規方傳令鳴金收軍入城次日以牛酒犒賞三軍不在話下卻說徐道覆敗回收拾殘兵萬余會盧循之衆軍稍振乃議下建康
