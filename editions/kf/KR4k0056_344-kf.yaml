body:
  text: 第三四一回劉裕興兵大伐秦卻說劉裕先平濟乃有定關洛之意遇盧循侵逼故寢不行是時複集諸謀士商議經營天下蒯恩曰北燕馮跋方強宜先平之參軍王鎮惡曰蒯公之言未盡其善以愚意度之今天下方有事而馮跋坐保北燕之間不敢展足其無四方之志可知矣姚氏據長安帶甲數十萬尚得民心今聞姚興身死二子爭位正可攻之舍此別伐倘二子和睦以守其城則天下未定矣今兄弟結冤勢不兩立可因此時提兵先滅姚氏再伺燕變而除之則天下定矣此機會不可失也劉裕大喜是時劉穆之從外人見衆人共議言曰明公與諸君謀征關洛宜即起兵使其無備何故延也劉裕曰吾舉義兵爲天下除暴亂舊鄉人民死喪略盡終日不見所識使吾感傷況且禾稼在田之時不可擾動權且議定以待來春伐也吾正欲問君可否穆之曰姚興愛弼而又立泓故弼今竭力相並彼各有黨羽若擊之則相救援若緩之則爭心生不如以兵出屯界首休進虛聲伐魏只說加戍保邊俟其變成然後攻之可一舉而定矣若待來年起兵彼知有備二子和睦必難動搖裕曰此計甚善時朝士多言北伐之計惟東海人徐羨之默然裕問羨之曰卿何獨不然羨之曰今四方已平拓地萬里惟有小羌未定明公寢食不安何可輕預其議耳裕曰姚氏不小豈可輕之故宜早討於是裕入朝見帝戒嚴諸將伐秦以劉穆之爲左仆射入居東府穆之內總朝政外供軍旅決斷如流事無塞滯求訴咨稟盈階滿室穆之目覽耳聽手寫箋書尋覽校定而性奢豪食必方丈未嘗獨餐嘗白裕曰穆之家本貧賤贍生多闕自叨忝以來朝夕所須微爲過豐然此外一毫不以負公由是劉裕深相重之時寧州獻琥珀枕于劉裕裕以琥珀能治金瘡命碎之以賜從征將士以世子義符爲中軍將軍監留府事即命劉穆之領軍司入居東府總攝內外司馬徐羨之副之遂發建康遣將軍王鎮惡檀道濟將步軍自淮肥向許洛朱齡石胡藩移陽城沈淵子傅泓之趨武關沈林子劉遵考將水軍出石門自汴入河以王仲德督前鋒開渠入河分撥已定令依計而行鎮惡領命欲行前將軍劉穆之謂曰昔晉文王委蜀于鄧艾今劉公亦委卿以關中卿其勉之鎮惡曰吾等因托風雲並蒙拔擢今此一行正是效命之秋如若咸陽不克誓不濟江三秦既定而公九錫不至亦卿之責矣即辭別起身領兵五萬入賊之境戰無不捷不上半月攻破虎牢及桓谷鳩大軍進次澠池縣鎮惡傳令屯住三軍戰船盛服乘輿上造故人李方家李方接入內堂鎮惡拜見禮畢各敘契闊之情鎮惡請李方妻出鎮惡亦拜取出金寶賜之因謂曰前蒙撫愛之恩以此少酬萬一言訖即召郡守拜授李方爲澠池令鎮惡領大軍解纜起行九月劉裕大兵至彭城十月王仲德水軍人河將逼滑台魏兗州刺史尉建棄城北渡仲德入城宣言曰晉本欲以布帛七萬匹假道于魏不虞守將遽去魏王嗣聞之遣叔孫建公孫袁引兵濟河斬尉建於城下問晉軍以侵寇之狀仲德使人對曰劉太尉使王征虜自河入洛掃清山陵借空城以息兵行當西引無損於好也嗣又使建問裕裕謝之曰洛陽晉之舊都而羌據之諸桓宗族休之兄弟晉之蠹也而羌取之吾今伐之故假道于魏非敢爲不利也魏王猶豫秦陽滎陽二城皆降檀道濟等兵至成臯秦陳留公姚洸守洛陽見晉兵至遣使求救于長安秦王泓聞知遣兵救之未及至將軍趙玄言於洗曰今晉寇益深衆寡不敵若出戰不克則大事去矣宜攝諸戍之兵固守金墉以待西師之救金墉不下晉必不敢越我而西是我不戰而坐收其弊也司馬姚禹陰欲降晉言於洸曰殿下以英武之略受任方面今嬰城示弱得無爲朝廷所貴乎洸然之遣玄將兵五千余南守北柏谷玄泣曰玄受先帝重恩所守土不免於死但不用忠言爲奸人所誤後必悔之既而成臯虎牢皆降道濟道濟等長驅而進玄以兵拒戰大敗被十餘創其司馬蹇鑒冒刃抱玄而泣玄曰吾創已重君宜速去同主保城鑒曰督軍不濟鑒去安之與之俱死姚禹聞玄敗死乃逾城奔降道濟道濟遂進逼洛陽洗不能守率衆出降道濟獲秦人四千餘議者欲盡殺之道濟曰吊民伐罪正在今日皆釋而遣之於是夷夏鹹悅歸者日衆丁巳十三年正月朔日食晉師之過許昌也秦東平公紹言于秦王泓曰晉兵已逼安定孤遠難救宜遷其鎮戶內實京畿可得精兵十萬雖晉夏交侵猶不亡國仆射梁喜曰齊公恢有威名爲嶺北所憚且鎮人已與夏爲深仇理應無貳勃勃終不能越安定而寇京畿若無安定則虜馬至郿矣今關中兵足以拒晉無爲預自損削也泓從之吏部郎懿密言曰恢有忠勳今未加殊賞而置之死地安定人以孤危逼寇思南遷者十室而九若恢擁之以向京師得不爲社稷之憂乎宜征以慰其心泓又不聽至是恢率鎮戶三萬八幹趨長安移檄州郡來攻長安長安大震泓使東平公姚紹率軍一萬出攻之恢大敗而自死權安二月西涼公暠寢疾遺命長史宋繇曰吾死之後世子猶卿之子也善訓導之及卒官屬奉世子歆爲涼公以繇錄三府事諡暠曰武昭王初司馬索承明勸暠去伐北京暠謂之曰蒙遜久爲百姓患孤豈忘之顧勢力未能除耳卿有必擒之策可爲孤陳之直倡大言使孤東討此與言石虎小豎宜肆諸市朝者何異承慚懼而退
