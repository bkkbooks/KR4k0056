body:
  text: 第一六二回阮咸叔侄效放達阮咸字仲容妙解音律善彈琵琶處世不交人事惟共親知雅歌酣飲而已時咸與叔阮籍居道南宗室居道北時北阮富而南阮貧七月七日俗例曝衣北阮盛曝衣服錦繡炫目鹹以竿挂大布犢鼻於庭人或問之鹹答曰未能免俗聊複爾耳人皆悅之後出補始平太守放達無稽阮修字宣子善清言性簡任不修人事絕不喜見俗人遇便舍去常步行以百錢挂杖頭至酒店便獨酌酣暢雖遇富貴之人亦不肯顧修家無擔石之儲晏如也與兄弟同居自得林泉之趣修居貧四十餘年而未有室王敦等名士斂錢爲婚時慕之者求人錢而不得後王禍將及矣次日入朝奏帝求出爲廣州刺史成帝從之遂刺史廣州矣卻說南頓王司馬宗自以失職怨望又素與蘇峻善庾亮欲誅之無罪不敢行而宗亦欲廢執政亮等中丞鍾雅劾宗謀叛亮乘之使人收宗殺之降其兄太宰西陽王羕爲弋陽縣王王爲宗室近屬乃先帝保傅亮一旦剪黜由是愈失遠近之心宗之死也成帝不知久之帝問庾亮曰常日白頭公何在庾亮對曰因謀反伏誅帝泣曰舅言人作賊便殺之人言舅作賊當如何亮懼變色而退朝卻說後趙王勒用程遐之謀營鄴宮使養子石虎鎮之守鄴城虎自以爲功多無去鄴之意及修三台遷其家室而居之虎由是怨望十一月後趙王勒使石聰率二萬騎攻壽春祖約堅守不出使人屢表求救朝廷不爲出兵聰遂進寇阜陵建康士民大震蘇峻聞知遣其將韓晃引三萬騎前來拒戰石聰聞救兵至乃走之朝廷欲作塗塘以遏胡寇祖約聞知曰朝廷爲此是棄我也益疑憤恚二年五月朔日食卻說張駿聞趙兵爲峻所敗乃去趙官爵複稱晉大將軍涼州牧遣辛岩領二萬攻趙秦州趙王曜令劉胤將兵五萬出擊辛岩二軍交鋒不上數合辛岩大敗而走胤乘勝追奔濟河攻拔令居進據振武因此河西大駭金城抱空降之峻遂失河南之地朝廷已知庾亮大集文武於朝堂而議之當時尚書左丞孔坦司空陶回言于司徒王導曰及請峻未至宜斷阜陵守江西當塗諸處彼衆我寡一戰決矣今不先往而峻先至則人心危駭難與戰矣導然之亮不從至是峻遣其將韓晃攻陷姑孰取其鹽米以給諸軍亮始悔使左將軍司馬流將兵三萬人據蕪湖以拒之時宣城刺史桓彜欲起兵赴朝廷長史祖惠曰郡兵實弱山民易擾且宜按甲以待之也桓彜厲色曰見無禮於其君者若鷹鸇之逐鳥今社稷危逼義無晏安何敢坐視也乃慷慨流涕遂將兵屯蕪湖峻即使韓晃將兵前往至蕪湖與彜交戰彜兵寡弱不三合大敗而還退回宣城晃乘之因攻宣城桓彜不能敵又退保廣德時徐州刺史郗鑒欲率所鎮之兵赴國難朝廷知之恐北寇來侵下詔不許於是郗鑒得旨遂按兵不敢前行
