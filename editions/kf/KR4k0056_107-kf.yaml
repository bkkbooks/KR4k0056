body:
  text: 第一四回陶侃擊破杜弢死卻說陶侃與杜弢相攻弢屢敗是日弢使王貢出挑戰侃亦領兵出陣侃遙謂王貢曰弢爲益州小吏盜用庫錢父死不奔喪卿本佳人何爲隨之天下寧有白頭賊耶貢聽見遂棄戈投降侃與並馬而還以酒相待次日用貢爲前部自爲最後以軍來擊杜弢弢衆不戰自潰弢不能敵乃單騎逃走至湘州因發疾竟死於道中陶侃以軍進克長沙湘州悉平於是丞相睿進王敦爲征東大將軍都督江揚荊襄交廣六州諸軍事江州刺史敦始自選置刺史刺史以下寢益驕橫初王如之降也敦從弟王棱愛如驍勇請敦將如配己麾下敦從之棱甚加寵遇如數與敦諸將角射爭鬥棱杖之數十下因此如深以爲恥及敦潛畜異志棱每諫之王敦大怒密使人激如殺棱如恨其杖己之怨乃夜持刃入內殺之敦聞之暗喜而佯驚亦使人捕如誅之
