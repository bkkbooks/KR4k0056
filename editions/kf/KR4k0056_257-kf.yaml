body:
  text: 第二五四回秦王舉兵伐苻洛秦建元十五年三月秦王堅會集百官商議欲作教武堂於渭城命太學生明陰陽兵法者教授諸將朱序諫曰陛下四海之地十得其八宜稍偃武修文乃更始立學舍教人戰鬥之事殆非所以馴至升平也且諸將百戰之余何患不習於兵而更始受教于書生非所以強忠氣也此無益於實而有損耳於是堅乃止之卻說秦國唐公苻洛勇而多力能坐制奔牛射洞犁耳自以有滅代之功使人見秦王堅求開府儀同三司不得由是怨憤秦王堅只以洛爲益州牧洛謂官屬曰孤不得入爲將相而又投之西裔于諸君意何如治中平規曰主上窮兵黷武民息肩者十室而九宜聲言受詔盡幽州之兵兵南出常山陽平公必郊迎于路因而執之進據冀州總關東之衆以圖而王天下可揮麾而定也洛從之四月率衆七萬發和龍堅聞知遣將竇沖呂光以兵五萬討之北海公重悉薊城之衆助洛會屯中山五月沖光二人以兵與苻洛交戰洛兵大敗被沖追及擒之沖既得洛令人送至長安重見洛被擒乃走還薊呂光追及斬之幽州悉平使人以洛見秦王堅堅赦之不誅徙於西海郡爲民秦王堅以諸氐種類繁滋分三原九峻武都汧雍十五萬戶使諸宗親領之散居方鎮如古諸侯之制以長樂公丕鎮鄴平原公暉鎮洛陽石越梁讜毛興王騰等皆爲諸州刺史堅送丕至灞上丕所領民二千戶丕別其父兄皆慟哭送之獨整援琴而歌曰阿得脂阿得脂博勞舅父是仇緩尾長翼短不能飛遠徙種人留鮮卑一旦緩急當誰語堅笑而不納壬午七年三月卻說秦王堅兄苻法之子東海公苻陽與丞相王猛之子王皮曰秦之天下實乃吾父法所取之天下也今被苻堅據有吾將取之恨力不及耳君可助吾一臂之力耳王皮曰君言乃吾之志吾有此意久矣吾父有佐國平天下之勳吾不能襲父大爵至今得一散騎常侍耳既明公肯爲主此間有一人姓周名虓足智多謀痛恨秦王可請其來同議大事必成苻陽從之使人請虓至以酒相待商議計策虓曰君若在此難於舉發來日二人入朝請兵求出外鎮積草屯糧招軍買馬乘機而起則舊業可複矣陽曰此計大妙三人計議已定卻被秦王堅手下竊事人密知入宮報與秦王說東海公與散騎常侍二人謀反秦王堅大驚即喚司隸鄧信領禁兵三百圍宅將苻陽王皮周虓三人縛至殿下秦王堅問曰吾不曾負汝二人汝二人何故謀反苻陽曰吾父無辜見誅禮雲父母之仇不共戴天臣父不以罪死是以謀反齊襄公複九世之仇何況臣乎秦王堅泣曰哀公之死事不在朕又問王皮王皮對曰臣父丞相有佐命之勳而臣不免於貧餒所以圖富貴也秦王流涕謂王皮曰丞相臨終托卿以十具牛爲田不聞爲卿求位知子莫若父何斯言之萌也又問周虓虓曰世荷晉恩生爲晉臣死爲晉鬼何問乎先是虓屢謀反左右請殺之堅曰孟威烈士秉志如此豈憚死乎殺之適足成其名耳皆赦不誅徙苻陽于高昌皮虓于朔方之地以皮子永素性好學擢爲幽州刺史是時有西域軍師鄯善人者朝秦甚稱龜茲國有鳩摩羅什才貌雙全義識若神秦王堅大悅以師善爲向導遣驍騎將軍呂光爲都督督兵十萬去伐西域當陽平公苻融諫曰西域荒遠得民不可治得其地不可食漢武征之得不補失臣竊爲惜之堅勿聽乃宣呂光至殿謂曰今吾國內糧草多積士馬強盛吾欲征討西域龜茲煩卿爲將呂光曰受命于君安敢不謹領旨命去討西域於是秦王堅拜呂光爲持節都督西討諸軍事總兵七萬鐵騎五千命其討西域龜茲光臨行秦王囑光曰卿到龜茲若得鳩摩羅什即使人星夜馳送赴朕光曰謹領旨命是日呂光領兵就起行行至高昌屯紮軍馬史說呂光字世明乃洛陽人氏父名婆樓佐命秦王苻堅官至太尉而死呂光生時夜有神光之異故以光名年十歲與諸兒遊戲邑裏生爲戰陣之法儔類鹹推爲主部分詳明群童歎服呂有重瞳左肘有肉印沈毅凝重寬簡有大策喜怒不形於色時人莫之識也惟王猛異之曰此非常人言之秦王秦王苻堅除爲美陽令群夷愛服因此屢遷驍騎將軍苻堅慕鳩摩羅什故有是命
