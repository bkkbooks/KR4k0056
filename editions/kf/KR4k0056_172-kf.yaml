body:
  text: 第一六九回佛圖澄起死回生卻說後趙王石勒愛子石斌暴病身死勒悲泣不息連日不出宮門大臣程遐等入內見其泣涕因問曰大王何故發悲勒曰昨日不幸愛子石斌暴病而死因此傷慟將欲葬之遐等曰近聞有一異人姓帛氏名佛圖澄乃天竺人也少學道能通玄術在洛陽自言百有餘歲常服氣自養能積日不食善誦神咒能役使鬼神圖澄腹上有一孔大如酒杯常以絮塞之夜每讀書拔去孔中之絮則孔中出光能燭一室如晝又常于朔望之時平旦致流水於腹側從腹孔中引出五臟六腑洗之訖還納腹中人人皆說此人能起死回生既殿下病死何不使人召來救之或可活也勒曰此人現在何處答曰現在城外雲遊勒即使人召至既至問曰卿乃當世神仙必有奇術有何妙法請試一觀佛圖澄曰貧僧無法聊作一戲耳言訖取出缽盂一具盛水一盞焚香誦咒須臾缽盂內生出青蓮花一朵光色耀目勒信之曰卿乃活佛耳昨日愛子石斌暴病身死將殯葬之孤聞虢太子死扁鵲能生之今此子亡大和尚能救之乎圖澄曰大王勿憂能令即生可擡屍來勒即令人將石斌屍擡至圖澄取楊柳枝沾水灑而咒之執斌手喝曰可起矣傾之隨手自蘇因此勒深敬重佛圖澄使石斌及宮中諸子拜謝圖澄又命有司起造寺院與圖澄居之又以諸子在圖澄寺中養之凡有機事必謀於澄而後行之石勒既得圖澄救活石斌心中甚喜次日出狩於近郊主簿程琅諫曰目今禾苗滿田農夫甚艱今大王出狩人馬紛紜踐踏田畝百姓何堪況此山谷崖嶺峻峨恐不吉勒不納領百官擁行行至山谷忽見群鹿銜花前過勒放獵犬逐之犬畏之不敢往乃令左右趕禦馬逐之左右得令即大驅馬誰知禦馬奔得倡狂皆觸石而死勒見之大悔乃曰吾不用忠臣之言而有此咎吾之過也乃賜琅朝服封爲關內侯領衆還都於是朝臣謁見忠臣競進
