body:
  text: 第五回夷夷兵犯沒鹿回卻說光陰易過倏爾數年力微長大一十餘歲容貌奇偉文才出衆武藝超群因無舅家故北代諸部時人諺曰詰汾皇帝無婦家力微皇帝無舅家時詰汾發疾而崩力微痛之安葬哀毀逾禮喪事畢有沒鹿回部大人竇賓聞力微有雄傑之度召之爲部長自此乃依竇賓爲將卻說西部酋長夷夷以兵一萬擾境擄掠畜産竇賓親領胡兵二萬人出界拒敵次日兩軍相遇竇賓親自出戰大罵野犬逆賊何敢侵境夷夷見其大罵忿怒勒起坐下馬掄起手中槍走奔陣前更不打話直取竇賓賓亦舞大捍刀出迎兩馬相交軍器並舉二人戰了十合竇賓氣力不加勒住跨下馬收回手中槍走回本陣夷夷趕來見賓走已遠夷夷就左手拈弓右手搭箭望竇賓心後一箭竇賓聽得弓弦一響急翻身下來躲過那箭正中馬脛馬即死於陣前夷夷見賓死了戰馬拍馬來迫將及追至恰力徽領兵到見賓無馬急以所乘之馬與賓騎之大言曰大王急回本陣小將出迎敵兵言畢以步兵接戰力微以步兵擺開與夷夷交鋒大戰戰上三十餘合夷夷抵敵力微不住驟馬奔回本陣被力微驅兵奮擊夷夷大敗退還本國去訖力微連追一百余裏方始鳴金收兵回城次日賓聚集諸部大人問曰孤昨與夷夷交戰被他射死戰馬險些被擒不知甚人將駿馬與我騎之方得脫此大難我在亂軍之中殺得頭昏眼花忘記其人汝等可自白之我必酬其大功是時力微隱而不言當左右大人對曰前日陣上救大人者乃拓跋力微也竇賓大驚問力微曰孤三問卿如何不答也力微曰此大王洪福諸部之力小將何功之有竇賓大喜曰我今將國劃半分卿酬卿大功力微固辭曰臣食君祿當盡犬馬之力豈圖賞也固推不受賓愈敬之曰子貢辭賞後人羨之而卿如此何以爲報耶又曰吾有愛女金玉公主不與凡子今賜與卿爲妻勿得再推因是力微從之選日納聘禮就迎公主過門成親畢自此以後賓甚寵用之常思報其前勳忽一日謂力微曰孤聞韓信據齊不得張良擇地而封欲委卿以一方卿謂何地可據孤即授之力微曰韓信連百萬之衆收四海之地平秦滅楚取趙挾燕功蓋天下名聞古今張良運籌帷幄之中決勝千里之外匡扶社稷扭轉乾坤以三寸之舌開四百年之基成漢室之業皆此二人之力高祖所謂人傑臣于大王無尺寸之功止一馬之力何敢受其賜也賓曰富貴二字世人貪之恐不得至卿何固辭今授卿一所吾欲南霸天下欲卿效張良韓信之立勳故有是命卿何卻之力微曰臣見前賢所謂功蓋天下者不賞勇略振主者身危未嘗不思退避富與貴人情之所欲豈不愛之望大王法堯舜之仁休效漢祖之疑臣願慕二賢之忠望大王授臣北鎮長川以圖霸舉而臣既承半子之分而思欲隨部奉事大王不舍遠離賓曰男兒所志在功名別何足惜離又曰恭敬不如從命卿可同金玉公主速去鎮守長川就以其地授卿以爲湯沐之邑因是封力微爲北部大人命其往鎮於是力微拜辭竇賓領金玉公主同去長川鎮守收納亡叛延攬英雄招軍買馬積草屯糧由是舊部人馬悉來歸附數年之間軍威大振誰想光陰迅速寒暑更遷不覺竇賓染病將危乃喚二子竇龍竇虎至臥前戒曰拓跋力微勇略無雙吾死之後不可疏慢此人功多不伐當以國事見委勿以常人遇之言訖而卒龍虎二人舉哀發喪於西陵竇龍代父領其諸部十萬之衆
