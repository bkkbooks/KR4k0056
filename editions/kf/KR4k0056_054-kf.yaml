body:
  text: 第五十二回東海王奉駕討穎時東海王越遣人檄召四方之兵北至安陽衆至十余萬人軍未至司馬穎聞知甚憂急會群僚問計東安王司馬繇曰天子親征宜釋甲縞素出迎請罪穎不從乃使石超率兵五萬出城拒戰陳肜弟陳昭在穎部下聞帝親征其兄爲將乃私自逃回歸降東海王越因問鄴中虛實言鄴中軍聞聖上親征俱各離散由是東海王越不甚設備以爲穎可必擒大軍至湯陰縣忽然石超五萬兵掩至越等措手不及急令點軍超兵已馳突入中軍矢石如雨衆軍潰散越亦逃竄越軍大敗惠帝頰中三矢百官侍禦皆散惟稽紹朝服登輦以身衛帝軍人引紹欲殺帝曰此忠臣也卿等勿殺衆兵對曰奉太弟令惟不犯陛下一人耳餘者不留遂殺之紹血濺帝衣服帝亦墜於草中衆亂爭扶亡失六顆玉璽急詔跟尋無存於是石超奉帝車駕幸其營帝饑餓甚求食於下超進米左右進秋桃時穎聞超得勝殺敗東海王越乃自領衆僚佐迎帝入鄴城以酒食拜奉改號建武元年左右侍臣見帝龍服有血請脫浣之帝流涕曰此忠臣稽侍中之血也勿得浣也穎既敗越執天子在鄴不與還宮陳肜上宮乃集殘兵回奉太子覃守洛陽越自以殘軍還東海孫惠謂越曰殿下今雖大敗尚可複振越曰用何計惠曰宜邀結藩鎮同獎王室候再共舉可保無危越從之以惠爲參軍記室
