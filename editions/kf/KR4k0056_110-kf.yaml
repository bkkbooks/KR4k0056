body:
  text: 第一七回代王興兵討六修卻說代王猗廬先愛其幼子比延欲以爲嗣使長子六修出居新王城而黜其母是歲六修來朝代王以比延爲嗣使六修拜比延六修不從而去代王大怒曰吾行法律以制群下何敢逆之即喚西渠趙延二部大人各領兵十萬爲左右先鋒代王自領羽林軍五千爲合後殺奔小平陽而來六修使人打探知得備細回報六修說代王親征六修在小平城先分付曹屯以兵守西陵以爲犄角之勢深溝高壘卻不出戰忽人報代兵已渡江必須迎之修曰但堅守勿戰驍將朱金忿然而進曰代兵臨城而不出戰是怯也況吾軍新旺若不重仗銳氣軍皆惰矣願借五千軍土某去決一死戰修從之令朱金點馬步軍五千出城迎敵兩陣對圓朱金出馬與西渠更不打話戰至四五合西渠敗走朱金引五千人馬趕入陣去被趙延指麾五千兵馬裹圍朱金於陣中左右衝突不能得出六修在城上望見朱金困於垓心急使左右備馬長史陳矯諫曰殿下保重不可自出軍今朱金不聽約束妄自出戰致敗如此假使棄此數百人何將軍輕出而救乎修曰不然若朱金一失小平陽必不可保也遂披甲上馬引手下壯士五千騎出城陳矯於城上助威擂鼓修引軍隔代軍百余步通於一溝之上陳矯將爲六修只就那裏紮住遙與朱金爲聲勢只見六修大呼一聲驟馬飛渡淺溝衆皆奮力而過修獨先執刀殺入代陣代兵迎之不能擋而走修直至垓心救出朱金回顧陣中尚有數十騎不能得出修復突入重圍所到莫敢阻攔救出這一彪人正遇著趙延攔路被修奮武沖散代兵朱金助威代兵大亂修將曹屯亦引兵出大殺代兵一陣緩緩而回陳矯舉杯迎門出接贊修曰殿下真天人也言訖調兵堅守四門不出交戰卻說趙延兵敗傷折太多回見代王代王大怒欲斬趙延諸部大人告免方免二人代王自此煩惱得病漸漸加重將危諸部大人入見言于代王曰今大王病重況又屢戰失利不如退兵還都待大王疾瘥再來征討未遲代王曰既卿等所勸暫且回兵來春再戰言訖傳令部衆引兵即還北都代王由是發憤成病而卒衆部以比延年幼故不立遂推猗竾子普根爲主將率軍五萬來攻六修次日交戰十數合六修被普根斬于馬下盡收其衆歸國會將軍衛雄箕澹與劉琨質子遵謀歸晉率晉人及烏桓三萬人馬牛羊十萬頭歸於劉琨琨由是複振代普根憂恨成疾而卒國人與諸部乃立鬱律爲主襲晉爵爲代王總攝諸部威名複振矣卻說西平公張寔下令所部吏民有能舉其過者賞以布帛羊豕當時曹佐隗瑾曰明公爲政事無巨細皆自決之群下畏威受成而已如此雖賞千金終不敢言也明公宜少損聰明延訪群下使各盡所懷然後采而用之則嘉言自至何必賞也宦悅而從之增隗瑾之位二等又遣將軍王該率步騎五十人入援長安又送諸郡貢稅入朝索綝奏湣帝降詔拜張綝爲都督陝西諸軍事卻說石勒引兵攻廩丘劉演恐寡不敵衆乃棄城而走投段匹磾去訖因此石勒又得廩丘城使人戍之
