body:
  text: 第二回漢王殺其弟李廣漢自李壽於癸卯年卒群臣立其太子李勢爲漢王其時勢弟李廣以勢無子求爲太弟勢不許當有解思明諫曰陛下兄弟不多若複有所廢將亦孤危固請許之勢疑其與廣有謀收斬之襲廣於涪城廣遂自殺思明被收歎曰國之不亡以我數人在也今其殆矣思明有智謀敢諫諍素得民心及其死士民無不哀之卻說姚弋仲清儉正直不治威儀言無畏避趙王石虎甚重之以爲冠軍大將軍丙午二年正月揚州刺史都鄉侯何充卒充有器局臨朝正色能以社稷爲己任所選用皆以功效不思親舊及卒朝廷惜之諡曰文穆卻說燕王皝率衆二萬襲扶余扶余國王玄以兵扼之被皝用伏軍計邀戰擄其王玄以歸滅其國爲郡三月後父褚裒表薦顧和殷浩於朝廷朝廷詔以和爲尚書令以浩爲揚州刺史和有母喪固辭不起親屬勸之起和謂所親曰古人有釋縗絰從王事以其才足翰時故也如和者正足以虧孝道傷風俗耳浩亦固辭會稽王昱遣人以書與浩曰昱當厄運危弊理盡足下沈識淹長足以經濟若複深存挹退苟遂本懷恐天下之事於此去矣足下去就則時之興廢也家國不異宜深思之浩得是書乃就職領揚州刺史史說前涼張軌安定烏氏人也漢趙王張耳十七世孫晉惠帝永甯元年爲涼州刺史因據之安帝拜爲涼州牧西平公後軌生實實生茂茂生駿駿是年四月卒僚佐立其子重華爲涼州牧西平公複自稱涼王
