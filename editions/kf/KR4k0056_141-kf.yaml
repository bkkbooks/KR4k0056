body:
  text: 第一三八回譙王丞爲湘刺史十二月元帝之始鎮江東也王敦與從弟王導同心翼戴元帝亦推心任之敦總征討導專機政群從子弟布列顯要故時人爲之語曰王與馬共天下後敦恃權驕恣元帝畏而惡之乃引劉隗刁協等以爲腹心稍抑損王氏之權導亦漸見疏遠中書郎孔愉陳導忠賢有佐命之勳宜加委任元帝出愉爲長史導能任真推分淡如也而敦亦懷不平其參軍沈充錢鳳皆巧諂凶狡知敦有異志陰畫策呈敦敦寵信之而敦上疏爲導訟屈詞語怨望佐軍譙王司馬丞忠厚有志行元帝親信之帝得敦疏夜召丞入內以敦表示之丞曰王敦權重心異久則爲患今觀其疏詞意怨望不遜陛下宜早防之劉隗爲言曰敦疏謂陛下推腹心于我其意將以我名爲亂也不若委臣權而招義兵待其顯而討元帝不從因是二人在宮中未出次日會王敦使人表沈充爲湘州刺史元帝謂丞曰敦奸逆已著朕爲惠帝其勢不遠湘州據上流控三州之會敦欲以充居之爲亂何抵之朕且逆其欲以叔父居之何如丞曰臣奉詔命惟力是視何敢有辭然湘州經蜀寇之餘民物凋敝若及三年乃可即戎苟未及此雖灰身無益也帝然之詔以丞爲湘州刺史丞領詔命而行過武昌王敦聞知只得出迎入內以宴待之酒半酣因謂丞曰大王素雅佳士恐非將帥才也湘州久叛地面恐治之難丞曰公未之見耳鉛刀豈無一割之用耶丞雖不才且看吾之治湘耳敦無以對聽其自去送丞去了入謂錢鳳曰彼不知懼而學壯語無能爲也且看如何譙王丞既至湘州時湘土連年困敝丞躬自儉約傾心綏撫湘地稍安甚有能名四年正月徐龕複使人入朝降晉帝受之三月日中有黑子元帝甚憂著作郎郭璞上疏曰陰陽錯謬皆繁刑所致赦不宜數昔子産知鑄刑書非政之善不得不作者須以救弊故也今宜赦之理亦如之帝從之發詔大赦境內
