body:
  text: 第一一一回丞相睿移檄北征卻說丞相司馬睿聞長安不守急集諸謀士商議出師躬擐甲胄移檄四方刻日北征以漕運稽期傳令斬督運令史淳于伯刑者以刀拭柱血流至柱有二丈餘而下觀者或以爲冤司直劉隗上諫淳于伯罪不至死請免從事中郎周筵等官於是王導等引咎請解職睿曰政刑失中皆吾愚暗所致人無所尤時劉隗性剛直當時各土多被彈劾睿率皆容貸由是衆怨歸之中郎將王含王敦之兄也以族望位高驕傲自恣隗奏含文致甚苦事雖被寢而王氏深忌之是時丞相睿以邵續爲畢州刺史以續女婿劉選爲平原內史命二人各以衆前去守據城池中宗元皇帝建武元年正月黃門郎史淑自長安奔涼州稱湣帝出降前一日使淑齎詔賜宮拜爲涼州牧承制行事且曰朕已沼琅邪王持攝大位君其協贊共濟多難淑至姑臧張寔大宴三日辭官不受初張寔叔父張肅爲西海太守聞長安被漢危逼請爲先鋒入援寔以老弗許及是聞長安失陷憂憤而卒寔等哀痛不已即遣司馬韓璞等率步騎一萬東擊漢境使人遺相國司馬保書曰王室有事不忘投軀前遣賈蹇瞻公舉動中被符命敕蹇還軍今聞朝廷傾覆爲忠不遂憤慟之深死有餘責今遣璞等惟公命是從相國保得書慚愧而已韓璞等以兵出擊漢有準備卒不能進其衆悉還西涼先是長安小兒有謠言曰秦川中血沒腕惟有涼州倚柱觀至是果漢兵覆關中氐羌掠隴右雍秦之民死者什八九獨涼州安全時二月漢主聰使劉曜率兵三萬攻滎陽太守李矩未及爲備乃與衆議以計詐降曜信之不復設備以兵進五裏屯住候矩來降時李矩見漢兵退去訖急集將士欲乘其無備至夜襲之士卒皆疑懼矩遣其將郭誦備祭儀禱於子産祠誦禱訖回府子産顯靈使巫陽言于矩諸將士卒曰子産有教汝等今夜火速進兵吾當遣神兵相助於是士卒勇躍爭進掩擊曜營殺死曜兵三萬人存者惟劉曜僅以身免因此漢主不敢複兵來寇滎陽
