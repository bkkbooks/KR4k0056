body:
  text: 第三二八回劉裕罪斬徐赤特劉裕又喚劉毅諸葛長民至謂曰吾與你兵從北面拒賊你可爲前部先鋒汝宜小心今番出兵不比尋常言訖長民領兵前行劉裕自引兵後應前來北拒賊兵卻說參軍徐赤特與沈林子引兵到查浦看了地面笑曰劉公多心量此山僻之處賊兵如何過去就于總路口張侯橋首下寨令軍士伐木爲柵以爲久計又徐赤特自出寨行見橋邊有一山並不相連更且樹木茂盛頂又平高可以屯軍回寨喚集諸將計議欲移寨往其山頂去屯紮偏將軍沈林子曰將軍差矣若屯軍於當道築起牆垣雖有百萬之兵不能過也今若棄其要道立營於山上賊兵四面圍定將何以保赤特笑曰兵法有雲居高視下勢如破竹若賊兵來吾令片甲不回沈林子曰吾跟劉公出征但到處必從活處今視此山乃絕地也倘賊兵絕其後汲水之路反用火攻我軍不戰自亂也赤特卻說孫子雲置之死地而後生劉公尚且請問於我汝何等之人敢阻吾意吾自有主見林子曰若參軍必欲於山上立寨請分二千人某自于山西下一小營一千人爲犄角之勢倘兵至可以救應赤特堅執不從林子欲辭回去赤特方曰汝既不聽與你二千兵待吾破了賊兵到劉公處你卻分不得我的功勞言訖分兵與林子林子得兵離山五裏下一小營赤特一面畫營地圖星夜使人將圖呈稟劉裕去訖卻說盧循使人去探回報查浦有兵守禦即接兵不動歎曰劉公真乃神人吾不及也徐道覆曰何故自墮其志某料查浦可取循怒曰汝何出此言道覆曰吾探當道無寨柵軍又屯於山上故知可破循笑曰若軍果然屯於山上則天賜吾成功也自引十數騎來看一遭赤特在上笑令諸將士各各準備看我紅旗招動四面皆下卻說徐道覆到寨使人打聽誰人總兵把守查浦人報曰參軍徐赤特也道覆曰庸才但劉公雖有大謀卻不識人此輩爲將可不誤事喚林詮曰左右別有軍否詮曰離五裏有沈林子安營道覆曰汝引一軍擋住林子來路吾差申仁申得率領諸將四面圍山後又斷其歸路就令軍人備硫磺焰硝乾柴引火之物于林邊堆之放火焚之彼軍自亂乘亂取之可得查浦矣當晚調遣已定天明林詮引一軍先往背後道覆大隊軍馬一湧而進喊聲起處四面圍住應有汲水之處以精兵圍之命衆軍將前引火之物放于林邊點著山上晉兵看時盧兵漫山塞野隊伍甚是整齊會風起勢刮來漸漸燒入林去晉兵不敢下山赤特在山上慌忙將紅旗招動軍將你我相推不動赤特大怒手殺二將諸軍皆懼只得努力殺下山來時見四面火起衆軍潰亂各自逃生不敢戀戰當又聽得賊兵軍士大叫有投降者重賞拒者誅之因此晉兵多有棄戈抛旗來投賊者赤特再退上山急叫軍士把守寨門且待外應時林子引軍來沖又被林詮殺退走回石頭去訖卻說赤特從早被圍至日暮火燒近寨山上又無水取衆軍士又要逃命於是寨中大亂赤特把守不住殺下西山而走後面林詮趕來直趕下三十裏赤特來保張侯橋兵潰不能擋只得逃回石頭去訖卻說盧循令徐道覆鳴金收軍進屯丹陽道覆與盧循言今已得查浦劉裕必然自來吾引林詮帶兵五萬埋伏南岸秦用以大兵與戰主公可以一萬兵向白石屯住多設旌旗爲疑兵使彼疑有埋伏不敢從此路而來必從南岸而至吾待他兵過半去擊之秦用以兵接戰三下夾攻而劉裕則成擒矣盧循從之令諸將聽令依計而行計排已定卻說劉裕自差徐赤特戍查浦之後心中怏怏放心不下忽報林子有使送地理圖至呈上劉裕裕就案上展開看了拍案大罵曰赤特匹夫坑陷吾軍早晚必有街亭之患也急欲差人去替忽報馬來說查浦已失丹陽城皆休劉裕曰大事去矣吾之過也言訖即時命諸將士收拾軍馬星夜馳還石頭城內坐定急喚林子入責之曰吾令汝與赤特同守查浦汝何不諫之林子曰某再三勸而不從我自領兵二千離山五裏下寨被賊兵四面圍合某自領兵去沖數十餘次死戰方得出路恐失石頭城急急回守非吾之不諫也劉裕喝退即喚赤特赤特自縛而入跪於階下劉裕曰吾屢次叮嚀說查浦吾軍之本也領此重任須要小心今複如何汝依林子不致如此今敗兵失地皆汝之過也叱左右推出斬之忽監軍從外來正見斬赤特入見劉裕曰昔楚殺得臣而文公喜今天下未定而戮智謀之士豈不惜乎劉裕答曰孫武所以能制勝於天下者以其用法明也今乃四海分裂兵卒若複廢法何以討賊耶假使有功不賞有罪不誅雖唐虞不能以化天下也急命斬訖獻頭於階下傳令各營將屍首具棺木以葬之撫恤其家複令人探聽賊兵虛實回報說南岸有埋伏白石張疑兵於是裕知賊有所備乃始命諸將士解甲固守石頭不許動兵劉裕斬參軍徐赤特後人有詩爲證賞罰嚴明可治兵賞無仇恨罰無親查浦失守刑當及軍令施行悅後人
