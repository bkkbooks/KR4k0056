body:
  text: 第三二回蒙遜謀叛弑段業辛醜五年正月南涼王利鹿孤欲稱帝將軍密鍮勿崙曰吾國披髮左衽無冠帶之飾逐水草遷徙無城郭室廬故能雄視沙漠抗衡中夏今舉大號誠順人心然建都立邑難以避敵儲蓄倉庫啓敵人心不如處晉民於城郭勸課農桑以供資儲率國人以習戰射鄰國弱則乘之強則避之此久長之策也且虛名無實徒爲世之質的將安用之利鹿孤乃更稱河西王以其弟傉檀都督中外錄尚書事又命群臣極言得失從事史嵩曰陛下命將出征無往不克然不以綏寧爲先惟以徙民爲務民安土重遷故多離叛此所以斬將搴旗而地不加廣也利鹿孤善之沮渠蒙遜其先爲匈奴左沮渠因爲氏焉蒙遜出自夷陬擅雄邊塞先聞呂光悖德自立深懷仇弼之冤因臨松盧水集胡人起兵恐衆不服尋推建康太守段業爲涼州牧假陳吳之事聚衆十萬餘人而仕段業卻說北涼王段業憚沮渠蒙遜勇略蒙遜亦身自晦匿張掖太守馬權素豪俊爲段業所親重意輕蒙遜蒙遜譖業謂權欲謀叛業將權殺之蒙遜欲謀叛乃謂其兄男成曰段公非撥亂之主向吾所憚權已死欲除之以奉兄何如男成曰人親信我圖之不祥蒙遜見男成不允計乃求爲西安太守業從之蒙遜臨行因與男成約同祭余蘭胡山神而去乃陰使人先告段業說男成欲起兵作亂若不信以求祭余蘭胡山神爲驗及至期而發業遂收男成男成曰蒙遜先與臣謀反臣以兄弟之故隱而不言今以臣在恐部衆不從故約臣祭山而反誣臣其意欲主之殺臣也乞詐言臣死暴臣罪惡蒙遜必反然後使臣討之必然克矣業不聽殺之男成既死蒙遜聞知泣告衆曰男成忠於段王而無故枉殺之諸君能爲報仇乎男成素得衆心皆憤怒爭奮比至氐地羌胡多起兵應之業先疑將軍田昂與男成同蒙遜反將囚之至是召之使討蒙遜昂以衆降蒙遜業之軍遂潰蒙遜乃攻入張掖擒住段業業謂蒙遜曰孤孑然一身爲公家所推願乞餘命東還與妻子相見蒙遜不聽命斬之業儒素長者無他權略威禁不行群下擅命因信卜筮巫覡故至於敗蒙遜自稱爲張掖公
