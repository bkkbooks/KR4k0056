body:
  text: 第一四七回湘州譙王死忠義卻說魏義攻湘州百日拔之義兵人城執譙王司馬丞囚之又執虞悝子弟于市曹子弟皆對之號泣悝曰人生會當有死今一門爲忠義之鬼亦複何恨言訖被殺之義既得湘州遣人以檻車送丞往武昌主簿桓雄僚佐韓階從事武延皆毀服爲僮從丞不離左右義見雄姿貌舉止非凡憚而殺之時王敦聞魏義執丞送至武昌乃使弟王廙先候於道將丞殺之不與入武昌恐人議論丞既被害韓階武延二人收殮送丞喪至都葬之而去五月卻說甘卓既班軍回鎮悉散細作其家人皆勸曰今王敦賊臣意在圖謀社稷而忌公居上流故不敢行也既還武昌必有害公之心豈可散兵釋戎而不爲備也宜三思之免累及族卓不從王敦還武昌深恨甘卓陰使人持書命襄陽太守周慮攻卓慮承敦旨乃點軍三萬來襲甘卓卓無備措手不及被襲殺之使人傳首於敦敦大喜重賞來使以從事代卓鎮江中敦既得志暴奸滋甚四方貢獻多入其府將帥州牧皆出其門以沈充錢鳳爲謀主二人所譖無不死者卻說郗鑒在鄒山二年有衆數萬戰爭不息百姓饑饉爲後趙王勒不時遣將率兵所逼於是引衆退屯合肥仆射紀瞻以鑒雅相清德宜從容台閣上疏請帝征之於是元帝遣使征鑒拜爲尚書鑒始入朝時徐兗間諸塢多降于後趙王趙王置守宰而輔之十月卻說祖逖既卒後趙屢遣支雄桃豹寇河南拔襄城城拔又率衆圍譙城祖約不能禦退屯壽春雄豹等遂取陳留梁鄭之間複騷然矣初戴洋以風角占十月當有寇至至是果然約始信洋占遂以禮待戴洋矣
