body:
  text: 第九十九回石勒奉表于王浚十二月幽州都督王浚自謂英雄無比豪傑無雙欲反晉自稱尊號當劉亮高集切諫皆被殺之時燕國霍原志節清高屢辭征辟浚使人召至以尊號事問之原不答浚誣以罪殺之而梟其首於是士民駭怨而浚矜豪日甚不親政事所任皆苛刻小人棗嵩朱願貪橫尤甚北州謠曰府中赫赫朱丘伯十囊五囊入棗郎石勒聞知集兵丁將士商議欲襲之未知虛實將遣使觀之當參佐刁膺等請用羊祜陸抗故事致書於浚勒以問張賓賓曰浚名爲晉臣實欲廢晉自立但患四海英雄莫之從耳將軍名振天下今折節事之猶懼不信況爲羊陸之抗敵乎夫謀人而使人覺其情難以得志矣勒曰善子之言正合孤心於是勒遣舍人王子春奉表於浚浚大喜其表曰勒本小胡遭世饑亂流高屯厄竄命冀州竊相保聚以救性命今晉祚淪夷中原無主爲帝王者非公複誰願殿下應天順人早登皇祚勒奉戴殿下如天地父母殿下察勒微心亦當視之爲子也浚讀罷大喜謂子春曰石公可信乎子春曰殿下中州胄望威行夷夏自古胡人爲輔佐名臣則有矣未言爲帝王者也石將軍非惡帝王不爲而讓于殿下原以帝王自有應立非智力之所取故也又何怪乎浚大悅遣使以重禮報聘於勒勒受之時遊綸兄遊統爲浚將鎮范陽城遣使私附於勒勒斬其使遣人以其書與使人首級送於浚浚雖不罪統益信勒之忠誠無複疑矣二年正月有星如日隕於地又有三日相承東行又有流星隕於平陽北化爲肉人視之則長三十步廣二十七步臭息聞於平陽肉旁常有哭聲晝夜不止漢主聰聞知心甚惡之以問公卿陳元達曰陛下女寵太盛此應爲亡國之征宜修省之聰曰此乃陰陽之理何關人事言訖忽後宮宮人奏皇后劉氏産下一條大蛇一隻猛獸在宮中傷人聰急使人捕之軍人即帶兵刃去捕蛇獸蛇獸飛走不見尋之不獲軍人急出奏知漢王聰正煩惱出榜去尋忽群臣奏說百姓道其蛇獸飛走在前隕肉之旁如今其隕肉蛇獸不知何處去了哭聲亦止正論間忽後宮宮人來奏皇后劉氏死了聰流淚入宮去訖文武退班劉聰人宮舉哀斂葬畢自此之後亂寵進禦無序矣卻說王浚遣使者送玉麈尾與石勒勒在襄國聞浚使至盡匿其勁卒精甲以羸師虛府以示北面拜使者而受書浚送勒麈尾陽不敢執懸之於壁朝夕拜之曰我不得見王公見其所賜如見王公也使人見勒如此殷勤以爲是實時勒複使董肇奉表同使人去見王浚期以三月中旬親詣幽州奉上尊號又修箋將金帛送與棗嵩求並州牧棗嵩受勒賂甚稱勒德於浚浚又得勒表心中大悅又問使人虛實動靜之事使人俱陳勒形勢寡弱款誠無二及言拜麈尾之事浚亦以爲實心中不疑不爲設備矣卻說石勒問浚于王子春虛實如何子春曰幽州去歲大水人不粒食王浚積粟百萬不能賑贍刑政苛酷賦役殷煩忠賢內離夷狄外叛人皆知其將亡浚意氣自若曾無懼心更置台閣布列百官自謂漢高魏武不足比也勒撫幾笑曰王彭祖真可擒也卻說漢嘉涪陵漢中之地皆爲成有成王李雄虛己好賢隨才授任命太傅李驤養民于內李鳳等招懷於外刑政寬簡獄無冤囚興學校置史官其賦民男歲穀三斛女人半之疾病又半之戶綢絹不過數丈綿數兩事少役希士民多富實新附者給複除是時天下大亂而蜀獨無事年谷豐登竟可閭門不閉路不拾遺然朝無儀品爵位濫溢吏無祿秩取給於民軍無部伍號令不肅此其所短也時粱州張咸聞知乃與民衆謀集五萬人欲逐楊難敵以州來降于成難敵見兵起亦不敢戰引兵退還於是張咸以梁州降于成成主李雄封鹹爲將就鎮梁州
