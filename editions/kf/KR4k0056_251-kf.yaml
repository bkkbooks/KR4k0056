body:
  text: 第二四八回北代使不辱君命卻說北代王犍自避陰山不能還國潸然出涕忽階下一人進曰某有一計可解此危亦可還國大王如何發悲也代王視之乃左長史燕鳳因見秦兵不退代王恐懼鳳乃進前曰某有一計可解此危代王曰卿有何謀火速言之鳳對曰今秦兵勢大何以退得不如請降然後別作良圖今若與戰非上策也急作一表與臣密入長安奏請稱爲藩臣彼必抽回其兵方可還國代王曰此計大妙卿此一行休失北代之志氣鳳曰某若有小失焉有面目再見大王代王大喜便作表遣燕鳳入秦鳳星夜到長安先見太尉權翼衆大臣等次日早朝翼奏北代遣左長史燕鳳上表稱藩秦王堅曰此必解吾兵之厄也令宣入朝鳳拜舞已畢呈上表文秦王覽表訖笑曰代王何如人也鳳曰寬和仁愛經略高遠一時雄主也常有併吞天下之志亦有統一六合之心也秦王堅曰卿輩北人無剛甲利兵敵弱則進敵強則退安能並兼而卿過獎之言何太過耶鳳曰北人壯悍上馬持三丈矛驅馳如飛主上雄雋率服北土控弦百萬號令若一軍無輜重樵爨之苦輕行速捷因敵取貲此南方所以疲敝北方所以常勝也秦王又曰汝國人馬多少鳳曰控弦之士數十萬戰馬一百萬匹秦王笑曰卿言人衆則可說馬太多鳳曰雲中川自東山至西河二百里北山至南山一百五十裏每歲孟秋馬常大集略爲滿川以此推之使人言數猶有未盡也秦王曰北代如長史者幾人鳳曰聰明仁智一二百人如吾儕之輩車載斗量不可勝數秦王曰卿主雄傑將多軍足如何退避陰山使卿降乎鳳曰陛下有高天下之志吾主有統朔方之能惟恐蛟龍相鬥魚龜受刑不忍使軍民死於無辜是以暫退陰山遣臣請降結爲唇齒各保境寧秦王堅歎曰使于四方不辱君命可謂士矣如燕鳳者不辱君命也由是降詔准其稱藩命其還國即時差人抽回唐公之兵唐公苻洛既聞代王降朝中令抽回其兵命諸將振旅還京去訖自守平城燕鳳回至陰山說秦王准降代王大喜至十二月北代王什翼犍聞唐公苻洛領軍已退乃引衆還至雲中什翼犍有皇子實君見代王寵惜皇孫拓跋珪恐其位不傳己乃陰結代王之左右以鴆酒毒殺代王因此北代王什冀犍暴崩又殺諸弟諸部大人知是實君謀死百僚無主俱各離散只留皇孫拓跋珪乃北代王之皇孫乃太子實之子也是年六歲弱而能言目有光耀廣顙大耳先因其父太子實被長孫斤謀叛傷脅身死秦將苻洛來寇代王什翼犍逃避陰山拓跋珪母子無依其母賀氏將珪寄養外家孤獨部大人賀訥同避陰山至是同代王歸國至雲中代王被皇子實君謀殺諸部大人各散珪尚幼弱諸部百僚各逃散去只有燕鳳等隨與賀氏拓跋珪走還本國其時諸部皆被別部劉庫仁鐵弗劉衛辰二人前來統攝之賀訥只得領珪來依劉庫仁俱說代王崩世之事及存拓跋珪之因吾今奉秦王詔歸國還鎮因此來見大人庫仁便謂賀訥曰你可領本部兵同小主人權且去牛川屯紮吾等權代領兵俟其年長還其兵印及諸部土境訥從之領拓跋珪並軍馬去鎮牛川當庫仁謂其子劉顯曰拓跋珪龍行虎步嶷然不群必然興複洪業也劉衛辰謂庫仁曰依吾之計可速使人奏知秦王使其遷之別地若留此則吾屬無噍類矣庫仁曰既如此任公爲之於是衛辰作表遣人入長安投降奏知其事卻說獨狐部大人賀訥領拓跋珪帶兵馬屯于牛川燕鳳說曰前日大人與小儲君見劉庫仁劉衛辰某觀衛辰前被聖上殺敗心必懷仇素有害小儲君之意彼必使人降秦謀害小儲君也賀訥曰既有此謀害之意其事奈何鳳曰大人休憂某自再入長安去見秦王以探虛實若是變異某自有三寸不爛之舌說之可保無患訥曰君可速去遲則有變耳於是訥使燕鳳星夜先來長安次早至待漏院候衆入朝朝見秦王秦王見鳳至謂曰卿何又至燕鳳曰代王已死臣來奏知堅曰代王雖故必有王子鳳曰代王被庶子實君弑長子亡叛遺孫幼沖莫相輔之其別部大人劉庫仁勇而有智鐵弗劉衛辰狡猾多詐皆不可獨任且分部爲二令兩人統之兩人素有深仇其勢莫能先發此禦邊之上策待其孫拓跋珪年長乃仕而立之是陛下大惠于亡國存亡繼絕之德也代之子孫年年進貢歲歲來朝永爲天朝之屏障中國之藩籬顧不美乎秦王納之遣將以兵執實君至長安命車裂殺之俄而衛辰使至呈上降表秦王覽訖謂文武曰衛辰上表謂拓跋珪豐骨不凡舉止清高後必有異卻爲大國之患不作中華之藩宜遷別地或取回長安其事如何處置群臣莫對燕鳳對曰衛辰與先主有仇欲自謀立故進讒言陛下聽之跋珪一離二人即叛秦王曰彼叛何故怕此小兒耶燕鳳曰朔方之地士民之衆皆蒙拓跋氏恩皆思歸附衛辰若叛恐士民不從故先遷之其志得行若存小主二人未敢謀變秦王信之不聽衛辰
