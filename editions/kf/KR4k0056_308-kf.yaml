body:
  text: 第三五回元顯議欲討桓玄壬寅元興元年正月桓玄表其兄偉爲江州刺史鎮夏口司馬刁暢都督八郡鎮襄陽遣將馮該戍湓口自謂有晉國三之二數使人上己符瑞欲以惑衆又致箋于會稽王道子曰賊造近郊以風不能進食盡故去非力屈也昔國寶死後王恭不乘此威入統朝政足見其心非侮明公也而謂之不忠良今之腹心誰有時望豈無佳勝直是不能信之耳元顯看書大懼張法順謂曰桓玄承藉世資素有豪氣既並殷楊兼有荊楚第下所控引止三吳耳今東土塗地公私困竭玄必乘此縱其奸凶元顯曰爲之奈何法順曰桓玄始得荊州人情未附若使劉牢之爲前鋒而以大軍繼進玄可取也元顯以爲然會武昌太守庾楷密使人自結於元顯請爲內應元顯大喜遣法順來京口問於牢之牢之謂法順曰桓玄兄弟新並殷楊據晉土三分得其二其銳氣正盛焉能克之依吾見是以爲難法順還曰觀牢之之言意必將貳於明公可召入殺之不爾敗人之大事元顯不從於是大治水軍欲謀討桓玄
