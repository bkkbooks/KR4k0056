body:
  text: 第八十回石勒以軍據襄國卻說石勒既屯許昌集諸謀士商議欲攻三台以據之張賓急進言曰賓聞得地者昌失地者亡邯鄲襄國乃趙之舊都依山憑險形勢之國也使君可擇此二邑而都之然後命師出之授以奇略推亡固存兼弱攻強則群凶可除王業可圖矣石勒謝曰右侯之計是也右侯張賓之號也於是石勒即從之司空荀藩因洛陽陷乃逃在陽城得汝陰太守李炬輸給之藩乃建行台於密傳檄四方推琅邪王睿爲盟主以李炬爲滎陽太守集衆以圖興複晉室不提卻說豫章王司馬瑞乃太子司馬詮之弟也洛陽既陷乃奔倉坦苟晞使人迎之奉爲皇太子置行台徙衆屯于蒙城招集散亡將士卻說秦王司馬業乃吳孝王司馬晏之子荀藩之甥也年十二歲聞荀藩在密乃南奔至密來見母舅荀藩藩奉之爲主欲趨許昌天水閻鼎聚西州士民五千於密欲還鄉里藩見鼎有才而擁衆用鼎爲豫州刺史以安人心周顗爲參佐同佐秦王業欲討群胡
