body:
  text: 第三四五回鎮惡流舟棄糧戰劉裕在潼關王鎮惡請率水軍自河入渭以趨長安劉裕許之秦王泓使姚丕以兵守渭橋以拒之鎮惡溯渭而上乘艨沖小艦行船者皆在艦內艦外無人北土素無舟楫秦人但見艦進驚以爲神至渭橋鎮惡令軍士食畢傳令皆持仗登岸退後者斬既登岸即至密使人解放舟艦任其漂去渭水迅急忽然不見鎮惡乃諭士卒曰此爲長安北門去家萬里舟楫衣糧皆已隨流今進戰而勝則功名俱顯不勝則骸骨不返無他計矣言訖乃身先士卒衆踴躍爭先與姚丕戰不上二合丕大敗姚丕軍皆潰姚泓引兵來救之爲敗卒所蹂踐不戰而潰鎮惡乘亂自入平朔門秦王泓衆皆走散自領家屬出降其子佛念年十二言於泓曰晉人將逞其欲雖降亦不免不如引決泓憮然不應佛念登宮牆自投死泓乃將妻子群臣詣壘門降鎮惡以爲屬吏城中夷夏六萬餘口鎮惡以國恩撫慰號令嚴肅百姓安堵使人迎接劉裕入城鎮惡性貪盜秦府庫不可勝計裕至知之以其功大不問收秦彜器渾儀土圭記裏鼓指南車送建康余金帛珍寶皆以頒賞將士送姚泓去建康裕議將遷都洛陽王仲德曰暴師日久士卒思歸未可議也北涼王蒙遜聞裕滅秦怒甚門下校尉劉祥入言爭蒙遜曰汝聞劉裕入關敢研研然也斬之夏千田利領將作大匠撥夷夏十萬人築都城于朔方黑水之南夏王謂百官曰時朕方統一天下君臨萬邦新城宜名統萬阿利性巧而殘忍征土築城錐入一寸即殺作者並築之勃勃以爲能委任之凡造器成呈工人必有死者弓射甲不入則斬弓人入甲則殺甲匠由是器物皆精故勃勃重信任之勃勃自謂其祖從母姓劉非禮乃改姓赫連氏言其徽赫與天連地其非正統者爲鐵伐氏言鋼如鐵堪伐人也由是衆僚皆賀夏王勃勃聞裕伐秦謂諸將曰裕取關中必矣然不能久留必將東歸若留子弟及諸將守之吾取如拾芥耳乃秣馬養士進據安定嶺北部縣皆降之時劉裕恐勃勃作亂乃遣使遺勃勃書約爲兄弟勃勃報許之
