body:
  text: 第八十三回石勒陷蒙執苟晞卻說石勒以軍來攻蒙城時苟晞在蒙城驕奢苛暴前遼西太守閻亨諫曰明公居亂世欲效中興不可奢暴使天下有歸也晞怒命左右殺之時從事明預有疾聞亨諫被殺亦使家人乘輿自入諫曰聞亨所諫乃天下之公亦明公之福也何以殺之以失士望晞怒曰我殺閻亨何關汝事而竟來罵我預曰明公以禮待預故預以禮自盡今明公怒預其如遠近怒明公何桀爲天子以驕暴而亡況人臣乎願明公且置是怒思預之言晞不從由是衆心離怨加以疾疫饑餓城內虛困石勒軍到攻城將士離散無人守把勒軍攻入城如入虛境石勒既入內將苟晞豫章王瑞皆執之勒招晞降晞不從勒以鐵鎖鎖晞頸晞方從之以晞爲左司馬
