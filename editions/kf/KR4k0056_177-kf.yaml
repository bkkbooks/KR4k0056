body:
  text: 第一七四回石勒自問古何主七年趙王勒饗高句麗宇文屋孤使酒酣乃謂徐光曰朕方自古帝王何等主也光曰陛下英勇籌略邁於高皇雄偉卓犖超于魏祖自三王以來無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦太過朕若遇漢高祖當北面而事之與韓彭比肩而爭先耳朕遇光武當並驅于中原未知鹿死誰手大丈夫行事宜磊磊落落如日月皎然終不效曹孟德司馬仲達父子欺人孤兒寡婦以取天下也朕在二劉之間耳軒轅豈敢擬乎群臣頓首呼萬歲曰陛下神武雖二劉不及也石勒雖不學然常使儒生讀史書而聽之每以其意論古帝王之善惡嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何至於有天下也及聞留侯諫止乃曰賴有此耳卻說趙太子石弘好屬文親敬儒生勒謂中書令徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以恭默守之聖人之後必有勝殘去殺者天之道也勒甚悅光說曰中山王虎雄暴多詐陛下一旦不諱臣恐社稷非太子所有也宜漸奪其權使太子早參朝政程遐亦曰中山王勇悍殘忍威震中外諸子皆典兵權志願無極矣若不除之臣見宗廟不血食矣勒不聽徐光他日乘間言曰今國家無事而陛下若有不悅何也勒曰吳蜀未平恐後世人不以吾受命之主光曰陛下包括二都平蕩八州然帝王之統不在陛下複當在誰且陛下不憂腹心之疾而更憂四肢乎中山王資性不仁見利忘義父子並據權柄而取之常有不滿之心近見東宮有輕慢天子之色臣恐陛下萬年不可複製也勒默然始命太子省可尚書奏事以中常侍嚴震參綜可否惟征伐斷斬大事乃奏之於是震權過於主相季龍之門可設雀羅矣虎愈怏怏卻說郭敬既克襄陽使人戍之乃引兵南掠江西太尉陶侃使人探知謂桓宣曰郭敬爲寇陷襄陽而掠江西樊城必虛卿以一軍先拔樊城敬聞失巢回救敬衆必潰然後乘勝而擊之襄陽可複也桓宣然其言於是陶侃遣中郎將桓宣率兵一萬乘虛去攻樊城桓宣得命引一萬詣樊城果無備遂攻拔其城悉俘其衆郭敬聞知即抽兵回救至則城已破矣敬遂挑戰宣即領所部人馬出迎兩軍會戰湟水之上敬衆自潰遂被宣大破之敬懼遁而去宣乘勢複拔襄陽而守之宣使人持書報侃侃複命桓宣鎮之宣招懷初附簡刑罰略威儀勸農課桑或載鋤耒於軺軒親率衆民耘獲在襄陽十餘年趙再攻之桓宣以寡弱拒守趙不能攻而去時人以爲亞于祖逖周訪卻說趙涼州牧張駿僚佐皆勸駿稱涼王置百官駿曰要待朝廷之命此非人臣所敢言也如敢言此者罪不宜赦然境內皆稱之爲王駿乃立重華爲世子癸巳八年春趙王勒遣使來修好成帝大怒詔焚幣使者被辱而還五月遼東公慕容廆子慕容皝等至榻前謂之曰吾今病重不可複事聽吾囑咐獄者人命之重也不可以不慎賢人君子國家之基不可以不敬稼穡者國之本也不可以不急酒色奸佞亂德之基也不可以不戒吾死之後休忘此言言訖而逝百僚舉哀葬訖乃立慕容皝爲遼東公卻說趙王勒正服於東堂召百官問曰朕昨得河西郡守表章道天下大雹起西河介山大如雞子平地深三尺洿下深丈余行人被打禽獸死者巨萬餘數不知主何吉凶侍中徐光對曰周漢魏晉皆有之雖天地之常事然明主未始不爲變所以敬天之怒也去年陛下禁寒食介子推帝鄉之神也歷代所尊或者以爲未宜替也然介山左右晉文之所封也宜任百姓奉之時黃門韋詖駁上曰按春秋藏冰失道陰氣發泄爲雹自子推以前雹者複何所致此自陰陽乖錯所爲耳今雖爲冰室懼所藏之冰不在固陰沍寒之地多在山池之側氣泄爲雹也以子推忠賢令綿介之間奉之爲允於天下則不通矣勒曰汝二人之言亦各有理於是使人遷冰室於沍寒之所令並州複寒食之節
