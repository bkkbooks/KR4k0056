body:
  text: 第六十六回五馬渡江一化龍東海王越既複爲太傅總攝朝政恐諸王在內有異複以司馬睿爲琅邪王以司馬羕爲西陽王以司馬祐爲汝陽王以司馬宗爲南頓王以司馬紘爲彭城王詔各就國於是五王不敢停留各領家眷同舟渡江歸國去訖越又恐河間王虓在外爲亂奏帝詔征虓爲司徒虓就征入朝赴職時南陽王司馬模在許昌聞得朝廷征虓爲司徒恐虓再預政不利於己即遺將王因以千人半路邀殺之時朝廷已知虓被模殺以虓罪重故不責模時越大會謀臣計議北藩之事當長史劉輿曰東燕王騰守並州今並州饑饉人民離散更兼胡寇連年人寇深爲可憂明公欲爲靖天下之計宜令一能將替鎮之不然並州非複國家有也越曰誰人可去鎮之輿曰劉琨智勇雙全此人就鎮可寄北面之重於是越即遣劉琨鎮並州以爲北面之重而進東燕王司馬騰爲新蔡王以鎮鄴琨至上黨騰即自井陘東下時並州饑饉數爲胡寇所侵掠吏民萬餘人悉隨騰就谷冀州號爲乞活所余戶不滿二萬寇賊縱橫道路既塞琨募兵上黨得五百人戰鬥而前至晉陽府寺焚毀邑野蕭條琨撫循勞徠流民稍集並州稍安
