body:
  text: 第二七四回呂光還國奪西涼卻說秦都督呂光既平龜茲國又得鳩摩羅什相助有留戀龜茲之志羅什勸之曰龜茲國王尚在西地士民歸之君若不思東還誠恐兵至死無葬身之地矣光曰甚是因此呂光始傳令三軍以駱駝二萬餘頭及外國珍寶並珍禽怪獸千有餘品駿馬萬餘匹收拾東還兵至涼州涼州刺史梁熙與衆謀閉城拒之高昌太守楊翰曰光新破西域兵強氣銳聞中原喪亂必有異圖若出流沙其勢難敵高梧穀口險阻之要宜先守之而奪其貲彼既窮竭可以坐制如以爲遠伊吾關亦可拒也度此二厄雖有子房之策無所施矣熙不聽姜水令張統曰今唐公苻洛上之從弟勇冠一時若奉爲盟主以率群豪則光雖至不敢異心資其精銳東合四州掃兇殘寧帝室此桓文之舉也熙又不聽而反遣人殺洛於西海呂光聞翰謀懼不敢進杜進曰熙文雅有餘機鑒不足終不能用宜及其上下離心速取之光至高昌翰以郡降至玉門梁熙移檄責光擅命還師遣其子胤率衆一萬拒之光破擒之武威太守彭濟執熙以降光殺之光入姑臧自領涼州刺史郡縣皆降獨酒泉西郡太守索泮不下光攻而執之索泮不降泮曰將軍受詔平西域不受詔亂涼州梁公何罪而將軍殺之泮今被執不能報仇主滅臣死固其宜也光皆殺之主簿尉祜奸佞傾險與濟同熱熙光寵信之祜譖殺名士十余人涼州人由是不悅
