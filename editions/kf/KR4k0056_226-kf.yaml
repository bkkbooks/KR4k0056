body:
  text: 第二二三回負殊以舌下西涼卻說秦晉王苻柳遣參軍閻負梁殊使於涼說張瓘以涼來降二人受命來見之瓘曰我晉臣也臣無境外之交二君何以來辱負殊說曰晉王與君藩鄰故來修好君何怪焉瓘曰吾盡忠事晉於今六世矣若與征東通使是上違先君之志下隳士民之節其可乎負殊曰晉室衰微久矣涼之先王北面事趙惟知機也今大秦威德方盛涼王若欲自帝河右則非秦之敵欲以小事大則昌若舍晉事秦長保福祿乎瓘曰中州好食言向者石氏使車適返而戎騎已至吾不敢信也負殊曰張先楊初仍領兵不服先帝討而擒之赦其罪戾寵以爵秩固非石氏之比也瓘曰必如君言秦之威德無敵何不先取江南天下盡爲秦有征東何辱命焉負殊曰江南文身之俗道汙先叛化降後服主上以爲江南必須兵服河右可以義懷故遣行人先申大好若君不達天命則江南得延數年之命而河右恐非君之土也瓘曰我跨據此州帶甲十萬西包蔥嶺東距大河伐人有餘況於自守何畏于秦負殊曰貴州山河之固孰若崤函民物之饒孰若秦雍杜洪張琚因趙氏成資有囊括中原席捲四海之志先帝戎旗西指冰消雪散旬日之間不覺易主主上若以貴州不服赫然奮怒控弦百萬鼓行而西未知貴州將何以待之瓘笑曰茲事當決之於主非身所了負殊曰涼王雖英睿夙成然年在幼沖國家安危系君一舉耳瓘懼乃以是言見玄靚靚懼亦從命遣使稱藩于秦因以玄靚所稱官爵而授之因此北涼遂降于秦卻說晉穆帝與群臣議詔遣人封桓襄爲征討大都督督諸軍討姚襄軍未行襄正攻洛陽初魏將周成降晉反據洛陽姚襄攻之逾月不克王亮諫曰今屯兵堅城之下力屈威挫或爲他軍所乘此危道也不如解此還屯襄不從時桓溫自江陵北伐遣督護高武據魯陽將軍戴施屯河上自率大兵斷後與僚屬登平乘樓望中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責記室袁宏曰運有興廢豈必諸人之過溫作色謂四座曰頗聞劉景升有千斤大牛啖芻豆十倍于常其負重致遠曾不若一羸牸魏武入荊州殺以享軍士溫意以況宏而座中皆失色溫從容作賦而謂袁宏曰聞卿長於賦爲我著北征賦而歌之宏即取筆思半晌即爲書之而呈上于溫溫令伏虞讀其賦雲獲麟於此野誕靈物以瑞德奚授體于虞者疚尼父之洞泣似實慟而非假豈一性之足傷乃致傷於天下溫聽之曰卿乃當今文章之美也於是各下樓而歸八月桓溫與衆將議計先取洛陽乃複進兵至伊水卻說姚襄自殺敗殷浩之後欲圖關中聞桓溫軍至下令三軍解洛陽之圍拒之時桓溫聞姚襄拒住前路乃親自結陣而前親披甲執銳督戰溫出馬與姚襄交戰戰上二十餘合襄兵大敗潰散襄見自兵潰亂乃鳴金收數千騎奔於北芒之中而屯桓溫見姚軍敗走亦不追趕引兵入洛陽時洛陽守將周成率衆出降溫以軍入城屯於故太極殿前先姚襄遣使謂溫曰承親率王師以來襄今奉身歸命願敕三軍小卻當伏道左溫曰我自開複中原展敬山陵無豫軍事欲來便前何煩使人襄拒水戰敗奔北山襄勇而愛人雖戰屢敗民知襄所在鹹扶老攜幼馳而赴之溫追之不及弘農楊亮自襄所來降溫問襄之爲人亮曰神明器宇孫策之儔而雄武過之溫點首應之溫移屯金墉謁諸陵寢修復毀壞各置陵令令即具表謝尚鎮洛陽令穎川太守毛穆之等戍之徙降民三千余家于江漢之間襄敗奔平陽秦並州刺史尹赤複以衆降襄襄遂據襄陵十一月燕大司馬慕容恪以兵五萬圍廣固段龕緊守其城並不出戰燕諸將請急攻廣固恪曰用兵之勢有宜緩者有宜急者若彼我勢敵外有強援恐有背腹之患則攻之不可不急若我強彼弱無援於外當羈縻守之以待其斃兵法十圍吾攻正謂此也龕兵尚衆未有離心今憑阻堅城上下戮力我盡銳攻之計旬日可拔然殺吾士卒必多矣自有擾中原兵不暫息吾每念之夜而忘寐奈何輕用其死乎要在取之不必求功之速也軍中聞之人人感悅於是爲高牆深壘以守之龕嬰城自守樵采路絕城中人相食龕大懼乃面縛出降恪親釋其縛以恩撫之新民悉定齊地遣人送龕見燕王雋集將龕斬之又坑其從三千人
