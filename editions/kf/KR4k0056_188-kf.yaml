body:
  text: 第一八五回趙王虎伐慕容皝卻說趙王以燕王慕容皝不會而攻段遼自專其利使趙覽爲左將軍以侯昭爲右將軍遣使四征詔誘民夷二十萬分爲二隊來擊遼東時燕遼東諸郡縣反應趙者三十六城因此趙兵不血刃直抵棘城城下屯紮分兵四面進攻時慕容皝大驚欲逃往東胡避之急吩咐其子慕容恪帶兵保護家小先走其父慕容廆遺有駿馬一匹其色赭白有奇相逸力時皝避難欲乘此馬其馬悲鳴踶齧皝不能近皝意決乃曰此馬見異先朝孤常仗之得濟大難今不欲孤騎者蓋是先帝之意不許吾出也言訖即出將軍慕容根聞皝欲出奔忙諫曰彼強我弱大王一舉足奔走之氣勢遂成不可複振矣今固守堅城其勢百倍事之不濟不失於走奈何望風委去爲必亡之理乎皝曰孤欲取天下何有出走皝遂止然猶懼形於色玄菟太守劉佩曰事之安危系於一人大王當自強以勵將土不宜示弱事急矣臣請出擊之縱無大捷足以安衆皝從之佩將敢死騎兵七百人出沖趙兵所向披靡斬獲二百餘人而還於是土氣百倍皝意乃安佩等日夜力戰凡十餘日趙兵不戰而退皝喚其子慕容恪來謂之曰汝可領軍追之又曰國家安危在此一舉若氣不捷則吾等無種類矣火速用心於是恪率五千精騎追擊之趙兵大敗斬首萬餘級而歸趙兵皆潰惟遊擊將軍石閡獨全一軍閔本姓冉虎養以爲子驍勇善戰多策略虎愛之比諸孫虎既敗還鄴以功拜苻洪爲都督六夷諸軍事閔言於虎曰洪雄略得將士死力諸子皆有非常之才且握強兵據近畿宜密除之以安社稷虎曰吾方倚其父子以取吳蜀奈何殺之待之愈厚卻說慕容皝使子恪追殺石虎之兵去遠了乃自整兵取諸叛城皆下之誅滅甚衆虎聞之遣曹狀將青州之衆戍海島當運糧米三百萬斛以給之又以船三百艘運穀詣高句麗使王典率衆萬餘屯田海濱又令青州造船千艘謀複擊燕時冀州八郡大蝗司隸奏請坐罪守宰趙王虎曰此朕失政所致而欲委咎守宰豈罪己之言耶司隸不進讜言佐朕不逮也而欲妄陷無辜汝可白衣領職司隸滿面羞慚而退
