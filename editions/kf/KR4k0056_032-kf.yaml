body:
  text: 第三十一回阮咸叔侄效放達阮咸字仲容妙解音律善彈琵琶處世不交人事惟其親知雅歌酣飲而已時咸與叔阮籍居道南宗室請阮居道北時北阮富而南阮貧七月七日俗例曝衣北阮盛曝衣服錦繡炫目鹹以竿挂大布犢鼻於庭人或問之鹹答未能免俗聊複爾耳人皆譏之後出補始平太守放達無稽阮修字宣子善清言性簡任不修人事修不喜見俗人遇便舍去常步行以百錢挂杖頭至酒店便獨酌酣暢雖過富貴之人亦不肯顧修家無擔石之儲晏如也與兄弟同居自得林阜之趣修居貧四十餘年而未有室王敦等名士斂錢爲婚時慕之者求入錢而不得後王敦爲鴻臚卿謂修曰卿嘗無食鴻臚承差有祿汝能爲否修曰亦複可耳遂爲鴻臚承差焉胡母輔之字彥國泰山人少擅高名有知人之鑒性嗜酒任放不拘小節與王澄王敦庾愷俱爲太尉王衍所重號爲四友澄常與人書曰彥國吐嘉言如鋸木屑霏霏不絕誠爲後進領袖爲家貧求試爲繁昌令後爲樂安太守謝鯤字幼輿陳國陽夏人也以儒業顯鯤少知名通簡有高識不修威儀好老莊能歌善鼓瑟後東海王司馬越聞其名舉爲掾鄰家高氏女有美色謝鯤嘗挑之女投梭折其兩齒故時人爲之語曰任達不已幼輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌後爲長史畢卓字枚世新蔡漁陽人少希放達太興中求爲吏部嘗飲酒廢職比舍郎釀酒熟卓因醉夜至其甕間盜飲之被掌酒者所獲到明旦視之乃畢吏部也遂遽釋其縛卓遂引主人宴于甕側償其酒錢致醉而去嘗語人曰得酒滿數百斛船四時甘味置床頭右手持酒杯左手持蟹螯終身飲酒船中便足了一生因此好酒爲人所譏樂廣聞而笑之曰名教中自有樂地何必乃爾是時何晏等祖述老莊立論以爲天地萬物皆本以無爲無者開物成務無往不存者也陰陽恃以化生賢者恃以成德故無之爲用無時不貴矣故王衍之徒皆愛重之由是朝中士大夫皆以浮誕爲美廢弛職業史說裴頠字逸民宏雅有遠識博學稽古自少知名禦史中丞周弼見而歎曰頠若武庫五兵縱橫一時之傑也累遷侍中樂廣嘗與頠談清言欲以理服之而頠詞論豐博廣笑而不言謂頠爲言談之林其時俗尚放蕩而不尊儒術浮虛而不尊禮法屍祿耽寵仕不事事王衍之徒聲譽太盛不以實學相尚並皆仿效風教陵替是故裴頠著崇有論以釋其弊衆皆然之猶不能救當時也其論曰利欲可損而未可絕有也事務可節而未可絕無也談者深列有形之累盛稱空無之美遂薄綜世之務賤功利之用高浮游之業卑經實之賢人情所徇名利從之於是立言藉其虛無謂之玄妙處官不親所職謂之雅遠奉身舍其廉操謂之曠達故悖吉凶之禮忽容止之表瀆長幼之序混貴賤之級無所不至夫萬物之生以有爲分者也故心非事也而制事必由於心不可謂心爲無也匠非器也而制器必須於匠不可謂匠非有也由此而觀濟有者皆有也虛無奚益於已有之群生哉
