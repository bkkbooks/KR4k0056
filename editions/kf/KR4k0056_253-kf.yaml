body:
  text: 第二五回謝安薦侄于朝廷是時孝武帝設朝君臣禮畢分列兩邊時近臣奏知西蜀漢中諸郡卻被秦王堅遣使鄧羌取去目今秦兵屢屢擾境孝武帝大驚曰如此怎生奈何群臣奏曰請陛下降旨求文武良將有才略者命其舉薦入朝使其鎮禦北方可保境內安也孝武帝曰然遂頒詔求文武良將當謝安奏曰臣舉一人有萬夫不當之勇有鬼神不測之謀若以此人爲將鎮北則秦不敢窺覦江南乃臣兄之子謝玄字幼度先與郗超同爲丞相桓溫參軍桓溫多用其智屢建功效今桓溫已死與郗超同歸朝廷現在班中可使總鎮管取邊界得寧帝從之召謝玄謂曰今秦兵節次犯境汝之叔父謝安薦汝有文武之才朕拜卿爲鎮武將軍監江北諸軍事總領諸鎮屯守北岸謝玄謝恩曰臣本駑鈍之才不足以騁千里今蒙陛下擢用出鎮之地敢不保全於是謝恩而出時桓沖以秦人強盛欲移鎮江南奏自江陵徙鎮上明使劉波守江陵楊亮守江夏帝從之初中書郎郗超自以其父愔位秩應在謝安之右而優遊散地常憤悒形於詞色由是與謝氏有隙時朝廷方以秦寇爲憂詔求文武良將可鎮禦北方者安以兄子玄應詔超聞之歎曰安之明乃能違衆舉親玄之才足以不負所舉衆鹹以爲不然超曰吾常與玄共在桓公府見其使才雖履屐之間未嘗不得其任是以知之玄既鎮廣陵募驍勇之士得彭城劉牢之等數人以牢之爲參軍常領精銳爲前鋒戰無不捷時號北府兵敵人畏之初郗超党于桓溫以父愔忠於王室不令之知及超病甚出兩箱書授門生曰我父年尊我死之後老父若以哀悼廢寢食者可呈此不爾即焚之及超卒愔果成疾其門生呈箱愔發之皆超昔與桓溫往返密計愔大怒曰小子死已晚矣遂不復哀
