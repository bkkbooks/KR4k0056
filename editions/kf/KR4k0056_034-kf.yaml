body:
  text: 第三十三回魯褒傷時作錢論論上朝廷不能用卻說惠帝爲人愚憨嘗在華林園聞哈蟆鳴謂左右曰此鳴者爲官乎爲私乎左右戲之曰在官地爲官在私地爲私時天下饑饉百姓餓死帝聞之曰胡不食肉糜由是權在臣下政出豪門勢位之家更相薦托有如五市賈郭二黨恣橫貨賂公行當有隱士南陽魯褒字元道好學多才以貧素自立因見元康之後紀綱大壞傷時之貪鄙乃隱姓名而著錢神論其略曰錢之爲體有乾坤之象內則其方外則其圓其積如山其流如川動靜有時行藏有節市井便易不患耗折故能長久爲世神寶親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顔開難發之口錢多者處前錢少者居後錢之爲言也泉也無遠不往無幽不至京邑衣冠疲勞講肄厭聞清談對之睡寐見我家兄莫不驚視錢之爲神往無不利何必讀書然後富貴由此論之謂爲神物無德而尊無勢而熱排金門入紫闥危可使安死可使活貴可使賤生可使殺是故忿爭非錢不勝幽滯非錢不拔怨仇非錢不解令聞非錢不發洛中朱衣當塗之士愛我家兄皆無已極執我之手抱我終始故諺曰錢無耳可使鬼神今之人惟錢而已矣此論蓋疾時而作朝士亦不察滿朝政務以苛察相高每有所議各立私意刑法不一獄訟繁滋尚書劉頌上疏曰近世以來法漸多門令甚不一吏不知所守下不知所避夫君臣之分各有所司法有必奉故令主者守文理有窮塞故使大臣釋滯事有時宜故人主權斷主者守文若釋之執犯蹕之坐也大臣釋滯若公孫宏斷解郭解之獄也人主權斷若漢祖戮丁公之佞也自非此類皆以律令從事然後法信於下可以官政矣惠帝覽之終不能用朝臣不肯爲故寢也卻說韋忠平陽人少慷慨有不可奪之志閉門修己不交當世仆射裴頠聞之慕而造謁忠在家托以遠出故不相見愈重慕之次日因見侍中張華曰平陽韋忠有公輔之器廟廊之才人皆仰敬明公可於此時擢之必有匡濟當時之務華曰聞名久矣未曾見面今如此吾即辟之於是張華使人辟之韋忠稱疾不起友人問忠不出仕之故忠曰吾乃草茅下士本無宦情張茂先華而不實裴逸民貪而無厭棄典禮而附賊後此豈大丈夫之所爲哉逸民每有心托我我常恐洪濤蕩漾餘波見漂其溺及我況我蹇裳而就之哉人服其說史說索靖字幼安敦煌人也少有逸群之量與鄉人範衷張彪索紒索永俱詣太學馳名海內世人號稱敦煌五龍惟靖最雄後四人並亡時侍中張華重其名除爲雁門太守索靖知天下將亂出朝因指洛陽宮銅駝曰曾見汝在荊棘中耳
