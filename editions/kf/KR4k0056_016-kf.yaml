body:
  text: 第十六回八王用事相圖害次早惠帝設朝賈後在後殿出奏曰楊駿謀反今已誅之無人參輔朝政汝南文成王司馬亮尚書衛瓘二人乃先朝元宰忠義慨然使其輔政國家幸甚伏望陛下政臨親決剛明不惑未知聖意雲何惠帝曰皇后所奏正合朕心言訖即以汝南文成王司馬亮爲太宰錄尚書事以尚書衛瓘爲太保同輔朝政汝南王司馬亮既輔政欲悅衆論誅惡賞功諸將封侯者千八十一人亮皆增封賞禦史中丞傅鹹曰無功而獲厚賞則人莫不樂國之有禍是禍源無窮也亮不從傅鹹複諫亮亦不從自是亮頗專權執政
