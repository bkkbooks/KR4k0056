body:
  text: 第二七八回秦王登與後秦戰己醜十四年後秦王萇以秦戰屢勝謂秦軍中刻秦王像奉祀而得秦王堅之助乃亦于軍中立堅像禱之曰新平之禍臣爲兄姚襄報仇耳且陛下命臣以龍驤建業臣豈敢違之時秦王登升將樓遙望見大聲謂之曰爲臣弑君而立像求福庸有益乎因大呼曰弑君逆賊姚萇何不自出吾與汝決死戰萇不應久奉之以軍未有利益乃斬像首以送秦至是秦王苻登留輜重於大界自將輕騎攻安定諸將勸萇出與決戰萇曰與窮寇爭勝兵家之忌也吾將以計取之乃留兵守安定夜率騎三萬襲登大界克之擒名將數十人掠男女五萬口苻登皇后毛氏美而勇善騎射見後秦兵入其營猶彎弓跨馬率壯土力戰殺七百餘人衆寡不敵爲後秦所執萇即將納之爲後毛氏罵且哭曰姚萇逆賊汝既殺天子又欲辱皇后皇天後土甯容汝乎於是萇殺之諸將欲因秦軍駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止登來複收餘衆屯堡中不出卻說晉帝既親政事威權己出有人主之量已而溺於酒色委政于琅玡王道子道子亦嗜酒旦夕與帝以酣歌爲事又崇尚浮屠窮奢極費所親昵者皆蚶姆僧尼近侍弄權交通請托賄賂公行官爵濫雜刑獄謬亂尚書令陸納望宮闕歎曰好家居織兒欲毀壞之耶左衛將軍許營上疏曰局吏衛宮仆隸婢兒皆爲守令或帶內職僧尼乳母兢進親昵悉受貨賄輒使臨官政教不均暴濫無罪且佛者清靜玄虛之神今僧尼於五戒佛法尚不能遵而流俗兢加敬事以至侵漁百姓取財爲惠亦未合佈施之道也疏奏不省道子勢傾中外帝漸不平侍中王國寶以讒佞有寵于道子諷八座啓道子宜加殊禮群臣無敢言者護軍車胤曰此乃成王所以尊周公也今主上當陽豈得爲此乃稱疾不署疏奏帝大怒而嘉胤有守中書侍郎范甯徐邈爲帝所親信數進忠言皆補闕失指斥奸黨國寶寧之甥也甯尤疾其阿諛勸帝黜之國寶遂與道子譖寧出爲豫章太守甯臨行上疏曰今邊烽不息而倉庫空匱古者使民歲不過三日今之勞擾殆無三日之休至有生兒不及舉養鰥寡不敢嫁娶臣恐社稷之憂厝火積薪不足喻也又言中原士民流寓江左歲久安業謂宜正其封疆戶口皆以土斷又人欲無涯奢儉由勢今者並兼之室亦多不贍蓋由用之無節爭以靡麗相高故也禮十九爲長殤以其末成人也今以十六爲全丁十三爲半丁傷天理困百姓謂宜以十九歲爲全丁十六歲爲半丁則不爲夭折生長滋矣帝多納用之甯在豫章遣十五議曹下屬城采求風政並吏假還訊問官長得失徐邈與寧書曰足下聽斷明允庶事無滯則吏慎其貪而人聽不惑矣豈須邑至裏詣飾其遊聲哉非徒不足以增益乃蟲魚之所資也豈有善人君子而幹非其事多所告白者乎自古以來欲爲左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使讒諂並進善惡倒置可不戒哉足下慎選綱紀必得國士以攝諸曹皆得良吏以掌文案又擇公方之人以爲監司則清濁能否與事而明足下但平心而處之何取於耳目哉昔明德馬後未嘗顧左右與言可謂遠識況大丈夫而不能免此乎寧好儒學性質直常言王弼何晏之罪深於桀紂或以爲貶之太過寧曰王何蔑棄典文幽沈仁義遊辭浮說波蕩後生使縉紳之徒翻然改轍以至禮壞樂崩中原傾覆遺風餘俗至今爲患紂縱暴一時適足以喪身覆國爲後世戒豈能回百姓之視聽哉故吾以爲一世之禍輕歷代之患重自喪之惡小迷衆之罪大也琅玡王道子恃寵驕恣帝漸不能幹欲選時望爲藩鎮以潛制之問于太子左衛率王雅曰吾欲用王恭殷仲堪如何雅曰恭風神簡貴志氣方嚴仲堪謹於細行以文義皆稱然皆峻狹自是幹略不長天下無事足以守職若其有事必爲亂階矣帝不從使恭鎮京口庚寅十五年春二月後秦王萇與秦王登相持日久心生一計埋伏兵于壕邊使人持書詐降迎登入城殺之於是使人去見秦王登許接其入城開門納之登將從之將軍雷惡地在外聞知馳騎見登曰萇多詐不可聽也登乃止萇聞知謂諸將曰此羌見登事不成矣登亦以惡地勇略過人憚欲殺之惡地竊知乃降于後秦王萇萇重用之秦王登與諸將曰後秦姚萇兵勢已衰宜急攻之將軍魏揭飛曰臣請一軍攻其後大王使揭飛一人以兵擊其前則萇成擒矣登從之只揭飛以兵來攻後秦將姚當屯於杏城將軍雷惡地反欲應之同攻李潤後秦王萇欲自擊之群臣曰陛下不憂六十裏苻登乃憂六百里魏揭飛何也萇曰登非可猝滅吾城亦非登所能猝拔惡地智略非常若南引揭飛東結董成得杏城李潤而據之長安東北非吾有也言訖乃潛引精兵一千六百赴之揭飛惡地引兵數萬氐胡赴之者首尾不絕見後秦兵少悉衆攻之萇固壘不戰示之以弱潛遣騎二百出其不意彼兵擾亂萇縱兵擊之斬揭飛及殺其將士萬餘惡地複握兵柄待之如初命姚方成于所營之地每柵孔中樹一旗以旌戰功歲余問之方成曰營地太小以廣之矣萇曰吾自行兵以來與人戰未有如此之快以千餘兵破三萬之衆營地雖小狹豈以大爲貴哉時馮翊人郭質起兵於廣鄉移檄三輔曰姚萇凶虐毒被神人吾屬世蒙先帝之仁非常伯納言之子即卿校牧守之孫也與其含恥而存孰若陷首而死於是三輔壁壘皆應之獨鄭縣人苟曜不從聚衆數千附于後秦擊質質走洛陽去訖
