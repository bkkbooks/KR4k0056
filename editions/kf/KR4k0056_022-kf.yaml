body:
  text: 第二十二回趙王倫征胡三寇六年正月惠帝以張華爲司空六月匈奴郝度元與馮翊北地馬蘭羌盧水胡各以兵五萬俱反殺北地太守自稱爲大王詔征西大將軍趙王司馬倫與雍州刺史解系起兵五萬討之次日雍州刺史解系見征西大元帥趙王倫曰今匈奴郝度元馬蘭羌盧水胡分作三處侵掠臣與殿下亦宜以兵分作三隊去鎮要害若不分軍去守則兩處百姓必降北地皆爲匈奴所有再難與爭王倫未及答嬖人孫秀密謂趙王倫曰殿下既爲大將軍宜自主事何聽調遣於臣下今之將軍皆殿下之家人要發即發要止即止解系何等人反受他節制殿下宜自己督其軍五分隊迎戰進可必大勝趙王倫然其說因謂解系曰不可分兵分軍則兵勢不振卿可與吾先討郝度元再以得勝之軍去討二羌三路自然可平何必分軍而進解系不從因此趙王倫信嬖人孫秀與雍州刺史解系爭論軍事於是二人各以表奏聞朝廷惠帝問群臣張華曰陛下可使粱王司馬肜去代趙王倫領兵征倫還朝不然兩人角智必誤軍事自今羌人侵境若再內亂彼必乘隙而入深爲大患惠帝依華言即召梁王司馬肜至殿謂曰今趙王與系不睦卿可往西代趙王領兵令趙王還朝粱王既受詔辭帝來進見趙王倫稱詔相代還朝之事趙王心中煩惱痛恨解系只得將符印交付與肜訖自與孫秀還朝先趙王倫與解系各上表時解系表道宜誅孫秀以謝氐羌則胡人收兵因此張華奏惠帝詔梁王司馬肜代倫領兵梁王肜臨起行張華見梁王曰殿下若到邊可先收嬖人孫秀誅之分兵鎮不可與大戰及此梁王肜受征西大將軍符印欲誅孫秀孫秀大罵急投梁王參軍傅仁求救原來傅仁與孫秀友善傅仁即來見梁王曰孫秀乃趙王重臣殿下若誅之則趙王怪而構隙依臣愚見不若休息於是梁王肜從之孫秀始得性命同趙王司馬倫入朝孫秀因說趙王倫曰今見朝廷大事在賈後欲厚爵者必須結其腹心殿下何不以千金深交賈模浼其薦于賈後賈後若信之必委以朝政因而求錄尚書事指日可以趨名趙王倫曰卿謀正合我心吾以金七百斤玉帶一條汝可將此物代我謀之秀領命即將金並玉帶私入賈府拜見侍中賈模曰趙王司馬倫在邊新回無有奇物相送今有黃金七百斤玉帶一條令某拜奉足下伏求鼎力一薦於聖後求爲錄尚書事重謝在後微物聊表私忱賈模大悅曰你回拜上趙王此物本欲返璧誠恐卻之不恭權且貯之容某人入宮面奏聖後自當竭力謀之自有好音奉複也於是孫秀去訖賈模因入宮見賈後曰趙王司馬倫乃先帝元老有宰相才更兼致敬娘娘誠實懇篤若以委錄尚書事事必有善政可保娘娘終始無窮因此賈後信之次日惠帝升殿賈後以趙王倫爲錄尚書事張華裴頠爭曰趙王倫先朝元老信用小人若使參政必害朝綱故易辭曰德薄而位尊力小而任重智小而謀大鮮不及矣言不勝其任也依臣等實爲不可賈後從之因此趙王倫不得預政痛恨張華裴頠等而生欲報賈後之心
