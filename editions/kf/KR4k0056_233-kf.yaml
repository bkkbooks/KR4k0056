body:
  text: 第二三回天錫弑君而自立涼自丞相宋混死後張天錫專執朝政張玄靚庶母郭氏以張天錫專權與大臣謀欲誅之事泄天錫反將郭氏皆殺之遂弑玄靚自稱涼州牧西平公時年十六遣司馬秦奉詣建康請命晉帝從之詔封錫西平公卻說匈奴劉衛辰以衆作叛代王什翼犍急點兵三萬攻衛辰時河水未合犍命將士以葦結組紐流澌俄而水合然而不堅乃散葦於其上冰草相結有如浮梁兵乘以渡衛辰不意兵卒至大驚遂引左右西走去了什翼犍不追收其部落之十六七而還衛辰奔降秦春送還朔方遣兵戍之代王什翼犍性寬厚郎中令許謙盜絹一匹知而匿之謂左長史燕鳳曰謙盜絹吾不忍視謙之面卿慎勿泄若謙慚而自殺是吾以財殺士也嘗討西部叛者流矢中目既而獲射者群臣欲臠割之代王曰彼各爲其主耳何罪之有遂釋射者是以士民附者衆耳
