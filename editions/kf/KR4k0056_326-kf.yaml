body:
  text: 第三二三回裕以往亡獲燕王南燕城外聞男女病腳弱者大半出降尚書悅壽謂超曰今軍士凋瘁絕望外援豈可不思變通之計超歎曰廢興命也吾寧伏劍而死不能銜璧而生劉裕悉衆攻城諸將曰今日往亡不利出師裕曰我往彼亡何爲不利催軍人四面攻之南燕尚書悅壽聞張綱降晉密寫獻門之書系在箭上射下城來軍士拾見張綱綱將書見裕裕喚請將聽令如入冀州休得殺害一城老小軍民降者免死群盜又使于栗磾討不從命者所向皆克
