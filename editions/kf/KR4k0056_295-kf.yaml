body:
  text: 第二九二回燕蘭汗謀亂燕室初燕人有自中山至龍城者言拓跋珪衰弱於是燕王寶欲複取中原調兵悉集至是聞中山已陷乃命罷兵遼西王農曰遷都尚新未可南征宜因使師襲庫莫奚取其牛馬以充軍資寶從之北行渡澆洛水會南燕王德遣使言珪西上國中空虛宜速起兵寶大喜即日詔諸軍整頓擇日起行去取長安乃諸軍苦役不聽自散農及長樂王盛切諫以爲兵疲力弱魏新得志未可與敵寶將從之慕輿騰曰今師衆已集宜獨決聖心乘機進取於是乃留太子盛統後事以騰爲前軍農爲中軍寶自爲後軍相去各一頃地起行長安段速骨因衆心嗟怨後遂作亂逼立高陽王隆之子崇爲王慕容寶將十余騎奔農營報知農騰農騰不信其部營兵亦厭役奔潰於是燕王寶見衆亂乃奔走還龍城燕尚書蘭汗見燕王寶勢孤陰使人與段速骨等通謀乃自弓兵出營龍城之東屯紮遼西王農不知其爲亂夜出赴之被速骨將以巡城招城上之兵來降農素有忠節威名城中恃以爲強忽見農在城下無不驚哭喪氣遂皆逃潰無人守城速骨乃得入城縱兵殺掠燕王寶及長樂王盛等見亂率輕騎南走速骨以高陽王崇幼弱欲更立農崇党聞之遂欲殺農蘭汗大怒以兵襲擊速骨速骨不備被執殺之蘭汗廢崇職以太子策承制行事與部下將謀計遣使迎寶及盛於薊城寶以爲實欲還盛等曰汗之忠詐未可知也不如南就範陽王合衆以取冀州若不能捷徐歸龍城未爲晚也寶從之行至黎陽使中黃門令趙思去告范陽王范陽王德令其使人奉迎歸德已自稱號王德謀遣慕輿護率壯士數百人隨趙思而北聲言迎衛其實圖之趙思使人報知於寶寶既遣思而聞德已稱制亦懼而北走護至無所見執思而歸德以其姻習典故欲留而用之思曰犬馬猶知戀主思雖刑臣乞還舊主德固留之思怒曰殿下親則叔父位則上公不能率先群後以匡帝室而幸根本之傾爲趙王倫之事思雖不能如申包胥之存楚猶慕龔君賓之不偷生於世也德斬之寶走至北遣長樂王盛收兵冀州行至鉅鹿說諸豪傑皆願起兵會蘭汗複遣使奉迎寶寶以汗系燕王垂之舅而盛妃之父也請無他意遂行盛流涕固諫不聽盛乃與將軍張真下道避匿寶自去龍城四十裏汗使弟加難率五百騎入外邸而殺之並殺太子策及王公將士百余人自稱昌黎王慕容盛聞知大哭欲赴哀張真止之休去盛曰我以窮投汗汗性愚淺必念婚姻不忍殺我旬月之間足以展吾之志遂往見汗汗妻蘭氏盛妃皆涕泣請放盛汗側然哀之乃舍盛于宮中以爲侍中親待如舊汗兄堤驕狠荒淫汗惡其無禮盛因而間之汗兄弟浸相嫌忌遂不相睦燕太原王慕容奇乃慕容楷之子蘭汗之外孫也汗以爲將軍長史太子盛潛使奇逃出起兵五千來攻蘭汗汗得聞知使仇泥慕將兵一萬討之是時龍城自夏至於秋月不雨汗日詣燕諸廟禱請委罪加難加難聞知怒率所部兵一萬五千來襲汗使太子蘭穆擊破加難加難聞之刺殺汗穆而取大位時穆果來攻破加難還宴將士盛因逾垣入東宮與汗等聚集舊所衛兵三千人馬殺出東宮來殺穆諸軍聞盛得出皆呼躍爭先殺汗汗穆被真斬之內外欣然士女相慶盛告於太廟因下令曰賴列祖之德文武之力社稷幽而複顯不獨孤以眇眇之身挽回造化之權凡在臣民皆得明目當世遂大赦改元以長樂王攝行統制命慕容奇罷兵奇生異心遂不受命盛大怒勒兵三萬進至橫渠盛出擊大破之執奇賜死於是龍城遂平南郡公桓玄遣人見會稽王求爲廣州刺史道子忌玄在荊州爲患因從之桓玄受命爲廣州刺史而不行豫州刺史庾楷以道子割其四郡屬王愉上疏言江州內地而西北近戎不時爲寇倘有急軍需不應使愉分督四郡還他朝廷不許楷怒遣其子庾鴻謂王恭曰尚之兄弟複秉機權欲削諸鎮宜早圖之王恭乃以爲然遣人以告殷仲堪及桓玄二人皆許之推王恭爲盟主刻期各執兵同赴京師司馬劉牢之諫曰會稽王道子帝叔父也而又當國秉政卿爲將軍戮其所愛其深伏將軍已多矣頃所授任雖未允愜亦無大失而割庾楷四郡以配王愉于將軍何損晉陽之甲豈可數興乎王恭不從上表請討王愉司馬尚之兄弟朝廷憂懼內外戒嚴道子不知所爲悉以事委世子元顯日飲醇酒而已元顯聰敏頗涉文義志氣果銳以安危爲己任附之者謂其英武有明帝之風仲堪聞恭舉兵亦勒兵趣發悉以軍事委南郡相楊儉期兄弟期率舟師五千爲前鋒桓玄次之仲堪率精兵二萬繼後佺期自以其先漢太尉震至父亮九世皆以才德著名矜其門第謂江左莫及而時流以其晚過江婚宦失類兄弟粗曠每排抑之佺期常以切齒欲乘有事以逞其志故亦贊成仲堪八月佺期及桓玄大兵奄至湓口王愉無備引衆惶遽走奔臨川玄以兵追獲之
