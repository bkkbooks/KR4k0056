body:
  text: 第二六回八公山草木化形十月秦王苻堅與群臣商議進兵權翼等曰宜先取壽陽若得壽陽建康必然震恐恐則生亂亂則逃奔軍無鬥志民有憂患乘此一戰江南可定秦王堅曰然即召陽平公苻融至委兵五萬使其去攻壽陽又下令將軍梁成引兵五萬屯於洛澗安住寨柵以遏晉兵不得相應二將各率兵去訖卻說苻融以兵來攻壽陽郡守王正以五千兵出城迎敵苻融指著王正曰早早來降免汝一死正大怒拍馬舞槍出陣來戰秦兵陣中徐成以雙刀來迎二人交鋒戰上十合王正遮攔不住只待要走張蠔一騎馬一條槍飛出陣前大喊一聲以槍殺進將王正一槍刺于馬下晉兵各自潰敗苻融揮兵殺奔入城佔據壽陽迎接秦王苻堅及文武入城屯住卻說會稽王道子領朝旨來到鍾山土神廟內親自焚香下拜奉上印綬宣讀詔旨畢乃祈禱曰今因秦虜苻堅以兵百萬來侵晉境君有倒懸之危民有塗炭之憂今奉聖旨來封大神爲相國之尊伏望尊神大顯神通施靈施威爲國爲民早滅胡類萬民沾惠祝訖即命回京其土神既受相國之號乃大顯法力徑來將八公山草木皆化以爲人形像各披堅執銳勇猛威雄出衆一日秦王堅與苻融及諸將佐登壽陽城遙望晉軍見八公山列有雄兵一百余萬人人勇猛個個威雄部軍整齊隊伍不混秦王堅一見始有懼色顧謂苻融等曰此乃勁敵也何謂弱少乎因此命苻融梁成進兵速戰苻融問朱序曰卿先仕晉必知備細如今江南英傑更有何人序曰目今謝玄叔侄二人有王佐之才其餘不足稱也二人與序有一面之交陛下肯以尺幅之書與序過淮操三寸不爛之舌說其來降東南指日可平融曰既與卿善修書你前去說其降於是苻融作書使朱序來招謝安玄二人降秦朱序領命特來江南時謝安謝玄欲進兵聞梁成屯於洛澗謝安等不敢近前離洛澗二十五裏而屯忽軍人報梁州刺史朱序來見安命進問曰聞卿在襄陽與苻丕相持今如何來此序曰吾守襄陽被苻堅使子苻丕楊安領軍五萬攻陷襄陽不得已僞降于秦今苻融遣吾過江來請都督投降吾因此得見明公一面明公休要見疑吾必不負大晉觀秦兵雖衆亦易破之明公以兵外戰吾必內應未知明公意下如何謝安曰吾知汝之忠義有何疑焉秦兵勢大何計破之序曰今梁成憑血氣之勇爲前鋒以兵五萬屯住洛澗殊爲易攻何不攻之若待秦兵百萬之衆盡至難與爲敵不如乘此諸軍未集速往攻之若攻其前鋒則彼已奪氣即可破矣安曰卿謀正合吾意卿今休去在此同參軍機序曰吾之老母家屬皆在彼處若不回必被其害吾暫回去準備內應安曰汝去如何回信序曰道都督不肯降秦安曰不然汝回只道吾肯降只家屬在建康不能得出若得家屬出城一同來降汝若言不降彼必速攻朱序曰然於是安石使朱序還秦序以謝安石之言說與苻融融半信半疑
