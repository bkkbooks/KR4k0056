body:
  text: 第一三四回羊鑒有罪以除名卻說王導舉羊鑒爲將討徐龕鑒率衆屯兵於下邳不敢進獨徐州刺史蔡約得命率騎兵二萬來擊龕龕引衆拒迎戰不十合龕大敗遣使求救于後趙王石勒使其將王伏都率兵一萬來救之時王伏都淫暴不進助戰龕疑其襲己請其來赴宴而斬之令使人來後趙稱伏都罪狀請別爲救後趙王怒而不受朝廷敕鑒進兵鑒猶疑憚不敢進於是刁協劾鑒之罪元帝從其說除名詔以蔡豹代領其兵王導自慚以失譽奏帝乞自貶元帝不許卻說京兆人劉宏客居涼州以妖術惑衆張實左右皆信而事之宏自言天與神璽應王涼州張實帳下閻涉等欲謀殺實而奉之初實弟張茂密知其謀告之實大怒使兵五百去收宏未及至閻涉等已知入殺實實死前所使五百之兵已入天梯山將劉宏執之而還見實被害衆遂將宏斬之誅其党閻涉等數百人左司馬陰元等以實子張駿尚幼推其弟張茂爲涼州刺史茂以實子駿爲世子茂代領其衆安撫涼州
