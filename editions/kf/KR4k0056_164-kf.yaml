body:
  text: 第一六一回王衍專意事清談史說王衍字夷甫乃司徒王戎之弟也少有奇才美貌明悟如神常自比子貢聲名藉甚傾動當世妙善玄言惟談老莊爲事每執玉柄麈尾與手同色義理有所不安即便更改故世人號其口中雌黃朝野翕然謂之一世龍門矣後進之土莫不景仰樂廣字彥軸南陽人也幼孤貧僑居山陽寒素爲業人無知者尤善談論每以訥言析理厭人之心而其所不知默如也凡論人必先稱其所長則所短不言自見初衛瓘見廣而奇之曰自昔諸賢既沒常恐微言將絕而今乃複聞斯言於君矣因命諸子造焉曰此人如水鏡見之瑩然若披雲霧而見其天也時王衍自言與人語甚簡及至見廣便覺己之繁爲識者所歎羨如此而廣善言而不長於筆廣爲任滿欲爲表見上不能寫潘嶽爲表嶽曰當得君意方可上書廣乃作二百句語述己之意嶽因取棄便成名筆世人鹹雲廣不假嶽之筆不取廣之旨無以成斯美也先赴任有親客造去久不復來年餘乃至問其故客答曰前歲在貴座蒙賜酒方欲飲見杯中有蛇意其惡之既飲而成斯疾因此久失奉訓耳時河南廳室有角挂壁漆畫作蛇廣意杯中蛇即角影也複置酒於前處待客因而問曰杯中複有所見否客答曰杯中所見蛇複如初廣乃告之曰此蛇非真乃角影也因指與客豁然意解沈屙頓愈其明辨如此廣與王衍齊名故天下人言風流者以王樂爲首也其時樂廣與王澄阮咸阮修胡毋輔之謝鯤王尼畢棹皆以任放爲達史說王澄字平子生而警悟雖未能言見人舉動便識其意及長勇力絕倫與王敦謝鯤庾微阮修最善號爲四友後爲荊州刺史
