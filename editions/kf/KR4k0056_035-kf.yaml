body:
  text: 第三十四回趙王起兵誅賈後庚申永康元年四月卻說趙王司馬倫字子彜乃宣帝司馬懿之第九子也見湣懷太子被賈後所害欲起兵恐力不及謂孫秀曰今惠帝無道賈氏專制謀殺太子淫亂後宮先曾與卿謀之恨力未及吾思宣帝盡忠仕魏南拒孫權北抗劉備幸有大勳德及武帝平蜀滅吳而有天下未及三世遭此賤人暴虐鹿將失之吾欲起兵盡誅賈黨誠恐刻鵠不成反類騖耳汝有何策孫秀曰殿下欲立蓋世之功獨力是所不能臣見齊王冏每有不忿賈後之意請其同討賈氏方可有濟其餘碌碌等輩不可令其知之司馬倫曰然於是司馬倫即使人請司馬冏至置酒相待至半酣趙王屏左右哭謂冏曰今皇上愚憨悍後專權君之元子弑之於許昌後之賊黨委之以重任若不早爲社稷計眼見天下非晉有矣吾等豈能免乎今欲與侄共誅賈氏以正紀綱侄意若何司馬冏曰吾欲殺此賤人久矣因力不及既如此何不二家就此起兵矯詔廢後誅其賊黨以靖朝廷誰敢拒之司馬倫曰既有同心奈無兵權孫秀曰此容易耳明早殿下可入朝奏帝稱說昔年東安王司馬繇因罪見廢今因久在東安甚得民心常抱不平之志將來之患固不待言宜乘此時亂心未作朝廷商議著親信大臣領兵鎮之使彼不萌惡念可保萬全皇上必允若問誰可鎮守王殿下宜力保齊王殿下領兵則兵權歸於掌握即勒其兵矯詔先廢悍後後誅賊黨豈不甚便則大功可望成矣二王撫掌大笑曰此計甚妙宜速爲之於是齊王辭別回邸各自歇息次日趙王司馬倫披公服執牙笏奏惠帝曰臣聞東安王司馬繇被廢居東安怨望朝廷陰結力士謀爲不軌陛下可速使人以兵去鎮捕其羽冀庶得東地寧息倘惡念一興難以撲滅帝問曰東安欲叛誰人可去鎮之倫曰齊王冏有文武才略可使鎮守萬無一失惠帝從之即召齊王司馬冏領車騎將軍授以兵符發兵二萬五千人使其出鎮東安齊王同謝恩捧符印出朝來見司馬倫商議孫秀曰來日俟聖上坐朝齊王殿下矯皇上詔廢賈後爲庶人殿下率禁衛武土拒住宮門以防外兵然後請旨誅張華裴頠賈謐等黨因是趙王倫等各依孫秀之計而行計議已定趙王倫佯使司馬雅去告張華曰趙王欲與公共匡社稷爲天下除害公意如何華拒之曰天下已定百僚奉職賈後雖虐未至大患除甚大害子莫駿乎司馬忿怒曰刀將加頸猶爲是言耶不顧而出報倫倫怒是夜乃自矯詔敕三部司馬曰中宮與賈謐等謀殺太子今奉皇上聖旨命車騎司馬冏入廢中宮汝等從命賜爵關內候不從者夷其三族衆皆從之開門而入至天明司馬倫又以兵一千人入宮拒住內外宮人不得出入齊王司馬冏自披甲執銳領甲士五百人在宮內矯詔責賈後曰皇太后何罪見廢皇太子何辜見誅汝淫亂宮室污穢朝廷今聖上有密旨在此廢汝爲庶人火速收拾遷往金墉城去不許久延掖庭賈後大驚曰詔當從我出汝詔從何而來齊王冏曰詔書乃聖上親書不必爭論言訖喝令軍士擁而出之賈後走上台閣遙望金鑾殿上大呼曰陛下之婦使人廢之你久後亦行自廢齊王冏大怒揮軍士上閣將賈後推扯下來以宮車仗使軍士護送遷于金墉城去訖勒兵出宮會同趙王司馬倫梁王司馬肜等請帝上殿賈後淫風毒且愚謀絕皇嗣卻必誅今朝司馬倫兵起猶說詔當從我出時惠帝見諸王各執兵入心中大驚戰慄不已當趙王司馬倫俯伏殿下奏曰臣等爲社稷之計必無謀異之心陛下不勞驚恐惠帝方才放心司馬倫又奏曰今賈後兇悍淫虐廢弑太后謀殺太子臣故廢之今侍中張華仆射裴頠太常賈謐助後爲虐陛下可下詔誅夷惠帝見趙王如此不得不從連忙下詔許之於是趙王倫迎惠帝幸東堂執賈謐斬之召八座以上皆夜入殿於是裴頠等皆至又令收趙粲賈午等盡誅之乃令張林執張華裴頠解結於庭中張華謂張林曰卿欲害忠臣耶林稱詔詰之曰卿爲宰相太子之廢不能死節何耶華曰式乾之議臣諫草具存可覆按也林曰諫而不從何不去位華無以對林遂出來將裴頠等皆夷三族又收董猛孫慮程據等皆誅之於是趙王倫自爲都督中外諸軍事相國以侍中孫秀爲中書令並據兵權計文武封侯者數千人奏惠帝詔追複太子司馬遹位號更立其子司馬臧爲臨淮王時有司奏尚書令王衍備位大臣太子被誣志在苟免請禁錮終身詔許之趙王倫見張華不至複使孫秀去收誅其三族時倫欲收人望選用海內有德之士以李重荀組爲左右長史以王堪劉模爲左右司馬束皙爲記室荀松陸機爲參軍李重知倫有異志辭不受趙王倫逼之不已憂憤成疾扶拽受拜數日而卒五月惠帝詔立臨淮王爲皇太孫此時朝野震悚士民恐避獨閻纘聞知徑入市曹撫張華屍慟哭曰吾曾語君及早退位而不聽今果不免也後複見賈謐屍叱曰小兒亂國之由誅之晚矣哭訖上疏表張華之死屈惠帝善其忠烈乃擢爲漢中太守史說張華之幼子張韙頗識天文夜觀乾象見中台星折次日見華曰今中台星折正應大人宜早退位免禍臨身華不聽且曰天道幽遠惟修德以應耳不如靜以待之未數日孫秀以兵入府曰奉旨斬公華大驚曰吾先帝老臣忠心如丹不愛生而靖王室之難禍不可測也言未終孫秀使人推出市斬之誅其三族張華性好人物至於貧賤候門之士凡有一介之善者便咨嗟稱羨爲之延譽性愛書籍身死之日家無餘財惟有文史溢於箱篋嘗徙居載書三十乘秘書監虞摯撰定官書皆資華之本以取正焉天下奇秘世所希有者悉在華所由是博物洽聞世無與比陸機嘗請華宴於是賓客滿座華舉器見鮮有異乃曰此龍肉也衆客未之信張華曰公等不信試以苦酒灌之必變異象衆依法以苦酒灌之而五色光起衆始默然席散機問鮓主果雲園中茅積下得一魚質狀殊常以作鮓過美故以相獻耳時武庫封閉甚密惠帝使人開搬點視寶物其中忽有雉雊諸人皆以密固何有此物惟華曰此必蛇化爲雉也衆視雉側果有蛇脫焉吳郡臨平岸崩出一石鼓捶之無聲郡守進入朝廷惠帝問華華曰可取蜀中桐材刻魚形扣之則鳴矣帝如其言即取蜀桐刻形打之聲聞數裏先吳之未滅也鬥牛之間常有紫氣及吳平紫氣愈明華聞豫章人雷煥妙達緯象乃召煥至與宿乃屏人謂曰可與汝共尋天文知將來之吉凶因同登樓仰觀天象問煥紫氣之故煥曰仆察之久矣惟鬥牛之間頗有異氣華曰是何祥也煥曰寶劍之精上徹於天耳華曰君言得矣吾少時有相者言吾年出六十位登三公當得寶劍佩之斯言豈效耶因問曰在何郡煥曰在豫章豐城華曰欲屈君爲宰密共尋之可乎煥曰從命於是華即補煥爲豐城令煥到縣掘獄屋基人地四文餘得一石函光氣非常中有雙劍並刻有題一曰龍泉一曰太阿自得此劍其鬥牛間之氣不復見矣煥以南昌西北岩下土以拭劍光芒豔發因此遣使送一劍並土來京與華一自佩華回書謂煥曰得兩送一雷公得無欺乎煥謂使人曰本朝將亂張公當受其禍此劍當系徐君墓樹靈異之物當化去不永爲人服也時華得劍寶愛之常置坐側華以南昌土不如華陰赤土令人報煥書曰詳觀劍文乃幹將也莫邪何不複至雖然天生神物終當合聚因以華陰土一斤致煥煥更以拭劍倍益精神張華既誅劍失所在並不見蹤煥亦卒其于雷燁爲州從事持劍行經延平津忽於腰間其劍躍起墜水即使從人沒水取之並不見劍但見兩龍各長數丈蟠縈有文沒者懼而返須臾光彩照水波浪驚沸於是失劍燁歎曰先君化去之言張公終合之論此其驗乎張華博物如此類甚多不能詳載華著博物志十篇及文章並行於世先是華與趙王司馬倫有隙司馬倫乘此誅華華死年六十九歲朝野莫不悲慟
