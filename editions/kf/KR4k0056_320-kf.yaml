body:
  text: 第三一七回穆之勸裕刺揚州戊申四年正月晉帝設朝文官武將俱各身披朝服手執牙笏齊上金鑾殿各拜舞山呼萬歲近臣奏司徒揚州刺史王謐薨無人輔政晉帝命群臣議任誰人時左仆射孟昶出朝堂謂衆臣曰聖上面命我等舉賢輔政此事必須問劉裕劉毅二人然後可行衆臣皆曰然於是遣尚書右丞皮沈來丹徒與劉裕劉毅二人商議皮沈問劉毅毅曰既揚州刺史王謐費卿可回朝奏主上可使中領軍謝混爲揚州刺史劉裕先曾固辭不肯任揚州可使鎮丹徒領州以內事何必再議耳皮沈曰明公所議者然沈辭毅出又來問劉裕劉裕未曾出堂只見劉穆之在內皮沈曰王謐已死聖上命衆臣議立一人以代謐職輔朝政我先問劉毅劉毅所舉謝混可鎮以劉公鎮丹徒領州內事故又來問劉公何如穆之即曰劉公未出君可暫停少刻待我如廁入請相見計議必成皮沈在外停立穆之馳入內謂裕曰今朝廷使皮沈與劉毅和公議事其語不可從之言訖穆之即出同皮沈入見劉裕相見已畢裕使沈坐談皮沈曰揚州刺史王謐已死聖上命群臣議舉一人代之以輔朝政沈先諮劉毅公劉毅公議以中領軍謝混代之以明公鎮丹徒領揚州內事沈不敢自擅敬參問焉裕曰卿宜暫退驛中安置待三思商議回音與卿還京沈即出外裕召穆之入問曰此事何如穆之曰公今豈得居謙遂爲守藩之將雖劉毅孟昶諸公俱起布衣共立大業此乃一時相推故以明公爲盟主非宿定臣主分也力敵勢均終相吞噬揚州根本所系不可假人前授王謐事出權宜今若複他授便應受制事人一失于權無由可得明公功高勳重不可直置畏疑同使入朝共議衆見公至京邑朝廷必不敢越公更授他人耳裕曰卿乃吾之苟彧也於是出堂召皮沈謂曰百里縣宰苟非其人則民受其殃何況一州乎吾自入朝同議推一能者代之因此劉裕與皮沈入京師次日入朝堂聚集文武商議衆群臣見裕自詣乃不敢別議因上言曰揚州重鎮明公若不自領誰人敢當明公可自領之裕曰汝大臣命孤吾自受焉因是入朝卻說晉帝聞劉裕入朝命大臣召劉裕入見當大臣出引劉裕至金階拜於殿階之下帝賜乎身宣裕上殿問言畢劉裕奏曰臣托陛下洪威義軍之力幸滅桓玄得迎乘輿伏望陛下善保龍體以社稷爲重則天下幸甚矣帝曰朕之社稷賴卿再造今卿回朝宜輔國政衆臣奏曰今劉裕功蓋天下忠聞九州揚州之任不可付人宜授與裕帶領帝曰衆卿所議正合朕心於是帝以劉裕爲侍中車騎將軍都督中外諸軍錄尚書事帶領揚州刺史劉裕謝恩出朝複還丹徒京口與穆之同議後事四月南燕王超祀南郊有獸如鼠而赤大如馬來至壇側須臾大風晝晦羽儀帷幄皆毀裂超懼以問太史令成公綏對曰陛下信用奸佞誅戮忠良賦斂繁多事役殷重之所致也超乃黜公孫五樓等俄複用之卻說秦王興以傉檀內外多難欲因而取之乃使韋宗往觀之宗至傉檀與宗論當世之大略縱橫無窮宗退而歎曰奇才英器過於華夏明智敏識何必讀書乃今知九州之外五經之表複自有人也辭歸言於興曰涼川雖敝傉檀權譎過人未可圖也對曰劉勃勃以烏合之衆猶能破之況我舉天下之兵以加之乎宗曰不然形移勢變反覆萬端淩人者易敗戒懼者難攻傉檀之所以敗於勃勃者輕之也今我以大軍臨之彼必恐懼以求全竊觀群臣才略無傉檀比者雖以天威臨之亦未敢保其必勝也興乃不聽使其子廣平公姚弼爲將軍斂成率步騎三萬襲傉檀又使仆射齊難率騎兵三萬討勃勃弼長驅至姑臧傉檀嬰城固守見弼兵懈怠夜以奇兵大破之弼收殘兵退屯百里之外弼兵糧盡斂成縱兵擄掠傉檀又計命郡縣悉散牛羊於野勃勃聞秦兵且至計排伏兵于左林山谷自引衆退保河曲齊難不知遂縱兵野掠勃勃潛師襲難擒之及獲其將士萬三千餘人於是嶺北夷夏附於勃勃者以萬數勃勃皆置守宰而撫之秦兵敗還秦王興始悔不聽韋宗之言耳
