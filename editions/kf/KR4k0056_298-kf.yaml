body:
  text: 第二九五回孫恩聚衆寇江南話說琅玡人孫恩字靈秀世奉五鬥米道恩叔父孫泰師事錢塘杜子恭而子恭有秘術有人以舟裝載瓜遊江湖賣子恭問其人買瓜就向瓜主借刀剖瓜瓜主欲等取刀子恭曰汝只管歸去當即送還耳瓜主始搖舟而別行至嘉興忽有一尾大魚躍入舟中瓜主破魚見子恭所借之刀在魚腹中其瓜主以子恭爲神往往如此後子恭死孫恩傳得其術然狡猾有小才誑誘百姓愚者敬之爲神皆竭其財産進子女以祈福慶會稽王道子聞知泰有異術煽惑民心恐其爲亂將泰誅之孫恩逃出海濱海濱之人素聞孫泰之名及恩至衆問之孫恩以言惑衆謂其叔父孫泰蟬蛻登仙衆人信之鹹以財帛資給孫恩財因是聚恩招集亡命志欲復仇迨明年衆數十萬由此朝野騷動士民震恐盧循謂恩曰今八郡軍民回應者謂將軍能除君側之惡以解百姓之憂故來歸也火速入朝上奏數會稽王道子及其子元顯之罪請上誅之則江南士民盡命來歸孫恩從之即使人入朝上表使人人建康次早黃門引入金蠻呈上表章晉帝覽其表曰會稽王道子叨竊屍素荒廢朝政拜授之榮皆非天朝響刑之貸婪入其門毒賦年滋悠民歲廣使先帝賜一醉於崇朝飛千觴於長夜致崩于宮人之暴也猶不能避位逃身以謝於天地反私與子元顯奪政位耶既爲政宰宜進思盡忠王室何可苛刻生殺任意不爲理也今晉天下率土之濱人皆切齒故衆推臣爲首起兵請誅元顯父子也誅此國賊臣等入朝待罪闕下晉帝覽畢喝退來使與群臣商議起兵征討加會稽王司馬道子爲大將軍其子元顯爲中軍將軍領兵守衛京師安帝即位以來內外乖異石頭城以南皆荊州所據以西皆豫州所專京口及江北皆劉牢之及廣陵相高雅所致朝政所行惟三吳而矣今聞孫恩作亂入都皆爲恩有畿內郡縣處處盜賊蜂起建康士民居而震恐
