body:
  text: 第二四九回秦王以代分二部秦王堅謂文武曰代王被害其子幼沖朔方今已屬於朕吾欲遣將戍之燕鳳又進此策此事若何權翼曰朔方之地宜朔人居焉蓋朔人狡猾萬般其居不容外人若以異處之士去守彼必爲亂國不能安燕鳳之策可保久長劉庫仁字沒根乃劉武之子少豪俠有智略北人無不敬之劉衛辰乃鐵弗國人善騎射有威勇北人無不憚之若陛下以此二人統領朔方永無憂患秦王曰然於是秦王遣人以詔使唐公苻洛以鐵弗劉衛辰獨孤部劉庫仁二人分統朔方自河以東屬庫仁自河以西屬衛辰卻說唐公苻洛得詔書從秦王詔使人請劉庫仁劉衛辰二人至置酒相待拜爲左右將軍將北代之地分作二部使二人統之二人從命各分統諸部代民苻洛權執總統以居平城自此賀氏以珪依庫仁庫仁招撫離散恩信甚著奉事拓跋珪殷勤周備不以廢興易意常謂諸子曰此兒有高天下之志必能恢隆祖業汝曹當謹事之丁醜二年秦王堅用趙故將熊邈作功曹熊邈屢爲秦王堅言石氏富室器玩之盛堅以邈爲將作長史大修舟艦兵器飾以金銀頗極精巧慕容農私言於垂曰自王猛之死秦之法制日以頹靡今又重以奢侈殃將至矣大王宜結納英傑以承天意垂笑曰天下事似非爾所及時慕容紹亦私謂其兄楷曰秦恃其強大務勝不休北戍雲中南守蜀漢轉運萬里饑饉相望兵疲民困危亡近矣天意苦在必爲燕有
