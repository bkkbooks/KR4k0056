body:
  text: 第一八八回翳槐卒立什翼犍卻說代王翳槐之弟什翼犍因先被紇那來攻與翳槐俱奔投趙翳槐以什翼犍質于趙請師擊走紇那而複北代弟得歸國至此翳槐疾病召各部大人入臥內受顧托曰朕令疾篤恐未能起召卿等囑之朕弟什翼犍豐骨不凡才智高爽若亡後可立此人則社稷可安耳不幸質在於趙卿等可使人召之言訖而卒諸部大人以什翼犍在趙來未可必謀立次弟孤孤度不可乃自詣鄴見趙王虎請身爲質替兄什翼健歸國領衆趙王虎悅其仁義而俱遣之乃分國之半與弟孤也卻說什翼鍵生而奇偉寬仁大度身長八尺隆准龍顔立發垂地臥則兩乳垂席既立爲代王乃改號建國始制百官分掌衆職代王猗盧卒國內多難部落分散什翼健雄勇有智略修祖業以代人燕鳳爲長吏許謙爲郎中令制叛逆殺人奸盜之法號令明白政事清明無鞠招連逮之煩百姓安之於是東自穢貊西及破落那南距陰山北盡沙漠率皆歸服有衆數十萬人十二月卻說段遼自敗于燕趙逃入密雲山不能歸故地懼燕來攻乃遣使降于趙使人去了既而又悔複遣使降于燕燕王皝自將兵來迎段遼未及行趙王虎先得其降狀乃遣將軍麻秋率衆一萬迎之秋將行虎敕秋曰卿去受降如受敵不可輕也秋諾而去段遼探知燕趙皆來相迎乃遣人與燕謀覆趙軍於是皝遣慕容恪伏精騎於密雲山麻秋不知有謀未爲防備引衆而入被恪指揮伏騎齊出麻秋措手不及大敗而逃獲其司馬楊裕盡得其衆而還段遼既歸燕皝待以上賓之禮以裕爲郎中令後遼謀叛皝知斬之此後事也己亥五年三月庾亮與僚佐商議欲開複中原遣使上表以桓宣鎮襄陽弟懌鎮魏興與弟翼鎮江陵毛寶樊峻戍朱城又上疏欲率大衆十萬移鎮石城遣諸軍羅布江沔爲伐趙之規帝下其議丞相導請許之太尉鑒以爲資用未備不可大舉太常蔡謨議曰運有否泰道有屈伸苟不計強弱而輕動則亡不終日何功之有爲今之計莫若養威以候時時之可否系胡之強弱胡之強弱系虎之能否自石勒舉事虎倚爲牙爪百戰百勝遂定中原勒死之後虎挾嗣君而誅將相內難既平剪削外寇四海之內不失尺土以是觀之爲虎能將不能也今征西欲率大軍席捲河南虎必親率其衆來決勝負欲與之戰何如石生若欲城守何如金墉若欲阻沔水何如大江若欲拒石虎何如蘇峻石生已將關中精兵西征之戰殆不能勝也金墉險固兵數十萬衆不能拔又當是時洛陽關中皆起兵擊虎今此三處反爲其用方之於前倍半之勢也石生不能敵其半而征西乃欲當其倍愚所疑也蘇峻之強不及石虎沔水之險不及大江大江不能禦蘇峻而欲以沔水禦石虎又所疑也昔祖士雅在日曾於城北界豫置屯軍以禦其外谷熟胡至丁夫戰於外老弱獲於內多持炬火急則燒穀而走如此數年竟不獲利當是時胡惟距沔北方之於今四分之一耳士雅不能捍其一而乃欲以禦其四又所疑也然此但論征西既至之後耳尚未論道路之慮也自沔以西水急岸高魚貫溯流首尾百里若胡無宋襄之義及我而未陣擊之將如之何今王士與胡水陸異勢便習不同胡若送死則敵之有餘若棄江遠戰以我之所短擊彼之所長懼非妙勝之算計也帝覽之默然而問群臣朝議與漠皆同於是帝使人持詔止之而亮不聽乃移鎮石城卻說代王什翼犍會集諸部大人商議欲遷都於壘源問其母王氏曰吾自先世以來遷徙爲業今國家多難徒無城郭而居一旦寇來無所避之因此乃止時什翼犍初質于趙未曾婚娶之至是使人求婚于燕王燕王皝以其妹妻之由此兩國通婚結爲唇齒
