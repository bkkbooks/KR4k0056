body:
  text: 第一二二回匹磾殺太尉劉琨卻說劉琨世子劉群爲段末柸所得末柸厚禮之並許琨爲幽州刺史欲與琨襲之兄匹磾密遣人齎群書請琨爲內應使人爲匹磾邏騎所獲將其書來與匹磾匹磾以其書示琨曰吾意亦不疑公因以白公耳琨曰吾與公同盟庶雪國家之恥若兒書密達亦終不以一子之故負公而忘義也公可察之匹磾初無害公之意將聽其還屯其弟叔渾諫之曰劉琨雖無謀害之心必定決謀歸之意若聽其一面之虛詞放其遠屯決不可制矣不若留之匹磾遂留琨不與還屯會代郡太守辟閭嵩潛謀欲襲匹磾而不留琨事泄匹磾令人收劉琨縊殺之劉琨從事盧諶等聞琨被匹磾所害帥琨餘衆來依末柸末柸受之朝廷已知以匹磾尚強冀其能平河朔乃不爲琨舉哀及讓匹磾之過溫嶠聞琨被害上表稱劉琨盡忠帝室家破身亡宜加褒恤後匹磾死帝方加贈琨太尉諡曰湣於是夷狄之人俱恨匹磾初溫嶠爲劉琨奉表詣建康也其母崔氏固止之嶠絕裾而去既至屢求返命朝廷不許會琨死帝除嬌爲散騎侍郎嶠聞母亡阻亂不得奔喪固讓不拜苦請北歸詔曰今粲逆未梟請軍奉迎梓宮猶未得進嶠可以私難而不從王命耶不得已受拜爲散騎侍郎時六月帝以刁協爲尚書令協性剛悍與物多忤與侍中劉隗俱爲帝所寵任欲救時弊每崇上抑下排阻豪族爲王氏所疾諸瑣碎之政皆雲隗協所建協又使酒侵毀公卿見者皆側目
