body:
  text: 第四十一回齊王威權拒衆謀次日惠帝以三王有反正之功宜加封錫以齊王冏爲大司馬加九錫備物典策如宣景文武輔魏故事以成都王穎爲大將軍都督中外諸軍事假黃鉞錄尚書事加九錫以河間王顒爲侍中太尉以長沙王義爲撫軍大將軍以新野公歆爲王惟齊成都河間三王府各置掾屬四十人武護森列文官備員而已新野王歆說齊王冏曰竊見成都王兵權太重若有變難以制之不如早削免生後患冏曰然容徐圖謀之長沙王義說成都王穎曰齊王專政必不容親不若早圖免致後悔穎以其言問盧志志曰大王徑前濟河功無二然兩雄不俱立不如因大王太妃微疾求還定省委政齊王以收四海之心待其有罪而討之則大功可成於是穎上表稱頌齊王功德宜委以萬機乃自辭歸鄴由是穎之德譽天下皆聞齊王既執權辟劉殷軍咨祭酒曹攄爲記室江統荀晞爲參軍事張翰孫惠爲掾顧榮王豹爲主簿何勖爲中領軍董艾典樞機又封其將佐葛旟爲縣公委以心腹號曰五公卻說成都王還鄴讓九錫殊禮表論興義功臣乞運河北邸閣米以賑陽翟饑民斂祭黃橋戰士旌顯其家皆盧志之謀也由是士民之衆皆歸穎焉次早朝會帝謂齊王醊曰司馬倫謀叛大逆罪不容誅卿可明正其罪以彰法律庶使臣下不敢效尤而亂朝廷冏曰倫罪應賜死陛下宜下詔送金屑苦酒令其自盡於是惠帝使王催持詔以金屑苦酒來金塘賜倫自死催既奉命持詔來至金墉入宮見司馬倫曰臣奉聖旨持金屑苦酒請殿下自裁聖旨緊急望賜早決與臣回奏休累小臣責限不便倫大哭曰孫秀誤我孫秀誤我連道數聲執著金屑苦酒在手徘徊再四流淚滿面只得一飲而盡以巾覆面猶曰孫秀誤我言訖而死王催方始馳還京都回旨詩曰趙王司馬倫奸邪素平庸有謀誅賈後無義篡晉君不慕周公德專憑孫秀凶今日金墉死徒恨嬖人終
