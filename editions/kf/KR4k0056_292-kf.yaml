body:
  text: 第二八九回蒙遜結盟報父仇初張掖盧水胡沮渠羅仇乃匈奴沮渠王之後也世爲部帥涼王呂光以爲尚書及呂延敗死羅仇弟三河太守麴弼謂羅仇曰主上荒耋信讒今軍敗將死正是猜忌智勇之時也吾兄弟必不見容不如勒兵向西平出苕藋振臂一呼涼州不足定也羅仇曰吾家世以忠孝著於西土寧使人負我我不負人也已而光果殺羅仇及麴弼羅仇之弟子蒙遜雄傑有策略通經史收其父喪歸葬會者一萬餘人送喪蒙遜哭謂衆曰呂主無道多殺不義今欲興兵雪吾父之仇複上世之業何如衆稱萬歲蒙遜遂結盟從此起兵聚二萬人攻涼臨松郡拔之乃以兵衆屯據金山城涼王呂光聞蒙遜謀叛使呂纂將兵一萬七千擊沮渠蒙遜蒙遜破之蒙遜從兄男成亦攻建康遣使說太守段業曰呂氏政衰人無容處瓦解之形昭然在目府君奈何以蓋世之才欲立忠於垂亡之國男成等既倡大義欲屈府君擁臨涼州何如業許之男成率衆入城尊業爲涼州牧建康公業以男成爲輔國將軍委以軍國之任蒙遜率衆歸降業以爲鎮西將軍呂光命呂纂再討之不克後爲北涼時呂纂與段業相持卻說涼州太守郭黁善天文國人信之會熒惑守東井謂仆射王詳曰涼之分野將有大兵吾欲與公同舉大事何如詳從之事泄被誅摩走據東苑以叛涼王呂光大懼遣人召太原公纂回兵討之纂將還請將曰段業必躡軍後宜潛師夜發纂曰以業無雄才憑城自守若潛師夜發適足以張其勢氣耳不如告之彼以爲詐必不敢出乃遣使告業曰郭黁作亂吾今返都卿能決戰可早出城業果不敢出於是纂全師而還纂司馬楊統欲殺纂而推其從兄楊桓爲主桓怒曰吾爲呂氏臣安享其祿危不能救豈可複增其亂乎呂氏若亡吾爲弘演矣桓不從統遂走降黁呂纂兵還攻之大破之乃得入姑臧涼人張捷等招集戎夏三千人據休屠城接黁共推涼後將軍楊軌爲盟主起兵爲亂卻說晉王國寶王緒依附會稽王道子納賄窮奢不知紀極惡王恭殷仲堪勸道子裁損其兵權恭等繕甲勒兵表請北伐道子疑之來攻己請帝下詔以盛夏妨農悉使解嚴恭大怒乃遣使與仲堪謀討國寶等桓玄亦以仕不得志欲借仲堪之兵勢以作亂聞知王恭書來乃說仲堪曰惟患國寶相斃之不早耳今既執大權無不如志若發詔征君何以處之仲堪曰計將安出玄曰孝伯疾惡深至宜潛與之約興晉陽之甲以除君側之惡玄雖不肖願率荊楚豪傑荷戈先驅此桓文之勳也仲堪然之乃出外與雍州刺史郗恢內與從兄南蠻校尉殷仲覬南郡相江績謀之覬曰人臣當各守名分朝廷是非豈藩屏所得問晉陽之甲不敢預聞績亦極言之不可覬恐績及禍和解之績曰大丈夫何至以死相脅耶江仲元行年六十但未獲死所耳仲堪憚其堅正正以楊儉期代之朝廷聞之征績爲禦史中丞覬遂以疾辭位仲堪往省之曰兄病殊可憂覬曰我疾不過身死汝病乃當滅門宜深自愛勿以我爲念郗恢亦不肯從仲堪心疑未決會王恭使至仲堪乃許之恭甚喜上表罪狀國寶舉兵討之表至內外戒嚴國寶懼不知所爲遣數百人戍竹裏夜遇風雨散歸王緒說國寶殺王珣車胤以除時傑挾君以討二藩寶召車胤至不敢害更問計於珣珣曰王殷與卿素無深怨所競不過勢利之間耳國寶曰彼將曹爽於我乎珣曰是何言歟卿寧有爽之罪孝伯豈宣帝之儔耶又問計于車胤胤曰今朝廷遣軍恭必據守若京口不拔王殷奄至何以待之寶懼遂上疏解職待罪道子暗懦欲求姑息乃賜國寶死斬頭於市遣使詣恭恭乃罷兵還京口仲堪初疑不敢從聞國寶死始抗表舉兵道子以書止之仲堪乃還
