body:
  text: 第二三五回慕容垂逃降苻堅慕容垂舅蘭建知之急以告垂曰太傅慕容評密奏主上欲害明公及太宰子慕容楷明公宜先發制人但除評及安樂王其餘無能爲矣垂曰骨肉相殘而首亂于國吾不忍爲也甯避之於外耳世子令曰主上暗弱委任太傅一旦禍發疾於駭機今欲保族全身不失大義莫若逃之龍城遊辭謝罪以待主上之察感悟得還幸之大者如其不然則內撫燕民外攘群夷守險要以自保亦其次也垂曰善十二月垂見暐請畋於大陸暐許之因微服帶家小將趨龍城至邯鄲少子麟素不爲垂所愛逃回告知燕王暐暐遣精騎追之垂散騎滅迹得免世子令請給數騎襲鄴垂曰不可乃與段夫人及令寶隆農兄子楷舅蘭建及郎中令高弼俱奔秦秦王堅聞恪卒陰有圖燕之志憚垂不敢發及聞垂至甚喜令人郊迎即喚鄧羌至曰你可引數十人帶果酒先去迎接慕容垂吾隨後即來羌領命去訖秦王堅隨後即引王猛等亦出迎時慕容垂自思無投奔處聞秦王堅寬仁大度納賢下士乃故逃走入秦行至界上忽見一隊軍約有五百餘人爲首一將輕裘軟甲馬首相迎那員將忙問曰來者莫非燕中吳王乎垂答曰然也那員將忙下馬諾聲鄧羌伺候已多時垂問曰莫非鄧將軍乎羌曰然也奉主公秦王令爲大王遠涉路途鞍馬馳驅特命羌奉酒食就護請大王入國言訖軍士捧過酒食垂自思曰人言秦王寬仁愛客今果如此遠接羌進酒垂立飲了數杯上馬同行來到長安界口是日天晚前到館舍見兩邊百餘人拱手侍立門戶擊鼓相迎一將于馬前施禮曰奉主公秦王令爲大王遠涉路途特遣某灑掃驛庭以待宿歇垂下馬與其同入館舍早已安排筵宴相待酒禮殷勤垂父子飲酒至更深宿一宵次日早膳畢上馬行不數十裏遠見一簇人馬來到當中是大秦王苻堅左有王猛右有權翼慕容垂遙見早先下馬苻堅曰久聞大王高名如雷灌耳但雲山迢遙各分疆界不得長聽教誨今辱遠臨故特郊迎請到敝邑以救渴懷慕容垂見秦王堅龍章鳳姿心大喜乃上馬隨秦王入城設筵款待坐間只說閒話數問燕王起居及平日想慕之情並不談及燕中一事慕容垂待秦王開口方好談及投托一事堅只不提垂忍耐不住乃曰大王守長安今統幾郡王猛曰雖有數郡乃荒邑也糧少兵稀權且安身今晉桓溫不時興兵來侵疆界垂曰東晉據六郡八十一州民強國富猶自不知足耶權翼曰吾主公生有神異名應圖讖反不能佔據大都其他皆天地之蟊賊以霸道居之故智者不平焉苻堅曰二卿休言吾有何德而望居天位以守城池乎垂曰不然天下者非一人之天下天下人之天下惟有德者居之何況大王仁義充塞乎四海占正統而即帝位亦不分外苻堅拱手惶恐而謝曰如公所言何敢當之自此一連飲宴三日並不提起燕中事次日複宴堅舉酒向垂曰荷將軍不外光降鄙邦不勝之喜又執垂手曰天生賢傑必相與共成大功此自然之數也要常與卿共定天下然後還卿本鄉世守幽州使卿去國不失於爲之孝歸聯不失事君之忠不亦美乎慕容垂父子稱謝不已於是以慕容垂爲右將軍以金五百與置田宅每事必與議之王猛言于秦王堅曰今觀慕容垂父子勢如狼虎非可馴之物若藉以風雲將不可複製不如早除之秦王堅曰吾方收攬英雄以清四海奈何殺之且其始來吾已推誠納之矣匹夫尚不可爲況萬乘乎乃又以慕容垂爲冠軍將軍卻說梁琛爲使于秦還見太傅評曰秦人目閱軍旅聚糧陝東和協不久今吳王又往宜爲之備評曰秦王何如人曰明而善斷評曰王猛何如琛曰名不虛傳既以告燕公卿皆不然之惟皇甫真深以爲憂上疏請選將益兵以備未然燕王不聽卻說王猛謂秦王曰燕國可伐可使人去詐說報燕謝師之禮而觀其釁然後可發兵去是時秦王堅遣石越騁於燕太傅評示之以奢尚書郎高春曰越信誕而示遠乃觀釁也宜耀兵以折其謀今乃示之以奢益爲輕也評不從春遂謝病回時太后盡將國政委評貪昧不已貨賂流行官非才舉群下炁憤尚書左丞申紹上疏曰爲宜精選守宰並官省職存恤兵家使公私兩遂刪除浮靡愛惜用度賞必當功罰必當罪如此則溫猶可梟一刀可取豈特保境安民而已疏奏不從石越見燕之釁回秦秦王堅大悅初燕王許割虎牢以西賂秦以退晉兵晉兵既退不與秦王堅使人求其地燕王謂曰行人失辭有國有家者分災救患理之常也因是勿與秦王堅大怒遣王猛及梁成鄧羌三人率馬步軍五萬伐之先攻洛陽洛陽降
