body:
  text: 第一三三回趙將尹安降李矩卻說趙將尹安及宋始四軍屯洛陽乃以城降于青州刺史李矩矩使潁川太守郭默將兵入洛陽後趙王勒聞知率胡虜守將未始一軍北渡河而去於是河南之民皆相率歸矩洛陽遂空時三月裴嶷至建康呈上表及玉璽元帝大悅因問廆之行狀嶷甚稱廆之威德賢雋皆爲用之朝廷始重之帝欲留裴嶷在朝嶷曰臣少蒙國恩出入省闥若得複奉輦轂臣之至榮但以舊京淪沒山陵穿毀名臣宿將莫能雪恥獨龍驤竭忠王室故使臣萬里歸誠今臣不返必謂朝廷以其僻陋而棄之孤其響義之心使懈於討賊此臣之所深惜也故不敢從帝然之遣使趙嶷去拜廆爲安北將軍平州刺史廆受命極其歡悅五月上邽諸將謀殺晉王保保不能撫衆任人故遇害保乃司馬模之世子曾自稱體重八百斤喜睡好讀書而暗弱無斷是以及於難耳先司馬故將陳安也降晉王保保已死乃自據隴右聚衆五萬余人降于趙趙王劉曜以陳安爲泰州刺史
