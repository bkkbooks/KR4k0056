body:
  text: 第一五五回王敦舉兵謀逆叛六月王敦謀反以沈充錢鳳爲謀士鄭岳周撫爲左右先鋒統兵二十萬準備待行王敦偶發疾傳令屯駐三軍時王敦無子養兄王含之子王應爲嗣敦疾甚乃與錢鳳商議矯詔拜王應爲武衛將軍以代敦權領三軍以兄王含爲驃騎大將軍令其督戰當錢鳳謂敦曰今丞相疾甚設有不諱便當以大事付應耶敦曰非常之事非常人所能爲且應年少豈堪大事我死之後吾有三計君等宜行之莫若釋兵散衆歸身朝廷保全門戶此第一上計也退還武昌收兵自守貢獻不廢此第二中計也及吾尚存悉衆而下萬一僥倖此第三下計也鳳欲作亂乃謂其黨曰今丞相下計乃上策也汝等各宜盡忠休懷二心
