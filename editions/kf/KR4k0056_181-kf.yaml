body:
  text: 第一七八回成王卒李班即位卻說成王李雄生瘍於頭身多金瘡及病舊痕皆膿潰諸子惡而遠之獨太子班日夜侍側不脫衣冠親爲吮膿雄自料不起召建甯王壽受遺詔輔政謂壽曰卿乃朕之至親國之元忠今聯將歸托汝後事吾聞傳國以嗣嗣不肖即以德今諸子皆非鼎器故不立而立班班有仁孝可以爲君卿善事之勿負聯言言訖又謂班曰建甯王有智謀卿可舉國委之言訖而卒李班治喪訖居數日壽等扶班即位政事皆委于壽及司徒何點尚書令王懷班居中行喪禮一無所預百官備禮班舉哀發喪卻說李雄在位三十二年雄寬厚簡刑約法時海內大亂而蜀獨無事百姓殷實門不閉戶雄常無事出外行遊忽見丞相楊褒在後持矛馳馬雄怪而問之何如做作褒對曰夫統天下之重如臣所乘惡馬而持矛也急之則慮自傷緩之則懼自失故馬馳而不制也雄悟即還而不復出班既立爲後蜀成都王李雄庶子李越先已屯江陽聞雄死乃奔喪成都與其弟李期欲謀作亂成王班弟李忤竊知密告于班勸遣越還江陽免其在此爲患乃以期爲梁州刺史使往鎮庶無內變成王班以雄末葬不忍推誠待之且曰二人既爲謀卿可代吾領兵五萬出屯涪城彼必不敢爲變於是忤領兵出屯於涪李越謂期曰蜀地乃吾家天下今班嗣立你有何計策將班殺之我雖居長願讓位與汝汝意下如何期曰吾有此意久矣明早待班來殯宮朝哭父王吾與兄領兵心腹二十余人各藏利刃伏而殺之而後取其大位其計可麽越曰此計雖善恐百官不服期曰易耳誣班謀殺君父自奪大位吾欲殺之誰敢忤之二人計議已定次日平旦越期二人領了心腹二十余人各藏利刃人殯宮埋伏不一時班至望靈柩拜哭在地被李越一刀砍在地下左右欲持兵器向前被李期大喝曰不得無禮李班謀殺君父吾故殺之吾等受太后詔故殺之其餘人等都皆赦免於是衆隨宮人各散李越即出前殿聚集文武百官謂曰李班欲速得位謀殺君父吾故殺之我弟李期有仁有德今可以登基汝等群臣速行君臣之禮有不服者以班爲例言訖扶李期上坐期推讓再四方上龍座越率群臣山呼萬歲期既即位改號爲玉恒元年以兄越爲相國加大將軍李壽爲大都督皆錄尚書事卻說成帝設朝加庾亮爲征西將軍假節鉞督江荊益豫雍梁六州諸軍事亮在武昌得詔旨受征西將軍印綬節鉞重賞使人還都以殷浩爲記室參軍以褚裒爲豫章太守社又爲丹陽丞史說褚裒字季野少有簡貴之風昔譙國桓彜因見常謂之曰季野有皮裏陽秋言其外無臧否內有褒貶也時謝安亦推重之恒曰裒雖不言四時之氣備矣初裒總角謁亮亮使郭璞筮之卦成璞駭然亮曰莫非不祥乎璞曰此非人臣之卦不知少年何以得表斯祥此乃大貴之卦二十年外吾言方驗後其女爲康皇后乃拜侍中錄尚書事其卦果驗杜乂字弘理性純和美姿容有盛名于江左王羲之見面目謂曰膚如凝脂眼如點漆此神仙中人也桓彜亦曰衛玠神清杜乂形清殷浩乃陳郡長平人羨之子也褚裒陽翟人也杜乂桂陵人預之孫也此三子皆以識度清遠善談老易擅名江東而浩尤爲風流所宗故庚亮錄用而重之
