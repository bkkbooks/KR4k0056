body:
  text: 第一五回王遜怒甚冠裂卒卻說成王李雄使李驤率兵五萬來攻寧州刺史王遜已知遣將軍姚岳領軍三萬拒戰次日二軍相遇交戰不十合成軍敗走嶽催軍追至瀘水而還回見王遜遜以嶽不窮追李驤乃大怒鞭嶽怒甚冠裂而卒遜在州十四年威行殊俗士民得安於是朝廷已知其卒詔以其子王堅爲甯州刺史代領其衆
