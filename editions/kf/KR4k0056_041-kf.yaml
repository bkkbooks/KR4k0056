body:
  text: 第四十回司馬冏起兵廢趙王三月齊王司馬冏因廢賈後得權見趙王司馬倫篡位乃密召偏將軍王義入內而謂曰今司馬倫篡位吾欲起兵討倫返正車駕汝等有何高謀複安天下王義曰若舉大義可傳檄召河間王司馬顒成都王司馬穎長沙王司馬義及新野公司馬歆並匈奴左賢王劉元海令其糾率諸侯同討篡逆若諸侯領兵至闕下聲趙王司馬倫篡位之罪中外夾攻可誅其黨羽迎返惠帝正位桓文之勳矣司馬冏曰汝謀正合我意於是同乃使人持檄往各諸侯王處求各起兵討倫其檄曰賊臣孫秀諂附逆王廢帝金墉共謀篡位天地不容人神共怒公等分茅列士理合勤王共討篡逆望執鍪弧先登毋使防風後至卻說成都王穎得檄召鄴盧志入內問曰趙王倫篡位大逆今齊王傳檄諸鎮合兵討倫孤恐兵少卿意若何志曰扶順討逆百姓必不召而至宜從之於是成都王立起招軍旗遠近皆應集衆至十余萬然穎心中猶豫不敢發嬖人王某曰今殿下起兵討倫其如趙王親且強齊王疏且弱依臣之意不如助趙攻齊爲是當參軍孫詢大言曰趙王凶逆天下當共誅之何親疏強弱之有耶小人何得妄言軍國大事於是穎方發兵以應齊王冏討逆倫卻說河間王顒與齊王有隙雖傳檄書至反遣張方領兵去助司馬倫忽探事人回報齊王與成都王二處兵威大盛共有四十萬衆河間王即召張方回兵計曰今成齊二王軍盛汝莫助趙且以兵助齊王於是張方以兵五萬來應齊王是時長沙王司馬義新野公司馬歆左賢王劉元海各路兵皆到因此齊王軍威大振號稱一百萬衆俱至都下安營卻說司馬倫聞知大驚急召孫秀問之秀曰兵來將對水來土掩何須驚恐宜遣將迎之於是司馬倫遣孫輔張泓司馬雅率兵十萬拒齊王遣孫會士猗許超率兵十萬拒成都王分撥已定各去迎敵卻說張泓出陣見齊王全軍皆出兵威甚銳泓軍寡弱退走三十餘裏自相踐踏折兵四萬餘人紮住營寨謂司馬雅曰彼衆我寡戰則不勝不若乘彼勝無備往劫其營何如雅曰然吩咐一更造飯二更起行卻說齊王冏得勝回寨謂諸將議曰今日雖勝一陣亦因衆寡不敵彼必謂我得勝無備來劫我營汝等各引兵四下埋伏待吾號炮響時各引兵殺回必獲全勝各各依計埋伏去訖將次三更張泓引兵殺至寨見是空寨情知中計有伏忙退兵只聽得號炮連天伏兵盡起前後左右火把齊明照耀如白日鼓聲振地將張泓人馬圍在垓心張泓只得接戰兩下混殺直至天明看部下兵折去大半左沖右突不能得出正在危急忽司馬雅引生力兵萬人殺入重圍救得張泓回營計點殘兵僅存一萬餘人退人城中卻說成都王前鋒至黃橋正遇孫秀之子孫會與士猗等兵至兩下交戰盧志出馬與許超交鋒未五合志敵許超不住引兵退走四五裏下寨損折人馬成都王曰敵兵甚盛不如旋師盧志曰勝負乃兵家常事豈以一戰小挫而自怯哉且彼兵得勝必驕驕則必敗臣有一計明日殿下引兵攻其前臣出奇兵抄其後前後夾攻管保克敵穎從之是夜志引精兵萬人從小路抄孫會營後伏于溴水之側且說司馬倫聞會得勝遣人以節封會猗超等爲大將軍齎白金二百斤賞黃橋之功因此會猗超畢持旄軍政不一又恃勝一陣不作準備故成都王兵直至寨前而會猗之兵尚未準備聞知舉止無措衆皆潰散成都王揮軍奮擊大破之會等急退至溴水之上盧志以精兵出截兩下夾攻殺得屍如山積血若川流孫會等鼠竄入城去訖成都王傳檄齊王冏河間王顒及諸侯王會得勝之兵乘勢濟河卻說朝中聞此消息莫不欣喜有左衛將軍王輿率兵五千人入宮三部司馬爲應於內攻中書省執孫秀出斬之王輿率兵大開城門納五王及諸侯兵馬入城齊王冏帶領甲士收逆王司馬倫及執其眷屬党類並孫秀三族人等俱斬于市曹將司馬倫幽于永昌宮候旨發落於是齊王司馬冏成都王司馬穎河間王司馬顒及長沙王司馬義新野公司馬歆匈奴左賢王劉元海左衛將軍王輿等會集群臣備金輿玉輦齊詣金墉城迎接惠帝還朝重定是日惠帝車駕從端門入升殿複登大寶乃永甯元年辛亥夏四月也群臣頓首謝罪惠帝悉赦之乃宣齊王冏成都王穎河間王顒至前再三慰勞曰撥亂反正三卿之力也凡百官爲倫所拜者皆斥免台省府衛僅有存者自兵興六十余日戰鬥死者近十萬人
