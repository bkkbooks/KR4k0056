body:
  text: 第二一六回桓溫移軍駐武昌卻說慕容恪既取得中山遷其將帥土豪數千家詣荊城餘皆安堵軍令嚴明秋毫不犯卻說姚弋仲遣子襄敗冉閔之後使使來江東降晉穆帝命群臣議遣人詔以弋仲爲車騎大將軍六夷大都督以其子襄爲平北將軍督並州時桓溫先聞石氏內亂上疏請出師經略中原久不委其行溫乃使人入朝探知聞朝廷仗殷浩以抗己溫甚忿之因謂諸將曰浩之抗我吾不憚之少時吾與浩共騎劣馬我棄去浩輒取之故當出我下也又謂郗超曰浩有德有言向使作令仆足以儀刑百揆朝廷用違其才耳因此相待彌年雖有君臣之迹羈縻而已八州士衆資調殆不爲國家之用乃自收入府使人工書求出北伐穆帝降詔不許至十二月溫見詔書不從乃拜表即行率衆五萬人順流而下軍至武昌入城屯紮晉帝設朝近臣奏曰征西大將軍桓溫屢上表求出北伐見陛下不聽今引大軍十萬順流而下屯于武昌不知何意爲也穆帝大懼急問王昱求計當王昱曰可調兵守衛建康石頭二處任其所往可也殷浩亦知奏之帝曰桓溫此舉乃是疾臣位重於彼豈可以臣一人誤國家而苦天下元元也願去位避職以保社稷帝未許群臣議曰桓溫久懷不臣不若令侍中黃門以騶虞幡駐溫之軍則溫毋敢爲也紛紛朝臣議不能決當吏部尚書王彪之乃琅玡人見朝廷所決猶豫乃言於會稽王昱曰諸臣所議皆非奇策若浩去職人情離駭必有任其責者非殿下其誰乎又謂浩曰彼若抗表問罪卿爲之首欲作匹夫豈有全地耶依吾膚見自當靜以待之令相王手書爲陳成敗彼必旋師若不從則遣中詔又不從乃當以正義相裁奈何無故傯傯先自猖撅乎浩鼓掌悅曰決大事正自難頃日來使人悶今聞卿此謀意始得了會稽王昱即命撫軍司馬崧草書使人送去武昌于桓溫拆讀其書曰寇難宜平時會宜接此實爲國遠圖經略大算能弘斯會非足下而誰然異常之舉衆之所駭遊聲噂遝想足下亦少聞之苟或望風振擾一時崩散則望實泣喪社稷之事去矣吾與足下雖職有內外安社稷保國家其志一也當先思守國家而後可以圖其外區區誠衷豈可顧嫌而不盡哉桓溫讀其書中心有懼色即上書惶恐致謝乃回軍還鎮去訖上疏曰臣竊觀趙之自亂欲來厥釁而伐之由然下駐武昌以詔待行非有異危乃安社稷耳詎有外室陛下既不委臣即戎臣亦何敢攸往領衆還鎮以待罪耳穆帝得疏複遣人以諭溫以安其心壬子八年秦王苻健集群臣議乃自稱皇帝即帝位改元元始年以苻萇爲太子時健既即大位以單于及氐羌蠻非天子所宜領以授太子萇領之卻說杜洪與司馬勳既敗以兵屯宜秋城洪自以右族輕勳勳謀與衆遂殺洪自立卻說魏王冉閔聞劉顯弑其王祗于襄國乃率兵五萬來攻破襄城獲劉顯斬之遷其民於鄴趙汝陰王石琨見閔殺顯恐不能敵乃引殘衆來投降晉晉穆帝怒其祖父凶毒天下故詔斬之因此石氏遂絕於是殷浩使督統謝尚苟羨以兵進屯壽春上疏請出師許洛穆帝從之當尚書左丞孔嚴見浩與桓溫不和而欲自將北伐因言浩曰觀溫妒忌之情良可寒心不知使君將何以鎮之愚謂宜明授任以北征得專征伐蕭何守管鑰深思廉藺屈身之義平勃交歡之情必穆然無間然後可以保大定功趨附之徒皆人面獸心恐不知所感浩不從時王羲之聞殷浩出師北伐使人以書止之殷浩亦不聽史說王羲之字逸少乃司徒王導從子也極喜草隸論者稱其筆勢飄若浮雲矯若驚鴻未出任時與謝安同學常集於會稽山陰之蘭亭羲之自爲之序其文多不錄羲之性最好鵝會稽有老嫗養鵝善鳴羲之求市不得乃攜親友往觀嫗聞羲之至遂烹以待之羲之歎息彌日又山陰有道士養一好鵝羲之往觀之其鵝果好意甚悅固求市之道士曰先生肯爲寫道德經當舉鵝相贈市則不肯耳羲之欣然代寫寫道德經畢遂籠鵝而歸又在蕺山見一老嫗持六角竹扇出賣羲之討其扇著書各五字嫗有慍色羲之因謂嫗曰你但言王右軍書以易百錢必有人留嫗持扇去如其言人競買之他日嫗又持扇來求書羲之笑而卻之每自稱我書比鍾繇當抗衡比張顛草猶當雁行也曾與人書雲羲之臨池學書池水盡黑羲之書初不勝庾翼及暮年方妙嘗以章草答庾亮而翼因見深歎服因與羲之書雲吾昔有伯英章草字十紙過江亡失常歎妙迹永絕忽見足下答家兄書煥若神明賴還舊觀耳因此朝廷知名以爲右將軍時浩不聽羲之所陳引兵便行卻說謝尚苟羨二人進屯壽春時魏豫州牧張遇初以本州來降至是尚等不能撫慰反加輕慢遇怒據許昌叛降于秦由是浩軍不能進浩命羨以軍鎮下邳三月姚弋仲有子四十二人及病將危謂諸子曰石氏待吾甚厚本欲爲之盡力今已滅矣中原無主自古以來未有戎狄作天子者我死汝曹同歸于晉當執臣節無爲不義也言訖而卒長子襄代領其衆將父靈柩安葬訖率衆來擊秦以報前仇秦王健知備引軍與戰襄莫能取勝遂率衆歸晉穆帝詔襄以其衆權屯譙城襄既至譙城乃聞謝尚在壽春乃單騎渡淮來探尚尚聞其名乃命去其侍衛幅巾待之歡若平生襄本善談論由是江東人士皆重之
