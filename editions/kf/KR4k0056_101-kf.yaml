body:
  text: 第九十八回劉曜陰入攻長安卻說劉曜與麹允相持數月乃陰使趙梁率精兵三萬偷襲長安自爲後應梁得令漏夜馳至攻入外城內城中軍民鼎沸駭奔湣帝大驚奔射屬樓梁騎至龍尾坡使人放火燒晉諸營見內堅閉不出恐有埋伏亦不敢進乃勒衆退屯逍遙園中次日天明將軍麹鑒率兵二萬來救長安與曜衆遇戰於武靈兵大敗耀恃勝不爲防備與趙梁合兵而屯麹鑒敗歸麹允曰漢既勝謂我不敢再至必無準備正可襲之言訖傳令三軍盡起來劫曜營曜果不設備被允軍襲之漢軍大敗劉曜見勢頭不好引腹心棄營先逃只有一將喬志明以衆出拒戰被麹允殺之其衆潰散走去大半劉曜既走脫大難招集殘兵複歸平陽去訖
