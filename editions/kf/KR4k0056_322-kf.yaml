body:
  text: 第三一九回劉裕入峴虜在掌卻說南燕王超聞劉裕率軍來討急召群臣會議公孫五樓上言曰晉兵輕果利在速戰宜據大峴使不得入曠日延時沮其銳氣然後徐簡精騎循海而南絕其糧道輪段暉率兗州之衆緣山東下腹背擊之此上策也各命守宰依險自固校其資儲餘悉焚芟使敵無所得旬日之間可以坐制此中策也縱賊入峴出城逆戰此下策也超曰歲星居齊以天道推之不戰自克客主勢殊以人事言之彼遠卒疲弊勢不能持久奈何芟苗徙民先自蹙弱乎不如縱使入峴以精騎擊之何憂不下桂林王鎮曰陛下必以騎兵利平地者宜出峴山逆戰戰如不勝猶可退守不可使敵入峴自棄險固也超不從鎮出歎曰既不肯逆戰又不肯清野延敵入腹坐待攻圍酷似劉璋矣超聞之大怒收鎮下獄遣公孫五樓並段暉率步騎五萬出屯臨朐以拒五樓奉命以兵屯於臨朐劉裕大軍至峴將士猶豫皆不敢入裕身先催軍前進及入峴燕兵不出裕舉手指天喜形於色請將言曰公末見敵而先喜何也裕喜而謂請將曰師已過險士有必死之志餘糧棲畝人無匱乏之憂虜已入吾掌中矣吾何不喜左右曰國公神料也言訖前兵至東莞
