body:
  text: 第二七二回苻堅避難五將山卻說苻堅與中山公苻詵以兵一萬人開北門殺出重圍奔走五將山去訖西燕王沖聞秦王堅走命諸將休追發兵攻城一連攻打五日太子苻宏大驚把守不住急召韓晃商議晃曰燕兵勢大難以堅守如此長安難保不如走脫免被所擒宏曰卿言正合我心因此苻宏使韓晃爲先鋒領兵至夜開城門殺開血路而走去訖百官文武見太子苻宏奔走城中無主百僚亦各逃散至次日西燕王沖聞苻宏百官皆逃散乃引諸將文武百官入據長安大排宴會封賞功臣卻說姚萇因睿被燕兵所殺懼罪逃於西川西川豪族伊詳推其爲盟主聚得精兵三十萬人忽探事細作軍人回報西燕王沖攻陷長安秦王苻堅逃在五將山避難當伊詳言于姚萇曰此乃天滅秦也明公不可錯過今苻堅來五將山居此處又無城郭極易於攻明公火速遣將以兵圍住五將山將秦王苻堅擒來天下大定矣姚萇曰君言雖是奈秦王是我故主殺之不義伊詳曰當今之世四海鼎沸若執仁義則大事去矣苻堅肯聽王景略之言必誅慕容垂之首豈有今日之禍明公何不察之姚萇從之即喚驍騎將軍吳忠至曰你可率五萬鐵騎去五將山把秦王苻堅擒來吾與伊詳引大軍隨後接應吳忠領命即出率五萬騎前來岐山縣把五將山團團圍住秦兵大亂盡皆逃散獨秦王苻堅不走神色自若坐而待之俄而吳忠率軍打上山來苻堅不動被吳忠執之族屬皆被所擒忠始令嗚金收軍解回陝西
