body:
  text: 第一九二回劉翔代求封燕王卻說燕使劉翔至建康晉帝命黃門引見問慕容鎮軍平安劉翔對曰臣受遣之日朝服拜章未聞其苦翔因就啓爲璽求大將軍燕王章璽之事帝命群臣參博群臣朝議曰先王故事大將軍不處邊異姓不封王其實不可翔對曰自劉石構亂長江以北翦爲戎藪未聞中華公卿之胄有能摧破凶逆者也獨慕容鎮軍心存本朝屢殄強敵使石虎畏懼蹙國千里功烈如此而惜海北之地不以爲封邑何也吾非苟欲尊其所事竊惜聖朝疏忠義之國使四海無所勸慕耳尚書諸葛恢乃翔之姊夫也獨主異議以爲夷狄相攻中國之利惟名與器不可輕許乃謂翔曰假使慕容鎮軍能除石虎而複得一石虎也朝廷何賴焉翔曰婆婦猶知恤宗周之隕今晉室危險君位侔元愷曾無憂國之心慕容鎮軍枕戈待旦心恒念之而君更倡邪惑之言四海所以不一良由君輩耳因此朝命未下翔留歲餘朝議終不決會燕王複遣人上表罪庾氏兄弟又與冰書責其當國不能雪恥冰懼乃與何充奏從其請以皝爲大將軍幽州牧大單于燕王備物典策皆從殊禮以翔爲燕郡太守翔固辭不受翔疾江南土大夫以驕奢酣縱相尚嘗因宴集謂充等曰四海板蕩奄逾三世宗社爲墟生民塗炭斯乃廟堂焦慮之時忠臣畢命之秋也而諸君晏安江沱奢靡傲誕謇諤之言不聞攻伐之功不立將何以尊主濟民乎充等甚慚乃遣使持節冊命與翔偕北公卿餞之翔曰昔少康資一旅以滅有窮勾踐憑會稽以報強吳蔓草猶宜早除況寇仇乎今石虎李壽志相吞噬王師縱未能澄清北方且當從事巴蜀一旦石虎並壽而有之據形便之地以臨東南雖有智者不能善其後矣衆公卿皆無以答惟中護軍謝廣曰是吾心也是日席散各各還第次早翔趣裝同使望本國而行
