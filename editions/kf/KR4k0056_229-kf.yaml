body:
  text: 第二二六回燕王購虎屍鞭浸十一月燕王雋集百官會議徙都於鄴城百官皆言可於是遷都於鄴城至夜夢見故趙王石虎齧其臂至天明集百僚使人去發石虎墓使人掘墓不見虎屍空棺而已使人回報燕王雋以百金購其屍有人知其屍在東明觀直來報知燕王雋又使人去東明觀下掘得其屍僵而不腐呈與燕王雋數其殘暴之罪令武士鞭之三百投于漳水浸之燕王雋因是得疾悶悶不悅戊午二年二月卻說趙故將並州牧張平據新興雁門西河太原上黨上郡之地壁壘三百余夷夏十萬戶趙既亡先降燕至是又降秦燕王欲以兵攻卻又使人降燕秦王堅聞知自將兵五萬令鄧羌爲前部先鋒軍至汾上張平大驚急召養子張蠔至曰今秦王苻堅自將兵來攻我非小可之敵吾兒火速領衆禦之勿使彼臨城難以解矣蠔曰大人休憂兒即去退秦兵史說張蠔勇力矯健曳牛卻走超越高城因此勇冠三軍人莫敢近堅亦知其名因謂諸將曰張平之子張蠔勇力絕人卿若生擒得之重賞不輕則平自降羌曰主上如何長他人志氣滅自己之威風看某生執之言訖即與諸將各持兵刃出正遇張蠔就戰連鬥五十合不分勝負諸將見羌戰蠔不下各奔出陣蠔全無懼怯又戰數十合羌大喝一聲齊進諸將直奔蠔蠔撇羌來敵諸將被羌以錦綿套索抛起將蠔拖下馬來諸將擒之縛來見秦王堅堅大悅賞鄧羌赦張蠔令其歸降於是蠔降于秦王堅以蠔爲虎賁中郎將常置左右秦王堅曰吾得鄧羌張蠔二人皆萬夫之敵天下即可定也其時張平見蠔被擒亦面縛往降秦王堅命解其縛拜幹爲右將軍收軍還都八月會稽王昱欲以桓溫弟桓雲爲豫州刺史仆射王彪之曰兄居上流已割天下之半其弟複處西門兵權萃於一門非深根固蒂之宜也於是昱乃更以謝萬代之王羲之與溫箋曰謝萬才通經濟使居廊廟固是後來之秀今以之撫順荒餘則違才易務矣又遺萬書曰以君邁往不屑之韻而俯同群辟誠難爲意也然所謂通識正當隨事行藏已耳願君每與士卒之下者同甘共苦則盡善矣萬不能用卻說晉泰山太守諸葛攸集軍一萬餘人攻拔燕東郡入據武陽燕王雋聞知命大司馬慕容恪率兵五千攻之兵至武陽諸葛攸亦以兵出城兩下交戰數十合攸兵自潰被恪追兵一擊攸兵大敗不能當敵於是攸敗走還泰山恪遂渡河略地分置守宰而歸雋遂欲經營秦晉令州郡校實見一戶留一丁餘悉發爲兵欲使步卒滿一百五十萬期來春大集軍馬於各郡劉貴上書極陳百姓凋敝發兵非法必至土崩之變雋善之乃更令二五發兵以來各集鄴時燕調發繁數官司各遣使者道路旁午郡縣苦之太尉封弈奏請非軍期嚴急不得遣使其餘賦法皆責成州雋從之燕泰山太守賈堅以兵七百人屯於山莊晉荀羨引兵一萬攻之堅所將才七百餘人羨兵十倍賈堅歎曰吾自結髮志立功名而每值窮厄豈非命耶與其屈膝而生不若守節而死乃開門引兵直出羨兵四集擒之遂拔山莊羨謂堅曰先君父祖世爲晉臣奈何背本不降賈堅曰晉自棄中華非吾叛也民即無主強則托命既已事人安可改節吾束修自立涉趙立燕未嘗異志君何忽謂降乎羨怒執置雨中數日堅憤惋而卒青州刺史慕容廆遣司馬悅明以兵萬余集泰山羨與戰兵大敗燕複取山莊燕王以堅子賈活爲任城太守荀羨疾篤晉帝已知遣使征之以郗曇督徐兗以軍鎮下邳初燕吳王慕容垂娶段末柸女生子令寶段氏才高性烈自以貴姓不尊事可足渾後後銜之中常侍溫皓希旨告段氏爲巫蠱毒後後覺欲以連累垂收下廷尉考驗段氏終無撓詞故垂得免禍而段氏竟死獄中燕王雋貶垂爲平州刺史出鎮遼東垂以段氏女妹爲繼室可足渾後黜之以其妹妻垂垂不就由是益惡之出鎮遼東己未三年四月涼丞相張瓘性猜忌苛虐專以愛憎爲賞罰郎中殷郇諫之瓘曰虎生三日自能食肉不須人教也由是人情不附宋混性忠鯁瓘憚之欲殺混因廢涼王玄靚而自代之混知率壯士五百人掩入南城宣告諸公曰張瓘謀逆太后令我以兵誅之乃率兵出戰瓘亦以兵與宋混戰大敗與張琚皆自殺混既殺瓘兄弟請玄靚去王號複稱涼州牧而降晉
