body:
  text: 第六十四回司馬越執權秉政自此關中皆服於越河間王顒保長安而已東海王趙越爲太傅穎川人庾敳爲軍咨祭酒泰山人胡母輔之爲從事中郎以河南郭象爲主簿以陳留人阮修爲行軍參軍以陽夏人謝鯤爲掾數人皆尚虛玄不以世故攝其心清言放誕越以其名重故辟之八月荊州都督新城劉弘卒時天下大亂弘專督江漢威行南服事成則曰某人之功如敗則曰老夫之罪每有興廢手書輒相叮嚀款密人皆感悅爭赴之鹹曰得劉公一紙書勝於十部從事也辛冉說弘以縱橫之事弘怒斬之至是卒諡曰元
