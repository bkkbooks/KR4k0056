body:
  text: 第二三一回哀帝崩立司馬弈乙丑三年二月孝哀帝崩群臣迎其弟琅玡王司馬弈即皇帝大位改元爲太和元年卻說弈帝字延齡哀帝同母弟也初封爲琅玡王及哀帝無子大臣迎而立之在位六年後被桓溫廢爲海西公卻說燕王暐境內久旱太宰慕容恪慕容評並入朝歸政上疏曰臣以朽暗器非經國不足上諧陰陽下厘庶政臣聞王者依天建國辨方正位司必量才官惟德舉台輔之重參理三光而非其人則靈曜爲虧屍祿貽殃負乘招悔臣非安可久忝天祿宜以避賢路敢忘虞丘避嫌之美輒循兩疏知止之分謹送章綬惟垂詔許暐覽疏而謂恪評二人曰先帝所托惟在二公豈虛己謙讓以違付託之事耶恪評二人乃止燕王暐又曰吾聞洛陽乃關中之地今爲晉所戍欲煩叔父神明取之其事若何太宰慕容恪曰臣等受先帝顧托之重欲效犬馬之心久矣未得詔命今陛下旨意臣願領兵去攻洛陽以報先君顧托之恩言訖拜辭燕王即點十萬銳兵使吳王慕容垂爲先鋒殺奔洛陽而來其時洛陽守城將沈勁聞知燕兵犯境即忙使偏將軍楊欽點起城中氐兵五千人大開城門驅兵出迎時燕兵隊內有先鋒慕容垂出戰與楊欽交戰二人在陣前戰二十余合楊欽兵少如何敵得燕軍因此大敗楊欽不敢入城乃收殘兵走還江南時燕太宰恪謂諸將曰卿等常患不攻城今洛陽城高而兵弱卿勿畏也於是諸將率士卒齊力攻之乃克執沈勁來至恪招降而勁神氣奇異恪將宥之將軍慕容虔曰勁雖奇士觀其態度終不爲人用遂殺之恪略地崤函關中大震秦王堅自將屯陝城以備之燕以慕容評坐鎮金墉慕容垂鎮魯陽恪還鄴謂僚佐曰吾前平廣固不能濟辟閭今定洛陽使沈勁爲戮雖皆非本情實有愧于四海後朝廷嘉勁之忠贈東陽太守
