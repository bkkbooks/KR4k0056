body:
  text: 第三一回姚碩德舉兵伐西秦後秦王姚興遣姚碩德以兵二萬去伐西秦西秦王乾歸使將軍慕九等以兵二萬五千屯守秦軍樵采路絕秦王興聞知潛引兵一萬救之乾歸聞之亦引鐵騎數千前候秦兵會大風濃霧昏與中軍相失入於外軍被興軍殺敗而走其衆皆降於興興進軍袍罕乾歸奔金城將複西走謂諸帥曰今秦王興軍勢盛大吾兵寡弱不如早避舉兵而去庶幾得免卿等宜留此降秦以全宗族衆皆曰死生願從陛下乾歸曰今吾將寄食於人若天未亡我庶幾異日克復舊業與卿等相見今隨而死是無益也乃大哭而別乾歸乞降于南涼南涼王利鹿孤待以上賓秦兵既退南羌梁戈等使人密招乾歸乾歸將應之欲以白利鹿孤乾歸懼爲所殺乃送太子熾磐等於西平南奔袍罕遂降于秦久之熾磐亦逃歸十二月有星孛于天津元顯以星變解錄尚書事複加尚書令吏部尚書車胤以元顯驕恣白會稽王道子請禁抑之元顯問道子曰車武子屏人言及何事道子怒曰爾欲幽我不令與朝士語耶元顯出謂其從曰胤間我父子吾必殺之胤懼自殺時魏太史屢奏天文乖亂魏王珪自覽占書雲當改王易政乃下詔風勵群下以帝王繼統皆有天命不可妄幹又數變易官名欲以厭塞災異
