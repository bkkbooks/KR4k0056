body:
  text: 第一二回劉曜趙梁寇長安六月漢主聰使大司馬劉曜趙梁以兵十萬來寇長安劉曜奉命督軍使將軍趙粱寇新豐城卻說晉湣帝設朝近臣奏知帝遣衛將軍索綝領兵五萬出迎索綝得詔點軍即行卻說趙梁出戰常勝累建大功聞索綝領兵來迎有輕綝之色當長史魯徽諫曰晉之群臣自知強弱不敵將致死於我索綝若來將軍勿輕之其足智多謀武藝亦不在將軍之下宜堅壁勿戰觀彼動靜然後出奇兵勝之故兵法曰知己知彼百戰百勝耳梁大怒曰以司馬模之強吾取之如拾芥索綝小豎豈能汙吾馬蹄寶刀耶次日率輕騎數十討之曰要當獲綝而後食索綝見趙粱在陣前搦戰綝令精兵在前以箭射住陣腳急與偏將王文至曰你可同王武二人速退各引守寨之兵伏於三十裏西北屏山谷內待吾敗回彼必趕來候彼軍入穀你二人殺出截住吾複殺回兩下夾攻可擒趙梁文武二人得計退去領兵埋伏訖索綝親自披挂持戟出陣前大罵胡賊焉敢犯境粱大怒執槍殺過陣來與交鋒將次十合綝佯敗便走粱不知是計引兵趕來未上五裏之程忽聽得一聲炮響伏兵四起前有索綝攔路後有王文王武殺來殺得漢兵十去其七大敗奔潰趙梁死戰得脫而歸悔曰吾不用徽言至此何面目見漢王先命斬徽徽大怒曰將軍愚愎以取敗乃複忌人害勝猶有天地其得死於枕席乎言訖自殺後梁攻北地中弩而死冬漢王聰以子劉粲爲相國粲少有雋才自爲丞相驕奢專恣遠賢親佞嚴刻愎諫國人始惡之三年正月周勰以其父遺言因吳人之怨謀作亂使吳興功曹徐馥矯稱勰叔父周劄之命收合徒衆以討王導刁協豪傑翕然附之是月馥殺吳興太守袁琇欲奉劄爲王周劄聞知大驚以告吳興太守孔侃勰知劄意不同不敢發馥黨懼事不成乃攻馥殺之劄子周續亦聚兵應馥聞馥死亦退不發左丞相睿聞續爲亂集諸將議發兵討之王導曰今若少發兵則不足以平寇多發兵則根本空虛續族弟黃門侍郎周延忠果有智請獨使延往足以誅續何必紛紛起兵勞民乎密從之即使延去同孔侃誅逆延得命兼行至吳興郡將入府遇周續於門延逼續與俱詣府與侃相見禮畢分列而坐延指續謂侃曰府中何以置賊在座耶續即出衣中刀逼延延叱令將續格殺之因令收周勰至謂曰汝等如何謀叛累我宗族吾奉左丞相命來同孔府君誅汝勰曰非幹我事乃兄周邵命勰用徐馥之謀徐馥雖已死邵還在宅於是延引百餘人令收邵誅之延不歸家省母遂長驅而去報知左丞相睿大悅以劄爲吳興太守以延爲太子右衛率睿以周氏吳之豪望故不窮究待勰如舊矣卻說湣帝聚集文武商議中興之策群臣奏曰臣等聞單于平陽拓跋猗廬有雄兵百萬猛將千員與先帝有恩今不如封其爲王以藩屏求應可保國家無危不懼胡兵也帝曰卿等所議正合朕心於是使使詔來平陽封猗廬爲代王卻說猗廬與諸部大人商議邊庭之事聞中國湣帝有詔至封王即命左右排香案跪聽宣讀畢方知封他爲代王謝恩訖受其印綬排宴款待使人以金寶回貢晉主時賜使人回朝去訖猗廬既爲代王乃置官屬分君臣之禮時國俗寬簡人皆不畏至是代王明刑峻法以示群下諸部人多以違命得罪代主升殿複集文武謂曰今吾以法示如何故違再有違命者皆舉部戮之決不恕免群臣曰自後再不敢幹於是中外肅然無有再犯二月晉湣帝發二使以左丞相睿都督中外諸軍事以南陽王保爲相國以劉琨爲司空卻說代王聞並州從事莫舍賢乃遣人至並州見劉琨求莫舍爲長史劉琨從之莫舍不欲去琨謂曰以並州單弱吾之不材而能自存于胡羯之間者誠乃代王之力也吾傾身竭貨以長子爲質而奉之者庶幾爲朝廷雪大恥也卿欲爲忠臣奈何惜共事之小誠而亡殉國之大節平生事代王爲之腹心乃一州之所賴也於是舍遂來見猗廬猗廬甚重之常與參大計代王用法嚴苛一人犯法者舉部就誅老幼相攜而行人問何之答曰往就死無一敢逃匿者
