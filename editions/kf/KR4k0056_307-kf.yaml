body:
  text: 第三四回秦王興兵伐西涼西涼王呂隆多殺豪望人不自安魏安人焦朗使人說後秦姚碩德曰今呂氏兄弟相殘政亂民饑乘其篡奪之際取之易於反掌不可失也姚碩德以告其主秦王興興從之自以兵五萬從金城濟河直趨姑臧呂隆大懼遣呂超等以兵三萬逆戰對壘被碩德大破之呂隆走回閉城固守於是西涼公李暠河西王利鹿孤張掖公蒙遜各遣使奉表入貢于秦怕秦來攻秦王興聞涼楊桓之賢使人征之利鹿孤不敢留使桓至秦秦隴西碩德圍姑臧累月撫納夷夏分置守宰節食聚粟爲持久計呂超言于涼王呂隆曰今資儲內竭上下嗷嗷當卑辭降秦待敵去之後修政息民若蔔世未窮何慮舊業之不復若天命去矣亦可保全宗族隆乃請降于秦碩德遣人奏知秦王興興就表以呂隆爲涼州刺史秦王興受其降召碩德以兵還碩德軍令嚴整秋毫無犯祀先賢禮名士西土悅之秦王准降呂隆使呂超率騎多齎珍寶入秦朝見秦王姚興拜舞畢呈上寶物具言請降之事興大悅之就拜呂超爲都督不許還涼乃使將軍伊詳率一萬人人涼東遷呂隆入長安爲長樂公涼王隆泣告詳曰吾欲守父兄之國秦王何遷吾人長安也詳曰秦王惟恐足下在此被外國寇攻故使人朝爲官免被人欺負也呂隆不得已帶其家屬去長安姚碩德使王尚爲涼州刺史分兵與其戍守涼地自與伊詳等振旅還京去訖卻說涼州刺史王尚坐匿呂氏宮人擅殺逃人薄荷等禁止南台因而得罪涼州別駕宗敞詣闕上疏理王尚之無罪後秦王興覽其疏大悅謂黃門侍郎姚文祖曰卿知宗敞乎文祖曰與臣同裏乃西方之英俊也秦王興曰今有表理王尚辭義甚佳恐非敞之所作文祖曰宗敞昔與呂超周旋陛下可試問之秦王興因謂超曰宗敞文才何如可似誰輩超答曰敞在西土時文詞甚美可仿魏之陳徐晉之潘陸也秦王興以表示超曰涼州小地寧有此才乎超曰臣以敞余文比文未足稱多琳琅出于昆侖明珠出於海濱若必以地求人則文命大夏之棄夫姬昌東夷之擯土但當問其文彩何如耳陛下不可以區宇格物也秦王興大悅宣宗敞入內以爲尚書而赦王尚之罪因問宗敞曰今後涼王已降朕遷之于長安涼州無人鎮守吾欲以將去戍群臣之中卿以何人可堪其任敞曰後涼近夷久叛之地難以治之陛下群臣皆有文武之才宜留護京師以聽調出征討若去其守則未必能全臣舉一人可署涼州萬無一失秦王興曰卿舉何人敞曰南涼王禿發傉檀有英雄之志涼人所畏鮮卑賓服陛下可詔拜其爲涼州刺史與臣去南涼使其署之則鮮卑不敢犯境胡人來歸也秦王興從之作詔即遣宗敞來樂都拜傉檀爲涼州刺史敞奉命至樂都卻說先是宗敞之父宗燮與傉檀俱事呂光光以燮爲尚書郎僻檀爲廣武內史燮善風鑒一見傅檀因執其手曰君神爽宏拔逸氣淩雲命世之傑後必當克清世難恨吾年老不及見耳吾以子宗敞兄弟托君久後休忘今日之言宗燮已死呂隆降秦宗敞乃歸秦因秦王興問戍守涼地之才而有是命來至樂都次日人見傉檀先呈上詔書說署傉檀涼州刺史之事傉檀大悅因謂宗敞曰孤以常才謬爲汝尊先君所見稱孤孤每日自恐有累大人明鏡之鑒及添家業爾竊有懷君子不圖今日得見於卿大慰吾平生之望也敞曰大王仁侔魏祖存念先人雖朱暉眄張堪之孤叔向撫汝齊之子亦無以加也今某奉秦王之命請大王署涼州刺史大王還肯聽乎傉檀曰如何不從吾即束裝與卿同入涼州也因此傉檀辭兄利鹿孤與尚書趙誕奉王命來戍樂都自引群臣入涼州次日大會文武宴於宜德堂傉檀因仰視其堂而歎曰古人言作者不居居者不作信矣中都將孟褘進曰寬饒有言富貴無常忽輒易人此堂之建年垂百年十有二主惟信德可以安久仁義可以永固願大人勉之萬代無窮也傉檀曰非君無以聞讜言也時傉檀雖受制于姚興然車服禮章一如王者禿發傉檀乃據涼州併吞附近城堡得兵數萬乃統兵二萬攻克顯美執太守孟褘而責其不早降傉曰褘受呂氏厚恩分符守土若明公大軍甫至望旗歸附恐獲罪於執事也褘檀釋而禮之以爲左司馬褘辭曰褘爲人守城不能以保全複忝顯任於心竊有不安若蒙明公之惠使得就戮姑臧死且不朽傉檀義而遣之於是褘得全還卻說燕王慕容盛懲其父寶以懦弱失國自矜聰察多所猜忌群臣有纖芥之隙皆先事誅之人不自保初段後兄之子段璣爲反者段登辭所累乃逃奔遼西複還歸罪盛赦之使尚公主入直內殿至是作亂盛自率左右戰被璣所傷而卒中疊將軍慕容拔白太后丁氏以國家多難宜立長君時衆望在盛弟平原公慕容拔以河間公熙素得幸于丁氏而廢太子迎慕容熙入宮即位改元光始遣人以兵五千捕璣等夷其三族
