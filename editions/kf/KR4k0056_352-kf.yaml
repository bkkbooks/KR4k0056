body:
  text: 第三四九回宋公受晉之禪位卻說宋王劉裕置酒會留宴文武議謀外略太師令駱達出席上曰臣常觀天文符應晉該禪于宋不可遠征劉裕曰如何且言達曰晉義熙元年至今太白晝見經天凡七占曰太白經天人主更而異姓興義熙七年五虹見於東方占曰五虹見天子黜聖人出九年鎮星歲星太白熒惑聚於東井十三年鎮星入太微占曰鎮星入太微有立王有徙王今天命已歸大王大王宜受晉位撥兵去伐不必親行劉裕謂駱達等文武曰吾聞魏武帝有言若天命在吾吾爲周文王矣吾思此事達曰魏武帝不忍爲之世受漢祿恐人議論篡逆之名故有此語是明使其子曹丕爲天子也劉裕曰吾功德比迹魏武帝若何達曰大王輔晉絕而再興與魏大不同也魏雖功蓋天下民恨其威不懷其德其子承統差役繁重東西馳驅無有寧歲今大王累立大功恩布天下民心歸之久矣故與曹氏不同況今天心示變宋豈可逆也裕曰吾記讖雲昌明之後尚有二帝吾若受禪難逃篡逆之名末可行之也駱達知裕之意欲受禪而恐天下人議論乃即出與中書侍郎王韶之議計請晉帝左右宦者李英劉益至府謂曰今晉室天下皆是宋公再造民心都歸況天文屢應宋該受禪我衆文武共議欲立宋公劉裕爲帝宋公執讖識言昌明之後尚有二帝不肯受禪故請二公商議計策二公若從吾言富貴不輕李英劉益曰吾受劉公之恩久矣屢思報效今吾等議計若有用我之處萬死不辭韶之曰二公既有此心我衆文武議欲謀弑晉帝而立宋公劉裕爲帝君意如何英益曰列位休言且容旦日便有捷報不須盡言言訖二人遂辭人宮及至次日以鴆酒毒死晉帝詐稱發背而死瞞過百官百官舉哀停屍于白虎之殿喪事畢太史令駱達及中書侍郎王韶之謂文武曰晉室天下幾絕咸賴宋公一人功蓋天下德及萬民自古迄今雖唐虞無以過此今晉帝已晏駕理宜宋受禪汝諸文武意下如何衆皆曰宋公可當劉裕堅執不從且曰今皇帝屍肉尚未冷琅玡王德文還在吾必不從言訖親扶琅玡王德文上龍座喚文武出班山呼萬歲拜舞畢分列兩班上賀罷朝訖卻說晉恭帝諱德文晉安帝同母弟也初封琅玡王及劉裕王韶之謀戮安帝裕乃迎德文而立之在位二年禪于宋劉裕劉裕廢爲零陵王卒弑之壽三十七歲葬中陵按諡法尊賢讓善曰恭己未元熙元年七月恭帝設朝加封宋公裕爵王位裕辭不受時劉裕有受禪之意難於發言乃集朝臣宴飲從容謂文武曰昔桓玄暴篡鼎命已移我首倡大義興複晉室孤年已衰暮欲歸世矣衆臣皆曰明公盛德雖周公伊尹莫及之何可歸致也衆臣皆莫曉其意惟中庶子傅亮知之一同飲罷遂出還本鎮駱達王韶之與百官商議曰元熙元年冬黑龍西登於天易曰冬龍見天子亡社稷大人受命及聞冀州道人釋法柳告其弟子曰嵩神言江東有劉將軍是漢家苗裔當受天命吾以璧三十二鎮金一併與之劉氏蔔世之數漢建武至建安末一百九十六年該禪魏魏自黃初至鹹熙末四十六年而禪晉晉自泰始至今一百五十六年該禪于宋公揖讓咸窮於六今天垂景象宋當代晉可安排受禪之禮請晉天子詔將天下讓與宋王衆皆曰此天命已歸劉氏可奏知恭帝衆曰可至晚來見宋公時宮門已閉亮叩扉請裕出見曰臣暫且還都不久即至故來辭耳裕亦知亮意無複他言只雲還須幾人隨送亮曰須數十人足耳劉裕從之亮於是星夜來都及出忽見長星竟天亮拊髀歎曰我常不信天文今始驗矣亮至與文武官僚等及中書侍郎王韶之太史令駱達皆直入內殿來見天子奏曰伏睹宋王自征討以來功蓋天下德布四方真越古超今雖唐虞無以過此然群臣會議皆言晉褘已終伏望陛下效堯帝之道將江山社稷禪位與宋王上合天心下得民意則陛下祖宗幸甚臣等議定今乃奏知帝大驚汗流滿面半晌不能言覰百官曰朕雖不達又無罪惡爭忍以祖宗之基等閒棄之朕思桓玄之時晉氏已五天下天下重爲劉公再造所延將二十載矣今日之事本所甘心但恐後代議朕不德以天下輕易與人汝百官再宜從公議之駱達出班奏曰天文符應數十條皆言晉氣數已盡宋祚將興恭帝猶豫尚書傅亮奏曰陛下差矣昔日三皇五帝互相推遜無德讓有德次後三王各傳子孫至於桀紂無道天下伐之春秋雖霸各相吞併有賢者歸之後並入秦方歸於漢漢禪于魏魏禪于晉以此論之天下者非一人之天下乃天下人之天下也須不是陛下祖宗自傳至今陛下早決去就勿令生變司空徐羨之曰自古以來有興必有廢而有盛必有衰豈有不亡之國安有不敗之家陛下兩晉相傳以來一百餘年氣數已盡矣宜從衆請可急降詔以安衆心帝始勉應乃命尚書仆射傅亮草詔亮承旨即草詔曰朕承晉祚罹天下蕩覆幾無遺幸祖宗之靈得劉氏之力爲輔政南征北討東蕩西除而得大平今仰瞻天地俯察民心晉之氣數已盡大曆合歸於宋以前生既極神迹今生主有光輝明德以應有期歷數昭然已可知矣夫人道相繼爲賢爲能故唐堯不私於厥子而名無窮羨而慕之今命陪臣獻上玉璽追則堯典禪位於宋王無致辭焉當傅亮草詔使帝書之帝無奈秉筆遂人之言令百官齎丹詔並玉璽請宋王受之宋王不受上表謙讓表曰臣裕昨奉詔受禪陛下以垂世之詔禪無功之臣使天下人聞知肝膽碎裂不知所措昔者堯以位遜大賢巢由避迹後世稱之臣德鮮薄臣豈敢奉命請于盛世別求大賢以禮讓之則免萬世之議論也臣權納璽綬待罪闕下不勝惶怖戰慄之至帝覽表顧謂群臣曰宋王謙讓不受當如之何太尉王道鄰奏曰宋王雖辭宜再詔奉禪帝聞言又使傅亮持詔璽至宋王府宋王裕謂左右檀道濟等曰雖二次詔命孤恐天下不能逃篡逆之名道濟曰此事甚易令傅亮再捧詔璽而還卻變其命築高臺名爲受禪台卜吉日良時聚集內外公卿並四夷八方之人都至台下令恭帝親捧璽綬以禪天下于大王可以絕群謗之言也宋王裕大喜傅亮依計而行
