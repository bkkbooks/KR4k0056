body:
  text: 第二四二回文帝崩立孝武曜簡文帝有疾將危命近侍書詔召大司馬桓溫依周公居攝故事時謝安王坦之二人入內視疾帝曰朕命不蘇今遺詔與大司馬令其依周公居攝故事汝二人盡忠王室同佐吾兒謝王二人聞帝以詔遺桓溫行周公居攝事王坦之即取其詔於帝前毀之曰此事不可行若行其事則晉祚必移矣帝曰天下得來德運卿何所嫌坦之曰天下軒轅之天下陛下何得輕以與人帝始曰從卿改之坦之改詔以大司馬桓溫行諸葛武侯丞相故事把與帝觀帝觀數四訖付與王謝二人受之時桓溫既兼文武之任屢建大功加以廢立威振內外帝雖處尊位守道而已常懼廢黜大司馬長史顧悅之與簡文帝同年而發先白侍帝左右帝問悅之曰卿與朕同庚而發如何先白對曰松柏之姿經霜獨茂蒲柳之質望秋先零簡文帝大喜其對以此重之時中書侍郎郗超曰請帝急省其父帝謂曰致意尊公家國之事遂致於此由吾不能以道匡衛愧歎之深言何能諭因詠庾闡詩雲志上痛朝危忠臣哀主辱遂泣下沾禁帝雖神識恬暢而無濟世大略故謝安稱爲惠帝之流便清談差勝耳不數日簡文帝崩世百官舉哀發喪殯葬高平陵當群臣疑惑未敢立嗣次日侍中謝安聚集文武百官於朝堂而謂曰今孝文崩世宜立太子登基諸公計議如何群臣皆對曰此須待大司馬桓溫至處分我等不敢定議也當太尉王彪之正色謂衆曰父死子繼兄終弟及今天子已崩太子即位大司馬何容有異若先面諮必反爲所責矣謝安曰王武叔之言是也於是群臣莫敢逆之乃請太子司馬曜登皇帝大位群臣皆呼萬歲禮畢改元甯康以謝安爲大司馬以王彪之爲尚書令二人總攝內外共掌朝政時宮室朽壞謝安更欲營建宮室與彪之商議彪之曰強寇未滅正是休兵養士之時何可興費工力勞擾百姓耶安曰宮室不修後世謂人無能彪之曰任天下事當保國安家朝政允洽豈以修屋宇爲能耶因此不營建宮室卻說秦王苻堅以王猛功高複加都督中外諸軍事王猛不受固辭章三四上秦王堅不許曰朕方混一四海舍卿誰可委者卿之不得辭宰相猶朕之不得辭天下也於是猛爲丞相堅端拱於上百官總己於下軍國之事無不由之猛剛明清肅放黜屍素顯拔國滯勸課農桑練習軍旅官必當才刑必當罪由是國富兵強戰無不克秦國大治堅敕太子戶及長樂公丕等曰汝事王公如事我也陽平公苻融年少爲政好新奇貴苛察治也申紹數規正導以於和融雖敬之未能盡從紹出爲二北太守融屢以過失聞數致譴讓融先因不用紹言嘗坐擅起學舍爲有司所糾問紹誰可使者紹曰燕尚書郎高泰清辯有膽智可使也融使泰至長安見猛曰昔魯僖以泮宮發頌齊宣王以稷下垂聲今陽平公開建學舍乃煩有司舉劾明公懲勸如此下使無所垂罪乎猛曰是吾過也事遂釋猛因歎曰高子伯豈陽平所宜吏乎言于秦王堅堅召見問以爲治之本泰曰治本在得人得人在審舉審舉在核真未有官得其人而國家不治者也堅曰所謂辭約而理博矣以爲尚書郎固請還許之堅聞桓溫廢晉帝爲海西公謂群臣曰桓溫前敗灞上後敗於枋頭不能思愆免退以謝百姓乃更廢君以自悅六十之叟舉動如此將如四海何諺曰怒其室而作色于父者其桓溫之謂乎群臣服其論時王猛爲丞相百姓豐樂自長安至於諸州皆夾道樹槐柳二十裏一亭四十裏一驛行者取給于途工商負販者皆集於道百姓歌之曰長安大街夾道楊槐下走朱輪上有鸞棲美彥雲集誨我氓黎因是長安皆樂念之卻說秦王苻堅封其弟苻融爲冀州牧令出守其地融遂促裝停宿灞上明日欲行母后苟氏甚愛苻融不舍其別其夜私自離宮來至灞上囑子苻融出外自要保重其夕秦王堅與太史令魏延同宿前殿當魏太史延起觀天象忽後妃星昏暗因上表奏秦王口今夜天市南門屏內後妃星失明左右閣寺不見主後妃移動之象秦王堅大驚至天明入宮省問時苟太后在灞上看苻融冀州去了方回宮內左右侍候宮人始知當秦王審問即以此事啓知秦王堅曰天道與人何其不遠焉因此遂重星官時太史令張孟又奏曰臣掌司天昨夜彗起尾箕而掃東方此乃燕滅秦之象今慕容垂父子在此臣恐不利社稷請早除之秦王堅曰今天下大定誰敢有貳卿莫讒害忠良也當陽平公融上請除之堅曰朕方混一以六合爲一家視夷狄爲赤子汝宜息慮勿懷芥蒂大惟修德可禳災苟能內求諸己又何懼外患乎由是不納更以慕容暐爲尚書以慕容垂爲京兆尹慕容沖爲平陽太守冀州牧苻融聞知上疏諫之秦王不聽忽光明殿有人大呼謂苻堅曰甲申乙酉魚羊食人悲哉無複遺堅命近侍執之俄而不見堅甚疑之
