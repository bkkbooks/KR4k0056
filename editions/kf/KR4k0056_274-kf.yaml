body:
  text: 第二七一回秦遣姜讓說燕王晉劉牢之兵至鄴後燕王慕容垂已知苻丕求救于謝玄遣劉牢之以兵二萬來迎謂諸將曰今謝玄以劉牢之將兵二萬來救鄴圍若待其至前後受敵難以取勝必須以計破之乃召慕容農至曰你可領五千兵埋伏于城南六十裏內小林左山埠後待晉兵到放火燒山彼必自亂乘亂攻之又喚崔羌至曰汝可以五萬兵分佈拒住鄴城四門攻之不可放其出城又謂慕容德曰賢弟可自引一萬軍前去誘敵引晉兵過伏兵之處盡力殺回農與卿等夾攻則牢之必成擒矣計議已定諸將依計而行至第二日軍至小林山衆軍停食食訖至日晡時晉軍至大林山前衆卒兵立地報曰前面燕軍攔住去路牢之遂拍馬持槍殺奔前來見慕容德手提鋼刀殺過陣來牢之迎接相戰戰上十合慕容德詐敗便走牢之催軍去追忽聽得一連三聲炮響大林山四五處火起大林後鼓噪喧天牢之正慌山後丁零殺出與牢之交鋒戰上五合丁零敗走後軍喊起牢之急問軍人報曰後面小林山後有伏兵殺出正欲調兵拒戰前面慕容德殺回兩下夾攻驚得劉牢之舉手無措丁零又到牢之又與交鬥鬥至十合丁零又敗牢之拍馬加鞭來救後軍正遇慕容農持刀便殺過來牢之以槍去迎二人交戰戰上二十餘合牢之見晉兵被火燒死大半回頭一看只剩五百余人無心戀戰撥開軍器殺出重圍走碻磝卻說長樂公苻丕聞晉兵到與燕兵交戰乃與徐成議曰吾守此城無益不如乘晉燕交兵殺出退還再來複鄴未遲徐成曰既要還即忙收拾軍馬起行丕曰然於是苻丕使徐成爲前鋒自爲後軍大開西門領衆殺出正遇崔羌徐成接戰苻丕領兵殺出沖過重圍徐成與崔羌交戰五十餘合見苻丕離城已遠撥開軍器拍馬殺出保護荷丕望長安而逃卻說後燕王慕容垂見荷丕逃回長安傳令各處收軍自引衆官入鄴城調兵戍守各處郡邑出下榜文張挂撫慰百姓招納流散卻說秦王堅聞燕王慕容垂攻鄴將陷複宣侍郎姜讓至曰今鄴被困已久你可前去說慕容垂道我待他不薄如何忘恩失義乎看他如何讓領命曰臣自能措辭不敢辱君命讓於是來至鄴城已陷遂入見慕容垂姜讓厲色責燕王慕容垂曰秦王道與將軍風殊類別臭味不同奇將軍于一見托將軍以斷金奈何王師小敗便有異圖況秦王厚遇於君如何今日忘恩也依愚之見胡不以鄴見歸不失封侯之位以免黎庶遭其塗炭耳後燕王垂曰汝還善言達知秦王道關中之地乃吾家之基吾故取之昔蒙知遇之恩縱長樂公還國吾已報之矣薑讓見說不行即辭歸慕容農曰薑讓妄誕何不殺之而放回去後燕王垂曰兩者交兵使在其間都各吠其主任其還何必殺也因是任薑讓自回去訖卻說晉孝武帝末年嗜酒好色以爲長夜之飲以謝安女婿王國寶專利讒諛謝安惡其爲人每制抑之國寶訴于武帝反見寵倖而疏謝安安甚慚愧時武帝排宴會大臣謝安等待坐其飲武帝命江州刺史桓伊吹笛爲助樂桓伊神色無忤即吹爲一弄乃放笛奏帝曰臣於箏分乃不及笛然亦足以以韻合歌管請以箏歌合並臣有一奴名李廷善笛音妙乞旨召進帝曰卿自召進於是桓伊召李廷入內吹笛自撫箏而歌爲怨聲其歌曰爲君既不易爲臣良獨難忠信事不顯乃見有愚患周旦佐文武金滕功不刊推心輔王政二叔反流言聲節慷慨俯仰可聽謝安聞之泣沾襟乃越席而就之捋桓伊須曰使君于此不凡帝甚有愧色複親謝安而疏國寶焉卻說謝安聞劉牢之敗於鄴城謝玄染病乃奏武帝詔征謝玄收兵還鎮京口養病待瘥複進因此謝玄收軍即還京口療疾卻說慕容暐聞知慕容垂等起兵遂與諸弟計議起兵因與鮮卑之衆密結交待慕容垂兵至以爲內應事泄秦王堅大怒使韓晃領禁兵拘慕容暐父子及宗族數十人至堅謂曰吾敬汝如何而起此意慕容暐曰家國事重何論意氣堅大怒令人殺之又殺鮮卑數千人不存一個時值西燕王慕容沖與大將軍高蓋右將軍蔡文驅二十萬大兵至長安離城二十裏安營次日整頓軍馬來攻長安苻堅大怒即日將兵使韓晃爲先鋒以兵五萬出迎西燕王沖使高蓋蔡文二人出陣韓晃出馬與高蓋交鋒二人戰上三十餘合不分勝負秦王苻堅見韓晃贏不得高蓋自躍馬持槍向前夾攻高蓋西燕王沖見秦王自出戰又使蔡文出迎秦王苻堅二人接著相遇便戰上十餘合亦不分勝負西燕王沖見兩軍未分勝負急遣一千弓弩手各帶強弓硬弩出陣前對射秦兵秦王堅被西燕兵射飛矢射中滿體流血淋漓因此抵擋蔡文不住勒馬走回入城韓晃見箭如雨下亦走歸城調兵堅守各門西燕王沖見秦兵不出縱兵暴掠關中士民流散道路斷絕百里無煙秦王苻堅大怒忽左右奏道城中先有讖書古符傳賈錄載帝出五將久長得秦王堅問群臣曰此書主何吉凶群臣奏曰此書分明道使陛下走出五將山避之可免此難秦王堅謂群臣曰既如此可留太子苻宏與韓晃守長安朕自保家屬與卿殺出奔於五將山避之自是召太子苻宏至交付與韓晃曰卿可保太子同守長安吾與中山公苻詵以兵出五將山以避之卿宜盡忠休負於朕韓晃叩頭領命同太子苻宏調兵保護長安
