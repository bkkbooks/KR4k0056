body:
  text: 第十五回賈後謀害皇太后當有人進宮中來報知太后楊氏說賈後夷其三族之事楊後大怒即詣其宮責駡賈後曰無端賤人先帝不肯娶汝潑賤是吾擡舉娶汝今日得志反害絕吾家是何道理賈後亦罵曰老賤人你父謀反故法誅之如何罵我二後相罵將欲交手左右宮人急勸解之送皇太后楊氏回宮賈後忿怒不息使人密召孟觀人問曰楊駿雖死了皇太后尚存必有復仇之心欲早除之卿有何計觀曰今楊駿兄弟俱死太后無能爲大權詔命皆出娘娘之手何不矯詔徙之于之金墉城有甚難乎賈後大悅曰我草詔卿可代吾徙之於是賈後矯惠帝詔命孟觀領詔入後宮去徙皇太后孟觀領詔入後宮來楊太后謂觀曰吾無宣召汝直入來此何干觀曰奉聖上詔旨廢娘娘不許在宮命臣下徙居金墉楊後大驚曰我實無罪如何見廢觀曰聖上以娘娘不合與楊駿同叛賈後奏知一人叛逆九族皆誅聖上以娘娘與其母子之親不忍加誅是以徙居太后聞之大哭欲出金蠻親見惠帝孟觀使宮人扯住不放其行喝將乘輿至監令楊後上輿喝令衆人擁出宮門使人送至金墉後居已定孟觀始入宮回報賈後大悅以帛百疋賞之因謂觀曰卿與我啓皇上稱皇太后同楊駿謀反宣詔令其自絕不可貽患於後觀曰不須娘娘懿旨臣見聖上見可而進使其弑之於是孟觀與李肇董猛出殿奏曰今皇太后圖危社稷自絕於天下雖有無已之情臣下不敢奉詔宜早絕之免貽後患惠帝問有司如何所議當中書監張華議曰皇太后非得罪于先帝今黨其所親爲不母於聖世宜依漢廢趙太后故事稱成皇后居異宮以全始終惠帝未決有司奏曰一人造逆九族皆誅以其與聖上有母子之情免死宜廢爲庶人惠帝未及對賈後命即草詔下金墉廢楊太后爲庶人賈後又使有司啓惠帝言昨詔原楊駿妻龐氏之罪以慰皇太后之心今皇太后既廢爲庶人請以龐氏付廷尉行刑惠帝從之廷尉奉旨來金塘城押龐氏入市曹臨刑皇太后抱持號叫截發稽顙上表于賈後稱妾當請全母龐氏之命賈後不省反趨廷尉行刑賈氏之惡如此當時公卿無不歸罪于賈氏者天人之理既滅宜乎大亂之作矣卻說賈後欲干預政事乃召黃門董猛孟觀等曰吾欲總專朝政須得一能臣輔佐之方好汝等試舉之觀曰汝南文成王亮字子翼宣帝第四子也又有尚書衛瓘字伯玉極善草書人皆仰慕此二人皆先帝元老可服群臣娘娘若委用之朝政安定可使天下太平賈後聞言大喜即從其言
