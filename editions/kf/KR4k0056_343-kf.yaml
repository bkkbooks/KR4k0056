body:
  text: 第三四回魏占熒惑在東井八月魏比歲霜早雲代民多饑死太史令王亮言于魏王嗣曰按讖書魏當遷鄴可得富樂嗣以問群臣博士祭酒崔浩特進周澹曰遷都於鄴可救今年之饑非長久計也山東人以國家居沙漠之地人畜無涯號牛毛之衆今留兵守舊都分家南徙不能滿諸州地情見事露恐四方皆有輕侮之心日百姓不服水土疫死必多而舊都兵少屈丐柔然必將窺我之心朝廷隔恒絕千里之險難以赴救此則聲實俱損也今居北方山東有變則輕騎南下布護林薄之間孰能測其多少百姓望塵懾服此國家所以威制諸夏也來春草生豆麥將出兼以菜果得及秋熟則事濟矣嗣曰今倉廩已竭若來秋又饑則如之何對曰且以饑餒之戶使就食山東若來秋複饑當更圖之但方今不可遷都耳嗣悅服之嗣躬耕籍田勸課農桑明年大熟民遂當安初崔浩爲嗣講易洪範嗣因問天文術數浩占決多驗由是有龐凡國家密謀皆預之爾時熒惑不見八十余日秦大早魏太史奏魏王嗣熒惑道在匏瓜中忽亡不知所在依法當入危亡之國先爲童謠訛言然後行其禍罰魏王嗣召名儒凡數人與太史議熒惑所詣崔浩曰春秋傳說神降於莘以其至之日推知其物今熒惑之亡在庚午辛未二日之間庚午主秦辛未爲西夷熒惑其入秦乎後八十餘日果出東井留守盤遊久之乃去秦大旱昆明池竭童謠訛言國人不安間一歲而亡後秦沒其占果驗矣丙辰十二年春正月卻說秦王興病廣平公弼稱疾不朝聚兵於第興聞之怒收弼党唐盛孫玄等誅之將殺弼太子泓流涕固請赦之泓待弼如初無忿恨之色秦王興疾稍愈與群臣出朝門遊文武苑至日昏而還入西溯門前驅先到城門校尉滿聰披甲持仗閉門拒之秦王興自來門邊曰朕躬在此卿等何故閉門聰曰今已昏暗奸良莫辨有死而已門不可開秦王興領衆複回後朝門入去興知聰法令嚴明次早召聰入以爲廷尉忽聞探馬來報晉劉裕調兵屯于聚苟陂必然擾境宜遣人去迎秦王興聞知謂尚書楊佛嵩曰吳兒不自知乃有非分之意待至孟冬當使卿率輕騎焚其積聚大舉破之秦廣平公弼欲爲亂謀譖姚宣于秦王興曰臣今聞姚宣自稱言待陛下萬歲後要與太子爭位興信之只令弼執兵三萬去杏城收宣下獄命弼將兵三萬就守秦州尹昭曰廣平公與太子不平今使握強兵于外陛下一旦不諱社稷必危興不從秦王興自如華陰使太子姚泓監國興疾篤還長安姚弼党待郎尹沖謀因泓出迎興時殺之奉興幸弼第作亂太子泓竊知不迎遂皆不果興既入宮命泓錄尚書事泓奏知尹沖謀欲爲亂之事興大怒使西平公紹典禁中兵收弼第中甲仗盡入武庫興疾轉篤命禁兵侍衛宮門毋許外人出入南陽公愔即與尹沖率甲兵五千攻端門興聞變力疾監前殿使姚紹領禁兵出拒禁兵見興無事喜躍爭先攻賊愔等大敗而走興乃引紹及姚讚梁喜尹昭斂曼嵬入受遺詔輔太子泓明日卒泓與梁喜等謀秘不發喪選精甲五千捕愔等誅之乃即位稱皇帝封賞功臣
