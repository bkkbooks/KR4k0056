body:
  text: 第八十四回石勒誘王彌殺之卻說漢大將軍王彌與石勒外相親而內相忌會其將徐邈叛去彌兵漸衰聞石勒擒苟晞心甚惡之佯以書賀勒略曰公獲苟晞而用之何其神也使晞爲公左彌爲公右天下不足定也勒見書以示張賓曰王公位重而言卑其意圖我此事如何張賓曰王彌與明公外親內相忌不若乘其小衰誘而殺之不然終爲明公之患勒然之時王彌與劉瑞相持會徐邈叛去彌勢遂衰屢戰不利使人請救於勒勒未之許張賓密謂勒曰明公常恨不得殺王公之便今天以王公授我矣如何不聽於是勒命使人還乃自以軍來救王彌劉瑞乃撇王彌而與石勒交戰不五合被勒斬之以衆來見王彌彌大喜心謂勒實親己而不疑也遂排宴待之次日石勒與張賓用計以請王彌彌不之疑而詣其營勒迎飲宴酒半酣將彌執住張賓使將士推出斬之對衆數王彌之罪以並其衆盡歸石勒軍威大振卻說漢主聞石勒殺王彌及並其衆大怒欲討之陳元達曰不可勒之殺王彌必有他故況此用人之際若討之自必歸晉則天下何年可定不如加其爵秩以慰其心讓其不理以禁後令聰聽之使使加勒爲鎮東大將軍而讓勒曰卿何專害公輔有無君之心勒慚愧上表謝罪而受爵秩卻說苟晞欲謀叛被石勒殺之石勒乃引大衆掠豫州諸郡臨江而還歸屯于葛陂初石勒幼年未遂時被東贏公司馬騰賣與荏平師歡爲奴遂與母相失先是劉琨聞石勒得志乃收其母王氏並從弟石虎在府養之及聞勒威名日振四方服從乃使張儒送其母弟到葛陂來交于石勒請其歸附晉室勒母子相見悲喜交集乃厚待張儒當拆劉琨之書視之其書曰將軍用兵如神所以周流天下而無客足之地者蓋得主則爲義兵附盜竊則爲賊衆故也成敗之數有似呼吸吹之則寒噓之則溫今相授侍中領護匈奴中郎將將軍其受之勒讀畢謂張儒曰你還代拜於汝主道我本是羯人今仕於漢豈敢二心言訖以名馬珍寶厚禮並回書與儒使謝劉琨而絕之其書曰事功殊途非腐儒所知君當逞節本朝吾自夷難爲效琨得其書亦不過逼卻說石虎年十七殘忍無度勒入內白知母王氏欲除之母曰快牛爲犢多能破車汝小忍之及長弓馬熟嫻英勇莫當每屠城邑鮮有遺類然禦衆嚴而不煩莫敢犯者指授攻討所向無前由是勒遂寵用之
