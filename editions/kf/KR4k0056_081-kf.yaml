body:
  text: 第七十九回城陷懷帝被漢虜卻說漢主聰設朝謂群臣曰自輔漢將軍征南積歲不還未知勝負如何群臣奏曰前日有表來奏說大捷連得巨鹿常山江西等郡自今軍屯洛陽未曾輕進漢主曰朕欲另差一將領軍前去助輔漢將軍石勒攻洛陽誰肯代朕此行言未畢一人出班奏曰小弟願往聰視之乃其父養子劉曜也史說劉曜字永明劉元海之族子也少無父母劉元海養之爲子曜幼聰慧有奇度年八歲從元海獵於西山遇雨止樹下迅雷震樹旁人莫不顛倒曜神色自若不動元海異之曰此吾家千里駒也及長爲人性磊落宏寬與衆不群雄武過人鐵厚一寸常以鐵胎弓立射之而洞入時人號神射尤好讀書武略諳請誦常侮吳鄧而自比管毅蕭曹時人輕之莫之許也而劉聰每曰永明乃世祖魏武之流何足比數公哉嘗隱迹管涔山以琴書爲事夜閒居忽有二童人跪曰管涔王使小臣奉謁趙皇帝就獻寶劍一把與皇帝留出軍用言訖置於地再拜而去曜驚以燭照之劍長二尺光華非常赤土爲屑背上有銘雲神劍禦除衆毒曜出拜謝神人遂佩之劍隨四時而變爲五色可以出陣無不勝也當曜前去助勒漢主聰以兵五萬使耀去助石勒攻洛陽曜既得軍馬即出朝門次日領軍就行來至南地入見石勒石勒聞知出來迎接入府置酒洗塵及曜敘漢主差某同君共攻洛陽之事勒大喜曰殿下伺力南可圖矣言訖又飲酒至晚方送劉曜回營次日平明勒與曜商議分作二隊而行勒自爲前部劉曜爲後部二人長驅大兵來攻洛陽城其時乃正月漢劉曜與石勒領大兵二十萬至城下圍住晉懷帝大驚急聚文武商議使軍民上城日夜守護勒曜攻打月餘不下石勒乃請始安王劉曜到營相見以酒宴相待禮訖勒開言曰今攻洛陽不下可使人回國請添兵再來攻之必克況且今缺少糧米不如退兵殿下可去攻三台城某自打邯鄲城取二邑錢糧以資軍急待來年春暖主上軍至卻又複攻洛陽殿下主意如何曜曰君言正合我心不如分兵退攻三台邯鄲二城屯紮此計大善於是曜即使使回國起兵次日拔寨起行領軍來打邯鄲三台離城數裏安營商議攻城卻說大單于漢主聰設朝太保劉殷奏曰始安王表到奏請添兵益將攻打洛陽陛下聖意若何漢主聰問曰誰可領兵征南大將呼延晏出曰臣請行漢王曰得卿引兵而行協助二人大功必成朕甚悅來日卿可點齊軍馬糧草即便行朕旦夕望汝奏捷於是呼延曼領精兵二萬七千人來攻洛陽軍馬直至城下聞說勒二人分兵攻三台邯鄲去了晏即傳令不必安營限五日攻下洛陽如不下斬衆部長於是三軍齊心攻打晉帝大驚急使前將軍張進急領禦林軍出城迎敵張進出馬呼延晏來迎兩將於陣前鬥到四五十合不分勝負北軍曹奇忿怒揮刀縱馬直出南軍高見挺槍來迎四員將未見輸贏晉軍陣內夏洪引軍沖出北將潘仁在將台望見忙放號炮兩邊伏弩齊發中軍箭手都湧向前亂射晉軍抵擋不住忙引兵將入城自相踐踏呼延曼驅兵掩殺晉軍大敗走入城中堅閉不出晏移軍就城下寨潘仁進曰可撥兵去城邊築起土山可以下視城中虛實令軍人山上放箭守軍不能抵擋城可唾手而得也晏從之於是各寨內選生力軍人用鐵鍬土擔就城下壘土成山周圍築二十餘裏限旬日要完成如遲即斬晉軍見北軍壘土爲山皆要出戰被潘仁以弓弩手擋住要路不能前進旬日間築成土山五十座上立櫓樓分一半弓弩手於其上望城中亂射晉軍大懼皆頂遮箭牌忽一聲梆子聲矢下如雨晉軍皆蒙楮伏地城中軍人亂竄土山上呐喊而笑以爲得計晉侍中王雋奏帝曰陛下可急造發石車方可禦敵帝令雋繪成式樣鳩工連夜造成數百乘分佈各城門內候土山上雲梯排列弓弩手將放箭時命軍士撥動炮車大石從車中飛出飛擊其梯霎時間將所設雲梯打得粉碎弓弩手死者不知其數北軍號爲霹靂車也潘仁又獻一計令軍人于本營內用鐵鍬掘地道直透城中名爲掘子軍從之雋見北軍晏不來攻城奏曰北軍明不能攻臣料必穿地道而入帝曰何以禦之雋曰繞城內可掘長塹令百姓守之則地道無用也帝依其言而行之果然掘子軍至塹邊見防禦甚嚴只得退回空費了許多軍力不能得入也自是相持一月有餘城中糧盡百姓餓死過半帝曰城中糧盡百姓皆餓死了如之奈何王雋又曰前日苟晞有表奏請陛下遷都倉坦以避之懷帝曰然帝將欲徙之衆公卿猶豫不決況城中饑困人民相食百官流亡者十去九帝將行而衛從皆散又無車輿乃自步出西掖門至銅駝街爲盜所掠不得進又度支魏浚率流民數百家保河陰之峽石掠得谷麥甚多見懷帝至無食乃獻供給之貲送帝還宮時劉曜王彌石勒聞知洛陽將陷乃會兵皆至城下安營次日呼延曼見各人皆至乃集部十二萬餘人飛馬身先攻破平昌門遂放火焚其府寺司空荀藩及光祿大夫荀組皆奔轘轅去訖次日王彌見晏克平昌門乃引部下兵同來攻宣陽門時漢兵齊心並力大戰以弩箭射殺守門軍士驍勇爭先攻破宣陽門呼延晏王彌諸軍皆入城中大亂先是懷帝自知城不能守與庚瑉王雋等於洛水備舟數隻欲走長安俄而城陷呼延曼至洛水見船無數命軍士放火焚之不留一個當晉帝與庾瑉王雋聞北軍殺入帝走洛水其船已被燒毀只得走還入得宮中北軍湧入午門帝急走華林園欲出奔長安被漢兵趕入追執之押來見呼延曼其時曼入居金鸞殿傳令鳴金收軍屯於城內見衆軍押晉帝庾瑉王雋等來晏命左右監之至次日曼將後宮金寶珠玉庫藏一應收拾裝載上車傳令將懷帝大臣庾瑉王雋等盡監上車領兵還國而去其時洛陽只存虛城所有懷帝及大臣金寶盡被呼延晏搜掠而去先是呼延晏先入城始安王曜並王彌石勒兵皆未曾至晏只有一萬七千人與晉兵交戰于河南晏連勝一十二陣殺死晉兵三萬餘人及陷城只走了鎮東將軍顧榮前太子洗馬衛玠等逃入長安其餘盡被擄向左城卻說劉曜自西明門人殺太子司馬詮等士民死者三萬余人遂又遣人發掘晉帝諸陵焚其宮廟見皇后美容納之爲妃石勒乃自引兵出屯許昌卻說劉曜恨王彌不待己至自先入洛陽心甚怨之當王彌聞曜至出迎入內說曜曰洛陽天下之中山河四塞城池宮室不假營修殿下宜請皇上自平陽徙來都之曜曰天下未定洛陽四面受敵何能守也於是不用彌策命諸軍放火焚其宮殿彌見耀不用其策乃罵曰屠沽子豈有帝王之意耶由是彌與曜有隙乃自引兵東屯項關當劉瞰說彌曰將軍建不世之功又與始安王相失將何以自容不如東據本州徐觀天下之勢上可以混一四海下不失鼎峙之業彌遂從之卻說左城國漢主劉聰登朝聚集文武正問南征之事忽呼延晏領軍還國押晉懷帝庾瑉王雋等入朝拜畢漢主劉聰大喜就以晏爲鎮南大將軍晏謝恩起立一旁聰命押晉懷帝及大臣庚瑉王雋等至令放其縛賜其平身而謂曰朕父與汝先帝有恩故不加刃恕汝王在余部下爲臣何如晉帝聽見只得與臣下謝恩漢主命有司賜房宅與住使兵外監之於是晉帝不得複還聰又使使以書來南遣始安王劉曜等以車攻長安加曜爲車騎大將軍取鎮長安曜得命領軍前去攻長安
