body:
  text: 第九十五回慕容廆大霸棘城卻說慕容廆宇弈各環棘城鮮卑人其先有熊氏之苗裔世居北夷邑于紫蒙之野號曰東胡秦漢之際爲匈奴所敗分保鮮卑山因以爲號曾祖莫護跋魏初率其諸部入居遼西從司馬宣帝伐公孫氏有功拜爲率義王始建國棘城之北時燕代多冠步播冠莫護跋見而好之乃斂發襲冠諸部因呼之爲步搖其後音訛遂稱慕容或雲慕二儀之德繼三光之容乃以慕容爲氏焉始以爲姓慕容名廆恪廆幼而魁梧美姿貌雄傑有大度安北將軍張華雅有知人之鑒廆童冠時往謁之華甚款洽謂曰君至長必爲命世之器匡濟時艱者也因以所用之譬幀遣廆納之殷勤而別至元康四年廆以大棘城即帝顓頊之舊墟乃與父涉歸徙居教民以農桑法制同于上國其時鎮北將軍王浚政法不立不能存撫士民避亂來奔者往復去之聞慕容廆政事修明愛重人物故士民多來歸之廆舉其英俊隨才授任衆至十數萬威名盛遂霸棘城西戎吐谷渾乃慕容廆之庶長兄也其父慕容涉歸在時分部落一千七百家以隸之其後不料涉歸死了慕容廆嗣其大位廆既即位聚集諸部議事忽馬奴來報說禦馬出浴於河因見吐谷渾所乘之馬各相狠鬥禦馬反輸折足請大王令人醫治廆聽見其說大怒謂吐谷渾曰先公分封有別奈何不相遠離而令馬鬥吐谷渾曰馬爲畜鬥其常性也何怒於人廆轉怒曰遠別甚易當去汝於千里之外矣吐谷渾聞言曰遠別甚易恐後會爲難言訖忿氣走出外領家屬遂西行弢怒不息忽長史樓馮入內問廆曰大王何怒大公子吐谷渾今領所屬諸部西行矣廆以馬鬥之事言之樓馮曰兄弟者手足也且與人相鬥去其右手甯必勝乎夫棄兄弟而不親則天下其誰親之安可以馬鬥而疏遠至親之骨肉耶廆心悔之急曰卿可逮去追請吾兄還國於是樓馮即出追及曰大王令小臣請公子還國不可速離吐谷渾勒馬答曰先公稱蔔筮之言當有二子克昌祚留後裔我卑庶也理無並大矣今因馬爲弟所怒而別殆天所啓乎諸君若請吾還可驅我馬令東馬若東還吾當從君之請若西則不歸矣樓馮使從人擁馬東行數百步馬輒悲鳴複西走不去吐谷渾對樓馮曰我不歸耳樓馮跪下曰此殆天意非人事也於是吐谷渾策馬西行樓馮回見廆以吐谷渾之言不歸之意說知廆心愧念思兄吐谷渾謂爲阿千乃自作阿千之歌歲暮窮思常歌之悲涕不勝吐谷渾西至陰山就居其地據有西零西極白蘭數千裏戎人多附之反吐谷渾卒有子六十人長於牡延嗣雄姿魁傑羌虜諸部戎人盡皆憚之號曰此乃項羽複生吐延嗣性倜儻不群忽一日閑坐慷慨謂其左右曰大丈夫生不在中國當高光之事與韓彭吳鄧並驅中原定天下雌雄使名垂竹帛而潛處窮荒隔在殊俗雖偷觀日月獨不愧於心乎於是羌人鹹服其盲只有羌酋薑聰心疾其能每欲起害延嗣之意而延嗣性雖猜忌而自負其智不之防耳因一日飲酒大醉與從人數十出獵至陰山小谷被薑聰伏草中暗標一槍正中後心落馬身死左右從人各持兵刃搜山捕得薑聰即斬之取首級拾延嗣屍首回府見其夫人燕氏燕氏痛哭哀號終日命安葬之命將薑聰首級砍爲肉泥以飼狗時延用之子吐葉延年十歲見父被聰所害縛草爲人作薑聰之像大哭以箭射之中之則號泣不勝哀哭不中則取箭大呼罵又射之其母燕氏入後園見之如此做作哭謂葉延曰姜聰逆賊諸將已屠食之矣汝何爲如此耶吐葉延泣曰父母之仇不同天地逆賊雖死此恨難消誠知射草人不益于先仇以申罔極之志耳言訖母子相抱大哭初中國士民避亂者多依段氏其政法不立往往去之段氏兄弟專歸武勇不禮士大夫惟廆政事修明愛重人物故歸之廆以裴嶷陽草爲謀主遊邃逄羨卦抽裴開爲股肱宋該皇甫岌岌弟皇甫真又封奕封裕典機要裴嶷清方有幹略兄武爲玄兔太守卒嶷與武子開以其喪歸過謁廆廆敬禮之行將及遼西道不通嶷欲還從廆開曰寓段氏強慕容氏弱何必去此而就彼也嶷曰欲求托足之處豈可不慎擇其人汝觀諸段豈有遠略且能待國士乎慕容公修仁義有霸士之志加以國富民安今往從之高可以立功名下可以庇宗族汝何拒焉言訖複還就廆廆大悅以爲謀主初遊邃嘗避地於薊後歸廆王浚屢以手書招其兄遊暢暢欲赴之邃曰彭祖必不能久且宜盤桓以俟之暢曰彭祖忍而多疑今手書殷勤而稽留不往將累及卿且亂世宗族宜分投以冀遺種邃從之卒與王浚敗沒五月湣帝設朝群臣奏請以詔封琅邪王睿爲左丞相南陽王保爲右丞相分督陝東西諸軍去討劉聰帝從之詔曰今當掃除群凶奉迎梓宮令幽並兩州勁卒二十萬直造平陽右丞相宜率秦梁涼雍之師徑詣鄴中左丞相率所領精兵造洛陽同赴大敵克成元勳又詔睿以時進兵與乘輿會除中原琅邪王睿集僚佐商議謀臣以方平定江東未暇北伐宜推故卻之於是睿以表辭而不行乃以刁協爲丞相左長史以劉隗爲司隸隗雅習文史善伺候人意故特親愛之時主簿能遠以譬法律久廢乃上書於睿其略曰軍興以來處事不用律令用者不敢任法每輒關咨非爲政之體愚謂凡爲駁議者皆當引律令經傳不得直以情言無所依准以虧舊典若開塞隨宜權道制物此人君之所得行非臣子所宜專也睿覽之不能從
