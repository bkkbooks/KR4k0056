body:
  text: 第一八九回何充庾冰參政事七月丞相始興郡公王導卒以何充爲護軍將軍以庾冰爲中書監揚州刺史參錄尚書事卻說王導先臥病在床上書薦妹之子丹陽尹何充於帝曰何充器局方概有萬夫之望其必能總錄朝端爲老臣之副臣死之日願引充內侍則外譽唯緝而社稷則無虞矣成帝覽疏從之即以何充爲侍中使人召充至以爲侍中充謝恩領之導於是月而卒年六十四導簡素寡欲善因事就功雖五日用之益而歲計有餘輔相二世倉無儲穀衣無重帛王導既卒帝不勝哀感詔喪葬參用天子之禮諡文獻以其長子爲中書侍郎遣使征征西將軍庾亮爲丞相亮固辭不詣始以充及亮弟庾冰爲參錄尚書事冰經綸時務不舍晝夜尊禮朝賢升擢後進於是朝野翕然稱爲賢相初導輔政每從寬恕至冰頗任威刑丹陽尹殷融諫之冰曰前相之賢猶不堪其弘況如吾者哉范汪謂冰曰頃天文錯度宜盡銷禦之道冰曰玄象豈吾所測正當勤盡人事爾又察出隱實戶口無名萬餘人以充軍實冰好爲緝察近於繁細後益矯違複存寬縱疏密自由律令無所用矣是月改丞相爲司徒太尉南昌公郗鑒疾篤上疏曰臣所統錯雜率多北人遷徙新附皆有歸本之心臣宣國恩示以好惡處與田宅漸得安帖聞臣篤疾衆情駭動若當北複必啓寇心太常臣蔡謨平簡貞正素望所歸可爲徐州牧成帝覽畢問使人太尉病軀若何奏已死矣帝傷悼不已敕命葬之拭淚以蔡謨代鑒都督徐兗軍事時左衛將軍陳光上疏請伐趙帝進攻壽陽蔡謨上疏曰壽陽城堅而固又王師在路五十餘日前驅未至聲息夕聞賊河北之騎足以來赴況停舟水渚引兵造城前對堅敵後臨歸路此兵法之所誡也今光所將皆殿中精兵以國之爪牙擊寇之下邑得之則利薄而不足損敵失之則害重而反以益寇非長策也帝省之乃止
