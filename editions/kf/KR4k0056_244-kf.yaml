body:
  text: 第二四一回桓溫廢主立新君十月晉大司馬桓溫聞秦破燕遂令參軍王珣桓伊引兵乘釁而入攻壽春壽春守將袁瑾聞燕已滅恐孤不敵乃守城求救于秦秦兵未至攻陷其城執袁瑾而歸王珣桓伊分兵戍守勒兵還鎮來見桓溫稱克壽春之捷溫因益喜王珣時溫恃其才略位望陰蓄不臣之志嘗撫枕歎曰男子不能流芳百世亦當遺臭萬年時土杜晁能知人貴賤溫召問之晁曰明公勳格宇宙位極人臣溫不悅而溫意欲先立功河朔以收時望還受九錫及被枋頭之敗威名頓挫今克壽春次日聚集諸將因謂將軍郗超曰今克壽春足雪枋頭之恥乎超曰未也久之溫不悅命諸將各散因留郗超於中軍同宿問曰吾意欲立霸王之基君有何謀可指教之郗超曰明公當天下之重任今以六十之年敗于大舉不建不世之勳不足以鎮愜民望溫曰然則奈何也超口明公不爲伊霍之舉者無以立大威權鎮壓四海明公何不效伊霍故事入朝奏太后廢弈帝立會稽王昱舉行周公居攝之事則威權日長大業成矣溫曰其計大善奈弈帝守道恐招時議超曰不誣之過焉能廢立宮門重閉床第易誣言帝爲閹廢必成矣溫善之二人汁議已定次日桓溫領諸將佐帶鐵甲軍一萬離廣陵入建康於省中設宴會集公卿令郗超將甲土千余侍衛左右是日太傅與百官皆到酒及中巡溫按劍曰大者天地次者君臣所以爲治今皇帝先在藩痿疾爲閹難以奉宗廟之主吾依伊尹霍光故事廢帝爲東海王立會稽王昱爲君汝大臣意下如何群臣惶怖莫敢對過了半時方應曰太甲不明放之于桐宮昌邑有罪霍光廢之今上富於春秋未有不善請再議也溫曰豎子天下事在我我今爲之誰敢不從將謂我劍之不利也敢有阻大議者皆按軍法百官震栗忽又一人出曰周公阿沖匡扶皇家今君依霍光故事耳溫視之乃撫事將軍王彪之也溫悅之而謂曰卿言達理當彪之全無懼色其餘群臣鹹懼皆雲一聽尊命至十一月朔桓溫令郗超帶甲士五千人人太極前殿請太后出殿奏曰弈帝先居在藩夙有痿疾今聞不堪皇統難奉宗廟臣與群臣商議依伊霍故事請懿旨廢弈帝爲東海王立會稽王昱承大位太后驚曰何得此言既有痿疾爲何其美人田氏孟氏生有三男子耶桓溫曰臣竊聞朝野老少皆言三男是帝所幸嬖人相龍計好朱靈寶等所生既無此情如何相龍計好朱靈寶等參侍內寢不出宮乎太后亦惑之曰既有其事任卿主意因此溫請太后歸宮即使散騎常侍劉享以甲兵五百人入宮收帝璽綬弈帝不敢推辭即取付之與享享捧出交溫溫與群臣出迎會稽王昱人殿請上禦座溫與群臣拜舞呼萬歲禮畢稱號太宗簡文皇帝以辛未爲咸安元年桓溫又奏請弈帝爲東海王命別遷置文帝從之卻說弈帝被廢朝罷入內著白綢單衣領屬步下西堂乘犢車出宮涕零如雨群臣拜辭莫不欷歔送其就藩至十二月桓溫又奏文帝曰今廢東海王宜依漢昌邑王故事帝曰然乃改封東海王爲海西郡公時桓溫又奏曰今弈帝已廢今武陵王欷現執大兵倘有異志難以制之今幸來朝請陛下誅之文帝曰武陵王無罪何以殺之溫曰不殺恐有後變帝曰待其變而誅之溫再三奏誅武陵王文帝不聽次日下手詔曰若晉祚靈長公便宜奉行前詔如其大運去矣請避賢路溫覽之流汗變色不敢複奏矣桓溫自廢立之後威振內外文帝雖處尊位拱默而已及出朝侍中謝安見而遙拜桓溫曰謝卿何事安曰方今天下別無英雄惟明公耳曆古以來之將相未有君拜于前臣揖於後若非明公之功德震于四海豈有其敬耶今明公盛德巍巍雖伊尹周公莫可及也溫曰焉敢望此安曰人皆可以爲堯舜也由然桓溫遂悅謝安次日入朝奏文帝以謝安爲大司馬帝從之而安受職安奏帝降詔加封桓溫爲丞相入朝輔政桓溫奏曰臣本宜在朝以奉陛下奈姑孰一郡乃國之障屏今秦之方強常有窺覦之意倘若有失江南難定臣請還鎮文帝曰丞相乃朕股肱去之何依可留京師同輔朝政溫曰臣猶在外以據秦寇勝在朝廷言訖拜辭文帝即出朝門領諸將佐還姑孰百官皆送起程溫歸後以郗超爲中書侍郎凡事表奏溫常使其入朝探聽事因往來朝廷自此後溫名複振當時熒惑守太微端門逾月而海西廢至是又逆行人太微文帝甚惡之謂中書侍郎郗超曰命之修短本所不計故事無複近日事耶超曰大司馬臣溫內固社稷外恢經略非常之事臣以百口保之超以溫故朝中皆畏事之謝安嘗與左衛將軍王坦之共詣超日旰未得前坦之欲去安曰獨不能爲性命忍須臾耶壬申二年時當南郊祭祀天地文帝欲大赦天下王彪之奏曰中興以來郊祀往往有赦愚意當謂非宜何者黎庶將謂郊祀必赦至此凶愚之徒複生僥倖之心矣帝從之
