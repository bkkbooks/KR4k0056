body:
  text: 第八十二回劉曜攻模入長安卻說南陽王司馬模聞漢遣劉曜來寇長安急使牙門將趙梁以二萬人出戍長板以防漢兵梁見漢軍甚盛不敢交鋒乃以衆降於曜曜即使梁爲前鋒來攻長安司馬模聞趙梁降曜乃自以兵三萬出拒潼關與趙梁交戰模大敗走回長安於是劉曜劉粲與趙梁合兵長驅下邽城時涼州將軍北宮純見模敗歸亦引涼兵降劉曜曜以爲將共攻長安時長安倉庫虛空士卒離散司馬模恐不能守乃詣劉曜營投降被粲所殺時關西饑懂白骨蔽野士民存者百無一二劉曜等克長安使人報知漢王聰大悅使使以曜爲雍州牧封中山王命其守長安卻說南陽王模被害世子司馬保走據上邽城都尉陳安見模遇害乃率衆人上邽而歸保遂有秦州尋稱爲大司馬承制署隴右氐羌皆來從之保衆稍振矣
