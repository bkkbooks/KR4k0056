body:
  text: 第二十三回周處合兵討氐羌八月秦雍氐羌齊萬年以七萬之衆謀反大掠涇陽各州郡表奏入朝奏請發兵去討至十一月惠帝設朝近臣奏知此事惠帝問群臣曰氏羌謀反誰可去征張華奏曰禦史中丞周處勇略雙全陛下委其征討不日平靜帝曰朕正欲用此人即召周處至金階封爲建威將軍領兵五萬令其與安西將軍夏侯駿並梁王肜共合兵征討之當中書令陳准諫曰不可若用周處臣料其必敗不得生還必遭梁王之忌惠帝問曰何如被梁王之忌准曰夏侯駿與梁王皆貴戚非將師之才進不求名退不畏罪周處忠勇直果有進無援望陛下語孟觀以精兵萬人爲處前鋒使自爲主將而討之必然殄滅不然粱王肜初在朝時違法行事被周處彈劾心必懷恨於處今使其受制于梁王必使處爲前驅而不救以陷之其敗必也惠帝不聽周處只得與夏侯駿以五千兵前來北地參見梁王司馬肜肜果懷前仇謂周處曰今氐兵雄盛屢戰不分勝敗你可以本部軍爲前鋒與戰吾自以兵後應於是處別梁王出引軍出屯涇陽卻說氐羌齊萬年聞朝廷用周處爲將乃謂請酋長曰周府君有武才若專制而來不可當也若受制於人此成擒耳正論間細作回報朝廷以梁王肜與夏侯駿共周處合兵而來齊萬年曰高枕無憂矣遂以全軍迎敵
