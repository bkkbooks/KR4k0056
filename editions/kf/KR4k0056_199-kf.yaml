body:
  text: 第一九六回時擬深源如管葛癸卯二月高句麗王釗見燕軍退複還丸都備禮朝貢於燕燕王皝大悅撫以善言還其父屍留其母爲質命其歸丸都永爲高句麗王釗拜謝而去其母后數年亦還之七月晉康帝設朝詔群臣議經略中原會庾翼詔入上表命梁州刺史桓宣伐趙帝許之卻說翼在武昌數有妖怪欲移鎮樂鄉王述聞知使人與冰箋箋曰樂鄉去武昌千有餘裏數萬之衆一旦移徙與立門壁公私勞擾又江州當溯流供給力役增倍且武昌實江東鎮戍之中非但捍禦上流而已緩急赴告駿奔不難若移鎮樂鄉遠徙西陲一朝江州有虞不相救接岳方重將固當居要害之地爲內外形勢使窺窬之心不知所向昔秦忌亡胡之讖卒爲劉項之資周惡檿弧之謠而成褒姒之亂是以達人君子直道而行禳避之道皆所不取正當擇人事之勝理思社稷之長耳冰得述箋轉付庾翼移鎮之事乃止庾翼爲人沈毅喜功名不尚浮華琅玡內史桓溫字元之彜之子也尚南康公主有豪爽之風概初生未期歲太原溫嶠見之曰此兒有奇骨可使其啼及聞其音而賀彜曰真英物也此郎必大貴吾等不及也彜因嶠賞歎名之曰溫溫嶠曰果爾後將易吾姓也後溫長成豪爽姿貌奇偉面有七星少與沛國劉恢善恢嘗稱之曰溫眼如紫石棱須作蝟毛磔孫仲謀晉宣王之流亞也自此知名襲父爵爲琅玡內史與庾翼甚善上疏薦溫于康帝曰溫有英雄之才願陛下勿以常吏遇之宜寄以方藩之任必有弘濟艱難之勳也帝納之以溫爲荊州刺史時杜帢殷浩並名皆冠世翼獨弗之重也左右或問之翼曰此輩宜束之高閣俟天下太平然後徐議其任耳朝廷知浩屢下征書浩固辭不就屏居十年時人擬之管葛謝尚王述常伺其出處以卜江左興亡相與省之知浩有確然之志既退相謂曰深源不起當如蒼生何當翼請浩爲司馬朝廷詔除爲侍中安西軍司馬浩不應翼使人遺浩書曰王夷甫立名非真雖雲談道實長華兢明德君子遇會處際寧可然乎浩猶不起浩父羨爲長沙相在郡貪殘庚冰與翼書之翼報書曰殷君驕豪亦似由有佳兒弟故不令物情難之大較江東之政向煦豪強時有行法輒施之寒劣如往年偷石頭倉米數百萬斛皆是豪將軍輩而殺倉督監以塞責山遐爲余姚以爲官出豪強所藏二千戶而衆共驅之令不得安席雖前宰皆誤謬江東事去實此之由兄弟不幸橫陷此內不能拔足於風塵之外當共明目而治之荊州所統二十餘郡惟長沙最惡惡而不黜與殺監督者又何異哉時翼以滅胡取蜀爲己任亦遣使約燕涼刻期大舉康帝集群臣商榷朝議多以爲難惟冰意與之同而桓溫譙王無忌二人贊成之至是帝詔翼經略中原冀欲率衆北伐表桓宣督諸軍于丹水桓溫爲前鋒都督率衆入臨淮並發所統六州奴及車騾驢馬因此百姓嗟怨八月卻說庾翼欲移鎮襄陽恐朝廷不許又遣使奏移鎮安陸帝使人詔止之翼勿聽違詔北行至夏口複表求鎮襄陽時翼有衆四萬帝以庾翼都督證討諸軍事遣兵出鎮武昌以爲繼援征何充輔政又征褚裒爲衛將軍領中書令惟充應命褚裒以近戚畏嫌彜複督充鎮金城甲辰二年正月趙王虎宴群臣于太武殿忽有白雁數百隻集馬道之南時諸州兵集者百余萬欲南侵太史令趙覽奏曰白雁集廷宮室將空之像不宜南行虎乃臨宣武觀大閱而罷之
