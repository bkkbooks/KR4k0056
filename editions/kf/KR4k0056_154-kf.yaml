body:
  text: 第一五一回平先以衆擊陳安十月趙王劉曜佔據隴城遣將軍平先率勁騎十萬前來隴右討陳安趙軍至隴右陳安引兵迎其時安身騎高頭駿馬左手提七尺鋼刀右手執丈八蛇矛出陣平先亦身騎黃驃馬手持點鋼長槍出與陳安搏戰三合勝負未分次日二人又戰當平先與陳安一來一往無有勝敗三番四複沒有輸贏看看戰了五十合陳安以丈八矛用力刺著平先左脅被平先用手一接奪住一扯把陳安扯落下馬平先見安落馬便執其矛來刺安棄馬步走走至澗曲被平先拍馬追著斬之殺散余兵方令鳴金收軍回長安去訖其時趙王曜不撫士衆專與嬖臣飲博而陳安在隴右愛惜士卒法令嚴明今戰死故隴上作歌痛之曰隴上將士有陳安軀幹雖小腹中寬愛養士卒同心肝躡驄交馬鐵鍛鞍七尺鋼刀奮如湍丈八蛇矛左右盤十蕩十決無敢前戰始三合失蛇矛棄我躡驄竄岩幽爲我外征而懸頭西流之水東流河一去不還爭奈何平先既斬陳安回見趙王曜以隴上之人作歌言奏知曜聞之而哀傷因命樂府歌之安既死羌氐之衆皆歸降于晉晉明帝以赤亭羌酋姚弋仲爲平西將軍封平襄公使其領之八月明帝畏王敦之逼以郗鑒領兵爲外援使鎮合肥王敦忌之乃使人上表表鑒爲尚書令明帝不得已而從之詔鑒還台郗鑒既還過姑孰人見王敦敦待之飲罷與論西朝人土敦曰樂彥輔短才耳考其實豈勝蒲武秋耶鑒曰彥輔道韻平淡湣懷之廢柔而能正武秋失節之士安能擬之敦曰當時危機交迫鑒曰丈夫當死生以之敦惡其言遂入內不復出見鑒亦辭而歸歸時敦手下將士登勸敦殺鑒敦不從曰若殺鑒則失朝士心鑒始得還台次日入朝遂與明帝道王敦謀逆欲宜圖先之帝默然卻說後趙王勒遣石虎率騎步四萬擊青州郡縣多降遂進兵圍廣固廣固糧盡曹嶷出降被虎殺之得其衆三萬虎欲盡殺其衆刺史劉征曰今留征使牧民也無民焉牧征將歸耳於是虎乃留男女七百口配征使鎮廣固
