body:
  text: 第一六七回石虎率衆攻前趙八月後趙王勒使石虎率兵四萬攻趙虎軍至蒲阪趙王曜聞知自爲將領十萬餘人來迎石虎大懼而退曜催軍追及與虎交戰又大破之斬其將石瞻橫屍二百餘裏虎奔朝歌曜以衆回攻石生於金蒲石生堅閉固守不出與戰使人回國取兵來救使人去了曜見石生不出計令諸將決千金嶇引水而灌之於是滎陽野王諸城皆降襄國大震
