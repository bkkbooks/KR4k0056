body:
  text: 第一二七回石勒獻捷于劉曜卻說石勒既克平陽遣左長史王修持書獻捷於漢漢主曜大悅遣使授勒太宰進爵趙王加殊禮稱警蹕使人去訖王修亦還先王修同舍人曹平樂來漢劉曜留之爲常侍因此平樂爲漢私言於曜曰勒使王修來獻捷實窺陛下強弱俟其複命將襲乘輿今陛下宜防之時漢兵疲憊曜聽其言乃使武士追及斬王修於市探聽人回報石勒言漢斬修之故石勒大怒曰同事劉氏於人臣之職有加矣彼之基業皆孤所爲彼既得志將欲相圖趙王趙帝孤自爲之何待彼也自此勒不受僞漢之用命矣時三月禮宜祀天地南郊未曾建立元帝請群臣會議郊祀刁協等以爲宜待還洛陽祭之今且罷之司徒荀組等曰漢獻帝都許即行郊祀何必洛陽元帝從之乃立丘於建康城之南地帝觀祀之以未有北郊並地祗合祭之禮帝詔琅玡恭王宜稱皇考賀循曰禮子不敢以己爵加于父帝既而罷之四月初蓬坡塢王陳川自稱陳留太守先祖逖攻柳雍也陳川遣其將李頭助之頭力戰有功逖厚遇之頭既還每歎曰得此人爲主吾死無恨川聞之以頭背己與逖有謀將頭殺之遂大掠豫州諸郡縣祖逖大怒自將兵來擊陳川川以衆與戰被逖破之大川大敗只留一千餘人恐不能敵乃以淩儀縣使人降于石勒勒受其降拜爲將軍卻說先徐龕與劉遐共討周撫周撫被蘇峻殺敗而走徐龕部將追及斬之朝廷論功劉遐爲先徐龕居次因此徐龕大怒以泰山郡叛亦降于石勒勒受之加龕秩位一等
