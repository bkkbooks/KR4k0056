body:
  text: 第三一二回晉帝乘輿返建康乙巳正月南陽太守魯宗之起兵來襲襄陽桓蔚大懼奔走江陵劉毅等大軍至馬頭桓振恐不能守又挾帝出屯江津遣使見劉毅願割江荊二州奉送天子還京毅等不許宗之進屯紀南振留桓謙馮該守江陵自引兵五千與宗之戰大破之宗之走還而毅等亦以兵乘振出破該于豫章口謙聞知棄城走毅等大軍進入江陵執卞範之等斬之振以兵還知城已失陷其衆皆潰乃逃渦川朝廷下詔大處分悉委冠軍將軍劉毅所領大赦改元惟桓氏不赦以桓沖靖忠王室特宥其孫胤徙新安以宗之爲雍州刺史毛璩爲征西將軍統梁益等軍以弟瑾爲梁州刺史瑗爲甯州刺史獨桓氏及何澹之等不赦桓謙澹之皆奔降秦二月留台百官備鑾駕迎帝于江陵劉毅劉道規二人握兵屯夏口以備諸桓使何無忌保帝東還帝至建康百官詣闕待罪詔令複職尚書殷仲文以朝廷音樂未備言于劉裕請治之裕曰今日不暇給且性所不解仲文曰好之自解裕曰正以解則好之故不習耳以琅玡王德文爲大司馬武陵王遵爲太保劉裕爲侍中車騎將軍都督中外諸軍事加裕尚書事裕固辭不受而請歸藩鎮
