body:
  text: 第七十四回坦延詐降敗劉聰八月漢劉聰之兵將至洛陽晉將軍曹武引兵拒之劉聰自出馬與武交戰未經三合武兵大敗各散曹武棄衆逃潰乃單騎走還洛陽漢軍長驅至攻洛陽劉聰連勝數陣怠不設備時弘農太守坦延以兵五千拒聰恐寡不敵衆乃設計詐降於聰聰以爲實至次夜以牛酒勞軍軍士皆醉歇息半夜坦延乃使其衆散往各營放火大叫晉兵全隊在此漢軍醉中見火光沖天各持刀自相殘殺及至天明聰軍死其大半坦延以兵擊殺漢軍大敗而逃退二十裏屯住招集殘軍至十月以其衆來攻洛陽屯軍於西明門衛將軍北宮純謂諸將士曰敵衆我寡難於拒戰今彼遠至有勞無逸宜乘其勞未定而擊之可以取勝衆領諾至夜北宮純親自率勇士三千人攻漢壁時漢兵初至行路辛苦聞晉兵至皆自奔潰不敢當鋒漢將軍呼延顥連忙跨馬出拒敵被北宮純馳至大喝一聲休走掄刀當頭便砍呼延顥竟死於非命劉聰見晉兵甚盛乃收衆屯洛水計點諸將始知呼延顥被殺大司空呼延翼亦爲晉兵所殺劉聰勢窮連忙遣使回國求救兵漢主淵欲發兵前來當宣于修之上言曰歲在辛未乃克洛陽今晉氣猶盛大軍不歸必敗不如召還漢主淵曰然於是遣人乃召楚王劉聰回國聰聞召還軍乃以衆歸平陽使王彌以軍出軒轅關流民之在潁川襄城汝南南阻河南者數萬家素爲居民所苦皆殺長史以應王彌庚午四年漢烈宗劉聰光興元年正月琅邪王司馬睿以周圯有三定江南之功拜圯爲吳興太守圯奉命受職漢主淵又遣曹嶷爲將寇東平琅邪又使劉靈寇幽州四月漢劉靈以二萬軍來寇幽州王浚急忙點軍分二隊埋伏險津兩畔靈兵直過險津被伏兵出截正欲交鋒浚大軍又至當三下夾攻靈死於亂軍之中殺散餘兵俱各走還
