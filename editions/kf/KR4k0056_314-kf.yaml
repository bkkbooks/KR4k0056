body:
  text: 第三一一回馮遷抽刀誅桓玄卻說劉毅何無忌劉道規既破湓口率衆自潯陽西追與桓玄遇于崢嶸洲毅等兵不滿萬而玄戰士數萬毅憚之曰玄戰士還有五七萬吾衆不滿九千人何以爲敵不如暫退道規曰不可彼衆我寡強弱異勢今若不進必爲所乘雖至潯陽豈能自固夫決機兩陣將雄者克不在衆也因麾衆先進毅等從之玄常漾舸於舫側以備敗走由是衆莫有鬥志毅等乘風縱火盡爭先與玄交戰玄衆大潰而走玄複挾帝單舸西走留永安何皇后及王皇后于巴陵殷仲文因叛玄奉二後之懿旨還建康玄與帝入江陵欲奔漢中而人情垂沮乃與心腹百余人夜出更相殺害僅得至船左右奔散去了荊州別駕王康産見玄走了奉帝入南郡府舍居住玄乃自奔走出離南郡卻說益州刺史毛璩因弟毛璉死乃使參軍費恬謂從孫佑之曰聞君令兄修之爲桓玄屯騎校尉今桓玄與劉毅交戰不利走南郡必從此過吾料桓玄不復再興不如迎玄說之入蜀請君令兄收之回益州同守故邑以圖大事君意如何佑之曰公策正合我意言訖二人前來至玄舟船接玄玄乃大喜遂問二人姓名二人未及答應當屯軍校尉毛修之進前認得二人是其弟及參軍急道曰此二人一是小將舍弟佑之一是家叔參軍費恬聞大王至故來接耳桓玄聽畢以二人爲將而問曰吾欲去漢中避兵災以圖興複汝倆有何計策可以教也佑之費恬欲說修之回益州乃進言曰陛下欲圖興複不如往蜀蜀外有崇山之固內有磐石之靠進可兼併天下退可鼎足而立足可以拒劉裕之兵也修之亦說曰蜀地乃興王之所昔漢帝亦從此興起陛下可速行玄聽其說自可與衆同行行至益州界首佑之費恬密與修之言曰我二人迎玄者爲脫公也今桓玄地失兵潰不久必亡我三人莫若引部下之兵走回益州別圖大事倘若延遲則禍至五日矣修之曰吾有此意久矣今已至此安敢不逃乎言罷三人各引部下兵連夜走回益州去見毛璩及至次日衆軍報知桓玄玄乃大驚悶悶不悅卻說益州督護將軍馮遷見玄敗禍延及己乃引部下之兵入營抽刀而前欲殺桓玄玄急忙拔頭上玉簪與之遷不受玄曰汝乃何人耶敢殺天子遷應之曰欲殺天子之賊耳遂斬之時玄年三十六自篡逆至敗時止八月耳於是馮遷割桓玄之首級令人傳至建康見劉裕裕大喜賞賜來人傳令將首級以示四門是時尚書王暇聞玄劫天子在江陵乃率百官至江陵複立晉帝于江陵毅等既戰勝以爲大事已定不急迫躡玄死一句諸軍猶未至桓謙及振竄匿聞玄死乃複出聚衆數萬襲江陵陷之殺王康産見帝與百官在殿意欲行弑桓謙曰劉裕之亂豈帝所爲若殺之吾何所容不若禁之乃拜而欲出爲玄舉哀追謐桓玄率群臣奉璽綬於帝侍禦左右皆振腹心謙振聞無忌道規等兵複至乃率衆出拒何無忌劉道規二人進兵來攻謙振於馬頭坡兩下交鋒謙兵驚潰被無忌大破之無忌又趨江陵道規曰兵法屈伸有時諸桓世居西楚群下皆爲竭力振勇冠三軍難與交鋒且可息兵養銳徐以計策縻之不憂不克無忌不從自以兵出迎戰於瀘溪無忌等大敗退還潯陽聚糧繕船未嘗無備故何無忌雖敗退猶賴劉敬宣以複振遂進克至夏口桓振遣馮該守東岸孟山圖據魯山城桓仙客守偃月壘衆合萬餘水陸相援等與無忌分兵夜擊悉攻破之生擒山圖仙客馮該率殘兵奔走石頭城去訖
