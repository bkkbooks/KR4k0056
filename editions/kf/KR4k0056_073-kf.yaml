body:
  text: 第七十一回王彌集衆寇洛陽五月漢主淵聞勒彌敗回複遣王彌引兵二萬寇洛陽王彌得令收集亡散兵複大振分遣諸將攻陷郡縣遂入許昌屯紮卻說涼州刺史張軌乃安定烏氐人漢趙王張耳十七世孫聞漢王遣王彌入寇洛陽乃使督護北宮純將三萬人入衛京師時王彌入軒轅關與北宮純軍會戰于伊水北宮純敗走王彌引兵遂至洛陽懷帝大驚急聚文武商議群臣皆曰宜命司徒親督諸軍可退彌兵於是懷帝以王衍爲都督督諸軍出戰時王衍即出殿點集三軍未及出城王彌之兵攻城放火燒建春門北宮純自伊水一敗乃募勇士五百人繼後突殺王彌後陣城中王衍望見彌後軍自亂亦引軍使左衛將軍王秉爲前鋒殺出城來兩下夾攻彌兵大敗望風遠竄王秉以軍追至七裏澗又殺了一陣彌兵無心戀戰大敗而走奔平陽不敢歸國時北宮純亦引兵還洛陽漢王淵聞彌敗羞不敢歸侍中效迎且曰勝敗乃兵家常事卿有何恥孤親行將軍之館拂席洗爵敬待將軍如何逗留於是王彌入見甚慚愧漢王淵乃拜彌爲司隸校尉卻說王衍得張軌遣督護北宮純以兵來解洛陽之圍方殺敗王彌乃入奏朝廷懷帝遣使持詔去西涼封張軌爲西平郡公軌辭不受時州郡之使無有至者軌獨貢獻不絕因是朝廷賞之七月漢王淵與群僚商議遷都于蒲子城中平陽漁人在汾水打魚拾得玉璽一顆獻與漢王劉淵淵大悅重賞漁人以爲祥瑞乃集百官即皇帝大位國號大漢改元永鳳元年以其子劉聰爲大將軍總領諸軍以族子劉曜爲龍驤大將軍故北兵威振單于遣石勒與劉靈寇魏汲頓丘三郡石勒劉靈率衆來寇三郡百姓望風降附者五十餘壘勒皆假壘主將軍都尉印綬檢其強壯五萬爲軍士其老弱者安堵如故卻說蜀成尚書令楊褒卒成主李雄深痛惜之楊褒好直言成主雄初得蜀用度不足諸將有以金銀得官者褒諫曰陛下設官爵當網羅天下豪傑何有以官賣金耶雄謝之由此天下知名耳永嘉己巳三年正月朔熒惑犯紫微漢太史令宣于修之以禳變言于漢王淵曰今歲元口熒惑犯紫微應不出二年必克洛陽今蒲子崎嶇難以久安平陽氣象方昌請陛下徙而都之淵即從其請領百官遷都平陽城三月晉帝詔以山簡都督荊襄等州諸軍事簡乃山濤之子也嗜酒不恤政事初荊州寇盜不禁詔起劉弘子劉璠爲順陽內史江漢間翕然歸之簡恨之使人上表稱璠深得衆心恐百姓劫以爲主爲亂不淺於是朝廷又詔征璠爲越騎校尉南州由是遂亂父老莫不追思劉弘
