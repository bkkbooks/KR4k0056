body:
  text: 第三二回燕王以兵拒劉裕六月超聞裕至東莞超先遣五樓及段暉等將步騎五萬屯臨朐聞晉兵入峴超自將步騎四萬前去接應點羸弱卒守廣固自選精兵前來先使人與廣甯王賀刺盧五樓言曰卿戮力據臨朐臨朐去城四十裏有巨蔑水卿宜自據上流休被晉人占之五樓聞言即出選精兵五萬與賀刺盧來占臨朐拒蔑水之北至而爲龍驤將軍孟苻先至所保五樓乃退晉劉裕領大軍行至臨朐傳令軍中分車爲兩翼四十餘萬出兵方軌徐行車張幰禦者執矟以騎爲遊軍軍令嚴肅將及近城五樓率兵占往要路劉裕即命兗州刺史劉藩並州刺史劉道鄰等出陣二將領命劉裕即便令中軍金鼓旗齊鳴發三通擂將臺上紅旗招颭二將從門旗下飛馬出陣兩軍一齊呐喊二將兜佐戰馬橫刀厲聲大叫無禮羌賊悖逆狂徒天兵到此尚不投降直待骨肉爲泥悔之何及燕兵陣中先鋒段暉拍馬出陣更不打話舞狼牙棒直取劉藩兩馬相交軍器並舉一個摟頭使棍便打一個繞頸將刀去砍一來一往一番一覆四條臂膊交加八隻馬蹄繚亂鬥到二十余合劉藩便賣個破綻放段暉打將入來卻躲個空手起刀落連盔帶頂正中天靈段暉翻身落馬而死門旗影裏劉道鄰見劉藩得了頭功就馬上尋思燕兵已然挫動銳氣不就這裏殺將過去捉了五樓更待何時乃大叫一聲如陣中起個霹靂兩手橫撚一條槍縱坐下馬一拍直沖過來攻五樓五樓一見輸了段暉大陣崩陷撥回馬望後軍便走餘軍皆潰被劉裕引全軍大刀闊斧殺得燕兵大敗星稀雲散八斷七續軍士抛金棄鼓撇戟丟戈覓子尋親呼兄喚弟折了萬餘人馬退下五十裏外紮住裕乃傳令鳴金收軍各自獻功請賞話不煩敘卻說慕容超引兵與裕戰聞前軍五樓大敗乃勒兵屯臨朐城外堅守不出晉軍一連拒住三月超兵亦不出是日劉裕又集諸將商議計策時劉裕深慮盧循乘虛又犯建康意欲速戰而還因此遂問諸將時參軍胡藩進計曰賊屯軍城外臨朐留守必寡爲今之計可密使人以兵抄小路取臨朐而斬其旗幟此韓信所以克楚也劉裕曰卿計可矣於是裕乃遣檀韶潘潛以輕兵五千抄陰徑去攻臨朐韶潛二人領計即行星夜至臨朐城城中兵少果無備被韶潛等攻陷盡斬其所戍旗卒城上皆立晉幟次早南燕王慕容超聞知大驚急領衆走還保廣固去訖
