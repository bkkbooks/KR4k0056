body:
  text: 第十回石崇與王愷鬥寶史說石祟字季倫生於青州故小名齊奴少敏慧勇而有謀其父石苞臨終分財與諸子獨少與崇其母以爲言何不均分使崇少也苞曰此兒雖小後自能得及其年長二十爲修武令有能名遷爲陽城太守因伐吳有功封爲安陽鄉侯累遷侍中武帝以崇功臣之子有幹才深器重之出爲南中郎將荊州刺史領南蠻校尉石崇穎悟有才氣而任俠無行檢在荊州時私與從人劫遠使商客以致大富因此不資久之後拜爲太仆因出鎮下邳崇有別館在河陽之金穀一名梓澤餞送者傾都暢飲於此故號爲金穀園是歲武帝又拜崇爲衛尉崇家中財産豐積室宇宏麗後房百數皆曳錦繡珥金翠絲竹盡當時之選庖膳窮水陸之珍富蓋天下無有貳也時後將軍王愷乃文明皇后之弟也家中亦大富愛於射競以奢侈相高一日武帝設朝罷退出外殿石崇王愷二人俱各誇誕王愷說我家中以飴飫釜石崇說我家以蠟代薪這邊道多那邊道勝衆僚友因謂二人曰口說無憑做出便見公二家休在此爭論凡家中有甚奇異珍寶請出相鬥方見高下當王愷使人作紫絲步障四十裏石崇使人作錦步障五十裏崇塗屋以椒愷用赤石脂僚友見崇勝愷俱稱羨不已武帝聞王愷與石崇鬥寶乃宣愷入取珊瑚樹高二尺者賜愷愷大喜拜謝出內即以珊瑚示石崇石祟接過看了以鐵如意擊碎王愷大怒曰你無此寶故打碎欲與相妒崇大笑曰君不足爲恨吾自償之乃使人取珊瑚樹高三四尺者六七株條幹絕俗光彩耀目以示王愷因以賠愷僚友勸和各回第訖當司馬傅咸上書於武帝曰先王之治天下食肉衣帛者有制其奢侈之費甚於天災古者人稠地狹而有儲蓄由於簡也今土廣人稀而民不足由於奢也欲時人崇儉當詰其奢奢不見詰轉相高尚無以窮極矣帝覽謂鹹曰王石自相射競何干興廢卿何多言耶弗聽傅鹹之諫卻說尚書張華先因伐吳都督幽州軍事以文學才識名重一時論者皆謂宜爲三公荀勖馮紞以伐吳之謀深嫉之先時武帝知張華才能故使人問華誰可托後事者華曰以明德至親莫如齊王及此武帝使人征之齊王忤旨不至帝思華能欲征張華苟勖馮紞忌華所能因而譖華於帝曰張華督幽州撫循夷夏譽望益振而華參朝政恐有鍾會之變也鍾會之反頗由太祖今陛下征華亦然武帝變色曰卿是何言耶紞驚即免冠言曰善禦者必知其轡緩急之宜故漢高八王以寵過夷滅光武諸將由抑損克終非上有仁暴之殊下有愚智之異也蓋抑裁予奪使之然耳會才智有限而太祖誇獎無極使會自謂算無遺策功在不賞遂構凶逆耳向令錄其小能節以大禮則亂心無由生矣帝曰然紞稽首曰陛下既然臣之言宜思堅冰之漸勿使如會之徒複致傾覆帝曰當今豈複有如鍾會之徒因屏左右而言曰陛下謀畫之臣著大功於天下太平總戎馬之任者皆在聖慮矣帝默然由是不征張華征齊王司馬牧入朝齊王牧入朝用事德望日隆荀勖馮紞楊珧皆忌之因設朝罷紞譖于武帝曰齊王攸私結群黨恐不利於社稷帝曰齊王乃先帝之所親信故朕委之以朝政豈有異心耶卿勿多言紞曰陛下不信詔諸侯之國宜從親者使齊王獨留京師可乎勖又曰百僚皆歸心齊王陛下試詔之國必舉朝以爲不可則臣言驗矣武帝始以爲然次日乃以齊王司馬攸爲大司馬都督青州諸軍事令其歸國國公王渾入朝上書曰竊見齊王司馬攸至親盛德宜贊朝政今出之國假以虛號而無典戎幹方之實恐非陛下追述先帝太后待攸之宿意也若以同姓處之太厚則有吳楚逆亂之謀漢之呂霍王氏皆竊人也曆觀古事輕重所在無不爲害唯當任正道而求忠良耳若以智計猜嫌雖親見疑疏者庸可保乎武帝不聽扶風王駿光祿大夫李熹中護軍羊琇待中王濟甄德皆入切諫帝亦不聽王濟與甄德見帝不聽又使其妻公主俱入宮涕泣曰今使齊王歸國莫非內有小人獻佞且齊王國之至親而不可信況他人乎望陛下留齊王乃國家之幸因再四請帝留齊王攸武帝大怒出謂王戎曰兄弟至親今出齊王自是朕家事而甄德王濟遣婦人來生哭耶乃出甄德王濟時李熹見武帝出濟德二人亦以年老遜位後卒於家焉太康四年正月武帝設朝命太常議崇錫齊王禮物博土庾剪秦秀等因上言曰考之古禮三公無職坐而論道不聞以方任嬰之惟宣王救急朝夕然後命召穆公征淮夷故其詩曰徐方不回王曰旋歸但宰相不得久在外也今天下已定六合爲家將數延之三事與論太平之基而更出之違舊章矣望陛下詔齊王歸朝天下幸甚武帝弗聽當祭酒曹志歎曰安有如此之才如此之親不得樹本助化而遠出海隅晉室之衰其可待矣乃上章極諫曰古之夾輔王室同姓則周公異姓則太公皆身居朝廷五世反葬及其衰也雖有五霸代興豈與周召之治同日而論哉自羲皇以來豈一姓所能獨有當推至公之心與天下共其利害乃能享國長久是以秦魏才得沒世而周漢親疏爲用此前事之明驗也志以爲當如博士所議詔宣齊王回朝則朝廷幸甚天下幸甚武帝覽表大怒曰曹志尚不明吾心況四海乎且博士不答所問而答所不問橫造異論也遂免曹志官其餘皆赴廷尉問罪廷尉劉誦奏旉等大不敬法當棄市帝從之尚書夏侯駿見帝曰官立八座正爲此時博士不當加罪帝始回心獨以駿議留中七日乃詔旉等七人免死除名命齊王攸備物典策設軒懸之樂六佾之舞黃鉞朝車乘輿之副從焉卻說齊王攸既被荀勖馮紞之讒不得預政在外憤怨發病使人奏武帝乞往守太后之陵寢武帝不許齊王病劇武帝遣禦醫診視禦醫將行勖等陰囑曰汝去視齊王疾不可下藥只便回來主上問你時只說無疾禦醫應諾及去診視脈息病將危篤不肯下藥診罷複旨皆言無疾帝亦不深問當河南尹尚雄諫曰陛下子弟雖多但有德望者少齊王臥居京邑所益實深不可不思也依臣之愚見可詔還京武帝不納尚雄憤恚而卒齊王攸疾轉篤帝猶遣人催其上道至是嘔血而薨其子司馬冏發喪而歸武帝與百官親臨吊喪司馬冏號踴陳訴禦醫誑言父疾無恙不肯下藥致誤身死武帝大怒即命武士收禦醫誅于市曹以其首級祭之初武帝愛齊王攸甚篤爲苟勖馮琇所構欲爲身後之慮故出之及其薨帝哀痛不已馮紞侍側曰齊王名過其實天下歸之今自薨是社稷之福也陛下何哀之過帝收淚而止按齊王攸舉動以禮鮮有過失武帝敬憚之每引同處必擇言而後發因此朝野重之
