body:
  text: 第二二九回桓溫戲星人王見卻說桓溫既有異志聞蜀人王見善知天文乃使使召至至夜溫執王見手問曰聞卿善知天文今國家祚運修短若何見答曰世祚方永未必便終溫不悅次日召見入送絹一匹錢五千文與之自歸因謂曰卿可將此自裁王見受之即出自思曰桓溫送絹一匹錢五千文命我自裁其絹使我自縊而死其錢與我買棺材葬我無親在此無人收斂因哭思半日聞襄陽習鑿齒爲溫府主簿仁厚濟人乃馳入謁鑿齒曰吾乃蜀州星人耳蒙大司馬桓溫召至問天文國家之事吾以實對大司馬怪吾送絹一匹錢五千文命我自裁我家在益州被命遠來今此無親無由致其駭骨聞君仁厚故來相投乞爲檁碣棺本以斂吾在九泉之下不忘大德鑿齒曰君幾誤死耳吾嘗聞知星宿有不覆之義乎此以絹戲君以錢供道路之資是教君自去也如何尋死桓公殺汝豈待汝自裁何不明也王見大喜拜謝鑿齒曰若不造先生誤喪殘生於是王見次日入辭桓溫回蜀溫曰誰救汝還王見乃以鑿齒言對之溫大笑曰昨憂君誤死今是誤活汝徒然三十五年看儒書不如一詣習主簿矣因此王見得鑿齒指教得歸溫於是益重鑿齒癸亥興甯元年五月晉帝設朝文武班齊君臣禮定分兩邊立群臣奏曰前者桓溫所議遷都之事欲威振朝廷貪功慕祿耳今事已寢可加其重祿則彼不生別志帝下詔使人去加封桓溫大司馬都督中外諸軍事錄尚書事桓溫大喜受職溫又欲北伐以王坦之爲長史以郗超爲參軍以王珣爲主簿以謝玄爲東曹掾後改爲參軍史說王坦之字文度乃王述之子也弱冠與郗超俱有重名時人爲之語曰盛德絕倫郗嘉賓江東獨步王文度郗超字景興小字嘉賓少卓犖不羈有曠世之度人皆仰之王珣字元琳乃太尉王導之子也先珣嘗夢人以大筆如椽與之既覺語人曰此當有大手筆事後孝武帝崩哀冊諡皆珣所草珣方弱冠與謝玄爲桓溫掾屬俱爲溫所敬重謂之曰謝玄年四十必擁旄又節王掾當作黑頭公皆未易才也史說謝玄字幼度少穎悟與兄謝明俱爲叔父謝安所器重安嘗誡于諸子侄曰子弟亦何預人事正欲使其佳諸人莫有言者獨玄答曰譬如芝蘭玉樹欲其生於庭階耳由是安悅玄對而益重之時桓溫每有事必與王珣謝玄二人謀之因此其府中人爲之語曰髯將軍短主簿能令公喜能令公怒玄貌多髯珣狀短小甲子二年春正月晉帝以揚州刺史王述爲尚書令王述每受職不爲虛讓其所辭必於所不受及爲尚書令其子坦之諫述曰故事多讓何不讓乎述曰汝謂我不堪耶坦之曰非也但克讓自美耳述曰既謂堪之何爲複讓耶欲以汝勝我實不及也卻說哀帝雅好黃老辟谷餌長生藥服食過多遂中毒不能理萬機崇德太后複臨朝攝政卻說涼宋混疾甚張玄靚及其母馬氏往省之曰將軍萬一不幸寡婦孤兒將何所托混曰臣弟澄政事愈於臣但恐其懦緩機事不稱耳殿下策勵而使之可也混誡澄曰受國大恩當以死報無恃勢位以驕人又見朝臣皆誡之以忠貞及卒行路之人爲之揮涕玄靚以澄爲領軍將軍命其輔政
