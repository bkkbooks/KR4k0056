body:
  text: 第二五八回安肥水論兵大戰卻說謝安受命拒秦全無懼意整日與王羲之圍棋賭耍不視軍情之事謝玄見秦兵勢大恐寡不敵衆至夜私自回城來見謝安曰今日侄在對岸看見秦兵漫山塞野旗鼓相望連營千里吾恐寡不敵衆之勢乃回見叔父可用何策攻之以安衆心免勞主上之憂矣安曰汝火速歸營調兵緊守肥水切莫妄動吾自有計若有緊急再使人來報不必自來玄不敢複言只忙出歸營去訖而謝玄心中不定憂兵少糧盡恐秦兵殺過肥水過數日乃使張玄入朝朝請叔謝安出城張玄領兵即入城見安告急曰請明公火速出城秦兵至矣諸將皆要出戰安不得已遂自命駕出城諸將皆曰今上以都督任公公不求破秦之策而日夜圍棋不視軍情主上寢不安席以江南百萬生靈之命委公保之公何如兒戲耶安對諸將曰今秦兵來犯我境其氣正盛我軍且乘高守險以待之彼以百萬之師吾只八萬之弱安能勝乎今但獎勵士卒廣布守禦之策以觀其動靜今彼兵馳驟于平原曠野之間正得其志彼若求戰不得自有懶怠之心此時吾當用奇計矣將軍宜息風火之性以圖國家之計桓伊等面雖應允心實不服
