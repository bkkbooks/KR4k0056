body:
  text: 第四十三回李特造反攻巴蜀初朝廷以兵符至秦雍令其召還流民又遣禦史馮該督之李特兄李輔等始至蜀盲中國方亂不可複還李特然之乃遣閻式詣羅尚求權督流民延至秋李特使式催尚羅尚以其言白與馮該許之以璽書下益州條列六郡流民與特總督而李特因討趙廞有功該奏朝廷欲加封賞辛冉欲以爲己功不以實上衆鹹怨之至是冉等與李特兄弟構怨當羅尚督流民七月初起行而流民散處梁益州間爲人傭力聞郡州逼遣人人愁怨且水潦方盛年穀未登無以爲行資特複求停至冬而行辛冉以健爲太守李芯以爲不可冉性貪暴欲殺流民首領取其資貨乃與李苾曰羅尚設關搜索特爲流民請留流民皆感而待之想率歸特今不以行久則有變宜先討特苾然之乃曰可出榜召募能殺特兄弟者以重賞必有人執來誅之於是辛冉榜使人各處分挂李特密知使人私取以歸與弟李驤改之爲募六郡豪傑如能得流民一首者賞帛百匹於是流民大懼皆歸特旬日間至二萬人特複遣式去求羅尚申期尚許之式還謂特曰羅尚威刑不立冉等各擁強兵與我等不睦必懷害我之心一旦爲變非尚所能制宜爲自備特從之與弟李驤以兵分二營繕甲治兵以待冉等至時冉聞李特分兵以備乃與李苾率步騎二萬至夜來襲李特營特放炮發二營伏兵出擊之冉芯之軍死者甚衆於是流民推特行鎮北大將軍事承制封拜李流及兄弟李輔並弟李驤皆號將軍攻冉於廣漢次日辛冉以兵出城大罵流賊焉敢謀反李特大怒罵曰吾盡忠于國汝何無故加兵夜攻於是兩下各拍馬持刀掩殺不十合冉大敗而逃奔德陽城李特引兵入據廣漢郡居數日進兵攻成都與蜀民約法三章施捨賑貸上下無滯軍政肅然蜀民大悅卻說辛冉與李苾大敗來見羅尚曰使君以李特兄弟爲心腹今日如何尚曰特本無反意因卿等促劫流民催其爲亂事既成宜火速攻討一面使人求救于梁州及南蠻校尉冉曰然於是羅尚自將兵圍郫水作營連延七百里與特相拒太安元年夏河間王司馬顒聞流民李特兄弟爲亂即遣督護衛博前來討特衛博以軍至梓潼李特探知使其子李蕩以兵五千來迎兩軍皆遇于德陽次日兩下結陣交戰李蕩出馬與衛博交鋒未三合博敗走其衆悉降李特乃自稱爲大將軍益州牧招軍以攻羅尚卻說齊王司馬冏久欲專政以惠帝子孫俱盡大將軍穎有次立之勢清河王司馬覃武帝孫也年方八歲冏乃上表請立爲皇太子惠帝從之以齊王冏爲太師東海王越爲司空盡領中書監至八月聞蜀李特謀反複以張微爲廣漢太守令其起兵討特張微既受詔即以軍至德陽抄小徑來攻李特大營被李蕩聞知以兵塞截中隘張微兵不得出盡被李兵上山以木石滾下微兵皆死之李特使李驤進兵攻成都之北又使李流進兵攻成都之南約會合兵共擊羅尚時羅尚聞張微被陷令辛冉率精兵二萬人前來攻李驤時驤前驅已到成都之北辛冉即以兵迎戰與李驤交鋒連戰十數合勝負未分正戰間忽東南征塵起處一彪人馬飛至冉回頭視旗上寫得分明乃李流之兵急欲以兵拒敵前兵已至驤見流兵到大驅兵衆來戰兩下夾攻冉支駕不住撥馬自逃餘兵盡被殺死得遁還者什一二耳因此驤流攻成都時十二月齊王冏驕奢擅權起府第與西宮等中外失望侍中稽紹上疏曰存不忘亡易以善戒也臣願陛下無忘金墉大司馬無忘潁上大將軍無忘黃橋則禍亂之萌無由而兆矣惠帝勿能用齊王耽于宴樂不入朝見坐拜百官符敕三選舉不均嬖寵用事南陽處士鄭方上書諫曰大王安不慮危宴樂過度一失也宗室骨肉互相疑貳二失也蠻夷不靜不以爲意三失也百姓困窮不聞謀救四失也義兵有功久未論賞五失也有此五失若不早救誠恐家國難保厥終矣齊王冏不能用之孫惠亦上書曰天下有五難四不可明公皆居之冒犯鋒刃一難也聚致英豪二難也與將士均勞苦三難也以弱勝強四難也興複皇業五難也大名不可久荷大功不可久任大權不可久執大威不可久居大王行其難而不以爲難處其不可而謂之可惠竊所不安也殿下宜思功成身退之道委重二王長揖歸藩則太伯子臧不得專美於前矣齊王冏不能用孫惠辭疾而去醊謂曹攄曰孫惠勸吾委權還國何如攄曰物議太甚大王誠能居高慮危褰裳去之斯善之善者也冏不聽王豹亦致牘於冏曰河間成都新野三王以方剛之年並興戎馬處要害之地而明公挾震主之威獨據京都專執大權未見其福也請悉遣王侯歸國依周召之法以成都王爲北州伯治鄴王爲南州伯治宛分河爲界各統王侯以夾輔天子可也時長沙王義見豹上箋因入謂冏曰小於離間骨肉何不於銅錘下打殺之冏乃鞭殺之豹將死曰可懸吾頭大司馬門見敵兵之攻齊也言訖而死
