body:
  text: 第二五七回謝安肥水退秦兵卻說晉孝武帝設朝近臣奏知秦王苻堅命苻融爲將以雄兵百萬戰將千員來寇江南晉帝聞知大驚急問文武誰人敢去退秦兵諸文武盡皆失色中書監錄尚書事謝安出曰陛下養國士待之如手足今日聞秦兵一至盡皆緘口結舌此何理也臣雖無才願施犬馬之勞以退秦兵少報陛下知遇之恩晉帝曰卿有大才必有大用而卿乃朕之元老不時朕要與卿同議國之大事豈可出征卿可另選別將去迎安曰今事急矣無人向前臣若不行則將士不復用命帝國秦師百萬非可用文以退卿執要前去何益近臣奏曰有文事者必有武備有武備者必有文事臣觀謝尚書胸中有百萬兵不似臣等耳宜與去之可選大將副貳破秦必矣帝曰朝中誰人堪任大將可速舉之謝安曰臣侄謝玄勇略雙全可任大將帝曰朕聞昔周郎以數萬之兵破曹百萬之衆今舉大將不似其人難保社稷矣謝安曰以其論之不在周郎之下陛下若用之破秦兵必矣如其失事臣請先納此頭帝曰非卿提醒朕幾誤大事即時差人召謝玄王彪之曰玄乃一儒生耳非苻融之敵也不可用之周雍曰玄年幼德薄恐諸將不服則生亂矣必誤陛下謝安曰若不用謝玄則東地必休矣臣請以全家性命保之帝曰吾亦素知謝玄乃奇才也孤當托之安曰若不付以重任其才不能盡展也晉帝曰然於是召謝玄至拜畢帝曰今秦兵侵境孤欲命卿總督人馬以破苻堅如何玄對曰文官武將皆陛下故舊之臣也玄年幼不才安能破敵帝曰朕亦素知卿才今拜汝爲副都督卿勿推辭玄曰倘文武中不服者如何帝曰如有不遵令者先斬後奏玄曰臣受恩已久固不敢辭臣願領兵於是帝使謝安總督天下諸軍事謝玄爲征北大將軍以兵數萬出拒秦兵二人領旨即出謝安次日傳下號令教諸處多謹關防牢把肥水不得輕戰諸將但相聚無不笑其懦也安以調兵堅守衆不服互相恥笑安升帳設座會東南諸將安謂衆曰吾領承王命總督諸軍昨已三令吾令汝等各各堅守不遵吾令何也桓伊曰吾自跟大司馬平定西蜀大小數百戰敢勇向前彼諸將昔從桓公皆披堅執銳出生入死之士也今主上以公爲大都督令退秦兵宜早定奇計調撥分頭進征方能成功今卻死守以待天自殺賊何其無謀之甚也吾等非怕死貪生之人使我輩皆隨顔順志此何理也言訖帳上下皆曰桓將軍言是也我等情願決一死戰謝安聽罷掣劍在手指而言曰苻堅名聞天下戎狄尚自懼怕今在境界非容易敵也汝等諸將士並受國恩當以和順共圖破敵以報主上今吾自有妙算非汝等所能料也吾知汝等各不相順故違吾令是何道理仆雖一書生今蒙主上授以重任者豈無有尺寸可取謂能任事負重故也汝宜守隘口險要不許妄動如違令者以此劍立斬各宜凜遵勿得多言於是各分頭去把守卻說苻融擺佈軍馬直至川口連營一千餘裏前後四百餘屯夜則明火燭天晝則旌旗蔽日細作探知東南用謝安爲將領大都督總制軍馬各守險要不出苻融問謝安何如人也權翼曰江東偉人足智多才昨制桓溫皆此人之謀也苻融聞知怒曰豎子有何高謀可令前隊進兵討之權翼曰安之才學不在桓溫之下不可以輕敵也苻融曰吾用兵更不如一豎子耶勿多言看吾擒之苻融乃自引前軍各攻諸處關隘謝安聞知即召謝玄至謂曰汝與謝琰中郎將桓伊以八萬精兵出屯肥水以拒秦兵玄曰今秦兵百萬猛將千員今以八萬之衆前去拒秦兵叔父用何計以拒之安曰汝只管先去且莫與戰吾後自有奇計破之於是玄與謝琰桓伊以兵八萬出屯肥水之上以拒秦兵當苻融使人探晉兵虛實使人還道晉兵未滿十萬人在肥水屯駐不敢來迎融聞晉兵不滿十萬人即使人入秦報秦王曰今晉兵弱少不敢來戰甚易於攻請陛下車駕親迎秦王堅見書即日親領戎卒六十萬騎起行當來至苻融軍中秦王堅下令曰大軍徐徐進朕自以輕騎二千兼道先赴軍前諸將奏曰古有諺雲肩不出項陛下可停駐待其報捷不可親自向前秦王堅曰朕若不去則三軍不肯向前言訖引二千人先行來至苻融軍中苻融接著入於中軍問勞已畢融命排宴奉秦王堅秦王堅是夜宿其中軍卻說晉會稽王司馬道子見秦兵勢大國人皆恐乃入朝奏曰今秦兵百萬勢難拒擋今聞鍾山土神極靈有應請陛下出旨封鍾山土神爲相國之號祈其爲國爲民必有感應帝曰從卿所請於是降詔旨命會稽王道子以詔旨去鍾山封其土神爲相國焉
