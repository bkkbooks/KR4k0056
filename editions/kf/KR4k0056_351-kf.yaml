body:
  text: 第三四八回義真大敗回建康六月太尉劉裕始受相國宋公九錫之封既承受命詔崇立蕭氏爲太妃以郭靖爲尚書令王弘爲仆射傅亮蔡廓爲侍中謝晦爲右衛將軍殷景仁爲秘書郭靖辭不受景仁不爲學文敏有思致口不談文深達理體至於國典朝儀舊章記注莫不撰錄識者知其有當世之志宋公劉裕欲以世子義苻鎮荊州張邵諫曰儲貳之重四海所系不宜居外乃以義隆爲荊州刺史以劉彥之張邵王曇首王華等爲參佐義隆尚幼府事皆決于邵裕謂義隆曰曇首沈毅器度有宰相之才也汝每事諮之義隆拜辭劉裕而行卻說夏王勃勃進據咸陽長安樵采路絕義真乃遣人入建康報父劉裕裕聞之使蒯恩召義真東歸又以朱齡石去守關中謂齡石曰卿至長安可救義真輕裝速發出關然後徐行若關中必不可守可與義真俱歸十一月朱齡石至長安時義真將士大掠而東還多載寶貨子女方軌徐行一日不過十裏傅玄之諫之弗聽赫連璝率衆追之蒯恩斷後力戰連日至青泥又與璝戰大敗爲夏兵所擒義真左右皆散獨逃草中參軍段光追尋得之束之于背單馬而歸義真曰今日之事誠無算略然丈夫不經此何以知艱難勃勃欲傅玄之降玄之不屈叫駡而死勃勃積人骸爲京觀號髑髏台長安百姓皆懼勃勃來攻朱齡石焚宮殿奔潼關夏王以兵追殺之勃勃入長安大饗將士舉觴囑王賈德曰卿往日之言至期而驗可謂算無遺策矣裕聞青泥之敗未知義真存亡怒甚刻日北伐謝晦諫以士卒疲敝請俟他年鄭鮮之亦言今諸州大水民食困乏三吳群盜攻沒諸縣皆由困於征伐故也江南士庶引領頤以望返旆聞更北出不測退期巨恐反顧之憂更在腹心也裕知義真回事乃止但登城北望慨然流涕而已以段宏爲黃門侍郎毛德祖守蒲阪十一月彗星出天津入太微經習匕鬥絡紫薇八十餘日而沒魏王嗣召諸儒術士問之曰彗星所出今四海分裂咎在何國朕甚畏之卿等無隱崔浩曰災異之興皆象人事無釁又何畏焉昔王莽將篡星亦如之而今國家主尊臣卑民無異望晉室陵夷危亡不存彗之爲異其劉裕將篡之應乎魏王悅之卻說當夏王勃勃既即位于長安聞韋祖思賢而忠正乃遣人征之韋祖思懼其殘暴只得隨使人入長安早朝拜舞恭謹過禮勃勃大怒曰吾以國士征汝奈何以非類處吾汝昔不拜姚興何獨拜我我今未死汝猶不以我爲帝王吾死之後汝輩弄筆當置吾何地耶遂將出殺之群臣無不冤之勃勃于長安置南台以子赫連璝錄南台尚書事勃勃欲領文武振旅而還統萬造宮殿大成改元爲真興元年刻石都南頌其功德焉群臣請都長安夏王勃勃曰朕豈不知長安帝都沃饒廣固然統萬距魏境才百餘裏朕在長安統萬必危若在統萬則魏必不敢濟河而西諸卿適未見此耳乃置南台于長安以赫連璝錄尚書事而還勃勃性驕虐視民如草芥常置弓劍於側群臣近視者鑿其目笑者抉其唇諫者先截其舌然後斬之三月劉裕誅晉室之有才望者司馬楚之叔兄皆死楚之亡匿蠻中及從祖休之奔秦楚之乃亡之汝穎間聚衆以謀復仇楚之少有英氣折節下士有衆萬余屯處長社裕使沐謙往刺之楚之愛士待謙甚厚謙未得間乃夜稱疾欲因楚之問疾而刺之楚之果自齎藥往視情意甚駕謙不忍發乃出匕首以狀告曰將軍深爲劉裕所忌使我刺你吾不忍也願勿輕率以自保全遂委身事之爲之防衛楚之乃以兵轉屯柏穀塢以防之西涼地震星隕時涼公李歆用刑過嚴又好治宮室從事中郎張顯上疏曰涼土三分勢不久支兼併之本在於裕農懷遠之略莫如寬簡今陰陽失序風雨乖阻是宜減膳徹樂側身修道而更繁刑峻罰繕築不止殆非所以致興隆也沮渠蒙遜胡夷之傑內修政事外禮英賢攻戰之際身先士卒百姓懷之樂爲之用臣謂殿下非但不能平蒙遜亦懼蒙遜方爲社稷之憂也主簿範稱亦諫曰天之子愛人主殷殷至矣故政之不修下災異以告我知之改者雖危必昌不改者雖安必亡屬者謙德堂陷效谷地裂昏霧四塞日赤無光狐上南門地頻五震星隕建康皆變異之大者也昔年西平地裂狐入殿前而秦師奄至姑臧門崩而隕石於西土梁熙見殺之及段業稱制三年之中地震五十餘所先王龍興蒙遜篡弑之行向前之成事殿下所明知願停罷官室之役止遊戲之娛禮賢愛民以應天變皆不從
