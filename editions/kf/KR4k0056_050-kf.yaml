body:
  text: 第四十八回二王起兵攻長沙九月卻說河間王顒初用李含計欲俟齊王醊殺長沙王因而討之遂廢帝立成都王穎以己爲相既而不如所謀心甚不樂穎亦恃功驕恣奢侈百度廢弛嫌義在內不得逞其欲欲與顒共攻義盧志諫曰明公委權辭寵時望美矣今且屯兵關外公服入朝此霸王之事也穎不聽參軍邵續諫曰人有兄弟如左右手今明公欲當天下之大敵而先廢一手可乎穎亦不聽使人會河間王顒一同上表道長沙王義論功不平與仆射羊玄之將軍皇甫商專擅朝政請遣義還國及誅玄之等如不從即舉兵使人以書來見顒顒大喜曰吾久欲爲此矣恨力不加即回書與穎共上表後各起兵使人去訖於是二王同遣人上表于朝惠帝覽之大怒即頒詔與使回曰穎顒敢舉兵向闕吾當親率六軍以討之因是以長沙王義爲太尉都督中外諸軍事令其點軍預防守城卻說使人回以手詔示顒顒大怒以張方爲都督將精兵七萬人東趨洛陽穎引軍屯朝歌以陸機爲前鋒都督令粹牽秀石超等軍二十余萬向洛陽機以羈旅事穎一旦居諸將之右粹等心皆不服孫惠勸機讓都督于粹機曰彼將謂機首鼠兩端所以速禍也因此不聽惠帝聞二王兵至即召長沙王義督六軍帝自親征軍至十三萬義使皇甫商將一萬軍拒張方兩軍會于宜陽時皇甫商出陣與張方交戰十數合商不能敵方因此大敗而走惠帝得衛兵保走于荒山羊玄之憂懼而卒帝無食投一莊安下其莊上一太公出接入內以酒食款待又以糧給軍餉惠帝問其姓名太公道臣姓緱祖居在此年已六十餘無嗣止生一女年紀十八能通十八般武藝未曾許配他人帝悅之命女見緱公即喚女兒出來山呼拜訖帝命平身緱氏曰陛下在上臣妾不敢帝見緱氏生得姿容妍嫩因與緱公曰朕自才人謝氏被賈後害後未曾選聘朕欲以汝女爲才人卿意雲何緱公曰恐不堪幸帝曰朕意已悅卿勿容辭於是緱公命女兒與帝侍寢因留帝在莊歇數日時牽秀聞知帝在緱莊乃引兵五千前來圍住莊院帝大驚緱氏曰陛下勿懼臣妾自能退兵帝稍心安緱氏披挂執槍帶莊客五百人各執兵器出戰牽秀以兵排開與緱氏交鋒軍器並舉大戰二十餘合緱氏容顔不變氣力愈強牽秀恰好遮攔得住不能取勝二人又戰數合牽秀氣力不加撥開軍器勒轉馬頭望本陣便走緱氏驅莊客一擊殺得秀兵大敗而逃卻說張方既殺敗皇甫商引兵殺入京城縱兵大掠城內百姓死者萬計長沙王義自宜陽戰敗不知帝之下落使人探知在緱家莊遂引軍尋至莊上君臣相見俱各流涕義請帝還京惠帝與緱氏一同回至建春門會司馬穎遣將軍傅咸助陸機攻城正遇帝軍回京鹹以兵攔住歸路長沙王義急使司馬王瑚以五千精兵出突鹹舉刀拍馬直取王瑚王瑚持戟來迎兩馬相交兵器並舉刀來戟撥戟去刀攔二人約戰十合咸被王瑚一戟刺于馬下衆軍踴突向前將鹹斬之長沙王義謂瑚曰兵貴神速汝即以此得勝之兵去攻機吾保聖上回宮瑚然之大喊一聲乘勝殺入大營引五千軍來攻機營機令堅壁妄動者斬超不聽以兵出迎與王瑚戰被殺之機措手不及被王瑚以精兵一沖一突攻入大營機兵莫能抵敵大敗而生赴七裏澗被瑚軍趕上又殺一陣死者積草澗水爲之不流初宦人孟玖有寵于司馬穎盂玖自恃於穎欲用其父爲邯鄲令陸機固執不許曰此縣公府掾資豈有黃門父居之耶玖深恨之玖弟超是機小督未戰縱兵大掠機錄其主者欲斬之超將鐵騎軍入麾而奪之顧謂機曰貉奴能作督不機司馬孫拯勸機殺之機不能用及王瑚來攻超不受節度輕兵獨戰敗死於陣及此盂玖疑超被機殺之因譖于司馬穎曰陸機有二心于長沙王宜早爲之穎未信牽秀王粹等素餡事於玖相與證之機懷二意穎於是大怒使秀將兵收機卻說陸機聞牽秀至釋戎衣著白袷與秀相見爲箋辭穎而歎曰華亭鶴唳可複聞乎牽秀遂殺之穎令收陸雲及孫拯下獄記室王統察克等流涕固請穎惻然有宥雲之色玖扶穎入內催令殺之夷其三族又使獄吏究拷孫拯招二陸二心之謀獄吏掠孫拯數百兩踝骨見終言機冤屈吏知拯義烈謂曰二陸之枉誰不知之君何不愛身乎拯仰天歎曰陸君兄弟世之奇才吾蒙知愛今既不能救其死複忍從而誣之乎獄吏對玖言孫拯不肯招認二陸貳心之謀玖等令獄吏詐爲拯招之辭進穎亦夷三族拯門人費慈宰竟詣獄明拯冤屈拯譬遣之曰吾義不負二陸死自吾分卿何爲爾耶慈宰曰君既不負二陸仆又安可負君固言拯冤玖怒亦同殺之天下人人皆爲含冤十二月長沙王義奉帝以大軍過張方營時方見帝乘輿而至乃退其城不敢交鋒方大敗退五十餘裏衆懼欲夜遁方急謂衆曰勝負乃兵家之常事今雖一敗不足爲慮況善用兵者因敗爲成今我更前作壘出其不意此奇策也於是乃夜以兵漸進逼洛城七裏築壘數重外引廩穀以足軍食而守之意待城內糧盡入攻之必克洛陽也義既得勝以爲方不足憂及聞方壘成遣軍攻之不利司馬穎之兵進逼京師公私窮踧米一石值萬錢詔命所行一城而已猶豫之際驃騎主簿祖逖言計於義曰臣有一計可退方兵義曰何計祖逖曰雍州刺史劉沈忠義果毅其兵力足制河間宜啓聖上命沈舉兵攻司馬顒顒窘急必召張方以自救此乃孫子圍魏救趙之良策也義從之即以其計奏惠帝使人持詔令劉沈發兵去攻河間劉沈奉詔合七郡之衆二萬餘人趨攻長安十二月卻說議郎周圯等起兵江東欲討石冰未有主將乃推前吳興太守顧秘爲揚州都督傳檄州郡命殺石冰所署將吏前侍禦史賀循廬江內史華覃及彤陽尹葛洪甘卓皆起兵以應顧秘兵勢大振來攻冰冰大驚乃使部將黃仁以兵二萬五千拒戰與周圯交鋒未三合被圯斬于馬下餘兵潰走圯以兵長進石冰聞得黃仁被斬乃退兵趨攻壽春征東將軍劉准聞知冰至大懼不知所爲廣陵度支陳敏統衆在壽春謂准曰此等小人皆不樂遠戌因朝廷逼迫成賊爲群烏合之衆其勢易離將軍何必憂慮請爲公破之准大悅曰如卿所言賊無難制更調五千人益卿爲先鋒去拒討之於是益領軍五千人出拒石冰閏十二月李流得疾危篤聚諸將於府中垂涕言曰吾恐不久于人世前軍李雄英武殆天所相可共受事汝等宜善事之言訖而卒諸將營葬遵其遺命奉李雄爲主領益州牧李雄以其衆入據鄴城屯數日引衆攻成都羅尚聞知即領兵出城結陣親與李雄對壘兩下對住陣腳羅尚拍馬向前大罵曰流賊朝廷有何負汝無故大逆李雄亦罵吾父遭汝所害誓不與你同天地共日月言訖驅兵交戰不三合羅尚大敗即走入城恐寡不敵衆乃與陳堅商議領家屬百余人走回許都李雄領衆入據成都卻說羅尚被李雄殺敗逃至江陽遣使上表奏失益州之事惠帝頒詔令羅尚權統巴東巴郡涪陵三郡以供軍賦尚雖得三郡糧草不給遣別駕李興詣荊州劉弘借糧弘以三萬斛給之尚賴此以存李興見劉弘兵盛糧多乃言於弘曰興雖不才願留爲帳下一參軍使君肯容乎弘奪其手版而遣曰羅公孤軍狼狽無人戮力討賊安敢奪卿火速回去於是李興滿面羞慚而回去訖卻說流民在荊州者十余萬戶羈旅貧乏各爲盜賊弘大給其田與之耕種擢其賢才隨資敘用流民遂安不爲盜矣卻說幽州都督王浚即王沈之子也浚以天下方亂欲結援夷狄乃以一女妻務勿塵一女妻宇文素怒延又表以遼西郡封務勿塵朝廷許之於是王浚與夷狄樹黨而立以觀天下
