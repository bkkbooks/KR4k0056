body:
  text: 第二六九回姚萇以兵攻新平後秦王姚萇聞慕容沖攻長安會群臣議進止之策諸將皆曰宜先取長安建立根本然後經營四方萇曰燕人因其衆思歸以起兵若得志必不久留關中吾當紮屯嶺北廣收資實以待秦王晏去然後拱手取之言訖乃留長子興守北地自將其衆攻新平初新平人殺其部將秦王堅缺其城角以恥之新平人深以爲恥欲立忠義以雪之及萇至太守苟輔欲降郡人馮傑等諫曰昔田單以一城存齊今秦猶連城過百奈何遽爲叛臣乎輔喜曰是吾志耳但恐久而無救郡人橫被無辜諸君能爾吾豈顧生哉於是憑城固守後秦兵至爲土山地道以攻輔亦于內衛之或戰地下或戰山上後秦之衆死者萬余人荀輔乃詐降以誘萇萇信之將入城諸將士告有詐始覺之而返輔伏兵邀擊萇幾死之得伊詳引兵來救因此進殺去萬餘人矣太守荀輔堅守以拒後秦糧竭矢盡外求救不至後秦王萇使人謂曰吾方以義取天下豈仇忠臣耶卿但率衆還長安吾止欲得城耳輔率民出萇執而阬之
