body:
  text: 第二七五回拓跋珪大霸牛川丙戌十一年卻說乞伏國仁聚衆十余萬佔據關西自稱爲秦河二州牧史臣曰夫尺地閉塞寢生雲霧屯群凶作自晉室遘孽胡兵肆禍封域無紀干戈是務國仁陰山遺噍難以義服伺我之危長其陵暴向使遇欽明之運遭雄略之主已當褫魄沙漠請命槁街豈暇竊憑邊郊經綸王業者也卻說拓跋珪年二十余歲張恂上言曰大王春秋既茂宜收中原士庶之望以建大業何必久居人下乎珪然之燕鳳等大會文武于牛川立珪爲王招集舊臣聚納亡命威名稍振珪謂舊臣燕鳳等曰吾志在天下恨力未及不能複先王之志心甚恥之卿等有何遠策請賜教之鳳曰殿下欲襲王位秦王已滅爲燕所有爲今之計莫若使人以殿下親者與燕王慕容垂爲質請命爲王願爲燕藩然後乘此聚兵積糧則大業複成矣拓跋珪曰卿之高謀符合我意因是珪使參軍叔孫建領其叔秦王拓跋觚入燕朝見後燕王垂奏稱北代王拓跋珪使其叔秦王拓跋觚來爲質請命複祖王位願爲燕藩歲納財幣燕王垂曰既拓跋珪稱藩於朕朕何不允吾即遣使立之於是留秦王觚質燕複命使與叔孫建還北立拓跋珪爲代王由是叔孫建回自此以後聽從燕命次日代王因思劉顯謀害己以燕鳳爲前鋒將軍自爲後軍以兵二十萬來討劉顯及劉衛辰劉顯聞軍人飛報拓跋珪自立爲代王今以兵來報前仇劉顯即時使人報劉衛辰會同點起軍馬出奔邑城來迎敵時兩軍相遇北代王使南部大人長孫嵩出馬與劉顯交戰顯舞刀便砍長孫嵩持槍便迎二人戰上二十余合劉顯氣力不加勒馬走回本陣代王珪揮兵一擊殺得劉顯之衆大敗十停沒去九停劉顯以代兵勢強引百餘數人走還原部避于西陰代王以得勝之兵來攻劉衛辰衛辰得劉顯書知代王珪來先起兵五萬來迎代軍當時兩軍相遇混戰衛辰親自出馬叔孫建持刀去迎二人交鋒戰上十合衛辰被建斬于馬下代王招軍一擊殺死劉兵大半餘兵望風潰散代王始令鳴金收軍珪人據新平城盡收劉衛辰之家屬皆斬之只走了衛辰之子劉勃不見卻說蠕蠕主作叛來寇朔方代王拓跋挂聞知大驚急回使左長史張兗領兵爲前鋒自爲軍後共率兵十萬來討蠕蠕蠕蠕親自出馬張究以兵連追三百里以糧盡收軍見代王拓跋珪曰蠕蠕遠走況又糧盡不可久離宜振旅還都代王珪曰蠕蠕不時爲患正宜乘其大敗破之不然後必再至雖則糧盡可殺馬匹爲食亦足三日之糧乎兗曰足充矣代王珪曰若足可殺馬匹爲食率兵追之於是兗從之與代王珪殺馬匹爲食星夜連追六百里至廣漠赤地南林山下趕著蠕蠕蠕蠕見追兵至勒馬回來與張兗交戰未及三合蠕蠕之衆各自潰散兗乘勢驅兵掩擊破之殺得蠕蠕只余百餘人走還陰山去訖代王珪始鳴金收軍領衆還都因問張兗曰卿曹知我前說三日糧乎兗曰未知代王珪曰蠕蠕奔走數日畜産失飲至水必留計其道程二日足能追及遂率輕騎奔追出其不意彼果驚散故得破之時諸將鹹曰大王聖策非臣所及也張兗亦謂衆曰主上天資傑邁必能囊括六合夫遭風雲之會不建騰躍之功非人豪也汝等諸君各效忠盡力早立大勳也諸將曰無不效命因此代王得取諸部馬邑之地於是諸部士民複歸代王焉卻說西燕左將軍韓延與前將軍段隨計議曰今燕王慕容沖驕侈日甚臣民不安如何而可吾與君百戰疆場僥倖得其京畿彼今爲帝不顧我功臣而自爲宴樂也吾欲殺之立君君肯受其位否隨曰以臣殺君大不義也吾不欲之韓延曰君不從久必有滅族之患隨曰吾無罪過屢有大功何至於此延曰韓信功高天下死於未央君何不知隨被韓延一語之感遂從之因曰從卿之議於是次日早朝韓延領兵五百人擁入前殿燕王沖正登寶座被韓延執下殺之就推前將軍段隨上座謂曰慕容沖飲酒淫樂不堪爲主吾故殺之今前將軍段隨有仁有德可爲燕王汝等大臣各宜山呼時群臣驚得面如土色無言以對忽班部中有將軍慕容永高聲叫曰韓延段隨二人弑君大逆公等隨吾誅此不仁之賊殿上階下衆文武齊聲應曰我等願隨將軍同誅殺此弑君之賊也於是慕容永先行衆文武一擁而入後宮各取兵器殺出前殿慕容永直奔韓延韓延接旁軍人手中蛇矛來迎二人步戰戰未五合慕容永砍殺韓延段隨看韓延死了自見其事不成乃引五百甲土殺出內門引部下之兵出城逃奔外國去訖慕容永見段隨走了恐其爲患率鮮卑男女一萬人離長安而往據河東慕容沖之舊臣推永爲河東王招集離散之兵要復舊號因是長安空虛無人守之卻說後秦王姚萇聞慕容永以衆往河東長安空虛乃領文武百官士民人等離安定徙都長安即皇帝大位國號大秦立其子姚興爲皇太子改元建初改以長安爲常安禮聘先秦舊臣同輔國政因此權翼等亦被請到姚萇拜爲太常姚萇性單率群下有過常面辱駡時權翼諫曰陛下弘達自任不修小節有高祖之量然輕慢之風所宜除也後秦王萇曰此吾之性也吾于虞舜之美未有並長漢祖之短已收其一不聞讜言安知過也自是萇始改過焉卻說西燕河東王慕容永聞苻丕稱帝於鄴乃問右將軍胡仁曰吾聞苻丕稱帝據鄴欲攻討之卿議可否仁曰苻丕兵不滿萬將五百人若討之如探囊取物手到便擒何難之有永曰依卿所料必可得也於是慕容永使胡仁爲將自爲後隊引兵一萬殺奔鄴來直至城下下寨苻丕大驚次日自爲將引兵一萬出城與永交鋒二人戰不五合苻丕抵敵慕容永不住而走至南被燕將馮該以兵出迎斬之其兵俱各潰走慕容永收兵入城見內空虛不堪居止乃領衆進據長子城胡仁勸其即位永始據長子城爲都即皇帝大位複號西燕八月袍罕諸氏以河州刺史衛平衰老議欲廢之會七夕衛平宴諸氏啖青抽劍而前曰天下大亂非賢主不可濟衛公老矣宜返初服狄道長苻登王室之族智略雄明請共立之有不同者即下異議青乃拔劍攘袂曰不從者即斬之衆皆從之於是推登爲雍河二州牧率衆五萬下隴東攻南安拔之稱爲南安王十月秦南安王登乃丕之族子聞苻丕被害代爲發喪其部下大將王城等乃立壇於隴東招集離散謀集秦之舊臣軍士複以苻登即皇帝大位國號大秦改元太初元年初涼州張天錫秦攻之而敗南奔也秦長水校尉王穆匿其世子張大豫與俱奔河西至是魏安人焦松聚兵迎大豫攻逼昌松進拔姑臧王穆曰呂光城完糧足甲兵精銳不如席捲嶺西礪兵積粟然後東向不及斯年光可取也大豫不從乃自稱涼州牧使穆說諭嚴西諸郡皆起兵應之保據楊鳴而已三月燕王垂欲延文昭段後於別室而以藺後配享太祖議者皆以爲當然博士劉詳董諡曰堯母爲帝嚳妃位第三不以子貴陵姜嫄文昭後宜立別廟垂怒逼之曰何如不可詳諡曰主上所欲爲無問於臣臣按經奉禮不敢有二垂不復問而卒行之又以可足渾後傾覆社稷追廢之尊烈祖昭儀段氏爲景德皇后配享太廟
