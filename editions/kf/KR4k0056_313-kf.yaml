body:
  text: 第三一回桓玄挾帝走江陵卻說桓玄走至石頭城聞後軍來趕恐將士不復用命乃領衆走入潯陽劫晉帝是時玄腰帶寶劍手提鐵鞭謂帝曰今劉裕謀叛欲來擒陛下陛下可急從吾走避帝見玄內侍皆帶劍環立於側面如土色拱手謝曰多蒙報知願隨走避玄曰可速上馬偕行於是帝引宮妃等衆從之而行時劉毅見玄走江陵聚集諸將商議進兵去追桓玄因上言曰諸桓世居西楚郡下皆爲竭力桓振勇冠三軍不可追趕且宜頓兵以計策謀之耳何無忌日今出師以來十攻十破百戰百勝欲擒桓玄逆賊宜於速追何自阻慢軍心又曰今之大勝而追猶如破竹之勢數節以下迎刃而解諸君不去吾自追趕言訖獨自引部下之兵去追將至江陵桓玄見後有追兵急使桓振率軍回馬拒戰無忌與桓振交鋒大戰未上二十餘合無忌大敗走回來見劉毅劉道規言及失利一事道規曰桓玄今去不遠可驅大隊軍馬連夜去追無忌日止隔三日程途道規曰既然如此星夜去追於是道規劉毅及何無忌總率三軍星夜趕來卻說桓玄既挾天子走至江陵及入江陵見城池崩壞恐不能守複挾天子覓船登舟浮江東下遇著劉毅何無忌劉道規等引兵追至毅等大叫留下晉天子還我又罵桓玄無義之賊何敢謀劫聖駕桓玄大怒自出交戰未至二十余合桓玄大敗走下五十餘裏桓玄計遣庾雅祖何澹之等乘其舟仗旗幟以拒裕等自挾帝連夜走守湓口澹之依從其計何無忌劉道規等率兵共有七千七百人連晝帶夜追至桑落洲澹之等所乘舟幟與玄無二無忌日賊帥必不居此欲惑我耳今衆寡不敵戰無全勝此舟戰士似弱我以勁兵攻之必得之攻之則彼勢沮而我氣倍宜速攻之破賊必矣衆軍遂攻得之因傳呼曰已擒何澹之諸軍何不早降賊軍驚憂追軍亦以爲然乘勢破之人衆皆各走了遂進湓口進據潯陽城遣使奉送宗廟神主還京師
