body:
  text: 第八回束皙誠心祈天雨卻說中國吳中大旱連月不雨百姓屢祈未應史說束皙字廣微陽平元城人漢踈廣之後王莽末廣曾祖盂達避難自東海定居沙鹿山南因去踈之足遂改姓束焉束皙博學多聞少有德行遠近皆知時值天早無雨百姓相謂曰吾聞仁德動天致誠感應今聞此處束廣微先生仁聞州裏德播日新不如請其求雨天必有濟衆耆曰然因是百姓來請束皙祈雨皙欣然從命齋戒沐浴禱告上天須臾天即下雨三日不息萬物回生由是百姓感之乃作歌歌之曰束先生通神明禱天三日雨零零我黍以育我稷以生何以酬之願束長生束皙自此朝野知名武帝聞知擢爲著作郎時武帝朝會群臣問中郎摯虞曰三日曲水之義卿知之乎與朕言之虞曰漢章帝時平原徐肇以三月初三生三女三日俱亡時人以爲怪乃招攜之水濱洗祓遂因水以泛觴其義起於此也武帝曰必如卿之所議便非嘉事時皙在側因進曰虞小生不足以知臣請言之昔周公成洛邑因流水以泛酒故逸詩雲羽觴泛波又秦昭王置酒河曲見金人捧水心之劍曰令君制有西夏乃霸諸侯因此立爲曲水二漢相緣皆爲盛集流至今也何得以三月生女即死之義耶武帝大悅曰卿才果有大過人者就以皙爲尚書郎賜皙黃金五十斛皙謝恩而退
