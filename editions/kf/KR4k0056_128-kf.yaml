body:
  text: 第一二五回靳准謀滅漢王粲八月靳准與弟靳術商議曰今漢王粲無道烝亂宮室不理朝政吾欲勒兵誅之取其天下你可助我一臂之力共享富貴術曰願從兄命准曰來日弟與吾二人勒兵入宮盡誅劉氏百官自從計會已定次日靳准靳術兄弟各披甲執銳領甲兵二萬人術引兵突入宮廷但見閹官不論大小盡皆殺之靳准斬關而入樊陵許相出殿來呼不得無禮術立斬二人以下盡皆奔走趙廣夏勝四個趕在翠華樓上放火跳下樓就樓前被剁做肉泥宮中火焰沖天漢王粲同五皇后並內省官屬複從走北宮靳准正在宮中環甲持戟立于閣下望見漢王擁五後過來大呼烝賊休走喝衆軍向前將漢王粲並五後擒住又令軍士入宮將漢王宗室劉氏男女少長盡皆殺之准自出坐殿上靳術領甲兵環立四邊命手下軍呼集百官至殿下謂曰今漢王粲不親政事淫亂太后吾故殺之自代其位諸大臣順者高官逆吾者必誅汝等心下何如群臣皆不敢逆只得山呼萬歲畢准自謂曰吾自稱爲大將軍漢天王也又謂胡嵩曰自古無胡人爲天下者今以傳國璽付汝還于晉家嵩不敢受准怒殺之又命武士將漢王粲並五皇后宗室男女少長三百餘人斬於東市又使人發掘元帝劉聰墓取出棺槨焚之燒其宗廟盡皆滅之靳准既即天王位以弟爲丞相總督中外諸軍事又遣使告司州刺史李矩曰劉淵屠各小丑矯稱天命使二帝幽沒卿等輒率衆扶持梓宮以還請以上聞李矩得其語馳遣人上聞之于晉帝晉帝大悅使太常韓胤等前去奉迎梓宮靳准欲以王延爲左光祿大夫延罵曰弑主逆賊何不速殺我以吾左目置西陽門觀相國之人也再以吾右目置建春門觀大將軍之人也准怒殺之卻說相國劉曜聞平陽大亂每日啼哭自長安發兵討之石勒聞知亦率精兵五萬以討靳准據襄陵北原靳准探知二處起兵亦引兵十萬來迎戰勒堅壁以挫之十一月呼延晏私奔來報相國劉曜時曜兵至壘延晏迎著哭說靳准謀逆之事相國曜大哭昏倒在地衆將急曰死者不可複生痛之無益曜停哀命將土舉哀數日晏入內曰今少帝爲賊所弑殿下宜即大位以安衆心曜從之乃即皇帝位於赤壁改元戊寅爲光初元年下詔以石勒爲大司馬加九錫進爵爲趙公於是勒始進兵攻准平陽以及羌羯降者十余萬落勒皆從於所部
