body:
  text: 第九十七回張光視死如登仙十月氐羌楊茂搜之子楊難敵遣其子販易於梁州被梁州刺史張光殺之及光與王如餘黨楊虎相攻光不能勝使人求救于楊茂搜茂搜遣難敵以兵來救光被楊虎竊知密使人持金寶厚賂難敵反與虎夾擊張光大敗攖城自守憤激成疾僚屬勸光退據魏興光按劍曰吾受國重任不能討賊今得死如登仙何謂退也聲絕而卒難敵知光死了城中無主驅兵攻拔梁州入屯紮之卻說陶侃既受荊州刺史屯沔江與諸將謀興兵來長沙擊杜弢杜弢亦引軍出迎兩下交兵於城下弢又敗被侃揮兵大破之弢逃入城堅守不出
