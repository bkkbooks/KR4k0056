body:
  text: 第二九三回慕容盛複登燕位己亥三年正月燕王寶被尚書汗謀弑太子慕容盛與張真等謀複誅汗龍城遂平群臣複請太子慕容盛登基國號大燕改元建元元年慕容盛既即皇帝位次日大排宴宴群臣于新昌殿燕王盛謂諸文武曰今日宴樂諸卿各言其志朕自覽之斯時盛初即大位以威嚴驕下暴戾少親多所猜忌刑必就戮文武莫有敢對者兵部尚書丁信年方十五歲趨步進言曰在上不驕高而不危臣之願也燕王盛知其諷己乃笑曰丁尚書年少安得長者之言乎於是文武各爲樂飲至晚罷散十一月魏王珪領軍進九門時天行大疫三軍人馬並牛羊等死者十之五六群臣鹹思北還因上言曰今天行時氣大疫流行軍民百姓死者將半天時如此不利不如退避其氣不然軍民盡死得地者閑魏王珪曰斯固天命將若之何四海之人皆可與爲國在吾所以撫之耳何患乎無人也因此群臣不復再言遂引軍入鄴城聞百姓有老病不能自存者詔令郡縣賑恤之魏王珪既入鄴城自與文武遍覽宮殿遂有定都其地之志乃置行台領衆還來中山中山之守戍兵俱各潰散魏王乃令衆遂入中山城珪謂諸將曰今幸祖宗之靈天地之佑諸將之勇文武之能盡得燕之土地朕欲與卿等北還而恐山東有變群臣答曰陛下可調將守之萬無一失魏王珪從之乃於中山置行台詔封東平公拓跋儀爲衛王總兵五萬鎮守中山又詔使洛陽公遵總兵四萬鎮渤海之合口是月辛酉日魏王珪車駕與衆振旅還京回至舊都下詔有司定議國號群臣上曰昔周秦以前帝王居所生之土及王天下即承爲號今國家啓基雲代應宜以代爲號魏王珪曰昔朕遠祖總馭幽都控制通國雖踐王位未定九州逮及朕躬掃平中土凶逆蕩除遐邇率服仍宜先號爲魏不必再更於是複號爲魏群臣皆賀次日率衆還都平城魏王詔令即營宮室建宗廟立社稷正封畿制郊甸遣使循行郡國舉奏守宰不法者魏王珪親覽察黜陟之十一月魏王珪始登皇帝大位改元爲天興元年詔鄧彥海典官制立爵品定律令協音樂詔儀曹郎中董謐撰郊廟社稷朝覲饗宴之儀詔三公郎中王德定律令申科禁詔太史令晁崇造渾儀考天象使吏部尚書崔宏總裁之因是命朝野之人皆要束發加帽逆者罪焉二月高車聚三十餘部落謀叛魏王珪聞知遣張兗以兵五萬北巡命諸將三道襲高車高車兵少畏戰自潰因此大破高車三十餘部獲七萬多口馬三千余萬匹衛王拓跋儀別將三萬騎追至絕漠千餘裏又破其七部諸部大震各散於是收兵還訖卻說南涼王禿發烏孤集百僚謂之曰隴右河西本數郡之地遭亂分裂至十余國今欲取呂氏乞伏段氏孰強吾今欲取之三者何先楊統曰乞伏本吾部落終當服從段氏書生無能爲患且結好於我攻之不義呂光衰耄嗣子微弱纂弘雖有才而內相猜忌若使浩亹廉川乘虛叠出彼必疲於奔命不過三年兵勞民困則姑臧可圖也姑臧舉則二寇不待攻而服矣烏孤曰善遂從之初秦王苻登之弟廣率衆依南燕王慕容德德受之令其屯於乞活堡至後燕勢衰弱乃自稱秦王時滑台孤弱土無十城衆不過萬附德者多去附廣德大怒乃留魯王慕容和守其城自率衆五萬去討廣廣無備被德入堡執廣斬之慕容和長史李辯見德去了乃集黨殺和以滑台降于魏魏王珪使行台尚書和跋率輕騎五千自鄴赴滑台其城空虛入城中悉收德宮人府庫財寶當時陳潁之人多附于魏燕將軍慕容雲聞知有變率衆斬辨衆將士出迎德德大驚欲還攻滑台韓範諫曰向也魏爲客吾爲主今乃我爲客魏爲主人心危懼不可以複戰不如先據一方自立基本乃圖進取可也張華曰先取彭城爲居潘聰曰彭城土曠人稀平夷無險且晉之舊鎮未易可取又密邇江淮夏秋多水乘舟而戰者吳之所長我之所短也青州沃野二千里精兵十余萬左有負海之饒右有山河之固廣固城曹嶷所築地形險峻三齊英傑思得明主以立功於世久矣晉刺史辟閭渾昔爲燕臣今宜遣辨士往說而以大兵繼其後若其不服取之如拾芥耳既得其地然後閉關養銳伺隙而動此乃是陛下之關中河內也德從之於是德乃引師而南兗州北鄙諸郡縣皆降德選守宰以撫之禁軍士毋得擄掠財物百姓大悅
