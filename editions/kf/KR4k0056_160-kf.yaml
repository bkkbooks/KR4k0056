body:
  text: 第一五七回王導計氣王敦死其時朝野將士皆憚王敦不肯向前去戰各自相推當時王導密謂帝曰今敦在將士畏憚不敢向前今聞敦病甚其性極急陛下可作詔書使人送去見敦暴敦罪惡彼心受氣不死將次九分臣歸家率子弟稱敦見詔氣死代其發哀挂孝然後下詔只討錢鳳王含休書王敦則將士認王敦已死必然奮志向前可討王敦彼之將士亦自散矣帝大喜用其計即使人持詔去暴王敦之罪敦得書果慪氣病增臥床不起使人催王含進兵王導歸家數日率子弟挂孝發哀稱說王敦死了兵以爲王敦已死鹹有奮志於是尚書省謄詔遣人送敦府下曰敦輒立元息以自承代不由王命頑凶相弊志窺神器天不長奸敦已隕斃鳳複煽運今遣司徒導等討之諸爲敦所授用者一無所問敦之將士從敦兩年違離家室朕甚憫之其單丁遣還終身不調餘皆與假三年休訖還台當與宿衛同例三番使人持詔下敦府敦見詔大怒而病癒篤欲即起兵使郭璞筮之璞曰無成敦疑璞助溫嶠欲殺之恐人議論敦問曰吾壽幾何璞曰明公起事禍必不久若在武昌壽不可測敦大怒曰卿壽幾何璞曰命盡今日日中敦怒甚收璞殺之乃即召兄王含及錢鳳人告曰吾疾篤難以禦衆汝等可與鄧岳及周撫率衆五萬先向京師吾隨後接應鳳問曰事克之日天子雲何敦曰尚未南郊何稱天子便盡卿兵勢但可保護東海王裴妃而已七月王含水陸五萬奄至江甯南岸人情恟懼溫嶠恐其兵過放火燒了朱雀橋以挫其鋒明帝欲盡將兵擊含聞朱雀橋已焚大怒於嶠嶠曰今宿衛寡弱後兵未至若賊豕突社稷且恐不保何愛一橋乎明帝方息怒命嶠等同屯橋岸矣司徒王導遣使遺書王含曰近承大將軍已不諱兄此舉謂可如昔年之事乎昔年佞臣亂朝人懷不忿如導之徒心思外濟今則不然大將軍未屯于湖漸失人心臨終之日委重安期諸有耳者皆知將爲禪代非人臣之事也先帝中興遺愛在民聖主聰明德洽朝野兄乃欲妄萌逆行凡在人臣誰不慎難導門戶大小世受國厚恩今日之事明目張膽爲六軍之首甯爲忠臣而死不爲無賴而生也含見書怒而不答明帝集諸將商議諸將曰王含錢鳳衆力百倍苑城小而不固趁軍勢未成大駕自出拒戰郗鑒曰群逆縱逸勢不可當可以謀屈難以力競且含等號令不一抄盜相尋曠延日久必起義士之心今決勝負于一朝萬一蹉跎雖有申胥之徒何補既往哉明帝從之明帝乃率諸軍出屯而帝當夜募壯士使將軍段秀等率千余人渡水掩其無備秀等領計率一千二百人夜渡河平旦與含軍相遇於越城兩下交鋒未戰十合王含敗逃被秀大破之而還段秀乃匹磾弟也王含既敗領殘兵退屯於別所王敦聞知大怒曰我兄老婢耳門戶衰世事去矣我當力行因作勢而起困乏複臥乃謂兄子王應曰我死汝便即位先立朝廷百官然後塋葬應拜受其言至夜王敦憤惋而死諸葛瑤謂王應曰今丞相歸天不可發喪若三軍聞知則在外將士不肯盡心出戰不如秘之將鋪席裹屍埋於廳中只管飲酒調將去攻建康待取得京師然後發喪應曰其計甚妙於是使近侍將王敦屍以席蠟塗其外埋於廳中每日與諸葛瑤飲酒淫樂不理軍事明帝雖勝一陣心中猶疑寡衆不敵乃使人說沈充降許以司空沈不奉詔遂起兵與王含合兵來攻建康當司馬顧揚說充曰舉大事而天子已扼其咽喉鋒挫氣沮持久必敗若決破錢塘因湖水以灌京邑縱舟師以攻之此上策也藉初至之銳並東西軍之力十道俱進衆寡過倍理必摧陷此中策也轉禍爲福召錢鳳人議事因斬之以降此下策也沈充不能用劉遐蘇峻得詔率精兵二萬人至次日沈充戰兩下交鋒充鳳大敗被遐峻大破之時潯陽太守周光率千餘人赴敦營求見王敦王應辭以疾重不能出見光料得敦已死乃退謂兄周撫曰王公已死兄何爲與錢鳳作賊耶衆愕然撫方以實告光光遂出佯以爲發兵助鳳因而入斬錢鳳付撫詣闕自請其罪沈充爲故將吳儒所殺傳首建康王含見事不成與王應燒營夜遁次日明帝聞沈充錢鳳之死王含燒營而逃方始收軍回宮卻說王含欲奔荊州其子王應曰不如投江州叔父彬處含曰大將軍素與江州不睦何如欲歸之應曰此乃所以宜歸也江州當人強盛時能立同異此非常人所能及今觀困厄必有湣側之心荊州叔父舒守文豈能意外行事乎含不從遂與應奔荊州荊州刺史王舒遣軍迎之懼朝廷見罪乃以酒款待王含父子二人飲得大醉王舒使人執縛沈其父子于江死之遣使奉表入朝卻說江州刺史王彬聞應大敗當來奔己密具舟待不至深以爲恨而退於是敦党悉平有司奏明帝使人發敦屍焚其衣冠跽而斬之與充風之首同懸于南郊百姓觀者莫不稱慶郗鑒曰前朝誅楊駿等皆先極官刑後聽私殯臣以爲王誅加於上私義行於下宜聽敦家收葬明帝許之敦家人收敦屍首乃葬之王導等皆以討敦功受帝封賞有司奏王彬等當誅明帝下詔曰司徒導以大義滅親猶當百世稱之況彬等皆其親近乎悉無所問帝詔敦綱紀除名參佐禁錮溫嶠上疏曰敦剛愎不仁忍行殺戮處其朝者恒懼危亡原其私心豈遑安處其贊導凶悖自當正以典刑如其枉陷奸党宜施之寬宥明帝覽之未及問郗鑒曰先王立君臣之教貴於仗節死義王敦佐吏雖多逼迫然進不能正其逆叛退不能脫身逃遁准之前訓宜加義貢明帝不從乃聽嶠議而行矣
