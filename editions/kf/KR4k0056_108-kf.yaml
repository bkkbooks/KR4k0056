body:
  text: 第一五回王敦意欲害陶侃初朝廷以第五猗爲荊州刺史杜曾迎於襄陽聚兵萬人與猗分據漢沔侃既破杜弢乘勝進擊杜曾而侃有輕曾之志反爲杜曾所敗死者數百人遂以兵屯駐不戰時荊州都督荀崧屯宛城杜曾乃撇侃以兵來圍宛城時崧軍少食盡恐不能敵欲來求援於故吏襄城太守石覽無人敢往心內大憂當崧小女荀灌娘年十三歲有膽智見父煩惱進曰父親大人休憂女兒願往石太守處求取救兵來解此圍崧執不與行灌娘只管率士五十餘人躍城突圍夜出與曾交戰且戰且前沖出重圍直至襄陽拜見石覽說求救之事覽曰荀使君被困下官理宜發兵奈治下兵少糧稀無將領兵今既小姐自來其勢甚危你且休憂吾兵雖少亦只得行吾有友人周訪吾作書與汝去彼處求救兵彼必能同吾往救於是寫書與灌娘持見周訪訪得覽書視之即命其子周撫率軍二萬來與覽同救襄陽杜曾聞二處救兵至乃引兵遁去撫覽之軍見曾遁去亦引軍還杜曾無城可據恐無倚憑使人于荀崧處求自效崧恐其再攻故許之陶侃聞知遺崧書曰杜曾凶狡所謂鴟梟食母之物此人不死州土不寧足下當識吾言早爲之計崧自思兵少藉爲外援不從侃言杜曾過數月果反複率流亡二千餘人來圍襄陽崧堅閉不出相持月餘曾不能克襄陽引衆而還卻說王敦手下嬖人錢鳳疾陶侃之功屢毀之不止因此侃久沈在外不得錄用侃遂親自來見王敦陳上功勳敦留不遣以侃宛轉廣州刺史以其弟廙爲荊州刺史侃所統荊州將吏鄭板等詣敦留侃複荊州刺史王敦不許於是鄭板等衆情憤怒遂迎杜曾第五猗以拒王廙王廙不敢入荊州乃遁還王敦意鄭板等必承陶侃諷旨始叛乃自披甲持矛將殺侃出而複還者數四陶侃在外正色曰鄭板等來見使君吾未盡知亦不曾一會今雖謀反迎曾非吾所知使君雄斷當裁天下何所不決乎敦始解甲如廁參軍植陶即入言於敦曰周訪與侃姻親如左右手安有斷人左手而右手不應者乎敦意解即出轉怒爲歡乃設盛撰以餞之曰今日是吾不明頗有小失卿勿爲恨僅陳薄酌代卿送行來日卿可速往廣州赴任侃拜謝飲醉而出至夜領自部屬馳入廣州時王機盜據廣州侃至始興州人皆言宜觀察形勢且停數月而去侃不聽直至廣州侃既入廣州安民閱武分守戍邊又遣督護將軍鄭正以軍二千去討王機王機聞知遂逃去廣州遂平史說陶侃字士行本鄱陽人吳平徙居廬江之潯陽父舟娉妾生侃侃家貧賤其嫡母湛氏每紡績資給之使侃交結勝己者爲友侃少曾爲得陽吏奉官差常監魚梁私以一缸魚鮓使人送歸以奉母母不受即封鮓寄還寫書責侃曰汝爲吏以官物遺我非惟不能益吾乃以增吾憂矣侃得書自覺愧怍不能立身揚名以顯揚父母鬱鬱而悵複漁于雷澤因網得一織梭歸至宅以挂於壁間有頃忽雷雨大作其梭自化成龍而去侃又悶悶不已是夜夢身生八翼飛而上天見天門九重將登八重惟一重門不得入去被閽者以杖擊之因墜地折其左翼及醒覺左腋痛次日思想其夢恐不祥因出外行走遇術者師圭侃請其相師圭即相侃至左手因謂曰君中指有豎理當爲公若更徹於上貴不可言侃拜謝歸家以針決上見血其紋成爲公字以紙裹手公字愈明矣侃自是益喜因與友人鄱陽孝廉范達歸家留達宿歇貧無所措侃入與母說留達之事其母湛氏乃撤所臥薪薦自剉給養其馬又自密截發賣與鄰人沽酒供肴饌達聞之歎息曰非此母不生此兒也稱讚不已次日達辭去侃從送百余裏達問曰君欲仕郡乎侃曰困於無津耳言訖二人相辭而行後范達過廬江入探太守張夔共話達稱讚湛氏之德陶侃之賢慕羨不已夔大喜送達出府即使人召陶侃至以爲督郵又遷主簿偶張夔妻某氏有疾夔出堂聞鄱陽鄭醫者用藥如神即問誰人肯去鄱陽請醫此時天落大雪寒不可當況廬江到鄱陽百余裏之程諸官吏皆不答侃獨應聲而出曰資於事以事君小君猶母也有父母之疾而不盡心乎某請行言訖即去請醫人至療夔妻疾愈由是衆服其義夔舉侃以爲孝廉舉至洛陽時郎中令羊晫與陶侃同州裏人晫謁之聞其賢甚敬之曰易稱貞固足以幹事陶士行是也於是與侃同乘來見中書郎顧榮榮亦知其賢甚奇之薦于朝廷因此知名先時嘗與羊晫同乘而行有吏部郎溫雅謂晫曰君何與小人共載晫曰此人非凡器乃國之柱石也後母死即卸職回家居優朝夕涕泣廬於墓側忽有二客來吊不哭而退化爲雙鶴沖天而去人皆異其孝感天地無不敬之因此孝名聞於州裏陶侃既在廣州無事輒朝運百甓於齋外暮運百甓於齋內人問其故侃曰吾方致力中原過爾優遊恐不堪事故習勞耳人皆尚之時十月漢劉曜以兵五萬寇北地進拔馮翊麹允軍於靈武以兵弱不敢進湣帝大驚屢徵兵于相國司馬保保左右皆曰蝮蛇螫首壯士解腕今胡寇方盛且宜斷隴道以觀其變從事中郎裴詵曰今蛇已螫頭頭可斷乎於是即以胡崧爲前部都督領諸軍事湣帝見保軍士不至心中大懼麹允與索綝商議欲奉帝往就保綝曰保得天子必逞其私志允意遂止於是自長安以西不復貢奉百官饑乏采粟以自存卻說涼州軍士拾得玉璽文曰皇帝行璽獻與張寔僚屬皆賀寔曰是非人臣所得留遂獻之于國
