body:
  text: 第十四回賈後南風奪朝權辛亥元康元年卻說皇后賈氏諱南風平陽賈充之女也初武帝立惠帝爲太子時欲取衛瓘女爲太妃因元後納賈郭霍親黨之說欲婚賈氏南風武帝謂元後曰衛公之女有五可賈公之女有五不可衛家種賢而多子美而長白賈家種妒而少子醜而短黑元後固請婚賈氏又使荀勖周顗於帝前稱其美武帝乃定婚賈氏泰始八年拜爲太子妃賈氏既爲妃心性妒忌多權詐太子畏而忌之因此嬪禦罕有進幸者而賈氏性酷虐嘗手殺宮人或以戟擲孕妾子隨之墜地武帝聞知欲廢之楊太后救之曰賈公屢有大勳於社稷豈可以其女妒而忘之耶始得不廢後太后數勸賈氏賈且不知其助己反以爲恨至是不以婦道事太后惠帝既即位乃立爲皇后因不知太后向之救己助己又銜其戒勸之言事太后愈無禮而流淫放恣與太醫程據等亂彰內外使宦豎以箱櫃裝少年入內同寢處有不中意者害之不日洛陽有盜尉部小吏生得端麗一向廝役襤樓垢穢忽一日容儀光彩鮮衣豔服衆吏鹹疑其爲竊來暗以告尉部尉部亦疑而訊之小吏曰非故爲盜也月前夜行逢一老嫗雲其家有女病甚術者曰須得城南少年壓之方瘥欲煩一行自當重報乃隨而去上車下帷納簏箱中覺行十餘裏過六七重門限啓簏而出見樓閣壯麗勝似天宮問此爲何處答雲是天上即以香湯沐浴出鮮豔衣服與吾更換珍肴美食恣其飲食少須引見一婦人年可三十五六形短面青黑色眉有贅瘤與共寢處歡宴數夕臨行以此服相贈仍納簏車而出所遇如此安敢爲盜尉部聽畢知是賈後乃笑而遣之蓋賈後常以此計載人入宮不中意而死者甚多獨此小吏賈後愛之得全而出由是漏泄洛陽城內人盡知之賈後性兇悍多權略每惠帝臨朝賈後必在珠簾後坐若大臣所奏政事賈後不待惠帝聽斷即干預之當太傅楊駿入請曰天無二日民無二主今陛下春秋正當政治多能安用垂簾憂亂治體宜速還宮賈後聞之羞慚滿面低首入宮雖不答話心甚悵恨尋思變怒欲殺楊駿奈無計可施時殿中中郎將盂觀李肇二人當初楊駿面辱心甚惡之及聞賈後與駿構怨因見黃門董猛一同入宮獻謀誅駿賈後大悅問曰卿等以何計可誅老賊觀肇曰臣有一計可殺楊駿老賊猛曰不然滿朝皆其心腹不可與謀娘娘宜使人持書報楚王司馬瑋令其以兵外應方可誅得不然反啓內亂賈後曰然於是賈後遣孟觀以書來見楚王司馬瑋曰吾亦恨老賊久矣必須吾自以兵入朝方可行事觀曰請殿下以兵屯於城外以待內應即行臣先入宮報與娘娘娘娘使人來迎卻說孟觀回宮報知楚王應允以兵屯司馬門外以待內應一事賈後曰此事甚善卿等宜密啓帝稱駿謀反請速下詔收之若更遲延早晚禍生待帝應允頒詔卿等以禁兵討之則楊駿可誅矣孟觀等領懿旨出內殿待帝退朝入宮孟觀奏帝曰楊駿謀反欲奪位陛下宜早圖之不然臣等亦難討亂惠帝曰汝何得出是言觀曰臣知多日矣不得不冒死上聞望陛下火速降詔委臣等與楚王討之緩則必變惠帝方始大驚罵曰老賊欲效王莽因此即命黃門董猛草詔誣楊駿謀反命東安公司馬繇率殿中四百人及楚王司馬瑋入朝共孟觀等討之孟觀得詔出迎楚王瑋入屯司馬門又以詔召東安公繇入內領禁中四百人埋伏計策安排已定俱各以兵埋伏次日孟觀入宮見賈後說計成必須娘娘矯聖上手詔去宣楊駿入內執而誅之然後臣等以兵夷其三族賈後大喜即矯惠帝手詔使人持去宣揚駿入議軍國大事使人持詔至楊駿府中說聖上在宮內詔太傅入宮共議軍國大事駿聞詔欲往其弟楊濟楊珧止之曰前日吾兄面抑賈後今日無事宣入內宮必有詐謀切不可去去必有患待來日大朝兄可與弟告老休致免累三族矣楊駿曰帝現有詔在此有何患焉若內有變皇太后必有密旨何故慮之楊濟等曰交構已成尚欲入宮何不早決楊駿始悟即召官屬至曰吾盡忠報國念日聖上在宮內有手詔召我入宮同議軍國大事吾二弟濟珧以爲詐故求一決耳當主簿朱振曰吾揣楚王瑋無故入朝必有謀明公之心此定是閹豎爲後謀不利於明公爲今之計宜速燒雲龍門以脅之索造事者首引外營兵擁皇太子入宮取奸人殿內震恐必斬送之不然無以免難矣楊駿素性怯懦不決乃曰魏明帝所造雲龍門功費甚大奈何燒之正猶豫皇太后楊氏在宮聞知急自作書令人射出城外曰有人救得楊太傅者千金賞萬戶侯當被賈後宮中人拾得將來呈于賈後賈後因宣言太后同楊駿謀反即令孟觀催東安公以殿中兵出以火燒楊駿公府楊駿大驚逃入於廄中被兵擁入就殺之遂收楊濟楊珧及張劭段廣等人皆夷三族珧臨刑告東安公繇曰吾昔有表收在石函可問張華繇不聽叱左右斬之
