body:
  text: 第二二七回燕王托孤慕容恪冬十月諸葛攸複將水陸二萬擊燕人自石門屯於河渚燕王雋使上庸王慕容評率步騎五萬與戰東門攸病三軍無主因此大敗晉穆帝聞知遣迎詔書前來使謝萬郗曇主討萬曇複伐之萬矜豪傲物但以嘯詠自高未嘗撫衆兄安深憂之謂萬曰汝爲元帥宜數接對諸將以悅其心豈有傲誕如此而能濟事耶萬乃召集諸將一無所言直以如意指四座雲諸將皆勁卒諸將益恨之安慮萬不免乃自偏師以下每親造諸將善言撫諭厚相親托既而萬不敢進師衆人皆賴以援洛陽曇以病退屯彭城萬以爲燕兵大盛故曇退即引兵還衆遂驚潰萬狼狽單騎歸軍士欲圖以安之故止晉帝聞知以詔廢爲庶人降曇號建武將軍於是許昌潁川譙沛諸城相次陷沒遂爲燕所有庚申四年正月燕王慕容雋宴群臣于蒲地閣酒酣賦詩因與群臣談經史語及周太子晉潸然流涕顧謂群臣曰昔魏武追痛倉舒孫權悼登無已孤嘗謂二主緣愛稱奇無大雅之體自曄死以來孤鬃發中白始知二主有以而然卿等言曄定何如也孤今悼之得毋貽怪將來乎時長史李績對曰懿懷之在東宮臣爲中庶子秉質志業臣實不敢不知先太子大德有八未見有缺也至孝自天性與道合此其一也聰敏慧悟機思若流此其二也沈毅好斷理情無幽此其三也疾諛亮物雅悅直言此其四也好學不輟不恥下問此其五也英姿邁古藝業超時此其六也虛懷恭敬尊師重道此其七也輕財好施勤恤民隱此其八也有此八德境內士民實感慕無極燕王雋聞言泣曰卿雖過譽然此兒若在吾死果能無憂今景茂幼沖器藝未舉卿以爲何如績曰皇太子天資岐嶷聖敬日躋而八德暗然二缺未補雅好遊畋娛心絲竹所以爲損耳燕王雋顧謂太子暐曰伯陽之言藥石之惠汝宜識之言畢罷宴歸宮是夜燕王雋寢疾謂太原王恪曰今二方未平景茂幼沖社稷屬汝何如恪曰太子雖幼勝殘致治之主也臣何敢幹正統雋怒曰兄弟之間豈虛飾耶恪曰陛下若以臣能荷天下之任者豈不能輔少主乎雋喜曰汝能爲周公吾複何憂績忠邁清亮汝善遇之召吳王垂還鄴至是疾篤召恪及司空陽騖司徒評將軍慕容根受遺詔輔政謂曰朕欲與卿等平一天下不幸到此難逃此亦天命也又指太子謂恪曰此子年幼今託付與卿卿宜以骨肉爲重以慕周公之德而輔之則吾在九泉之下不忘賢弟言訖淚下如雨慕容恪曰陛下善保龍體不可懷憂太子雖幼吾輔之豈待再三耶雋點首而崩壽四十九歲在位十一年改元者三卻說慕容暐字景茂慕容雋之第三子也雋因長子慕容曄死之故乃立爲太子也燕王雋既死百官舉哀殮葬訖大司馬太原王慕容恪率百官立太子暐爲燕王即皇帝位改元建熙元年以慕容恪爲太宰錄尚書事得行周公之事暐既立大位而庸弱國事皆委之於恪耳當恪奏少主曰李績清方忠亮堪任大事先帝臨終以爲恪言陛下可以績爲尚書右仆射同輔朝政時燕王憾績往在先帝面前言其所短因而謂恪曰萬機之事委之叔父伯陽二人朕請獨裁何如此時李績聞少主之言進憂疾而死臨終謂家人曰吾不聽先人之訓果有今日之故也言訖而卒先是李績之父李虛字子喬初仕石氏後始仕燕曆位尚書前後固辭年老不堪理政燕王雋不許轉拜太子太保臨終謂子績曰以吾之才而至於此始者之願亦已過矣我死之後汝不可以西夕之年取笑於來今也績不能遵依是語而辭退是以憂死也卻說將軍慕容根自恃勳舊有無上之心乃私見太原王慕容恪而言曰主上幼沖母后秉政權在大王何以不因其未定而取之而甘在人下非丈夫之所爲也慕容恪愕曰公醉乎何言之悖耶昔曹藏吳劄並於家難之際猶曰爲君非吾節況今儲君嗣位四海無危宰輔受遺奈何有私議公忘先帝之言耶根乃大懼陳謝而退慕容恪以慕容根言告吳王垂垂曰何不誅之恪曰今新遭大喪二鄰觀釁而宰輔自相誅夷恐乖遠近之望且宜忍之時根私入宮謬言於可足渾後及燕王暐曰太宰太傅將謀不軌臣請發禁兵誅之後將從之暐曰二公國之親賢先帝托以孤嫠必不肯爾安知非太師欲爲亂也乃止根又思戀舊土謀欲還東恪知譖己乃密奏根罪狀燕王暐使恪誅根及其党二十餘人時新遭大喪誅夷狼藉內外憂懼恪舉止如常人不見其有憂色每出入一人步從或說以宜自嚴備恪曰人情方懼當安靜以鎮之奈何複自驚擾恪雖綜大任而朝廷之禮兢兢嚴謹每事必與司徒評議之虛心待士諮詢善道量才授任人不逾位朝臣或有過失不顯其狀隨宜而施時人以爲大愧莫敢犯者或有小過自相責曰爾複欲望宰公遷官耶燕所征辟國兵去冬集鄴複遣伐晉以燕王雋病大閱而罷至是以燕朝多難互相驚動自鄴以南道路斷絕太宰恪大驚急以吳王垂爲征南將軍去鎮蠡台又令孫希傅顔率騎二萬觀兵河南臨淮而還於是境內乃安卻說劉衛辰遣使降秦請田內地春來秋返秦王堅許之夏雲中護軍賈雍率百騎襲之大獲而還奏知秦王堅堅大怒曰朕方以恩信懷戎狄而汝貪小利以敗之何也乃黜雍以白衣領職遣使還所獲並慰撫之衛辰大悅於是入居塞內貢獻相尋時東胡獨孤部及沒弈幹各率衆數萬降秦秦王苻堅處之塞內陽平公融諫曰戎狄人面獸心不知仁義其稽顙內附實貪地利非懷德也不敢犯邊實憚軍威非感恩也今與民雜居彼窺郡縣虛實必爲邊患不如徙之塞外堅從之卻說桓溫聚集文武商議天下之事群佐皆曰今燕王慕容雋新喪主幼才庸若興三軍去伐指期中原可得桓溫曰慕容雋乃英特之士臨死必以其子託付于太原王慕容恪而恪又善撫國家能爲將兵石季龍尚且被執何況今日乎慕容恪尚存所憂方爲大耳何敢進之由是桓溫未敢起兵史說謝安字安石四歲時桓溫見而歎曰今此兒豐神秀致及總角神識沈敏風宇條暢善於書弱冠時詣王溕清言良久既去溕子王脩問父曰向客何如大人溕曰此客亹亹爲來逼人王導亦深器之由是少有重名寓居會稽與王羲之及許珣支遁交通遊處出則漁弋山水入則言詠屬文無出世之意除尚書郎琅玡王交辟並不起常往臨安山中坐石室臨深谷悠然歎曰此去伯夷何遠乎然雖寓居會稽以山水自娛雖爲布衣時人皆以公輔期之士大夫至相謂曰安石不出如蒼生何安石每遊東山常以妓女相隨時會稽王司馬昱聞之曰安石既與人同樂必不得不與人同憂召之必至安妻劉惔之妹也見家門貴盛而安獨靜退謂丈夫不如此也安掩鼻曰恐不免耳及弟萬廢黜安始有仕進之意安時年已四十征西大將軍桓溫聞之使人請拜爲司馬安聞召即至溫大喜拜爲司馬深禮重之凡有軍國大事悉皆咨之辛酉五年是歲涼奉升平之號燕守將呂護遣使來建康降晉晉帝拜爲冀州刺史護欲引晉兵以襲鄴燕太宰恪聞知乃將兵二萬討之護嬰城自守將軍傅顔請恪急攻之恪曰老賊經變多矣觀其守備未易猝攻然內無蓄積外無救兵我深溝高壘坐而守之休兵養士離間其党于我不勞而賊勢日蹙不過十旬取之必矣何必多殺士卒以求旦夕之功乃築長圍守之
