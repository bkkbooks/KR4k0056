body:
  text: 第五十四回匈奴元海稱漢王史說前趙先號漢王劉淵字元海乃匈奴人名犯高祖廟諱故稱其字焉初漢高祖以宗女爲公主以妻冒頓約爲兄弟故其孫子遂冒姓劉元海父名約爲左賢王然皆家于晉陽汾澗之濱妻呼延氏無嗣乃備牲酒至龍門祈子囑訖俄而有一大魚頭有二角軒鬐朱須躍鱗浮至祭所久之乃去巫覡皆異之賀曰此乃嘉祥必生貴子及回是夜夢其所見之魚化爲一人左手把一物大如半雞子光亮非常授與呼延氏曰此是日精服之生貴子呼延氏服之寢而告劉約約曰此乃吉征也果有孕十三月生元海左手文有其名遂以名焉幼好學尤好左傳孫吳兵法略皆誦之史漢諸子無不綜覽嘗謂同門生曰吾輩觀書傳嘗鄙隋陸無武絳灌無文道由人弘一物之不知者固君子之所恥也於是遂學武事妙絕於衆猿臂善射膂力過人儀偉人皆敬之淵既爲左賢王聚集宗室飲宴當從祖劉宣指劉淵謂衆族人曰自漢亡以來我單于徒有虛號無複尺土自余王侯降生編戶今吾衆雖衰猶不減二萬奈何斂手受殺奄過百年今左賢王英武超世天苟不欲興匈奴必不虛生此人也今司馬氏骨肉相殘四海鼎沸複呼韓邪之業此其時也衆昆侄曰謹聽約束於是劉宣乃相與謀推劉淵爲大單於宣又曰今議已定不能歸國將若之何班部中轉出一人姓胡名延攸言如瓶瀉口若懸河言曰某願見皇太弟司馬穎以三寸不爛之舌說其令大王歸國如何宣曰得君高論說得還鄉大事濟矣論將安出攸遂近宣附耳低言數句宣大喜曰妙矣言訖使攸來見皇太弟穎穎正坐府堂忽胡延攸至言訖立在一邊其時正值王浚東贏公騰起兵攻穎穎遣將拒戰皆敗而還延攸將此情由人說曰今聞王浚東贏公騰二子在外爲亂屢次與戰不利今左賢王祖在匈奴已故今欲回國奔喪命臣告知殿下請爲殿下還國就說匈奴五部國王以兵來救國難同討二子則二豎之首可指日而懸國門也不知殿下以爲如何穎聞其說大悅乃諾攸曰就拜他左賢王爲北單于參丞相軍事你可令他速去速回不必面君吾自奏知於是攸歸告劉淵淵次日辭穎因說穎曰今二鎮跋扈恐非宿衛及近郡士卒所能禦也臣請還國說五部來救國難可克二賊穎曰吾欲奉乘輿還洛陽傳檄天下以逆順制之何如淵曰殿下武皇帝之子有大勳於王室恩威遠著王浚豎子東贏疏屬豈能與殿下爭衡耶但殿下一廢鄴宮示弱於人洛陽不可得雖至洛陽威權不復在殿下也勉撫士衆靖以鎮之淵爲殿下以五部可討二人也穎大悅乃拜淵爲北單于領丞相軍事因是淵辭穎與攸召集宗人所部即忙起行至左城國劉宣與衆立淵爲大單于招軍買馬積草聚糧二旬之間得胡晉之兵二十余萬當宣謂群臣曰昔漢有天下之初恩結於民吾漢氏之甥約爲兄弟今兄亡弟紹不亦可乎不如建號大漢汝等以爲何如群臣曰大善於是乃建國號曰漢推左賢王爲漢王改元元熙元年追尊漢安樂公爲孝懷皇帝設廟四時祭之以右賢王劉宣爲丞相崔遊爲禦史陳元達爲黃門以族子劉曜爲建武將軍招集軍馬以候大舉不在話下此五胡亂華之首也
