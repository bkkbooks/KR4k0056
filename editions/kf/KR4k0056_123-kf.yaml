body:
  text: 第一二回李矩遣將奪漢營卻說榮陽太守李矩聞洛陽太守趙固率兵攻漢被漢太子粲兵所敗乃遣將軍郭默郭誦領軍一萬來救趙固誦等既領兵出謂部將耿稚曰今漢太子劉粲屢勝趙固必不設備更謂困窮無救不知我等動兵你可引精騎八千曉行夜伏去到漢營待夜舉火燒其積壘擂鼓呐喊稱道晉兵百萬在此劫營彼必自相殘殺乘亂而入可得漢營彼必逃潰若得其險要則劉粲可擒稚得令即出引精騎八千依計而行來到漢營果無准備至夜耿稚令諸將放火鳴鼓呐喊漢太子劉粲聞知晉兵劫寨乃引心腹逾營先走奔據陽城漢兵無主俱各不知是計以爲晉兵已殺入營又黑夜並不相認俱各自相殘殺亂竄逃潰耿稚等乘勢殺散其衆入擄其營救滅其火於是稚等獲漢器械軍資不計其數漢王聰聞知大驚急使太尉泡隆率騎二萬來助太子劉粲合兵圍住其營稚見李矩大兵不至令軍士殺所獲牛馬而食之放火焚其軍資以兵突圍而出奔武牢關屯住於是趙固得此一軍爲救徐徐而退屯住朝廷聞知李矩遣將大破漢太子劉粲之兵使人特詔以矩都督河南三郡諸軍事卻說都尉陳安與相國司馬保舉兵逼上邽縣保便使告急于張實實遣步騎一萬救之軍至新陽聞湣帝崩司馬保欲謀稱尊號破羌都尉張詵知而言於實曰南陽王輕忘大體而亟欲自尊不能成功晉王近親且有名德當率天下以奉之實從之遣牙門將軍蔡忠奉表詣建康及至晉王已即帝位重賞蔡忠而還然實竟不用江東年號自稱建興四月帝加王導驃騎大將軍開府儀同三司於是導使從事顧和等行揚州郡國從事去而複返各言二千石官長得失獨顧和無言導問之和曰明公作輔寧使網漏吞舟何緣采聽風聞以明察爲政耶導咨嗟稱善時漢螽斯則百堂火焚燒死劉聰之子二十一人聰痛哭不已
