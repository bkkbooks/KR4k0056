body:
  text: 第二五一回韓氏女築夫人城戊寅三年四月秦王苻堅遣長樂公苻丕將軍荀萇石越慕容垂等四道會兵三萬共攻襄陽百姓大驚諸將李伯護等皆懼宜爲備獨梁州刺史朱序曰秦無舟楫焉能攻我不足爲慮諸君勿憂既而石越率兵五千浮渡漢水皆來至城下序大駭始召百姓固守中城越以兵攻陷外郭城既克其外郭獲船百餘艘以濟餘軍及苻丕兵到督諸將攻中城朱序母韓氏聞秦兵將至自登城履行西北隅見其崩以爲不固親率百餘婢及城中女子築新城於其內及秦兵至西北隅果被見破綻乘此攻潰序率衆移守新城襄陽人謂之夫人城桓沖在上明擁衆七萬欲來救援憚秦兵強盛不敢進時苻丕欲急攻襄陽將軍荀萇曰吾衆十倍於敵糗糧山積但稍遷漢沔之民于許洛塞其運道絕其援兵譬如網中之禽何患不獲而多殺將士急求成功哉丕從之慕容垂拔南陽執太守鄭裔與丕會於襄陽城丕大喜排宴相慶時秦王堅聞垂又拔南陽城與群臣飲酒以極醉爲限趙整作酒歌堅讀曰地列酒泉天垂酒池杜康妙識儀狄先知紂喪殷邦桀傾夏國由此言之前危後則堅大悅命整書之以爲酒戎自是宴群臣禮飲而已
