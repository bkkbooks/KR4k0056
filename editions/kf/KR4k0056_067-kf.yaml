body:
  text: 第六十五回太弟司馬熾登位九月卻說初祁弘入關成都王穎自武關奔新野會劉弘卒司馬郭嵩作亂欲奉穎爲主不克被誅遂奔濟河收故將土欲赴公師藩被頓丘太守馮嵩引兵圍之執而使人送入鄴范陽王虓將穎納之其故將公師藩欲以兵來救虓將苟晞領兵出襲破之藩衆大潰只得以殘騎交鋒戰未三合藩被苟晞斬之餘衆盡降晞分軍戌鎮自以兵還鄴時范陽王虓已病卒長史劉輿以穎素爲鄴人所附恐其有變僞稱詔以藥酒賜穎死穎官屬聞知皆先逃散惟盧志不去至是穎飲藥酒而死志流涕哭泣收而殯之太傅越聞虓先卒穎因亦死心中大悅乃使人召盧志爲軍咨祭酒志赴領職又將召劉輿左右曰輿猶膩也近則汙人越雖不聽使人召至而疏淡用之輿密視天下兵薄及倉庫牛馬器械水陸之形皆默識之每越會僚佐同議是事輿應機辨畫無不符合於理於是越傾膝酬接即以爲左長史軍國之務悉以委之十一月太傅越意在立熾而帝尚在乃以金賂帝左右以毒置餅中進上惠帝食之中毒而崩時年四十八歲在位十七年百官舉哀發喪葬於太陽陵卻說惠帝先爲太子時朝廷鹹知帝不堪政事武帝亦自疑焉悉召東宮官屬使以尚書事令太子決之帝不能對賈妃遣左右代對令多引古書給事張泓曰太子所學聖上所知臣代對宜以事斷不可引書也妃從之泓代對以草令帝書之上于武帝武帝覽之大悅太子遂安及居大位政出群下綱紀大壞賄賂公行忠賢路絕讒諛得志更相薦舉天下謂之互市焉卻說惠帝既崩羊後自以于大太弟熾爲帝爲嫂恐不得爲太后將立清河王覃侍中劉琨馳告太傅越越即入宮集百官即使人請太弟熾入宮即位熾固辭不受道清河覃本太子也可宜立之孤則不敢當當與令修肅曰太子幼沖多疾不堪攝政今殿下固辭必欲立之若立政出臣下倘有異亂殿下何安不如因文武之心受之則祖宗之柞可保萬年矣熾方諾曰卿乃吾之宋昌也乃即出與太傅越入宮即皇帝大位改元永嘉歲在丁卯尊羊氏爲惠皇后居弘訓宮立妃梁氏爲皇后越複爲太傅總攝朝政按史晉孝懷皇帝名熾字豐度武帝二十五子惠帝立爲太弟因東海王司馬越立之在位六年爲漢將執歸殺之壽三十諡懷帝既立位始遵舊制於東堂聽政每至宴會輒與群臣論衆務考經籍黃門侍郎傅宣歎曰今日複見武帝之世矣
