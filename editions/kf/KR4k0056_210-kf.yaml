body:
  text: 第二七回弋仲司兵討梁犢己酉五年趙王虎自稱皇帝虎既即大位遂大赦境內故東宮高力等萬餘人謫戍梁州行達雍城不在赦例高力督梁犢率衆作亂攻打下辯城掠民財梁犢出戰執斧施一丈柯攻戰若神所向崩潰無人敢拒因長驅而東北至長安衆已十萬樂平張苞領衆五萬拒之一戰而敗犢遂引衆殺入洛陽趙王虎即遣李農率步騎十萬來討之與犢交戰未及數合犢持長斧橫掃中陣殺人如同摧枯拉朽斬將似若切蔥人迎人死馬迎馬亡殺得農兵十傷其七大敗而逃李農既敗逃回虎驚大懼即以其子燕王斌爲大都督統姚弋仲苻洪石閔等率大兵二十萬去討之時姚弋仲聞虎有命討犢率本鎮兵八千餘人來至鄴求見趙王虎虎未出見使宦官引內賜食弋仲怒曰主上召我擊賊當面授方略我豈爲食來耶且主上不見我我何以知其存亡虎忙力疾見之弋仲問虎曰兒死愁耶何爲而病兒幼時不擇善人教之使至於爲逆既誅之又何愁焉且汝久病而立幼兒汝若不愈天下大亂當先憂此勿憂賊也彼等窮困思歸相聚爲盜何能所制老羌爲汝一舉了之弋仲性鯁直人無貴賤皆敬之虎雖被其面抑亦不之罪反賜鎧馬與之弋仲曰汝看老羌堪破賊否言訖乃披鎧跨馬於殿中因策馬南馳不辭徑去遂與斌洪閔等領衆至滎陽次日弋仲手持鐵鞭親出前鋒與梁犢交戰不二合斬犢于馬下殺入犢陣斬以萬計賊衆大潰被苻洪大驅衆軍一掩衆賊各亡散訖於是梁州安寧虎聞之遣使命弋仲履劍上殿入朝不趨封平西郡公以荷洪爲雍州刺史封略陽郡公
