body:
  text: 第九十四回石虎引兵陷鄴台卻說輔漢將軍石勒以從子石虎爲先鋒領兵十萬來攻鄴都三台城兵至城下團團圍繞水泄不通史說石虎字季龍乃勒之從子也犯太祖廟諱勒父朱幼而字季龍故或稱勒弟焉季龍性殘忍好馳獵尤善彈數以彈打死人命軍中以爲毒患勒白母王氏將欲殺之王氏諫曰快牛爲犢子時多能破車汝當小忍之於是留之年十八稍折節勇冠三軍當時將佐親戚莫不敬憚勒始安之爲娶將軍郭榮之妹爲妻季龍攻討所向無敵故勒寵之得以專征伐之任耳此時季龍攻三台城三台軍民皆潰大將軍謝胥勢窮乃率三台流人詣石勒營投降乞活勒欲准降偏將軍李惲上曰南人奸詐多端倘若有變吾等無類矣勒深然之即命將謝胥斬之自上馬出來欲坑其降卒忽見郭敬在內勒認識之乃恩人郭季之於即問曰汝莫非郭季之子乎敬叩頭曰是也勒忙跳下馬執其手而泣曰今日相遇豈非天乎賜其衣甲車馬署敬爲上將軍悉免降者與敬統領昔勒幼貧得郭敬之父郭季資給是故報之耳於是勒領衆人鄴問于右侯張賓曰鄴乃魏之舊都今吾將營建須賢望以綏之誰可信也張賓曰晉故東萊太守趙彭忠亮篤敏有佐時良幹若任之必能允副神規勒從之使人征彭署魏郡太守彭至入見勒泣謝曰臣往策名晉室食其祿矣犬馬戀主切不可忘誠知晉之宗廟鞠爲茂草亦猶洪川東逝往而不返明公膺符受命可謂攀龍之會但受人之榮複事二姓臣志所不爲恐明公之所不許若賜臣餘年全臣一介之願者明公大造之惠也勒不然張賓進曰自將軍神旗所經衣冠之士靡不變節未有能以大義進退者至如此賢以將軍爲高祖自擬爲四皓所謂君臣相知亦是成將軍不世之高何必使之勒大悅曰右侯之言得孤心矣於是賜安車駟馬養以卿祿令其還宅乃辟其子趙明爲參軍命石季龍爲魏郡太守鎮鄴三台勒自領兵還屯襄國卻說華譚嘗在壽春依周馥及聞琅邪王霸有江東乃往從之至是琅邪王睿問譚曰周祖宣何故反譚曰周馥雖死天下尚有直言之士馥見寇賊滋蔓移都以靖國難執政不悅興兵討馥死未逾時而洛陽淪沒若謂之反不亦誣乎睿曰馥位爲征鎮召之不入危而不持亦天下之罪人也譚曰危而不持當與天下共受其責非但馥也睿無以對乃以華譚爲軍咨祭酒時睿參佐多有避事自逸參軍陳頵言於睿曰洛中承平爾時朝士以小心恭恪爲凡俗偃蹇倨傲爲優雅流風相染以至敗國今僚屬皆承西台餘弊養望自高是前車已覆後車又將隨之也請自今臨使稱疾者皆免官睿不從向三王之誅趙王倫也制己亥格以賞功自是循而用之陳頵又曰昔趙王纂逆惠帝失位三王討之故厚賞以懷向義之心今功無大小皆以格斷乃至金紫佩士卒之身符策委仆隸之門非所以重名器正紀綱也請一切停之頵出寒微數爲正論府中多惡之睿出爲譙郡太守卻說吳興太守周圯宗族強盛琅邪王頗疑憚之睿左右用事者多中州亡官失守之士駕禦吳人吳人頗怨圯自以失職又爲刁協所輕陰與其黨謀誅執政以南士代之事泄憂憤而卒將死謂其於勰曰殺我者諸傖子也能複之乃吾子也言訖而卒時鎮東將軍顧榮太子洗馬衛蚧皆卒史說顧榮子彥先吳國人也榮機神朗悟吳丞相雍之後也與弟平及陸機三人入洛時人謂之三俊奉例拜爲郎中曆尚書郎廷尉榮恒縱酒酣暢常謂友人張翰曰惟酒可以忘憂但無如作病何初榮與同僚宴飲見從人執炙食者狀貌不凡其人有愛炙食之色榮即割其炙食與從人吃之坐者問其故榮曰豈有終日執之而不知乎及趙王倫敗榮爲倫長史亦被執將誅而得前執炙食者已爲督卒救之得免後事琅邪王睿以爲散騎常侍年五十七卒史說衛玠宇叔寶年五歲豐神秀異其父瓘此兒有異於衆奈吾已老不能見其長成耳總角乘羊車入市見者皆以爲玉人驃騎將軍王濟玠之舅也俊爽有丰姿每見玠輒歎曰珠玉在前覺我形穢又嘗語人曰與玠同遊炯若明珠之在側朗然照人耳及長好言玄理時王澄有高名每聞玠言輒歎息絕倒故時人爲之語曰衛玠談道平子絕倒澄及王玄王濟並有盛名皆出玠下世人雲王家三子不如衛家一兒玠妻父樂廣有海內重名議者以爲婦公冰清女婿玉潤久之拜爲太子洗馬玠以天下大亂移家南行轉至江夏妻先亡征南將軍山簡見之甚相欽重玠知其有女淑德使人說親簡忻然曰昔戴叔鸞嫁女唯賢是與不論貴賤何況衛氏權貴門戶令望之人乎於是以女妻焉成親遂進豫章其時王敦鎮豫章長史謝鯤先重玠見玠忻然言論彌日敦謂鯤曰昔王輔嗣吐金聲於朝中此子複玉振于江表微言之緒絕而複續不意永嘉之末複聞正始之音何平叔若在當複絕倒矣由是人士皆相重之年二十七歲卒於南昌晉王睿聞知不勝悲歎
