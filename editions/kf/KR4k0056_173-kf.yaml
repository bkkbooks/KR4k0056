body:
  text: 第一七回後趙王勒獲劉曜冬十二月後趙王石勒欲自將兵去救石虎石生程遐等固諫曰大王乃一國之主不可擅離宜命將往救之勒大怒乃按劍叱遐等謂記室參軍徐光曰庸人之情皆謂劉曜鋒不可擋昔日劉曜爲將時引甲十萬攻一城而百日不克師老卒怠吾以初銳擊之一戰可擒矣若洛陽不守曜必自河北卷席而來吾事去矣卿以爲何如徐光曰劉曜乘高候之勢而不能進臨襄國偏守金墉此其無能爲懸軍三時無攻戰之利以大王威略臨之彼必望旗奔敗今此機會所謂天授授而弗應禍之攸集乎定天下在今一舉矣勒笑曰光之言是吾志也勒又問於佛圖澄佛圖澄曰大軍若出必擒劉曜又何必問耶於是勒乃使內外戒嚴令石堪去會滎陽石虎進據石門勒自統步卒四萬濟自大竭謂徐光曰劉曜盛兵于成臯關上乃上策也阻洛水其次也坐守洛陽此成擒矣先是大堨江水流澌風猛人皆難度及勒軍至冰泮風停浪息及勒軍渡畢流澌大至狂風亦起勒大喜以爲神靈之助乃改其地名曰靈昌津領兵複至成臯勒見趙無守兵大喜舉手加額曰此天助我也傳令士卒卷甲銜枚倍道兼行出於鞶訾之間時趙王劉曜與嬖臣等飲博不撫士卒左右或諫曜以爲妖言斬之俄而洛水侯者與後趙前鋒交戰擒羯送之曜聞之知勒自來色變使釋金墉之圍陳於洛西衆十余萬南北十餘裏勒望見之喜曰可以賀我矣率步騎四萬入洛陽令石虎引步卒一萬攻趙中軍石堪以精兵二萬擊其前石勒自將後應次日見洛陽城內兵出料必來戰曜見石勒大驚急使平先領兵三萬爲前鋒自統大衆後應平先與石堪大戰于西陽門石勒亦自貫甲胄引兵五千出閶闔門夾攻之曜聞之乃自飲酒數鬥率步兵一萬至西陽門兩軍呐喊交戰忽山後面一彪軍出旌旗兩路分開一隊馬出打龍鳳日月旗四鬥五方旌旗金爪銀鉞黃鉞白旄黃羅鎖金涼傘蓋下石勒渾身金甲腰挂寶刀立馬陣前罵曜弑君逆賊背主奴家曜大怒挺戟向前來殺石勒勒副將李豐挺槍出馬來迎不上三合曜被傷其手棄戟而走曜少時淫酒末年更甚是日交鋒又飲酒而出因此昏醉大敗奔逃走至石渠醉墮冰上被石堪追及執之當石勒見執了劉曜乃急下令曰吾所擒者劉曜耳今已獲之其餘衆兵隨縱其歸命之路於是其衆都降前趙王曜之太子劉熙見父被執乃率百官領家屬余兵開城門奔上邦去訖石勒便鳴金收軍將劉曜監歸襄國使多兵嚴守勒使劉曜與其太子熙書諭其來降曜乃不聽但囑熙與諸大臣維持社稷勿以我爲念勒大怒令左右殺之乙丑四年先蘇峻叛時逼居民聚之後苑使其將匡術守之至是光祿大夫陸華及弟玩說術以苑城附於西軍百官皆赴鍾雅曰奉帝出西軍事泄蘇逸使任讓將兵入宮收劉超鍾雅二人成帝抱持悲泣曰還我侍中右衛讓奪而殺之因此成帝不能出卻說祖約聞峻死備據曆陽溫嶠使冠軍將軍趙胤率一萬之衆攻拔曆陽約勢窮乃奔走後趙降于石勒卻說趙王曜已死其太子劉熙恐勒再至乃與南陽王胤商議走保秦州當尚書令胡勳曰今雖喪君境土尚完將士不叛當並力拒之若不能拒走未晚也胤以胡勳阻衆謀激天子斬之遂領百官奔上邦關中大亂右衛將軍蔣英擁衆十萬據長安遣使遂降于後趙王勒勒使石生率衆赴之
