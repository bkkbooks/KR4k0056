body:
  text: 第一回王浚王渾大爭功庚子太康元年五月卻說晉世祖姓司馬氏名炎字安世乃河南人司馬昭之子司馬懿之孫也纂魏陳留王之位自立爲世祖武皇帝國號大晉改元太康都於洛陽是歲首月帝以杜預王渾王浚三將率水軍十五萬去伐江東所向皆克浚兵直抵石頭吳主孫皓大懼面縛輿櫬詣浚軍門投降王浚焚櫬受降遂入建業屯紮封宮門府庫令人守把待王渾至明日王渾兵始濟江聞浚已專受納吳降先得入城因此王渾以浚不待己至先受皓降意甚愧忿欲以兵攻浚當參軍何攀諫止之攀又急來勸浚曰足下成此大功朝廷所聞奈王將軍疾足下專納吳降不待其至心甚有不忿之意欲將兵來攻足下昔許由巢父曾讓天子之貴今世稱爲大賢足下何不效之以是功讓與之豈不美乎王浚曰市道之人尚爭半錢之利滅吳大勳安肯遜彼舜何人也予何人也彼丈夫也我丈夫也天生德于予王渾其奈我何吾不憚之何攀又曰功既不讓可將吳主孫皓付與王渾吾與公二人講和此事雲何浚曰此言可依遂以孫皓付與何攀攀請吳主皓出軍門同見王渾渾令人監之方釋此忿史說王浚字士治乃宏農郡人家世二千石浚博覽墳典美容貌不修名行不爲鄉曲所稱晚乃變節疏通亮達恢廓有大志起宅開門前路廣數十步鄰人或謂之太過浚曰吾欲便長戟幡旗衆鹹笑之浚曰陳勝有言燕雀安知鴻鵠之志哉州郡辟爲河東從事刺史燕國徐邈有女才淑擇夫不嫁邈乃大會佐吏使女于內觀之女指浚告母邈遂以女妻之後除巴郡太守吳境兵土苦役生男多不養浚乃嚴其科條示之寬其徭稅遲之産育者與休複所全活者數千人浚至夜夢懸三刀於其臥屋梁上須臾又益一刀驚覺意甚惡之次日問從事孚毅毅再拜賀曰三刀爲州又益一者明府其臨益州矣後果遷爲益州刺史今伐吳有大功王渾欲爭之而王渾雖得監孫皓心終不悅陰使奸細人備書令其子王濟表浚違詔不受節度當周浚何攀諫而不納卻說其子王濟得父之書浼有司奏知武帝請以檻車囚浚武帝弗許命有司以詔書入吳責浚違詔不受節度王浚大驚令人入朝上書曰臣前被詔直造秣陵以十五日至三山渾屯北岸遺書邀臣臣因水軍風發不遑回船及以日中至秣陵暮乃得渾所下當受節度之符欲令明日還圍石頭又索諸軍人名定見臣以爲皓已來降無緣空圍石頭又兵人定見亦非當今之急不可承用非敢忽略明制也事君之道苟利社稷死生以之若顧嫌避咎此人臣不忠之利非明主社稷之福也武帝覽書知王渾嫉浚功高於己冒奏朝廷故不責浚之罪王渾見武帝不罪王浚又使人馳書周浚雲浚燒皓宮得寶私不入朝又奏武帝弗聽王浚探知連忙複遣人上表曰臣犯上幹主其罪可究逆忤貴臣禍在不測孫皓方圖降貢左右已劫其財物放火燒宮臣至乃救止之周浚先入皓宮王渾先登皓舟及臣後入乃無席可坐若有遺寶則浚渾已先得之矣今年平吳誠爲大慶於臣之身更受咎累也武帝覽表作置不問卻說杜預與王渾王浚等既受吳降領衆振旅還京次日王渾杜預王浚等將同吳主面君吳主皓拜伏稱臣武帝宣皓上殿賜繡墩而坐武帝曰朕設此座待卿久矣皓曰臣在南方亦設此座以待陛下武帝大笑設宴待之封皓爲歸命侯以其子孫瑾爲中郎將隨降臣宰皆封列職丞相張悌死節封其子孫史臣斷之雲歷年圖曰破虜堅以孤遠之兵決忠憤之志首犯賊鋒深入洛川除掃陵寢有足多者討逆策以童子提一旅之衆揮馬箠以下江東耆儒宿將狼狽失據開地千里真英才也文帝承父兄之業師友忠賢以成前志赤壁之役決疑定慮以揮大敵非明而有勇能如是乎奄有荊揚薄於南海傳祚累世宜矣侯官景帝皆明惠敢決有先世之風歸命驕愎殘虐深於桀紂求欲不亡得乎卻說王渾王浚二人因伐吳構怨不相推伏互各爭功因是武帝未曾封賞諸將時王渾表浚違詔不受節度專擅吳降宜以加法庶禁將士知勸武帝弗從由是滅吳之勳不有封賞王浚自以功大而爲王渾及黨與所挫抑每入朝奏帝曰臣有汗馬之勞而爲指鹿之愬卻似一無功業矣臣非敢圖賞所以激發之後將士勇於立勳武帝亦不之聽浚不勝忿憤徑出不辭帝亦容恕之次日有司奏王浚違詔人放縱宜請付廷尉問罪武帝不許命廷尉劉訟校二人事功訟以王渾爲上功以王浚違詔爲中功帝怒劉訟折法失理左遷京兆太守既而詔增賈充及王渾邑八千戶進渾爵爲公以杜預王戎皆封縣侯諸將賞賜有差策告羊枯廟封其夫人爲萬歲鄉君食邑五千戶至是王浚每日在家怨望朝廷時有浚之外親益州都護範通知其挹意因謂浚曰將軍功則美矣然恨所以居美者未盡善也浚問曰何如願聞其詳通曰將軍旋旆之日角巾私第口不言平吳之事有問者輒曰聖主之德群師之力老夫何功之有哉如斯顔子之不伐龔遂之雅量何以過之此藺生所以屈廉頗也王渾能無愧乎安能譖也王浚曰吾始懲鄧艾之事懼禍及身不得無言夫不能遣諸胸中是吾偏也於是王浚憤挹之其時人亦以浚功重報輕爲之歎息當博士秦秀上表論王浚功高枉屈武帝始遷王浚爲鎮東大將軍封杜預爲襄陽縣侯因此浚大悅謝恩歸第杜預亦謝恩辭武帝出鎮襄陽預到襄陽以爲天下雖安忘戰必危乃勤于講武申嚴戍守史說預不跨馬射不穿甲而用兵制勝諸將莫及
