body:
  text: 第二五二回苻丕攻陷襄陽城己卯四年二月秦王堅大設朝會當秦禦史中丞李柔奏曰長樂公丕等擁衆十萬攻敵圍一小城白費萬金而無效請征下廷尉秦王堅勿從使持節切讓賜丕劍曰攻一小城久而不下焉能長驅江南來春不捷汝其自裁勿複待面見吾也丕等惶恐次日命諸將並力攻襄陽朱序以擂木炮石打下退歸秦王堅聞襄陽不克欲自將兵來攻陽平公融諫曰陛下欲取江南固當博謀熟慮不可倉猝若只取襄陽親勞大駕所謂隋侯之珠彈於羽之雀也堅乃止朱序屢破秦兵遂不懼丕命諸軍進攻時五督護李伯護見秦兵勢大其城難守乃開門爲內應於是遂克襄陽城朱序送長安秦王堅惜序能守節拜爲度支尚書以伯護爲不忠斬之時秦將慕容越拔順陽執太守丁穆至堅欲官穆固辭不受苻堅以禮遣之即以梁成爲荊州刺史鎮襄陽選才望者禮而用之時晉帝朝會以謝安爲宰相秦人屢入寇邊兵皆失利時衆心危懼安每鎮之以和靜其爲政舉大綱不爲小察時人以安爲王導曰以謝比王文雅過於導焉帝聞秦人寇邊日與群臣機策未下
