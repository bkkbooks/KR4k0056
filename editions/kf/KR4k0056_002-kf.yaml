body:
  text: 第二回罷武備諸胡兵起卻說晉武帝以爲天下平息四海晏然聚集文武商議罷州郡武備大臣山濤諫曰州郡之兵留防境患古來有之豈宜去也伏望陛下學古制而獲大治慎先謨以懷永圖武帝弗聽自主決之次日出詔往發州郡命州郡悉去兵政其詔曰昔在漢末四海分崩刺史內親民事外領兵馬今天下爲一當韜戢干戈刺史分職皆爲漢氏故事悉去州郡之兵大郡置吏百人小郡五十人爲例時交州牧陶璜見沼以爲不可亦上言曰交州東西數千里不賓屬者六萬餘戶服官役才五千餘家二州唇齒惟兵是鎮又甯州諸夷接據上流水陸益通州兵未宜約損以示單虛州郡之兵宜存衛邊城不可約損時山濤極言不宜去州郡武備帝拒不納至永甯以至盜賊蜂起州郡無備不能擒制天下大亂初鮮卑莫護跋始自塞外入居遼西棘城之北號慕容部至孫涉歸遷於遼東之北內附中國數從征討有功拜大單於至是始叛以兵五萬寇昌黎此乃戎亂之始如濤璜所言因此各州郡雪片上表入朝奏知武帝武帝大驚急與群臣計議頒詔去各州郡命刺史各兼兵民之政因是州郡鎮之政尤繁重焉天下不甯其後諸胡因忿憤殺害長史漸爲民害是因此當時都禦史郭欽等上疏曰戎狄強胡曆古爲患魏初民少西北諸郡皆爲戎居內及京兆魏郡宏農往往有之今雖服從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡爲戎有矣伏望陛下以平吳之威謀臣猛將之略漸徙內郡雜胡於邊地峻四夷出入之防明先王荒服之制此萬世之長策也武帝覽之弗從曰秦始皇時築牆萬里以防胡虜誰知禍起蕭牆之內不在匈奴之中今天下一統誰敢貳叛因謂群臣曰朕聞治天下有道在於得人卿等何如不舉賢良方正有才之士入用專進迂闊之言言訖命有司發詔往各州郡命舉賢良方正才學之士赴選朝用頒詔去訖大臣何曾上言曰臣聞廣陵華譚有殊節操好學敏慧陛下若能用之國政可定武帝曰既有此賢即宣至京中親試策之於是遣使往廣陵詔華譚至金階之下譚拜舞畢武帝親策之曰今四海一統萬里同風然北有未服之虜西有醜施之氐故謀夫未得高枕邊人未獲晏然將何以長泯斯患混清六合乎華譚對曰臣聞聖人之臨天下也祖乾綱以流化順穀風以興仁兼三才以禦物聞四德以招賢故勞謙日昃務在擇賢俊義龍躍帝道以光也武帝嘉其對又策之曰舜以二八成功文武以多士興周夫制化在於得人而賢才難得譚又對曰今州郡貢秀孝台府簡賢良譬南海不少明月之寶大宛不乏千里之駒也武帝悅之以爲郎中於是罷朝
