body:
  text: 第一六三回卞壺父子死忠孝戊子三年溫嶠欲救建康以軍集屯於城外峻將韓晃兵至蕪湖司馬流素懦怯聞峻兵至將出戰食飯不知口處慌忙驅兵出陣未及兩戰兵潰大敗而走時蘇峻自將兵橫江而濟亮軍出拒屢敗陶回謂亮曰蘇峻頗達兵機知石頭有重戍不敢直下必向小丹陽南道步來宜伏兵擊之可一戰而擒矣亮又不從時峻懼石頭有重戍不敢下乃令諸軍棄舟從小丹陽步行夜迷失道無複部分至天明方尋路徑而來方列隊伍至青溪柵屯住傳食早有人探知回報亮始悔曰吾不聽陶回之計果中賊人之謀言訖以兵列于宣城湖內待戰是時朝士多遣家人往江東避難惟左衛將軍劉超獨遷妻孥入居宮內以安上心成帝大驚急詔卞壺督諸軍出戰壺忙集請將出西陵與峻交戰壺大敗峻兵攻青溪柵壺又拒擊之峻因風縱火燒台省諸營皆盡卞壺背癰新愈瘡猶未合聽詔即起出兵拒戰至是力竭苦戰與峻交鋒不上十合背上瘡發身死其二子卞昣卞旰聞父戰死遂領部從赴戰亦死其母撫三屍而哭之曰父爲忠臣子爲孝子夫何恨哉時征士翟陽聞之歎曰父死于君子死于父忠孝之道萃於一門蘇峻奸臣亂建康惟有卞壺是忠良單身爲國爲民死二子俱同忠孝亡英名烈烈揚中國赤膽乾乾獨上蒼可憐一家罹國難教人怎不淚汪汪時蘇峻既害卞壺父子引兵殺入城來庾亮見峻兵混殺入城急令軍士排開待戰未及交鋒衆軍見峻兵勢大皆棄戈潰走亮見軍士逃散料不能敵乃引心腹數百人奔走潯陽將行顧謂侍中鍾雅曰吾之此去後事深以相委鍾雅曰楝折榱崩誰之咎也亮曰今日之事不容複言卿當期克復之效耳雅曰想足下不愧爲荀林父耳言訖亮去雅入宮內成帝大驚左衛將軍鍾雅右衛將軍劉超均侍帝左右有黃門李義欲逃私謂鍾雅曰見可而進知難而退古之道也今蘇峻入亂何不隨時之宜與吾同去而在此坐待其斃也雅曰國難不能救君危不能濟若遁避以求免吾懼董狐執筆而書矣遂不行當丹陽尹羊曼黃門侍郎周道盧江太守陶瞻竭力戰峻而死峻兵入台城司徒王導謂侍中褚翼曰至尊當禦直殿褚直入抱帝登太極前殿導及光祿大夫陸曄荀嵩尚書張闓共登禦床衛帝劉超鍾雅及褚翼皆率百官侍立左右太常孔愉朝服守宗廟峻兵入朝叱翼令下翼呵之曰蘇冠軍來覲至尊軍人豈得侵逼於是軍人不敢上殿突入後宮宮人皆見掠奪驅役百官裸剝士女宮有布二十萬匹金銀五千斤錢億萬絹數萬匹峻皆賞之又領軍士數百至太極殿前司徒王導叱曰聖上在此不得無禮蘇峻與軍士同呼萬歲當成帝問曰卿兵不待宣召遂入京師欲何爲也峻乃奏曰中書令庾亮爲政不均賞罰不明苦虐群黎亂殺小臣臣今起兵亦爲社稷之計豈敢叛亂朝廷帝曰今庾亮逃不在朝卿等何不退兵峻曰臣今入朝輔政陛下未曾封爵故不退兵帝曰卿欲何授自擇奏請蘇峻曰司徒王導德望於民宜復舊職祖約廉能可爲侍中太尉尚書令臣爲驃騎錄尚書事其餘百官守舊爵獨庾亮兄弟不許以原例立於朝帝從之祖約蘇峻把握朝政極暴殘酷驅投百官光祿勳王彬等皆被捶楚逼令擔土負泥登築蔣山裸剝士女皆以壞席枯草自障坐地以土自覆以此哀號之聲振動中外弋陽王司馬羕先被庾亮廢之至是詣峻稱峻功德峻複以爲太宰西陽王卻說庾亮被蘇峻殺敗無處安身乃引從人來潯陽投奔友人溫嶠史說溫嶠字太真性敏捷有識量能屬文豐儀秀整善於談論見者皆愛悅之平北大將軍劉琨舉爲參軍元帝初鎮江左琨誠系王室遣嶠將命既至引見帝器而嘉焉於是時江左草創綱維未舉嶠殊以爲憂及見王導共談欣然曰自有管夷吾吾複何慮會琨死薦嶠爲散騎常侍溫嶠將奉命辭母崔氏崔氏以老固止之嶠絕裾而去其後母亡嶠阻亂不獲歸葬由是固讓不拜苦請北歸葬母詔不許嶠不得已乃受明帝即位拜侍中機密大謀皆所參綜詔命文翰亦悉預焉咸和初代應詹爲江州刺史持節都督平南將軍鎮武昌甚有惠政在鎮見王敦畫像言曰敦大逆宜加斫棺之戮受崔杼之刑古人閹棺而定溢春秋大居正崇王父之命未有受戮于天子而圖形于群下命削去之先嬌與亮同爲侍講東宮因爲布衣之交是時亮敗無處奔投特來潯見溫嶠曰蘇峻與祖約謀叛攻陷京師建康傾覆吾奉太后明詔以卿爲驃騎將軍命開府儀同三司檄興義兵共討逆駿嶠聞之號慟曰汝今雖離建康主上幼弱倘被賊害何有所憑太后雖詔爲今之計當以滅賊爲急吾未功而先拜官何以示天下吾不敢當言訖因與庾亮相對悲泣士人聞之者莫不流涕溫嶠素重亮亮雖敗奔至此嬌愈推奉分兵給之三月皇太后庾氏因庾亮違衆議首生厲階及爲元帥兵敗身竄恐禍及族憂慮而崩百官舉哀葬之諡曰明穆皇后蘇峻恐諸鎮起兵自率衆南屯於湖深慮後變
