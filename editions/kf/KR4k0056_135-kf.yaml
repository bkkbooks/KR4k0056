body:
  text: 第一三二回末柸以兵攻匹磾三年二月段末柸嫉兄匹磾仕晉以十萬兵攻兄匹磾以五萬兵出迎兩下交戰不三合匹磾大敗而逃被末柸追殺傷去大半不敢入城走至冀州城下叫冀州刺史邵續曰爾本夷狄因慕義爲晉破家君不忘舊要請相與共擊末柸續聞言即率三萬生力軍出城助匹磾與末柸相戰未十合末柸大敗匹磾與邵續追及大破之匹磾因勝與弟文鴦率衆來攻薊城邵續收屯軍兵回冀州後趙王勒探知邵續勢孤況匹磾自去攻薊冀虛無援遣石虎將兵攻冀州石虎領兵將至冀州分一萬人潛伏于青山之內自引兵去攻城邵續自出擊虎交戰二十余合石虎佯敗落荒而逃邵續以兵追趕走過伏兵之所被伏兵殺出其後虎引兵殺回兩下夾攻邵續遂被石虎執之押至城下令其招城上出降續大呼兄子邵竺曰吾志欲報國不幸至此汝等努力奉匹磾爲主勿有二心時匹磾聞石虎攻續率衆來助冀州匹磾殺入城與續子邵緝固守冀州石虎見城不下使人送續還襄國白之後趙王勒以續爲忠臣釋而禮之因下令自今克敵獲士必生致之初時吏部郎劉胤聞邵續被石虎所攻乃人內言於元帝曰北方藩鎮惟余邵續一人如使爲虎陷之孤義士之心宜發兵救之帝不從及是聞續已歿乃使人持詔以續仕位以授其子邵緝於是緝領冀州刺史矣
