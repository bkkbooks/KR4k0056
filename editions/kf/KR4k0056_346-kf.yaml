body:
  text: 第三四三回劉裕假道于魏王時劉裕大衆欲溯河西上河西乃北魏王嗣所管地方裕乃先遣人持書見魏王嗣求假河西道過魏王嗣得書急詔文武商議諸公卿鹹曰函谷天險何能西人揚言伐姚其意在魏此事難測宜先發軍斷絕河西上流勿令彼軍過河方保萬全崔浩曰此非上策也司馬休之徒擾其荊州劉裕切齒久矣今姚興死而子幼裕故乘其危亡而伐之臣觀其意必自入關勁躁之人不顧後患今若塞其西路裕必上岸北侵如此則姚氏無事而我受敵矣今蠕蠕內寇糧食又乏發軍赴南北寇進擊若其救北則南州複危未若假之水道縱裕西入然後興兵塞其東歸之路所謂卞莊刺虎兩得之勢也使裕勝也必德我假道之惠設姚氏勝也亦不失救鄰之道縱裕入關中懸遠難守彼不能守終爲我有設若從此不勞兵馬坐視成敗鬥兩虎而收長久之計乃上策也夫爲國之計擇利爲之豈顧婚姻酬一女子之惠也假國家棄恒山以南裕必不能發吳越之兵爭守河北也魏王嗣未答應群臣又曰裕西入函穀則進退路窮腹背受敵北上岸則姚軍必不出關助我揚言西行意在北進其勢然也依臣之料勿使入也魏王嗣曰卿等言之是也遂從群臣之言乃使長孫嵩以兵五萬出屯畔城以兵守北岸置百丈繩牽於河上時劉裕前鋒朱齡石兵至畔城入河時魏軍人緣河南岸守之齡石令三軍漂赴北岸爲魏軍所殺劉裕大驚計遣白直隊丁旿領七百人及車百乘于河北岸爲卻月陣兩頭抱河車上置五百軍士于中俟賊至射之又使人豎一長白旄以爲疑陣陣既成魏軍不解其意並未動手裕召齡石誡之曰汝看白旄豎起引軍赴之汝並齎大弩百張一車益二十人設鼓排於轅上若其兵四至方可發之齡石領命而出依計而行魏長孫嵩見晉兵排營立陣乃驅兵進圍營陣白直隊忙豎起白旄齡石見了先令諸軍以弱弓小箭射之魏軍見敵弱率衆軍四面俱至齡石見其大至弩不能制急命衆軍初排別齎大槌並弩千張矟及斷稍長三四尺以槌之一矟輒洞貫三四人因此魏軍不能抵擋魏軍大潰被齡石斬魏將阿薄于魏衆自散齡石以大軍過河進克蒲扳而西入去攻秦長孫嵩既大敗而還回見魏王嗣說失利一事魏王嗣始悔曰朕恨不納崔浩之言而有此誤矣因此晉魏不和初劉裕命鎮惡等若克洛陽須待大軍俱進鎮惡等既勝乘利輕進潼關爲秦軍所拒久之乏食衆心疑懼欲棄輜重還赴大軍沈林子按劍怒曰相公志清六合今許洛已定關左將平事之濟否系于前鋒奈何沮乘勝之氣棄將成之功乎且大軍倘還賊衆方盛雖欲求還亦不可得下官受命奮不顧身今日之事當爲將軍辦之但不知二三君子將何面目以見劉公之旗鼓乎於是鎮惡等遣使特以告裕求糧救援裕呼使者開舫北戶指河北魏軍示之曰我詔令勿輕進今崖上如此何由得遣軍糧去使人回話鎮惡乃自至弘農說與百姓曰今朝廷以爲關中遭羌酷殘是以命劉公與下官率大軍與百姓除患大軍至此糧乏無措汝等若能率以糧濟滅秦之後奏過朝廷輕搖薄稅同享太平不亦善乎於是百姓歡悅俱應請辦由然百姓競送義款與鎮惡膳軍食遂不乏複振
