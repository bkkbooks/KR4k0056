body:
  text: 第三三四回鎮惡百舸執劉毅時蒯恩以兵五千先發而去鎮惡領百舸命諸軍上船傳令抄小河日夜兼行至江陵止隔五十餘裏屯住蒯恩軍亦至鎮惡自思一計謂蒯恩曰君以三軍盡換兗州刺史劉藩旗號詐言劉兗州還去誘城門彼若問劉兗州何在汝即應道在後軍吾後接應同搶入城蒯恩依計去訖鎮惡亦舍船以兵步行每舸留三五人在岸上招旗擂鼓餘者皆跟鎮惡入城鎮惡臨行謂守船人曰汝等見我將至城下便令請諸軍揚聲大喊曰大軍速行然後可分一軍去燒江津戰船使其不能走脫鼓噪徐進鎮惡計策安排已定遂領步軍即行卻說蒯恩打劉兗州旗號來至江陵百姓皆信是劉藩安然不疑將到城下逢劉毅要將朱顯之守門遠遠望見隊伍兼進乃披挂馳前喝問曰是何處官軍擅至爲何不通飛報恩軍答曰乃兗州劉藩領職回來要見劉公顯之曰兗州何在如何不見恩軍又答曰在後軍顯之又馳往後軍不見劉藩又望見江津自己船艦被燒火焰沖天而起又聽見江中無數戰船鼓噪甚盛而來大喊大軍速進顯之知其不是劉藩便躍馬人城報知劉毅毅乃大驚急傳令緊閉四城門蒯恩軍已入小城了時王鎮惡步軍亦到遂殺進便因風放火去燒大城南門及東門城樓劉毅以兵拒守城門鎮惡計使人以詔及赦書並劉裕手書凡三函使人入城示毅招毅早脫兵權即赦其罪如違擒誅不恕使人持詔赦書與劉毅毅皆不受投火燒之時城內亦未料劉裕自來俱各固守鎮惡領短兵出戰令軍人高叫曰大尉劉裕奉朝廷旨親提大軍三十萬戰船五千隻在後而來汝等諸將如何抗拒朝廷自取滅門於是毅軍將士人情懈怠各自逃潰劉毅知必不守乃單馬率左右走出大城東門而去鎮惡見毅兵潰去身先登城將士一擁而上得入大城鎮惡身被五箭猶前手執矛馳戰開門毅自思孤不敵衆恐被裕殺乃棄衆走鎮惡方始鳴金收軍收毅黨鎮惡盡皆誅之是時毅見城中兵散乃率左右突走夜投佛寺安歇僧拒之勢窮懼獲自縊而死寺僧將其屍首送與鎮惡冬十一月朔王鎮惡平江陵二十日劉裕大軍始至鎮惡引衆將士來迎劉裕入城將劉毅首級呈上請將入江陵曉諭諸軍安撫百姓令人收毅屍首葬之劉裕親往其墓吊祭再拜而哭哀慟過禮顧謂諸將曰吾想昔日與劉毅共起義兵誅桓玄複晉室同討燕超共破盧循其功亦高誰料今日謀反自取咎耶是故使吾慟心而流涕也言訖諸將亦潸然出涕悲傷不已令人賜金帛糧餉以安劉毅之妻使其回京口去訖史說劉毅剛猛沈斷而兼勇狠與劉裕不相推服每覽史簡至藺相如屈降于廉頗輒絕歎以爲不可能也嘗雲恨不遇劉項與之爭中原裕初征盧循凱歸晉帝大宴群臣于西池有詔文武賦詩毅上雲六國多雄士正始出風流毅自知武功不竟故示文雅有餘也後於東府與衆聚樗蒱大擲一判應至數百萬余人並黑犢以還惟劉毅及劉裕在後毅次擲得雉大喜搴衣坐床畔謂同座曰非不能焉不事此耳劉裕惡之因擲五木久之曰老兄試爲卿答而四子俱黑其一子將躍未定裕厲聲喝之即成盧焉毅一見意殊不快面如鐵黑
