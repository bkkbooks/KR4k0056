body:
  text: 第七十六回猗廬大破鐵弗氐初匈奴劉猛死劉虎代領其衆居新興號鐵弗氐與白部鮮卑皆附於漢並州刺史劉琨將討之恨力不及史說劉琨字越石中山魏昌人少得雋朗之目自負志氣有縱橫之才而頗浮誇與范陽祖逖爲友俱以雄豪著名永嘉元年惠帝以爲並州刺史至是白部鐵弗爲亂意甚憂之卻說北胡白部大人結連鐵弗劉虎共計狄兵十萬人大掠邊城劉琨聞知白部大人並鐵弗氐劉虎爲亂連兵擾境急忙寫表令人申奏朝廷晉懷帝聞知發詔回並州令劉琨隨便起軍征討琨大驚恐寡不敵衆與王平商議平曰今北魏穆帝拓跋猗廬部下雄兵百萬戰將千員與本朝和親不如割西河地與之料穆帝必從起兵前來助戰裏應外合可擒白部大人矣琨曰恐他不肯動兵平曰可使君公子前去爲質彼自肯動兵琨曰既如此事急矣我就作書汝與公子導即行言訖即喚劉導出曰今白部大人統兵犯境甚急你可同王平去北魏處爲質借兵征討候殺退白部我即將西河之地換汝而還汝宜小心導垂淚與王平便行不數日到北五原呈上文書代主看訖即留劉導當作回書與王平回去乃聚集文武計議起兵五萬乃使太弟之子郁律爲將出並州助戰卻說鬱律姿質雄壯甚有威略後號爲平帝今奉命救援以蔣琰爲參軍以江夏律爲長史以趙延爲大將總督軍馬用西渠爲副將又用北將數十員共起兩部甲兵總計十萬前往並州起發大隊人馬各依隊伍夜住曉行所過之地秋毫無犯卻說白部聽知平帝自引兵來與鐵弗共議分兵二路迎敵鐵弗取左路白部取右路共有五萬軍馬且說鐵弗氐一軍前來迎敵爲頭先鋒姓郎名喚使支大戟有萬夫不當之勇生得身長九尺面貌醜惡離了大寨而來拒戰北兵卻說平帝大兵已到境界前部大將西渠副將張疑抵前入界首與煥軍馬相遇列成陣勢張疑出馬與煥交鋒戰數合疑詐敗煥隨後趕來走不數裏西渠王興齊出絕其後路疑複回三將夾攻生擒郎煥解至大寨來見平帝平帝教斬卻說鐵弗劉武見部將被捉大驚急來與白部大人商議進兵當白部大人令金單花奴阿會三大人各領兵五萬分三路迎敵平帝軍馬三人得令即出營寨金單大人領兵取左路進花奴大人以兵取中路進阿會大人以兵取右路進各帶五萬胡兵分路而進卻說平帝軍行五十裏下寨三路左右中各有報馬報胡兵三路而來迎敵平帝在帳中見說喚趙延至帳前卻待吩咐故不開言又喚西渠至帳前吩咐又不開言卻又喚王平伯恭至前吩咐曰今胡兵分三路而來吾欲使趙延西渠二人去敵爲此二人不識地理吾不敢用王平汝可往左路迎敵伯恭汝可往右路迎敵吾令趙延西渠隨後接應汝二人今整頓了軍馬來日平明進兵王平伯恭聽令而行又喚張疑吩咐你領一支軍馬取中路去敵胡兵今日整頓軍馬明日平明約會左路王平右路伯恭一齊進兵趙延西渠隨後接應皆聽令去了趙西二人面有怒色平帝曰吾非不用汝二人恐失銳氣也趙延曰倘我等識得地理如何平帝曰若如此吾用汝爲大將趙西二人辭退平帝隨即喚回吩咐曰你二人是中年人物休被胡兵算計自宜小心趙延二人到自己寨中商議曰吾二人是中年人不用我等爲先鋒卻用後生言吾二人不知路徑因此羞辱於我輩真可氣也西渠曰我二人各上馬親自去探路拿住土人教他引路趙延從其言二人上馬徑取中路而來行不數裏遠遠望見塵頭起二人策馬上山坡看時早見胡兵哨馬數十騎來往巡哨趙延西渠分兩路沖出去胡兵見了大驚而走趙延西渠各生擒一人回寨問其路徑胡兵曰前面是金單元帥大寨正在山口寨邊東西兩路卻通五溪元帥花奴寨並諸洞使阿會之寨之後趙西二人聽知這話當晚點起五萬精兵教擒來二人引路二更左右明月當空趙西二人同去劫寨來到金單寨邊已及四更諸胡方起造飯準備日間廝殺趙延西渠兩路殺人胡兵大亂延直到中軍正遇金單交馬只一合刺殺金單于馬下割了首級餘軍潰散趙延便分一半軍與西渠抄東路花奴寨自領一半軍投西路抄阿會寨趙延二人卻從胡兵寨後殺出將及到寨時天色微明卻說西渠殺奔花奴寨花奴已自知了引軍出寨後拒敵只聽前寨門大喊原來王平軍馬已到兩下夾攻胡兵大敗花奴沖條路走脫背後西渠追趕不及卻說趙延殺到阿會寨時伯恭引軍先到內外攻擊胡兵亂竄阿會死戰得脫白部知三路敗亡遂引本部兵迎敵北兵四下圍裹將來左右衝突白部鐵弗又逢劉琨引大兵攔住去路後兵趕著白部大人鐵弗劉武衆將一湧齊上生擒押赴大寨來見平帝兵降者無數平帝盡收之命將白部大人鐵弗氐劉武盡斬之次日並州刺史劉琨一班兒將官以牛酒糧米來北寨謝平帝犒勞北軍平帝大悅留坐備酒相待就要索西河之地琨答曰大王暫且引兵還國吾寫表奏過晉帝降詔前來交割其地必然有丹詔來封贈殿下矣平帝曰君言亦是來日退兵還國不可失信於是送劉琨還州次日自領衆軍還國朝見穆帝去訖劉琨歸州即時使人上表入朝奏與晉帝盛稱拓跋助國大破白部大人及陷鐵弗劉武之功懷帝大悅使人奉詔入北進穆帝爲代公封爲大單于國割西河五縣馬邑陰館樓煩疇崞陘南與北單于穆帝大喜置酒相待來使就請劉導同飲次日各以珍寶貢賀晉帝又使劉導與使歸還並州因此穆帝又得其地東接代郡西連西河朔方數千里其時與白部爭戰五縣人民逃散猗廬乃徙人十萬家充之於是大霸匈奴之地時北地屬幽州王浚管穆帝遣人來守代郡王浚方知劉琨表以地割猗廬浚由是與琨有隙深恨之乃以兵出拒猗廬之衆被猗廬殺敗走回幽州不敢複出猗廬既得志以封邑去國懸遠民不相接乃遷部落萬餘家自雲中入雁門從琨求陘北之地琨不能制且欲倚之爲援以其地與之由此猗廬益盛琨遣使入朝言于太傅越請兵共討劉聰越忌苟晞爲後患遺書不許時京師饑困日甚太傅越使人以羽檄征天下之兵入援京師懷帝親謂使臣曰爲我詔征諸鎮今日尚可救後則無及矣使人去了卒無至者止有荊州都督山簡遣人以兵五千入援又被漢王如敗走還王如遂大掠沔漢直進逼襄陽時懷帝大驚急召文武商議遷都以避其難惟王衍堅執爲不可乃令賣車牛以安衆心漢石勒以兵擊並州王如以兵寇襄陽十一月太傅越見胡寇益盛內不自安乃戎服入內見帝曰今石勒以胡寇占去州郡日甚臣請出討石勒帝曰今胡虜進逼郊畿公豈可遠去以孤根本越對曰臣出而幸破賊則國可振猶強於坐待困窮也言訖乃出率甲士四萬向許昌留何倫防察宮省以行台自隨用王衍爲軍師朝賢素望悉爲佐吏名將勁卒咸入其門於是宮省無複守衛饑死日甚盜賊公行府寺營署並握塹自守越既出東屯項城自領豫州牧初李毅死其子李釗自洛往寧州人奉之以爲主州事遣人詣京師求爲刺史朝廷不許乃以王遜爲甯州刺史遜奉詔至寧州複表以李釗爲朱提太守朝廷許之時寧州外逼於城內有夷寇城邑丘墟遜乃自惡衣疏食招集流散數年之間州境複安又誅土豪不奉法者十餘家州境大治遜乃點所部兵三萬餘出擊五苓夷五苓夷無備被王遜入其營壘盡滅五苓之族因此內外震服甯州始安卻說漢王聰自以越次而立忌其兄恭爲亂乃密使人殺之時單皇太后有美色漢主聰烝焉其子劉乂屢以爲言單氏慚恚至是死乂之寵由是漸衰呼延皇后言于劉聰曰父死子繼古今之道太弟何爲者哉陛下百年後粲兄弟必無種矣聰心然之劉乂舅沖謂乂曰疏不間親而主上有意于河內王矣殿下何不避之乂曰天下者高祖之天下兄終弟及何爲不可粲等既壯猶今日也且子弟之間親疏距幾主上寧有此意乎遂不聽五年漢嘉平元年正月漢曹嶷以兵五萬寇青州苟晞以六萬人出拒險隘曹嶷不能入境乃還歸漢被晞追出趕殺嶷大敗走回去訖石勒寇江夏吏民聞風皆逃江夏遂被其陷勒意初欲保據江漢張賓以爲不可會軍中饑死者大半乃渡沔寇江夏守之卻說譙周之子居巴西爲成太守馬脫所殺其子譙登逃請劉弘詣兵復仇弘乃表登爲梓潼內史使其自募民兵去討於是譙登募巴蜀流民得二千人西上攻岩渠馬脫無備被譙登陷兒獲之遂斬馬脫哭祭其父而食其肝遂據涪城成主李雄遣五節以兵一萬來攻涪城屢爲譙登所敗至是連圍三年譙登食盡援絕士民熏鼠食之餓死甚衆無一人離叛者及是成兵攻陷其城登被成兵所獲來見成主雄雄欲宥之登詞氣不屈遂遇害卻說巴蜀流民在荊湘間爲土民所困苦湘州將軍馮素與蜀人汝班有隙言于刺史苟眺欲盡誅流民流民大懼四五萬家一時俱反以醴陵令杜弢爲湘州刺史以領其衆以拒苟眺卻說揚州都督周馥以洛陽孤危表請遷都壽春太傅越恨馥不先白己大怒使人召馥馥懼不行太傅越密使人命琅邪王睿攻之於是睿遂引兵攻馥馥大敗而走琅邪王遂以王敦爲揚州刺史都督征討諸軍事三月苟晞恨太傅越易其鎮移檄諸州陳越罪狀懷帝亦惡越專權違命所留何倫等抄掠公卿逼辱公主密使人賜晞詔使討之晞由此興兵欲來討越越亦知其檄罪狀晞領兵攻越先令騎兵收越党尚書劉曾侍中程延斬之越憂憤成疾乃召集諸將士王衍等至臥所謂曰吾自起兵陷穎顒至今得卿等戮力攻戰必克今爲強漢所困無能解救是以憂憤成疾量必不起汝等各效忠義之心毋懷懈怠之意殺退漢兵保輔少主言訖淚下如雨遂以後事付王衍而次日卒越既卒收鹼訖衆將士共推王衍爲元帥衍不敢當奉越喪欲還葬何倫聞知越卒以裴妃及世子司馬毗自洛陽東走城中之民爭隨之來奔越喪時懷帝亦知越卒乃追貶越爲縣令詔以苟晞爲大將軍都督青徐兗豫荊揚諸軍事晞得志焉
