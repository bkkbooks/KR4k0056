body:
  text: 第二三六回孫盛作兩晉春秋卻說晉大司馬桓溫聞秦王猛伐燕急與郗超王珣等議曰今秦將王猛伐燕倘其得燕必有窺伺江南之意以何計防之郗超上言曰可發徐兗二州民夫築城於揚州廣陵之地明公以兵徙鎮廣陵秦雖有百萬之衆不能過也桓溫然之即遣使發徐兗二州民夫二萬人築長城於廣陵未經百日築完桓溫引衆徙鎮廣陵其時征役頻繁加之疾病死者什四因此百姓皆怨恨秘書監孫盛作兩晉春秋直書時事史說孫盛字安國太原人也博學善言見桓溫枋頭之敗作廣陵之城百姓苦役流亡將盡故作晉春秋以直書之桓溫聞知使人察之使人去長沙竊訪回報曰春秋內書枋頭之事道明公進無威風來儀之美退無鷹鸇搏擊之用徘徊湘洲將爲怪鳥桓溫大怒曰雖有失此安可書吾過事言訖喚從事王珣至曰你代我往長沙巡按收孫盛父子前來改卻枋頭一事免被後人謗議當是王珣領命帶從人去長沙稱孫盛受百姓賂賄私謗朝廷令使使收之乃以檻車收盛父子到廣陵桓溫問盛曰汝作春秋吾與汝無仇何故直書吾失盛答曰春秋之事以正王法安敢私意韓信佐漢亦嘗敗于楚孔明興蜀亦曾敗于吳枋頭一失書之無私明公何故發怒溫無以對命左右放釋之喝其出去而謂其子孫放等曰枋頭雖爲失利何至乃如尊君所言若是史遂行自是關君門戶事耳其子放拜謝曰明公休慮吾回請家父改之溫始大喜命其改易卻說孫放出與父孫盛回家時盛年老家居性方嚴有軌度子孫放雖斑白待之愈峻至是盛在家經日閑坐其子放等率諸弟侄乃共號泣稽顙曰桓溫奸雄世之所知大人若不改書春秋枋頭之事則吾家百口必遭其害盛曰若改其事則此書無用後人罵吾不公決不許之時孫放無奈只得私自改之使人送與溫看溫始悅
