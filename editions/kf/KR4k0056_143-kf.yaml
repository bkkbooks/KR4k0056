body:
  text: 第一四回帝以戴淵拒王敦七月元帝見王敦凶逆將顯爲亂與刁協計議以戴淵爲征西將軍都督司豫六州軍事以鎮合淝劉隗爲鎮北將軍都督青徐四州諸軍事以鎮淮陰皆假節領兵名爲征胡實備王敦也隗雖在淮陰朝廷機事進退士大夫帝皆與之密謀敦聞隗領兵鎮淮陰使人遣隗書言欲與之戮力王室共靖海內隗亦遣人答曰魚相忘於江湖人相忘於道術竭股肱之力效之以忠貞吾之志也敦見其書甚怒之元帝知敦有異故以王導爲司空錄尚書事而實疏忌之當禦史中丞周嵩上疏以爲不宜聽佞臣之言放逐舊德虧既往之恩招將來之患帝頗感悟導由是得全史說戴淵字若思廣陵人也有豐儀性軒爽少好遊俠不拘細行常至洛爲劫盜因遇機赴洛若思見陸機船裝甚盛遂與幫徒掠之若思自登岸據胡床指麾同伴取物皆得其宜機察之皆非常人在船屋上遙謂之曰卿才器如此乃行劫耶若思感悟因流涕投艙還其行李而就之機與言遂深加賞異而與之結交焉後若思改舉孝廉入洛陽機薦之于趙王倫曰戴若思誠東南之遺寶朝堂之奇璞也何不用之因是倫乃辟之爲主簿及倫敗始過江歸元帝帝深信之由此有重任焉卻說豫州刺史祖逖聞朝廷以戴淵都督六州逖以戴淵吳士雖有才望無弘智遠識且已剪荊棘收河南地而淵雍容一旦來統之意甚是忡忡又聞王敦與劉刁構隙將有內難知大功不成遂感激發病至九月卒於雍丘豫州士女若喪父母無不流涕皆爲立祠而祭之其弟祖約發喪申奏朝廷至十月元帝聞奏祖逖身死恐羯人犯境乃使人奉詔以逖弟祖約爲平西將軍豫州刺史代領其衆初有妖星見於豫州之分曆陳川謂人曰今年西北大將當死逖亦見星曰爲我矣方平河北而天欲殺我此乃天不佑國也俄卒於雍丘故史臣謂祖士雅慷慨忠義有智略以行之豈惟晉臣亦自古難得之才也惜其未聞道也王敦聞祖逖死益無所忌專意謀貳逖弟祖約既領其衆無綏禦之才不爲士卒所附范陽李産被亂依逖至是見約志趣異常乃率子弟十餘人間行歸鄉里
