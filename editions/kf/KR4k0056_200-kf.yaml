body:
  text: 第一九七回燕王皝滅宇文部卻說燕王皝與左司馬高詡謀伐宇文逸豆歸詡曰伐之必克然不利於將皝即集諸將率兵起行詡告人曰吾此往必不能返然忠臣不避也於是率兵以慕容翰爲前鋒長驅而進宇文逸豆歸聞知燕王率衆犯境即遣南羅大涉夜幹將兵一萬迎戰皝素聞涉夜幹之勇名由是失色謂兄翰曰涉夜幹勇冠三軍不可輕敵宜少避之翰曰涉夜幹素有勇名一國所賴今吾克之其國不攻自潰矣然吾熟知其人雖有虛名實易敵耳不宜避之以挫吾兵銳氣皝曰既如此兄可與戰於是翰與高詡等驅兵出戰涉夜幹亦揮軍出陣兩下交戰涉夜幹持槍拍馬出陣搦戰慕容翰與高詡各舞刀迎戰未十合涉夜幹佯輸而走高詡拍馬追趕不至三十步被涉夜幹伏流弩於陣內一時俱發詡中流矢而退翰亦中其流矢而退還陣涉夜幹追殺入燕陣被翰閃過一旁涉夜幹馬急搶先至中被翰提刀以斬之而屍橫落馬宇文士卒見涉夜幹已死不戰而潰燕兵大勝逐之逐克其都城逸豆歸走死漠北宇文氏由此散亡皝徙其衆于昌黎得地千餘裏高詡因中流矢至是而卒燕王皝不勝傷悼命厚葬之詡善天文皝嘗謂曰卿有佳書而不見與何以爲忠詡曰臣聞人君執要人臣執職執要者逸執職者勞故後稷播穀堯不與焉占候天文晨夜辛苦非至尊之所宜親陛下將安用之皝默然皝滅宇文部振旅還都時熒惑守房心趙太子宣怒領軍王朗會熒惑守房心使太史令趙覽訴于趙王虎曰今熒惑爲怪宜以貴臣王姓者當之可禳國家之患虎曰誰可當覽曰無有貴如王領軍者虎曰次更誰可覽無以對虎因曰惟王波耳即下詔追波前議楉矢事腰斬之群臣奏其無罪後乃追贈司空
