body:
  text: 第二七六回代王會議國號魏丁亥十二年春正月卻説秦王登立世祖苻堅神主於軍中載以輜駢衛以虎賁凡所欲為必啓主而後敢行兵五萬東擊後秦將士皆刻鉾鎧為死休字每戰以劍矟為方圓大陳如有厚薄從中分配故人自為戰所向無前苻登既克南安夷夏歸之者三萬餘戶遂進兵攻後秦王姚萇之弟姚碩德于秦州萇聞知自以兵五千往救登與萇戰大敗之啖青以弓射萇中萇臂上姚萇乃走保上邽城碩德統其衆以拒之秦尚書寇遺保渤海王苻懿自苻丕下邳城之敗走來南安見南安王苻登登大悅即與諸僚議要立懿為主懿乃丕之子也諸將曰渤海王年幼未堪多難非大王不可為也何必讓之於是登自即大位而置百官遣使以苻纂為大司馬封魯王初苻纂自長安奔晉陽襄陵之敗奔丕城至是秦王苻登遣使拜纂大司馬封為魯王纂怒曰渤海王先帝之子南安王何以不立而自立乎長史王旅諫曰南安王已立理無中改今寇虜未平不可宗室中自為仇敵也纂乃受命於是盧水胡彭沛谷新平羌雷惡地等皆附於纂有衆十余萬人卻説濟北太守溫詳屯東河燕王垂觀兵於河上分兵擊之詳奔彭城其衆皆降垂以太原王楷為兗州刺史令其以兵鎮之初垂在長安時秦王堅嘗與之交手語冗從仆射光祚言於堅曰陛下頗疑慕容垂乎垂非久為下者及取燕取鄴祚奔晉晉以為河東郡守至是懼燕勢大不敢拒戰又詣燕軍降垂見之流涕曰秦王待我深吾事之亦盡只為公進讒言秦王猜忌吾懼死而負之每一念之中宵不寐祚亦悲慟賜祚金帛祚辭垂曰卿復疑耶祚曰臣昔者惟知忠於所事不意陛下至今懷之臣豈敢逃其死垂曰此卿之忠固吾之所求也前言戲之耳待之彌厚時垂之子慕容柔及孫慕容盛及慕容會皆在西燕長子城盛謂柔會曰主上中興東西未一吾屬居嫌疑之地為智為愚皆將不免不若以時東歸何為坐待魚肉也遂相與亡歸見垂垂問盛曰長子人情如何盛曰西京擾擾人有東歸之志若大軍一臨必投戈而來若孝子之歸慈父也後歲余西燕果殺垂子孫無遺者卻説代王拓跋圭大會文武商議國號清河郡武城人崔宏上言曰三皇五帝之立號也或因所生之土或以封國之名故虞夏商周始皆諸侯及聖德既隆萬國宗戴稱號隨本不復更立雖商人屢徙改號曰殷然猶兼行不廢始基之號國家雖統北方廣漠之土逮于陛下應運龍飛雖曰舊邦受命維新以是登國之初改代曰魏慕容永亦奉進魏號夫魏者大名州之上國斯乃革命之征驗利見之玄符也臣愚以為宜號為魏也因此代王從之自是改為魏國稱為魏王代王拓跋圭既改稱為魏王因問群臣曰治天下之道何者最善可以益人神智尚書右兵中郎李先上曰惟經書三皇五帝政化之典可以補王者神智魏王圭曰既若此朕集天下書籍如何先曰陛下欲聚亦不難於是魏王大集天下經籍是時後秦王萇遣太子姚興寇魏軍至柴壁報入魏來魏王圭問先曰今聞後秦遣其子姚興犯境朕欲自以兵去討卿有何策以教寡人先上計曰兵以正合戰以奇勝今聞姚興欲屯兵天渡利其糧道大王以兵及其未到可遣奇兵以邀天渡柴壁左右嚴設伏兵備其表裏姚興欲進不得住又乏糧夫高者為敵所棲深者為敵所囚兵法所忌今興居之可不戰而取也魏王圭從其計命叔孫建領精兵五萬先入天渡邀興戰又使長孫嵩張兗二人各以兵二萬埋伏柴壁左右絶其糧道時興兵大至天渡與叔孫建戰建詐敗退一百里餘姚興與伊詳等以兵追過伏兵之所興欲前進被叔孫建塞守險隘不能得入欲屯住又被長孫嵩等伏兵絶其糧道姚興勢窮乃率大衆殺出退後還都被叔孫建三路兵出殺得秦兵大敗而回去訖魏王收兵重賞李先魏王圭密有圖燕之志遣太原公儀奉使至中山探知虛實還言於圭曰燕王衰老太子暗弱范陽王自負才氣臣料燕王若歿內難必作此時乃可圖也今則未可圭喜從之後秦王姚萇遣姚方成攻拔胡嵩壘執嵩數之於何不降嵩罵曰汝姚萇罪當萬死先帝赦之授任內外榮寵極矣乃不如犬馬識所養之恩親為大逆羌輩豈可以人禮期也何不速殺我早見先帝取萇於地下治之方成怒斬嵩三段坑其士卒方成還白後秦王萇萇乃掘秦王堅尸鞭撻剝裸薦之以棘坎土而埋之
