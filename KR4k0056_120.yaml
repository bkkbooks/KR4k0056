body:
  text: 第一一七回晉王容即皇帝位大興元年二月湣帝凶聞至建康晉王自斬衰居廬百官請上尊號不許紀瞻曰晉氏統絶於今二年西都燔蕩宗廟無主劉聰竊號於西北而陛下高讓于東南此所謂揖讓而救火也晉王猶不許使殿中將軍韓績撤去禦座績欲上殿紀瞻叱之曰帝座上應列星敢妄動者斬績不敢上反退入班晉王為之改容欲奉請周嵩上疏曰古之王者義全而後取讓成而後得是以享世長久今梓宮未返舊京未清宜開延嘉謀訓卒厲兵先雪大恥副四海之心則神器將安適哉晉王覽畢將從之百官恨其忤旨乃出嵩為新安太守嵩乃周顗之弟也次日晉王大會文武去討漢劉聰以雪大恥百官諸將不肯行晉王望北而哭情動萬民王導刁協一班文武又表請即帝位表曰臣導等上言邇者劉聰虜弒湣帝天下無主萬民咸思晉司馬氏今上無天子海內遑遑縻所仰戴致各處守吏上書者五百餘人咸稱符瑞圖讖名應大王玉册見於臨安神璽出於江寧其文曰長壽萬年日有重暈又聞重謠雲五馬浮渡江一馬化為龍此天命大王以符中興武帝定有天下國號大晉到此不幸遭胡所滅惟大王乃宣帝琅玡親王之胄仁高德廣天下咸聞民皆仰焉伏望大王應天順人早登大位以承宗廟昭布天下祚永萬年祖宗幸甚晉王覽表大驚曰汝等皆欲陷孤為不忠不孝之人耶王導曰非也劉聰豎子尚自可立何況大王承父兄之基業乎晉王勃然作色曰今湣帝被害孝服在身吾豈能效逆賊所為耶遂大怒而起入于後宮衆官皆散後三日王導又約百官候晉王出皆拜於前太傅卞壺曰天子已被劉聰所弒主上不即帝位而興師討賊是不忠不孝也今天下之民皆欲主上為君與先帝雪仇今主止不行是失民望也願熟思之晉王曰吾雖宣帝之曾玄今普天率土之濱並不曾有半分德澤以及于萬民今立為帝是篡逆也願死誓不為不忠不孝之事汝等欲陷孤萬世罵名乎王導苦諫又並不聽次後凡奏請立位晉王並無半分應允因此王導設計托病不出晉王聽知王導病乃自駕到王導府下車直至臥榻問曰軍師所感何疾導答曰憂心如火焚恐命不久矣晉王曰軍師所憂何事導推託幾次不肯言晉王堅意請問導愀然歎曰導自得遇主上相從到今言聽計從幸主上有建業之地不負夙昔也今文武數百員皆欲主上為君共圖祿爵以耀祖宗不期主上堅執如是則文武皆有怨心不久必皆散去矣文武若散敵人來攻建業休矣導安得不憂也晉王曰非是推阻但恐惹天下之議論耳導曰聖人有雲名不正則言不順言不順則事不成今主上名正言順有何不可豈不聞天與不取反受其咎晉王曰待軍師病起行之未遲王導把屏風一擊外面一班兒大臣皆入拜曰大王既允便請擇日以受大位晉王曰陷吾罵名者皆汝等也王導奮然曰大事已定來日即位言訖各散次日百官具龍旗恭輅儀仗鑾駕迎請晉王登位祭天地侍臣刁協於殿上讀其文曰維大興元年戊寅四月丙子皇帝睿敢用玄牡敢昭告於皇天上帝後土神祗晉有天下歷數無疆于胡人篡盜俘害上帝社稷幸存今劉聰興兵戳害生民罪惡充積群臣將士以為社稷隳廢睿宜修之嗣我二帝代天行罰睿以不惠懼忝帝位詢于庶民外及蠻夷僉日天命不可以不答祖宗不可以久替四海不可以無主率土鹹望在豫一人畏天之明命又懼晉室將湮於是謹擇元日與百僚登壇受皇帝璽綬循燔遍告類於天神惟神享祚于晉永綏四方晉王既受璽綬捧於四面讓之曰睿無才德請有德者立群臣皆曰主上平定天下功德昭于四海況是大晉嫡派宜即正位復何讓焉於是百官皆呼萬歲拜舞已畢改元為大興元年國號東晉以其子司馬紹為皇太子以王導為司徒以導兄王敦為大將軍其餘大臣各有加封
