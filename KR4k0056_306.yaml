body:
  text: 第三三回劉裕寡兵退孫恩孫恩引衆北出海鹽欲報山陰之仇劉裕聞知恩來乃點兵築城於海鹽之北而拒之恩日夜引賊衆來攻其城劉裕憂其兵少乃選敢死之士二千人至夜出擊之賊衆不知裕兵多少乃走時裕雖連勝而深慮寡不敵衆之勢乃思一計至夜偃旗示以羸弱待觀其懈遂率部兵奮擊大破之殺得恩兵十損其七大敗而逃裕兵追下百余裏方返犒賞三軍至八月晉帝設朝群臣奏知劉裕殺敗孫恩之功帝降詔以裕為下邳太守裕得詔即行回京口史説孔靖字季恭好晝臥忽見一神人衣服非常至前謂曰汝速起新天子在門前矣言訖忽不見靖遂遽出門視之並無一人只見劉裕經過忙下階延裕入宅內執手謂裕曰君當大貴願以仆身為托裕曰寒微豈得登庸倘有僥幸必不舍君靖曰必有大用於是置酒相待因與結交禮接甚厚自此二人深相善焉後裕自往下邳之任
