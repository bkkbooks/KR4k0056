body:
  text: 第二一二回冉閔弒鑒改號魏庚戍建元六年閏正月冉閔欲滅去石氏之迹托以讖文有繼趙李更國號曰魏易姓李氏時新興王石祗鎮襄國趙之公侯將校皆出奔從祗祗鹹撫納約一萬餘人祗始知冉閔之謀方招集胡羯將欲討之恐寡不敵未能速進趙之諸將張沈張賀度等擁衆各數萬亦皆別屯不附于閔汝陰王石琨聞閔幽其主鑒率兵二萬前來伐鄴閔即率二軍出城北拒迎兩軍相遇交鋒大戰不數合琨兵大敗閔離城五十裏下營時鑒被王簡監在禦龍觀聞汝陰王石琨兵至密召張沈入觀私謂曰卿乃社稷之臣先君亦曾德汝今冉閔囚朕必有害我之意愁坐卿等故未敢行今聞汝陰王率衆來討閔出外迎卿若能滅邪返正乘虛襲鄴救朕脫斯羅網誓與卿等子孫同榮張沈曰屢有不平之鳴欲誅此賊恨未有便今出城拒戰未回臣即點軍明日閉門先剿絶其反黨後獲石閔以報陛下知遇之恩言訖即出與張賀度等商議早有隨鑒宦者私告閔石閔大驚忙人城內與李農定計次早即入禦龍觀將趙王石鑒殺之又殺趙王石虎三十八孫盡滅石氏之族時百官皆驚士民駭異當司徒申鍾上尊號于閔閔以讓李農農固辭不受閔謂農等曰君既不受吾等故晉人也請與君分割州郡名稱牧守共迎天子還都洛陽如何尚書胡睦曰陛下盛德應天宜登大位晉室衰微遠竄江表豈能總馭英雄混一四海乎閔大悅曰尚書可謂識機知命矣於是即皇帝大位國號大魏改元永興元年以李農為大將軍都督諸軍事史説冉閔字永曾小字棘叔乃石虎之養子也父冉瞻字弘武魏郡內黃人閔幼而果鋭虎撫之為子至是殺鑒而立為魏卻説朝廷聞中原大亂褚後命群臣復謀進取朝議以浩為中軍將軍都督揚豫徐兗青州諸軍事遣使以蒲洪為征北大將軍都督河北諸軍事詔各道進兵時姚弋仲蒲洪各有據關右之志弋仲遣其子姚襄率衆三萬來攻蒲洪洪已知其來亦領軍二萬出迎兩下交兵合戰襄失地利大敗死者過半而還洪擊破姚襄威名大振乃自稱為大都督大將軍大單于三秦王始改姓苻氏以雷弱兒梁穆魚遵段陵為將相各執兵分討不降
