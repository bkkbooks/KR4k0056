body:
  text: 第二十七回賈後逼殺皇太子永康元年正月太子遹見賈謐恃中宮驕貴心有不平之意賈謐聞知其怨己乃讒于賈後曰今太子多蓄私財以結小人者為賈氏故也不如早圖之免纍三族後曰然乃使人召其妹賈午入宮謂曰今聞人言太子欲結黨羽要謀賈氏吾須廢之恨我未有親子奈何午曰此事容易娘娘可詐為有娠待十月滿足內橐物産以瞞朝臣妹今孕滿欲産權住宮中倘若生男娘娘認為己子而撫養之將來主器有何不可然後揚太子遹之短而害之則賈氏三族安若泰山也賈後大悅曰此計甚妙但吾妹生男方好於是詐為有娠奏知惠帝待十月足午果生子賈後冒為己生養在宮中朝野咸知為韓壽之子而後借此朝夕圖謀害太子之計當左衛瓘率劉卞知之以告張華曰今皇后不仁欲廢太子太子若廢天下誰歸華曰君欲如何卞曰東宮俊義如林願率精兵萬人若得公命皇太子因朝入録尚書事廢賈後於金墉城兩黃門力耳華曰今天子當陽太子人子也忽相與行此是無君父而以不孝示天下也雖能有成猶不免罪況權戚滿朝威柄不一成可必乎賈後探知劉卞欲廢己忙請賈午問計午曰不可殺他可升而出之於是賈後以劉卞為雍州刺史劉卞亦知事泄乃自飲藥而死賈後又問賈午曰今事急矣宜害太子你有何計賈午乃附賈後耳畔言計曰如此如此賈後曰此計甚善十二月賈後詐稱惠帝不豫使黃門官召皇太子司馬遹入宮皇太子不知是計即入宮賈後使人監于別宮使婢陳舞詐説聖上命賜酒三斤逼盡飲之太子推故不飲陳舞稱帝所賜安敢推故太子只得飲訖遂大醉賈後即召黃門侍郎潘嶽作誣太子謀為犯上之書令屬草使太子書之太子大醉不醒遂照草謄寫其書曰陛下宜自了不自了吾當為了之中宮亦宜速自了不自了吾當手了之與謝妃共安克期而發掃除患害其時太子醉迷照草而寫之字半不成賈後使人補成之令人扶太子回東宮去訖次日早朝惠帝幸式乾殿賈後佯涕哭將太子書呈與帝覽惠帝大怒召公卿諸王入內以太子之書示之曰太子不仁其書如此將欲弒朕合當賜死諸王公莫敢言者惟張華曰此國之伏禍自古帝王因廢黜正嫡以致大亂也願陛下詳之裴頠曰可先檢校傳書者又請比校太子手書恐有詐妄諸王公議至日西不決賈後懼事有變忙上表曰太子雖不仁且赦其死免為庶人惠帝下詔從之賈後使人將太子司馬遹並其子司馬霖司馬臧司馬尚皆幽于金墉城又使人殺其母謝玖霖尋亦卒當太尉王衍上表請離婚詔許之
