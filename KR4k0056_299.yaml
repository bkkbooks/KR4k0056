body:
  text: 第二九六回劉裕落魄遇聖僧卻説宋高祖武皇帝諱裕字德輿小名寄奴乃彭城縣綏輿裏人姓劉是楚元王交二十一世孫也彭城原是楚都故留裔家焉晉氏東遷徙訖劉氏移居晉陵丹徒之京口裏裕夜生之時神光照室猶如白晝及長雄傑有大度身長七尺六寸風骨奇偉僅識文字不事廉隅小節奉繼母以孝聞常賣履為業好樗蒱為鄉閭所賤獨琅玡王謐見其奇偉深相敬耳是時裕已二十餘歲忽一日賣履積有五日之糧遂懶賣履遂遊京口之竹林寺間耍偶因臥於講堂之前卻説竹林寺衆僧會講佛法忽見講堂毫光燦爛僧人大驚疑是火發即忙呼集衆僧令去救火此時衆僧一發向前來至講堂救火並不見火只見劉裕在講堂前臥下上有五色龍光火焰罩身當時衆僧叫醒劉裕具説與知而賀曰小僧嘗聞龍穿七竅真命天子蛇穿五孔五霸諸侯今金龍護子之體子非諸侯必帝王也裕聞言甚喜乃謝曰上人無妄言吾行止之時嘗見二小龍附翼或樵漁山澤亦曾同侶何足為奇山野庸夫亦不敢望禪師何過贊也言訖衆僧請裕飲茶茶罷裕遂辭僧回家至次日竈下無柴裕乃取斧擔往新洲上去伐獲卻説新洲土神見劉寄奴落魄宋祚當興乃化長蛇攔路與之射傷復變小童傳授金瘡之藥乃稽其王者之興裕來至洲上忽見大蛇長有數丈在渚蟠屈裕驚駭以箭射之蛇被箭傷而遁入獲中裕被嚇亦歸至明日無柴只得復往新洲去伐荻柴及至洲上忽聞荻中有杵臼之聲疑往觀之卻見童子數人皆青衣立於荻中搗藥裕怪問其故童子答曰我王為劉寄奴所傷在此合散敷之裕驚佯挑曰汝王何不殺之童子應曰寄奴乃王者不死不可殺也裕笑叱之童子皆散忽然不見裕乃收其藥認識之返回家數日將藥往下邳去賣卻説黃龍長老知天下之真主在於劉裕是以化為沙門在道俟裕指與功名當裕賣履歸來遇見沙門沙門謂裕曰江表當亂安之者其在君乎君何行此裕曰禪師之言正合吾意奈吾身有賤疾不敢投伍沙門又問曰君有何疾吾教汝醫裕曰我少年有手瘡積年不愈因是無力沙門曰吾有黃藥與君可將敷之必然得好也言訖將藥授裕裕接了沙門忽然不見裕思半晌疑必神助乃拜謝天地回家將沙門黃散敷之一敷就愈其手力更大堪舉千斤因是將其餘黃散及童子所遺之藥寶藏之後每遇金瘡敷之無有不愈裕既得沙門之語常懷在心晉隆安三年十一月孫恩聚衆據會稽作亂劫掠郡縣有會稽附郡太守王德即忙寫表使人入朝奏知求兵征討使人領命去了卻説晉安帝設朝只聽得淨鞭三下響果然文武兩班齊只見文武百官齊立丹墀前八拜後八拜中又八拜三八二十四拜揚塵舞蹈山呼萬歲君臣禮畢晉帝在座上言曰卿各平身有事出奏無事退班於是群臣起立兩邊忽黃門官引會稽使人直至金鑾拜舞已畢呈上表章晉皇披表讀訖大驚謂使人曰汝宜星夜奔郡令太守點兵緊守城池朕即發兵來應使人領命拜辭出朝即歸去了當時帝問群臣曰今姦賊作亂誰敢與吾興兵言未畢群臣奏曰衛將軍謝琰前將軍劉牢之此二人智足多謀陛下不如遣其前去征討必然收服帝聞奏即宜謝琰劉牢之二人至謂曰會稽妖賊孫恩作亂遣卿等前去收服卿宜領兵竭力得勝回朝封賞不輕二人聞命即時謝恩出朝領兵放下珠簾衆文武各退班去了卻説謝琰劉牢之二人領兵十萬欲行缺少一個參軍官心下正自納悶忽部下軍人出説曰吾鄉中有一心腹之人乃是楚元王交二十一世孫也姓劉名裕小字寄奴原居京口此人幼讀兵書長習武藝有萬夫不擋之勇身長七尺細眼長髯膽量過人機謀出衆笑齊桓晉文無匡霸之才論管仲樂毅少縱橫之策治兵仿佛孫吳運籌平欺洛灌若將軍這裏少參軍官何不禮請他來必然平服妖賊牢之聞之大喜就令軍人以禮去請軍人得令連夜上馬來到京口即見劉裕俱道妖賊孫恩作反朝廷差衛將軍謝琰前將軍劉牢之領兵前去征討二人令我前來禮請足下為參軍一同去征文書緊急火速要行裕聞大喜即時收拾行李跟同軍人上道來至營前忙引入軍中拜見劉牢之牢之見裕身長七尺相貌魁偉面如碧玉五綹長須垂於腹下牢之心中大喜即便優禮相待與之談論應答如流即拜為參軍裕亦喜之不勝於是牢之傳令三軍望會稽進發不日來到會稽城東五十裏下住營寨
