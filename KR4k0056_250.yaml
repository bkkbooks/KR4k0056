body:
  text: 第二四七回苻洛以兵伐北代卻説北代王什翼犍設朝聚集文武謀議國事卻有部下長孫斤恨代王不録用己乃私藏利刃雜在文武班中時代王什翼犍在禦座坐議國事長孫斤插刃直上來刺代王當太子拓跋實見長孫斤以刃進前大喝反賊休得無禮被長孫斤手起刃下殺死太子實又來刺什翼犍手無兵器長孫斤以刃刺中什翼犍便走中傷左臂當殿下文武各擁搶進將長孫斤縛住代王復坐命將長孫斤痛打一百將出誅之當日代王見太子實被殺死哭無休止乃命文官作文追諡為獻明皇帝至七月太子妻秦氏生皇孫代王與其取名名曰拓跋圭十月秦王苻堅大會群臣于光明殿命文武各賦詩以進時秦州別駕天水薑平子持詩進上秦王堅看詩上有一丁字直而不曲秦王堅問曰卿詩上有一丁字如何直而不曲乎平子曰臣丁至剛不可以屈且曲下者不正之物未足獻也秦王堅笑曰卿名不虛行義必剛也因擢上第時秦王堅曰朕欲平一六合何國當先平子曰北代胸奴居我之後宜先討之時衛辰為代王所逼正使人求救于秦王堅堅欲起兵又聞平子之對秦王堅曰卿言正合我意乃謂唐公苻洛曰朕聞北代君臣大亂非汝莫能討之汝可同大將軍鄧羌朱彤張蠔將二十萬大兵分道去伐苻洛曰臣請就行於是唐公苻洛出朝同鄧羌朱彤張蠔將二十萬大兵望北起程時北代郡縣戍守居民見秦兵勢大莫敢與戰皆望風逃奔因此唐公苻洛以兵長驅大進直至平城東隔五十裏下寨使人打聽虛實未敢逼城卻説代王什翼犍被長孫斤謀反刺傷左脅數月未瘥聞秦兵到來驚得手足無措即忙使西部大人以兵二萬出城與戰秦軍陳中鄧羌見代兵開城出來命軍馬擺開擋住三軍當時西部大人出陳與鄧羌交鋒只一合被鄧羌斬于馬下代兵敗走各奔入城閉住城門不敢交戰代王什冀犍聞知西部大人被秦兵殺死心中大慌乃謂東部大人曰今秦兵勢大難以迎敵此事奈何東部大人曰不如引國人走避陰山招集敗亡軍士待大王金瘡疾好再興兵來復平陽未為晚也代王點首曰大人之謀正合我意於是傳令叫國人及諸部大人三軍人等各收拾隨身器物寶貝來日開北門而逃次日代王下令使東部大人為先鋒代王自領家屬為後隊大開北門衝殺出城奔走至高平屯住高平雜種盡叛四面大亂代王領兵復據漠南築城居之
