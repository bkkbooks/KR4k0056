body:
  text: 第七十五回劉聰殺兄為漢王卻説漢王劉淵寢疾以陳留王歡樂為太宰楚王聰為大司馬大單于並録尚書事安昌王劉盛安邑王劉欽西陽王劉睿分典禁兵聰於年少時不好讀書惟誦孝經論語曰誦此能行足矣安用多誦而不行乎李喜見而歎之曰望之如可易及至肅如嚴君可謂君子矣淵以其忠篤故臨終付以要任淵既卒衆臣立太子劉和即位和性猜忌無恩宗正呼延攸侍中劉秉西昌王鋭説和曰先帝不推輕重之勢使大司馬擁十萬衆屯于近郊陛下便為寄坐耳宜早為之計和信之至夜召劉盛劉欽告之盛曰陛下勿信讒言以疑兄弟兄弟尚不可信他人誰足信哉攸鋭聞知大怒命左右將二人殺之遂將兵五千攻聰于單于台聰聽説攸鋭為亂乃命起兵出臺與呼延攸劉鋭等交戰攸鋭等大敗走入南宮聰前鋒諸軍隨追人南宮遇漢主和大喝休得無禮諸軍將和殺之入內執住呼延攸劉鋭劉秉等皆殺之遂出迎大司馬劉聰人內即位北海王劉乂乃劉淵之子也聰以位讓之劉乂涕泣固辭聰遂即位以乂為皇太弟領大單于以子劉粲為河內王都督中外諸軍事以石勒為並州刺史又立妻呼延氏為皇后以劉殷為太保李弘為大鴻臚其下群臣皆有封贈史説劉聰字玄明乃劉淵第四子也母張氏初孕聰之時夢日入懷寤而告淵淵曰此乃吉祥也慎之勿百至十五個月而生聰年十四究通經史百家之言及孫吳兵法無不誦之既殺兄自立後在位八年改元者四卻説皇太后單氏生得姿色絶美聰愛其麗故立為皇太后每退朝幸其宮與通後事露被其子劉乂以為言謂其不正可汙單氏慚愧後人有詩歎曰堪歎胡人專恃強殺兄自立作君王孰知七八年間事孤子由然亦被傷卻説氐酋蒲洪驍勇多權略群氐皆畏服之漢主聰遣人拜為平遠將軍不受乃自稱為秦州刺史略陽公史説蒲洪家池中蒲生長五丈五節如竹形時人咸謂之蒲家因為姓焉又隴右大雨謠曰雨若不止洪水必起因名洪後以晉穆帝永和間讖文有草付應王義以孫堅背有草付字遂改苻氏矣卻説雍州流民因難逃避在南陽朝廷聞知遣使持詔書來南陽遣流民還鄉里流民以關中荒殘皆不願歸荊州都督山簡見流民不肯歸遣兵五千促發其還京兆又有王如者潛結壯士二千余人乘簡兵不備夜襲其衆大破之攻城鎮殺令長聚衆至四五萬自號大將軍使人稱藩於漢
