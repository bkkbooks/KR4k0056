body:
  text: 第九十六回祖逖擊楫取中原史説祖逖字士雅范陽道人世吏二千石為北州舊姓逖性豁蕩不修儀檢年十四五猶未知書諸兄每憂之後乃博覽書記涉獵古今往來京師見者謂逖有贊世之才先與友人劉琨俱為司州主簿情好綢繆共被同寢中夜聞雞鳴蹴琨覺曰此非惡聲也共起舞焉逖琨二人並有英氣每語世事或中宵起坐相謂曰若四海鼎沸豪傑並起吾與足下當相避于中原耳及京師大亂率親黨百餘人來江南投奔琅邪王睿是日正與刁協卞壺陳頵庾亮甘卓周訪陶侃一班兒文武議事忽左右人入説門外有范陽祖逖特來相投睿命進來祖逖入見行禮畢王曰不辭遠來必有見教祖逖對曰誠恐鄙言殿下不垂清聽臣思晉室之亂非上無道而下生怨叛也由宗族爭權自相魚肉遂使戎狄乘隙毒流中土今遺民既遭殘賊人思自奮大王誠能命將出師使如逖者統之以復中原郡國豪桀必有望風回應者矣何患興不在此時耶睿大喜曰孤本無北伐之志得君之壯令人有意中原矣孤就拜卿為奮威將軍豫州刺史廩千斛布二千匹與卿召募兵渡江北進逖欣然拜領出召募兵得三千餘人次日引衆登舟渡江至中流擊楫而誓曰祖逖不能靖中原而復濟此者有如大江辭色壯烈衆人皆慷慨次日行至淮陰鑄器械甲胄又募得二千餘人進屯豫州安民閲武大興攻討北地士民皆來歸之於是北地遂平由是黃河以南盡為晉土矣逖使人去見琅邪王處報捷王大喜復使使拜祖逖為鎮西大將軍自此逖威名遠播胡人不敢窺兵矣史説並州刺史劉琨聞知友人祖逖為豫州刺史轉升鎮西大將軍心憂自不能先乃移書歸家遺其親故曰吾枕戈待旦志梟群逆常恐祖生先吾著鞭今果然也卻説周顗以兵屯潯水城被杜韜兵圍之陶侃聞知即遣將軍朱伺領軍二萬來救韜已聞知朱伺來乃退兵保冷口侃又使人令伺逆擊之伺得令引軍至冷口韜以兵拒戰次日交鋒韜不能抵敗走被朱伺驅軍追擊大破之杜韜勢孤遁歸長沙伺引軍還王敦使人上表奏侃之功朝廷以侃為荊州刺史命屯沔江城侃既受詔屯沔江招集士衆商議去擊杜韜
