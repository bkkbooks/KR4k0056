body:
  text: 第七十七回勒責王衍亂天下四月太傅越卒王衍保喪還國石勒使孔萇率輕騎追至苦縣東郡將軍錢端出與孔萇交戰十余合錢端被萇殺于馬下萇揮騎圍而射之十萬晉兵無一免者皆被射死將司徒王衍並東海王棺櫬皆擒執回寨見石勒石勒坐幕下孔萇押王衍跪在地下勒問衍曰晉之國事虛實君知可為我言之衍曰城內虛實禍敗之由計不在我今將軍大振威名天下歸心不如乘此立尊號三分天下誰敢阻並且衍少無宦情不豫世事未覺其困晉國虛實明公已知何須問衍勒曰君少壯登朝名蓋四海身居重任何得言無宦情不曉動靜破壞天下非君而有誰人勒意欲準其降故謂孔萇曰吾行天下多矣未嘗見如此之人當可留否萇曰彼乃晉之三公必不為我盡力勒曰既不可留加以鋒刃言訖叫左右牽衍出斬衍臨刑言曰嗚呼吾曹雖不如古人何若不祖尚虛無戮力以匡天下猶可不至今日矣勒令氐人排牆殺之又令剖越柩焚其尸曰亂天下者此人也吾為天下報之其世子毗及宗室四十八王皆死於難惟裴妃為人所掠賣渡江而去初琅邪王睿之鎮建業裴妃意也故睿德之及聞裴妃為人掠賣渡江尋得厚加存撫以其子沖繼越之後史臣斷八王曰昔高辛撫運釁起參商宗室嗣立禍纏管蔡詳觀曩册逖聽前古亂臣賊子昭鑒在焉有晉鬱興載崇藩翰分茅賜瑞道光恆典儀合式兗禮備彜章汝南以純和之姿失於無斷桂陽習果鋭之性遂成凶狠或位居朝右或職參近禁俱為女子所讒次第受誅雖曰自貽良可哀也倫實庸瑣見欺孫秀潛構異圖煽成姦慝乃使元良構凶酷上宰陷誅夷乾曜以躉傾皇綱於焉中圯遂裂冠毀冕幸百六之會綰璽揚纛窺九五之尊夫神器焉可偷安鴻名豈容虛假而欲托茲淫祀享彼天年凶暗之極末之有也冏等父子倡義勤王維鴻業于既成拯皇輿於已墜策勳奇絶良足可稱然而臨禍忘憂逞心縱欲曾不知樂不可縱盈志難持久笑古人之未工忘已事已拙向若采王豹之奇策納孫惠之嘉謀高謝兗章永表東海雖古之伊霍何以加焉長沙才力絶人衷概邁俗投弓掖門落落標壯夫之氣馳車魏闕凜凜懷烈士之風雖復陽九數屯在上之情無奪撫其遺節終始可觀穎既入總大權出居重鎮中台藉以成務東宮資以宅心乃協契河間共圖進取而顒任李含之姦詐仗張方之淩虐遂至滅門喪亡長沙授首逞其無君之志矜其不義之強鑾駕幸巡冀乎有征無戰乘輿西幸非由望秩觀風若火燎原不可撲滅矧茲安忍能無及乎東海糾合同盟創為義舉匡復之功未立陵暴之釁已彰罄彼車徒固求出鎮既而帝京寡弱狡寇憑陵遂令神器劫遷宗社傾覆數十萬衆並垂餌於豺狼四十八王咸損身於鋒刃禍難之極振古未聞雖及楚如猶為幸也自惠皇失政禍起蕭牆骨肉相殘黎元塗炭胡塵驚而天地蔽戎兵接而宮廟隳支屬肇其禍端戎羯乘其間隙悲夫詩所謂誰生厲階至今為梗其八王之謂矣
