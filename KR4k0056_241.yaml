body:
  text: 第二三八回鄧羌寢協司隸戰卻説秦將楊安攻燕晉陽久未下猛聞知乃遂引兵助攻使軍人暗掘地道又使將軍張蠔率壯士數百潛入城中大呼斬關納秦兵遂人晉陽時評屯潞州猛進兵與相持遣將軍徐成探燕軍在何所期以日中還及昏而返猛欲殺之鄧羌固請曰徐成羌部將也願與成效戰以贖罪猛弗許羌怒還營催鼓勒兵將攻猛猛慌赦之羌詣猛謝過猛執其手曰吾試將軍耳將軍于部將尚爾況國家乎猛聞評之為人貪鄙障固山泉鬻樵及水積錢帛如丘陵士卒怨憤莫有鬥志猛聞之笑曰慕容評真奴才雖億兆之衆不足畏況數十萬乎遣將軍郭慶率騎五千夜從間道出評營後燒評輜重火見鄴中燕王急問左右近臣奏説太傅評貪鄙障固山水鬻樵及水積錢帛如山士卒怨恨不有鬥志被秦人放火燒其輜重暐大懼遣人説評曰府庫之積朕與王共之何憂於貧若家國喪亡王持錢帛欲安所置之乎及命悉其錢帛散與軍士且趨使戰評大懼請戰猛陳於渭源而誓諸將士曰王景略受國厚恩兼任內外今與諸君共入賊境當竭力致死有進無退共立大功以報國家受爵明君之朝稱觴父母之室不亦美乎衆皆踴躍破釜棄糧大呼競進王猛望燕兵之衆謂鄧羌曰今日非將軍不能破徑敵將軍勉之羌口若能以司隸見與者公勿以為憂猛曰此非吾所主必須主上許之必以安東太守萬戶侯相處羌不悅而退俄而兵交猛召羌弗應猛馳入臥所就許之羌乃起大飲帳中又呼左右以美酒二壺至一飲而盡即披堅執鋭跨上馬與副將張蠔徐成等大喊一聲運矛馳殺奔入燕軍燕軍人迎人死馬遇馬亡往來衝擊如入無人之境搴旗斬將殺傷甚衆時羌在於燕陳尋殺太傅評正遇著燕將李己兩馬相交未上五合已被鄧羌一矛刺死於馬下又殺入陳遇著燕將吳進又戰戰上二十余合吳進亦被鄧羌殺死混戰一日燕兵大敗當慕容評見前軍大敗引後軍忙退走還潞州西墟收軍折去燕兵二十余萬人正欲下營傳食秦將鄧羌又以得勝之兵來追至此又大戰一陳俘斬燕兵五萬餘人殘兵無心戀戰各自望風潰逃於是太傅慕容評被羌兵殺得單騎逃命走還鄴城被王猛大隊軍馬連更代夜迫至鄴城離東門五裏外屯扎次日麾兵圍住鄴城卻説太傅慕容評單騎走回鄴城入見燕王暐奏知秦兵強盛不能抵擋致被殺傷衆軍臣等獨自回來保城燕王暐曰似此大敗怎生退得秦兵評曰不如堅守待其糧盡破之方可退得燕王暐曰既如此卿火速調撥軍馬守城言未了各門軍士人報秦兵圍城於是慕容評急出點兵守住各門城池亦不出戰卻説秦王苻堅聞知使人回報王猛大捷克陷洛陽長驅大進秦王堅留李威輔太子執政乃自率精兵五萬餘人帶權翼為先鋒亦赴鄴城王猛出帳遠迎入軍中曰臣托陛下洪福諸將虎威先克洛陽後拔壺關所過郡縣皆望風來降何勞大王車駕來臨秦王堅曰聞卿孤軍深入朕憂寡不敵衆故以兵來應是日王猛傳令軍中裝起雲梯四十乘上可容數十人周圍用板遮護下以輪推之每一門各用雲梯十乘城上軍以箭射之下面衆軍各抱矩梯軟索只看城上擂鼓乘勢便上此時慕容評見秦兵中裝起雲梯四面來攻已預先辦了弓箭喚軍士四百人分四門各執火箭待雲梯近城一齊射之王猛自料城中無備大擁雲梯四面競進將近壕邊火箭齊發雲梯皆被燒著城上矢石如雨秦兵不能前進王猛怒曰汝能燒了吾雲梯須無能解沖車之法令軍中連夜排沖車次日四面擂鼓呐喊而進評急令運石盤石磨用藤繩穿飛擊沖車其車皆折王猛又取井闌百尺以射城中又驅兵運土填壕評又於城中築起重牆以禦之王猛見攻不透令徐成引三千鐝钁軍填斷壕塹之處暗掘地道欲從城中湧出評先於城中就挑掘重壕橫截之於是地道軍又不得進晝夜相攻二十餘日無計可施王猛在寨中納悶忽報正北門攻城軍人拾得降書一封王猛將來拆開看時乃是燕王手下散騎常侍徐蔚的降書約定是夜開北城門與秦軍入城猛視之大喜下令軍人各個披挂伺候奪門入城卻説徐蔚與諸人數百各嚴裝飽食至黃昏俱上馬大喊一聲殺出北門邊將守門軍盡皆殺訖以鐵斧砍斷鐵鎖打開城門王猛聽見城中大喊俄而城門大開王猛麾兵殺入城去城中大亂卻説太傅評見秦兵入城忙入宮見燕王暐曰散騎常侍徐蔚謀反開城門降秦今秦兵已入城了請陛下火速與禁兵走回龍城暐大驚領後妃俱各上馬評持槍拍馬當先殺出西門正遇秦將王重交馬便戰戰十餘合評用力刺死王重于馬下保護燕王暐而行時秦王堅入城傳令諸軍不許妄殺百姓於是出榜安民次日登殿升坐慕容垂見燕公卿及故僚各有慍色高弼密言於垂曰今雖國家傾亡安知其不為興運之始耶宜恢江海之量有以慰結其心以立覆簣之基成九仞之功奈何以一怒捐之垂悅從之隨衆而入
