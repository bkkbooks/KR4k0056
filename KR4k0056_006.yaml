body:
  text: 第六回竇龍以謀攻力微當竇龍代父位領衆使人持孝書來報知公主力微力微接得孝書方知嶽父竇賓于十月內身故辟踴慟哭昏倒於地左右急勸曰死者不可復生何苦如是力微始拭淚入內説與公主公主涕泗交流命排車馬要同力微回國吊喪力微急止之曰吾觀舅舅龍虎二人昔嘗屢起害我之心今若歸國恐中其謀宜先以人打探消息方可回國公主聽見其説猶豫不行因此打發使人回去只推力微有疾不能遠行待瘥可再來補禮使人得是語忙回歸報知竇龍竇龍大怒乃召竇虎入內議曰力微詐病不來奔喪必有異志前日細作人回説力微在長川招軍買馬積草屯糧今若不除久則為患吾欲討之恨力不加汝有何計可以教我竇虎曰吾有一策使力微不能脫吾彀中龍曰有何高計願聞其略虎曰可使人再去長川對力微説我父親臨死之時囑咐我兄弟二人他死後汝可起軍發馬去攻取北川與妹夫力微以作嫁資卻把長川易還我部此計若何龍曰北川迢迢取之不易此計莫非不可虎笑曰你道我真個去取北川與他只以此為名實欲取長川教他不作準備今假説去取北川必要從長川經過若過長川力微必然出來勞軍就問他索錢糧去到城下一鼓而擒住了力微以除吾之後患也故兵法曰出其不意攻其無備龍曰此計大妙言畢即遣使人授此意投長川去見力微呈上書信與力微公主同看力微觀書訖對公主説道龍虎二位大舅欲起兵取北川與我為嫁資要我應付錢糧犒勞三軍公主大喜以為是實惟力微心中半信半疑只得打發使人回去道軍馬一至城下準備糧草牛酒犒勞三軍使人去訖公主曰難得兄弟如此好心代取北川你可準備糧草牛酒犒勞三軍力微笑曰你道竇龍兄弟二人真去代取北川欲來攻我也公主曰如何是來攻我也力微曰龍虎二人自討死耳這等計策瞞小兒也瞞不過公主再問如何是計力微曰乃是投餌釣魚之計也虛取北川實欲來害我也只等我與公主出城勞軍就勢拿下殺之攻我無備也公主曰二賊不念我同胞共乳要來謀害如之奈何力微曰公主寬心收拾窩弓擒猛虎安排香餌釣鼇魚只等二人前來他便不死也九分無氣言訖喚北部王才至曰你可持書去見那竇龍兄弟説道我聞知二位舅舅起兵代取北川心中大悅難得二位舅舅如此好心稱謝不盡今準備牛酒糧草整齊專待軍馬來到與公主出城迎接王才領其言語及書信忙來沒鹿回部即入宮內呈上書信具説力微之言與龍虎二人二人聽訖大喜王才即時告辭歸長川報知力微力微又喚大將于龍來聽了計策如此如此其餘我自有擺布自作準備龍虎決策取長川神元先知第一籌貪圖香餌釣鱗鯉誰想翻身入浪遊
