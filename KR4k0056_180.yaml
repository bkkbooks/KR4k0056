body:
  text: 第一七七回張淳假道通建康卻説張駿欲假道于成以通表建康使人求問成王成王李雄不許駿乃遣治中從事張淳稱藩于成以假道去建康雄與百官計議欲偽許之將覆淳於東峽計議已定次日淳入見成王説稱藩假道之事雄曰汝主既稱藩于吾任從卿去往返誠恐西復東都峽有盜阻卿不前淳聞言知其有謀乃謂雄曰寡君使小臣行無迹之地通誠于建康者以陛下嘉尚忠義能成人之美也若欲殺臣當斬之都市宣示衆曰涼州不忘舊德通使琅玡主聖臣明發將殺之如此則義聲遠播天下畏威今使盜殺之江中威刑不顯何足以示天下李雄大驚曰安有此耶前言戲之耳於是罷其計矣當司隸景騫言于成王曰張淳壯土請留仕成雄曰壯士安肯留且試以卿意觀之騫謂淳曰卿體豐大天熱可少停遣下吏先往待涼而行淳曰寡君以皇輿播蕩梓宮未返生民塗炭莫之能救故使臣通誠上都所論事重非下吏所能傳使下吏可則淳亦不來矣雖火山湯海猶將赴之豈寒暑之足憚哉雄亦謂淳曰貴主英明蓋世土險兵強何不稱帝自娛一方淳曰寡君祖考以來世篤忠貞以仇恥未雪枕戈待旦何自娛之有雄甚慚厚禮而遣之淳至半路卒下吏遂致命于建康甲午九年正月仇池楊難敵卒其子楊毅嗣位遣使稱藩于建康成帝從之二月張淳之下吏奉表詣建康朝見成帝及奏淳假道與途卒之事成帝歎息不已重賞下吏復以張駿為大將軍命使之國於是使者每歲往來于建康六月太尉長沙公陶侃卒侃晚年深以滿盈自懼不預朝權屢欲告老回國佐使等苦留之至是疾篤上表遜位奉還所假節鉞麾幢曲蓋侍中貂蟬太傅並八州刺史印傅棨戟軍資器仗牛馬舟船皆有定簿封印倉庫自加管鑰以後事付右司馬王愆期輿車就船將歸長沙顧謂愆期曰老子娑娑正坐君輩及薨諡曰桓侃在軍中四十一年明毅善斷識察纖密人不能欺自南陸訖于白帝數千里中路不拾遺尚書梅陶嘗謂人曰陶公機神明鑒似魏武忠順勤勞似孔明陸機諸人不能及也謝安每言陶公雖用法而尤得法外意
