body:
  text: 第二一九回江逌獻計破姚襄卻説殷浩自此威名日損士民皆怨浩恥其敗乃收集大軍屯北乃謂諸將曰今被羌賊攻敗損去人馬何顔歸見江東一人挺身而出曰今姚襄得勝必然無備正可乘此時以計攻之可復前仇浩視之乃長史江逌字載道乃陳留圉人也博學多智浩因問曰卿有何計教我攻此羌賊逌曰今兵非不精而衆少於羌且其塹柵甚固難以效力吾當以計破之浩曰何計可破逌至浩耳畔如此如此浩撫掌笑曰此計大妙浩即令江逌行計逌即出乃令軍人捕野雞數百以長繩連之又取核桃鏤去中肉以火藥藏殼內對合開一小孔火心霹外以鐵繩縛之擊於雞足之上安排已定是夜傳令叫軍人全裝披挂伺候姚襄營中火起以兵乘亂攻之三軍得令各自準備廝殺至一更時逌使一百軍人將前野雞各帶火藥去姚襄大營左右前後點起火心把雞一放放入姚襄寨中須臾火著群雞駭散飛集襄營城內惹火一時火發營中大亂自相殘殺比姚襄急起與丁零跨馬殺出營來正遇江逌以軍來戰襄與逌交馬鬥上十餘合襄見自兵大亂無心戀戰乃拍馬殺出而走丁零各自逃遁逌以軍與羌兵相殺混至天明逌方始收兵殺死羌卒一萬餘人姚襄與丁零收拾殘兵三萬餘人不敢追浩入拒關中江逌兵少不敢追趕收軍回寨請浩南還於是殷浩領軍還鎮譙城十月涼西平公張重華有疾次子曜靈方十歲立為世子重華庶兄張祚有勇力才幹而輕巧善事內外與嬖臣趙長等結為異姓兄弟初謝艾以枹罕之功有寵于重華左右譖之出為酒泉太守及至此聞重華疾重艾令人上言權幸用事公今將危乞聽臣言命臣侍且言祚及長等將為亂宜盡逐之重華疾甚手書令人征艾輔政祚長等匿而不宣重華卒曜靈立稱涼州刺史西平公長等矯遺命以祚輔政不征謝艾曜靈立未三十日趙長等以言謂衆將曰方今時難未夷四方鼎沸幼主焉能禦衆討賊宜立長君可保境土今西平庶子張祚有文武才不如廢曜靈立之乃西境之福也衆將皆然之於是乃廢曜靈而立祚祚既得志恣為淫虐殺重華妃裴氏及謝艾上書諫而不從反將殺之西土震動民皆駭異而祚自謂得志乃自稱涼王改元和平元年置百官郊祀天地尚書馬岌切諫不可坐免官郎中丁琪復諫曰自武公以來世守臣節抱忠履謙故能以一州之衆抗舉世之虜師旅歲起民不知疲今而自尊則中外離心安能以一隅之地拒天下之強兵乎聞之大怒曰吾意已定汝何諫阻令武士斬之自此士民無望十二月姚襄與權翼議曰今軍新敗倘建康晉帝聞知浩又來攻何以抵敵翼曰火急令人特表入建康見帝説浩無故遣魏憬攻我被我殺之今又以兵襲我退屯譙城不思北伐專欲攻害臣等如此數浩之罪然後將兵濟淮收集亡散以候其來必無慮矣襄然之即遣人入建康見帝於是襄濟淮北屯於盱眙招納流民得衆至七萬分置守宰勸課農桑遣使詣建康數殷浩罪並自陳過責
