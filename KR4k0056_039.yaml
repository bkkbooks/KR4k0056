body:
  text: 第三十八回趙廞起兵據蜀城冬十一月趙王倫以齊王司馬冏有廢賈後之功升為遊擊將軍齊王冏大怒曰廢賈後吾戮力共成汝為相國吾當遊擊心甚不平孫秀聞知懼其有變乃計使趙王倫出齊王冏為東平將軍令其鎮許昌齊王冏意亦不滿次日趙王倫使孫秀議廢賈後之功孫秀乃集衆於朝堂議加趙王倫九錫吏部尚書劉頌曰昔漢之錫魏魏之錫晉皆一時之用斷乎不可周勃霍光其功至大不聞有九錫之命也張林欲殺之孫秀曰殺張裴已傷時望不可復殺頌乃止百官看見張林欲殺頌懼不敢逆俱各從議秦帝下詔加趙王倫九錫之禮復加其子司馬乂及孫秀張林等官並居顯要趙王倫及諸於頑鄙無有識見而孫秀狡猾貪淫所與共事者皆邪佞之士惟競榮利而無有深謀遠略志趣乖異互相憎疾然孫秀子孫皆形貌短陋如奴僕之下者秀乞帝女河東公主而為駙馬衆為恥之時賈後已誅後宮久虛孫秀奏惠帝以其黨尚書郎羊玄女羊氏立為皇后卻説趙王倫欲篡位恐賈氏之親在外為變矯詔征益州刺史趙廞為大長秋以成都刺史耿滕代之趙廞乃賈後姻親聞朝廷征甚懼恐入朝見害心下自思晉衰陰有據蜀之志乃心生一計即發倉廩以賑流民厚遇李特兄弟以為爪牙特等持勢聚衆為盜耿膝密使人上表道流民剛剽蜀民懦弱主不能制客必為亂階宜使還本地廞聞之大怒屢欲攻滕會朝廷詔至以滕代己為刺史乃乘此以計使益州文武千余人迎滕於小城待至殺之時滕守成都小城廞守益州大城益州文武千餘人至小城迎滕滕欲趨去功曹陳恂諫曰今使君與刺吏構怨已深彼還在未離豈可即去不如留小城以觀其變然後檄諸縣合村堡以備秦氏方可以往也不然必墜其計矣滕不從收拾本部行至益州趙廞遣兵五千伏城內滕入無備遂被所殺餘衆盡降於是趙廞就以滕兵來攻西夷校尉陳總總甚憂主簿趙模曰彼兵未至今當速行招衆助順討逆誰敢動者總緣道停留北至魚涪津廞軍已至止隔一百餘裏模又曰事急迫火速散材募兵以拒不然我寡敵衆難以決戰總又不聽衆遂自潰廞兵大至總出馬與戰未十合被斬于馬下招集其衆遂降於是趙廞始勒兵還益州自稱為益州牧置僚屑易守令李庠等亦以四千騎歸之趙冏委以心膂使其招募六郡壯勇二萬餘人以斷北道卻説散騎常侍張軌以時方多難陰有據河西之志因見趙王倫曰西涼盜賊生髮屢屢攻陷諸郡臣請為將去討不日可平趙王倫從之即以張軌為涼州刺史令其去討於是張軌即出朝以宋配汜璦為謀主以軍二萬人來涼州與鮮卑寇狼交戰兩軍對圓寇狼出馬與軌交鋒不數合斬狼于馬下盡降其衆軌與汜璦等引軍入據涼州招集軍馬糧草堆山因此威名震西土
