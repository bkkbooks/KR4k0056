body:
  text: 第十九回楚王司馬瑋執政卻説賈後在宮中愁悶忽賈謐送惠帝回宮因見賈後不悅遂問之賈後以前事一一對賈謐與惠帝説知惠帝曰汝南王乃先帝舊臣若有變異豈待今日因之淚流滿頤又曰朕見楚王讒佞多猛屢逆詔旨且今賞功罰罪皆非朕意若不早除後必為患汝反欲殺汝南王耶言訖又泣賈謐曰死者豈能復生侮之無及楚王如此宜速討之惠帝曰楚王權重何計可制賈謐曰黃門侍郎張華有王佐之才公輔之器更兼足智多謀何不與其商議必能討楚瑋惠帝聞説即使人召張華入內問曰今司馬瑋掌握重權多立刑威朕恐有異難以制之吾誅此強暴怕人議論未有計謀卿有妙策代聯籌之張華曰楚王既謀害太宰太保則威權盡歸之矣人主何以自安臣亦寒心矣聖上宜此時究他何以專殺二公之罪誅之誰敢亂也賈後曰然可用何計華曰可遣殿中將軍王宮齎騶虞幡麾向衆曰司馬瑋矯詔屈殺汝南王司馬亮及太保衛瓘聖上震怒使我招回大小將軍速回龍虎二營不許衛從元凶如違詔旨的系同惡盡行處斬如此誰敢從亂惠帝曰其計大善
