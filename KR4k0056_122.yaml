body:
  text: 第一一九回鄧伯道棄子留侄史説鄧攸字伯道平陽人祖父鄧殷嘗為淮南太守夢行水邊見一女子猛獸自後斷其盤囊請入圓夢占者曰水邊有女汝字也斷盤囊者新獸頭代故獸頭也子不作汝陰當作汝南也後果應其夢遷為汝陰太守及至攸父早喪少孤與弟同居為鎮東將軍賈混甚厚遇之攸常詣其府賈混以百姓案訟之事示攸因謂曰卿能為我一決乎攸不視曰孔子雲聽訟吾猶人也必也使無訟乎賈混因此奇之以女妻攸至是石勒兵至百姓皆逃鄧攸以牛馬負妻子而又被勒兵掠去牛馬只得步走以籮自擔其兒及弟之子鄧綏而行攸自度盤纏稀少恐不得兩全乃謂妻賈氏曰路遙途遠盤纏稀少宜減一口方可保全到南賈氏曰可棄綏也攸曰吾弟早亡唯有一息理不可絶只應棄我兒耳幸而得存我與你年紀未老後當有子矣妻泣曰恩不及如夫婦親不及如父子君何舍子而留侄耶攸曰今事急矣不得不棄若留子棄侄弟必絶嗣旁人謂我不義由是妻大哭而從鄧攸乃放子于路抱綏而走其子朝棄暮趕及明日攸以繩縛於樹而去來至江東元帝聞其義以鄧攸為太子中庶子時吳郡缺太守人多欲之元帝以授鄧攸攸載米至郡俸祿無所受惟飲吳水而已在郡刑政清明百姓歡悅為中太守因稱疾辭職歸郡有常例凡太守辭職旨送迎錢至數百萬因此吏民以其錢送攸攸不受一錢於是百姓數千人不忍其去乃留牽攸船船不得行攸乃少停至夜中密發遁去故吳人歌之曰統如打五鼓雞嗚天欲曙鄧侯挽不留謝令推不去攸歸家思自棄子之後妻不復孕乃置妾某氏因詢其家同妾説是北人遭亂流落至此因道父母名姓乃攸之甥攸遂嫁之不復蓄妾因以無嗣時人義而哀之為之語曰天道無知使鄧伯道無兒時晉帝遣使以慕容廆為龍驤將軍大單于廆既受其爵以遊邃為龍驤長史以劉翔為主簿命邃創朝儀裴嶷曰晉室衰微介居江表中原之亂非明公不能拯也今諸郡雖各擁兵然皆頑愚相聚宜以漸並取為西討之資未可便尊以撰朝儀廆悅之以嶷為長史委以軍務之謀諸部弱小者稍稍擊取之皆嶷之力也
