body:
  text: 第二三三回苻氏五公皆謀反卻説秦王堅聞慕容恪已卒陰有圖燕之計命胸奴曹轂使如燕曹轂以西戎主簿郭辨為之副燕司空皇甫真兄皇甫腆及從子奮覆皆仕秦辨至燕謂真曰仆本戎人家為秦誅故寄命曹主貴兄常侍及奮覆兄弟並相知有素真怒曰臣無境外之交此言何及我君似姦人得毋因緣假託乎遂入白暐請究治辨太傅評不許得還為堅言燕政無綱可圖其見機識變惟皇甫真耳堅曰以六州之衆豈得不使智士有一人哉曹轂尋卒秦分其部落為二使其二子分統之號東西曹卻説秦汝南公苻謄乃苻生之弟欲謀反秦王堅竊知遣武士執斬之時生弟猶有五人當王猛謂堅曰不去五公終必為患不若乘此殺之堅不從至是秦晉公柳趙公雙與魏公庾燕公武謀作亂堅聞知使人征其還長安柳據蒲阪雙據上邽庾據陝城武據安定齊來起兵作反堅又遣使諭以罷兵令其各安原位各齧梨以為信皆不從秦王怒命王猛將兵二萬去討猛得令即以兵行戊辰三年二月秦魏公苻庾聞王猛以兵來恐不能敵乃以陝城降于燕兵以接應秦人大懼燕王德曰苻氏骨肉乖離投誠請援是天以秦賜燕也天與不取反受其殃吳越之事足以觀矣陛下宜命皇甫真引兵援之衆徑趨蒲阪吳王垂引許洛之兵馳解庾圍太傅總京師虎衛為三軍後繼傳檄三輔示以禍福彼必望風回應太傅評曰秦大國也今雖有難未易可圖朝廷雖明未如先帝吾等智略又非太宰之比閉關保境足矣庾聞燕不發兵又以人遺垂及真箋曰苻堅王猛皆人傑也謀為燕患久矣今不乘機取之恐異日有江東之悔矣垂謂真曰主上富於春秋太傅識度豈能敵堅猛乎遂絶之十二月王猛以兵至陝城苻庾以兵出戰戰未上三合被猛獲之王猛遂拔陝城左右送庾於帳下猛使人解長安送堅堅問之庾曰臣本無反心但以兄弟屢謀逆亂臣懼及死故反耳堅泣曰汝素長者固知其非汝心也且高祖不可以無後乃賜庾死原其七子以長子襲魏公餘子嗣諸弟之無後者
