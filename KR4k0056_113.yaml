body:
  text: 第一一回劉琨失據奔薊州卻説石勒以五萬之衆圍樂平樂平太守韓據使人清救于劉琨琨新得猗廬之衆欲因其鋭氣以討勒箕淡源曰此雖晉民久淪異域未習明公恩信恐其難用不若閉關守險務農息兵豈可遠出與戰琨不從命淡速行淡不得已率騎二萬前驅琨以軍屯廣牧為之聲援卻説石勒聞劉琨使箕淡將兵來救與張賓商議先據險要設疑兵於山上使支雄刁膺各以軍五千出與淡交戰佯為不勝而走淡不知其是計縱兵追之至伏兵處勒引軍殺回刁膺在左手下沖出支雄在右手下沖出三下夾攻淡兵大敗傷其大半淡拼死走出奔代郡韓據見救兵大敗亦棄城而逃並州震駭時十二月琨長史李弘見勒兵甚盛劉琨勢弱乃以並州降勒勒又得並州劉琨進退失據段匹磾聞知使人以信邀之曰足下進退若難可來同議以圖再復之計於是琨恐勒來攻率衆奔薊投附匹磾匹磾甚相親重與結婚約為兄弟而勒既得並州遣孔萇持兵二萬攻賊帥馮睹始而不克時流民數萬戶在遼西疊相招引民不安業勒遂問計于張賓賓曰馮睹本非公仇流民亦皆戀本為今之計宜班師振旅選良牧守使招懷之則幽薊之寇可不日而清遼西流民將相率而至矣於是勒然之使人召孔萇歸以李向為高陽太守睹帥其衆來降流民歸者相繼於道
