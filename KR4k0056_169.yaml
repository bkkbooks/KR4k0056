body:
  text: 第一六六回嶠侃會兵討蘇峻時嶠侃軍至笳子浦嶠以南兵習水峻軍便步傳令軍中將士不許上岸有逆者死時蘇峻遣人送米一萬斛饋祖約嶠參軍毛寶聞知乃告其衆曰兵法軍令有所不從溫公雖令將兵無得上岸今賊送米與祖約拒吾又無大將護衛安可視其可擊而不上岸擊之耶言訖乃引兵大喊上岸往擊取之峻送米人忽見毛寶兵至乃盡棄輜重糧食而逃毛寶獲之以濟三軍祖約由是飢乏溫嶠録寶之功乃表毛寶為瀘江太守陶侃亦表王舒虞潭監浙東西軍事郗鑒都督揚州八郡軍事朝廷從之於是郗鑒遂率衆渡江與嶠侃等會舟師直詣石頭蘇峻望嶠侃亮鑒等兵大至面有懼色乃令其弟蘇逸守城自執兵五萬出城屯住以為犄角陶侃既大集各路軍馬皆至石頭侃部將李相請築白石壘使人上岸守之于時陶侃傳令三軍築壘于白石使亮將兵一萬守之蘇峻屢遣人去攻白石壘不克而退蘇峻心下大憂急集諸將士商議當參軍匡孝曰今陶侃築白石壘甚得其宜進可攻我退可為居雖得其計然白石南寨其將趙胤守之勢孤易攻克今夜我引一軍抄小路去取寨後明公可使公子碩以攻其前兩下夾攻則胤便成擒矣若克南小寨則白石壘即易破也蘇峻然之至夜匡孝率三千士卒抄小路而去峻使其子碩率五千人去攻寨前碩兵至半夜鼓噪直進胤慌忙披挂上馬正遇蘇碩兩下交鋒不上數合寨後匡孝兵已至大放火趙胤軍人四下大亂胤回馬走四十裏喊聲不絶衆軍相殺止有祖茂跟定王舒突圍而走背後匡孝趕來胤回馬又戰十餘合胤連放二矢被孝閃過胤又竭力放第三箭用力太猛折了弓與箭棄弓縱馬穿林而走去遠匡孝始放火燒其營寨與蘇碩鳴金收軍而還蘇峻大喜重賞諸人溫嶠見南寨有失救之未及於是使王愆期領軍船一百只兵五千名出戰峻使匡孝來迎與愆期交戰不上二十餘合愆期大敗損去軍船三十隻水軍千餘人趙胤等失南寨至晚見陶侃侃甚憂之侃將孔坦曰本不須召郗公遂使東門無限今宜遣還京口雖晚猶勝也侃然之乃令郗鑒率衆還據京口立起大業曲阿淩亭三壘以分峻兵之勢鑒從其計峻果疑之分兵去攻三壘又使人持書命祖約攻之祖約得書使祖渙桓撫率七千兵攻湓口渙撫兵至毛寶急令民兵三千人與渙撫交戰毛寶中矢流血流髀徹鞍寶忍痛急使人踏鞍拔矢血流滿鞍又復出戰勇敢當先於是士卒竭力一攻渙撫大敗而走毛寶追數十裏傷其衆五千餘人方始收軍還屯史説王育字伯春少孤貧每過小學必欷歔流涕嘗為人牧羊時有暇即折蒲學書忘而失羊為羊主所責育將鬻己以償之同郡許子章敏達之士也聞而嘉之以錢代育償羊給其衣食使與子同學遂博通經史子集章以兄之女妻之為立別宅分之資業因是本州太守杜宣命為主簿俄而杜宣左遷萬年令有縣令王攸過詣其邑宣不出迎攸見而怒曰卿往為二千石攸所敬也今吾儕耳何故不見出迎欲以小雀遇我使我畏死鷂乎王育在旁執刀叱攸曰我府君以非罪黜降如日月之蝕耳小縣令敢輕辱吾君乎以刀欲前殺之杜宣懼乃跪下抱育而止自此知名後遷為武陽令為政清約宿盜逃奔他郡又遷並州督護後征討有功朝廷拜以為破虜將軍聞知蘇峻作逆溫嶠奉檄起兵王育遂以部兵五千人來會溫嬌討峻溫嬌以為先鋒卻説蘇峻使韓朝率兵去攻宣城內史桓彜聞知以軍進屯涇縣方知京口不守被峻所下心中煩惱朝夕憂國時長史裨惠勸桓彜曰蘇峻勢大朝廷莫能制今吾孤軍在此焉能拒戰不如使君遣人致書偽與通和以紓交至之禍可保吾軍民耳彜曰吾受國恩義在致死焉能忍垢蒙羞與蘇賊相通如其不濟此乃命也言訖即遣副將軍俞縱以兵三千出屯蘭石以拒峻軍時韓晃以兵五千來追桓彜兵至蘭石正遇俞縱軍至軍大喊兩下交鋒戰不上二十余合俞縱大敗退守蘭石不敢出戰晃軍以未知地理亦不敢前進當俞縱左右勸縱曰今韓晃之兵十分精鋭與戰不利不如退回宣城另作良圖縱以刀砍案曰吾受桓侯大恩本以死報吾之不可負桓侯猶桓侯之不可負國也有再言退兵者定按軍法言訖即驅兵出戰縱親與韓晃力戰五十餘合縱力怯被晃斬于馬下晃麾軍大進來攻宜城彜調兵守護城池並不出戰與晃相持卒歲糧盡城中大亂韓晃探知備細大驅人馬攻城城陷桓彜被晃所害彜妻劉氏次子桓沖五人逃走外家得免於難韓晃既得宣城使人戍之自以兵還石頭七月卻説祖約部將陰與後趙通謀許為內應後趙王勒遣將軍劉聰率兵二萬濟淮攻取壽春祖約聞之即勒兵回戰大潰於是祖約領家屬奔走曆陽
