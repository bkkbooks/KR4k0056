body:
  text: 第一一四回祖逖取譙擊石虎初流民張平樊雅各聚衆在譙城為塢主晉王為丞相時遣參軍桓宣去説而下之及祖逖屯廬州使參軍殷義詣譙城説張平樊雅殷義意輕張平視其屋曰可作馬廄見大鑊曰可鑄鐵器平曰此乃帝王鑊天下清平方用之義曰卿未能保其頭而愛鑊耶張平大怒命人將義斬之勒兵固守譙城因此逖攻之歲餘不下逖乃誘其部將至使殺之雅平猶據譙城逖攻之不克中郎將王含聞逖攻譙經歲不下乃遣桓宣將兵五千前來助逖逖待宣甚厚因謂宣曰雅衆被困窮極卿信義已著於彼今復為我説雅雅必能從降宣欣然領諾單馬從二人至譙城下叫開門入內説雅曰祖豫州方欲平蕩劉石倚卿為援前殷義輕薄非豫州之意卿能降可保無危也雅從之即開城門與宣詣逖營請降逖受之乃引衆入譙城屯住桓宣以兵還去石勒聞知遣其子石虎以兵五萬來圍譙城王含復遣桓宣以兵五千來救與祖邀約會夾攻石虎大懼以兵解去祖逖使使表宣為譙國內史晉王從之晉王又遣使傳檄天下稱石虎敢率犬羊渡河縱毒今遣琅邪王裒等水陸四道徑造賊窟因授逖節度尋復召裒還建康數月而卒晉王慟哀不已七月漢主聰與群臣議立子相國劉粲為太子命入東宮卻説段匹磾與衆推劉琨為大都督傳檄其兄遼西公疾陸眷及叔父涉復辰並弟末柸等共討石勒兵皆會集欲行其弟末柸不服其兄匹磾説復辰陸眷曰今匹磾不與叔父兄弟等同議而與他人同盟討賊令父兄而從子弟調遣可不恥也不若罷兵而還衆默然來日陸眷辰柸各引兵還去匹磾見叔父兄弟皆解去不能獨留亦還薊城訖
