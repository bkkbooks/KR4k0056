body:
  text: 第二六六回姚萇反秦為後秦卻説西川豪族伊詳等率五萬家謀叛聞姚萇至西川領五萬家入見姚萇曰某等遭亂難之世不遇真明之主徒抱赤心隱於此耳今聞明公盛德乃將門子孫某等率衆前來立明公為盟主守此一邦未識尊意若何萇曰吾聞卿等乃西川豪傑馬牧英俊若欲立盟主必須立卿萇乃庸才因逃難至此焉敢妄占也伊詳曰吾聞立尊定須立德公祖德於民吾故率衆推公公何辭耶言訖伊詳為首下拜稱千歲十萬余人齊聲從命於是姚萇為後秦王拜伊詳為謀事參軍招軍買馬積草屯糧攻討北邊卻説慕容沖既殺了苻睿同高蓋又集軍馬屯於城外乃遣人送書謂秦王堅曰吳王已定關東可速備大駕送家兄皇帝還鄴都與秦以虎牢為界兩下罷兵堅見書大怒召慕容暐責之曰卿之宗族可謂人面獸心不可以國士期也因命暐以書招諭泓沖二人來降暐密遣使謂泓曰吾籠中之人必無還理且燕室之罪人也不足復顧汝勉建大業吾死便即尊位泓於是進兵向長安卻説後秦王萇用伊詳計招衆十余萬進屯北地華陰新平安定等郡皆降附之秦王堅大怒自率步騎二萬前來討萇秦兵屢敗萇兵屯于安公穀下軍中無井秦人塞安公谷堰水以困之萇軍有渴死者會天下大雨後營中水深三尺營外寸餘而已後秦軍復振堅歎曰天亦佑賊乎於是萇得活卻説慕容泓謀臣高蓋見泓德望不如慕容沖且持法嚴峻因説慕容沖曰慕容泓非濟世之才吾意欲以將軍為盟主將軍復有意乎沖曰一身客寄四海未嘗不傷感而歎息鷦鷯尚有一枝狡兔猶有三窟何況人乎北中豐腴之地非不欲之奈泓與吾同一宗親甚不忍焉高蓋曰北州天府之國非治亂之主不可居也如今慕容泓不能用賢立事剛而無勇柔而太弱此業不久已屬他人矣今天以資將軍此會挫失豈不聞逐兔先得之語乎將軍欲之某當效死慕容沖拱手謝曰倘天助實出公之所賜也請暫少歇再容商議當日席散次早高蓋又語之慕容沖曰既先生有念沖意從先生計之於是高蓋密于慕容沖耳畔言曰今日明公人城彼必出迎明公擊盞為號因而殺之沖曰然因此慕容沖與高蓋領軍回城慕容泓聞慕容沖大捷而回城乃引諸從人以果酒在城門內迎賀時高蓋佩劍在前慕容沖在後而進見慕容泓執酒在門邊因言曰托聖兄洪福幸獲此勝何勞遠迎泓對曰得賢弟英勇大破秦兵生靈百萬無不感戴因忙舉酒與沖沖接著作失手擊破高蓋一見舞刀向前把慕容泓一刀斬之泓首落地諸從皆驚高蓋大叫曰降者免罪逆者盡誅於是城中諸將吏人俱各投降不敢拒命因此高蓋請慕容沖入為皇帝即大位承制行事復置百官遂遣將加兵攻討北平先是秦王苻堅滅燕慕容沖姊年十四有傾城國色苻堅納之為王妃寵冠後宮時沖年十二歲有龍陽之姿堅又幸之因此姊弟專寵安人吳進中是長安百姓為之歌曰一雌復一雄雙飛入紫宮群臣鹹懼沖為內亂時王猛切諫之苻堅不得已乃使沖出長安為平陽太守又有謠言曰鳳凰鳳凰止與阿房苻堅聞知以鳳凰非梧桐不棲非竹實不食乃命植梧竹數十萬株于阿房城以待之慕容沖小字鳳凰故有先兆之識也八月燕將慕容德等進兵圍住鄴城城中長樂公苻丕大憂況且芻糧俱盡削松木飼馬猶不肯降燕王垂謂諸將曰苻丕窮寇必無降理不如退屯新城開丕西歸之路以謝秦王疇昔之恩於是將慕容德等傳令三軍退趨新城而屯卻説晉太保謝安上表請靖胡亂以兵北討晉帝讀表曰先帝深慮胡賊勢不兩立由胡無隙可乘故不敢征後陛下登位豈期苻堅逆天犯境蒙托臣以討賊臣自知劣才之弱賊衆之強受命之日寢不安席食不甘味思欲以破秦陛下天威洪福所致將士戮力效命一擊破秦百萬之兵使苻堅喪膽於肥水鮮卑亂生關東五胡雜植俱各以秦之軍食秦之粟殺秦之兵矣此乃天厭秦人故有此釁耳伏望陛下乘此遣將開拓中原北方指日可平甲申大光九年九月太保臣謝安謹表以聞仰于聞聽晉孝武帝覽表謂安曰卿策正合朕心太保可調撥諸將以兵起行伐秦於是謝安謝恩即出朝堂使前將軍謝玄率桓石虔諸將以大兵二十萬來討河南河南城堡聞兵至皆來歸附謝玄領兵入屯河南分兵戍守安慰百姓又使晉陵太守滕恬之以兵五千渡河入據黎陽又令參軍劉牢之以兵二萬入據碻磝滑台分撥已定謝玄自以大兵屯于河南城使人前去打探消息待其來報然後進兵
