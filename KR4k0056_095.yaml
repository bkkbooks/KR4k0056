body:
  text: 第九十二回元達鎖腰諫漢主三月漢主劉聰立其貴嬪劉娥為後欲起煌儀殿以居廷尉陳元達切諫曰天生民而樹之君使司牧之非以殘兆民之命窮一人之欲也是以先帝身衣大布居無重茵後妃不衣錦綺棄輿馬不食粟陛下踐柞以來已作殿觀四十餘所飢饉疾疫死亡相繼而益思營繕豈為民父母之意乎劉聰大怒罵曰聯為天子僅營一宮殿何關汝鼠子之事乎不殺此奴必沮亂聯心此殿何能得成也卻命左右曳出斬之並其妻子梟首于東市時聰在逍遙園李中堂元達先以鎖鎖腰而入即以鎖鎖堂下樹呼曰臣所言者社稷之計而陛下殺臣朱雲有言臣得與龍逢比幹遊足矣聰喝左右曳出左右曳之不能動大司徒任顗等叩頭出血曰元達為先帝所知盡忠竭慮知無不言臣等每見之未嘗不抱愧今伊雖狂直願陛下容之聰默然劉後聞之密敕左右停刑即忙作手疏上言曰今宮室已備無須更營四海未一宜愛民力廷尉之言社稷之福也宜加封賞如更誅之四海謂陛下何如哉夫忠臣進誅者固不顧其身也而人主拒諫者亦不顧其身也陛下為妾營殿而殺諫臣使忠良結舌者由妾遠近怨怒者由妾公私困弊者由妾社稷傾危者由妾天下之罪皆萃於妾妾何以當之妾觀自古敗國喪家未始不由婦人心常疾之不意今日身自為之使後世視妾猶妾之視昔人也妾誠無面目奉巾櫛願賜死此堂以免朝議也漢王覽之色動命任顗等引元達上以劉後表示之曰外輔如卿內輔如後朕復何憂乃改命逍遙園為納賢園李中堂為愧賢堂聰謂元達曰卿當畏朕而反使朕畏卿耶
