body:
  text: 第三二四回盧循以兵寇建康卻説劉裕北伐南燕時徐道覆勸盧循乘虛打入建康循弗聽曰劉裕既伐燕地則建康不復虛矣加之裕善用兵必留重戍險隘未可輕動也況今冬寒不如堅守以待天時外結英豪內修農事選精鋭之兵乘虛而進救左則攻右救右則攻左我不勞而彼困憊未及三年可坐而取勝也今舍妙勝之策而決成敗于一時恐不如意悔之無及道覆又曰將軍久住嶺外豈將此傳之子孫耶正以劉裕難與為敵也今裕頓兵堅城之下未有還期我以此時領軍士攻擊何劉之徒如反掌之易耳不乘此機苟求一日之安裕平齊後以璽書征君自將屯豫章遣諸將率鋭師過嶺恐將軍不能當也若先克建康傾其根蒂裕雖南還無能為也循乃從之初徐道覆計使人伐船材于南康山至始即賤賣居人爭市之至是悉白取之以裝艦旬日辦成循從道覆之計分兵三隊攻盧陵南康豫章三郡郡守因裕抽兵北伐無兵守禦懼皆奔逃被循所占循既得三郡徐道覆又謂循曰今雖連得三郡皆是沖要之處若江陵劉道規來取吾難守也吾自以兵去攻公可速遣人入蜀説譙縱以兵寇江夏使彼不遑來也循從其計即使人入蜀見譙縱曰盧將軍以衆入建康恐劉道規何無忌攻其後將軍若能攻江陵敵住二人倘得京邑以西地屬公共結為唇齒永為和好誓不相侵譙縱聞言即遣荊州刺史譙道福同桓謙引兵三萬來寇江陵
