body:
  text: 第一三回石勒自稱後趙王卻説石虎與張賓等上言於勒曰今劉曜僭大位棄漢自號趙是逆宗統荒淫不理政事是無德也吾等觀其久必敗定自為人所擒王侯本五種帝王豈有根明公宜加尊號以安百姓絶劉曜耳石勒曰孤本氐人得諸君相扶僥幸至此天下未定何敢為之張賓又曰今有內十二郡趙國十二郡合有二十四郡為趙國準禹貢魏武復冀州之境地方數千里將士數百員主公若登大位命將佐出討何堅不破何敵不滅主公再執不行將士解體民各生心晉氏復起誰人肯用命乎不如主公且登後趙王位以安衆心可謂萬全之計於是勒始從之石勒既即王位稱元年為後趙元年以將軍支雄等主胡人詞訟禁胡人不得淩侮華族號胡人為國人遣使循行州郡勸農桑朝會使用天子禮樂加張賓為大執法專總朝政以石虎為驃騎將軍都督諸軍賜爵中山公時張賓任遇優顯群臣莫及而謙虛謹慎開懷下士屏絶阿私以身率物入則盡規出則歸美勒甚重之每朝嘗為之正容貌簡辭令呼曰右侯而不敢名勒既以天子禮樂饗群臣威儀冠冕從容可觀矣勒宮殿及諸門始就制法令甚嚴諱胡尤峻時有醉胡出入止車門勒大怒即召宮門小吏馮翥至責其不報白之故翥惶懼忘諱因對曰有醉胡乘馬馳某呵禦之而又不可與語勒笑曰胡人正自難與因是恕而不罪翥耳
