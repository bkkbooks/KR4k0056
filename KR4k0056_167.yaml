body:
  text: 第一六四回亮嶠推侃為盟主夏五月溫嶠將興兵討峻而不知建康聲聞會范汪至言二宮無事而峻政令不一貪暴縱橫雖強易弱宜及時進討嶠深納之庾亮辟范汪參軍事次日庾亮推嶠為盟主請興義兵討峻嶠不敢當推及於亮二人互相推讓當嶠從弟溫充曰今汝二公相推不肯為之盟主恐不敵峻也吾聞征西大將軍陶侃位重兵強宜共推之可濟大事於是二人從之乃遣都護王愆期至荊州推奉陶侃稱説溫平南及庾公推明公為盟主同討峻約之事言訖呈上書緘侃拆觀之書曰峻約跋扈欺天謀逆入亂宮廷鞭撻百官貪暴縱橫人不忍言朝野士民豈樂其生哉嶠今集兵選馬欲為掃清帝室恨力不及未敢輕舉公乃仁者忠義慨然素為江左士望請為盟主望乞起兵同赴國難共討不義如有驅使處即當奉行侃見書猶以先帝不預顧命為恨答王愆期曰你見溫平南説吾疆場外將不敢越局以興大兵愆期領其言語回報溫嶠報説陶侃不肯起兵之事庾亮聞之曰今主上有燃眉之急社稷有倒懸之憂彼不肯為吾與卿當自興兵不然幼主何安耶嶠曰既如此吾一面使人請起興兵吾與公先行乃又吩咐使人見陶侃曰明公且守仆當先行使人得其語行二日參軍毛寶聞之入見嶠曰聞公使詣陶侃稱自先行大不可也師克在和不宜異同假令可疑尤當外示不覺公可急遣人迫使改書言必俱進若不及則更遣使可也嶠始遣人星夜追回先書改稱與俱進於是侃得嶠書遣督護龔登率兵一萬詣溫嶠嶠自率衆七千人與庾亮龔登等起行先使人列上書陳峻約罪狀移告各鎮共發討峻嶠既登舟泣涕諭衆欲行陶侃使人追龔登引衆還鎮嶠苦留之又使王愆期去與侃書曰行軍有進而無退可增而不可減近已移檄遠近言於盟府惟須仁公軍至便俱進耳今乃返退還疑惑遠近成敗之由將在於此假令此州不守則荊楚將來之危乃當甚於此州之今日仁公進當為大晉之忠臣參桓文之業退當以慈父之情雪愛子之痛且峻約無道人皆切齒今之進討如石投卵若復召還是為敗于幾成者遂謂仁公緩於討賊雖悔難追願公察之侃得書猶豫愆期上言曰峻豺狼也如得遂志公安有容身之地耶依吾之言明公火速自行則諸鎮同赴大功可成於是侃感悟即戎服登舟起兵而行時侃子瞻因與峻戰死家人收骸鹼棺送還荊州是日到州侃遂不顧兼道而進
