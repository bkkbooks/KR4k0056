body:
  text: 第二四五回王猛疾疏謝秦王甲戌二年二月孝武帝設朝聞桓溫死降詔以謝安為總中書時天子幼弱外有強臣安與坦之盡忠輔衛晉室幸得太平而謝安好聲律期功之慘不廢絲竹士大夫多效之遂以成俗當王坦之以書苦諫之曰今主上幼弱藩臣多強以為元宰如何不出趨朝參理政事而嗜聲律期功之作不為蒼生國家之計耶又曰天下之寶當為天下惜之勿使棄之也安不能從猶是人競效之乙亥三年夏五月王坦之卒少帝以謝安為揚州刺史桓沖為徐州刺史六月秦清河武侯王猛寢疾秦王堅親為祈郊廟又遣侍臣禱河嶽為猛祈禳猛疾少瘳乃遣人入朝上疏秦王堅開讀曰不圖陛下以臣之命而虧天地之德開闢以來末之有也臣聞報德不如盡言以垂歿之命竊獻遺忠伏惟陛下威烈振乎八方聲教光乎六合九州百郡十居其七平燕定蜀有如拾芥夫善作者不必善成善始者不必善終是以古先哲王知功業之不易戰戰兢兢如臨深淵伏惟陛下追縱前聖天下幸甚秦王堅覽之悲慟流涕是日親與太子至丞相府中視王猛之疾訪以後事秦王堅與太子諸臣直入臥內秦王堅曰數旬不見卿朝誰知卿疾甚重朕甚隱憂代祈郊廟以庇於卿今來視卿倘爾不豫有何見示王猛曰陛下明見千里之外古今興亡必所盡知然晉室僻處江南乃正朔相承上下安和臣歿之後願勿以晉為圖鮮卑西羌我之仇敵終為大患宜漸除之言訖而卒年五十二歲秦王堅與群臣皆大哭之堅謂太子苻宏曰天不欲使吾平定六合耶何奪吾景略之速也言畢又哭命大殮化之訖乃大哭引太子宏歸宮而去次日大宛國進貢獻大馬千里駒皆汗血朱鬣五色鳳鷹麟身及其他珍異寶五百餘種至秦王堅謂百官曰吾思漢文之返千里馬咨嗟美詠今大宛所獻之馬其悉返之庶克念前王仿佛古人耳汝群臣可作止馬詩而遣其使還國示無欲也於是群臣作止馬詩令使人領前寶物還國去訖先是高陸人王木穿井得龜一隻大三尺背有八卦木進于秦王堅堅命養之于池中日以粟與之食及此而死太仆奏知秦王堅堅命藏其骨於太廟其夜廟丞高虜夢龜謂之曰我出本將歸江南遭時不遇隕命秦廷次日高虜大惑其夢又有一人至謂虜曰吾昨夜夢神龜言吾三千六百歲而終終必妖興亡國之征也此夢未審主何吉凶虜意遂明乃曰不主甚事主國家不久衰也汝休得漏言因此二人祕之不敢傳出卻説秦王堅自平諸國之後國內殷實遂示人以奢侈懸珠簾于正殿以集群臣尚書郎裴元略諫之秦王堅大悅命去其珠簾以元略為諫議大夫初秦王堅母少寡將軍李威有辟陽之寵史官載之于史至是堅取起居注觀之見其事慚怒即焚其書大檢史官將加其罪時著書郎趙泉等已死始乃止之
