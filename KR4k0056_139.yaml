body:
  text: 第一三六回祖逖計運士為糧七月晉祖逖以將韓潛與後趙將桃豹分據陳川故城韓潛與豹相守四旬逖軍糧盡恐豹視虛來攻逖計以布囊盛土使千餘人運以饋潛又將數千人擔米息肩於道待豹兵逐之即棄之而走以其是實時豹兵亦糧盡士卒久飢見逖運糧千餘人過去了後又數十人擔米至豹兵逐而獲之是米將來見豹豹果以為逖士卒豐飽因是大懼連忙使人回襄國運糧使人去了運得糧米將至祖逖聞知又遣人密使韓潛率精兵五千從小徑邀之運糧軍人見兵至皆棄糧車而逃潛盡獲其糧米回以饋三軍桃豹糧盡數日運來的糧又被韓潛奪去恐士卒散去令衆至晚遁走去訖逖知使潛回率兵進屯封丘以逼之逖自以衆鎮雍丘於是後趙鎮成歸逖者甚多先是李矩郭默互相攻擊逖使人去和解示以禍福二人遂皆受逖之節度於是朝廷詔加逖鎮西將軍逖與將士同甘苦約己務施勸課農桑撫納新附雖疏賤者皆給以恩禮河上諸塢先有子任在後趙者皆得兩屬時遣遊軍偽抄之明其未附塢上皆感恩後趙有異謀輒以相告由是多所克獲自河以南多叛後趙歸晉逖練兵積穀為取河北之計後趙王聞知邊境戍守之人反己附逖心甚患之
