body:
  text: 第二六七回苻丕求救于謝玄卻説燕王垂退兵放長樂公苻丕出走而苻丕堅守不走垂大怒復使車騎將軍慕容德等率兵圍鄴苻丕見燕兵又至進退無路只得固守及聞謝玄入據河南心中大驚急聚將佐商議忽一人昂然而出曰殿下休憂臣雖不才憑三寸不爛之舌使慕容垂退兵可保鄴都萬無一失苻丕視之乃右將軍徐成丕問曰卿有何高見可解此圍成曰某聞慕容垂祖父先仕晉晉封為侍中後慕容雋反晉自立為燕至暐被聖父滅之今垂復稱燕晉人不樂其生某請命去説謝玄與殿下聯合同破燕兵此圍自然瓦解丕曰汝且試言玄之説辭與吾聽成于符丕耳邊道如此如此丕然之曰其説甚奇於是修書一封與徐成從夜半引五千兵殺出南門奔河南而來不日入城説謝玄曰秦王與晉無仇只因慕容垂父子切言勸之以兵犯境致結肥水之怨秦王深悔羞焉不期逆賊計乘吾敗復自稱燕以兵來攻鄴城今長樂公苻丕遣某以鄴都之地奉公乞賜糧米救濟軍民再以一軍救應同退慕容垂情願領衆西歸讓鄴都河南還晉永遠和好誓不相侵未審尊意何如玄曰既長樂公還我鄴都之地怎不救應吾以米二千斛汝可先運赴鄴資給軍民吾後即便點兵來救徐成拜謝運糧先回當桓石虔謂玄曰將軍何不坐待慕容垂去誅荷丕如何反助糧米與其救兵謝玄曰汝知其一未知其二慕容垂不減韓信之智又有呂布之勇今以兵圍鄴苻丕困極吾若不以糧米饋之不遣軍馬救之荷丕勢窮必然降燕則鄴都何年可得故吾以軍糧救應苻丕使其同吾殺退慕容垂也苻丕勢弱安敢失信定要西歸吾唾手可得鄴城河南之地十有九矣諸將曰將軍神見我等不及於是玄召參軍劉牢之至曰汝可以二萬兵前去助苻丕破燕牢之從之即以二萬兵來救鄴城卻説徐成運米二千斛近鄴使人先入城報知苻丕苻丕以兵出接糧米入城徐成以兵斷後殺散燕兵亦入城去苻丕問曰雖得糧米可支數月未審救兵何日得至徐成曰只管堅保城池以待救軍於是丕令軍人晝夜固守之燕慕容麟攻博陵城中糧草已盡功曹張猗恐城破逾出城聚衆五百以應麟王兗臨城責之曰卿是秦民吾是卿君卿起兵應賊而號義兵何名實之相違也古人求忠臣必于孝子之門卿母在城棄而不顧吾何有焉今人取卿一時之功則可矣寧能忘卿不忠不孝之罪乎中州禮義之邦不意乃有如卿者乎麟怒身先攻拔博陵執兗殺之軍民皆恨
