body:
  text: 第二十回帝用華計殺楚王於是惠帝依張華之計宣殿中將軍王宮入內説與計策命其持騶虞幡麾領衛兵五百人直入帥府見龍虎衛瓘士擁護楚王司馬瑋乘輿而出王宮持幡高叫曰楚王矯詔謀殺汝南王及太保聖上震怒詔命我等持此幡麾招回汝等大小將士軍校各回龍虎二營不許護送言未畢甲胄數百人皆釋仗而走楚王司馬瑋左右無復一人窘迫不知所為被王宮使從軍執之斬於府前乃收兵回奏惠帝大悅乃拜張華為少傅開府儀同三司侍中中書金章紫綬張華固辭不受其職賈後欲勸惠帝罷之當賈謐上言曰張華庶族儒雅又有籌略進無逼上之嫌退為衆之所依可以托六尺之孤亦可以寄百里之命依臣之愚見宜倚以朝綱共參政事不可推其辭因此惠帝不從其辭委以朝政於是張華只得領職謝恩與賈模裴頠同心盡忠匡輔彌縫補缺雖當暗主虐後之朝而海內賴之晏然是張華之力也後進封為武郡公太保衛瓘女上書與國臣曰先公名諡未顯一國無言春秋之失其咎安在希明公輩公議而奏請之庶九泉無負屈含冤之人耳於是張華裴頠等正欲啓帝會太保主簿劉繇執黃幡撾登聞鼓訟衛瓘之冤被武士捉以見帝帝曰汝有何冤繇曰臣竊為太宰亮與太保瓘盡忠報國被譖屈死望陛下念其前功復其爵諡則彼二人雖在九泉之下亦銜恩矣帝未及決張華等亦上言二公盡忠無二果系屈死陛下宜復其爵諡帝從之諡汝南王亮曰文成王諡衛瓘曰成侯卻説吳郡有名士曰陸機字士衡祖陸遜為吳丞相父陸抗女吳大司馬機身長七尺聲音如鍾少有異才文章冠世服膺儒術非禮不動領父兵為牙門將軍年二十而吳滅退居舊裏閉門勤學積有十年弟雲字士龍六歲能屬文與兄齊名雖文章不及于兄而持論過人故吳人號曰二陸幼時吳尚書廣陵閔鴻見而奇之曰此兒若非龍駒當是鳳雛至是時陸機陸雲兄弟二人聞得朝廷舉賢良方正思欲匡扶明時乃相邀入洛陽來謁張華張華素重其名及見陸機遂握手顧語歡若平生勝如舊識因曰前伐吳之役利獲二俊未及得見何期今日命駕一臨又曰令弟士龍如何不見陸雲好笑故機曰雲有笑疾未敢命見俄而雲至相見禮畢雲獨大笑不已因見張華為人多姿以帛纏其須雲不覺大笑張華亦不之怪時上賓荀隱字鳴鶴亦善談論嘗聞二陸之名素不相識於是高朋滿座張華笑謂荀陸兄弟曰今日諸賢相遇勿作常談陸雲就出座因握荀隱手曰吾乃雲間陸士龍荀隱即應曰我是日下荀鳴鶴陸雲又曰既開青雲睹白雉何不張爾弓挾爾矢荀應曰我本謂是雲龍騤騤乃是山鹿野麇獸微駑強是以發歎耳於是二人嘲難成風乃撫掌大笑不止時有華陽盧志乃育之孫班之子也以善笑談見華重陸機兄弟出於衆人乃問機曰陸遜陸抗于君宗遠近機曰如君于盧育盧班耳盧志默然乃不敢復問陸雲謂機曰殊邦遙遠客不相悉何至如此直曰其祖父之名諱耶機曰我之祖父名播四海彼豈不知故乃直諱吾亦故以是對之因此二人辭華而出次日張華入朝薦於惠帝以陸機為參軍以陸雲出補浚義令
