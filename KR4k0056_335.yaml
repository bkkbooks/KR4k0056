body:
  text: 第三三二回劉毅出刺於荊州壬子八年四月荊州刺史劉道規以疾再三求歸帝始詔以劉毅代之道規在州纍年秋毫無犯及歸府庫帷幕儼然若舊隨身甲士二人遷席於舟而還劉毅剛愎自謂功與裕同雖權事推裕而心不服常怏怏不得志裕每柔而順之毅因過京口歸家祭祖辭墓欲往荊州赴任時劉裕聞知毅回家辭墓欲命駕去京口訪謁劉毅鄱陽太守胡藩曰切見劉毅陰蓄將士明結英雄久必謀主依臣之見不如及早除之兔為後患裕曰劉毅雖勇卻無遠略我將為次耳藩曰明公謂劉衛軍為公下乎裕曰卿為何如藩曰夫豁達大度功高天下連百萬之衆允天下之望劉毅固以此服明公至於涉獵記傳一談一詠自許以雄豪加以誇伐縉紳白麵之士輻輳而歸此劉毅不肯為公下也裕曰吾與劉毅俱有克敵大功其過未彰豈可自相圖害不聽亦命駕還京口同毅相款數日而回京劉毅亦辭墓後徑去荊州赴任卻説劉敬宣字萬壽宣城人也於義熙三年奉詔伐蜀軍至廣武食盡而退有司奏免官劉裕保復原職時敬宣聞知朝廷以劉毅為荊州刺史入見劉裕曰荊州之重不可付人今聞朝廷以劉毅為荊州刺史誠恐有變不利於明公劉裕亦疑之與毅素不睦及聞此語因問劉穆之曰萬壽謂荊州權大劉毅與吾素不相睦不可使其去鎮此事如何穆之曰劉毅乃公等輩況今詔旨已出明公不可以私憾而傷至公也任之無妨因此不改其任時敬宣又謂劉裕曰平生之舊豈可孤信光武悔之於龐萌曹公失之于孟卓今明公亦宜慎之也裕曰既如此以卿為南蠻校尉去戍襄陽劉毅若有異卿宜速報將來敬宣曰然領之於是劉裕以敬宣為南蠻校尉去戍襄陽敬宣領職出建康先至荊州參見劉毅劉毅曰吾欲興五霸之功欲屈卿為南蠻長史豈有見輔意乎敬宣虛對曰若有驅馳不敢辭命言訖拜辭劉毅出戍襄陽使人以此言馳報劉裕劉裕大驚曰劉毅果有異謀遂賞使人回去一面預防毅亂卻説乞伏公府謀叛率兵弒西秦王乾歸及其子十餘人走保大復乾歸之子熾磐聞知遣其弟智達以兵討之秦人多勸秦王興乘亂取熾磐興曰伐人喪非禮也勿聽夏王勃勃欲攻之王賈德曰熾磐吾之鄰國今遭喪亂吾不能恤而又伐之匹夫且猶恥為況萬乘乎勃勃乃止七月智達擊敗公府追獲斬之八月熾磐始自立為河南王率衆兵都於枹罕
