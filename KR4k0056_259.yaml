body:
  text: 第二五六回秦王下詔寇江南癸未八年七月秦王苻堅下詔召集各部軍馬大舉伐晉八月秦王堅喚陽平公融至前曰你督後將軍張蠔冠軍將軍慕容垂等領步騎二十五萬為先鋒先入伐晉以探虛實敵之強弱先報吾知融曰臣既先行後宜調兵急來接應融辭去訖又宣兗州刺史姚萇封為龍驤將軍秦王堅謂驤曰朕本以龍驤建業龍驤之號未曾假人今特以相授東南之事盡以委卿卿可盡忠報國無得二心卿領兵二十萬從北路伐晉接應陽平公苻融萇謝曰臣蒙拔擢授以重任萬死不辭焉敢異志此回不滅東晉不敢生還言訖領兵就行時左將軍竇沖進言于秦王曰王者無戲言此將之封不祥之征也惟陛下察之秦王堅默然不應悔悶歸宮卻説慕容垂受命領兵起行其侄慕容楷慕容紹曰今秦王驕矜已甚叔父建中興之業在此行也垂曰然非汝誰與成之且莫泄耳苻融以兵二十五萬號為一百萬來至潁水下住草營堅遂發長安戎卒六十余萬騎二十七萬秦兵至項城涼州兵始達咸陽蜀漢兵皆順流而下幽冀兵至於彭城東西萬里水陸並進運漕萬艘融等率兵先至穎口屯扎
