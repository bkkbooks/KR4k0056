body:
  text: 第四十九回張方炙殺長沙王永興元年是歲僭國二卻説長沙王屢破穎兵而未嘗虧奉惠帝之禮雖城中糧食日窘士卒無有離心張方以為洛陽未可克欲引兵還長安其如東海王越因妒忌長沙王執政陰欲殺義奈力不及見成都河間二王兵馬圍城欲為內應殺義聞張方欲退兵慮事不濟潛謂殿中諸將士議曰今成都河間二王各以強兵外攻非為聖上乃恨長沙王義為政不均故來討之況城中裏無糧草外無救兵不久皆為擒矣何不今夜卿等護我收長沙王義則二王之兵不戰而自退矣可保國家無危諸將聞言從之於是暫退至初更俱集於帳下悄地入營將長沙王執之次早入朝奏曰今成都河間二王謀反皆為長沙王之故起兵至關目今糧草日盡救兵無望臣等請廢長沙王義為庶人二王始肯退兵不然社稷將危望陛下火速降詔以安衆心帝曰義忠於寡人不有過舛豈可廢之越與將士皆奏曰長沙雖無罪寧可廢一人以安社稷不可因一人以害蒼生帝被越並諸將士所逼不得已下詔免長沙王義官令其徙居金墉城改年永康大赦滿城百姓命開城門放成都王穎入城時諸將士既開城門見外兵不盛心甚悔之欲更謀劫長沙王為將以拒司馬穎越聞此消息大懼連忙遣心腹人密告知張方使其將長沙王義謀殺之方得此意即令軍士攻入金墉將義縛至軍前張方命左右斬之義曰吾無罪況乃金枝玉葉誰敢殺我方大怒命左右將義綁於柱上四圍以火炙殺之方之軍士見之亦為之流涕司馬穎既入京師朝見惠帝自為丞相以東海王越為尚書令乃以穎衆復還鎮於鄴城遣石超率兵屯十二城門殿中宿衛將士凡為穎所忌者皆令殺之悉代去宿衛之兵以布其腹心
