body:
  text: 第二十六回賈後謀廢皇太子卻説皇太子司馬遹乃惠帝長子才人謝玖所生遹幼聰慧故武帝甚愛之曾對群臣言太子司馬遹似宣帝於是令詔傳於天下時望氣者言廣陵有天子氣故封為廣陵王元康元年出就東宮及長不好學惟與左右嬉戲不能尊敬保重而賈後素忌太子遹有令譽因此以密計敕黃門李已閹宦劉才媚諛于太子遹曰殿下富有天下貴為太子誠可及壯時極意所為何故自為拘束太子遹於是慢傲益彰或廢朝侍性拘小忌惟好繕壁修牆正瓦動屋而于宮中為市使人屠酤手揣斤兩輕重不差遹母謝玖乃屠家之女故太子好之由是名譽寢喪又令西園賣之葵茉魚鹽雞面之屬而收其利當洗馬江統陳五事諫之曰古之聖王莫不以儉為德故漢文身曳綈足履革舄以身先物政治太平及到末世則有玉杯象盞熊蹯豹胎云云殿下何如不思他日臨禦九五之尊身親萬機之政而為市井之利奢侈之用自棄之甚耶太子不納時舍人杜錫以皇太子非賈後所生而後性凶虐深以為憂每盡忠規諫皇太子修德業保令名遠誹謗言辭懇切皇太子大怒使人以針著錫常所坐氈中而刺之兩股流血因是人不敢諫言路塞矣卻説賈後之母廣成君郭槐以後無子因勸後曰汝年將暮不幸無主器者念太子遹雖非汝生宜加慈愛身安而國家可保也今汝妹賈午嫁與韓壽生有女兒汝可求為太子妃不然後必有變族難保也後即召其妹賈午入宮商議賈午入宮後達廣成君之言午曰太子非姊所生妹不能許聞太尉王衍有二女長女妍次女媸娘娘可主一人姊為太子聘之賈後曰既長女美吾代賈謐聘之次女醜聘與太子午曰娘娘先為謐聘後為太子聘之於是使人通知王衍即將聘禮代賈謐定其長女後始與太子聘其次女太子聞王衍次女醜陋心甚惡之而不敢言無計奈何時廣成君郭槐病篤喚賈後至臥所執其手言曰汝宜慈愛太子勿可疏之趙粲賈午必亂汝家勿可聽之言訖而終賈後舉哀承服以後妃之禮葬祭之
