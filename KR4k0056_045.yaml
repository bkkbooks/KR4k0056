body:
  text: 第四十四回長沙王攻殺齊王周卻説河間王司馬顒亦恨齊王司馬同久專大權威勢震主欲舉兵攻之恐力不足當長史李含説之曰成都王至親有大功推讓遠藩甚得衆心齊王越親而專政朝廷側目今檄長沙王使其討齊王齊王必誅長沙王吾因以為齊罪而討之去齊立成都除疏建親以安社稷大勳也顒曰然於是顒使人入朝上表陳齊王冏罪惡請長沙王義廢冏以成都王穎輔政使人去訖遂舉兵以李含張方領兵趨洛陽十二月表至京師冏見大驚忙會百官議之尚書令王戎曰二王兵盛不可擋也若以王就第委權崇讓庶可求安言未畢冏從事中郎葛旟怒曰漢魏以來王侯就第寧有得保妻子者耶可斬之百官震悚戎偽藥發墜廁得免時李含兵屯陰盤張方兵屯新安使人持河間王檄與長沙王義義即遣董艾襲之義自將左右百餘人馳入宮閉諸門奉迎天于攻大司馬府齊王冏亦恃府中左右兵衆出戰是日城內大戰惠帝驚得面如土色親幸東門會集禦前群臣死者相枕藉連戰三日齊王冏與長沙王義交鋒未經一合大敗而逃餘皆潰散冏被義執而斬之揮兵入府收其黨並夷其三族令李含張方等以兵還長安長沙王義奉天子還宮自執朝政然義雖在朝廷事無巨細皆使人詣鄴咨成都王穎
