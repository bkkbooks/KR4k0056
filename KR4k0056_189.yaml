body:
  text: 第一八六回庾亮欲攻王導止卻説成帝以司徒王導為太傅都督中外諸軍事郗鑒為太尉庾亮為司空六月更以導為丞相罷司徒官而導性寬厚任用諸將趙胤賈寧等多不奉法大臣患之庾亮聞之欲率衆入朝黜導先使人奉箋會郗鑒同起兵其書曰主上自八九歲以及成人入則在宮人之手出則唯武官小人讀書無從受章句顧問未嘗遇君子秦政欲愚其黔首天下猶知不可況欲其主哉今主春秋既盛不稽首歸政導居師傅之尊多養無益之士公與下官並荷付託大姦不掃何以見先帝於地下乎鑒得書知亮欲共起兵廢導乃不聽急使人奉書止亮曰聞公率衆黜導仆以為不可何也昔王敦入討劉隗天下以為謀反蘇峻嫉公事卻亦然此二者公親見非遠聞也公宜罷之亮得其書猶未止鑒急來勸導密為之備導曰吾與元規休戚是同攸攸之談宜絶智者之口果如君言元規若來吾便角巾還第復何懼哉因此二人不成大隙而亮嘗欲有黜導之意孫盛諫曰王公嘗有世外之懷豈肯為凡人之事耶此必佞邪之徒欲間內外耳亮始止是時亮雖居外鎮而遙執朝權既處上流擁強兵趨勢者多歸之然導內不能平嘗遇西風塵起舉扇自蔽徐曰元規塵汙人卻説王導為丞相以李充為掾屬以時俗崇尚浮虛嘗以老子絶仁棄義蓋患乎精仁義者寡而利仁義者衆耳而凡人見形逐迹離本愈遠乃作舉針曰名之攸彰道之攸廢乃損所隆乃崇所替非仁無以長物非義無以齊恥仁義固不可遠去其害仁義者而已由然士大夫亦不能改其前俗
