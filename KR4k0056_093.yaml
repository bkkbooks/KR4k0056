body:
  text: 第九十回代公大破劉曜衆十月代公猗廬得劉琨書發兵來救晉陽猗廬以其子修之率軍十萬為前鋒自率二十萬為繼後劉琨知代動兵乃隨路迎接代公猗廬甚稱慚愧言失鎮之因猗廬亦以善言安慰其心就令劉琨收散卒為向導特進晉陽劉曜亦引兵屯於汾東拒之次日交戰十數合劉曜莫能抵擋大敗墜馬身中七創曜見代軍雄盛乃引兵夜逾蒙山逃歸被代公催軍追之戰于藍穀大敗被代公殺得漢兵伏尸數百里劉曜及粲只餘二千餘人走還猗廬因出獵壽陽等山陳閲皮肉山為之赤劉琨自營門步入拜謝固請進兵討漢代公曰吾遠來士馬疲敝況百年之寇未可頓除且待後舉而劉聰不敢復寇也留大將戍晉陽吾暫回國言訖留其將箕淡戍晉陽自回去訖劉琨乃自徙居陽曲屯扎訖十二月賈匹人關殺梁州刺史彭仲陽至是其子彭天護率群胡前來報仇匹發兵與天護交戰不三合匹被天護所殺匹既死群胡散大衆推麴允為雍州刺史
