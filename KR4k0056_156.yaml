body:
  text: 第一五三回曜封世子永安王卻説趙王曜世子劉胤年十歲長七尺五寸既長多力善射驍捷如風靳準之亂胤逃于黑匿郁鞠部陳安既敗乃自言于郁鞠郁鞠禮而使人送還於曜曜悲喜謂群臣曰義孫故世子也材器過人且多曆艱難吾欲法周文王漢光武以固社稷而安兆民何如左光祿大夫卜泰進曰文王定嗣於未立之先則可光武以母失恩以廢其子豈足為法向以東海為嗣未必不如明帝也胤文武材力誠高絶於世然太子孝友仁慈亦足為承平賢主況東宮神明所系豈可輕動臣等有死而已不敢奉詔曜默然胤進曰父之于子當愛之如一今黜熙而立臣臣何敢自安苟以臣頗堪驅策豈不能輔熙以承聖業乎臣請效死於此不敢聞命曜亦以熙王后所生後已卒不忍廢也卜泰即胤之舅也曜喜其公忠以泰為光祿大夫領太子太傅而封胤為永安王都督二宮禁衛録尚書事命熙盡家人之禮而見胤卻説涼王張茂築大城姑臧興役修靈鈞台以備寇別駕吳紹諫曰明公所以築城修台者蓋征既往之患耳愚以為恩苟未洽于人心雖處層台亦無所益適足以疑群下之志示怯弱之形張茂曰亡兄一旦失身于物豈無忠臣義土欲盡節者哉顧禍生不意雖有智勇無所恃耳王公設險勇夫重閉古之道也言訖大興工役卒為成之十一月王敦欲謀反先強宗族故徙其兄王含都督江西諸軍事以王舒為荊州刺史以王彬為江州刺史各執重兵甲申二年正月王敦欲反忌周氏宗族強盛周氏一門五候況周嵩以兄周顗被敦所殺心常憤恨敦甚惡之會道士周脫以妖術惑衆敦誣周嵩周劄周筵等與脫同謀不軌收而殺之於是從事周嵩周筵皆遇害惟劄在會稽敦又使沈充領兵一萬去襲會稽劄聞知領兵出城交戰劄軍少大敗死戰於陳因此充等收兵還鎮遂起霸鼎之心
