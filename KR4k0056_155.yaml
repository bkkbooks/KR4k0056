body:
  text: 第一五二回趙擊涼州張茂降卻説趙王曜自隴西得勝乃以其衆西攻涼州戎卒二十八萬號為五十萬是日啓行涼州士卒大震參軍馬岌勸張茂親出陳戰長史紀緯請斬岌出降岌請茂曰紀公糟粕書生不思大計明公父子欲為朝廷誅曜有年矣今曜自至遠近觀公此舉當立信勇之體以副秦隴之望力雖不敵勢不可以不出茂曰善乃率衆出屯石頭乃問計于參軍陳珍陳珍曰曜兵雖多乃氐羌烏合之衆恩信未結且有山東之危安能曠日持久與我爭河西耶若二旬不退珍請敝卒數千為明公擒之茂沈吟時曜衆至河西諸將爭欲濟河曜曰吾軍疲困其實難用今但按甲勿動以威聲振之若出中旬茂表不至者吾為負卿矣至是茂果疑寡不敵衆密使人上表稱藩於曜曜大悅遣使拜茂為太師封涼王加九錫茂使人貢財物勞軍曜始振旅還軍卻説楊難敵聞陳安死大懼趙王曜來攻乃自請降于成王李雄李雄未允難敵以金百斤賂將軍李稚李稚與成王説之雄方受其降遣其還武都難敵既還聞曜王之兵已退遂差兵據險不服于成李稚自悔失計亟請成王率兵討之於是成王遣李稚同兄李舍攻難敵稚舍率兵長軀至下辨難敵聞知討遣部將引兵一萬斷舍稚歸路自將兵分三陳出迎舍稚深入難繼被楊難敵三面攻之大敗而還又被難敵先使部將斷住歸路不能出進被難敵四下夾攻舍稚皆被難敵所殺其衆悉降
