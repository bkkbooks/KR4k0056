body:
  text: 第二二二回秦苻生妄殺大臣十月秦王健弟東海王苻雄侔健哭之嘔血謂百官曰天不欲吾平四海耶何奪我元才之速也雄以佐命元勳位兼將相權侔人主而謙恭泛愛遵奉法度故健重之常曰元才吾之周公也雄卒乃以其子苻堅襲爵堅性至孝幼有志度博學多能交結英俊呂婆樓強注及略陽梁平老皆與之善其時秦國大飢民皆餓死乙卯十一年春二月秦大蝗民食百草無遺牛馬無食皆相啖毛卻説秦王苻健勤於政事數延公卿咨講治道承趙人苛虐奢侈之後易以寬簡節儉禮士崇儒由是秦人悅之至是寢疾引太師魚遵丞相雷弱兒司徒王貴司空王墮尚書令梁楞仆射梁安段純等受遺詔輔政謂太子生曰六夷酋帥及大臣執權者若不從汝命宜漸除之言訖卒生即位大赦改元壽光群臣奏曰君父新喪未除便即改元今改元非禮也生怒乃將純殺之九月有中書監胡文見天文屢變乃言于秦王生曰北有孛星於大角熒惑入東井不出三年國有大喪大臣戮死願陛下修德以禳之生曰皇后與朕對臨天下可以應大喪矣毛太傅梁車騎梁仆射受遺詔輔政可以應大臣矣文未及對秦王生即召武士殺皇后及王貴梁楞梁安等數十人由此百官懼怕內外驚駭卻説苻生是苻健第三子幼而無賴健死僭即大位生雖在諒陰遊飲自若荒耽淫虐殺戮無道長安大風發屋拔木秦宮中驚擾或稱賊至宮門晝閉五日乃止如此災星疊見強太后弟光祿大夫強平諫曰今天數示災異陛下初登大位宜親萬機攬行政事何故荒於淫飲而放無道之桀紂耶若尊性不易誠恐禍起蕭牆災生嬪宮也秦王生大怒曰汝何自妖言以惑朕聽耶言訖即令武士將強平鑿其頂而殺之強太后憂恨而卒自太后強平死後處處狼犬咬人人莫能捕傷人殊甚百姓皆逃入城而居因此遂廢農業群臣又奏秦王生曰今狼犬無故傷人人不能制此乃天災所應望陛下設醮禳之荷生曰天豈不愛豫群生乃以百姓犯罪不已專助朕而殺以施刑教故耳復下詔曰朕受天命君臨萬邦有何不善而謗瀆之音布滿天下殺不滿千而謂之殘虐行者比肩未足為稀方當峻刑極罰復奈朕何自去春以來潼關之西至於長安虎狼食人群臣請禳之生曰野獸飢則傷人飽當自止何禳之有且天豈不愛民哉正以犯罪者多故助朕殺之耳時有司天臺太史令又奏曰臣夜觀天象見太白犯東井東井乃秦人分野太白是罰星必有暴兵起于京師苻生又曰星入井者必將渴耳何所怪乎又弗聽秦司徒王墮性剛峻董榮及侍中強國皆以佞幸進墮嫉之如仇會交天變榮因言於生曰今天星屢變宜以貴臣應之生曰何人可榮國對曰貴臣無如王墮可生即將司徒王墮殺之於是群臣戰栗民皆離心卻説涼王張祚淫虐暴中怨憤祚惡河州刺史張歡之強使索孚前去代之孚來河州入見歡曰奉涼王命孚代公刺河州請足下還京歡大怒曰吾知涼王無道淫虐百姓今召我還必有害我之心因令右右執孚斬之遂起兵一萬傳檄州郡稱説祚罪再立曜靈會將軍宋混合軍三萬人殺奔前來涼王祚傳知令衛兵五百執曜靈殺之混等聞知為之發哀情動三軍衆至姑臧張歡弟張琚率衆開門納之歡衆入城當趙長懼罪奔走入閣呼張重華母馮氏立曜靈弟玄靚為王以安衆心諸將不服攻長殺之時祚失衆心諸將莫肯為之援者反將祚殺之梟首號令城內鹹稱萬歲時張琚宋混收兵內殿上玄靚為大將軍西平公復稱建興四十三年時玄靚年始七歲張歡撫慰百姓已了乃入殿推玄靚為涼王自為都督中外諸軍事尚書令宋混為尚書仆射十月卻説秦丞相雷弱兒性剛直以仆射趙韻董榮亂政每公言於朝見之常切齒韻榮譖之于秦王生曰丞相弱兒接外國金多欲使外國來攻許為內應秦王生信之遣衛兵五千攻殺弱兒及其九子二十七孫於是諸羌皆有離心民皆嗟怨生諒陰遊飲常彎弓露刃以見朝臣錘鉗鋸鑿備置左右即位未幾後妃公卿下至仆隸凡殺五百餘人丙辰十二年正月段龕遣人上書與燕王雋語言無禮燕王大怒遣慕空恪去討恪即以大兵起發前來擊段龕兵將至近當段龕弟羆驍勇有智謀言於龕曰慕容恪善用兵加之衆盛若聽其濟河進至城下恐難乞降不可得也清兄固守羆率精鋭拒之於河幸而戰捷兄率大衆繼之若其不捷不若早降猶不失于千戶侯也龕不從羆固請不已龕怒將羆殺之恪遂引兵濟河龕率衆五千人拒戰恪大破之龕友辟閭蔚被創恪聞其賢遣使求之則已死矣龕走還入城固守恪進兵圍之
