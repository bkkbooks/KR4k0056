body:
  text: 第六十七回顧榮周圯殺陳敏晉懷皇帝永嘉元年二月初茲縣縣令劉柏根反王浚以兵討斬之其長史王彌遂為盜賊來寇青徐殺東萊太守劫掠府庫一空而去卻説陳敏刑政無章子弟凶暴顧榮周圯等憂之廬江內史羊談以陳敏為憂遣人送書與顧榮等其書曰陳敏盜據吳會危如朝露今皇輿東返俊彥盈朝將舉六師以清建業諸賢何顔復見中州之士耶顧榮素有圖敏之心及見其書甚慚乃密遣人報征東將軍劉準使發兵臨江願為內應乃剪發為信劉準得其資訊即遣揚州刺史劉機起兵二萬前來討敏敏大憂問榮榮曰可遣明公之弟陳昶將兵屯烏江陳宏將兵屯牛渚而拒之敏從之分兵與二弟去了兵及行周圯密囑敏司馬錢廣曰今立新君賢雋滿朝故遣劉機來討陳敏而敏刑政無律不久必敗若敗吾與君等皆陷不若去邪歸正免自取臭於萬年今日敏以君與其弟昶將兵屯烏江君可乘此殺昶勒兵還來攻敏共圖歸正廣曰吾亦有心恨力未備今既如此吾即謹領號令於是錢廣即出與陳昶將兵起行至夜安營廣使左右將昶殺之因勒兵朱雀橋東屯扎敏聞廣殺其弟即遣甘卓以兵三千討錢廣時顧榮與敏之弟陳宏將兵去牛渚慮敏疑之故即還見敏説錢廣大逆之事宜討之敏曰卿當四出鎮衛豈得就我耶榮乃出密來與周圯説甘卓曰敏既常才政令反復其敗必矣而吾等安然受其官祿事敗之日使函首送於洛陽題曰此賊臣顧榮甘卓之首為萬世之辱也不若早決甘卓曰君言必欲誅敏正合我心於是卓稱疾不行使人迎女回家斷橋收船南岸與周圯顧榮紀瞻等共攻陳敏敏聞榮圯瞻卓等變亂即自率一萬五千人來討卓等卓使軍人隔水語衆將士曰本所以戮力陳公正以顧丹陽周安豐今皆異矣汝等何為敏衆狐疑未決榮以白羽扇揮之曰陳敏背反朝廷大怒故遣劉機討之旦日大軍繼到我等亦奉密詔誅敏汝等如何不去自取滅族之患哉言訖衆皆潰去敏見衆離單騎而走被榮等驅兵追而斬之夷其三族使人傳首京師懷帝大悅乃詔顧榮為侍中紀瞻為尚書郎太傅越辟周圯為參軍榮等至徐州聞北方愈亂乃逃歸卻説懷帝詔立清河王覃弟司馬詮為太子使居東宮時懷帝親覽大政留心庶事太傅越不悅奏帝故求出藩去鎮許昌帝從之越既出許昌詔以南陽王模都督秦雍軍事
