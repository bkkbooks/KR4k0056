body:
  text: 第二九回魏以甲子拔中山卻説魏王圭謂諸文武曰慕容寶志不能立乃出北遁今衆立慕容普陵為主慕容麟必懷不忿之心吾急攻之彼必死守目今吾軍糧盡不如暫還去據南城待其二子內亂然後乘之而入則二子成擒矣群臣曰陛下聖策非臣所能及也既如此宜即解圍南還以待其變魏王圭曰賊人多謀不可急離可令靈壽領一軍朝夕耀武揚威以示城內魏王圭引諸軍退屯於南城時中山糧已盡燕王慕容普陵心中大憂烏丸部將軍張讓進計曰今城中糧盡百姓無食大王可使飢民出城求降乞食魏兵不備臣以兵五千從百姓中殺出可破魏師也普陵從之示告城中令百姓飢者出降求食張讓開北門出百姓一萬人手執降旗在先來降靈壽不知是計乃曰吾知城中甚飢百姓受苦既來降者不壞汝汝可自去討食於是百姓各散俄而城內張讓以五千人殺出魏兵大亂靈壽見兵出急忙上馬持槍喝將軍馬擺開與戰二人交鋒不上二十余合魏兵漸漸圍裹將來張讓見魏兵圍來恐不能敵將軍器收了驟馬殺開一條血路沖走出來不敢復還本城因此收軍屯於北山靈壽復兵圍城卻説慕容麟在西山使人探聽中山消息使人回報燕王慕容寶北遁和龍城中諸將立慕容普陵為燕王而守中山魏王圭糧盡令靈壽以五萬兵圍中山自以大兵退屯南城中山糧亦盡慕容普陵使百姓詐降遣張讓以五千精兵在百姓後殺出攻其無備兵少反被魏兵殺敗不敢入城目今走屯北山麟大怒曰普陵豎子何敢妄自尊大而稱號焉吾必殺之大將丁零曰目今張讓以兵五千屯在北山不如遣人召來以十分恩義重撫之令其順主公使其為前鋒將軍叫開中山城門先殺普陵主公自為趙王據中山聚集三軍可破魏兵麟從之曰卿可代我為使去召張讓來歸丁零欣然領命來至北山謂張讓曰趙王麟現屯西山聞將軍在此令某特請將軍到寨一同商議破魏將軍可即與吾同往張讓曰吾聞趙王出奔何以還在西山既然有召我即領衆同往言訖遂以部下之兵一同來至西山入中軍見趙王麟麟出位接之問勞畢賜坐謂曰將軍乃關雲長之儔勇略俱全吾有一事相煩將軍共成大功卿意雲何讓曰臣久食燕祿常思報效既來遣臣安敢推委願聞所使萬死不辭麟曰普陵無知妄自尊大吾欲以兵誘開城門殺此跋扈非將軍莫能若將軍肯為其功實出將軍之賜也讓曰殿下既主計此臣惟命是從臣今夜引兵在前誘開城門殿下可速引兵來應於是計議已定至夜張讓引兵先行麟同丁零伏兵在後悄悄抄城後東門來至城下叫門城上將士認得是張讓兵還乃急開城門放讓及軍士一擁而入麟丁零伏兵雜于其中一同進城是夜賀使大將丁零調兵守營自以五千兵斬門而入後殿至臥所把普陵殺訖次日麟召文武集於朝堂謂曰普陵妄自尊大昨夜吾同張讓兵還而入已將殺之今吾兄燕王不知何往吾自權攝趙王之位以拒魏兵群臣皆稱萬歲曰願從尊命于此慕容麟乃即大位封賞功臣以烏丸張讓為大將軍以丁零為前將軍二人皆掌兵權是日同諸文武商議守戰之策諸將皆曰今城中飢饉柴米皆在城外諸邑所備幸魏兵昨日自退而去倘魏兵再來圍住內無糧草外無救兵士民振恐恐其日久生變亂則必被擒矣不如乘其未至以兵去據新市城拒住魏兵之路就食其城之糧可保萬全趙王麟曰汝等之計正合朕心於是便與文武率三萬五千兵出據新市城以拒魏兵六月甲子晦日靈壽退軍來見魏王圭及説普陵被麟殺死而自立目今以軍出屯新市城魏王圭聞説慕容麟自即大位以軍屯新市而拒敵遂令進兵攻之當時太史令龜崇曰不可容待旦日以進魏王圭曰如何不可崇曰昔紂以甲子日亡先人謂之疾日故兵家忌之以為不吉故不可進也魏王圭曰紂王以甲子日亡而武王不以甲子日興乎崇無以對遂進兵至十月甲戌軍至義台慕容麟率兵阻住去路魏王圭使張兗出陳慕容麟亦親自出陳兩軍混戰張兗與慕容麟二人交鋒在陳前大戰未上三十余合慕容麟氣力漸乏只好架攔因此收回軍器拍馬便走被魏王圭揮軍大進奮勇殺死燕兵二萬餘人追下五十餘裏麟勢迫退走去鄴次日魏王圭催兵大進攻拔中山城圭兵遂入屯於城中得燕府庫財寶頒賞諸將士
