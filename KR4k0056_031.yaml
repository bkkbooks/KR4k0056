body:
  text: 第三十回王衍專意事清談史説王衍字夷甫乃司徒王戎之從弟也少有盛才美貌明悟若神常自比子貢聲名藉甚傾動當世妙善玄言惟談老莊為事每執玉柄麈尾與手同色義理有所不安隨即改更故世人號為口中雌黃朝野翕然謂之一世龍門矣後進之士莫不景仰樂廣字彥輔南陽人也幼孤貧僑居山陽寒素為業人無知者尤善談論每以約言析理厭人之心而其所不知默如也凡論人必先稱其所長則所短不言自見初衛瓘見廣而奇之曰自昔諸賢既沒常恐微言將絶而今乃復聞斯言於君矣因命諸子造焉曰此人如水鏡見之瑩然若披雲霧而見其天也時王衍自言與人語甚簡至及見廣便覺己之煩為識者所歎羡如此廣善言而不長於筆廣為任滿欲為表讓尹不能寫請潘嶽為之嶽曰當得君意方可作書廣乃作二百句語述己之志嶽因取次便成名筆時人鹹雲若廣不假嶽之筆嶽不取廣之旨無以成斯美也先赴任有親客造去久不復來歲余方至問其故客答曰前歲在貴座蒙賜酒方欲飲見杯中有蛇意甚惡之既飲而成斯疾因此久失奉訓耳于時河南廳事壁上有角漆畫作蛇廣意杯中蛇即角影也復置酒於前處待客因而又問杯中復有所見否客答曰杯中所見蛇復如初樂廣乃告曰其蛇非真乃角影也因指與客豁然意解沈屙頓愈其明辨如此廣與王衍齊名故天下人言風流者以王樂為首焉其時樂廣與王澄阮咸阮修胡母輔之謝鯤王尼畢卓皆以往誕放達史説王澄字平子生而警悟雖未能言見人舉動便識其意及長勇力絶倫與王敦謝鯤庾愷阮修最善號為四友後為荊州刺史
