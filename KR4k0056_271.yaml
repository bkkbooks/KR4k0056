body:
  text: 第二六八回慕輿文殺劉庫仁卻説平陽太守慕輿文乃慕輿句之子也聞苻堅敗於肥水及慕容垂稱號自立乃招集兵馬來攻劉庫仁庫仁大怒點起軍馬與慕輿文交戰二人交鋒戰二十餘合庫仁被慕輿文斬于馬下劉頭眷見兄庫仁被殺舞大杆刀拍馬來趕慕輿文文又與眷相戰戰上三十餘合不分勝敗劉顯見叔贏不得慕輿文持槍前來夾攻文抵擋二人不住撥開軍器勒轉馬頭便走劉顯驅兵擊殺得慕輿文之兵大敗逃回平陽去訖時劉庫仁既死其子劉顯殺退慕輿文尋劉庫仁尸首葬埋訖其弟劉頭眷代領其衆劉顯心甚不平暗藏利刃入內室刺殺其叔劉頭眷自領諸部劉顯既領其衆恐皇孫拓跋圭長成復業乃謂左右林茂王霸曰拓跋圭年已長成後必為亂吾欲殺之恐秦王見罪吾甚憂患汝有何計林茂曰斬草不除根萌芽依舊發吾甚慮此既要害圭不誣其謀叛何以殺之不如先殺拓跋圭然後使人具奏圭謀叛吾已殺之將軍有何罪焉顯然之茂又曰此地常例每年聚會諸部衆官今期已迫來日將軍使人往請諸部大人赴會就請拓跋圭同至若來赴會留而殺之顯曰其計善矣於是劉顯使人請各部官赴會又差人來獨孤部請拓跋圭拓跋圭收拾赴會燕鳳曰愚意劉顯有害小主公之意故今來請赴會賀訥曰何以知之鳳曰顯新殺親叔劉頭眷而奪此位恐小主公成人後來取位故有謀害之意訥曰雖有此計切莫疑心平陽去此不遠不去反疑圭曰公之言是也張册曰筵無好筵會無好會主人不可去趙俊曰某將馬軍三百人同往可保主公無事圭曰子傑同去何足慮也拓跋圭與子傑即日同赴平陽離獨孤部百餘裏比及到郡林茂出郭迎接意甚謙敬拓跋圭不疑隨後文武官各出迎接拓跋矽更無疑忌是日請於館舍暫歇趙俊引三百軍士圍繞保護俊帶甲挂劍行坐不離次日入報九部四十五處將士官員皆到劉衛辰亦到顯先請商議曰拓跋圭世之梟雄久必為北州之禍可就今日除之衛辰曰恐失士民之望不可行劉顯曰吾已密領秦王詔旨在此衛辰曰如此則宜先為準備顯曰東門陰山大路吾已密令宗弟劉和引五千軍把住南門外已使劉中引三千兵把住北門外已使劉鍾領三千軍把住只有西門不必守護前有大溪阻隔雖有數萬人馬不易過也衛辰曰吾恐趙俊行坐不離恐難下手顯曰吾已伏千余兵於城內了可使王威另設一席於外以待武將先請住趙俊後可行事吾已安排定了當日殺牛宰馬大設宴飲請拓跋圭與衆官至堂中拓跋圭主席諸公子兩邊其餘各依次坐訖趙俊帶劍立於其側酒至三巡王威入請趙俊赴席俊推辭不去圭命去俊出就席劉顯在外收拾鐵桶相似三百軍都趕歸館舍只待半酣號起下手正值王霸把盞至圭前以足履圭之足曰請更衣圭會其意待霸把過盞推起如廁王霸已於後園等待圭入謂曰城外東南北皆有兵馬惟西可走使君急從後遁去勿遲劉顯已定計害君多日拓跋圭大驚急解馬開後園門飛身上馬不顧從者望西而走把門吏問之圭曰吾不勝酒力矣故先回耳擋之不住時劉顯舉頭不見拓跋圭在座便遣林茂去追茂上馬引五百馬軍即便趕之卻説拓跋圭出西門行至大溪幸有艇船急上艇船將金條頭雇艄人撑過江上岸而走去了劉顯趕到江邊不見拓跋圭只得還城俊飲酒間忽見人馬轉動急入視座上不見拓跋圭大驚急出探館舍聽得人説劉顯引軍追拓跋圭出門去了因此火急操槍上馬引三百軍出城迎見林茂問曰吾主何在茂曰使君逃席不知何往趙俊是個謹細的人不肯造次遍觀軍中並不見動靜前望大溪相隔別無去路趙俊曰汝請吾主何故著軍馬四繞茂曰九部四十五處官員在此吾為上將豈可不防護也俊曰汝逼我主何處去了茂曰吾聽知匹馬出門到此不知何處去了因此趙俊忙討船引三百人渡趕五裏之路追著拓跋圭保護得還本部來見賀訥細説劉顯謀害之事及得王霸所救之言訥曰既劉顯起此不仁汝可招軍馬以待迎敵於是拓跋圭始招軍買馬積草屯糧禮賢下士聘舊大臣不半歲積得精兵二十萬人自是威名日盛劉顯不敢攻焉
