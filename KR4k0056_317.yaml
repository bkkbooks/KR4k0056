body:
  text: 第三一四回慕容超立為燕王八月南燕王慕容德俄而寢疾卒諸臣舉哀殯殮挂孝訖後以太子慕容超嗣燕王大位改元太上元年超既即大位以慕容鍾為尚書令以封孚為太尉公孫五樓為武衛將軍內參政事五樓密奏燕王超曰慕容鍾段宏二人素為民仰士歸不可使其內執國政倘有異變難以制之宜出之外鎮免為內患燕王超然之次日改以慕容鍾為青州牧以段宏為徐州刺史時太尉封孚諫曰臣聞五大不在邊五細不在廷慕容鍾乃國之宗臣段宏國之外戚也正宜應參贊百揆不宜使鎮外方燕王超不從因此鍾宏二人俱有不平之色只得赴任因相謂曰黃豹之皮恐終當補狐裘也五樓聞之嫌隙漸構初慕容超自長安來至梁州慕容法時為兗州鎮南長史尚書悅壽見超因謂法曰向見北海王子天資弘雅神爽高邁始知天族多奇玉林皆寶也法曰昔成方遂詐稱衛太子人莫辨之此復天族乎超聞恨之至是即位亦以法處之外鎮當是時法來見慕容鍾會段宏起兵謀反據城池積草屯糧不用朝命是時尚書都令史王儼諂事五樓得遷為尚書左丞時人為之語曰欲得侯事五樓晉義熙二年燕王慕容熙皇后苻氏身死燕王熙悲號躄踴若喪考妣大殮訖復啓其棺而與交接置百官于宮內哭密使有司按檢哭者有淚者以為忠孝無則罪之於是衆臣大懼莫不含辛以為淚淋明日欲行苻氏喪前掖將軍慕容雲與幸人李細曰今主上無道殺戮大臣來日行喪必然自送你可領勇士百人于道殺之以免吾患細從其言次日行苻氏喪百官皆送燕王熙亦自送殯至中道慕容雲叫出李細引勇士殺之熙在位六年自垂至熙四世凡二十四年後燕到此而滅是時雲乃自立即其大位加封大臣以李細為和龍長史李細恨雲不以己執朝政復以兵殺慕容雲於前殿
