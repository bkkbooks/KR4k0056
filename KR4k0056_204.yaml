body:
  text: 第二一回涼州謝艾破趙兵卻説趙黃門嚴生惡朱軌會久雨因見趙王譖軌不修道路謗訕朝政趙王虎囚之苻洪諫曰陛下德政不修天降大雨七旬乃霽霽方二日雖有鬼兵百萬未能去道路之塗潦而況於人乎願止作役罷苑囿出宮女赦朱軌以副民望虎雖不悅亦不之罪為之罷長安洛陽作役而竟誅軌又立私議朝政之法聽吏告其君奴告其主公卿以下朝覲以目不敢相過談話是時虎欺涼州牧張駿卒重華新立乃遣將軍王擢麻秋領兵三萬出擊涼州大兵起行至界張重華已知悉發境內兵使裴恆為將禦之久而不戰當司馬張耽上言曰國之存亡在兵兵之勝敗在將今議舉將多推宿舊夫韓信之舉非舊德也蓋才之所堪即任之以事主簿謝艾兼資文武可用也殿下若用必克趙也於是重華召艾問以方略艾曰願請兵七千人必破趙而後言重華拜艾為監軍將軍給步騎五千與行艾遂引兵出城夜有二梟鳴於衙中諸軍皆以為凶艾曰六博得梟者勝今有泉梟衙中克敵之兆也汝等何疑次日率衆身先出與趙戰未及十餘合大破之王擢退兵二百里卻説麻秋以一軍攻陷金城獲其縣令車濟秋招其降濟不從伏劍而死又遣人以書致宛城都尉守來降李矩曰為人臣功既不就惟有死節耳先殺妻子而後自刎麻秋歎曰義士也命人收而葬之
