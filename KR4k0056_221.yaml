body:
  text: 第二一八回殷浩興兵去伐燕癸醜九年五月姚襄領兵屯於襄城次日入參大將軍殷浩浩以酒相待因與談論時事襄對答如流部下諸將士見其善談論皆重之惟浩見其勇略多能心甚惡之時襄酒醉辭歸因出軍外歇浩喚許敬至謂曰今姚襄來降吾觀非真必有詐耳你可密藏利刃私入彼所寢刺之你若殺得其人吾自保奏朝廷立汝為將許敬曰將軍有令吾當即行言訖即出取利刃藏在身邊漏夜潛入姚襄軍中時姚襄未寢正在中軍燃燈讀書許敬從背後而入正欲下手姚襄回頭觀見一人影持刀近前襄乃拍案大喝一聲曰有賊帳外諸將搶入將許敬擒住押在案前襄問曰誰人教汝刺吾好好説來我便饒你敬曰大將軍殷浩嫉將軍之能使小人刺之襄大怒將許敬殺之襄心有憂懼乃心恨殷浩遂以兵退屯曆陽自疑燕秦方強難以伐之卻按兵不動令三軍屯田訓厲將士殷浩聞知恐其有異潛遣將軍魏慣率衆五千襲之襄聞知乃將兵分左右翼埋伏山陰穀待其過半擊之憬不知將五千人入山陰被襄放號炮伏兵大起獲住魏憬襄怒斬之並及其衆浩知愈惡之乃遣人入建康奏帝遷襄蠡台表授梁國內史使至曆陽姚襄始知謂諸將曰朝廷今以吾遷於蠡台則吾大事去矣此事如何權翼曰此必殷浩之謀可使一能言者去飴之必知其詳襄曰卿可為吾一行於是襄亦疑懼遣將軍權翼求見浩浩曰吾與姚平北共為王臣平北每舉動自專甚失輔車之理翼曰平北英姿絶世擁兵數萬而遠歸晉室者以朝廷有道宰輔明哲故也今將軍輕信讒慝與之有隙謂猜嫌之端在此而不在彼也浩曰平北生殺自由又掠吾馬王臣之體固若是乎翼曰姦宄之人亦王法所不容也殺之何害浩曰然則掠吾馬何也翼曰將軍謂平北難制終將討之故取以自衛耳殷浩微笑曰何至是也令其莫疑翼參探是實連忙歸報姚襄襄大怒曰吾以實心歸晉而汝屢次謀害吾必報之卻説殷浩陰遣人誘秦梁安雷弱兒使殺秦王健許以關右之任弱兒等偽許之且請兵接應浩聞張遇作亂以為安等事成卻自壽春率衆十萬北伐欲進據洛陽修復園陵王彪之聞知乃以人上會稽王昱箋以為恐有詐偽未可輕進昱與浩議浩不從遣人會同姚襄起兵北伐以襄為前鋒襄急集諸將計議曰今浩北伐以吾為前鋒吾欲乘此攻浩卿等有何高見權冀曰正可就此攻之過後無計可乘可速遣人回書與浩道吾起兵前行明公火速以大兵接應彼以為實必自領衆來其來必從此路去吾將三軍伏諸險要待其過了後追擊之浩必敗矣襄從其計即遣人以回書見浩道吾以兵先起火速令大兵接應殷浩果不疑率大兵前來過諸險被襄伏兵四起攻擊殷浩之衆大敗潰亂浩與諸將保會稽王昱棄輜重走奔譙城被襄揮兵一擊俘斬一萬餘人襄見浩走乃收兵盡得糧草車仗令姚益以五千人守山桑自率大衆屯淮南會稽王昱遺王彪之書曰君言無不中張陳無以過也
