body:
  text: 第四十七回桓穆北魏並諸國卻説北魏神元皇帝自太子沙漠汗死後寵愛諸子思念沙漠汗成疾是年崩享國共五十八年壽一百零四歲神元既崩諸部大人乃立文帝少子弗政為帝帝刑政寬簡百姓懷服在位一年而崩諸部大人又立神元帝少子祿官為昭帝祿官既承大位選日朝會諸部大人時諸部大人畢至俱各拜起立兩邊昭帝與諸部大人議曰我欲分國為三部一居上穀北濡源西東接宇文部我自統之一居代郡之參合坡北使文帝長子猗竾統之一居定襄之盛樂城使文帝少子猗盧統之其議如何諸部大人曰大王所為無可無不可也於是昭帝即降詔封猗竾為桓帝封猗盧為穆帝各授以兵五萬人命其統領諸部大人往二處去訖其時先是神元與晉和好並不動刀兵卻説穆帝猗盧引所部軍馬出並州遷雜胡去北自徙都雲中五原朔方城其地乃是胸奴烏桓國王所統被穆帝引衆霸居之胸奴主烏桓國王聞知乃引所部大兵十萬前來爭奪穆帝猗盧亦領軍五萬出迎烏桓國王兵分兩路掩至猗盧身先出陳來殺胸奴之兵諸部大人見穆帝當先向前衆領軍盡力擊之烏桓國王兵大敗諸部連追一百餘裏烏桓國王勢孤力寡引殘兵走還國猗盧追趕至杏城之北八十裏迄長城與晉分界而回招兵買馬積草聚糧不提卻説桓帝猗竾引所部五萬人馬渡漠北占西路為都分軍守把險隘其地乃是烏戈國王所統烏戈國王聞知猗竾占其西地心中大怒乃引所部人馬及兵十萬前來攻討猗竾王大驚遂喚魯供餘光先帶一萬人馬守西關臨行囑供光曰如十日內失之關隘必斬你二人十日外失了關不幹你二人事我親率大軍隨後便至也二人領了將令是夜便行魯仁進曰兄弟魯供性躁恐誤大事某當代往猗竾王曰你與我押送糧草隨後接應卻説魯供余光到關上堅守關隘只不出戰烏戈國王選軍人能言快語者來關下大罵猗竾王毀辱太甚魯供大怒要提兵下關廝殺餘光諫曰此時烏戈國王見我兵不出故來相激將軍不可出戰待主公大隊軍馬來時自有主意因此止住烏戈國使軍人日夜輪流數番來罵魯供大怒只要廝殺被餘光苦苦哀告所阻當時已過九日了魯供在關上看時烏戈軍都下了馬坐在關前草地上罵魯供見了即備馬點起五千兵馬開關殺將下來余光聞知恐供有失領兵隨後接應烏戈軍棄馬拋戈而走魯供得勝領軍趕去餘光驟馬來趕請供速回烏戈大軍殺來魯供抵擋不住折軍大半殺出重圍魯供餘光急往關上奔時山背後兩軍截住左是烏戈王右是西水王魯供等見腹背受敵不能復關乃棄關引衆而走烏戈王等引兵隨後追趕其時桓帝猗竾招集各處軍馬已齊次日起行魯仁為前鋒軍行之際正遇魯供餘光敗回魯仁方知失了西關乃下住營寨與余光魯供接著過了一日猗竾王大軍方到供光前去請罪猗竾令扎下營寨喚魯供餘光問曰與你十日限緣何九日失了關隘供曰烏戈軍無般不罵某等因見彼軍懈怠乘勝趕去不想中賊機彀猗竾曰魯供年幼躁暴餘光你須曉事光曰我纍諫不聽當日光在關東點視糧草將及知道小將軍已自下關去了光恐有失因此亦引兵接應猗竾大怒喝斬魯供一班兒諸將皆跪下告饒猗竾方曰權且記罪後有功可贖如無功必誅因是魯供伏罪而退猗竾次日傳令進兵直叩西關魯仁曰可先下定寨柵然後打關未遲猗竾方始教軍砍伐樹木立起排柵分作三寨左寨魯仁右寨夏淵中寨自領次日西軍哨馬直到寨前猗竾並三寨大小將校起追西軍哨馬未上十數裏西軍全隊亦到兩邊各自布陳猗竾自出立於門旗下看西兵人人勇猛個個英雄各執長槍排列陳腳門旗開處中間湧出一員大將紅袍銀鎧白馬大刀生得目如傅漆唇若塗朱腰細膀闊聲雄力猛乃即烏戈國王上首乃西水國王下首乃代山國王見猗竾在陳前高聲大叫曰汝何故侵犯我之國王此仇必與汝賊勢不兩立言訖三人各舞大刀殺過陳來猗竾欲出迎敵背後王示出曰割雞焉用牛刀大王請看小將出陳王示拍馬挺槍出迎與烏戈國王兩騎交鋒戰不數合示兵大敗魯仁等殺出助戰皆敵不住被西軍混殺卻得魯供引一軍死拒定寨柵西軍方退猗竾傳令固守亂動者斬諸將告曰西兵甚是強壯盡使長槍若非選擇前鋒以迎之則難擋也猗竾曰戰與不戰皆在於我雖有長槍安能便刺汝等也諸將皆堅壁觀之賊自退矣諸將退而言曰主人自來征戰勇敢當先如今一敗烏戈何如此弱也因是各不知其主意次早細作報來西關昨日又添十七個國王來合兵七萬相助烏戈乃是羌胡部落人也猗竾大喜至日脯時細作又報入中軍來説烏戈又添十三個國王共合兵六萬相助猗竾在帳大笑置酒作賀諸將問曰烏戈添兵大王歡喜何也猗竾曰待吾破了卻對汝説諸將皆暗笑之自此相持三個月餘忽一日猗竾集諸部將佐至帳下謂魯仁曰今烏戈盛兵皆在西關上此去西隴必無準備是賊之無謀也卿等領二萬人從北徑度嶺西直入隴中截之吾自領部佐穿西關左路燒其糧草夏淵引五萬大軍打關搦戰待其出戰卻舉火為號三下進兵可破西軍矣計議已定諸將各依計而行是夜魯仁魯供以兵二萬渡嶺西去了猗竾自領兵亦穿關左去燒糧屯次日夏淵以兵五萬殺上西關烏戈王與西水王代山王見軍至各點起大兵出戰未及交鋒夏淵便走烏戈國王率諸國王驅兵追趕未上十裏之程追兵傳報猗竾引軍抄左路上關放火燒了糧蓄烏戈大驚正欲回兵又報道稱説魯仁兄弟陰入西隴截我兵歸路烏戈慌亂急引諸王殺還關上將及至關已被猗竾橫攔截住相殺烏戈王傳令教休要戀戰退復西隴於是諸國王各盡力沖過西關猗竾與夏淵合兵後追烏戈王大兵穿至西隴被魯仁以軍敵住不能前進烏戈國王乃自引本部兵穿陰穀而逃走還本國西水十余國見烏戈王走了急欲奔逃已被截住歸路欲戰時主兵甚鋭無奈只得倒戈卸甲自縛伏道請降猗竾一見教釋其縛帶還大寨猗竾置酒款待三十余國諸王皆以善言撫慰其心令其各還本國去訖諸將問曰前日烏戈王得勝日日添兵羌部齊集而來三十國諸將膽顫心驚大王反加歡喜置酒作賀此意何也猗竾王曰前日烏戈添兵兵無紀律兵多心必不一吾用火攻焚其糧草食絶無依衆心必亂也且三十余國若一一從頭去征非十年安可服也今全集在此一計破之功成一旦吾故喜也於是諸將曰大王天資高遠智量宏深我等不及也猗竾王曰非吾一人之力皆賴卿等之力也言訖傳令班師還國猗竾王人物生得英傑魁梧戰馬不能勝其坐乘車駕大牛而行
