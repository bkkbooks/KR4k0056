body:
  text: 第三三三回劉毅據荊州謀反初劉毅既有雄才大志與劉裕俱興復晉室自謂京城廣陵功足相抗雖權事推裕而心不服也比先入朝厚自矜許朝士素望者並多歸之因與尚書仆射謝混丹陽尹郗僧施深相結納及鎮江陵舊府多割以自廣會遷荊州刺史意欲謀反與諸將議忽部將田豈上言曰天下之貴不易得之務宜靜守待其天時目今劉裕挾天子而令諸侯出師征伐兵出有名各以兵助所以常勝將軍發兵入朝誰肯相應為今之計不如待劉裕遠征乘虛入建康執天子作詔書其罪以兵討之權歸與將軍將軍若不從此計禍族必至矣毅未及對忽偏將王昱譖曰將軍興天下之計田豈出不利之言罪不容誅毅欲將豈斬之衆官告免遂枷扭送獄恨曰吾若破得劉裕明正汝罪言訖即欲起兵王昱進曰不可便起兵丹陽尹郗僧施與將軍素交將軍可作表奏帝薦其為南蠻校尉帝必以兵付郗僧施然後以書與僧施令其內應將軍詐病使令弟劉藩以書親去托尚書仆射謝混表奏劉藩為兗州刺史説公疾甚以為副二待其受職領兗州之兵前來方可起兵殺入建康則劉裕可擒大功成矣毅曰然於是作書登時使人去見謝混薦僧施為南蠻校尉及使弟劉藩去見尚書仆射謝混代表奏求兗州刺史二人皆受命而行去訖卻説劉裕大會文武于講武堂而對衆文武曰孤本庸才始舉孝廉不思微名於世耳後罹天下大亂是以託病隱居京口裏乃築一草舍於京東四十裏欲春夏讀書秋冬射獵為終天年之計俟天下清平方出仕耳然不得如意因賊謀反朝廷征孤為參軍幸破妖賊某初意專欲為國家討賊立功圖死後得題墓道曰晉故征東將軍劉裕之墓使不辱於祖宗此平生之願足矣遭桓玄之難始與諸君興舉義兵誅桓玄取蜀破秦又討擊燕超摧破盧循斬其父子遂平天下身為宰相人臣之貴已極今意望已太過矣然劉家無孤一人則晉祚已移江南分裂多時矣有一等愚人見孤任重權高妄相忖度謂孤有異志此言大亂道也每欲委兵權歸國歎無人可領此職也孤若一旦求清素之名必遺禍於國家矣孤常想周文王三分天下有其二以服事殷周之德其可謂至德也矣此言豈可遺忘也耿耿在心耳孤安有操莽之心哉百官文武必能知吾心也衆皆起拜曰雖伊尹周公不及明公之心耳裕連飲十數杯不覺沈醉忽人報曰劉毅沾疾使劉藩表奏郗僧施為南蠻校尉以弟劉藩為兗州刺史令其報來副二荊州也有使人送書與謝混裕聞知手腳慌亂心中懼戰言曰孤誤耳參軍王鎮惡曰明公在萬軍之中矢石交攻之際未嘗心動今聞劉毅在荊州疾甚表弟為兗州刺史何失驚耶裕曰劉毅與吾同起亦人中傑也平生未得遂志今錯授荊州也是困龍入于大海今使弟求兗州刺史及薦郗僧施為南蠻校尉其意欲為二人授吾兵前去謀反孤安得不動心哉鎮惡曰明公神見萬里某慮不及此也為今之計當如之何裕曰吾令人以書偽許只説天子病重數月不出設朝待病稍瘥奏請定職使彼不變然後可領五千兵稱説謝混與劉藩在京謀反盡皆誅之吾點兵選日汝連夜與龍驤將軍蒯恩以兵去討跋扈言訖遣使持書去與劉毅毅得裕書見説許二人之職只待晉帝疾瘥毅心暗喜賞使人回京去訖卻説王鎮惡以兵五千來殺謝混及劉藩時劉藩與謝混正坐在堂上飲酒不及走避被王鎮惡收斬首級號令示衆稱其謀反之由引兵復回來見劉裕回報收暫旋裕曰二賊已死宜急討劉毅奈吾軍需未備難以就行時王鎮惡曰明公若有事請給二百舸與某某同龍驤將軍蒯恩先行擒殺以待公至裕從之以二百舸與鎮惡蒯恩二人各授兵五千與其先行時劉裕以諸葛長民監留府事疑其難獨任又喚穆之曰長民不善卿宜預防之言訖領衆而行
