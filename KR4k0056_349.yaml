body:
  text: 第三四六回劉裕滅秦誅姚泓卻説晉帝設朝群臣奏劉裕克長安取得玉璽法器並秦王姚泓遣人送與陛下帝聞奏召使臣入殿受了玉璽寶物命將姚泓斬于建康泓在位二年至是降晉斬于京師百里內草木皆焦死了後秦自姚萇至泓三世凡三十二年劉裕滅之卻説劉裕聚集諸將佐遍觀宮室故地悽愴動容遂問禦史中丞鄭鮮之曰卿乃知書之輩秦漢得喪之由卿試言之鮮之遂具以賈誼過秦論對之劉裕聞之曰及子嬰而亡已為晚矣然觀始皇為人智足見是非所任不得人何也鮮之曰夫佞言似忠姦言似信中人以上乃可語上始皇未及中人所謂暗於識士也裕乃前至渭濱復歎曰此地寧復有呂望耶鮮之曰昔葉公好龍而真龍見燕昭王市骨而駿足至明公以旰食待士豈患海內無人耶裕曰卿所言甚善次日又集將佐議曰吾意欲徙駕長安經營趙魏汝等計議如何其時請將士久投征伐傷痍未瘥各起思歸之心對曰趙魏二國兵強糧足難以拔之不如令桂陽公鎮長安大王自班師回京養軍士之力聚糧草之餘然後可議西北裕聞説猶豫之際忽京內有人至報前將軍劉穆之死了劉裕大驚哭昏在地衆將急救之方蘇泣曰喪吾右臂矣乃謂諸將曰吾適間欲議西北之際今遇前將軍劉穆之死了京都根本無托難以建策吾令次子桂陽公義真為都督雍梁秦三州事留鎮長安時義真年十一掌此重權又留王鎮惡為司馬沈田子等腹心十餘人輔佐之次日欲自引餘軍振旅還京卻説司馬王鎮惡功多於人由是南人多忌之當時沈田子自以嶢柳之捷數與鎮惡爭功不平即夜私與傅玄之來見裕密於裕曰王鎮惡屢有二心向家在關中不可保信倘若有變何以為之裕曰今留卿文武將士精兵萬人彼若為不善正足自滅耳勿復多言裕又思半晌謂沈田子曰鍾會不得遂其亂者以有衛瓘之故也語曰猛獸不如群狐卿等十余人何懼鎮惡也言訖歇息次早啓行其時三秦父老聞裕還京詣殿門流涕求見訴曰殘民不沾王化於今百年始睹衣冠人人相賀長安十陵是公家墳墓咸陽宮殿是公家宅室舍此欲何之乎裕為之怒然慰諭之曰受命朝廷不敢擅留誠如所言有懷本之意今以次息與文武賢才而共鎮此境吾暫回京歲暮必至汝等寬心言訖令三秦父老回去劉裕欲行以手執義真之手以授長史王修之令修執其子之手言曰此子年幼今託付汝盡心輔佐之各效忠義之心休忘吾托之言修之答曰蒙明公拔擢今又委重安敢有懈以懷二心雖肝腦塗地亦不敢忘裕令修之等回去只有百官送數程而別裕自洛入河開汴渠以歸裕覲見晉帝問宋公遠路勞苦請其還宅裕乃辭帝而出與諸臣祭前將軍劉穆之靈柩裕至柩前哭倒於地曰劉穆之故乃天喪吾也又謂文武曰諸君年齒皆孤等輩惟穆之僅少吾欲托以後事不期中年折耳使吾腹心崩裂矣言訖又哭拜而祭之祭畢歸府去訖卻説夏王勃勃聞宋公劉裕東還心下大喜聚集文武商議與將軍王賈德曰朕欲取關中卿試言其方略賈德曰關中形勢之地而裕以幼子守之狼狽而歸正欲急成篡事耳不暇復以中原為意此天以關中賜我不可失也於是勃勃大喜乃使其子赫連璝為前部引騎二萬來攻長安勃勃自將大軍為後繼
