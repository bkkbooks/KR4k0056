body:
  text: 第十八回司馬瑋殺亮奪權卻説文成王欲削楚王權早被楚王司馬瑋手下探聽人得知密報于司馬瑋瑋聞知痛恨司馬亮乃思一計密地見于賈後曰臣聞汝南王司馬亮太保衛瓘同謀欲行伊霍之事娘娘知也未賈後大驚曰汝何得出是言我實未聞司馬瑋曰臣心腹人竊而知之以報臣耳賈後罵曰吾重用彼二人何敢異心謀我耶必殺此二賊瑋又曰若欲殺宜先下手如遲事必泄漏反遭禍矣賈後曰誰人可殺此賊司馬瑋曰臣部下有一大將姓李名肇有萬夫不當之勇可使去收二人必然成功賈後即宣李肇至密囑其事李肇持詔出宮引禁兵五百人先來圍住太保衛瓘罐府口稱太保謀叛奉旨收拿言訖入內將衛瓘罐並其子衛恆及其孫九人盡收執押去市曹斬訖領兵復至汝南王府將司馬亮擒住司馬亮曰汝等小人何敢執我李肇曰奉聖旨殺公司馬亮曰我之忠心可剖示天下也如何無道枉殺不辜耶言未畢被肇執出市曹斬訖肇收兵入內報知賈後賈後大悅因問李肇曰汝南王死有何言肇曰汝南王臨刑道我之忠心可剖示天下也如何無道枉殺不辜賈後聞言方悟司馬瑋之讒譖亦有殺司馬瑋之意無計可施悶悶不悅
