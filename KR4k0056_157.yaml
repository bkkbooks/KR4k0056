body:
  text: 第一五四回成立兄子為太子卻説成王雄後任氏無子有妾子十餘人雄不立為嗣乃立兄李特子班為太子使任後母之群臣固諫不可請立諸子雄曰吾兄先帝之嫡統有奇才大功事垂克而早亡朕常悼之且班仁孝好學必能負荷先烈當太傅李驤諫曰先王立嗣必子者所以明定分而防篡奪也宋宣公故事亦足以觀矣雄不聽驤退而流涕曰亂自此始矣李班為人謙恭下士動遵禮法雄每有大議輒令預之時五月趙涼王張茂疾篤執其子張駿手而泣曰吾家世以孝友恭順著稱晉室雖微汝奉承之不可失也且下令曰吾官非王命苟以集事死之日當以白衣人棺勿以朝服殮也言訖而卒茂既死趙王曜遣使立其子駿為涼州牧封為涼王
