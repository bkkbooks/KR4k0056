body:
  text: 第一三五回子遠獄諫趙王曜卻説趙將尹車解虎謀不一巴酋氐徐庫彭等至以酒相結謀至半酣車與庫彭言曰今主上不思遠圖專寵女色不久必敗吾欲統所部之兵出屯平陽別作良圖恐獨力難為今請閣下同去與議公意若何庫彭曰吾熟思久矣無人戮力故遲至今既將軍亦有此謀我等願作前驅車曰既閣下肯相附待正月元宵夜同引兵遁去言訖二人飲得大醉至三更始散時尹車庫彭二人飲酒之間言來語去説勝道強早有察事人竊知來報趙王曜曜大怒次早設朝文武皆集君臣禮畢趙王命武士將尹車庫彭擒下大罵曰朕何負汝汝今二人謀反命武士執尹車斬之又令太保呼延晏領禦林軍殺其部下五千人又令殺庫彭光祿大夫遊子遠告赦不聽又將庫彭等部下五千人囚於阿房過數日趙王使領兵欲去殺庫彭五千人遊子遠固諫聖主用刑惟誅元惡不宜多殺巴酋氐徐庫彭雖得罪宜赦之削其兵權若殺之其黨必然謀反關外之地非復國家之有趙王不聽子遠叩頭流血苦諫趙王大怒曰你亦同謀故相教耳使武士執子遠幽於天牢命禦林軍去盡殺徐庫彭五千人於是巴酋氐人聞知盡叛關中應者三十餘萬因此關中大亂城門盡關人不敢行子遠在獄不知庫彭已殺又使人上表苦諫道若殺庫彭非安社稷之計巴酋氐人必然為亂趙主愈怒呼左右曰速與朕入獄將子遠殺之中書劉雅朱紀呼延晏諫曰子遠幽獄尚諫所謂忠於社稷陛下縱弗能用奈何殺之若子遠朝誅臣等亦暮死以彰陛下過殺之愆天下人皆當去陛下蹈西海而死耳陛下復與誰居乎趙王意乃解赦出子遠封子遠為車騎大將軍都督雍秦征討請軍事大赦境內趙王曜欲將討氐子遠又諫曰彼非有大志欲圖非望也直畏刑欲逃死耳莫若大赦與之更始其有罪者皆縱遣之使相招引聽其復業彼得生路何為不降若其自知罪重屯結不散願假臣弱兵五千必為陛下梟之曜大悅從之即日大赦遂使子遠領兵征討巴酋氐人大軍至雍城城下屯住次日二軍相迎子遠單騎出陳謂氐人部長曰前日徐庫彭大逆故趙王誅之君等如能棄兵前來倒戈投降不致滅族之患若拒逆命必點傾國之兵使汝氐人無種類矣吾不與戰汝等三思回話言未盡氐人皆下馬投降惟句氏宗黨保于為陰密縣不降子遠率衆陷其城盡執而戍之於是關外悉平子遠振旅還都從氐羌二十余萬于長安子遠入見趙王曜曜大悅以子遠為大司徒録尚書事子遠請立太學趙王曜從之立太學選民之可教者千五百人擇儒以教之趙王曜作酆明觀及兩宮淩霄台又營壽陵侍中喬豫和苞諫曰前營酆明市道細民鹹曰以一觀之功足以平涼州矣今又欲擬阿房而建西宮法瓊台而起淩霄其為費萬億酆明若給以軍則可以兼吳蜀而並齊魏又營壽陵周圍四裏銅棺金飾其深三十五丈殆非國內之所能辦也自古無不亡之國不掘之墓古聖人之儉葬乃深遠之慮也趙王曜大悅下詔曰二侍中懇懇有古人之風可謂社稷之臣矣今悉罷諸役壽陵制度一遵霸陵之法以豫苞二人領諫議大夫又省酆水囿以與貧民矣
