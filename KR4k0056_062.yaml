body:
  text: 第六十回司馬虓擊斬石超十二月穎以兵據洛陽范陽王虓與劉琨等走至冀州竟無處安身劉琨曰冀州刺史溫羡與某有半面之識吾請命入説其人以冀州讓與殿下權且屯扎以候再舉虓曰卿去宜緊慢説之如不從可速還別作一計於是琨即入冀州拜見溫羡羡見其來握手歡若平生勝如至親以酒待之半酣問琨何來琨以實對説范陽王虓興義兵欲清朝野共討張方被劉喬乘虛攻陷許昌無處安身今避至此范陽王意請足下一同舉義使其入拜未審尊意何如羡曰張方劫駕暴掠百姓孰不思食其肉何況范陽王乎吾欲討久矣恨力不及既范陽王至吾讓此州共討跋扈卿出去請進於是琨出邀虓入冀州刺史溫羡讓位與虓同發兵又使劉琨結連王浚命浚領兵擊成都王穎取洛陽迎回車駕劉琨即以書見浚浚即發兵濟河至滎陽穎使石超引兵三萬拒迎是日石超與浚交鋒戰上十餘合超兵大敗浚揮軍一擊殺得超兵尸橫遍野血流成河超勢窮而入一山窠被浚軍追及斬之以軍進逼洛陽東海王越聞王浚攻石超乃以二萬軍來攻劉祐時祐在譙縣屯住無備被越軍馳至祐驚潰被執而殺之劉喬聞知其子祐被殺引殘兵逃走東海王越引軍屯陽武王浚遣別將祈弘將三萬兵助越自以其衆來攻洛陽
