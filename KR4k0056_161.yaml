body:
  text: 第一五八回陶侃勸人惜分陰乙酉三年二月明帝設朝君臣禮畢詔故譙王司馬丕戴淵周顗甘卓虞望郭璞等贈官有差因王敦謀逆丕等死於國難故皆贈溢其官時周劄亦死國難未蒙詔録因是周劄故吏上表為劄訟冤尚書卞壺議曰劄開門迎寇不當贈諡王導上議曰往之事敦姦逆未彰自臣等有識以上皆所未悟與劄無異既識其姦劄便以身許國尋取梟夷臣謂宜與周戴同例郗鑒曰周戴死節周劄迎寇事異賞均何以勸懲如司徒議則譙王周戴皆應受責何贈諡之有今三臣既褒則劄宜貶明矣導曰劄與譙王周戴雖有異同皆人臣之節也鑒曰敦之謀逆履霜日久若以往年之舉義同桓文則先帝可為幽厲耶諸臣雖各議不合明帝卒用導議詔劄與周戴同例有差群臣請立太子司馬衍為皇太子明帝大悅從之五月詔以陶侃都督荊襄雍梁四州諸軍事荊州刺史於是陶侃復領荊州次日率衆去鎮時荊州士女聞陶侃來鎮各各歡悅以香花迎接侃至荊州恭勤終日斂膝危坐軍府諸事檢攝無遺未嘗少停常語人曰大禹聖人乃惜寸陰至於衆人當惜分陰豈可逸遊荒醉生無益于時死無聞於後是自棄也又嘗造船其木屑竹頭侃皆令人收拾而藏之不許失落人鹹不解所以後正會積雪初晴廳階以前餘雪猶存乃令人以木屑布地及桓溫伐蜀以侃所貯竹頭作釘釘船其綜理微密人皆不知也初侃參佐有博戲廢事者侃命取其酒器樗博之具悉投之于江將吏則加鞭撲曰樗蒲者牧豬奴戲耳老莊浮華非先王之法言不益實用君子當正其威儀豈可蓬頭跣足自謂宏達耶有奉饋者必問其所由若力作所致雖微必喜受賜三倍若非理得之則切厲訶辱還其所饋侃出遊見人持一把未熟稻侃問何來人曰行道所見聊取之耳侃怒曰汝懶不佃而賊人稻執而鞭之是以勸百姓農作家給人足矣
