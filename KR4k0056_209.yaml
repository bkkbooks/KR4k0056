body:
  text: 第二六回趙立世子為太子卻説趙王虎大集群臣於中殿議立太子太尉張舉曰燕公斌有武略彭城公遵有文德惟陛下所擇者也初虎之拔上邽也將軍張豺獲前趙王劉曜之女有殊色納於虎虎娶之生齊公世桃豹乃説虎曰陛下再立太子其母甚賤故禍亂相尋今宜擇其母貴子孝者而立之虎納其言令公卿上疏請之大司農曾真不肯署名虎問其故真頓首曰天下重器不宜立少故不署虎稱其忠而不能用遂立世為太子以劉昭儀為皇后十二月晉後以蔡謨為司徒謨上疏固辭謂所親曰我若為司徒將為後世所曬義不敢拜也
