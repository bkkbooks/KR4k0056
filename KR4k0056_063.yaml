body:
  text: 第六十一回陶侃為將討陳敏卻説陳敏初以兵討克石冰自謂勇略無敵遂據曆陽以兵叛吳王常侍甘卓棄官歸養敏聞卓有一女尚未許人乃使人為媒去説聘卓女與子陳景為妻卓許以與成親於是敏謀使卓假稱皇太弟令拜敏為揚州刺史敏乘此發兵使錢端以兵南略江州使弟陳斌東略諸郡遂據江東以顧榮為右將軍賀循為丹陽內史周圯為安封太守豪傑名士咸加優禮循佯狂得免周圯稱疾不來敏疑諸名士不為己用欲盡誅之顧榮曰將軍神武不世出若能信任君子散芥蒂之懷塞讒諂之口則上方數州傳檄而定不然終不濟也敏乃止敏既謀叛朝廷聞知河間王顒以張光為順陽太守命其率步騎三萬前來討敏軍馬即日起行劉弘亦知陳敏造反謂江夏太守陶侃曰今陳敏大逆使錢端寇掠本境衆心未附卿宜乘此時擊之不然釀成大禍陶侃然之乃引兵五萬出屯河口弘又使南平太守應詹督水軍二萬以繼之陶侃與敏同鄉又同歲舉吏左右私謂劉弘曰今日明公以陶侃為將討敏然侃與敏同鄉侃設有異志則荊州必不保矣弘曰侃之忠能吾得之已久必無是也早有人報侃侃遣其子陶洪為質以自固弘引為參軍資而遣還曰匹夫之交尚不負心況大丈夫乎侃見洪還問之洪以弘語俱白與侃侃大悅無生異心陳敏聞侃以軍來乃遣陳恢引兵二萬寇武昌侃已知時侃皆是步騎無有戰船忽運糧船至侃即以運糧船為戰船左右以為不可侃曰用官船擊官賊何為不可言訖領步騎盡上運船與恢交戰侃身先矢石士卒爭鋒於是大勝恢軍大敗死者不計其數被侃追殺恢等棄船而去侃即以軍前來會張光光初合兵屯於長岐時錢端兵至張光以軍來迎兩下交戰十數合錢端敗走其衆盡降於光於是張光率衆還順陽陶侃亦還江夏使人報知劉弘左右或説弘曰張光乃司馬顒腹心今宰既與東海合義宜斬張光以明向背也弘曰宰輔得失豈張光之罪危人自安君子勿為也乃遣人上表稱張光殺敗錢端之功乞加遷擢
