body:
  text: 第一二八回劉曜即位于長安漢劉曜既即大位徙都長安立妃王氏為皇后立世子劉熙為太子立宗廟社稷南郊北郊改國號為趙以冒頓配天光文配上帝由是稱為趙也羊氏諱獻容乃惠帝後遭姦人之廢懷帝即位羊氏為惠帝皇后後洛陽敗投於曜執以為妻曜既僭位立為皇後政事皆與決之因問後曰吾何如司馬家兒後曰胡可並言陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴為百主而妻子辱于凡庶之手妾爾時實不思生何圖復有今日妾生於高門常謂世間男子皆然自奉巾櫛以來始知天下有丈夫耳因此言趙主曜甚寵愛之每日宴飲不思遠圖之計卻説南陽王司馬保自稱為晉王保既稱王改元建康置百官陳安先謀叛保遣兵擊之遣使告急于張實實亦遣韓璞以五千兵助之陳安恐獨力不敵乃使人降于成王李雄雄納之遣兵來助於是陳安以衆來逼上邦保堅守不出會城中大飢又為安所困會張實使韓璞引兵來救因此城中得此消息保出兵來應兩下夾攻殺敗陳安陳安勢窮乃退上邦百姓方才得安是時江東亦大飢元帝詔百官各言時事益州刺史應詹上疏曰元康以來賤經尚道以玄虛玄事為放達以儒術清儉為鄙俗宜崇獎儒官以新俗化也元帝納之詔命崇儒
