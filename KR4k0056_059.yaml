body:
  text: 第五十七回李雄自稱成都王卻説李雄自殺敗羅尚之後威名日著雄以范長生有名德為蜀人所重欲迎以為君長生不肯受其部將楊褒等推雄為成都王雄乃約法三章簡刑愛民於是蜀中望風降附成都大治百姓安堵國富兵強雄既即大位國號建興元年以世子李期為太子以叔父李讓為太傅以兄李始為太保李離為太尉李國為太宰以楊褒為大將軍李國李離二人有智略謀事必咨而行然二人事雄彌謹矣自此蜀地悉被李雄所據有十一月張方先授顒遷都之計來洛陽既久剽掠百姓殆竭軍糧不敷恐難住坐乃集將士商議劫駕回長安將士皆從之於是乃引兵入因奏曰洛陽廢弛已久不可修茸更兼轉運糧米甚難臣料長安地面城廓宮室錢糧民物足備可以幸鑾輿臣排辦已定請陛下登輦君臣皆懼方之勢莫敢言不可者即日駕起方分撥軍馬盡帶百官遷都而行帝不肯行方命諸軍以乘車入內逼帝上車帝垂淚從之謂方曰卿宜討車載宮人寶物同行於是諸兵因虜掠後宮宮人為妻分爭府庫割流蘇武帳為馬棧魏晉藏積珍寶掃地無遺張方擁帝並皇太弟穎豫章王熾等趨長安駕至新安天降大雪寒冷之甚帝身凍忽墜于車下傷了右足衆軍急救登輦不勝悲慘來到霸上以征西府為宮權歇次日入長安河間王引文武百官出廓迎接入城以公府為朝堂文武百官皆朝賀帝以河間王顒為録尚書事以張方為司隸自此權盡歸張方自為行事惟使仆射荀潘及司隸劉瞰等在洛陽為留台承制行事復稱永安年號復立羊氏號東西台
