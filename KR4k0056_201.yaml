body:
  text: 第一九八回孝宗穆帝即龍位卻説桓宣率軍五萬伐趙軍至丹水趙王虎使將李羆以軍三萬拒之次日交戰桓宣為羆所敗愧憤而卒庾翼聞宜敗而慚死恐諸軍亡散急遣其子庾方之去代領宣軍而屯之因此兩下相持堅壁不戰九月康帝疾篤急召集諸大臣入宮議立後嗣庾冰庾翼欲立會稽王昱為嗣何充建議立皇子聃為嗣帝從之乃立皇子聃為皇太子立訖康帝崩年二十三歲何充等代為喪事畢奉太子聃即大位聃年方三歲尊皇后褚氏為皇太后請皇太后臨朝稱制加何充為侍中録尚書事總攝朝政由是庾冰庾翼深恨於充卻説充薦後父褚裒總朝政裒固辭請居藩鎮於是改調裒都督徐兗使鎮京口尚書奏裒見太后在宮廷則如臣禮在私室則嚴父後從之時皇太后設白紗帳於太極殿抱穆帝垂簾十月荊江都督冰卒庾翼聞兄冰已死乃留子方之戍襄陽自還鎮夏口朝廷詔還復督江州翼既督江州繕修軍器大佃積穀以圖後舉伐趙乙巳孝宗穆皇帝永和元年正月趙王虎發諸州四十萬餘人治未央洛陽宮造獵車十乘克期校獵自靈昌津南至滎陽數千里為獵場若人犯其禽獸者罪至死虎又增置女官二十四等大發民女三萬餘人以配之由是郡縣媚其旨務擇美淑之女因此奪人婦者九千餘人百姓妻有美色豪勢遂脅之率多自殺十州軍民皆有怨聲石宣及諸公又私令采發之美女亦有一萬餘人總會鄴宮虎與百官一同簡閲諸女虎大悅之封使者十二人皆為列候光祿大夫逯明切諫曰內作色荒外作禽荒甘酒嗜音峻宇雕牆有一於此未或不亡今天下未定而大王淫樂如此犯先聖之模範恐非國家之久計也季龍大怒乃遣龍騰侯招執明殺之自是朝臣杜口為祿仕而已虎貪而無禮有十州之地金帛珠玉及外國奇珍異寶不可勝計而猶以為不足又使軍人發掘歷代帝王及先賢陵寢取其寶物入內由是大失民望
