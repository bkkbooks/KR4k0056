body:
  text: 第一七一回諸軍討蘇逸誅之二月陶侃溫嶠庾亮郗鑒等諸軍攻石頭連三日不下建威長史滕含募健卒五千在城中東擊蘇逸與任讓交戰任讓大敗其兵自潰合兵獲逸及韓晃斬之大開城門引諸軍入城含引將士入保後紀公卿百官令部將曹據抱成帝奔溫嶠船使請侃亮鑒等以兵衛之成帝既登嶠舟侃亮諸大臣頓首號泣請罪曰臣等不能早發義兵使陛下為賊所困帝泣曰若非卿等盡忠朕安得復有此今日言訖君臣皆喜時滕含執任讓及西陽王羕至帝命殺之陶侃與任讓有舊為請其不死成帝曰是殺吾侍中右衛劉鍾者不可以赦之於是乃殺之司徒王導等請成帝入城百官隨王導既接帝入城令取故節陶侃笑曰蘇武似不如此導有愧色心甚不悅即日成帝與百官還建康是時宮闕被峻燒為灰燼帝以建平園為宮當溫嶠謂群臣曰今宮闕被峻賊燒為灰燼若將營造民皆貧乏庫無餘積國以不足吾欲奉鑾駕西遷都于豫章公等以為何如三吳之豪皆請都於會稽司徒王導出曰夫建康古之金陵舊為帝裏孫仲謀劉玄德皆言王者之宅古之帝王不必以豐儉移都苟務本節用何憂凋敝若農事不修則樂士為墟矣且北寇遊魂伺我之隙一旦示弱竄於蠻越失民之望俱非良計今宜鎮之以靜則群情自安群臣皆曰司徒見者是也由是不復徙都而以褚翼為丹陽尹翼收集散亡京邑遂安三月成帝宴會群臣論乎蘇峻之功以陶侃為太尉郗鑒為司空溫嶠為驃騎將軍開府儀同三司庾亮為豫州刺史侃鑒嶠以下封拜有差諡卞壺曰忠貞其二子昣盱及劉超桓彜鍾雅羊曼陶瞻俞縱皆加贈諡又以滕含為襄陽太守路永匡術賈寧皆峻黨先歸朝廷司徒王導擬欲官永嶠曰不可永等首為亂階晚雖悔悟未足贖罪得全首領為幸多矣於是乃止侃以江陵偏僻移鎮巴陵朝廷從之時溫嶠欲還江陵群臣朝議留嶠輔政嶠以王導乃先帝所任固辭之又以京邑荒殘留資蓄具器用而後還藩庾亮頓首謝罪欲闔門投竄山海成帝以手詔諭之曰此社稷之難非舅氏之責也因是亮入內奏曰前臣誤及國難今幸復平而不罪臣臣願鎮武昌撫其士民積草屯糧以伺北鄙當前驅效死以報今日成帝從之於是亮領豫州刺史出鎮武昌亮出朝陶侃謂曰公與侃戮力破賊同起共功何故辭之夫賞罰黜陟國之大信公何獨怪隱然亮曰此功乃元帥指揮武臣效命亮何功之有因然獨出一方耳庾亮出鎮武昌拜殷浩為參軍史説殷浩字深源陳郡之長平人也浩識度清遠善於談論人或問曰將蒞官而夢棺尸將得財而夢糞土何也浩曰官本是臭腐故將蒞官而夢尸錢本糞土故將得財而夢穢時人以為名言年四十府辟皆不就屏居墓所十餘年時人擬之管葛長山令王蒙江夏相謝尚猶伺其出處以卜江左興亡之事因相與省之知浩有確然之志既反相謂曰深源不起當如蒼生何於是亮知其名召至當浩見亮所乘的驢馬浩告亮曰使君所乘之馬乃的盧也不利於主可賣之耳亮曰曷有己之不安而移之於人大不義也吾不為耳浩慚退之而不出時亮染病聞戴洋善風角蔔候乃使人召至而問曰吾初鎮武昌聞卿善於風角敬召卿至以蔔吉凶切莫隱謎幸直言之洋曰武昌地方有山無林政可圖始不可居終山作八字數不及九昔吳用壬寅來上創立宮城至己酉還下秣陵陶公亦涉八年土地盛衰有數人心去就有期不可移也公宜更擇善處武昌不可久居亮曰卿言甚是有理吾今病作代吾蔔之洋觀風訖便曰昔蘇峻亂時公于白石祠中祈福許賽其牛願至今未酬故為其鬼所考宜速還之亮曰卿是神仙也此願果有未去酬之言訖使人以牛酒向去石祠解願解後亮病果瘥敬重於洋矣初侃之討峻也獨湘中刺史卞敦擁兵不赴又不給軍糧侃奏曰請檻軍收赴廷尉司徒王導曰喪亂之後宜加寬宥乃以敦為廣州刺史敦自知悔乃憂愧而卒時庫藏空虛無有支給止存練帛三千端使人出售民皆不顧導計因謂百官曰今庫藏無有支給止存練帛三千端吾使人鬻之民皆不顧來日諸賢俱各要制練布單衣著之則練必有人增倍而買於是百官朝罷即散歸家作練布單衫而著因此士庶看見翕然爭買服之練遂湧貴導使人將庫內練帛三千端出賣每一端賣金五兩得金一萬五十兩易銀八萬餘兩以充國用而以葺宮殿始完四月始安溫嶠既受江州刺史之職領軍還藩行至牛渚磯自登舟行令軍踐水過去左右稟曰其下多怪異其水不可測度人難以渡嶠不信遂燃犀角照之須臾見水族畢現奇形怪狀乘馬車著赤衣者而過之嶠見遂令軍人討舟而渡其夜夢一人謂之曰與君幽明道別今何意相照也醒覺齒痛心甚惡之因拔其齒而中風至江州一旬而死江州士庶聞之莫不相顧而泣嶠卒時年四十有二朝廷諡曰忠武嶠既卒王導奏以劉胤為江州刺史胤乃嶠軍師也侃鑒出曰胤恐非方伯之才不若易之王導不從其子王悅謂之曰自江陵至於建康三千餘裏流民萬余國之南藩要害之地今信任胤而胤以汰侈無檢臥而治之不有外變必有內患矣導亦不聽八月趙南陽王劉胤聞石生人據長安乃自率衆十萬自上邦至長安隴東戎夏皆應之胤兵至長安石生據城自守石虎聞之領步騎二萬來救與劉胤交戰胤大敗被虎大破之乘勝追擊枕尸千里追至上邽上邽軍民盡皆棄城大潰石虎入城執太子劉熙及南陽王劉胤等共二千餘人皆殺之徙其台省文武關東流民秦雍大族于襄國秦隴悉平苻洪姚弋仲俱降于石虎虎表洪監六夷軍事弋仲為六夷左都督徙氐羌十五萬落于司冀州前趙王曜在位十年而敗自漢元海至曜三世共二十載沒于後趙十二月晉劉胤既領了江州刺史遂矜豪縱酒不恤政事時郭默被征為右軍將軍求資貸于石河會有司奏朝廷空竭百官無祿惟資江州漕運而胤商旅繼路以私廢公於是成帝詔免胤官胤方自申理默誣胤大逆領部衆襲斬之遣使傳首京師詔引樵國內史桓宣為黨桓宣固守不從初代王郁律被賀傉所害其長子拓跋翳槐出奔別部招集勇士數萬至是來取大位代王紇那聞知乃出奔宇文部去百官復迎翳槐立為代王以統朔方兵威復振諸部來應之
