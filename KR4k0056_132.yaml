body:
  text: 第一二九回祖逖興兵討陳川卻説祖逖率五萬步騎攻陳川于蓬關石勒聞知遣石虎桃豹將兵三萬來救祖逖始遷屯淮南石虎既至蓬關令陳川率衆徙居襄國留桃豹守陳川故城自勒兵與川退還襄國去訖卻説石勒又得陳川之衆遂率兵五萬來寇幽州幽州無備被攻陷之段匹磾在薊城聞幽州失守心中大懼恐來攻薊乃率衆奔樂陵縣而據之卻説梁州刺史周訪擊杜魯魯勒衆拒戰兩下交鋒戰四五十合魯措手不及被訪斬之其衆盡降初王敦患杜魯因謂訪曰足下若擒得杜魯當相論為荊州至是訪破斬杜魯而回敦不用又王廙在荊州多殺陶侃將佐士民怨怒朝廷已知元帝征廙為散騎常侍而以周訪代之王敦忌訪威名難制從事郭舒亦説敦曰荊州雖荒敝乃用武之國不可以假人宜自領之訪為梁州足矣敦從之乃加周訪安南將軍余如故訪聞大怒敦手書譬解並以玉璽玉枕遺之訪擲之於地曰吾豈賈豎可以寶悅耶因此訪去襄陽務農訓兵有圖敦之志守宰有缺即補然後言王敦不能制卻説徐龕既降石勒以衆寇來掠濟岱諸境近臣奏知帝甚憂之問群臣誰去討之王導奏以太子左衛率羊鑒乃龕之州裏冠族能制之令其率兵五萬去討元帝從之封羊鑒左都督令率軍討之羊鑒辭謝曰臣才非將帥恐不克效望陛下另選良將郗鑒亦上表言羊鑒不可使王導不從以羊鑒為征討都督督徐州刺吏蔡豹及劉遐鮮卑段文鴦等討之於是鑒不得已領旨出朝點過精兵五萬擇日起行
