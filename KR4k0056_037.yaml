body:
  text: 第三十六回淮趙二王相謀害秋八月卻説趙王倫以淮南王司馬允為驃騎將軍領中護軍司馬允性沈毅宿衛瓘將士皆畏服之知趙王倫孫秀有異志欲謀討之倫秀密知其議即轉司馬允為太尉外示優崇其爵內實奪其兵權淮南王司馬允乃大怒遂率國兵數百人直出大呼曰趙王與孫秀謀反我討之肯從者左袒於是從者甚衆司馬允以其兵遂圍相府趙王倫亦引兵數千人出與淮南王允戰兩軍相交戰不五合趙王倫敗死者數百人倫走入府內緊閉不出允乃結陳于承華門前中書令陳淮欲應允言於帝曰今日淮南王司馬允與司馬倫為爭權各以兵相戰望陛下委臣領禁兵前去解和不然必有一傷而亂及中朝矣惠帝曰卿不可去朕使別將去於是帝遣殿前將軍伏胤以三百兵持白幡前去解鬥在相府前過趙王長子汝陰王司馬虔時在門下省見胤領兵過即出陰與胤誓曰君能為我富貴當共之胤答曰殿下息言吾乘幡入內殺之言訖即馳至承華門乃詐言曰臣奉詔以兵來解和殿下火速開陳與臣相見淮南王允以為是實不提防令開陳門受詔伏胤直入將淮南王允刺死收其兵來見趙王倫倫大喜拜伏胤為大將軍入朝奏惠帝言淮南王允謀反夷滅允族數千人
