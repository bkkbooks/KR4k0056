body:
  text: 第三二一回劉裕以兵攻廣固劉裕既用參軍胡藩計克臨朐始令鳴金收軍入城安屯犒賞諸軍即分兵安守其城忙傳令乘勝連日帶夜趕捉燕王超時諸將得令不敢停留各自引兵即行行至廣固前部部將景子趕著慕容超超見追兵至慌忙收軍入廣固未及景子躍馬持刀當先殺入將士見其身先諸部齊心皆殺入廣固燕王見晉兵混入不敢久戀領兵開西門引家小走保小城去了因此劉裕後軍殺入得屯廣固大城賞勞諸將卻説燕王超領諸將五樓同走入廣固小城五樓傳令諸將設長圍守之裕既克廣固大城乃傳令諸軍來攻小城諸將得令各引兵前抵小城兵已近城下裕令三軍繞城皆築土山掘地道以攻之五樓傳令堅守甚嚴守東門將馬禮貪酒有誤巡哨五樓發怒拿下脊杖四十馬禮恨之開門投降劉裕裕問攻城之策馬禮曰突門內土厚可掘地道而入放火燒城可拔也裕令馬禮引五百壯兵連夜掘地道而入五樓至夜上城點視軍馬不見馬禮是夜又見突門角上城外無燈火五樓曰馬禮必然恨吾而降晉必引兵從地道而入也急喚精兵運石擊落中柵門門閉馬禮及五百壯兵皆死於其內裕因此折了這五百兵乃罷地道之計只是繞城圍之堅守相拒七月超見城內糧少與五樓商議計策退之五樓曰大王憂兵少糧乏懼晉兵率衆而來久則成不敵之勢其理然也臣聞姚興部下有雄兵百萬猛將千員依臣愚見可專人備禮求救于秦王姚興姚興必先攻臨朐劉裕聞知必還救之大王引兵追之兩下夾攻裕可擒矣超曰其計甚善王鎮曰百姓之心系於一人今陛下親董六師奔敗而還士民喪氣聞秦有內患恐不暇救人今散卒尚有百萬宜悉出金帛以餌之再決一死戰若天命助我必能破敵如其不然死亦為美樂王惠曰晉軍氣勢百倍我以敗卒當之不亦難乎秦與我如唇齒也安得不相救乎超從之遣張綱去秦國張綱聞言忙出領命欣然肯往超備禮修書又與綱使一千兵連夜送綱殺出重圍使來西羌見姚興敘禮畢將書呈上興披書讀訖即回書與張綱歸去説他隨後動兵來綱去了興即召諸將集議其事部將李榮上言曰今燕王被晉兵攻擊太急不得已使張尚書來求救于我將兵雖勇未可遠離只可守著自己城池不如遣使往裕處虛聲張言説我將兵十萬涉淮出屯洛陽晉兵不退長驅而進矣裕聞知必勒兵而還可退晉兵亦保燕地無危興聞説即使人往裕處虛張説秦王以兵十萬出屯洛陽將下江南使人去了卻説燕之使臣張綱得秦王姚興回書即忙還燕行至泰山路上撞見一簇人馬擁著一個官人乃是泰山太守申宣綱行狹路無處回避只得迎立被申宣覷見面生喚左右盤問綱戰栗回答不來被左右搜身上搜出一封回信送與申宣申宣開讀始知是燕王超求救于姚興申宣不問情由令軍人將綱解來廣固見劉裕裕大喜曰吾思綱久矣今幸得見即令人誘其投降綱無奈只得請降於是裕大笑慌忙喝退左右親解其縛取衣衣之握手請起同立便言適來左右不識尚書言語冒瀆威容幸勿見責吾素知老尚書乃世之真大丈夫也言訖令手下便進酒壓驚以上賓禮待之因謂綱曰良禽擇木而棲賢臣擇主而佐卿有王佐之才何事偽燕耶綱答曰生當其土不得不為其用耳於是張綱乃感其恩義安身無有異志時劉裕請問取城之策綱曰小臣深蒙厚愛無可以報願施犬馬之勞奪取此城少酬萬一劉裕拱手稱謝以求取城之策應是何如劉裕敬綱因有巧思妙策諸人不及先是裕每修攻城之具攻廣固小城皆被綱用計破之不能攻取及晉軍攻城城上燕兵皆笑曰汝不得張綱何能為也今綱被捉來降如何不敬之也當綱獻計曰其城雖固可命匠造飛樓車懸雲梯車上施幔木板屋即以造定遮護伏兵於內推至城下以箭射守城軍人令壯兵從雲梯上去必得城也裕聽罷稱讚不已即令綱領軍匠造車未及完備推至城下示之城上軍民莫不失色是日為始北方之民執兵負糧歸者日以千數裕皆安撫慰之卻説慕容超知張綱業已被虜乃商議遣人詣劉裕營中求稱藩臣割大峴為界獻馬千匹永不敢侵裕不許超愈大驚時姚興使人來見劉裕説晉兵不退秦王以兵十萬出屯洛陽欲下江南劉裕與使曰爾報姚興我定青州將過函穀虜能自送令其速來耳使人去了録事參軍劉穆之遽入言曰此語不足威敵適足以怒之若廣固末拔羌寇奄至公何以待之裕笑曰此正是兵機非卿所解夫兵貴神速彼若真能赴救必畏我知寧敢先遣使命逆説此言是自張大之辭羌見吾伐燕將內懼自保不暇何能救人也劉穆之默然於是相拒至十月城未下會劉毅使上黨太守趙恢領五千人來救援即令別屯待之十二月丁亥晉兵添十倍軍士並力攻城燕王因城中困極宰馬而食軍士飢倒不能把守
