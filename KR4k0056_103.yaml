body:
  text: 第一回石勒襲薊殺王浚三月石勒欲襲王浚而未敢發因懼劉琨烏桓為後患也張賓曰明公欲圖王浚而趑趄未發豈非畏劉琨及鮮卑烏桓為吾後患乎勒曰然賓曰彼三處智勇皆不及明公明公雖遠出彼必不敢輕動且彼不靖明公便能懸軍於千里取幽州也輕車往返不出二旬即使彼有是心若其謀議出師吾已遠矣劉琨王浚雖同名晉臣實為仇敵若修箋於琨送質請和琨必喜我之服而快浚之亡終不救晉而襲我也用兵貴神速勿後時也勒曰吾所未料右侯已料之遂遣使奉箋于劉琨自陳罪惡請討浚自效琨大喜移檄州郡言勒巳降當攻平陽以除僭逆軍未及發三月勒軍達易水浚督護孫緯見勒兵馳至遣人白浚自以兵拒之遊統禁之勿拒王浚聞緯使人報石勒至遂得令勿拒候我來見浚將佐曰胡人言而無信必有計請擊之浚怒曰石公來正欲奉戴我也況前日表至約在此時豈有詐乎敢言擊者斬即令諸將設餉以待之勒次晨至薊叱守門者開門猶疑有伏先驅牛馬千頭聲言上禮實欲塞諸街巷浚始悔時勒諸將已各升其聽事堂王浚出與石勒相見被勒叱令執之於前浚罵曰胡奴調乃公何凶逆如此勒曰公位冠元台手握強兵坐觀本朝傾覆曾不之救乃欲自尊為天子非凶逆乎言訖傳令左右即監送還襄國斬之浚之將佐皆至勒軍門謝罪前尚書裴憲從事中郎荀綽獨不至勒召而讓之憲綽對曰憲等皆世為晉臣荷其榮祿浚雖南祖猶是晉之藩臣故從之不敢有二今明公苟不修德義專事威刑則憲等死自其分請就死不拜而出勒謝之待以客禮勒數朱願棗嵩等以納財亂政責遊統以不忠所事皆令斬之浚將佐親戚家眷皆巨萬惟憲綽只有書千餘卷鹽米各十餘斛而已勒曰吾不喜得幽州喜得二子耳於是以憲為從事中郎綽為參軍分遣流民各還鄉里勒停薊二日焚浚宮殿以故尚書劉翰行幽州刺史戍薊置守宰而還孫緯聞知王浚被害以軍攔住石勒歸路勒衆與戰不利退尋別路而歸得還襄國遣使奉王浚首獻捷於漢主聰大悅使使以勒為東單於劉琨聞知勒殺王浚獻首于漢方知勒無降意遣使請兵於代公會擊平陽代公拓跋猗廬得琨書即起兵其部下雜胡欲謀應勒代公聞知悉誅之因此遲滯不能赴約琨見北兵不至亦未敢行卻説劉翰見勒軍退還襄國驅逐戍守之吏乃以薊城歸段匹磾匹磾引衆人據薊城
