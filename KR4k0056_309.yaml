body:
  text: 第三六回桓玄陷建康篡位次日元顯奏安帝下詔罪狀桓玄安帝從之以元顯為總領大將軍征討大都督加黃鉞劉牢之為前鋒譙王尚之為後鋒張法順言於元顯曰桓謙兄弟每為上流耳目而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示無二若不受命當逆為其所敗元顯曰今非牢之無以敵玄且始事而誅大將人情不安而且桓玄有遺惠于荊土而謙其子安可殺也言訖奏安帝除謙荊州刺史以結西人之心卻説桓玄令人探訪虛實聞知朝廷以元顯握兵遣牢之等以兵前來心中大驚欲完保江陵忽一人挺身上言曰明公英威震於遠近元顯口尚乳臭劉牢之大失物情若以兵臨近畿示以禍福土崩之勢可翹足而待何有延敵入境自取窮蹙者乎玄視之其人乃長史卞範之玄聽其論即從之遂領大兵復行至江陵縣兩軍相遇是時天晚各自安營至次日兩下出兵相交當時桓玄出兵交鋒牢之亦挺槍相戰兩馬相交戰上十合不分輸贏兩下鼓噪又戰約有五十餘合牢之見勝不得自回本陳玄恐其詐亦不來趕由是兩下各自鳴金收軍屯扎相拒月餘參軍劉裕勸牢之急擊之牢之不許桓玄歸營謂衆將曰牢之勇猛急不能破卞範之又曰主公可使人去説令其人來降則大事成矣桓玄曰然於是使桓信奉手書來見牢之説將軍肯降久後同享富貴必不相忘至夜劉牢之謂子敬宣曰道子昏暗元顯淫凶吾深慮平桓玄之後政亂復始不如因其招降請和吾退往別地假桓玄之手以殺二賊吾然後乘隙可以得志於天下敬宣曰兒恐桓玄威望既成則難圖之牢之曰取之如反手但平後寧殺驃騎何於是牢之反遣子敬宣詣玄營請和劉裕與何無忌二人並固諫不從由是劉裕退居廣陵敬宣即行見桓玄具説父令他來請和降之事玄意猶豫卞範之急點頭言曰可從之劉將軍既令公子前來請和必無詐意明公何可推乎於是玄意遂決排宴款待敬宣許罷兵約定旦日各自罷兵至次日送敬宣回營宣去了玄謂卞範之曰先生令言和何年得定天下乎範之曰若不言和劉牢之必奏朝廷加兵嚴備守住險要吾等安能進兵不如許之暫其退兵令其不備然後以兵陰襲建康必然克也故兵法曰就計以和攻其無備玄聽説大悅過幾日退兵三百餘裏牢之聞玄兵退還兵亦屯會稽去了玄大喜謂範之曰不出先生之所料耳於是停住數月又領兵十萬來攻建康初桓玄起兵發江陵慮事不捷常為西還計及過潯陽見無兵甚喜晉帝聞桓玄之兵復至急下詔使齊王柔之以騶虞幡止之被玄所殺玄至曆陽襄城太守司馬休之以羸兵與戰敗走譙王尚之衆自潰玄捕獲之時劉牢之亦素惡元顯以慮功高不為所容自恃材武擁強兵欲假玄以除執政復伺玄隙而自取之先參軍劉裕而請急擊之牢之不許自去玄聞知使牢之族舅和穆牢牢之曰自古載震王之威挾不賞之功而能自全者誰耶今戰勝則傾宗戰敗則覆族不若翻然改圖則可以長保富貴矣牢之從之遂與玄復相通東海何無忌牢之之外甥也與劉裕共來極諫不聽其子敬宜又諫牢之怒曰吾豈不知今日收玄如反覆手掌乎玄之今後奈我驃騎何遂使敬宣請玄會晤玄陰欲誅牢之乃與敬宣宴飲陳各書畫共觀之以安悅其意敬宣不覺也元顯將發兵出討玄聞玄已至新亭元顯棄船退軍二日復出陳兵于宣陽門外軍中反言玄已至南桁元顯遂引兵欲還宮玄乘勢遣人拔刀隨後追擊大呼有警當軍人皆奔潰元顯走入東府被玄遣從事收縛獻之元顯曰為法順所誤耳玄既克建康欲殺晉帝乃聚衆謀士商議朝廷之事卞範之進曰明公意在大位臣以為不可何也蓋方鎮兵強而又民心附晉豈可速也昔晉文公納周襄王而諸侯竟從魏武帝挾漢獻帝群臣歸附不如因此入朝奉王以從人望大順也重權公出以服天下大義也不然諸胡乘隙方鎮加兵雖有孫武之策未易守也玄猶豫次日晉帝設朝群臣山呼奏知桓玄克建康及起兵京城之事帝乃大驚即與文武商議如何可保全社稷百姓無咎文武上言曰臣見桓玄好爵之人陛下可高坐儀鑾出聖旨命使宣他進來封他重爵彼必不就害陛下也與戰則恐不利帝曰然於是即出聖旨使人去宣桓玄玄得旨猶豫不決當卞範之進前密曰明公威震中外誰不懼之引大兵在此屯駐入朝何妨不如從旨進觀晉帝帝必以重爵封明公明公乘此機會總百揆握朝權挾天子而令天下指日定矣何必更疑乎玄聞言大喜即具朝服隨使入朝至金殿之下拜舞山呼萬歲已畢奏曰臣起兵者為陛下有獐頭鼠目之人前後有狼心狗肺之徒傷害朝綱暴酷萬民是以起兵來誅讒佞必不敢有萌害陛下之心陛下可高枕無憂也帝聞奏大悅賜玄平身桓玄自為丞相而總百揆玄既入京稱詔戒嚴自為丞相總百揆都督中外録尚書事揚州牧復讓丞相而為太尉以兄弟桓偉為荊州刺史桓修為徐兗刺史桓石生為江州刺史卞范之為丹陽尹王謐為中書令徙會稽王道子于安成郡斬元顯尚之庚楷張法順十餘人以劉牢之為會稽內史牢之驚曰如爾便奪我兵禍其至矣子敬宣勸牢之襲玄牢之猶豫告劉裕曰今當北就高雅之於廣陵舉兵以匡社稷卿能從我乎裕曰將軍以徑卒數萬望風降附彼新得志威震天下朝野人情皆已去矣廣陵何得至耶裕當反服還京口耳退謂無忌日吾觀鎮北禍必不遠卿可隨我還京口玄若守臣節當與卿事之不然當與卿圖之於是牢之大集僚佐議據江左以討玄參軍劉裕曰事之不可來莫大於反將軍往年反至兗州近日反司馬郎君今復反桓玄一人三反何以自立語畢趨出佐吏各散走牢之懼擒率部曲北走至新洲自縊而死卻説桓修鎮丹徒聞劉裕賢而有勇略隱遁於京口乃使人齎禮召請為參軍使人得令即去請劉裕劉裕從請即來見桓修桓修聞至大喜降階相迎握手而笑歡若平生勝如舊識以酒相待飲至半酣修起言曰聞君才名出衆智識超群故命使請君為參軍君可同心協力計劃軍機以佐吾弟太平之後畫地封君劉裕答曰裕蒙明公録用安敢不效犬馬之勞但恐有辜下問也君有驅馳必不辭行修又曰旦日吾親自與君去見吾弟命其奏帝再加封賞言訖席散時劉裕來見故人孔靖曰桓玄篡形已見吾欲從山陰起義討之卿意如何靖曰山陰路遠且玄未居極位不如待其篡後於京口起義討之裕然之卻説隆安以來中外之人厭於禍亂及桓玄初至黜姦佞擢賢才京師欣得兼得少安既而玄又奢豪縱逸且政令無常朋黨互起淩侮朝廷裁損減其供奉之具帝幾不免飢寒由是衆心失望
