body:
  text: 第三一五回馮跋即位于昌黎史説馮跋字文起長樂信都人乃畢萬之後也萬之子孫有食采馮卿者因以氏焉先慕容寶僭位署跋為中衛將軍及慕容熙即位欲誅跋跋與兄弟俱亡逃在外時慕容雲既被殺國內無主文武潰散時馮跋在昌黎將推以為主於是迎跋跋始即大位不改國號仍國號燕元太平元年以弟素弗録尚書事總督內外諸軍事馮跋既僭大位勵意桑農乃下書曰桑柘之益有生之本北上少桑人未見其利可令百姓人植桑一百根柘二千根時地震寢宮崩壞燕王跋即問太史令辟尚曰昔年屢有地動之變卿可明言主何吉凶尚曰地陰也主百姓遷震有左右昨震皆向右臣懼百姓將西移燕王跋曰吾慮此也九月西涼公皓與長史張邈謀乃徙都於酒泉以逼沮渠蒙遜舉手令其諸子曰從政者當審慎賞罰勿任愛憎近忠正遠佞諛勿使左右竊弄威福毀譽之來當研核真偽聽訟折獄必和顔任理慎勿逆詐億必輕加聲色務廣咨詢勿自專用吾蒞事雖未能息民然含垢匿瑕朝為寇仇夕委心膂粗無負於新舊事任公平坦然無繇向不容懷有所損益計近則如不足經遠乃為有餘庶亦無愧於前人也諸子從之丙午二年初南涼傉檀伐北涼還獻馬三千匹羊三萬口于秦秦王興以為忠以傉檀為涼州刺史命鎮姑臧征王尚還涼州士人道主簿胡威請留尚鎮姑臧興弗許威見興流涕言曰臣州僻遠仗良牧仁政保全至今陛下奈何以我等貿馬羊乎若軍國需馬直煩尚書一符臣州三千餘戶朝下而夕可辦也昔漢武帝領天下資力開拓地面以斷胸奴右臂今無故而棄五郡之地忠良華族以資暴虜豈惟臣州士民墜于塗炭恐方為聖朝飲食之憂耳興悔之使人弛止尚莫回時傉檀之軍至五澗王尚未離傉檀托別駕宗敞勸王尚行焉當別駕宗敞打發王尚上道自來辭傉檀去同尚還長安傉檀謂曰吾得涼州三千餘戶情之所寄唯卿一人而已奈何舍我去乎敞曰今送君回與大王解紛正所以忠于殿下也傉檀因問新政所宜敞曰惠撫其民收用賢俊薦本州民士十餘人傉檀嘉納之傉檀宴于宣政堂仰視歎曰古人有雲作者不居居者不作信矣孟褘曰昔張文王始為此堂於今百年十有二主矣惟履信思慎者可以久處傉檀善之傉檀雖受命于秦然其服用禮儀一如王者
