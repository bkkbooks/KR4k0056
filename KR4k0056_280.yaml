body:
  text: 第二七七回呂光考核殺尹興戊子十三年正月卻説涼州刺史呂光聞秦王苻堅為姚萇所害及聞金華縣縣令申報麒麟出於其邑百獸從之光以為祥瑞大赦境內乃自即三河王位國號麟嘉呂光既即王位命張掖督郵傅曜考核屬縣巡察清汙時丘池令尹興貪贓酷刑聞呂光使傅曜考核諸縣來至丘池尹興恐其察報與光見罪不便乃接入南亭安下至夜使腹心人刺殺之以其尸投空井中傅曜冤魂不散每夜來托夢於三河王呂光曰臣乃張掖小吏蒙遣按核諸縣而丘池令尹興贓狀狼藉懼臣察出報大王殺臣投于南亭空井中衣服尸骸現在井中呂光驚覺而猶見傅曜久之乃滅次日使人去南亭空井中尋覓尸首果在井中使人即搬傅曜尸首回報呂光光大怒又使人召丘池令尹興縛至殺之因是官吏奉職不敢酷刑初光之定涼州也杜進功居多貴寵用事群僚莫及時光甥石聰自關中來呂光問之曰中州人言我為政如何聰曰但聞有杜進者不聞有呂光光由是忌進使人密殺之他日與群僚語及政事參軍段業曰主公用法太峻光曰吳起無恩而楚強商鞅嚴刑而秦興業曰吳起喪其身商鞅亡其家皆殘酷之致也明公慕之豈此州士民之所望哉光因此改容謝之
