body:
  text: 第七十三回石勒寇巨鹿常山史説石勒宇世龍其先胸奴別部老渠之胄勒生時赤光滿室白氣白天屬於中庭見者鹹異之年十四家貧乃隨邑人行販洛陽倚嘯上東門之柱忽司徒王衍過見而異之顧謂左右曰向者胡雛吾觀其有異恐將來必為天下大患不如殺之免其為後亂言訖馳遣人收之石勒已去矣使人回報已去衍歎息良久勒年長壯健有膽力雄武好騎射裏中父老相之皆曰此子狀貌奇異志度非常其終不可量也因勸邑中人宜厚遇之邑中多嗤笑不聽其説惟塢人郭敬陽曲寧驅以為信然並加資贍勒欣領其惠而心感之嘗代人力田耳中常聞鈴鋒之聲以為有患走歸以告其母母曰汝作勞耳鳴非不祥也於是勒心少安至太安中並州飢亂刺史東瀛公騰恐軍民生變計執諸胡于山東發賣以充軍實勒亦在其中因賣與荏平人師歡家為奴有術者謂勒曰君魚龍發際上四道已成當主大貴勒謝之曰若如公言不敢忘德後與諸奴力作屢有奇異諸奴歸以告師歡歡始奇其狀貌繼聞諸奴之言遂免其力作不取其賣身之值縱之使還勒無盤纏不行聞歡鄰有為馬牧之官姓率名汲桑者勒自言能相馬桑亦奇其壯偉厚遇之一日于武安臨水傭田偶遇一隊遊兵經過怪勒不避執擁而去正走間草際趕起一鹿衆人撇下石勒競相逐鹿勒因是走脫俄見一老人前來謂勒曰適間之鹿我所為也方脫子於難子後有大福宜自保重勒拜而受命曰多謝指迷起視老人不知所往勒自是欣然自得會公率藩起兵趙魏汲桑與勒率數百騎赴之為苟晞所敗後又與晞戰大敗桑走死勒歸降劉淵淵見其奇偉乃以為輔漢將軍數有功勞乃令其攻巨鹿常山二郡始得行其志焉卻説漢主淵大宴將士於平陽報石勒拔魏汲頓丘三郡凱還淵大喜宣勒至拜于殿下問勞已畢便令赴宴原來勒自降後居左國禮賢納士惜民養軍數四出征無有不勝因此漢王甚愛之常歎曰使吾有子如此即死有何恨因以勒為輔漢將軍先引兵去伐流部軍人得勝而回復使寇魏汲頓丘又得勝而回當日宴罷席散回至寨中心懷悶悒是夜月明自思如此英雄不能獨占一方今反居於人下因放聲大哭忽一人自外入大笑曰世龍何故如此今日有何不快之事何不與我商議而自苦也視之其人姓張名賓勒請坐而問於勒曰為何而至於哭勒曰恨半生碌碌恐虛度耳賓曰久居人下自不能伸丈夫之志公何不向漢王乞兵攻巨鹿常山從中以成大業言未畢倏有六人入曰公等所謀吾已知之吾六人手下有精勇百餘少助將軍一馬之力視之乃夔安孔萇支雄呼延莫等勒大喜張賓曰只恐漢王不肯動兵奈何勒曰吾自代他征討如何不肯商議已定次日入見漢王拜於階下淵問其故勒曰臣欲乞兵攻巨鹿常山二郡收錢糧廣土地以報陛下知遇之恩未審聖意若何漢主曰卿肯出力如何不從且目今正缺糧草用度即以精兵三萬馬千余匹加封石勒為征東將軍並州刺史汲郡公命其攻巨鹿常山二郡勒領命謝恩而出即領兵速行以刁膺為股肱及張敬夔安孔萇桃豹逯明為牙爪並州諸胡羯多從之史説張賓字孟孫趙郡頓丘人博涉經史不為章句胸次闊達有大節大志多智多謀機不虛發算無遺策嘗自謂不後子房但不遇漢高耳聞勒動兵攻巨鹿因謂所親曰吾曆觀諸將無如此胡將軍者可與共成大業主意已定即佩劍詣勒軍門大呼請見勒聞知即請人亦未之奇也張賓以策上勒由是奇之用為謀主時勒衆至十余萬集衣冠人物別為君子營於是勒軍大振次日起行來攻巨鹿常山二郡劉寵聞知引軍來迎次日石勒引大隊軍馬來到劉寵引軍出迎兩陳開處石勒於陳前令衆軍大叫曰何不早降劉寵令軍士發進兩陳呐喊這邊道勝那邊誇能支雄出馬搦劉寵決勝負定輸贏寵當先出馬張英曰不須主公勞力吾自擒之張英出到陳前支雄曰汝非是敵手只教劉寵出馬張英大怒挺矛直取支雄兩馬相交十余合劉寵急鳴金收軍張英曰我正欲擒殺賊將何故收兵寵曰吾聞張賓引兵襲取城池城中有一人姓吳名豫乃松江人聞得與石勒為內應若城池不保我等安歸不如還城會師統軍馬再來迎敵劉寵收軍回寨勒亦不趕長史孔萇進曰張公已取巨鹿彼軍無戰心今夜正可劫寨勒然之當夜分兵長驅大進劉寵軍將原無紀律加之敗後四分五落張英難支引數十人投別處去了劉寵與謀士許子亦走陵城去了石勒連夜進兵至巨鹿時城被張賓詐稱劉寵軍馬敗回誘開城門接勒入城坐定出榜安民勒取四方之衆于巨鹿安民惜衆投者無數巨鹿內外之士民初聞兵至老幼皆失魂喪魄官吏盡棄城廓逃避山林及勒至治軍士軍士奉命並無一人敢出虜掠者故雞犬果木分毫不動民心大悅競送牛酒到寨勞軍勒以金帛答之歡聲遍野其有劉寵等舊軍願從軍者並除門戶不願為軍者齎發糧米令自歸家生理四方之民聞勒清政誰不仰羡由是聲勢大振勒使逯明守本郡自領兵進取常山太守程晟令嚴興出戰交兵於楓橋興橫刀立馬於橋上勒軍望見報到中軍勒便欲出張賓諫曰夫主將乃籌謀之所主不可自出三軍之所系命不宜輕出願明公重天授之資副四海之望無令國內上下危懼勒謝曰先生之言如金玉但恐將士不用命當先耳隨遣王陽出馬陽驟馬至橋下正待交鋒而支雄桃豹各從河內涉水而過亂箭射倒岸上之軍飛身上岸嚴興望見忙退入城支雄桃豹直殺至城下王陽大兵並進圍住常山一圍三日勒引衆將到城下招諭城上一個裨將左手執定護心梁右手指著城下罵王陽在馬上拈弓搭箭道看我射這廝左手一箭射去正透手背釘在護梁上城上下看者無不喝采群卒救了進去見程晟説城外有一人如此神箭晟大驚商議求和次日使嚴興出城來見石勒勒延入寨中同坐飲酒酒酣勒拔劍欲砍嚴興所坐之席興驚倒在地勒笑曰聊作戲耳勿驚問興曰汝主求和欲何如也興曰欲與將軍平分常山勒大怒曰鼠賊怎敢與吾等輩也興急起勒擲劍砍之應手而倒割其首令從者提回城去程晟料敵不過棄城而走勒進兵追襲勢如劈竹生捉程晟領衆入城是時石勒取得巨鹿常山二郡三十餘城以及聚集胡羯之衆來附者共有兵三十余萬戰將千余員威聲大振石勒聚衆宴會問衆將佐曰吾得群賢輔佐戰必勝攻必取又得降兵二十余萬意欲回國其事如何張賓出席曰重寄者不歸功多者不賞今明公威名天下所知不如因此自立一方亦不逆漢主之命結為兄弟橫行四海誰敢不遵乎於是勒意乃決與衆商議進兵攻討襄陽城次日石勒謂將士曰吾始受命于漢安可就背於是使人還國報捷請益糧兵次日使人入漢報捷漢主淵大悅又遣楚王劉聰與王彌來協助石勒去攻洛陽命勒為前鋒都督軍至壺關壺關守將見其勢大莫敢當鋒引衆退還劉琨聞漢兵至即發兵來救援不克勒兵已入關了群臣急奏懷帝大驚請太傅越來商議越奏曰不須聖慮臣等與百官遣將拒之於是越即出朝入公府遣河南內史王曠將軍施融以兵五萬出拒之時曠兵濟河欲長驅而前融曰彼乘隙間出且當阻水為固以量形勢而拒之曠怒曰胡寇入關主上臥不安席今委我等擊之恨不得一戰擒虜君欲阻衆耶言訖遂以兵逾太行山與漢軍相遇于長平劉聰見有敵兵乃自拍馬挺槍出戰不上數合晉兵大敗王曠等人皆死於亂軍之中賊衆盡降於漢
