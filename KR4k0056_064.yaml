body:
  text: 第六十二回司馬顒謀殺張方光熙元年卻説東海王越初起兵時使人説司馬顒令奉帝還洛陽約與分陝為伯即便回兵顒欲從之張方自思罪重恐為誅首乃謂顒曰今大王據形勝之地國富兵強奉天子以號令誰敢不從奈何拱手受制於人顒乃止及聞劉喬敗顒心大懼欲罷兵恐方不從乃密召方帳下督郅輔至誘之曰東海王等起兵之故非我之過乃恨張方劫帝來長安並廢皇后太子之罪故來討也今山東兵盛難以抵敵今東海王使人入朝上奏道殺張方奉駕還洛陽即罷兵今聖上有密詔在此有能誅張方之首解得山東之兵者封萬戶侯我與卿議之殺方非卿不可也郅輔曰既聖上有詔小臣即斬之送首前去與東海王説其解兵顒曰卿若斬得張方退得此兵吾保奏汝為萬戶侯郅輔從之領其謀回至夜領心腹五十余人入宮中將張方殺之取其首級漏夜送與東海王越請和罷兵越不肯遣祁弘等領軍兵西迎車駕弘引兵去訖卻説王浚與宋胄等救洛陽成都王穎見石超死了去其右臂不敢出戰乃點衛兵開西門走奔長安胄等人城屯扎
