body:
  text: 第三回袁甫銜玉于何勗史説淮南袁甫字公胄亦好學以詞辨見稱知朝廷招舉賢土及聞中領軍上將軍何勗重賢納士敬往謁之因言曰甫乃駑鈍之才不足以騁千里百里花封能為劇耳久聞將軍愛土吾儕方懷幹祿何不納之勗笑曰今子之請徒欲宰縣反不思為台閣之職何也甫曰人各有能譬繒中之好莫過錦繡不可以為韜谷中之美莫過稻粱不可以為齏是以賈霸馳名於州郡而息譽於京邑廷尉之才不為三公自昔然也勗聞之大悅除為松滋令時慕賓石珩聞甫能辨故難問曰卿果能辨乃今壽陽以西何以恆旱壽陽以東何以恆水甫應聲答曰壽陽以東皆是吳人夫亡國之音哀而思鼎足強邦一朝失職憤怨甚積積憂成陰陰積成雨雨久成水其域恆水也壽陽以西皆是中國新平強吳美寶皆入志盈心滿用長歡娛公羊有言魯嬉悅故其域旱京師若能抑強扶弱先親後疏則天下和平災害不生矣君雖高士安識此理耶珩因是服其高辨敏捷勝己後不復問難史説皇甫諡字安士安定人漢太尉皇甫嵩之曾孫也因承繼後叔艾益徙居新安年二十不好學遊蕩無度人人鹹以為癡嘗出遊得瓜果輒進于後叔母任氏任氏謂曰孝經雲三牲之養猶為不孝汝今年逾二十目不存教心不存道無以慰我汝謂瓜果進以為孝乎因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我居不蔔鄰教有所闕何爾駑鈍之甚耶修身篤學汝自得之于我何有因對之流涕謐乃感激而就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博覽典籍百家之言殆有高士之志以著述為務自號玄晏先生時舉孝廉郡邑交薦朝廷亦屢征皆不應命而所著詩賦誄誦論難及撰帝王世紀高士逸士列女等傳並行於世焉
