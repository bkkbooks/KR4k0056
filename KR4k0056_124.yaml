body:
  text: 第一二一回漢以王沈婢為後中常侍王沈養女有美色漢王劉聰聞知立以為其皇后當尚書令王鑒中書監令崔懿之曹恂上書曰臣聞王者之立後也將以上配乾坤之性象二儀敷育之義主承宗廟母臨天下後土執饋皇后必擇世德名媛幽嫻淑善副四海之望稱神祗之心是故周之追母姒氏以興關睢之化饗祚百世孝成任心縱欲以婢為後使皇統亡絶社稷淪傾有周之隆既如彼矣大漢之禍又如此矣奈何一旦以婢主之臣恐無福於國家也漢主不納鑒又諫曰借使沈之女形餘卻醜猶不可以塵椒房況其家婢耶聰大怒命王沈收鑒等三人誅之鑒等臨刑沈以杖叩之曰庸奴復能為惡耶鑒嗔目叱之曰豎子滅大漢者正汝鼠輩與靳準耳懿亦叱準曰汝心梟獍必為國患汝既食人人亦當食汝言訖而死朝中無不嗟歎
