body:
  text: 第二四回漢王面縛輿櫬降丁未三年三月晉兵前望夔關不遠桓溫在馬上觀看但見前面沿江旁山一陳殺氣騰起溫勒馬不進言曰三軍不得前進前面必有埋伏隨令三軍倒退十裏之外地勢空闊之處排開以備交戰使戰馬萬餘騎前去細探回報無軍桓溫不信下馬登高望之殺氣從地而起溫又使人仔細探著回報江邊止有亂石七八十塊堆著並無軍馬桓溫深疑尋土人問之須臾尋到數人溫問亂石作堆何故土人告曰吾聞老者雲亂石乃諸葛丞相入蜀之時特來此處運石壘成陳勢於沙灘之上常有氣從內起此處地名魚腹浦也桓溫聽罷上馬引數十騎來看亂石乃立在山坡上向下觀看四面八方皆有門戶其石皆八行行相去二丈時諸將皆不識也不識者乃笑曰此惑人之術耳有何異哉惟桓溫曰此乃八陳圖也內按常山蛇勢誰謂陸遜不困此也遂引從騎下山坡直入石陳中觀看看時日且將墜但見怪石嵯峨似劍重疊如山江濤洶湧卻似戰鼓之聲桓溫觀罷讚歎不已引兵直過史官有詩贊八陳圖曰孔明施妙用布陳向沙堤已許桓溫識先教陸遜迷江聲喧鼓角山景吐雲霓廟貌今猶在應須不用疑卻説桓溫軍至袁衣縣李勢聞知大驚遣將軍咎堅率大兵趨合水以拒之諸將進計曰今晉兵大至地理必疏宜設伏兵於江南待其過半擊之則溫可擒矣咎堅曰桓溫能博彼必料伏安能破之不如先引兵向犍為處以抗之可保萬全乃引衆向犍為溫兵先至彭模桓溫聞漢以堅為將向犍為集諸將商議時諸將議欲分兩道兩軍並進以分漢兵之勢袁喬曰不可今懸軍深入當合勢齊力以取一戰之捷萬一偏敗大事去矣不如全軍而進棄此釜甑持三日糧以示士卒無還之心勝可必矣溫從之依計而行留後軍孫盛將羸兵二千守輜重自率步卒二萬直指成都溫進遇漢將李權溫大罵無端匹夫今領大兵百萬猛將千員已入巢穴為何不降猶敢抗拒權與溫將袁喬戰喬佯敗而走權追五裏炮聲起伏兵齊出權兵大敗望山而走桓溫催軍追殺三戰三捷漢兵走散咎堅兵至犍為方知為溫軍從異道至成都之十裏陌者矣咎堅急領軍還堅衆自潰不敢交鋒漢王勢見溫軍至近乃悉集衆將出戰兩下皆至笮橋二軍會戰溫前鋒不利矢石及至溫馬首衆懼欲退而鼓吏驚慌誤鳴進鼓袁喬拔劍親督率士卒力戰十餘合大破之漢兵潰走李勢勒馬走回城桓溫乘勝驅兵至成都縱火燒其城門漢人惶懼無復鬥志李勢知不能拒集文武輿櫬面縛詣溫軍門投降溫遂引人入城差人送漢王勢于建康面君朝廷詔封李勢為歸義侯溫既克蜀急引漢司空譙獻之等以為參佐舉賢旌善蜀人悅之溫留成都三十餘日始振旅還江陵蜀自李特至勢凡四十六年至是滅之卻説晉後垂簾論平蜀之功欲以豫章郡封桓溫左丞陶蕤言溫若復平河洛將何以賞之於是乃加溫為征西大將軍開府儀同三司封臨賀郡公溫既滅蜀朝廷憚之而溫自平蜀之後雄姿豐氣自謂其是宣帝劉琨之儔諸將將為王敦之比溫心甚不平而恨諸將諸將設一計使一老婦偽作劉琨之妓女入訪桓溫一見溫潸然而泣溫問汝乃何處婦人敢來此處發悲老婦答曰妾乃劉司空琨之妾昨見郡公遊街甚似劉司空因來訪見果似無他令人見鞍思馬睹物傷情而致悲耳溫聞老婦説其貌似劉琨心中大悅即入內再整衣冠又呼老婦問曰吾與劉司空何如老婦曰面甚似恨薄眼甚似恨小肉甚似恨赤形甚似恨短聲甚似恨雌溫假悶喝退老婦於是內不解帶昏然而睡不怡有數日溫既滅勢朝廷憚之晉後亦憚其威遂問群臣曰睹桓溫掌握兵權恐有異志何以制之當會稽王司馬昱曰今有揚州刺史殷浩天姿英傑智識高明時人號為管葛天下聞名朝野推服陛下降詔宣其入朝使其都督內外諸軍參綜朝權足以抗溫後然之於是使人擬詔詔揚州刺史殷浩入朝以浩為中軍將軍假節鉞都督中外諸軍事總理六軍昱引為心膂參綜朝權欲以抗溫由是與桓常相疑二浩以王羲之為護軍將軍羲之以為內外和協然後國家可安勸浩不宜與溫構隙浩不從卻説趙將麻秋既克金城率衆來攻袍罕晉陽太守郎坦欲棄外城武城太守張俊曰棄外城則動衆心大事去矣宜固守之於是旦夕守禦秋率衆八萬圍塹數重雲梯地突百道皆進城中以死禦之秋衆死傷數萬料不能克退保大夏郎坦使人求救于涼王張重華重華使謝艾率步騎三千進臨河艾自乘軺車戴白乂鳴鼓而行秋望見怒曰艾年少書生冠服如此是輕我也即命黑矟龍驤三千人馳擊之艾左右驚慌大擾艾踞胡床指揮處分使張瑁三千人皆從間道截趙軍之後趙人見艾端坐不動以為有伏兵懼不敢進相持半日張瑁兵出趙兵之後趙軍忙退艾乘勝進擊大破之麻秋堅守大夏不敢輕出即使人報知趙王虎虎大怒即遣將軍孫伏都率步騎三萬會秋軍馬長驅濟河謝艾埋伏弓弩手二千於山谷左右自將交戰詐敗伏都與秋追至穀口弩矢如雨趙兵少退艾身先率精騎殺出乘退一擊殺得趙兵十去其七伏都引殘兵悉退本境去了艾亦屯住別險以拒之趙王虎聞知伏都兵敗歎曰吾以偏師定九州今以九州之力困敝之建城有人焉未可圖也有沙門吳進言於虎曰胡運當衰晉當復興大王宜益營建工役勞苦晉人以壓此氣方保國昌虎從之下詔使尚書張群發近郡男女九十六萬車十萬來運土築華林園及築長城於鄴北廣長數十裏燃燭而作暴風大作死者數萬人當禦史趙攬切諫日今王初遷都於鄴不施仁惠于百姓而行暴虐于萬民營建無益之園牆大勞有限之民力誠恐禍起蕭牆之內徒作萬裏之城虎大怒曰牆朝成夕沒吾無恨矣汝何多言於是不聽時揚州太守進黃鵠雛五隻頸長一丈其鳴聲十裏外聞之虎命泛之于玄武池以為祥物又命石宣祈謝於山川因使其遊獵乘大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬自金明門出虎自登雲霄樓觀望笑曰季龍父子如是若非天崩地陷世人安能害我從今高枕而臥當復何愁但抱子弄孫自為樂耳石宣引戎卒十八萬遊過三州十五郡之地供給以後資儲無有孑遺宣遊過復還朝虎又命秦公石韜亦如之乘次輅羽葆華蓋建天子旌旗領六軍戎卒十八萬出遊韜辭虎出引衆遊于秦雍宣怒其與己均敵宦官趙生曰殿下要嗣大位宜早除韜不然後患則繼至矣宣深然之十一月朝廷聞張重華屢破趙兵遣侍禦史俞歸去涼封重華為西平公歸領旨去涼封公重華欲稱涼王未肯受詔使所親私謂歸曰主公奕世為晉忠臣今曾不如鮮卑何也歸曰吾子失言昔三代之王也爵之貴者莫如上公及周之衰吳楚皆僭號為王而諸侯不之非皆以鑾夷畜之也假使齊魯稱王豈不四面攻之乎漢高祖誅滅彭韓等皆權宜之計非厚之也主公以貴公忠賢故爵之以上公任之以方鎮寵榮極矣豈鮮卑夷狄所可比哉且吾聞之功有大小賞有輕重今貴公始繼世而為王若率河右之衆東平胡羯修護陵廟迎天子返洛陽將何以加之乎所親以歸言告重華重華始受公封是時雍州楊初聞晉封涼西平公亦遣使人人建康稱藩朝中群臣皆議以詔封初為雍州刺史仇池公楊初自此歸晉矣
