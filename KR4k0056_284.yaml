body:
  text: 第二八一回姚興舉兵伐苻登甲午十九年春正月秦王苻登設朝將軍王成上言曰臣昨聞姚萇身死其子姚興僭位不為發喪要來攻我陛下宜乘其新喪國內不定以傾國之兵先去討之可復舊都也秦王登曰姚興小兒折杖笞之耳吾豈畏之哉卿可為我前部先鋒速出點兵吾自為後隊以兵接應於是王成以五萬兵為先鋒秦王苻登領軍十萬為後隊大刀闊斧殺奔東來早有探事軍人探知其事即回長安報知後秦王姚興大驚急聚文武文武失色班部中忽閃一人出曰兵來將擋水來土掩彼既來犯我境陛下可自親征則將士用命何故驚耶衆視之乃尚書令尹緯是時姚興聞苻登領兵犯境心中大驚而問文武文武失色當尹緯出班請後秦王親征後秦王從之以尹緯伊詳為左右將軍乃起兵七萬來迎苻登後秦王姚興自以兵五萬為後隊長驅並進而行大軍已至涇陽秦王苻登大兵亦到兩軍各隔四五十裏下營次日尹緯使牙門將軍龔超領一軍出馬試戰龔超出馬來與秦將田雙交鋒戰不數合龔超竟被田雙斬于馬下餘兵敗回來報尹緯緯大驚便差大將王來廖嶷二人引兵二萬出戰田雙領兵已到後秦二將領兵迎至兩陳對圓廖嶷出馬王來把住陳腳田雙挺槍來迎兩馬相交戰有十餘合不分勝負田雙佯輸詐敗望陳而走嶷拍馬便追背後王來料田雙是計慌忙驟馬出陳大叫休趕廖嶷勒馬回時田雙取流星錘追打來一錘正中其背打得嶷伏鞍而走雙便待趕來卻被王來接住救得廖嶷回陳田雙驅軍掩殺兩軍混戰一場後秦兵折亦多王來引軍退回嶷口吐鮮血來報尹緯説田雙英雄尹緯見折了一將嶷又被打傷急請伊詳商議曰如今田雙如此英勇如何可破今日之事非將軍莫能敵也而苻兵鋭氣正盛吾兵新敗不可以力取吾欲以計破之用將軍一行方可成耳詳曰用何計我萬死不辭緯近詳耳邊説道如此如此可破苻登也詳曰我即依計而行言訖即出作詐降書一封差人去降苻登卻説秦王苻登正坐中軍忽報山路中捉得姦細言有機密事特來求見大王誤被伏路軍捉來道乞退左右方敢呈書秦王登盡叫帳下人退避了其人曰小人是伊詳手下心腹人蒙本官差遣有書在身上苻登命急忙去其繩索其人於貼肉衣領內拆出密書苻登看其書雲馬牧伊詳百拜謹上大秦王陛下念臣食秦祿守秦西州叨竊厚恩無門可報昨者誤從姚萇之叛陷身於不義之中萇今已死子興重定寵信尹緯之訴忘卻小臣之功今幸陛下禦駕親征敬奉此書來降乞賜聽納來晚詳舉火為號先燒盡姚興糧草至晚陛下親提大軍來擊臣等以兵內應則姚興成擒矣非欲立功報國實欲贖罪倘沭照察速須來命秦王苻登看書畢喜曰是天使吾成功矣賞其來人吩咐依期會合不可有失使人去了乃喚田雙王成等進內商議秦王登曰今伊詳暗獻密書舉火為號令朕接應卿可整備軍馬來夜前去王成曰尹緯多謀能使用人恐防其中有詐秦王登曰姚興寵用詳朕亦不信今反親任尹緯伊詳安肯聽其使令卿等勿多有此疑心朕自披挂當先應敵於是二人不敢違命即出點兵卻説使人回報伊詳稱説來晚苻登以兵來應伊詳將其言來達尹緯尹緯喜曰苻登成擒矣遂喚廖嶷王來二人至曰你二人可引二萬軍伏于山南左右交牙穀中待苻兵過了可出搬木石壘斷苻兵歸路就將此兵掩回又謂伊詳曰公引一萬兵伏於山傍放火以誘其兵其兵若到乘時殺之又喚小將劉其至曰你可引兵五千待苻兵敗回至山南放火燒其林木彼兵自亂吾以兵追捉苻登計議已定諸將各自整點軍馬依計而行次日黃昏左側秦王荷登留太子苻崇以兵五千守寨自與王成田雙以兵五萬至一更起行及至半路望見前面尹緯寨中火光沖天而起秦王登曰可速行到寨因此五萬人馬趕至寨前鼓噪殺入寨中不見一人出來只是一個空寨登驚説中計了火速退兵忽聽得一聲炮響寨後伊詳引兵殺出正遇田雙交馬便戰未有十合田雙敗走苻登在先領兵走還原路至山南卻見山上火起燒著林木苻兵亂竄被劉其以五千兵乘勢殺出殺死苻兵大半苻登慌了單騎走至交牙谷路皆壘斷了只得再殺回來廖嶷王成從穀內兩邊殺出田雙緊跟保定而走又遇尹緯大軍擁至田雙舞刀直奔尹緯尹緯持槍相迎兩馬相交戰不十合田雙驚慌措手不及被尹緯刺殺于馬下苻登拍馬沖走被伊詳背後一箭正中後心落于馬下被尹緯趕至擒住苻登押回大寨縛住戰至天明苻登大兵盡皆被他一陳殺了只走了王成尹緯將秦王苻登押至大寨來見後秦王姚興姚興傳旨押出軍門斬之尹緯方出傳令收軍屯於鄉坙陽犒勞六軍卻説王成見苻兵被殺過半料必難以抵敵乃上山越嶺而回自寨保太子荷崇走回漢中城聞秦王登被執殺之王成恐衆散去乃立苻崇為秦王即皇帝大位以安衆心由此士民歸之軍將未散卻説後秦王姚興使尹緯以兵過山南來不見苻兵乃是空寨回奏後秦王姚興姚興傳令收軍振旅復還長安群臣上賀立姚興為後秦王改元皇初元年三河王呂光以禿發烏孤為河西都統烏孤本鮮卑別種與拓跋同一祖後徙河西烏孤雄勇有大志與大將紛陀謀取涼州紛陀曰公必欲得涼州宜先務農講武禮賢修政然後可也烏孤從之呂光遣使拜烏孤為鮮卑大都統群下皆曰吾士馬衆多何為屬人石直若留曰吾根本未固大小非敵不如受以驕之矣待釁而動則涼州可得也烏孤乃受之卻説秦河二州牧乞伏國仁身死其弟乾歸自立為涼王聞秦王苻登既死其子苻崇即位於漢中乃率部下五萬大軍來攻漢中城王成忙率兵五千出城共戰交馬一合王成被乾歸斬于馬下餘兵潰亂苻崇見王成死了自以禁兵出城拒之與乾歸交鋒亦未上十合秦王崇被乾歸斬之殺散殘兵乃領衆出城於是臨因之地盡屬乾歸乾歸始自立為西秦王改元太初元年乙未二十年時會稽王道子專權奢縱趙牙茹千秋皆捕賊之吏也俱以諂賂得進道子以牙為郡守千秋為參軍牙為道子開東第鑿山穿池工用巨萬帝嘗幸其第謂道子曰府內有山甚善然修飾太過道子無以對道子懼帝謂牙曰上若知此非人力所為汝當必死牙曰公在牙何敢死營作彌篤千秋賣官招兵聚貨纍億搏平令聞人奭上疏言之帝益惡道子而逼于太后不忍廢黜帝乃擢王恭殷仲堪王珣王雅等使居內外要任以防之道子亦引王國寶王緒為心腹由是朋黨競起無復向日友愛之歡矣太后每和解之徐邈言於帝曰漢文明主猶悔淮南會稽王雖有酣媟之纍宜加和好以慰太后之心帝然之又委任道子如故
