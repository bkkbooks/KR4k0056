body:
  text: 第三十二回江統進上徙戎論先是元康九年惠帝設朝群臣皆集朝賀禮畢太子洗馬江統以中原半為夷居胸奴劉淵居晉陽羯戎石勒居上黨羌人姚弋仲居扶風氐人苻洪居臨渭鮮卑慕容廆居昌黎種類日繁恐其有變故上表曰戎狄之人人面獸心宜早絶其源不然必亂中華惠帝不能行之統又作徙戎論以警朝廷因上惠帝惠帝覽之曰夫夷蠻戎狄地在要荒禹平水土而西戎即叛其性氣貪婪凶悍不仁四夷之中戎狄為甚弱則畏服強則侵叛當其強也以漢之高祖而困于白登孝文帝於灞上及其弱也以元成之微而單于入朝此其已然之效也是以有道之君牧夷狄也惟待之有備禦之有常雖稽顙執贄而邊城不備固守強暴為寇而兵革不加遠征期令境內獲安疆場不侵而已魏興之初與蜀分隔疆場之戎一彼一此武帝徙武都之氐于秦川弱寇強國捍禦蜀虜此蓋權宜之計非萬世之利也今者當之已受其敝矣夫關中土沃物豐帝王所居來聞戎狄宜在此土也非我族類其心必異而因其衰敝遷之畿內土庶玩習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆庶則坐生其心以貪悍之性挾憤怨之情俟隙乘便輒為橫逆而居封域之內無障塞之隔掩不備之人收散野之積故能漸成滋蔓暴害不測此必然之勢已驗之事也犬馬肥充則有噬齒況于夷狄能不為變但顧其微弱勢力不逮耳夫為邦者憂不在寡而在不安以四海之廣士民之富豈須夷狄在內然後取足哉此等皆可申諭發遣還其本域使彼羈旅懷土之思釋我華夏纖芥之憂惠此中國以綏四方于計為長也
