body:
  text: 第一九七回燕王皓滅宇文部卻説燕王皓與左司馬高詡謀伐宇文逸豆歸詡曰伐之必克然不利於將皓即集諸將率兵起行詡告人曰吾此往必不能返然忠臣不避也於是率兵以慕容翰為前鋒長驅而進宇文逸豆歸聞知燕王率衆犯境即遣南羅大涉夜幹將兵一萬迎戰皓素聞涉夜幹之勇名由是失色謂兄翰曰涉夜幹勇冠三軍不可輕敵宜少避之翰曰涉夜幹素有勇名一國所賴今吾克之其國不攻自潰矣然吾熟知其人雖有虛名實易敵耳不宜避之以挫吾兵鋭氣皓曰既如此兄可與戰於是翰與高詡等驅兵出戰涉夜幹亦揮軍出陳兩下交戰涉夜幹持槍拍馬出陳搦戰慕容翰與高詡各舞刀迎戰未十合涉夜幹佯輸而走高詡拍馬追趕不至三十步被涉夜幹伏流弩於陳內一時俱發詡中流矢而退翰亦中其流矢而退還陳涉夜幹追殺入燕陳被翰閃過一旁涉夜幹馬急搶先至中被翰提刀以斬之而尸橫落馬宇文士卒見涉夜幹已死不戰而潰燕兵大勝逐之逐克其都城逸豆歸走死漠北宇文氏由此散亡皓徙其衆于昌黎得地千餘裏高詡因中流矢至是而卒燕王皓不勝傷悼命厚葬之詡善天文皓嘗謂曰卿有佳書而不見與何以為忠詡曰臣聞人君執要人臣執職執要者逸執職者勞故後稷播穀堯不與焉占候天文晨夜辛苦非至尊之所宜親陛下將安用之皓默然皓滅宇文部振旅還都時熒惑守房心趙太子宣怒領軍王朗會熒惑守房心使太史令趙覽訴于趙王虎曰今熒惑為怪宜以貴臣王姓者當之可禳國家之患虎曰誰可當覽曰無有貴如王領軍者虎曰次更誰可覽無以對虎因曰惟王波耳即下詔追波前議楉矢事腰斬之群臣奏其無罪後乃追贈司空
