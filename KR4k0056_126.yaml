body:
  text: 第一二三回代王郁律破劉虎七月鐵弗國劉虎名劉武先與猗盧在並州結仇及回國聚數萬衆前來復仇殺至北部北部大人告急于代王鬱律代王盡起本部軍兵來援武聞知代兵來亦引軍於盤河布陳代王列陳橋西代王橫槊立馬於橋上大呼曰背主之徒如何不見武亦乘馬而出指代王曰你先助劉琨以殺吾今特來復仇耳代王曰昔先帝以汝為不忠不義之人助桀為虐故約劉琨殺汝汝不知悔反逞狼心狗行尚欲來侵吾地耶劉武大怒策馬挺槍直殺上橋代王看見忙使東部大人上橋迎敵東部大人躍馬而出與劉武交鋒戰有十合武抵當不住撥回馬便走東部大人乘勢追趕過橋武走入陳中東部大人拍馬徑入陳來如入無人之境往來在陳中追趕武手下健將四員接住廝殺被東部大人刺一將下馬其三將奔散東部大人追劉武透出陳後武只得棄衆望山谷而逃東部大人驟馬在後厲聲高叫快快下馬受縛免汝一死武弓箭盡落頭盔墜地縱馬逃出寨外而去其部落盡降于代王代王遂有西域之地兵馬精強復振北方
