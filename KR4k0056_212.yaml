body:
  text: 第二九回晉燕率師伐趙國卻説慕容霸上書于燕王雋曰石虎窮凶極暴天之所棄餘燼僅存自相魚肉今中國倒懸企望仁恤若大軍一振勢必投戈棄甲而走雋曰卿言至當吾國不幸今遭大喪恐於軍不利莫若漸待來春會晉大舉霸曰難得而易失者年也萬一石氏復興或有英豪據其成資豈惟失此大利亦恐更為後患矣雋猶豫未決將軍封奕慕容恪曰用兵之道敵強用智敵弱則用勢今中國之民困於石氏之亂人咸思易主以救湯火之災此千載一時不可失也自武宣王以來而招賢養民務農訓兵正俟今日若復顧慮豈天意未欲使海內平定耶將大王不欲取天下耶雋從之遂以慕容恪慕容評陽騖為三輔將軍慕容霸為前軍都督選精兵二十五萬講武戒嚴為進取之計七月桓溫亦聞趙亂率衆十萬出屯安陸遣諸將經營北方趙將揚州刺史王浹舉壽春來降朝廷納之使西軍中郎將陳逵進據壽春征北大將軍褚裒上表請伐趙朝廷許之裒即日戒嚴率軍直至泗口時朝議以裒事任責重不宜深入宜先遣偏師前進裒又奏言前已遣先鋒王頤之等引兵徑造彭城後又遣督護麇嶷進據下邳今宜速發以成聲勢於是朝廷加裒為征討大都督裒率衆五萬徑赴彭城北方士民降附者日以千計朝野皆以中原指期可復惟蔡謨謂所親曰胡滅誠為大慶然恐復貽朝廷之憂其人曰何謂也謨曰夫能順天乘時濟群生於艱難者上聖與英雄乃能為也其餘則莫若度德量力觀今日之事殆非時賢所能及必將經營分表疲民以逞既而才略識疏不能副心財殫力竭智勇俱困安得不憂及朝廷乎卻説魯郡五百餘家起兵附晉遣人求救於裒裒使部將王龕將鋭卒五千人迎之時趙王遵聞晉兵侵境使李農引兵五萬來拒兵至代陂遇王龕兵至兩下交戰晉兵大敗王龕被害餘兵盡歿無還裒聞王龕敗歿以衆退屯廣陵棟達知裒已退恐獨力難拒亦焚壽春積聚棄城遁還因此裒領諸將還鎮京口解征討都督時河北大亂趙民二十余萬口渡河欲來歸附會裒已還威勢不振皆不能自救死亡略盡九月張重華自稱為涼王而重華屢以錢帛賜左右又喜博奕頗廢政事索振諫曰先王勸儉以實府庫正以仇恥未雪志平海內故也今舊積已虛外難方興軍旅之符屢年不息恐國家不給支用未敷況今急而寇仇尚在豈可輕有耗散以與無功之人乎漢光武躬親萬機章奏詣闕報不終日故能隆中興之業今章奏停滯下情不得上達沈冤困囹圄殆非明主之事也重華謝之始儉賜攬政改德卻説趙樂平王石苞謀率關右之衆攻鄴而苞貪而無謀雍州豪傑知其無成並遣使告請晉梁州刺史司馬勳率衆赴之勳遂從其請率兵至洛口壁於懸鈎隔長安二百里三輔豪傑多殺守令以應之趙王遵聞知與文武議遣王朗率精兵二萬以拒勳為名而實討苞苞不備王朗因過其地馳入獲苞送鄴而赦之司馬勳兵少不敢援因攻拔宛城殺趙南陽太守而還
