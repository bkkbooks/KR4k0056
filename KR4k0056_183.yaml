body:
  text: 第一八回張駿上疏請北伐初張軌及實茂保捷河右軍旅之事無歲無之及駿嗣位境內漸平駿勤修廢政總禦文武鹹得其用民富兵強遠近稱為賢君駿遣將伐龜茲都善於是西域諸國皆詣姑臧朝貢而駿有意兼秦雍之心乃使人特入建康上疏曰勒雄既死虎期繼逆元老消落後生不知慕戀之心日遠日忘乞敕司空鑒征西亮等泛舟江沔首尾齊舉則大業得以大興矣丙申二年成帝與群臣議而未行由然寢矣卻説慕容皓欲討其弟慕容仁與百官議之當司馬高翔曰仁叛棄君親神人共怒前北海未嘗冰自仁叛以來冰凍二年矣天其或者欲使吾乘冰以襲之也大王宜速應天意也皓曰卿言正合孤意於是皓從之將兵五萬從昌黎東踐冰而進凡三百餘裏至曆林口舍輜重輕兵赴平郭去郭七裏屯下侯期見皓兵至乃馳入城以報仁仁忙整兵出戰被皓令大將高翔伏兵于路詐敗獲之皓驅兵入城先收仁黨斬之後賜藥與仁自裁仁因怒飲藥而死皓始分兵戍守自勒兵回國二月晉成帝立皇后杜氏帝自臨軒遣使備六禮迎之群臣賀畢帝宴之卻説前廷尉孔坦疾篤庾冰省之流涕坦慷然曰大丈夫將終不問以濟國安民之術乃為兒女子相哭耶冰謝之而問曰吾見使君病重未敢輕觸君百歲後中原可復否朝中誰可為將也坦曰勒雄雖死餘黨更強二都急未可得莫若愛民養兵分戍險要屯田講武待十年後可議北矣冰曰承此金石之言銘刻肺腑言訖謝之而去坦歎數聲而卒
