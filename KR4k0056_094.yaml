body:
  text: 第九十一回王浚遣兵攻襄國卻説王浚遣督護王昌以五萬衆會段疾陸眷與弟匹磾文鴦從弟末柸等一十五萬衆來攻襄國石勒聞知遣將領兵去拒皆敗而還勒大驚召將佐曰吾欲悉衆出戰何如諸將皆曰不如堅守候其退而擊之張賓孔萇曰鮮卑段氏最為勇悍而末柸尤甚其鋭卒皆屬焉今刻日來攻北城必謂我孤弱不敢出戰意必懈怠宜且勿出示之以怯鑿北城為突門二十餘道俟其來至列守未定出其不意直沖末柸餘必震駭不暇為計破之必矣末柸敗則其餘不政自潰矣勒從其計傳令諸軍暗鑿突門於北城二十余處又令軍士埋伏于突門內計排已定段陸之軍果至見北城崩突二十餘處以軍扎屯城下欲攻北面因見其城上皆無守衛軍士心疑之傳令軍土詐作懈怠以誘之看城內動靜待其軍出而攻之時石勒見段疾陸眷兵至乃登城望之見將士皆釋仗甲而寢石勒即命孔萇督鋭卒五千從突門出擊之被段疾陸眷從中軍殺出萇大敗而退突門走入末柸不知是計殺得性起引兵從突門趕萇殺人被衆伏兵一擁而至獲住末柸孔萇乘勝分門殺出追擊段疾陸眷等兵死者枕尸三十餘裏萇方收軍入城段疾陸眷走脫招集亡衆使人以鎧馬金銀五千斤獻勒求贖其弟末柸永為其藩再不敢犯勒從之將放末柸還諸將勸勒殺之以除後患石勒曰遼西鮮卑健國也與我素無仇讎為王浚所使耳今殺一人而結一國之怨非計也歸之必深德我不復為浚用矣言訖乃遣石虎出與段陸二人盟于諸陽結為兄弟段陸二人大喜引兵還國王昌見段疾陸眷歸盟附勒乃引兵亦走還薊勒知陸段退兵而還乃召末柸出與之宴飲誓為父子令人送其回國由此段氏專心附勒王浚之勢漸弱矣卻説王澄少與兄王衍名冠海內劉琨謂澄曰卿形雖一郎而內實動俠以此處世難得其死及在荊州尸為杜韜所以望實俱損猶傲然自得與內史王機日夜縱酒博奕上下離心故山簡參軍王沖擁衆自稱刺史澄懼徙治香中琅邪王睿聞知召為軍咨祭酒以周顗代之時王敦領兵討杜韜進屯豫章澄過之自以名聲當出敦右猶以舊意侮敦敦怒誣其以杜韜通信遂殺之卻説羌酋姚弋仲乃南安赤亭羌也集衆東徙榆眉戎夏繈負從者數萬因而自稱扶風郡公招集羌衆大霸其地威名日甚孝湣皇帝延興元年正月朔漢主劉聰大會文武宴於光極殿使晉懷帝著青衣行酒勸其群臣當晉臣庚瑉王雋等亦隨帝虜在此見帝著青衣勸酒不勝悲忿因相謂曰主憂臣辱主辱臣死吾等不能殺此酋奴受用在此睹此羞恥言訖大罵劉聰滔滔大哭漢主大怒命左右牽晉懷帝與庾瑉王雋十餘人出外斬之於是君臣遂遇害晉朝庚瑉十餘臣同君俘陪在胡庭當時不哭主辱死忠義安留萬古名是時只有侍中辛勉因疾未曾赴宴不曾被害當漢主聰使人以印綬拜為光祿大夫使人傳旨以是語誘之令降漢勉固辭不受惟願死節無懷二心使得其言復回見漢主聰道其不降無異之志聰欲受其降吩咐黃門喬度日你將此酒逼他來降不可與他飲之只可逼之因此黃門喬度齎鴆來見勉逼之曰若降貴不可言若逆可飲此酒請君自裁隨使而行辛勉曰大丈夫豈以數年之命而虧高節如事二姓何面目下世見晉武皇帝哉言訖持鴆酒欲飲喬度遽止之曰主上相試耳君真高土也於是歎息而還度以勉言回奏於漢主聰大喜嘉其貞節深敬異之使人為築室於平陽西山月奉酒米供給勉亦辭不受後年至八十卒於平陽司馬君王遭此擒侍中辛勉亦隨行甘偕國難隨君王不辭身害逆胡平願飲藥鴆為晉鬼豈貪美祿作劉臣遭觀晉史忠貞士如君高節幾何人
