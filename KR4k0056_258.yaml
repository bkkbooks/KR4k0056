body:
  text: 第二五五回秦王集議寇江南秦王堅大會文武群臣於太極殿而謂衆文武曰自吾承業以來垂二十餘載四方略定惟東南一隅未沾王化今略計吾之士卒可有九十七八萬糧草不計其數吾欲自將以討之汝等所議為若何當朱彤曰今秦得天下大半更兼國富兵強若起傾國之師躬行天罰則江南克期可定矣秦王大悅曰此乃吾之所志也左仆射權翼進曰臣以為晉未可伐夫以為紂之無道天下離心八百諸侯不謀而集武王猶曰彼有人焉乃回歸止旆後三仁誅放始奮戈牧野而得成功今晉雖微未聞喪德君臣上下同心謝安桓沖江表偉才可謂有人焉依臣愚見晉不可以加兵時秦王堅聞其語默然久曰諸君可各言其志朕自量之以行太子左衛率石越上言曰今歲鎮星守鬥牛福德在吳天文有準懸象無差伐之必有天殃且彼據有長江之險民為之用不可犯也秦王堅曰吾聞武王伐紂逆犯歲星天道幽遠未可知也今以吾之衆投鞭于江足斷其流又何險之足恃乎且築室道傍阻計萬端無時可成功吾當內斷於心耳群臣各有異同堅命且退容再計議獨留弟苻融議之苻融曰晉不可伐者三秦王堅作色曰汝復如此則天下之事吾與誰言之融泣曰今天道不順一也晉國無釁二也我數戰兵疲民有畏敵之心三也晉未可滅昭然甚明若勞師大舉恐無萬全之功且臣之所憂不止於此陛下寵育鮮卑羌羯布滿畿甸此屬皆我之深仇太子獨以弱卒數萬自守京師臣懼有不虞之變生於腹心肘腋不可悔也臣智識愚淺誠不足采王景略一時之英傑陛下每擬之諸葛武侯獨不記其臨終之言乎秦王堅曰天下者天下人之天下非一人之天下故秦失其鹿天下共逐高材捷足者先得之量朕之才不在晉下文武之賢勇略過人如何不可伐也融又諫曰國家本戎狄也正朔朝會不歸江東雖微弱僅存然中華正統天意必不絶之也秦王堅曰帝王歷數豈有常耶汝不知通變耳秦王堅不納呆融辭出先是有沙門名道安者秦王堅尤信重之出入與秦王堅同輦至是群臣出朝正遇道安入內群臣謂道安曰主上欲有事于東南公何不為蒼生致一言也道安曰吾即諫之於是道安入見秦王秦王謂曰朕將與公南遊吳越泛長江臨滄海不亦樂乎安曰陛下應天禦世居中土制四維自足以比隆堯舜何必櫛風沐雨經略遠方也亦不納之忽慕容垂入秦王堅問曰吾欲伐晉收江南群臣言不可卿意雲何垂曰今天下秦得十分之七獨東南一隅未歸若以陛下之神武文武之賢能大兵一出何期不捷陛下可以乾綱獨斷勿采群臣之言以致留患於子孫也故詩雲謀夫孔多是用不集陛下宜斷聖心足矣昔晉武平吳所仗者張杜二三臣而已若從衆言豈有混一四海之功也秦王堅大悅曰與吾定天下者其惟卿乎言訖賜帛五百匹即令其點兵張夫人聞知亦諫曰天地之生萬物聖主之治天下皆因其自然而順之故功無不成黃帝服牛乘馬因其性也禹浚九州障九澤因其勢也後稷播植五穀因其時也湯武率天下而攻桀紂因其心也今朝野皆言晉不可伐陛下獨決意行之妾不知何所因也自秋冬以來雞夜鳴犬哀吠廄馬多驚武軍兵器自動皆非出征之祥也堅曰軍旅之事非婦人所當預堅幼子銑最有寵亦諫曰國之興亡系賢人之用命今陽平公國之謀主而陛下違之晉有謝安桓沖而陛下伐之臣竊惑焉堅曰天下大事孺子安知秦王堅下詔大舉民每十丁遣一兵其良家子年二十以上有材勇者皆拜羽林郎下書期克之日晉以司馬昌明為尚書左仆射謝安為吏部尚書桓沖為侍中並立第以待之良家子至者三萬餘騎拜趙盛之為少年都統是時朝臣皆不欲堅行獨慕容垂姚萇及良家子勸之陽平公融諫曰垂萇我之仇敵良家少年皆富饒子弟不嫻軍旅何可聽也堅不聽
