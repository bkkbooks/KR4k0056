body:
  text: 第五十五回河間奉帝還洛陽卻説石超以兵來擊王浚兵至平棘正遇浚軍兩下交戰二十餘合後軍忽然喊起兵衆各個逃潰超急回馬時一軍搶近前來視之乃東贏公騰至超見兩下夾攻心慌不敢戀戰乃沖出垓心退至鄴城下屯住次日王浚與騰合軍追趕趕至鄴城兩下交兵大戰是日石超領兵出陳王浚以烏桓遣西土大人引兵出戰與石超相鬥鬥二十余合石超抵敵不住撥開軍器走回本陳被烏桓王親領大軍漫山塞野混亂殺來殺得晉兵拋戈棄甲大敗而逃烏桓恐詐乃收兵回營是時成都王穎見石超迎敵不住慌走入城令三軍堅守城門不與交戰即入見帝同衆文武商議當司徒王戎曰今建鄴城不堅固糧食又少倘烏桓諸部圍城裏無糧草外無救兵必被所困不如乘此時胡人未逼城下走還洛陽調天下之兵迎敵方退得兵帝曰其計大善於是令王妃人等各出宮門與百官開城門望洛陽而走其時穎等與百官五千騎保帝同奔浚騰暴至衆各驚慌而走倉卒無錢只有中黃門布被囊中齎私錢三千帝詔貸之將於道中買飯食以瓦盆至溫而吃行至先武帝之陵帝自下犢車謁武帝陵帝先因亂中失履赤足乃納從者之履著之下拜先陵流涕哭倒在地百官扶起復行
