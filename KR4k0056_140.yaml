body:
  text: 第一三七回張賓計修祖逖墓勒問計于張賓曰邊境之人近將附逖將奈之何賓曰祖逖范陽人極有勇略若與戰難以取勝臣聞祖逖祖父母葬在吾成臯縣東大王使成臯縣官吏修祖逖父母之墳墓立起祠堂使人看守之代其四時享祭彼必感吾之德而不為邊患矣後趙王勒大喜使人持書來成臯以其意示縣官吏知悉其書曰祖逖屢為邊患逖北州士望也素有丘首之思其下幽州可代修其祖父墳墓為置祠四時祭享彼必感恩不擾其境矣宜速施行成臯縣官吏見書即尋訪逖之祖父墓而修之立祠祭享使人看守早有人來報知祖邀祖逖感激不已時祖逖衙門童建因與蔡內史周密有仇至夜潛殺周密祖逖聞知即欲拘童建治罪童建乃逃來降後趙王勒勒審知是祖逖部下之兵即令斬之修書一封使人持童建首級並書來報祖逖逖大喜拆其書看曰叛臣逃吏吾之深仇將軍之惡猶吾之惡也故不客而戮使人呈之外將軍祖氏之墓雖在吾界即吾父母之塋已令人營祠守而祭之矣逖見書大喜重賞使人回書與去自此以後後趙有人來降者逖皆不納始抽回境上之兵於是後趙之民邊境之間稍得休息八月梁州刺史周訪卒朝廷知之便降詔以甘卓代之訪字士達汝南人也少沈默而能讓及元帝渡江命訪參鎮東將軍事智勇過人討賊屢建大功每入朝見帝未嘗論功同僚問曰人有小善鮮不自稱汝勳功如此初無一言何也訪曰朝廷威靈將士用命訪可功之有因此朝野之士皆重之而訪善於撫綏士卒皆為致死知王敦有不臣之心私常切齒敦由是終訪之世未敢為逆及卒敦遣王舒監其軍元帝以甘卓鎮襄陽征舒為左丞敦留不遣卻説徐龕戰敗遂來降後趙後趙王勒受之勒用法嚴峻使張賓定九品命公卿及各州郡歲舉秀才孝廉清正賢良直言武勇之士各一人
