body:
  text: 第三九回劉裕大計破桓謙時桓修手下司馬刁弘引文武佐吏數百人在城外屯扎欲與桓修報仇劉裕命衆兵緊守四門乃親自登城樓上而謂司馬軍吏曰今郭江州已奉乘輿反正于潯陽我等受密詔誅逆黨今日賊玄首已當梟於大航諸君非大晉之臣乎何故助賊為亂耶刁弘等老臣信以為實乃邀衆退散去訖是日孟昶因勸桓弘出獵次日天尚未明弘使人開門出獵早被劉毅劉道規等率壯士數百人直入內堂斬之因收其衆濟江衆同推裕為盟主總督徐州事以昶為長史守京口裕率二州之衆千七百人屯於竹裏移檄遠近回應卻説桓玄設朝文武出班山呼禮畢群臣奏曰劉裕與劉毅何無忌謀反聚衆斬桓修及弘宜火速興兵去討玄聞弘與修死垂淚不已即宜頓丘太守吳甫之右衛將軍皇甫敷領兵北拒義兵又遣桓謙總之三將受命欲行玄謂謙曰賊兵鋭甚計出萬死若有蹉跌則彼氣成而吾事去矣不如屯大軍於覆舟山以待之彼空行兩日求戰不得自然散去此策之上也謙辭即行去了遊擊將軍何淡之奏曰前劉裕進謁小臣小臣左右造説裕身光耀滿室小臣恐其不為人下奏知陛下陛下不以為意今日果為患耳臣觀劉裕聚烏合之衆集蟻聚之兵勢必無成陛下何慮之深也玄謂何淡之曰劉裕勇冠三軍當今無敵足為一世之雄劉裕家無擔石之儲為樗蒱一擲百萬何無忌牢之之外甥酷似其舅共舉大事何謂無成朕前之不料今噬臍無及也言訖悶悶入宮群臣罷朝卻説劉裕為盟主以孟昶為長史總後軍劉穆之為司馬其時百姓願從者千餘人率軍分作三隊起行行至竹裏遣使移檄都下三月成午裕兵至江乘遇吳甫之兵到劉裕乃親執大刀大呼出陳聲若巨雷甫之一見只是不敢交鋒撥回馬便走裕以身先拍馬追斬甫之麾令三軍並進將士無不苦戰都皆以一當百斬首數百級追至羅落橋方自鳴金收軍屯於橋下裕乃鳴鼓集衆商議進京之計忽流星馬報説皇甫敷引大兵前來拒戰當時檀憑之出謂曰不勞盟主親陳小將願與一戰裕乃許之憑之即出披挂引部下兵出陳與皇甫敷對敵兩馬相交雙戟並舉二人戰上十餘合憑之氣力不加大敗走回本陳被皇甫敷驟馬追趕射一箭正中後心翻身落馬死於陳中劉裕在陳上一見大怒驅坐下馬挺手中刀如飛殺出陳來遇了皇甫敷就戰未上十餘合裕乃佯敗拖刀便走敷只道是敗去趕不曾提防被劉裕勒回坐下馬舞起手中刀望敷迎頭一砍砍死皇甫敷于馬下引兵殺進殺得楚兵逃走無門大隊兵至離京城二百里下寨至次日裕乃升帳號泣檀憑之情動三軍無不下淚而又使人去尋憑之尸首以棺木盛之遷葬京口初劉裕與憑之衆人欲建大業有善相者請裕相裕與何無忌等近當大貴惟雲憑之無相至此憑之戰死裕知其事已驗而深信之卻説桓玄聞皇甫敷等皆死軍馬已臨京城心中大懼乃遣桓謙以兵二萬屯於東陵口拒之又使卞範之以兵二萬屯於覆舟山西犄之卻説劉裕領義兵先詣升帳聚衆畫策進兵當衆將皆言曰今桓玄使桓謙屯東陵口卞範之屯覆舟山西吾所進者只此二路今敵占之吾兵難以進也不如退兵先取別郡俟其無備方可進也劉裕見説大怒曰吾非一功至此豈可畏而去之是無始終也吾明日自有破範之及桓謙之策次日使何無忌守寨尋土人引路自乘小車於覆舟山僻之處遍視地理因山嶺峻險棄車乘轎或自步行忽到一山望見一穀形如長蛇皆是峭壁雜絶樹林之間止有一條小路裕問土人是何地名土人曰此乃覆舟山穀裕曰此乃天賜吾殺玄兵於此處也言訖即回本寨喚孟昶監軍制油被一千條又喚何無忌至前吩咐引兵一千執皂白二旗分作兩隊以為疑兵屯於覆舟山東等處使桓謙疑不敢進又令孟昶監五百軍人將油被挂覆舟山對面諸山谷又令劉毅引兵三千挑戰可佯敗引桓謙至山谷放火焚謙大軍吾自領兵埋伏待其兵過分截接戰汝等諸將臨期如令不得有誤倘有漏泄定按軍法衆將得令各各依計準備而行計排已定次日劉裕引兵三千前來誘敵謙兵果至二馬相遇當時劉毅跑馬走出陳前勒馬橫刀大罵桓謙逆賊如何不降拒我義兵桓謙亦出馬罵曰叛賊何敢罵吾言訖持槍便刺過來劉毅舞刀去迎二馬相交軍器並舉兩人大戰二十餘合毅佯落荒而逃謙乃揮兵追之不三五裏追到覆舟山東乃勒馬謂諸將曰前日敗兵回誇劉裕用兵如神所向無敵今觀他之用兵可見了也似此等軍馬為前部與吾對敵正如驅羊與虎豹對也汝等可催趕軍馬星夜趕過山東平處下寨是吾之志也言訖又追數裏前軍來報山東兩下都有埋伏衆不敢行謙欲回兵只聽背後喊起鼓角喧天震動天地後軍又報後有劉裕領大隊兵殺出桓謙慌忙傳令令衆兵一齊殺過山東令未及傳望見山上樹林之中一派火光罩地俄而油被滿樹見火就著狂風大作四面八方火光彌天燒近前來人馬自相踐踏死者不知其數燒得尸橫遍野血滿渠池其時桓謙引了數十心腹軍人冒火衝突殺出而走奔投西蜀去了劉裕乃連夜引兵身先士卒並力死戰無不以一當百百戰百勝呼聲震動天地鼓噪之音大震京邑諸軍大潰裕兵直至京城之下安營卻説桓玄始雖遣軍拒裕而走意已決乃使殷仲文具舟石頭城下待逃當夜玄憂無寐在宮間行忽左右來説謙軍敗死目今劉裕兵至京城玄乃大驚即引親隨數人連夜開北門輕船往南走奔石頭城裕聞玄走至庚申日乃引兵衆入建康立留台總率百官商議奉迎鑾輿收桓玄宗族在建康者盡剿誅滅命劉毅調兵去追桓玄毅得令以兵去了又命尚書主瑕率百官奉迎乘輿亦起行去了當時司徒王謐與衆議同推裕領揚州牧固辭不肯受乃以謐録尚書事領揚州刺史裕自為鎮軍將軍都督八州諸軍事徐州刺史領軍將軍以劉穆之為崇邑太守總諸大處分皆委于劉穆之穆之倉卒立定無不允愜裕托以心腹動止咨焉穆之竭節盡誠無所遺隱時晉政寬弛綱紀不立豪傑淩縱小民窮困重以司馬元顯政令違舛桓玄雖欲釐政而科條煩密衆莫之從其時穆之斟酌時宜隨方矯正裕以身範物以威禁內外百官皆肅然奉職不盈旬日間風俗頓改為美也初王謐為桓玄佐命元臣手解帝璽綬以授玄及玄敗衆議宜誅裕特保全之劉毅嘗因朝會問謐璽綬所在王謐內不自安逃奔曲阿劉裕遣人追還重定諸葛長民至豫州失期不敢發刁逵竊知乃執之檻車送桓玄未至而玄敗送人遂破檻車放出長民還趨曆陽刁逵乃棄城走其部下將執刁逵以送劉裕斬於石頭城子侄皆死裕初名位微薄輕狡無行士流皆不與相知惟王謐獨奇賞之謂曰卿當為一代英雄劉裕嘗與刁逵樗蒱不時輸與逵被逵縛于柳下王謐責刁逵而代裕償由是裕憾逵而德謐劉裕既克建康思昔劉牢之之恩乃使人往洛陽召其子劉敬宜入用使人去了先是敬宣知桓玄至京師恐不容己乃奔走洛陽敬宜素明天文見景象彗出知必有興復晉室者嘗以告所親又嘗夢與丸土服之覺而喜曰丸者桓也桓土既吞吾當復本土乎是日恰好使者至説劉裕有召即乃馳還京師入見劉裕裕乃大喜以其為武岡縣侯因問敬宣曰吾與劉毅共復晉室汝看吾與劉毅雄傑誰先敬宣曰明公天資英邁賞罰嚴明仁德兼著不世之有毅公何能及焉況劉毅外寬內忌自伐而滿若一旦遭遇當以淩上取禍非可與明公為並劉裕默然大悅之
