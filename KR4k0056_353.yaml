body:
  text: 第三五回宋公劉裕即帝位庚申二年四月長星見裕令傅亮捧璽綬還宮再作表以辭帝曰宋王無意禪任卿等若何亮曰陛下可築一台名曰受禪台對公卿士民明白禪位則陛下子孫世世必蒙宋恩矣帝只得令太常院官卜地於南郊築起三層高臺卜夏六月丁卯日齊集大小官僚四百余員武將禦林虎衛禁軍一十余萬及胸奴單于四夷化外之人亦有數萬是日寅時奉請大王劉裕登臺受禪恭帝親捧玉璽以與宋王裕裕方受命台下群臣跪請宣敕曰咨爾宋王昔者帝堯禪位於虞舜舜亦以命于禹天命不有常惟歸有德晉道陵夷世失其祚海內大亂群凶肆逆宇內顛覆賴宋王裕拯大難於四方清區夏以保護我宗廟豈豫一人遐荒九服實受其賜今王欽承前繼光於乃德恢文武之業昭示皇考之弘勳英靈降瑞大臣告征延為築台師錫朕命曰爾唐堯協于虞舜周率我唐與敬禪帝位於戲天之歷數在爾躬允執其中天祿永終君其祗順大禮享茲萬國以淵天命元熙元年冬十月日詔讀策已罷宋王方受八般寶貝柴燎告天傅亮率公卿行大禮罷備法駕幸建康宮臨太極前殿立義符為太子大赦天下封賞文武改晉泰始曆為永初曆社以子臘以辰使使巡行四方旌賢舉善問人疾苦獄訟紊濫政刑乖愆傷化擾俗未允人聽者令悉具聞至次日議封恭帝為零陵王令其別處歇馬非宜喚不許入朝恭帝領旨謝恩出朝居於秣陵使劉遵以兵防衛之卻説劉裕既受晉禪即皇帝大位每臨朝悲哀曰劉穆之不死當助我理天下可謂人之雲亡邦國殄瘁範泰對曰聖主在上英彥滿朝穆之雖功著艱難未容便關興廢陛下何自發悲耶宋帝答曰卿不聞騏驥乎貴日致千里耳於是帝追封穆之南康郡公諡曰文宣其時太子義符居東宮多狎群小因是謝晦言于武帝曰陛下春秋既高思保萬代報器致重不可使負荷非人今太子居東宮多狎小人任意淫虐非可為之人主也武帝曰廬陵王義真如何晦曰臣請觀焉帝曰卿可去代朕觀之即來回報於是謝晦入內造見義真義真盛飲與談別事仁德國政無言晦俱不為答即報武帝曰德輕於才實非人主也由是武帝使義真為揚州刺史去鎮石頭城宋武帝設朝有司奏以錢貨減少國用不足武帝因欲更造五銖時太常範泰諫曰臣聞為國拯弊莫若務本百姓不足君孰與足未有民貧而國富本不足而末有餘者也故囊中滿貯識者不吝反裘負薪存毛自惜實聖主者不言有無諸侯不説多寡食祿之家不與百姓爭利故拔葵所以明政織蒲謂之不仁是以貴賤有章職分無爽今之所憂在農人尚憂食廩未充轉運無已資食者衆家無私積難以禦荒耳夫貨有貿易不在多少昔日之貴今日之賤彼此共之其揆一也位令官民俱通則無患不足若使必資貨廣以收國用者則錢貝之屬自古所有尋銅之為器在用已博矣鍾律所通者貨機衡所揆者人夏鼎負圖嘗庶衆瑞晉鍾呈象亦啓休征關有重用則貴賤同資物有適宜則家國共急今毀必資之器而為施之錢於貨則功不補勞在用則君民俱困校之戶實損多益少伏願思可久之道操欲速之情弘山海之納擇芻蕘之説也武帝聞諫於是罷焉
