body:
  text: 第五十九回東海王檄討張方二年四月張方復廢皇后羊氏東海中尉劉洽以張方劫遷車駕復廢皇后心甚不平因見東海王越曰張方劫遷車駕二廢皇后罪惡彌天休道先帝之靈不可天下人神共怒明公如何不檄天下討之迎天子復回舊都而坐視其逆耶越曰恨力不及恐難討之洽曰東平王懋現督徐州兵精糧足若得徐州可為成事今有一人姓王名修現為徐州長史極能舌辨明公召來使其説東平王懋以徐州授明公則大事成矣越從之即使人召王修至説與其事修領諾即來見東平王懋曰今東海王欲舉義檄山東之兵討張方迎天子還舊都恨力不及欲借大王徐州都督諸軍以率義山東大王意下如何東平曰彼既為國為民吾安敢不從遂慨然從王修之説即使人請越至以徐州授越懋自為兗州刺史於是越以司空領徐州都督糾率義兵共去討張方不提史説范陽王司馬虓字武會少好學馳譽研考經史言論清新官拜散騎常侍聞知惠帝被河間王顒令張方劫駕遷都長安心甚不平長史馮嵩知其意因謂虓曰今河間王司馬顒使張方劫帝入長安廢成都王穎久必篡逆殿下若肯與令兄平昌公起義兵保駕還洛陽其功可比周公勳業必成虓曰吾在宗室之末眼前無有可為者嵩曰東海王司馬越有英雄之志可雲命世之英不如推東海王為盟主聚義起兵大事可成虓曰君言正應我心於是范陽王虓使人會東海王越議起義之事越欣然從之引兵而至次日虓大排筵會平昌公司馬模長史馮嵩等刑白馬祭天地歃血而盟推東海王越為盟主扯起招軍旗不旬日得兵二萬人出屯西河商議進兵當馮嵩言曰今我始聚之兵烏合之衆難以出戰今見豫州刺史劉喬部下多有精兵可使人持節招其來降同起義兵方可得安越曰然於是使人持節來招劉喬劉喬不受節度反又起兵來並使者見如此光景急忙回報東海王越越拜虓為都督河北諸軍事驃騎大將軍領豫州刺史令其引衆討喬卻説成都王穎既廢河北人多憐之其故將公師藩等因而自稱為將軍起兵趙魏衆至數萬人初上黨武鄉羯人石勒有膽力善騎射並州大飢東贏公執諸胡于山東賣之以充軍實勒亦被賣與荏平人師歡為奴歡奇其狀貌而免之勒乃與牧師汲桑結聚壯士為盜及聞藩起兵桑與勒帥數百騎赴之桑始命勒以石為姓以勒為名矣藩既得桑勒為副將攻陷州郡縣堡塢無敢迎敵又來攻鄴城東海王越與范陽王虓使部將苟晞領二萬軍去擊藩藩聞苟晞至大懼部下兵皆潰去於是藩不敢交鋒領其衆走之虓以軍還東海王越大會諸將刻日興師是日諸將士畢集筵罷越撥調諸將乃留琅邪王睿為平東將軍監徐州軍事守下邳睿領命曰請參軍王導為司馬與吾同理軍越從之自率甲兵三萬西屯蕭縣使范陽王虓自許屯于榮陽時越承制使人以豫州刺史劉喬為冀州刺史使虓領豫州劉喬以虓非天子命亦不肯發兵虓聞細作回報劉喬以兵來拒命虓大怒即忙整點軍馬大驅前進初虓以劉琨為司馬越以劉藩為淮北護軍劉輿為穎川太守劉喬聞輿兄弟黨越為逆心甚恨之於是遣人封上見帝道劉輿兄弟罪惡于尚書省乃令其子劉祐以兵二萬人屯於靈壁縣以拒虓自引兵來攻許城以討輿分撥已定各以兵行卻説東平王懋在兗州徵求不已郡縣百姓不堪命虓聞知遣苟晞還兗州徙懋於青州晞領命來兗州白之於懋懋不受命曰吾以徐州授東海方成大事今日負吾又欲易之彼何不足耶若要易除非徐州還我方讓兗州晞見不肯乃還之因此懋陰使人結劉喬合兵攻虓時顒聞知山東兵起心中大懼即入朝上表奏帝曰山東大亂百姓不安望陛下詔成都王復職都督河北諸軍事以鎮於鄴可保山東帝從之使人持詔往鄴以穎都督河北諸軍事穎得詔復集舊將士鎮於鄴城顒已知越虓起兵無計可施乃奏惠帝以詔往山東命越虓等各以兵就國毋許為亂越虓等不從會劉喬封上事稱劉輿兄弟脅虓造逆顒即入內奏過惠帝詔其令鎮南將軍劉弘征東將軍劉準起兵與喬戮力先討劉輿又以張方為都督率兵五萬共會許昌誅輿兄弟又遺人馳書使成都王穎與石超等以衆拒河橋為劉喬繼援卻説劉弘既得詔使人遺喬及越書使解紛釋兵各還歸鎮同獎王室喬越皆不聽弘乃遣使入朝上表曰頃自兵戈紛亂構于群王翩其反而互為戎首載籍以來骨肉之禍未有如今者也萬一四夷乘虛為變此亦猛虎交鬥自效于卞莊者也謂宜速詔超越等令兩釋猜疑各保大局自今有擅興兵馬者天下共伐之以此為示誰敢勿從也帝覽表猶豫顒方拒關東倚劉喬為助故不納奏帝曰陛下先曾有詔令越虓各就國尚且未聽今詔彼豈肯從不若討之帝從其奏卻説劉喬聞朝廷遣張方以兵助己乃集諸將士商議進兵長史劉榮曰張方大兵計日將至許昌今劉輿兄弟與范陽王在許昌五十裏下寨拒方彼謂我孤軍堅壁無敢出境吾料其必無準備此去不遠使君親持甲卒五千星夜抄小路馳去攻許指期得矣彼既失穴安能戀戰必走回鎮張方戰於前使君攻其後不獨得許而髒亦可成擒矣喬大善其計即引五千甲卒漏夜至許昌果無備喬乘虛襲許破之分軍定成使人打探回報張方大軍將至虓營因此喬以四千甲卒挾夾攻虓營虓聞許昌城陷更又張方兵至腹背受敵恐難拒戰乃與劉輿等領兵俱奔河北張方見虓等走亦不趕追乃引兵入屯於許昌令劉喬還豫張方行軍無律部下殘掠百姓民不堪命衆心俱離不樂其屯時劉弘見張方殘暴知穎等必敗乃率諸軍受越節度不聽方命十一月將軍周權矯詔立羊後於是顒矯詔救留台賜死後司隸校尉劉瞰上奏固執得免顒恨之欲收瞰瞰奔青州去訖被顒將周權追及斬之
