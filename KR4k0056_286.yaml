body:
  text: 第二八三回太子寶敗參合陂九月魏王圭進軍臨河燕太子寶列兵造船將濟風吹其船泊南岸是此難以進攻魏王遣軍獲其甲士三百餘人皆釋而遣之初寶之發中山也燕王垂已有疾病既至五原魏王圭使人邀截中山之路不與通其往來忽垂遣人持書送來被魏王圭之人將其使者執之寶遂數月不聞垂之起居魏王圭使所執之使者臨河告之曰若父已死何不早歸寶等憂恐士卒駭動寶即傳令暫且退兵魏王圭探知使洛陽公遵以七萬兵追燕軍之後十月燕太子寶令軍燒船夜遁是時河冰未結寶以魏軍必不能渡河不設斥堠十一月暴風冰合聞寶兵退圭乃引兵濟河選精鋭三萬餘騎急迫之燕軍至參合陂有大風黑氣如堤自軍後來臨覆軍上沙門支曇猛曰魏軍將至之候宜遣兵禦之寶不聽司徒德勸寶從之寶乃遣趙王麟以兵三萬居軍之後以備非常麟乃以曇猛之言為妄縱騎遊獵不復設備魏軍日夜兼行至參合陂西燕軍在陂東魏王圭夜部分諸部令士卒銜枚束馬口潛進旦日登山下臨燕營燕軍大驚擾亂圭縱兵直入燕營鼓噪喧天燕兵大亂慕容寶大怒指揮大小三軍盡力一齊死戰時寶自掣刀在手引數百騎在後掠陳卻才兩軍相合忽然燕軍陳後西南上數百面戰鼓齊鳴寶分後軍迎之只見張兗一軍從西南上悄悄地殺來燕軍大亂魏兵從後殺來慕容寶急忙退回四下魏兵前後掩殺燕兵大敗慕容寶慌忙退回本寨其寨已先被叔孫建引兵從後路抄入奪去諸寨以兵殺出因此燕兵無營心慌自亂四下受敵不能抵擋軍皆潰散慕容寶急喚慕容麟引水軍一齊上岸步戰時正遇著叔孫建交馬十合麟遮掩不住慕容農引兵助戰張兗一見持槍來迎兗顯平生氣力殺退慕容農慕容麟見慕容農敗不敢戀戰二人合兵保著太子慕容寶走回水寨旱寨之兵都被魏兵殺盡水軍亦逃潰一半當時慕容農上言於寶曰今旱寨已失水軍逃散難以與敵不如乘其未定盡燒戰船領水軍步走否則成擒寶從之將戰船盡行放火燒訖引水軍上岸漏夜步走至西平忽然前軍喊起慕容寶與慕容麟慕容農三人拍馬奔陳正遇魏將陳留王拓跋虔以兵阻路三人各以兵器來戰拓跋虔拓跋虔抖擻精神全無懼怯獨戰三將三將只好遮攔正戰間後面大兵趕至因此燕兵大亂各自逃生慕容寶三人見自軍奔潰無心戀戰隔開軍器殺開血路各自奔去時燕軍被魏兵殺死者萬人洛陽公遵還兵擊其前復擒四五萬人寶等單騎僅以身免圭欲釋燕臣有才者用之其餘給衣糧放還以招懷中州之人中部大夫王建曰燕衆強盛不如悉殺之則國空虛取之易圭從之乃盡坑之而還慕容寶敗回見垂垂大怒司徒德言於垂曰彼以參合之捷有輕太子心宜及陛下神略以服之不然將為後患垂乃練兵中山以期明年舉兵伐魏
