body:
  text: 第一四五回王敦殺周顗戴淵於是帝令王導與百官俱至石頭見敦講禮訖導曰朝廷詔兄罷兵敦許之敦謂戴淵曰前日之戰有餘力乎淵曰豈敢有餘但恨力之不足耳王敦曰吾作此舉天下以為何如淵曰見形者謂之逆體誠者謂之忠敦笑曰卿可謂能言又謂周顗曰伯仁負我周顗曰公戎車犯順下官親率大軍不能共事使王旅奔敗以此負公敦不答心下以太子有勇略為朝廷所向欲加其不孝而廢之次日大會百官敦問溫嬌曰皇太子以何德稱聲色俱厲嶠曰鈎深致遠蓋非淺局所量以禮觀之可謂孝矣衆皆以為信然敦謀遂阻元帝召周顗謂曰近日卿見王敦大事二宮無恙諸人平安大將軍固副所望耶顗曰二宮自如明詔臣等尚未可知元帝曰王敦懷逆必害卿卿遠避之顗曰臣備位大臣朝廷喪敗豈肯草間求活投胡越耶當敦參軍呂猗素以姦險為淵所惡因謂敦曰周戴皆有高名以惑衆心近者之言曾無怍色公不除之恐必有再舉之憂敦然之以問導曰周戴南北之望當登三司無疑也導不答又曰止應令仆射又導不答敦又曰若不爾正當誅耳又不答敦遂遣部將收顗並淵部將領五千兵收周戴二人回經太廟門首顗大言曰賊臣王敦傾覆社稷枉殺忠臣神祗有靈當速誅之收人以戟傷顗口流血至踵容止自若觀者皆為流涕敦令押入市曹並淵殺之元帝使敦弟王彬以牛酒勞敦而彬素與顗善聞顗被殺先往哭之然後見敦敦怪其容慘而問之彬曰因哭伯仁情不得已敦怒曰伯仁自致刑戮且伊為人姦佞何哀而哭之彬勃然數之曰兄抗旌犯順殺戮忠良圖為不軌禍及門戶矣其詞氣慷慨聲淚俱下敦大怒曰爾以為吾不能殺汝耶導勸彬起謝彬曰腳痛不能且此復何謝敦曰腳痛孰若頸痛彬殊無懼色由是王導勸散去訖
