body:
  text: 第三十九回司馬倫廢帝自立辛酉永寧元年卻説趙王司馬倫召侍中孫秀入謂曰吾欲廢帝自立如何孫秀曰今朝廷至弱權在殿下不就此時行事遲則有變矣來日殿下可于府堂聚會百官商議其事若有不從者立斬之則昔指鹿之事正在今日司馬倫大喜便教大排宴會於府堂次日請百官飲宴是旦飛騎往來於城中遍請公卿公卿皆懼倫秀之勢誰敢不到司馬倫見百官到了令各入席自徐徐帶劍亦入席各講禮訖令從人執盞勸酒待酒行數巡司馬倫自舉杯勸諸大臣飲酒令停酒止樂倫曰今有大事衆官聽察於是衆皆肅聽倫曰天子為萬乘之主以治天下今帝戇騃而無威儀不可以奉宗廟社稷況先帝有密詔言惠帝昏愚未可為君吾欲以帝為太上皇吾自權監國候有德者立之此事若何當百官立於筵前曰殿下所見差矣昔商朝太甲不明伊尹放之于桐宮漢昌邑王登位方二十七日造罪三千余條霍光告太廟而廢之今上雖懦弱並無罪過莫非不可司馬倫大怒曰天下乃吾家之天下汝等何得逆吾若順者生如忤必誅群臣莫敢再言於是百官自出還第次早趙王司馬倫使孫秀領兵列於朝門外自仗劍帶甲士數百人直入殿上群臣皆懼司馬倫請帝升殿大會文武如有不到者斬是日大臣皆列班次司馬倫掣劍在手曰帝昏庸不堪掌理天下今告太廟以惠帝為太上皇令其徙居金墉今有郊天策詔群臣靜聽言訖令孫秀讀其詔曰昔武帝不幸崩逝孝惠皇帝嗣位承紹海內仰望太平而惠帝昏庸政出後宮弒皇太后不孝于母殺皇太子不慈於親凶德彰露昏蒙弱暗似此豈堪繼承大統今公卿大臣孫秀等請告主廟以惠帝為太上皇限即日遷徙不許遲延趙王司馬倫素有仁德之風成周之懿朝野仰識天下共知宜登大位以任社稷是斯詔示群衆和宜應天順人以慰生靈之望知悉孫秀讀詔訖命左右扶惠帝下龍床解其璽綬令其北面而立惠帝號哭群臣亦悲孫秀自扶趙王司馬倫登位群臣拜舞皆呼萬歲君臣禮畢趙王倫謂惠帝曰廢一帝立一帝古來有之汝雖不德朕念至親不忍加害於卿汝速徙金墉非宜呼不許入朝諭訖命介士至取車仗護送惠帝並宮妃人等於金墉城居住改金墉為永昌宮月給糧米並供膳趙王司馬倫既登了帝位孫秀專政總領內外兵權於是趙王倫益重孫秀凡下詔令秀輒改革有所豫奪自書青紙為詔或朝行夕改者數四百官轉易如流趙王既登大位吏在職者皆封侯因府庫之儲不足以供應侯鑄印不給或以白版封
