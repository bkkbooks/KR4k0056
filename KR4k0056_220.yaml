body:
  text: 第二一七回燕王興兵執魏王四月魏王閔既克襄國襄國大飢因遊食常山中山諸郡燕王雋遣將軍慕容恪等將兵三萬來擊之閔知恪引兵來乃率衆急趨常山恪以兵後追魏王閔勒兵回與恪戰恪兵大敗閔連十戰皆勝恪皆敗閔素有勇名所將兵精鋭燕人憚之恪見自己部下士卒懼閔因而巡陳諭將士曰閔勇而無謀匹夫敵耳其士卒飢疲甲兵雖精其實難用不難破也汝衆何懼之有諭訖引衆復追閔所將多步卒將趨林中恪參軍高開謂衆曰吾騎兵利平地若閔得入深林不可復製宜遣輕騎邀之既合而佯走誘入平地然後可擊也恪從之即調兵邀擊閔果引兵還駐恪又以軍分三部與戰因謂諸將曰閔性輕鋭又自以衆少必致死於我厚集中軍之陳以待之俟其合戰卿等從旁擊之無不克矣衆諾其計恪又擇鮮卑善射者五千人以鐵瑣連其馬為弓陳而前魏閔乘千里馬號曰朱龍左操雙刃矛右持鈎戟以擊燕兵燕將與戰莫能敵閔斬燕人三百余級燕兵不退閔望見恪之大幢知其為中軍乃揮衆直沖入燕兩旁之兵夾攻之閔一者兵女二者夾攻欲入中陳箭發如雨欲退四圍重厚於是被燕兵大破之閔料不能勝乃潰圍東走行數十餘裏其馬忽斃閔即棄馬步走不過百步燕兵追及至此被執燕將將魏王冉閔押至薊城來見慕容雋雋問閔曰汝奴僕之才何自妄稱天子閔曰天下大亂爾曹夷狄人面獸心尚欲篡逆我一時英雄何為不可作帝王耶燕王雋大怒使武士策金鞭之三百猶未死雋使人遂于龍城遏徑山斬之其山左右六七裏草木悉枯而死五月至十二月大旱無雨其郡守乃遣人奏知燕王雋雋大驚乃使人立祠於其上備太牢祀之諡閔曰武悼大王是日方下大雨燕王又遣慕容評率三萬精騎攻鄴城魏太子冉智已知魏王被害朝夕泣涕忽兵又來攻鄴心中大懼急問諸將大將軍蔣幹出曰燕兵勢大難以拒敵城中糧草頗有不若堅守待其懈怠然後攻之太子智從其計拒守城池城外百姓皆已降燕五月秦王健率兵五萬出攻張琚琚以二萬衆拒敵次日交兵各揮兵戰斧來戟對槍去刀迎戰上二十餘合琚兵大敗而逃琚戀戰不退被秦兵斬之於是秦王收兵入城卻説魏太子智與慕容評相持數月燕兵愈添況又城中大飢人民相食故趙宮人被食略盡太子智大驚蔣幹謂太子曰事急矣宜使使降晉乞師來救方可解得此圍太子智從之蔣幹即遣侍中廖嵩奉表請降于晉一面整備守城又使人求救于謝尚初謝尚使戴施據枋頭施聞蔣幹求救奉表請降施乃率壯士百余人入鄴助守三台因説幹曰公言降晉可速將傳國璽與我令人送入建康見主上發大兵來救方保此地不然終為所擒幹然之問太子智求印與施施使督護何融懷璽送與尚宣言使督護何融迎糧陰令懷璽送至枋頭與尚尚迎送至建康呈與帝納之百僚俱賀稱萬歲卻説謝尚遣姚襄共攻秦張遇秦王健知亦遣丞相東海王雄等率兵二萬人救之戰于潁水之誠橋尚等大敗奔回淮南殷浩聞知尚敗自許昌退軍壽春雄徙張遇及陳穎許洛民五萬余戶於關中以楊群為豫州刺史令其領許昌八月慕容評領兵攻鄴都時魏王冉閔已被慕容恪所擒送於薊州斬訖評麾兵攻陷入城收冉閔妻子等送燕王雋燕王已欲神其事業言曆運在己乃詐稱雲閔妻獻玉璽反赦之賜號曰奉璽君置居後宮因謂文武曰吾初入鄴得此玉璽吾若不有中原之福安得此祥吾欲自即帝位卿等雲何時諸將文武皆曰大王得此嘉瑞可登九五何必言論因是群臣下拜皆呼萬歲十一月燕王雋即皇帝大位國號前燕建元為元璽元年建都於鄴城封慕容恪為大司馬慕容評為大司徒其下文武各有加封當時趙王石季龍之伐棘城也雋父慕容皓欲乘駿馬避難其馬悲鳴蹄齧不肯從行皓不能近因此主意與戰攻敗季龍就亦奇愛之至是四十九歲駿逸不虧燕王慕容雋亦復並奇之比之鮑氏驄因是命鑄銅以為其像親為銘贊勒於其旁置之薊城東掖門是歲像成而馬已死雋甚惜之時燕太子曜死燕王雋痛哭惜之乃立次子慕容暐為太子卻説殷浩之北伐也右軍將軍王羲之以書阻不聽既而無功復謀再舉羲之又遣人遺浩書曰今以區區江左天下寒心固已久矣力爭武功非所當作自須處內外之任者未有深謀遠慮而疲竭根本各從所志竟無一功可論遂令天下將有土崩之勢任其事者豈得辭四海之責哉今軍疲於外資竭於內保淮之志非所復反莫若還保長江督將各復舊鎮自長江以外羈縻而已引咎責躬更為修治省其賦役與民更始庶可以救倒懸之急也謂猶以前事未為工復求之於分外宇宙雖廣自容何所此愚所不解也浩曰吾自有奇謀而進汝豈識之因是不納遂又進兵羲之見浩不聽又上會稽王昱疏曰今雖有可喜之會內求諸已而所憂乃重於所喜功未可期遺黎殲盡以區區吳越經緯天下十分之九不亡何待而不度德量力不弊不已此封內所痛心歎悼者也願殿下先為不可勝之基鬚根立勢舉則謀之未晚昱亦弗聽時浩進屯夏口遣戴施據石門劉遁戍倉垣以候進取卻説晉帝設朝文武山呼訖近臣奏知燕王雋取去關中之地及今據鄴城為都未知其意若何陛下可使人齎詔旨前去封其燕王看其如何若受詔稱藩且置之度外彼若拒詔旨乘其未定興兵討之帝然之即遣使持詔旨來鄴城封慕容雋為燕王雋果不受詔而謂使者曰汝還白汝天子我承人乏為衆所推已為皇帝矣使人即歸以是言奏於晉帝帝大怒使人催殷浩進兵去討卻説姚襄字景國弋仲第五子因見父姚弋仲死了恐孤不能自立領其衆降晉晉帝大喜封襄為右將軍使為前鋒同殷浩伐燕
