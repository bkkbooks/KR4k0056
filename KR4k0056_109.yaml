body:
  text: 第一六回漢殺陳休等七人四年二月漢中常侍王沈郭猗榮寵幸用事漢主聰遊宴後宮或百日不出政事一委相國粲惟生殺除拜乃使沈猗入白沈等多以私意決之而沈猗有怨于太弟乂謂相國粲曰猗今與大將軍謀因上巳大宴作亂今禍期將近宜早圖之殿下如不信臣言可召大將軍從事王皮劉惇許其歸道以問之則可知粲許之猗密出謂皮惇曰三王反狀主上及相國俱知之矣卿聞之乎二人驚曰無之猗曰此事已決吾憐卿親舊必並見族耳因佯為欷歔流涕二人大驚叩頭求救猜曰倘相國問卿卿但雲有之無事驚忙惇許諾次日粲召王皮劉惇入問之言皆同而其辭若一粲以為信然靳準復説粲曰人告太弟為變主上必不信宜緩東宮之禁使賓客得往來太弟雖好待士必不以此為意輕薄小人不能無迎合為之謀者然後下官為殿下露表乃盡收其賓客拷問之獄辭既具則主上無不信之理也粲然之乃命蔔抽引兵離東宮去訖時東府少傅陳休將軍卜崇為人忠直王沈深疾之侍中蔔幹密知其事因謂休崇曰沈等勢力足以回天地卿輩自料親賢孰與竇武陳蕃休崇曰吾輩年逾六十職位已崇惟欠未捐身死于忠義乃為得所安能俯首低眉以事宦豎乎至是靳準表太弟與東宮佐屬謀欲為亂漢主聰大怒令收休崇與特進綦毋達等七人誅之此七人皆群臣所惡故使漢主誅之卜幹進諫王沈叱之曰卿莫不同謀乎漢主聰亦怒免為庶人各官與劉易及陳元達等諫曰今遺晉雖殄巴蜀不賓石勒謀叛國無賢臣欲王全齊陛下心腹四肢何以無患乃復以王沈郭猗等助亂誅巫鹹戮扁鵲臣恐遂成膏盲之疾雖救之不可及矣乃上疏曰臣伏惟天下所以有逆不正者皆姦人播弄蒙蔽聖聰侮慢天常竊權承寵濁亂海內擅握王命黨惡相乘攻擊正人一至出門便獲大賞京畿諸郡數百萬膏腴美田皆沈等所據致使侯服要荒盜賊蜂起士民皆言先誅宦豎以除民害從台閣求乞賢臣隨慰撫以至新安臣聞揚湯止沸不如抽薪潰癰雖痛勝如發毒臨溺呼救悔之無及臣請誅沈等則社稷幸甚天下幸甚矣時漢主聰在上秋閣見表反以表示沈等笑曰群兒為元達所引益成癡也聰問沈於粲粲盛稱其忠清聰大悅封沈等為列侯劉易又上疏極諫聰大怒手裂其疏易忿恚而卒劉易素忠直元達倚之為援得盡諫諍及卒元達哭之慟曰人之夭亡邦國殄瘁吾既不復能言安用此默默苟生乎歸宅遂自殺國中士民聞者莫不悲歎史説陳元達字長宏後部人本姓高以生月妨父故改雲姓陳自幼孤弱躬耕讀書年四十不與人交通先劉元海為左賢王時聞名而召之元達不答及劉元海僭號征為黃門郎既至引見元海曰卿若早來豈為郎官而已元達曰臣惟性之有分盈分者顛臣若往叩天門者恐陛下賜處於廊廟納言之間此則非臣之分是以抑情盤桓恃分而至大王無過授之謗小臣免致寇之禍不亦可乎元海大悅元達在朝忠謇屢進讜言退而焚草稿子弟莫有知者漢主聰常謂元達曰卿當畏聯反使朕畏卿乎元達叩頭謝之及其死也人人冤之陳元達已死漢主聰大宴群臣傳旨引太弟劉乂同宴見乂憔悴而涕泣陳謝甚稱被誣之事聰亦大哭待之如初
