body:
  text: 第一一六回漢主劉聰弒湣帝十二月漢主聰設朝下詔命排彎駕出畋平陽漢主自坐車駕又使湣帝行車騎將軍戎服執戟前導出平陽門百姓聚觀內有認得憨帝者因指之曰此故長安天子也由是百姓爭前而觀之父老皆感歎而有垂涕者漢主聰出獵罷回宮太子劉粲言於聰曰昔周武王豈樂殺紂乎正恐同惡相求為患故也今日出獵百姓見晉帝前導各有思淚意尚附晉也不早除之免貽後患聰曰前殺庾瑉輩而民心猶如是吾未忍也且少觀之次日聰命排宴於無極殿大會文武百官行酒三巡漢主又使湣帝勸酒帝眼中垂淚只得勸完漢主又使湣帝洗爵湣帝亦只得洗爵汙了衣服欲推更衣而出漢主不與出外又使之執蓋憋帝泣而執之當晉臣多被擒在此者盡皆涕泣有尚書郎辛賓掩住湣帝大哭曰因不能殺賊保國使陛下遭辱臣非貪生言訖奪帝所執蓋來撞漢主漢主大怒命武士牽辛賓出殿外斬之平陽百姓無不嗟歎有詩曰晉君忍恥在平陽可惜辛賓尚書郎樽前抱主因身死提起教人痛斷腸時洛陽守將趙固河內太守郭默皆引兵侵漢揚言曰要當生縛劉粲以贖天子劉粲大驚言於漢主聰命將湣帝殺之因此晉帝遇害於平陽諡曰孝湣按西晉四帝共五十二年始于武帝乙酉篡魏自立終於湣帝丙子為偽漢劉聰所滅卻説晉王睿躬親課督農桑二千石長吏以入穀多少為殿最諸軍各自佃作即以為稟而遼西公段疾陸眷卒其子勸叔父涉復辰自立末柸深恨之乃詐奔喪乘虛以衆入內襲殺復辰復辰無備被害於是末柸自稱為單于以統大衆
