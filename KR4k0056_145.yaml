body:
  text: 第一四二回代賀傉謀弒其君卻説代王鬱律大會群臣聞探事人回報中華晉憨帝被劉聰所害聰亦死粲即位亦被靳準所弒今劉曜僭位都於長安石勒稱尊于襄國晉元帝立於江南天下大亂代王見説大悅曰今中原無主天其資我乎言未訖近臣奏前趙王劉曜遣使至請和結為唇齒之邦不一時近臣又奏趙王石勒亦遣使至乞和結為兄弟之國代王曰吾正欲取中原豈與汝和皆命不納斬其使而絶之自此代王乃講武練兵欲平南夏有拓跋猗竾之妻惟氏忌代王郁律之強恐不利其子乃令其子拓跋賀傉陰結代王鬱律左右將佐至夜入內執鬱律弒之而自立為代王盡領其衆代王既被害其次子什翼健幼在繈褓其母王氏知變乃將什翼鍵匿褲中而出逃因祝之曰天苟存汝汝則勿啼久之不啼因此私自逃奔外家乃得免其大難後長成人
