body:
  text: 第三四四回魏王賜浩禦縹醪時齊郡太守王懿降魏上書言劉裕在洛宜發兵絶其歸路可不戰而克魏王嗣善之以問崔浩曰劉裕克秦乎浩對曰克之嗣曰何故浩對曰姚興好事虛名而少實用子泓懦弱兄弟乖爭裕乘其危兵精將勇何故不克嗣曰裕才何如慕容垂浩對曰垂藉父兄之資修復故業國人歸之易以立功劉裕舊寒微不階尺土討滅衆盜所向無前垂不及矣嗣曰裕既入關不能進退我以精騎直抵彭城裕將若之何浩對曰今屈丐柔然伺我之隙而諸將用兵皆非裕敵興兵遠攻未見其利不如靜以待之裕克秦而歸必篡其主關中華戎雜處風俗徑悍裕欲以荊揚之化施於函北此無異解衣包頭張羅捕虎雖留兵守之人情未洽趨向不同適足以資敵耳願且按兵息民徐觀其變秦地終為國家所有可坐而守也嗣笑曰卿料之神矣浩曰臣嘗私論近世將相如王猛之治國苻堅之管仲也慕容恪之輔助幼主慕容暐之霍光也劉裕之平禍亂司馬德宗之曹操也嗣曰屈丐何如浩曰屈丐國家傾覆寄食姚氏受其封植不思報而乘時邀利盜有一方結怨四鄰雖縱暴一時終為人所吞併耳嗣大悅語至夜半賜禦縹醪十觚水晶鹽一兩曰朕味卿言如此故欲共餐其美然後命長孫嵩叔孫建各簡精兵伺裕西過南侵彭城卻説袍罕虜乞伏熾磐乃隴西鮮卑人也父司繁降苻堅使鎮勇士川卒國仁代鎮苻堅敗乃自稱大單于秦河二州牧苑川王據金城當熾磐聞晉劉裕將兵伐秦聚集本部官屬商議其部下大臣周恭出曰昔姚興在日每起覬覦西秦之心恨未有暇也依愚之見不如順晉同伐姚泓後無慮也若助姚泓而退劉裕是鵲引鳩奪自巢也熾磐依説遣臣齎牛酒前來謁見劉裕呈上請降之書並力共討姚泓裕見其降書大喜賞使臣回拜熾磐為平西將軍河南公令其調兵來應時沈田子傅玄之率兵入武關秦戍將皆委城走田子等又進屯青泥八月太尉裕至閡鄉秦王泓欲自將兵禦裕恐田子等襲其後欲先攻滅田子等然後傾國東出乃率步騎數萬奄至青泥田子本為疑兵所領方千余人聞泓至欲擊之以衆寡不敵止之田子曰兵貴用奇不必在衆今衆寡相懸勢不兩立若彼圍既固則我無所逃矣不如乘其始至營陳未立而先攻之可以有功言訖即進兵秦兵合圍數重田子慰撫士卒曰諸君遠來正求此戰死生富貴在此一戰若其不勝命無返矣於是士卒皆踴躍鼓噪執短兵奮勇擊之秦兵大敗斬萬餘首級秦不能敵奔還
