body:
  text: 第九十三回懷帝被害立湣帝四月懷帝被害凶聞至長安皇太子業與百官舉哀索綝等請太子業加元服而即帝位太子既即大位改號為建興元年以梁芬為司徒麴允索綝為仆射是時長安城中戶不盈百蒿荊成林公私有車四輛百官無章服印綬惟桑版署號而已尋以索綝為衛將軍領太尉軍國之事悉以委之史説索綝字巨秀敦煌人也少有逸群之量其父索靖每曰綝廊廟之才非簡劄之用州郡吏不足汙吾兒也至是果應其言孝湣帝名業字彥旗吳王宴之子武帝之孫也初封秦王及懷帝遇害大臣立以為帝在位四年為漢劉聰將執而弒之壽四十八按諡法在國遭憂曰湣
