body:
  text: 第八十八回慕客廆破木丸部卻説遼東太守龐本以私憾殺東夷校尉李臻附塞鮮卑素喜連木丸津遂陷諸縣屢敗群兵東夷校尉封釋病不能討民皆失業歸慕容廆者甚衆廆少子慕容翰言於廆曰自古有為之君莫不尊天子以從民望得成業者也今連津寇暴不已不若數其罪上則興復遼東下則併合二部忠義彰於本朝私利歸於我國此霸王之基也廆笑曰孺子乃能及此乎遂使翰為前鋒自後接應來討連津二部素喜連木丸津以兵迎敵與翰交戰一陳被翰斬之二部之衆盡降於廆時東夷校尉封釋病中得慕容廆剪除連津二部心中大喜遂使人請廆入城排宴待之謂曰釋屢遭二部寇患未能殄滅今得將軍絶之無恩可酬釋今病篤料不能起倘吾死後吾孫封奕頗諳武藝望將軍收留之言訖命奕拜廆廆亦還半禮廆曰足下善養貴恙不必慮後吾即回兵釋將金寶謝廆廆受之還鎮後釋卒廆聞知乃使人召封突至與談終日不倦應對如流廆悅之曰此乃奇士也稱為小都督釋又有二子封浚封柚聞父卒皆來奔喪廆召見之曰此克家之令子也以道遠不通皆留之以浚為參軍以柚為長史六年正月漢主聰聞太保劉殷二女美色欲納之為貴嬪當太弟劉乂固諫曰劉殷與陛下同姓與先帝有連支之派今此二女與陛下有兄妹之親不可立也聰謂乂曰此女皆姿色絶世淑德冠時且太保於朕實有不同卿何必固諫耶乂曰五百年前共一太祖可亂倫乎當李弘議曰太保胤自有周與聖源實別殿下若以同姓為礙且魏司空王基當世大儒豈不達禮為其子納司空王沈女為妻以其姓同而源異故爾諧耳今何必拘此也劉乂又固諫聰問太宰延年對曰太保自雲劉康公之後與陛下殊源納之何害於是太弟乂無對聰大悅賜金六十斤曰卿當以此意諭吾子弟輩耳於是命李弘以璽册立劉殷二女為左右貴嬪又納劉殷孫女四人為貴人因此六劉之寵冠于後宮聰戀色稀出設朝百官奏事皆中黃門決之忽一日漢主聰謂懷帝曰卿昔為豫章王時朕嘗與王武子造卿卿贈朕柘弓銀研卿頗記否懷帝曰臣安敢忘之但恨爾日不早識聖顔聰曰卿家骨肉何相殘如此帝曰大漢將應天受命故為陛下自相驅除此殆天意非人事也如臣家若能奉武帝之業九族敦睦陛下何由得之聰大喜以小劉貴人妻帝曰此名公之孫也卿善遇之卻説故新野王牙門將胡元聚衆於竟陵郡以杜曾為竟陵太守曾能披甲遊于水中不溺人莫能獲凡出軍交戰勝則追掩敗則入水以此人皆畏服勇冠三軍與胡元寇掠荊土招集亡衆威名益振
