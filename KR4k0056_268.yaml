body:
  text: 第二六五回慕容垂已復燕祚燕王垂遣范陽王德討秦枋頭攻取之東胡人王晏據館陶為鄴中聲援夷夏不從燕者亦尚衆燕王垂遣太原王楷與陳留王紹擊之楷謂紹曰今大業始爾人心未洽惟宜綏之以德不可震之以威乃出屯于辟陽紹率騎數百往説晏曰今燕王大兵至此長樂公尚且奔走料此小城內無軍糧外無救兵安能守之不如早降不失封侯之位於是王晏思半晌開門納降王晏一降於是氐夷降者數十萬口楷留其老弱者置守宰撫之發其丁壯者十余萬與晏守鄴垂悅曰汝兄弟才兼文武足以繼先王之志矣慕容泓為秦北地長史聞燕王垂攻鄴亡奔關東收集鮮卑還屯華陰其衆遂盛自稱雍州牧秦王堅聞知泓叛謂權翼曰不聽卿言使鮮卑至此關東之地吾不復爭將如泓何言訖乃使廣平公苻熙鎮蒲阪征巨鹿公苻睿都督中外諸軍事發兵五萬以竇沖為長史姚萇為司馬前來討泓及垂三將領命即出領兵苻睿謂姚萇等曰今主上令吾等討慕容垂慕容泓慕容沖三人可討何處為先姚萇曰慕容垂兵多將廣連有鄴都之地已稱王號士民歸附難以動搖慕容泓據有華陰甚得衆心民為之用軍為之力亦難動之慕容沖軍馬新集民心未歸不如先討吾料必然破之再以得勝之兵去討華陰亦可得再舉攻鄴鄴孤亦可下矣睿曰卿言有理於是率兵將進抵平陽與慕容沖寨只隔二十餘裏下寨姚萇謂竇沖曰慕容沖欺我遠至勞逸不均今夜必然來劫吾寨其城空虛將軍可以兵五千抄小路去其後待其兵離了然後乘虛殺入必得其城沖從之即率兵抄小徑去平陽城外埋伏了姚萇亦與苻睿各以兵埋伏寨外只待慕容沖來卻説慕容沖聞報事軍人説秦兵在城二十裏外屯扎慕容沖謂左右曰今秦兵遠來必然勞苦正好劫寨左右曰姚萇頗知兵法恐有準備沖曰匹夫仗血氣之勇有何謀策只管依我而行至晚傳令叫軍馬黃昏造飯飽食一更出城二更去劫秦營三軍得令至黃昏俱各飽食全身披挂人馬盡皆銜枚至一更乃開南門而出三更左側慕容沖兵至寨前沖令三軍鼓噪呐喊殺進直入中軍卻是空寨慕容沖急勒馬時忽聽得一聲炮響四邊喊起左邊苻睿殺出右邊姚萇殺出兩下夾攻殺得沖兵損其大半慕容沖捨命殺出重圍走回平陽平陽已被姚萇使竇沖率兵抄小路於城下埋伏一見慕容沖以兵出城離了十裏之程竇沖使軍人各將雲梯三百餘隻架在城上五百余人齊登入城將守門軍人殺了砍開城門外軍直入屯於城中及至天明慕容沖大敗而回至城下見城上皆是秦兵旗號不敢入城自思上天無路入地無門乃忙領百餘騎逃奔華陰來投慕容泓泓曰聞弟在山東聚義如何至此沖曰弟在平陽聚衆至三萬被姚萇殺敗無處安身來投賢兄泓曰汝既來投吾何見卻弟宜盡忠同討強秦倘得天下與你平分言訖以慕容沖為前鋒將軍率兵二萬出屯城外以為犄角之勢待拒秦兵卻説苻睿用姚萇計策破了慕容沖得平陽城安撫百姓分兵去守遂領兵長驅大進殺奔華陰郡來慕容泓正欲起兵向長安忽探事軍人回報苻睿兵將至乃使謀臣高蓋來幫慕容沖以兵拒迎高蓋領兵出城來見慕容沖曰今主公遣某同將軍拒敵將軍可有計否沖曰吾卻無計正欲問君高蓋曰依愚之策前面有窮崖谷可以伏兵將軍可以五千精兵伏其處吾以二萬兵誘敵待苻睿過窮崖谷了將軍兵出而擊之吾勒兵殺回兩下夾攻苻睿可擒矣沖曰此計正合我機於是慕容沖依其計即以五千精兵埋伏於窮崖谷使高蓋率兵二萬出華陰界口誘敵卻説苻睿引兵去華陰界口前兵報有敵兵拒住不得往前苻睿曰慕容泓以誰人為將探事軍人報是平陽殺敗的慕容沖領兵拒迎苻睿曰只管殺去前軍得令殺將過去燕兵見秦兵來不敢交鋒盡皆潰逃穿山度嶺而走苻睿一見傳令三軍盡力去趕姚萇曰前面窮崖谷恐有埋伏不可去追適間拒兵不戰而走宜防暗計睿曰慕容沖無謀之輩有甚高計迫之無妨因此秦兵鼓噪大喊連追十裏之程前軍立住不行睿問之軍報曰後面大隊軍馬攔住隘口言未畢前面高蓋驅兵殺回苻睿使姚萇出陳迎敵前軍忽然一聲炮響後軍喊起報道後面窮崖谷中有伏兵殺出苻睿大驚手足無措忙命竇沖退拒後軍沖即竭力以拒後軍睿方得脫收兵計點折去大兵三千人因是兩下相持時慕容泓謂諸將佐曰前日雖勝一陳秦兵勢大終難久持不如奔回關東諸將曰吾兵若退彼必後追此事若何泓曰選精鋭兵斷後諸將曰如此可行於是泓自率精兵在後使老弱先行苻睿聞泓退乃自率兵出邀擊當姚萇聞知急出諫曰鮮卑皆有思歸之志故起而為亂宜驅令出關不可遏也夫執鼷鼠之尾猶于反噬於人但可鳴鼓隨之彼將奔敗不及矣睿弗從自以兵出使竇沖為前鋒與慕容沖交戰兩馬相交戰未十合竇沖大敗走回本陳苻睿見竇沖大敗親自披挂拍馬走出陳前與慕容沖交戰只一合被慕容沖斬于馬下竇沖見睿死了亦領部下兵殺出重圍而走秦兵潰逃亂奔四散慕容沖揮兵一擊殺死大半姚萇在前鋒聞後軍報苻睿被慕容衝殺了姚萇大驚不敢戀戰與左右從騎千餘盡力殺開血路正遇高蓋二人交鋒戰上五合姚萇撥開軍器拍馬加鞭殺開重圍思量欲奔秦恐秦王苻堅見罪只得引殘兵走奔馬牧西川西川使長史上書報知秦王堅討罪堅大怒將長史斬之從人走回報與姚萇姚萇招集殘兵不敢還秦
