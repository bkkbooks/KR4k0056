body:
  text: 第二一四回常詩辛謐不食卒卻説趙故將張賀度等聞冉閔殺太宰李農乃會兵於昌城將攻鄴魏王閔已知乃自將兵三十萬出擊之二軍相遇戰於蒼亭度兵稀少未及三合大敗而去閔盡俘其衆而歸有戍卒三十余萬旌旗征鼓蔽鳴百餘裏雖石氏之盛無以過也閔既歸國聞隴西晉故散騎常侍辛謐有高名遣使備禮征謐為太常侍使人詣謐固辭弗去因回書於使人遺之雲夫物極則反致治則危君王功已成矣宜因茲大捷歸身晉朝必有由夷之廉以享喬松之壽使人以其書與閔閔觀之竟不從其議而寢之謐聞閔不從其請恐其再逼因不食而卒九月初渤海人賈堅少尚氣節仕趙為殿中督及趙亡堅還鄉里擁部曲數千家以保據鄉邦時燕慕容評由冀州至渤海使人招堅降堅不從率兵抵抗評大怒亦引軍與戰兩下交戰不十合堅大敗被評獲之賈堅被擒只得投降評大喜以堅為樂平太守十一月苻健見杜洪不出乃驅率軍馬殺入長安杜洪自知不能敵乃率衆夜開城門引家屬走出而苻健遂得長安居之健以民心思晉乃遣參軍杜由伯奉表入建康朝帝獻捷又遣使奉書修好于桓溫於是秦雍夷夏皆附之十二月晉穆帝臨軒遣侍中黃門復征蔡謨為司徒謨陳疾篤不至辭愈切三年不就職詔書屢下其第終不受至是帝方八歲自旦至申待之甚倦問左右曰所召人何至今不至臨軒何時當來太后見其固辭不受乃詔罷朝會稽王昱令曹曰蔡公違聖上命無人臣之禮若人主卑屈于上大義不行於下不知所以為政矣於是公卿乃奏穆帝請將謨送廷尉帝未下詔謨已知乃率子弟素服詣闕稽顙自到廷尉待罪殷浩與衆朝臣議欲加謨大辟會荀羡入朝聞其議即詔浩曰蔡公今日事危明日必有桓文之舉矣浩乃止詔請免謨為庶人丁亥七年正月鮮卑段龕以青州來降晉帝與群臣議以龕為鎮北將軍又加封齊公初段蘭死于令支山龕領其衆因石氏之亂乃率衆南徙廣固至是來降卻説苻健集諸將佐議以征進之策左長史賈玄碩等謂健曰天下倒懸豪傑各有霸王之志今將軍功蓋四海地有三秦宜依劉備稱漢中王故事遣人入建康上表表將軍為都督關中諸軍為大單于秦王如何健笑曰吾豈堪為秦王者且晉使未返我之官爵非汝曹所知也於是諸將佐各散健心悔密使梁安諷玄碩等上尊號玄碩不知其意乃從之次日引將佐上尊號為秦天王大單于健遂即王位心中不悅宴會群臣上賀國號大秦
