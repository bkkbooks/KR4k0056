body:
  text: 第七十八回石勒引兵攻襄陽卻説石勒引兵來攻襄陽襄陽守將李德聞知勒起軍馬來取襄陽慌引軍出兩軍對陳李德出馬見勒曰汝何故起兵張賓曰我奉天命來誅賊也李德曰汝乃胡人與人作奴今始得志便來相吞言訖支雄曰環眼賊漢何敢辱我主人言訖亦挺戟驟馬與其交戰兩個酣戰一百餘合未分勝負李德見胡兵四面漸漸圍裹將來恐有疏失急急鳴金收軍入城張賓分兵四面圍定德謂衆曰今胡兵圍城甚急如何是好衆議曰不若棄城走還洛陽此為上策德曰誰可殺開此圍小將陳仁曰某願當先於是德令仁領兵在前自保家眷當夜三更乘月明大開西門正遇支雄殺開血路保著家小走奔洛陽石勒見李德帶家小而走命諸將休趕次日平明引衆入城安民諭訖命逯明守鎮自同諸將領兵來攻江西江西郡守等官聞其兵威勢大不敢迎敵各自潰逃只有軍民舉衆投降是以得據江西張賓勸勒還北勒意欲有雄據江漢之志弗從由是封張賓為參軍都尉領記室專居中總事
