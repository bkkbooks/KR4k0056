body:
  text: 第二回漢王殺其弟李廣漢自李壽於癸卯年卒群臣立其太子李勢為漢王其時勢弟李廣以勢無子求為太弟勢不許當有解思明諫曰陛下兄弟不多若復有所廢將亦孤危固請許之勢疑其與廣有謀收斬之襲廣於涪城廣遂自殺思明被收歎曰國之不亡以我數人在也今其殆矣思明有智謀敢諫諍素得民心及其死士民無不哀之卻説姚弋仲清儉正直不治威儀言無畏避趙王石虎甚重之以為冠軍大將軍丙午二年正月揚州刺史都鄉侯何充卒充有器局臨朝正色能以社稷為己任所選用皆以功效不思親舊及卒朝廷惜之諡曰文穆卻説燕王皓率衆二萬襲扶余扶余國王玄以兵扼之被皓用伏軍計邀戰虜其王玄以歸滅其國為郡三月後父褚裒表薦顧和殷浩於朝廷朝廷詔以和為尚書令以浩為揚州刺史和有母喪固辭不起親屬勸之起和謂所親曰古人有釋縗絰從王事以其才足翰時故也如和者正足以虧孝道傷風俗耳浩亦固辭會稽王昱遣人以書與浩曰昱當厄運危弊理盡足下沈識淹長足以經濟若復深存挹退苟遂本懷恐天下之事於此去矣足下去就則時之興廢也家國不異宜深思之浩得是書乃就職領揚州刺史史説前涼張軌安定烏氏人也漢趙王張耳十七世孫晉惠帝永寧元年為涼州刺史因據之安帝拜為涼州牧西平公後軌生實實生茂茂生駿駿是年四月卒僚佐立其子重華為涼州牧西平公復自稱涼王
