body:
  text: 第三二六回何無忌握節身死何無忌聞盧循欲下建康自以兵離潯陽來拒循長史鄧潛之諫曰循兵艦盛勢居上流宜決南塘守二城以待之彼必不敢舍我遠下蓄力養鋭俟其疲老然後擊之此萬全之策也今決成敗于一戰萬一失利後悔莫及參軍殷闡曰循所將皆三吳舊賊百戰餘勇始興溪子拳捷善鬥宜留屯豫章徵兵屬城兵至合戰未為晚也無忌不聽率兵上船與徐道覆遇戰于豫章郡道覆計令強弓手五百棄船登山邀射之自率大艦乘風急以撞之無忌船小況又風逆不能抵擋衆皆奔潰無忌厲聲曰取我蘇武節來節至執以督戰兵已散了賊衆雲集寡不敵衆握節而死道覆兵威復振中外震駭後朝廷聞知諡無忌忠肅一月西涼傉檀自將兵五萬來伐蒙遜蒙遜大驚設伏兵於山源自以弱卒一萬邀戰詐敗引至山源伏兵四出僻檀大敗逃去蒙遜乘勝追至姑臧夷夏萬餘戶出降蒙遜納之傉檀大懼遣人出城納質請和蒙遜受之乃徙其衆八千餘戶而去傉檀恐其再至遷于樂都姑臧人自推焦朗為主降于蒙遜不用傉檀之命是時劉裕伐燕還師還鎮下邳卻説晉帝設朝群臣奏盧循侵占南康三郡目今兵馬將到京城帝乃大驚遂問文武大臣大臣奏曰欲破此賊火速頒詔星夜征豫章郡公還京方保無事不然為賊所危帝曰然於是即命使齎詔征裕還拒盧循使人領旨星夜至下邳見裕呈上詔書劉裕讀訖始知盧循入寇何無忌戰死號啕大哭即傳令班師而還
