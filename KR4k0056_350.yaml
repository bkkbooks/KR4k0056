body:
  text: 第三四七回赫連勃勃取關中戊午十四年正月赫連璝引兵至時關中士民降之者滿路桂陽公義真聞夏王引大兵來攻長安急使司馬王鎮惡參軍沈田子傅玄之三人各以兵五千去迎三人得令點兵出城安營卻説沈田子欲據北地以拒夏兵當沈田子請傅玄之至曰今王鎮惡自驕傲輕慢我等吾欲殺之君有何計可行玄之曰吾來日使人請王鎮惡到我營中只説議計去退夏兵彼必至彼若至以酒灌醉令公宗人沈敬仁領三百冬刀斧手搶入殺之卻不好也田子曰此計甚善乃喚沈敬仁至吩咐計策了當傅玄之回營次日令人來請王鎮惡鎮惡不知是計隨使就來玄之營玄之接入勸鎮惡飲酒鎮惡大醉被沈敬仁引三百刀斧手搶入殺之于席前俄而田子至令人取首級號令三軍曰鎮惡謀反奉太尉命斬之其部下之三軍勿得驚慌令訖遂收其部下之兵分作二營而屯只有部將劉弘之知是傅玄之沈田子妒謀故殺王鎮惡乃私奔來告桂陽公劉義真義真大驚與王修之披甲引兵與諸將登衡門以察其變之由傅玄之知劉義真來急出迎接入內卻説王鎮惡有二心我等與沈田子故殺之號令三軍再無他異主公勿憂也王修之曰鎮惡若反不該你斬要稟主公你何敢無禮擅專殺我大將言訖以刀將沈田子殺之先時劉義真賜左右之錢物皆被王修之裁減因此左右懷恨王修之譖於義真曰王鎮惡謀反故沈田子殺之今王修之又殺田子是欲造反也義真信之喝令左右將修之誅之王修之既死關中人心皆離散次日義真聞知驚呆了半晌曰王鎮惡二心反形已露方才殺了你等火速去退夏兵玄之乃下拜曰臣等就行言訖勒兵前來恰遇了前部赫連璝至晉兵陳中有偏將軍傅玄之出馬迎戰兩馬相交兵器並舉二人戰上十合赫連璝力乏勒馬便走夏兵見赫連璝逃走亦各潰亂被玄之等麾兵趕殺殺得夏兵十損其七追下一百余裏方還屯住其時赫連璝大敗退回半路來見夏王説兵敗之由夏王心憂喝退赫連璝自以大兵來取咸陽路上撞著晉兵來迎夏王視之旗上寫得分明是將軍賀玉其時賀玉勒馬橫槍立在陳前夏王道賀玉必是上將誰人出馬迎敵説猶未了大刀王賈德手持青龍寶刀縱馬出陳與賀玉兩馬相交正如兩龍爭濟二虎爭吞一來一往鳳翻身一上一下鵬轉翅刀鬥刀起萬丈寒光馬鬥馬蕩一團殺氣二人鬥有三十余合賀玉氣力不加撥回馬望本陳便走王賈德拍馬便趕賀玉兵轉出城走入長安夏王調兵追趕約追五十余裏夏王方下令鳴金收軍進據咸陽聚集文武商議攻打長安之策其時王賈德進曰長安未可急攻若攻之彼必死戰難以下也今咸陽為我所有不如分兵守住諸險絶其樵采之路斷其通糧之道不及半年長安食盡薪窮晉兵必亂逃歸那時攻之長安可得晉兵自走也夏王曰卿言至善於是夏王不攻長安分兵守定各處險隘果然晉兵食盡薪無義真心慌急使人偷回鄴都報知劉裕
