body:
  text: 第三三六回長民用計破劉裕癸醜九年晉帝遣使至進裕為太傅揚州牧裕大喜受詔賞使先回卻説諸葛長民貪淫橫暴無所不為聞劉毅伏誅長民乃集所親謂曰昔年醢彭越今年殺韓信禍其至矣衆問其故長民曰今劉裕只可同患難不可共太平昔時劉毅與吾戮力興復晉室征伐天下出萬死得一生今日大定而誅毅也劉毅既誅我必不生吾今日故召汝諸親共議有何計可以殺劉裕也諸親曰吾等無權難舉此事弟黎民曰若殺此賊要結朝內有權者十人方可下手長民曰其計甚善汝等且退於是衆人各散去次日謁問穆之曰人言太尉與我不平何以至此穆之曰劉公今既遠征以老母稚子委節下若有一毫不盡豈容如此長民意乃少安而回弟黎民説長民因裕未還圖之長民猶豫未發既而歎曰貧賤常思富貴富貴必履危機今日欲為丹徒布衣豈可得耶因遣人遺冀州刺史劉敬宣書敬宣讀曰盤龍專擅自取滅夷異端將盡世路方夷富貴之事相與共之劉敬宣即使人報曰下官常懼福過災生方思避盈居損富貴之事非所敢當使回書去了以書呈裕裕曰阿壽故為不負我也穆之慮長民為變問參軍何承天承天日劉公昔年自左裏還入石頭甚晚爾今還宜加慎重穆之曰非君不聞此語至是使人以書見裕裕見長民與敬宣之書及又得穆之書乃大驚自江陵東還卻説長民自此每日涕淚交流寢食皆廢行坐不安恐遭裕誅心中憂悶忽一日入書舍思殺劉裕之計猛然思曰可與書結連西秦姚興令他引兵外進吾於內應可殺此賊也思訖取紙寫下其書放於幾上不覺困倦伏幾而臥未及半晌忽有待中郎王用相至用相素與長民極厚徑入書舍見長民睡著袖底下壓著書微霹字用相輕輕取視之藏於袖中遂大叫好睡得著長民驚醒不見其書魂不附體用相曰汝尋何物長民答無之用相曰汝欲謀叛劉公吾當出首長民泣拜曰君若如此吾室宗族並皆休矣用相曰吾亦恨此賊久矣安敢負兄吾欲助兄一臂之力共殺此賊長民曰兄有此心吾之大幸用相曰可結連十人同立義狀各舍三族以殺此賊長民於是先取白絹一幅書名畫字即書之用相曰將軍吳蘭與我結義為知心交吾必令同力滅賊長民曰滿朝中大臣惟有長水校尉程輯議郎黃顧是吾心腹之人必能順我正商議間家僮入報程輯黃顧相探長民曰此天助也令用相且在屏風後權避長民出接入書舍坐定茶畢輯曰誅劉毅君懷恨乎長民曰雖有怨恨無可奈何黃顧曰若有人助吾誓殺此賊程輯曰與國家除害死亦無怨王用相從屏風後出曰汝肯死諸葛公便是見人輯怒曰忠臣不怕死怕死不忠臣吾等就死不似此賊之親黨也長民曰吾等正為此事欲見二公今天所賜當必酬願遂出義狀令觀之二公下淚即請書名用相曰只此少待吾請吳蘭用相去不多時二人並至用相説知共誅劉裕之事蘭欣然書名長民於後堂排宴款待四人四人各歃血為盟計議待劉裕回京埋伏精兵一千于新亭穀內待裕至以酒饌到亭內接程待酒醉喚兵衝殺之計排已定衆人各散卻説長民心中暗喜忽然步入後堂見家奴秦慶與侍妾在暗處私語長民大怒喚左右拿下欲斬之夫人勸免其死罪各決脊杖四十將慶童鎖于冷房慶童怨恨長民夤夜扭開鐵索逾垣而走徑入江陵府中告知有機密事來報裕急喚入間之慶童曰諸葛長民謀反結連王用相等十人立義狀待公回京埋伏敢死士千人於新亭殺公某勸他反被痛打裕聞説賞慶童酒食即聚諸將謂王鎮惡曰諸葛長民謀反今他家僮來此報我吾先使人齎文書回京説知我有急事回朝彼必來迎你領諸將從陸路面進至新亭見諸葛長民及文武公卿只説我在後來延哄他在那裏我今日討舟密從故道先還入東府執住兵符與驍將丁旿引五百人密馳歸城把反臣捉住王鎮惡得計引衆而行使人先持書去訖裕乃與驍將丁旿討船引五百壯士從水道連夜馳行來至京城離城十裏水程安住令人先去探聽長民等公卿出迎不曾使人去訖
