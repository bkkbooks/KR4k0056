body:
  text: 第二八八回燕王寶走奔龍城至四月魏軍糧盡魏王圭心甚憂之而問崔逞曰目今軍糧不繼卿有何計可辦逞進言曰飛梟食椹而改音詩稱其事今此處甚多陛下何不使六軍取之以充軍食可支數月耳魏王圭曰然於是傳詔六軍速去收椹而食之兵既收食忽諸部大人長孫嵩等進言于魏王曰椹乃禽獸之食人若久食必殂陛下可禁六軍勿食魏王圭疑崔逞侮慢而不食則有飢色欲縱軍食之恐久見殂心猶豫間崔逞又曰陛下可使六軍及時收椹過時則落盡無矣魏王圭怒曰內賊未平兵衆安可棄甲而收椹乎遂弗聽使人詔東平公儀領軍還巨鹿卻説慕容詳被困於中山城中糧盡遂問于衆文武文武曰臣聞魏人軍糧亦盡不久必去去則可令附近人運之時燕王寶走出中山清河王會率騎兵三萬迎于荊南寶怪會有恨色遂將其兵分給遼西王農及高陽王隆盡徙薊中府庫北趨龍城石河圭引兵一萬追之及寶于夏莫澤會整陳與戰農隆等將南來一千餘騎沖之魏兵大敗農追下百餘裏隆謂陽理璆曰中山積兵數萬不得以展吾志今日之捷令人遺恨因慷慨流涕會既敗魏兵含恨滋甚隆屢訓責會益忿怒遂謀為作亂寶聞之密渭農隆口觀道通志趣必反無疑宜早除之農隆曰會遠赴國難逆狀未彰而遽殺之豈獨傷父子之恩亦甚大損威望會聞之益懼夜遣人數百襲殺隆于帳下慕容農被重創不能起寶欲討會乃佯為好言以安之計以明日召群臣食宴而殺會會果至就坐寶目慕輿滕滕即起拔刀刺會傷首不死走赴其軍勒兵攻寶寶率數百騎馳走龍城會引兵追至城下城中將士皆憤怒寶令出戰大破之待禦郎高雲復夜率兵擊之會衆潰奔中山入見慕容詳詳問其故令人殺之於是寶以雲為將軍養以為子雲高句麗之支屬也雲遂盡心事寶時涼王呂光以西秦王乾歸數反覆令呂延呂纂舉兵伐之西秦群臣大懼請東走成紀乾歸曰軍之勝敗在於巧拙不在衆寡光兵衆而無法弟延勇而無謀不足憚也且其精兵盡在延所延死光自走矣光軍長驅遣弟太原公呂纂攻金城天水公呂延攻臨洮武始河關皆克之乾歸計使百姓哄延兵曰乾歸聞將軍兵至其衆潰走去奔成紀矣延信欲輕騎追之司馬耿稚諫曰乾歸勇略過人安肯望風自潰且告者視高色動殆必有姦宜整軍而前使步騎相屬俟諸軍畢進然後攻之無不克矣延曰此事是實君休疑心言訖引兵百追之與乾歸遇延與歸對陳兩下交鋒不上數合延被歸斬于馬下其衆敗走呂光聞延已死遂大驚引兵走還姑臧去了不出
