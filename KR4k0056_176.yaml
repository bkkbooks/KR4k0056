body:
  text: 第一七三回趙誅祖約夷其族卻説祖約被趙胤攻陷曆陽無處安身乃奔襄國降于趙王勒勒容納之時仆射程遐言於勒曰天下初定當顯明順逆故漢高祖赦季布斬丁公以正法律今祖約猶存臣竊惑之姚弋仲上書亦以為然勒始命誅族初祖逖有胡奴曰王安甚愛之在雍丘逖謂安曰石勒是汝種類汝宜奔之必有榮顯於是厚資遣之王安出奔仕後趙為左衛將軍至是誅約安歎曰豈可使祖士雅無後乎乃往觀刑竊取逖庶子道重匿之養大成人後及石氏亡復歸江南五月朝廷詔太尉陶侃兼督江州侃遂移鎮武昌六月張駿因前趙之亡以復收江南地土於狹道立五屯護軍與趙分境趙王勒遣使拜駿為涼州牧駿不受命趙王勒大怒遣徐光以兵攻破休屠王羌駿始懼乃使人稱臣入貢九月趙群臣又勸勒始稱皇帝尊號大宴群臣宴畢郭敬率兵五萬去寇襄陽南中郎將周撫率衆拒之敬退兵乃屯于樊城計令掩藏旗幟寂若無人見偵者告之曰汝宜自愛堅守後七八日大騎將至相策不復得走矣又使人浴馬於津周而復始日夜不絶偵者還告撫以為趙兵大至撫懼奔許昌郭敬遂得毀襄陽遷其民於沔北城樊城以戍之朝廷聞之撫坐免官辛卯六年三月趙王勒令公卿以下歲舉賢良方正令舉人更得相薦因以廣求賢之路起明堂雍辟靈台于襄國城西九月趙王石勒如鄴將營新宮廷尉續鹹苦諫不可勒大怒敕禦史馮翥執鹹去斬中書令徐光曰鹹言不可用亦當容之奈何一旦以直言斬列卿乎勒回怒作喜而歎曰為人君不得自專如是豈不識此言之忠乎向戲之耳匹夫家資滿百彼尚欲市別宅況富有天下萬乘之君乎此宮終當營之且敕停作以成吾直臣之氣也因賜鹹絹百匹至是復營鄴宮以洛陽為南都置行台勒聞參軍樊坦清貧有才乃擢授章武吏坦入辭勒見坦衣冠敝壞大驚曰樊參軍何貧之甚耶坦性誠朴粹然誤對曰頃被羯賊資財蕩盡勒知其敦篤不怪之也乃笑曰羯賊乃爾暴掠耶今當相償耳坦知失語大懼叩頭泣謝勒曰孤當自防俗士不關卿輩老書生也反賜車馬衣服錢三百萬以勵貧俗冬成帝蒸祭於太廟詔歸胙于司徒王導且命不拜導辭疾不敢當初帝即位沖幼每見導必拜與導手詔則雲惶恐言中書作詔則曰敬問有司議元會曰帝應敬導不博士郭熙認為禮無拜臣之文侍中馮懷認為天子臨雍拜三老況先帝師傅謂宜盡敬侍中荀奕曰三朝二首宜明君臣之禮他日小會自可盡禮詔從之卻説慕容廆集僚屬會議具表進廆官爵參軍韓恆駁曰立功者患信義不著不患名位不高宜繕甲兵除凶逆功成之後九錫自至比於要君以求寵不亦榮乎廆不聽於是遣使與陶侃書勸以興兵北伐共靖中原而東夷校尉封加等疏上陶侃府請封廆為燕王侃復回書曰夫功成進爵古之成規也車騎雖未能為國摧勒然忠義竭誠今謄箋上聽可否遲延定在天臺也
