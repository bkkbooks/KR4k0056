body:
  text: 第二九一回慕容德稱王滑台戊戌二年正月趙王慕容麟被魏軍殺敗來至鄴城見叔范陽王慕容德德問曰聞你在義台與魏兵交鋒如何來此麟曰魏兵勢大因此大敗見吾叔父商議復仇德曰吾此處兵少亦不敢妄動正議之間細作回報魏王圭親率大軍將至鄴境德大驚慕容麟曰鄴城不固不如徙據滑台堅守之待其師老糧盡然後擊之可復業也德乃從之即時領兵擁至黎陽拘集船隻三軍皆上船欲南渡滑台忽遇風暴其船盡沒慕容德傳令三軍依前上岸因此無船過江正在猶豫之間忽有探馬來報魏兵將至只隔五十裏到此慕容德與慕容麟二人心中憂悶不悅天色已晚只得權屯岸邊正欲以待來早討集船隻渡江是夜月白風清江中流澌凍合慕容德與慕容麟睡不安席起來向江邊一看但見江水盡皆凍合成冰德等大喜拜謝天地急忙傳令三軍一齊踏冰渡江德軍過了卻好天明魏兵及至而其冰已消因此德軍逃得此難魏兵聞説皆曰此天神助之也慕容德遂改黎陽名為天橋津引衆奔入滑台屯扎軍馬提調守城魏王圭見慕容德走入滑台乃來引衆至鄴城卻説范陽王慕容德既至滑台景星見於箕尾白玉出於漳水狀若國璽百姓拾得將來呈上與慕容德因是趙王慕容麟上言曰今慕容寶雖襲大位志不及于先人而有將廢之征自叔父徙居滑台以來天垂景象地呈寶玉流澌凍合祥瑞屢見此乃叔父之大德是有吉兆以先應叔父宜應先燕王故事自繼大位可保燕祚可復慕容德曰若為此事是篡逆也麟曰今慕容寶初立士民不歸郡邑已失為魏所有叔父若不自立待社稷傾覆再復甚難於是慕容德自立為南燕王遂改元燕平元年
