body:
  text: 第四十五回羅尚以兵討李特二年春二月成都李特以兵潛渡江擊羅尚水上之軍皆散走蜀中太守以小城降李特入據之惟取馬以供軍食無侵掠百姓赦境內自號建初元年蜀人見兩下交兵恐兵入擾亂鄉村鹹相聚為塢以保二境因見李特殺馬為食及赦境不幹于民諸塢皆送牛酒款待李特特恐糧食不敷分流民于諸塢就食李流大驚急入謂特曰諸塢新附宜委其大姓子弟聚兵自守以備不虞何故散兵就食於塢耶特怒曰大事已定但當安民何為更加疑忌使之離叛乎時朝廷已知李特占去州郡遣荊州刺史宗岱等率水軍三萬來救羅尚軍勢稍盛況諸塢聞尚軍益振皆有二志參軍任睿獻計于尚曰李特散衆就食諸塢驕怠無備此天亡之時也宜遣人密約諸塢刻期同發內外擊之破之必矣尚從之使人説諸塢諸塢大姓皆願應之羅尚至二月始發兵三萬來攻特營李特急召諸塢諸塢起兵反應羅尚共擊李特特兵大敗五十裏羅尚自引五千人馬出益州來迎敵軍李特先自怯戰又值初春陰雲布合雪花亂飛軍馬皆冒風雪羅尚驟馬提刀出陳與李特打話特曰汝何人到此如何不降尚大怒縱馬向前李特挺槍采迎兩騎相交尚撥回馬斜刺便走李特趕來轉過山坡尚回馬大喝一聲舞刀直取李特特早攔截不住卻撥回馬走尚右手倒提寶刀左手將套索把李特拖下鞍橇馬上擒回本陳兩軍呐喊李特軍便走尚軍趕上奪得百十匹馬其餘走脫尚叫休趕綁縛特回益州押在廳下尚大怒罵曰吾待汝不薄命汝權督流民汝何謀叛今日被執有何言説特無言對尚怒命左右牽出斬之傳首洛陽李流李蕩李雄收集餘衆還保赤祖李流自稱為益州牧守東營李蕩李雄守北營羅尚使督護何沖以兵二萬來攻南北二營李流驅流民出戰交馬只三合李流之衆大敗而走何沖乘勝以軍進抵成都流入閉城自守查點部下李蕩中矛而死雄等皆哭傷情要與兄蕩報仇時流雖是堅守甚懼宗岱軍至難以拒迎心下欲主降尚因與李雄等商議李雄等疊諫休降流勿聽李雄乃誘流民曰今李益州欲降若降汝等何得全生辛冉恨汝必被坑之不若火速從我盡力一戰殺退羅尚等兵可安性命流民踴躍答曰生死願從將軍之命於是李雄即大呼流民各執兵出城與何沖交鋒大戰十餘合遂殺退何沖諸軍連追一百余裏方還聞宗岱起兵至半路而卒其衆無主退還李流甚慚因謂李雄曰吾前日議降今得汝殺退敵軍甚是壯健凡日後事可與子謀由是李流奇雄之才凡軍事悉以任之流又説使李雄取鄆城汶山太守以軍拒迎被雄殺之李流徙軍屯鄆城蜀民皆保險結塢以防之時南入寧州東下荊州先被李特劫掠城邑皆空野無煙火李流之衆皆飢餓無食惟涪陵千餘家依青城山處士范長生據之流不敢攻平西參軍徐舉獻計羅尚曰某雖不才望使君委以守汶山邀結范長生共討李流不日可平羅不許舉大怒去降李流流使舉去説長生以糧應接其軍長生從之因此李流之兵復振
