body:
  text: 第一八三回燕王稱藩于趙國卻説慕容皓威名日盛當鎮軍長史封奕等説曰今雄傑並起天下紛爭大王以千里之卿當五湖之徑撫劍顧盼亦足以為人豪而反受制於人不自稱尊號乎皓從之乃涓吉集僚佐于殿堂乃自稱為燕王封奕為相國乃謂群臣曰吾欲伐段氏汝等有何高見封奕出曰段氏數侵趙邊虎必惡之大王若能稱藩于趙趙必納之然後使人率師討遼趙必從吾可破必矣皓然之乃修書使人稱藩于趙王虎大悅厚加慰答期以明年大舉卻説代王翳槐因紇那入侵乃逃遣人降趙趙王納其降以兵助之紇那聞之奔趙復占朔方因此翳槐復立於代卻説楊難敵初殺毅自稱仇池公降于趙趙王納之四年春卻説趙王石虎欲攻段遼使姚豹等將舟師十萬出于水津與惟等將兵七萬為前鋒燕王皓聞知趙王動兵亦引兵五月攻掠令支城之北段遼集諸將商議以兵追之當慕容翰曰今趙兵在南宜並力禦之而更共燕國萬一失利何以禦南敵乎段遼怒曰吾前為卿所説以成今日之患今不復墮卿計中矣言訖乃率衆追之被皓設伏邀擊大破之掠五千戶而歸段遼始悔不聽慕容翰之言趙王虎兵進屯金台與皓軍長驅入薊遼所署漁洋上穀代郡守將皆降因是虎取四十餘城時北平相楊裕率數千家登燕山以自固諸將恐其為後患欲攻之虎曰裕儒生矜惜名節恥於言降無能為也可速進兵且勿攻之諸將遂引兵直過燕山段遼亦不敢復戰棄令支奔密雲山慕容翰乘亂再走投降宇文部去了於是虎得令支宮徙其民二萬戶于司雍襄豫四州其士大夫之有才行者虎皆擢敘之虎分定署守振旅還都其署城皆被皓取而戍之
