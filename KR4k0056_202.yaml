body:
  text: 第一九九回燕罷苑囿給新民卻説燕王皓以牛假貧民使佃苑中稅其十之八自有牛者稅其七記室參軍封裕諫曰古者什一而稅天下之中正也降及魏晉仁政衰薄猶不過取其七八也今殿下拓地二千里增民十萬戶其無田者十有三四是宜悉罷園囿以賦新民無牛者官給其牛不當更改重稅也今官司猥多皆宜澄汰工商末利宜立常員學生三年無成當令為農參軍王憲大夫劉明近以言忤旨免官禁錮長史宋該阿媚苟容輕訴良士不忠之甚也此數事皆關國家之利害若明正法律管取身安國家可保也皓默然乃即下令悉從其言仍賜裕錢五萬宣示忠良欲陳過失者勿有所諱卻説皇太后褚氏稱制以會稽王司馬昱為撫軍大將軍録尚書六條事又詔征後父褚裒輔政裒欲卸政歸鎮眼前無可托者當尚書劉遐説之曰會稽王昱令德雅望足下宜以大政授之裒固辭之與司馬昱而自歸藩昱乃清虛寡欲尤善玄言與劉惔王溕韓伯為談客郗超謝萬為掾屬郗超乃郗鑒之孫也少時卓犖不羈隨父默簡沖退而嗇于財積錢至數千萬嘗開庫任超所取超施散親戚一旦都盡謝萬乃安之弟也清曠秀邁亦有時名十月江州都督庾翼病篤遣人上表以桓溫為荊州刺史委之以重任及是翼卒朝廷已知時朝議以諸庾世在西藩人情所安欲從其請以溫代之何充出曰荊楚國之西門戶口百萬北帶強胡西鄰徑蜀得人則中原可定失人則社稷可憂陸抗所謂存則吳存亡則吳亡者也豈可以白麵少年當之哉會稽王昱曰桓溫英略過人有文武器幹西夏之任無出其右者當丹陽尹劉恢亦奇溫才然知其有不臣之心謂會稽王昱曰溫不可使居形勝之地其位號常宜抑之明公宜自居上流以惔為軍司可保社稷無後日之憂昱弗聽使人以溫代翼又以惔監督中軍以代庾方之
