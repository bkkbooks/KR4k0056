body:
  text: 第六十八回琅邪王收用賢俊十月懷帝降詔以琅邪王司馬睿為安東將軍都督揚州諸軍事令其鎮建業睿受詔鎮建業以安東司馬王導為謀主令其招納俊傑延攬英雄委以腹心政事謀之睿名譽素輕吳人不附居久之士大夫莫有至者甚患之其時乃三月上巳皆當祭祀鬼神王睿自出觀楔導見之曰今殿下欲招賢納土皆不肯至臣有一策殿下自坐乘輿多具威儀部從與導駿騎並從而行則吳士觀之道殿下愛士則吳中豪傑皆來恐後矣睿從之出祭回來果有高士顧榮等見之驚異謂衆説禮賢如是相率拜于道左迎之扶而送之導急下馬因謂睿曰古之王者莫不賓禮故老存問風俗虛己傾心以招俊傑況夫下喪亂九州分裂大業之興急於得人知此數人皆吳之所望者宜引之以結人心二子若至則士無不來至睿大悅歸府乃使人造請顧榮賀循二人二人皆應命而至睿拜賀循為吳國內史顧榮為軍師兼散騎常侍凡軍府政事皆與謀之紀瞻為三軍祭酒卞壺為從事導又説琅邪王曰謙可以接士儉可以富國宜以清靜為政撫綏新舊則天下歸心焉睿納之故江東百姓歸心附之睿頗好酒廢事導以為言睿遂命酒瓶覆之於是絶不飲酒史説琅邪王司馬睿字景文宣帝之曾孫琅邪恭王司馬覲之子也生於洛陽有神光之異一室盡明及長白毫生於目角之上隆準龍顔目有精耀顧盼煒如也年十歲為琅邪王有令譽侍中稽紹曰琅邪王毛骨非常殆非人臣之相也後果應稽紹之言五月先公師藩既死其黨汲桑逃還苑中聚衆聲言為成都王報仇以石勒為前驅先鋒所向輒克遂進攻鄴城時鄴中空竭而新蔡王騰資用甚饒性吝嗇無所賑惠臨急乃賜將士米各數升帛各丈尺於是人不為用因是桑遂攻入鄴殺騰燒宮大掠而去南擊兗州越聞騰被殺乃遣將軍苟晞以軍三萬去討大軍行數日到兗州與桑交戰五十餘合勝負未分自此相持數月大小二十余戰互有勝負亦各安營相持
