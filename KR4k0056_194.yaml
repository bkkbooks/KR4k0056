body:
  text: 第一九一回趙王發兵伐燕國卻説趙王虎恨燕與段遼在密雲山擊敗其將麻秋乃合兵五十萬巨船一萬艘自河通海運糧一千一百萬斛于樂安徙遼西北平漁陽萬余戶於兗豫雍洛城自幽州以東至西狼山大興屯田括取民馬如敢匿者腰斬凡得四萬匹率衆大閲于宛陽欲擊燕燕王皓聞知大驚集僚佐商議拒虎之計而謂其子慕容恪曰石虎自以樂安城防守重護薊城南北必不設備汝宜率衆由詭道出其不意去燒其積聚屠其城池可盡破也不然兵至恪然之即密統兵一萬人自騃騃寨直抵薊城遂破武津人高陽所至皆焚燒積聚掠三萬餘家而去石虎聞知大驚恐失巢穴果勒兵退還伐燕之謀始停虎既回國命其次子石韜為太尉與太子石宣疊日省可尚書奏事不復啓旨司徒申鍾諫曰慶賞刑威後皇攸執名器實重不可以與人庶可以防姦杜漸以示軌儀太子職在視膳不當預政庶人邃覆車未遠也且二政分權鮮不階禍愛之不以道適所以害之也虎不聽中謁者令申扁有寵于虎宣亦昵之使與機密虎既不省事不復啓旨而宣韜皆好酣飲畋獵由是除拜生殺之權皆決於扁自九卿以下望塵而拜卻説漢王壽致書于後趙王虎署曰趙王石君虎不悅中書監王波曰壽既僭大號今以制詔與之彼必酬返不若便為書與之今挹婁國獻楉矢石砮于陛下可不以之遺漢使其知我能服遠方也虎然之遣漢亡將李閎以書物持歸報閡至成都壽下詔曰羯使使廷貢其砮矢賞其來使使人歸告石虎虎聞之大怒黜波以白衣領職
