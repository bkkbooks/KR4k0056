body:
  text: 第五十八回河間王專執朝權十二月河間王顒自專朝政奏帝以詔廢太弟司馬穎更立豫章王熾為皇太弟帝準奏詔貶皇太弟穎還第更立豫章王司馬熾為皇太弟初惠帝兄弟二十五人時存者唯穎熾及吳王晏晏才庸下而熾沖素好學故顒立之詔穎還第帝乃以顒自都督中外諸軍事以東海王司馬越為太傅與顒夾輔帝室王戎參録朝政王衍為左仆射張方為參軍録尚書事又下令州郡蠲除苛政愛民務本請通之後當還東京顒以四方乖離禍亂不已敵下詔和解之冀獲少安而越上表辭太傅不受卻説漢王劉淵遣劉曜寇太原郡取泫氏縣又遣喬唏寇西河取介休二將領命俱各以兵一萬前去取二邑時喬晞以兵攻破介休執介休令賈渾晞招其降渾不從晞命斬之出見渾生之妾生得美貌逼納為室其妻宗氏罵晞而哭晞又殺之漢王劉淵大怒曰彼乃忠臣如何誅之使天道有知喬晞望其種乎遣人迫還晞降秩四等命收渾等尸葬之
