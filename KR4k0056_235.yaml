body:
  text: 第二三二回司馬勳叛攻成都二月益州刺史周撫卒晉哀帝詔以其子周楚代之而撫在益州三十餘年甚有威惠民鹹德之七月立會稽王司馬昱為琅玡王昱固讓不受十一月梁州刺史司馬勳以衆一萬人作叛來圍成都時大司馬桓溫聞知遣江夏相朱序以五千人救之序遵命以兵即行至成都五十裏屯序次日遣人入城去會周楚擊勳楚得書即忙會集將佐整頓軍容大開城門殺出城來朱序以兵抄勳後攻之兩下夾擊勳兵大敗被楚擒而斬之成都遂平初勳為政暴酷治中別駕言語忤意勳即於座斬之常有據蜀之志憚周撫不敢發及聞撫卒遂舉兵自號為成都王引兵入劍閣圍成都至是被溫以朱序與周楚合兵誅之丁卯太和二年四月太原王慕容恪因攻洛陽回來得疾甚重燕王暐聞知親與群臣視恪問以後事燕王暐入見恪曰叔父出征遠勞今得此疾困重倘設不周使孤倚托何人恪曰慕容垂文武兼才管蕭之亞陛下信任之以大政國家可安不然秦晉必有覬覦之計暐聞言曰願從尊訓言訖回宮太宰恪以燕王幼弱政不在己今太傅評又猜忌乃使人召暐兄樂安王臧至謂曰今南有晉室西有強秦常蓄進取之大志司馬總統大軍不可任非其人我死之後以其疏言之當在汝及沖汝曹雖才識明敏然年少未堪多難吳王天資英傑智略蓋世汝曹若以推任之必能混一四海況外寇乎言訖而卒燕王暐聞知慟哭終日命厚葬之國人皆為發悲於是以慕容沖為大司馬總統六軍
