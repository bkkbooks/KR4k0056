body:
  text: 第一九五回慕容皓擊高句麗時高句麗犯境慕容翰言于燕王皓曰宇文屢為國患今逸豆歸篡竊得國群情不附加之庸暗將用非才國無防衛軍無部伍臣久在其國悉其地形今若擊之百舉百克然高句麗去國密邇必乘虛掩吾不備此心腹之大患也宜先平之還取宇文如反手耳二國既平利盡東海國富兵強無內顧之憂然後中原可圖也皓大喜曰卿謀至善然高句麗有二道北道平闊南道險狹從何可往衆將曰宜從北道翰曰不可虜皆重北而輕南宜率鋭兵從南道擊之出其不意丸都不足定也別遣偏將出北道縱有蹉跌其腹心者已潰四肢無能為也皓從之自將精兵四萬出南道以翰及慕容霸為前鋒別遣長史王寓等將兵一萬五千出北道以伐高句麗其主王釗聞知燕兵犯境果遣弟武率精兵五萬以拒北道自引羸兵五萬而備南道時慕容翰已先至與釗合戰不分勝負燕王皓大兵繼至高句麗兵不敢交鋒望風而潰因此大敗翰霸諸將乘勝兵不血刃直入丸都高句麗王釗單騎走遁山谷燕王皓入丸都城獲其主王釗母妻使人去探北道之兵回報王萬與王武戰於北道都皆敗沒武令勒兵還救丸都皓大驚命諸將休追王釗使人去招其降釗不從皓欲窮追獲釗韓壽曰高句麗之地不可戍守今其主亡民散潛伏于山谷大軍既去必復鳩集收其餘燼必復為患不若發其父墓取其尸及生母妻子而歸俟其束手來降然後返之撫以恩信策之上也皓遂從之使人發釗父墓而取其尸及母妻子載歸又虜男女五萬餘口毀丸都城振旅而還國矣十二月晉康帝立皇后褚氏就遣使征後父豫章太守褚褒為侍中褒以後父不願居任事康帝除江州刺史命鎮半州褒始就鎮卻説趙王虎無道苦虐晉民作台觀四十余所於鄴又營長安洛陽二宮工作者四十萬余人又救境內治南伐西討東征之計皆三五發卒造舟用五十萬余人船夫十七萬人公侯牧宰竟營私利因是百姓失業貝丘人李弘集衆怨欲謀作亂事發被虎誅之連坐者數十家矣時近侍奏濟南平陵城北石虎忽一夕移于城東南有狼狐千餘迹隨之迹皆成蹊趙王虎喜曰石虎者朕也從西北而徙東南天意欲使朕平江南也其敕諸州兵明年悉集朕當親統六師以奉天命群臣皆賀上皇德頌者一百數十人因制征士五人出車一乘牛二頭米十五斛絹十匹不辦者斬民皆鬻子以供猶不能給自經於道樹死者相望
