body:
  text: 第一四三回王敦舉兵謀逆叛永昌元年正月王敦舉兵謀叛史説王敦字處仲乃司徒導從父兄也敦少有奇人之目先王愷石崇以豪侈自尚愷嘗置酒會客王敦與導俱在席愷令女伎吹笛小失聲愷便毆殺之一座人咸改容敦神色自若愷又使美人行酒吩咐道勸客飲不盡輒殺汝美人行酒至敦前敦故不肯飲美人悲懼失色而敦傲然不視導素不能飲恐行酒美人得罪遂勉強盡暢飲之王導還而歎曰處仲心懷剛忍非令終也洗馬潘嶽見敦而歎之曰蜂目已露但嗡聲未振若不噬人亦必為人所噬先時王敦初事元帝日漸驕厲雅尚清談口不言財色因是負重望專任閫外控強兵遂欲專制朝廷而有問鼎之心因是元帝畏而惡之乃引劉隗刁協等以為心膂敦益不能平於是嫌隙始構酒後輒詠曹孟德樂府歌章曰老驥伏櫪志在千里烈士暮年壯心不已以如意打唾壺為節壺邊盡缺於是敦幾欲懷異敦既與朝廷乖離乃羈録朝廷有時望者置己幕府以羊曼謝鯤是為長史鯤終日酣醉故不委以事時敦欲作亂因謂鯤曰劉隗姦邪將危社稷吾欲除君側之惡卿意如何鯤曰隗誠如城狐社鼠豈能為患敦怒曰汝庸才耳豈達大體遂不聽之史説王充之字深猷父王舒丞相王導之從弟也充之少最知名總角來從伯王敦敦甚愛之謂其似己恆以相隨出則同輿入則同寢其時王敦與錢鳳沈充及充之在帳中夜飲充之佯醉辭曰侄已醉欲先臥耳敦曰你快往帳後涼床上去睡吾欲説話一時間來於是充之就帳後涼床上去睡王敦以充之睡了乃謂錢鳳曰吾欲以兵入建康殺天子誅大臣自取帝位其事何如鳳曰今天下洶洶人懷異望欲得晉鼎明公若不首謀恐天下英雄皆有此心若他人先起則鹿走未定今夕之策宜早為之則大業必成敦曰然過旬日可與吾調兵起行計議已定錢鳳辭去王敦欲來同充之宿歇先時王敦與錢鳳之所謀議是時充之已醒悉聞其言充之恐敦見疑乃詐為醉便於臥處大吐衣服便汙時敦果疑充之聽見乃以燈燭入照視充之見吐於臥處遂以充之為大醉不復疑之至次日充之辭敦曰侄來此日久欲回視親敦曰你既回吾使人送你回去言訖喚十數軍人護送王充之還建康卻説充之還家以伯王敦與錢風謀反之議報知父舒王舒驚曰吾兄何得行此滅族之事舒忙報與從兄司徒王導王導曰可速奏於主上以作準備免吾一族之人被其連纍於是王導王舒二人入朝具以王充之所言王敦與錢鳳謀反之議奏知晉帝晉帝曰既王敦謀反可興兵討之王導曰宜準備守護防之未可以勒兵擾民耳因此帝令諸將調兵守護城池日夜巡視卻説王敦叛謀計定乃使諸葛瑤周撫等領兵為前鋒自與錢鳳為後共率兵二十余萬次日前驅大進當吳興太守沈充亦引兵來應迎著王敦曰明公興兵入建康先宜正名然後可以起行故兵法曰兵出無名所以不勝故諸侯起兵宜先以正名可使人先上疏陳劉隗不臣臣故起兵上可以制群臣下可以慰百姓敦曰卿謀正合我心敦自武昌舉兵先遣人入建康上疏稱曰劉隗佞邪姦賊威福自由臣故進軍致討隗首朝懸諸軍夕退昔太甲顛覆厥度幸納伊尹之忠殷道復昌願陛下深慮三思則四海又安社稷永固矣元帝覽之大怒忙調兵守禦建康敦兵至蕪湖又上表刁協罪狀元帝見表愈加大怒下詔曰王敦憑恃寵幸敢肄狂逆方朕太甲欲見幽囚是可忍也孰不可忍也今朕率大軍以誅大逆有殺敦者封五千戶侯降詔遍示百官訖即使使往合肥召大將軍戴若思領兵入衛建康卻説春陵令易雄字興長乃長沙瀏陽人聞王敦作逆朝廷下詔有誅敦者封五千戶侯雄聞知恨無兵力寡不能去乃自作檄書數王敦罪惡使人馳報隨即起兵王敦聞采事人報知大怒曰豎子安敢無禮即使將軍魏義以兵五千來攻春陵城陷易雄被人所執送至敦營敦以檄證示易雄叱之曰汝乃一邑小令何敢妄誣大臣罪愆今日見我有何分辨雄曰此實有之惜雄位微力弱不能救國之難誅汝之首今日之事雄安望生清即賜戮得作忠魂乃所願矣敦聞其言直乃釋之時太子中庶子溫嶠謂仆射周顗曰大將軍此舉似有所仁當無及之耶顗曰今主上非堯舜何能無失安可舉兵以脅之舉動如此豈得雲非亂乎卻説敦初舉兵遣使告梁州刺史甘卓約與俱下卓許之後更狐疑不赴諸將問之卓曰且偽許敦待至都下而討之衆問其故卓曰昔陳敏之亂吾先順而後圖之論者謂吾懼逼而思變心常愧之今若復爾何以自明敦見卓軍不來乃遣參軍桓熊去説譙王司馬丞請為己軍丞不從怒曰得死忠義夫復何求丞聞長沙虞悝賢而多才使人持檄召長沙虞悝為長史會悝遭母喪不至丞親往吊之曰王室方危金革之事古人所不辭將何以教之悝曰鄙州荒敝難以進討且宜收兵固守傳檄四方四方兵動其勢必分分而圖之庶幾可捷也丞謝之而回即囚桓熊以悝為長史以其弟虞望為司馬移檄遠近列敦之罪惡州郡內應之惟敦姊夫鄭淡為湘東太守不從命丞使望率衆五千人攻陷湘東執淡斬之以徇四境悝曰必須得辨士人梁州説甘卓同舉可濟大事眼前無可往者丞曰主簿鄭騫有辨才可遣之悝乃遣賽往説甘卓曰劉大連雖矯蹇失衆心非有害於天下大將軍敦以私憾稱兵向闕此忠臣義士竭節之時公受任方伯奉辭伐罪乃桓文之功今譙王舉義討敦邀明公共行此事何如也卓欲從之卓參軍季梁謂卓曰昔隗囂跋扈竇融保河西以奉光武受乃其福今但當按兵坐待敦事若捷必委將軍以萬人如朝廷捷必以將軍代之何憂不富貴而釋此廟勝決存亡不可戰耶騫即向前言曰光武當創業之初故隗不可以從容而行今將軍之于王敦非竇融之比也襄陽之於大府非河西之固也使敦克劉隗還武昌增石城之戍絶荊襄之粟將軍將安歸乎勢在人手而曰以處廟勝未之聞也且為大臣國家有難坐視不救于義安乎以將軍之威名仗節鳴鼓以順討之舉武昌若摧枯拉朽耳武昌既定據其事實招懷士卒使還者如歸此呂蒙之所以克關公也卓從之曰非先生之見教則孤失其妙算也未及發敦聞卓於後為變又遣參軍樂道融往邀之道融忿其悖逆來梁州反説卓曰王敦使某邀使君同討劉刁而王敦背恩肆逆舉兵向闕君身受國厚恩而與之同生為逆臣死為愚鬼不亦惜乎為君之計莫若偽許應命而馳襲武昌必不戰而自潰矣卓意始決遂露檄數敦逆狀率所統大兵十萬致討卓又遣參軍至廣州約陶侃同攻武昌侃遣參軍高寶率兵二萬北下時武昌城中傳卓軍至人皆奔散敦聞譙王丞檄卓侃攻己大怒乃遣魏義率兵二萬來攻長沙城時長沙城池不完倉儲又缺人情震恐諸將説丞曰今城池不完兵甲不堅糧草不敷人心不固何以迎敵不若去投陶侃或退據零桂為上也若沈吟死無葬身之地矣丞曰吾之志欲死忠義豈可貪生苟免為奔走之將乎事之不濟令百姓知吾心耳乃嬰城固守魏義攻城虞望率衆出戰大敗而死城中甚急甘卓知之使人遣丞書勸之且雲當以兵出沔口截敦歸路則湘圍自解矣丞即復書與卓曰足下能卷甲電赴猶有所及若其狐疑則求我於枯魚之肆矣卓不能從之丞只得固守湘東爾時元帝封子司馬翌為琅玡王命其領兵出守城池卻説趙王劉曜自以兵十萬去擊楊難敵難敵率衆拒迎與曜逆戰曜不勝乃退保城池絶難敵糧道難敵只得遣使稱藩于趙趙王曜許之以楊難敵為武都王而難敵自此歸趙於是曜令退兵還長安卻説趙秦州刺史陳安率衆入長安求朝於曜曜恐其人為亂乃疾辭不與入見安大怒大掠而歸隴上氐羌人皆附之有衆十余萬自稱涼王趙王曜便使呼延晏及魯憑二人引兵出追被陳安獲之安招其降二人不屈安命左右斬之
