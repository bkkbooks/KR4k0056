body:
  text: 第八十九回琅邪遣將討石勒二月石勒築壘于葛陂課農造舟將攻建業琅邪王睿大驚急集江南之衆于壽春商議討勒乃以紀瞻為揚威將軍領兵五萬去討之瞻既領兵欲行會大雨三個月不止石勒軍中飢疫軍士死者大半聞江南兵至集將士議之刁膺進曰司馬睿據有長江之固更且賢士歸為之用民心附兵糧足今若與其戰難以求勝不若送款於睿來掃平河朔以自贖候其軍退再徐圖之可也勒愀然長嘯孔萇曰明公何思何慮請以兵五萬委臣分道夜攻壽春據其城食其粟江南今年必能定也石勒笑曰是勇將之計也顧謂張賓曰於君意何如賓進曰將軍攻陷京師囚執天子殺害王公妻掠妃主擢將軍之發不足以數將軍之罪奈何復還相臣俸乎今天降霖雨於數百里中示將軍不應留此也鄴有三軍之固四接平陽山河四塞宜北據之以營河北河北既定天下無處將軍之右者矣宜使輜重從北道先發將軍引大兵向壽春輜重既遠大兵徐還何憂進退無地勒攘臂鼓掌曰張君計是也於是黜膺擢賓為右長史號之曰右侯次日勒引兵退遣石虎以兵五千向壽春卻説紀瞻聞石虎引兵來會將士聽令曰石虎既引兵至料胡人好掠而貪財汝等各引兵埋伏於船內傍岸上面皆放糧草於上裝作糧船待其上船來搶汝等盡力而拒之吾於岸上埋伏以待按應放炮為號兩下夾攻可以擒石虎也衆將各領衆去準備船隻而行瞻引軍上岸埋伏次日午後石虎兵至見江邊一個個皆是運船又見糧草在上虎兵飢久見糧如何不搶衆各爭上運船搶糧石虎不能禁止須臾一聲炮響江邊兩岸戰船俱進岸上紀瞻軍殺至水陸夾攻虎兵措手不及被紀瞻殺死一半大敗而逃趕上石勒前軍勒見虎敗即回兵結陳以待之紀瞻追至見石勒大衆在彼不敢交戰只令衆軍安營以待之卻説王得馬魴説刺史張軌曰今晉室破敗琅邪王司馬睿為盟主檄天下之兵共討石勒劉曜明公安可坐視從其自定依某之見宜命將出師翼戴帝室即遣使馳檄關中共尊輔秦王且言先遣前鋒宋配率步騎二萬徑趨長安諸軍絡繹繼發乘茲集兵上可不失封侯之位下可以保涼州軌從之馳檄關中發兵二萬人來長安會衆討曜卻説漢王聰以魚蟹不足供給宮廷乃斬其左都水使者又作溫明微光二殿未成以將作大匠望都公靳陵觀魚于汾水昏夜不歸王彰入諫曰今愚民歸漢之志未專思晉之心猶盛劉琨咫尺刺客縱橫帝王輕出一夫之敵耳聰大怒命將王彰斬之時彰之女為夫人旁叩頭乞哀始乃囚之皇太后張氏聞知以聰刑罰過當三日不食太弟劉乂大單于粲輿櫬切諫聰怒曰吾豈桀紂而汝輩生來哭人耶太保劉殷等百餘人皆免冠涕泣而諫聰慨然曰朕昨大醉非其本心若非公等言之朕不聞過各賜帛百匹使侍中持節赦王彰進封為定襄公於是群臣謝恩而起卻説雍州刺史賈匹以大衆來攻長安城劉曜聞知大驚急聚衆將商議曜曰賈匹索綝聚各處軍馬直抵城下衆將有何妙策王直挺身言曰大王勿慮吾見賈匹之兵衆多諸卒如草芥耳小將提狼虎之師定斬其首懸於軍門直之願也曜大喜曰吾有王君高枕無憂矣言未絶王直後一人高聲而出曰割雞焉用牛刀不必將軍有勞虎威吾觀斬晉諸兵之首如探囊取物耳曜視之其人身長九尺面如血盆虎體狼腰豹頭猿臂關西人也姓華名權是帳前一員驍將晞聽其言大喜加為驍騎校尉撥馬步軍五萬一同李軫趙本連夜飛奔出城來卻説晉兵有胡忠先將馬步軍三千徑抄小路直來搦戰華權引驍騎五百飛出大喝賊將休走胡忠手起刀落將權斬于馬下生擒將校極多將華權首級直來大寨獻功匹喜重賞胡忠又與鐵甲馬車三千前來攻城劉曜見斬了權等乃引衆開城門走離長安賈正傳令諸軍勿追迎接秦王業入城屯駐招納四方之豪俊時漢太保劉殷卒殷不為犯顔件旨然因事進規補益甚多聰每與群臣議事殷無所是非群臣退出殷獨留敷暢條理商榷事宜聰未嘗不從之殷嘗戒諸子弟曰事君當務幾諫凡人尚不可面斥其過況萬乘乎夫幾諫之切無異犯顔但不彰君之過所以為優耳殷在公卿間常恂恂有卑讓之色故能處驕暴之國保其富貴不失令名所以考終壽也卻説劉琨亦招集軍馬以俟大舉按琨長於招懷而短於撫禦一日之中雖歸者數千而去者亦相繼於是琨使劉希往中山郡去招軍買馬希從之來中山郡招集民兵一萬餘人又買馬數千匹時中山屬幽州所統代郡上谷廣寧之民多歸希由此將集三萬人王浚聞知大怒即令胡矩以書邀段疾陸眷二人稱曰劉希沒理何得越境地招軍中山乃吾之所統汝何得專功可將五萬人同去襲之矩等領段陸馳兵至中山希不之備被矩與段疾陸眷三人分兵夜攻之希措手不及被矩殺死大掠其衆而還琨聞知希死心甚憂之又恐石勒取三台並鄴乃令兄子劉演以兵五萬鎮鄴石勒大衆濟河劉演以兵出保三台勒請將欲攻之張賓曰攻之未易猝拔舍之彼將身逃避今王彭祖劉越石公之大敵也宜先取之演不足慮也且天下飢亂明公擁兵羈旅人無定志非所以保萬全控六合也不若擇便地而據之廣聚糧儲西並平陽以固幽並此霸王之業勒從之乃以衆進據襄國分命諸將攻冀州郡縣運穀以輸襄國漢主聞勒在襄國乃使使以勒為冀州牧卻説劉曜自長安一敗無處屯扎以衆走回平陽時劉琨移檄州郡期十月會兵平陽擊漢未及行而琨素奢豪喜聲色徐潤以音律得幸驕恣干預政事護軍令狐盛數以為言固諫之琨大怒令人收盛殺之琨母曰汝不能駕禦豪傑以恢遠略而專除勝己禍必及我琨不能改令狐盛子令狐泥乃私奔平陽降漢具言晉陽虛實漢主聰大喜封泥為將即以書遣劉粲與劉曜將兵來寇並州以泥為向導使劉琨聞知急東出收兵於常山一面使人去求救於代公猗廬琨既東出收兵晉陽空虛被劉粲與曜用令孤泥引路抄小路襲破晉陽而據之琨聞之急以兵還救晉陽城已陷乃率衆復奔常山琨之父母被泥殺之矣是年九月賈匹奉秦王業為皇太子建行台登壇告類建宗廟社稷
