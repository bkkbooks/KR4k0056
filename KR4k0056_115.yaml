body:
  text: 第一一二回丞相容即晉王位史説東晉元帝諱睿字景文宣帝曾孫琅邪恭王司馬覲之子也咸寧二年生於洛陽有神光之異一室盡明所藉稿如始刈及長白毫生於目角之左隆準龍顔目有精曜顧盼煒如也年十五嗣位琅邪王幼有令譽侍中稽紹謂人曰琅邪王毛骨非常殆非人臣之相也永嘉初用王導計始鎮建業湣帝即位進位丞相大都督督中外諸軍事其時琅邪王睿聞知湣帝被虜朝夕涕泣與王導商議起兵復仇導曰可移檄四方征天下之兵方可進討睿從其計使使移檄邀天下各處之兵進討胡人于時有玉册見於臨安白玉麒麟神璽出於江寧其文曰長壽萬年日有重暈皆以為中興之象民人拾得玉册神璽知琅邪王有德將來呈上於睿睿受而賞之時西陽王司馬羕以祥瑞遂見軍師王導導曰吾意已定奪也乃設座靈殿遂引諸將人見琅邪王王導曰方今晉室傾頽胡羯狂撅天下百姓無主主公年過半百德及四海東除西蕩奄有金陵可以應天順人法堯禪舜即皇帝位名正言順以討國賊此合天理事不宜遲便請擇日琅邪王曰軍師言之差矣睿雖然忝居皇族乃臣也未為湣帝報仇安敢為此王導曰方今天下分崩英雄並起各霸一方四海有才德之士同聲相應同氣相求捨死忘生而事其主非為名則為利也今主公苟避嫌疑守義不舉天下之士皆無所望其心皆憚不久自去矣願主公熟思之琅玡王曰僭居尊位吾則不敢慨然流涕曰湣帝之仇不能克報孤本罪人也惟持節守義以雪天下恥庶贖斧鉞之誅吾本琅玡王諸賢見逼不已當歸琅訝耳言訖欲命駕返國諸將留之會弘農郡太守宋哲為漢所攻棄郡奔建康稱受湣帝詔令丞相睿統攝萬機睿持節素服出舉哀三日未肯登位諸將官屬又集議請睿上尊號又固執不從導乃謂衆曰主公平生以義為重安肯便居尊位耶請依魏晉故事推為晉王以安百姓於是睿乃許之遂即晉王位改元建武置百官立宗廟社稷有司請立太子睿愛次子宣城公司馬裒欲立之謂王導曰立子當以德導曰宣城公雖有朗俊之美而世子年長主器者莫若長子矣晉王從之立世子司馬紹為王太子封裒為琅邪王嗣泰恭即位後鎮廣陵以西陽王司馬羕為太保封譙王司馬遜之子司馬承為譙王王敦為大將軍王導為揚州刺史領中書事以刁協為仆射周顗為吏部尚書加賀循為太常時承喪亂之後江東草創協久宦中朝諳練舊事循為世儒宗明習理學凡有疑議皆取決焉卻説劉琨與段匹磾相與歃血同盟翼戴晉室於是琨檄告華夷遣右司馬溫嶠奉表詣建康勸晉王進尊位嶠臨行琨謂曰晉祚雖衰天命末改吾當立功河朔使卿即奉表南行矣勉之嶠諾至建康奉表勸進晉王受表亦不肯登大位時王導周顗庾亮皆愛嶠之才爭與之交嶠遂留在建康時晉王與百官議降詔以慕容廆為龍驤將軍大單于昌黎公使人奉詔去見廆辭不受處士高詡曰霸王之資非義不濟今晉室雖微人心猶附之明公宜遣使江東示有所尊然後仗大義以征諸部不患無辭矣廆大悅從之乃使長史王濟浮江詣建康見晉王勸進尊號晉王亦不從
