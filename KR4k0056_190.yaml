body:
  text: 第一八七回龔壯上封得失事秋漢霖雨百日百姓飢疫漢王李壽命群臣極言得失龔壯因上封言曰陛下起兵之初上指星辰昭告天地歃血盟衆舉國稱藩天應人悅大功克集而論者未諭權宜稱制今霖雨百日飢疫並臻天其或者將以鑒示陛下故愚謂宜遵前盟推奉晉室彼必不愛高爵以報大功雖降階一等而子孫無窮永保福祚不亦休哉漢王壽省書內慚祕而不宣十月晉光祿勳顔含以年老遜位致仕在家時論者以王導為師傅百僚宜為降禮太常馮懷敬以問含含曰王公雖貴重禮無偏敬降禮之言或是諸軍事宜鄙人老矣今不識時務懷諾諾而出人問其故何不答之含告之曰吾聞代國不問仁人何馮祖思問禮於我我豈有邪聽乎初郭璞嘗欲為之筮含曰年在天位在人修而已而天不與者命也守道而人不知者性也自有性命無勞蓍龜因不與筮含致仕二十餘年九十三歲而卒
