body:
  text: 第二九四回慕容德謀都廣固南燕王慕容德至兗州正與諸將士議國事忽然後燕王慕容盛遣使至南燕王德召入問之使人説曰慕容寶已死其子盛即位聞陛下已立故使臣來問意南燕王德謂文武曰卿等前以社稷大計勸吾攝政今天方悔禍嗣帝得還吾將具駕奉迎謝罪行闕然後角巾私第卿意以為何如其侍郎張華曰天下非一人天下有德者居之焉陛下仁德日新何用退讓於是南燕王德大悅次日引師南遷北鄙諸郡悉來歸附因是德僭即皇帝大位改元為建平元年次日宴會群臣南燕王德酣飲笑謂群臣曰朕雖寡德恭己南面而朝諸侯可方自古何等王也青州刺史鞠仲曰陛下中興之君少康光武之儔也南燕王德大悅命左右賜鞠仲帛千匹鞠仲辭曰陛下登禦之始營建多般留賞諸工請存儲庫臣不敢領燕王德曰卿知調朕朕不知調卿乎何故推辭韓範進曰臣聞天子無戲言忠臣無敢妄對今日之論上下相欺可謂君臣俱失也燕王德大悅又賜韓範絹五十匹因此忠言競進朝多直土矣旦日燕王德與群臣出狩幸齊城登塋邱望見一冢因之問曰甚人之冢群臣答曰臣等不知可問百姓德命左右去喚百姓不敢入使青州秀才晏謨入燕王德問甚人之冢謨對曰乃大夫晏嬰之冢燕王德顧謂近臣曰禮大夫不逼城葬平仲古之賢人達禮者也而生居近市死葬近城豈有意乎晏謨對曰孔子稱臣先人賢則賢矣平仲豈不知高其梁豐其禮蓋政在家門故儉以矯世存居湫隘卒豈擇地而葬乎所以不遠城者猶冀悟平生意也燕王德大悅遂問謨以齊之山川丘陵賢哲舊事謨曆對詳辨畫地成圖呈上燕王德深嘉之拜晏謨為尚書郎燕王德因饗晏乘高遠矚請祭平仲顧謂尚書曾邃曰齊魯固多君子當晉全盛之時接慎巴生淳于鄒田之徒蔭修簷臨清沼馳朱輪佩長劍恣飛馬之雄辭奮談天之逸辨指揮則紅紫成章俯仰則丘陵成韻至於今日荒草頽墳氣消煙滅永言千載能不依然邃答曰武王封比幹之墓漢祖祭信陵之墳皆留心賢哲每懷往事陛下超出二主澤及九泉若使彼如有知寧不銜荷於是德大悅罷飲而馳還之南燕王德在兗州遣使説幽刺史辟閭渾來降而閭渾不從使人回報渾不降德命北地王慕容鍾引步騎三千攻之德自以兵進據琅玡徐兗之民歸附者十余萬渤海太守孚燕之舊臣也聞德至出降德大喜曰孤得青州不為喜喜得卿耳遂委以機密渾守廣固其下多出降渾懼奔魏德以兵追斬之渾子道秀自詣德請與父俱死德曰父雖不忠而子能孝特赦之渾參軍張英為渾作檄辭多不遜德執而讓之英神色自若徐曰渾之有臣猶韓信之有蒯通通遇漢王而生臣遇陛下而死比之古人竊為不幸耳德怒殺之遂定都於廣固九月燕遼西太守李朗在郡十年威行境內盛疑之纍欲不赴朗亦以家在龍城未敢顯叛陰使人召魏兵許以郡降事覺盛令兵五百滅朗族使將軍李旱討之旱既行盛計使人急召還數日而復遣之郎聞其家被誅擁三千餘戶以自固拒旱及聞早還謂盛有內變不復設備留其子守令支自以數十騎迎魏師于北平旱知密以兵夜行曉伏陰襲克令支使人守之自以兵追朗斬之遼西遂平十月會稽王世子元顯性苛刻生殺任意發東土諸郡免奴為客者置京師以充兵役東土囂然孫恩因民心騷動自海島聚民二萬來攻會稽會稽內史王凝之世奉天師道不出兵亦不設備官屬請討之凝之曰我已請天師借鬼兵守諸要津諸君不足慮也恩兵至凝之無備被恩遂陷會稽殺凝之於是八郡之人一齊起兵殺長史以應恩旬日衆至十萬時三吳承平日久民不習戰郡縣皆望風奔潰恩據會稽自稱征東將軍號其黨曰長生人驅諸縣令以食其妻子不食則肢解之所過焚掠削木堙井
