body:
  text: 第六十九回苟晞火攻汲桑衆卻説苟晞與汲桑相持數月互有勝負苟晞心為憂悶夙夜無寐思得一計謂諸將佐曰賊人與我相持數月各分八壘依林避暑其意怠也汝等亦宜分作八隊至夜各持火炬燒林而攻之則賊可破也衆然之是夜風清月朗各分隊伍二更時分晞以火炬至營壘放之須臾火起入壘皆灼如同白日汲桑之兵衆十去其九尸積肉山血凝紅土桑單騎奔走為晉兵所殺石勒走奔樂平去訖自是苟晞威名大振朝廷詔加苟晞都督青兗諸軍事晞屢破強寇雄名甚盛善治繁劇用法嚴峻其從母依之晞奉養甚是恭厚其子求晞用之為將晞不許曰吾不能以王法貸人將無後悔耶其子固求之晞不得已用之為督護後果犯法應殺從母叩頭求活晞不聽竟杖節斬之而更素服哭之曰殺卿者兗州刺史也哭弟者苟道將也因此人皆怕犯其法各效忠心為之用也時胡部大人張督等擁衆壁於上黨郡石勒既走樂平無處投奔乃往上黨求見張督請降漢張督從其説即引石勒去見漢王劉淵淵奇其壯貌以勒為輔漢將軍平晉王勒大悅志得行焉十一月帝以王衍為司徒衍既為司徒乃思自全之計因説太傅司馬越曰朝廷危亂當賴方伯宜得文武兼資以任之今王澄王敦二人智勇俱備明公何不委之重任可保國家明公亦安也越從之以王衍弟王澄為荊州都督以王衍族弟王敦為青州刺史二人領職臨行王衍語之曰荊州有江漢之固青州有負海之險卿二人在外而吾居中足以為三窟矣若其有不測可以為救耳澄敦拜辭而去王澄至鎮日夜縱酒不理庶務雖寇戎交警不以為懷民甚憂之史説王衍字夷甫乃王戎之從弟也衍生得神清目秀豐安端雅嘗造山濤濤嗟歎良久既去目而送之曰何物老嫗生此寧馨兒然誤天下蒼生者未必非此人也武帝時聞其名問戎曰夷甫當世誰比戎曰未見比當從古人中求之帝因以為元城令後人為黃門侍郎至此太傅越秉政以為司徒焉卻説太傅越初與苟晞親善引晞升堂結為兄弟至是威名日盛司馬藩滔説越曰兗州沖要魏武因之創業晞有大志非純臣也若遷之青州明公自牧兗州經緯諸夏藩衛本朝此所謂為之未亂者也越以為然乃自領兗州改苟晞為征東大將軍青州刺史晞雖受詔去青州而心不悅由是越與晞有隙晞至青州以嚴刻立威日行斬戮州人謂之屠伯卻説王彌及其黨劉靈因亂招集亡衆劫掠青徐衆弱不能自立恐藩衆來攻乃引兵投降於漢劉淵以二人為左右將軍而劉靈少貧賤力制奔牛走及奔馬時人雖異之莫能舉也靈撫膺歎曰天乎何當亂也及公師藩起靈亦起自稱為將軍寇掠趙魏與王彌俱降漢劉淵用以為將亦命寇趙魏
