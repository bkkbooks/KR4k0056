body:
  text: 第三二七回劉毅大破盧循兵卻説劉裕回兵至下邳以船載輜重自率精鋭步歸知何無忌敗死卷甲兼行將濟江風急衆鹹懼之諸將請待風息裕曰若天命助國風當自息不然覆溺何害命登舟舟移而風止四月至建康青州刺史諸葛長民兗州刺史劉藩並州刺史劉道鄰各將兵入衛藩毅之從弟也盧循兵威大振將近建康百官會議奏曰賊兵強盛劉公回來不如北走避之帝問曰賊在何處大臣曰賊在豫章與京相隔五百餘裏帝曰賊尚未至待到避之不遲言訖罷朝卻説劉裕回兵至山陽大哭鎮南將軍何無忌忽聞朝野震駭帝欲北遷之事裕益大哭無忌涕零不已親自設席祭之又令三軍挂孝三日至癸未始至京都入朝覲帝拜畢帝曰太尉北征勞神裕曰陛下掌政事不易帝請劉公平身裕曰近聞盧循領兵已取豫章將及到此陛下議論若何帝曰今文武議欲遷都裕聽説乃怒曰大臣以為京都無人故此畏避耶帝曰卿意如何裕曰主上曾與誰人議論也帝曰與衆議之理尚未定故召公回決之裕因問群臣曰請君主避者願聞其詳衆答曰妖賊虎豹也挾強盛而寇四方勒有百萬之師近得豫章三郡其勢甚大吾建康可拒賊者長江也今賊艨艟巨艦何止數千水陸並進占地千里況明公北伐始還瘡痍未復侍衛老弱等數萬人安可擋之若依愚等莫如早避尚圖後復裕曰此乃迂闊之論也建康自返正乘輿以來今歷數載安可一旦而棄於賊也帝曰若此將以何計拒之裕曰賊雖強盛實易攻也帝曰如何易攻裕曰賊之所統皆烏合之衆蟻聚之兵軍無紀律將無遠略民心不附以陛下雄武仗先帝之靈具文武之力臣自以兵保為陛下破之言未畢班部中撞出步騎將軍劉毅上殿奏曰臣請精兵五萬先行破此賊人裕謂毅曰今賊新捷鋒鋭莫可先動必須嚴軍偕進毅曰賊衆雖盛不可畏之於是毅堅要行帝只得委兵五萬與毅先行毅曰不殺此賊誓不回軍言訖引兵去了裕恐有失亦自整備出師先即作書使劉藩前去止之令其等大軍一同起行劉藩追至謂兄毅曰劉公恐兄孤軍去討不能取勝使我來止等其大軍一至偕進依弟之見果不可獨行毅聞之大怒曰我以一時之功相推耳汝便謂我不及劉裕也言訖投書於地遂以舟師一萬發至姑孰五月壬午毅兵望桑落洲而行卻説盧循正坐間忽聞探馬回報劉毅引大隊兵殺奔豫章而來諸將士卒盡皆失色循知急召徐道覆入議曰今劉毅引五萬大兵到來何以迎之道覆曰離城一百裏外有一洲名曰桑落洲其水路夾洲洲之前十裏左有山名豫山右有林名居林可以埋伏軍馬可令秦用引兵一千五百帶船三百去居林背後水穀埋伏只看四面火起便可殺出即縱火焚之林儉劉稷各引軍五百預備引火之物於船中伏于桑落洲後林下兩邊相候至初更晉兵到來便可放火燒船矣王得引兵五千為前部抵敵要輸不要贏把兵馬與戰佯輸迤邐追後而走主公自引一支軍於中救援依計而行勿使有失計排已定次日諸將士各依計而行卻説劉毅以軍到桑落洲揀選一半精兵作前隊其餘在後隨保糧草而行是時五月南風徐起人馬趲行而來見賊兵大叫罵曰盧循無義叛賊你等事他正如孤魂隨鬼也王得大笑曰你等隨劉裕鼠賊耳劉毅大怒向前來戰王得二舟相交戰不一時王得引舟詐敗劉毅趕將前來賊軍先退毅軍奄至王得以舟押後當抵約走十余裏王得回舟又戰須臾又退當韋浩撑舟諫曰王得誘敵恐有埋伏毅曰敵軍只如此雖有十面埋伏吾何懼焉趕到桑落洲忽聽一聲鼓響盧循自引一支軍出來迎接劉毅目視韋浩曰此即埋伏之軍吾今晚不到豫章誓不罷兵催軍前進王得盧循佯攔不住迤邐望後便退天色黑下濃雲布滿又無月色微風忽起狂風大作劉毅只顧前行將近戌牌左側毅在前面只聽前面一片叫起便將戰船擺開陳勢問于向導這是哪里向導回答前面乃是桑落洲後面便是豫口川劉毅傳令吩咐諸將押後親自出戰船於陳前與侯蘭韋浩及數十船兩下排開敵軍到處劉毅看了大笑衆將問曰將軍何故如此哂笑乎毅曰吾笑劉裕在帝面前誇諸賊強盛今看他用兵可見了也似此等戰船在前與吾對敵正如驅羊與虎狼鬥也吾行時在帝面前誇要活捉諸賊今必應前言也不可停住汝等諸將催趕軍馬是夜趕到豫章吾之願也遂自縱船向前打話妖賊將船擺開王得便當先出馬毅罵走之兵各自認隊伍而去毅令催促後軍上來諸將趕至狹窄之處只見兩邊都是蘆葦兜住船隻謂劉毅曰南河路狹山川相逼樹木叢雜恐防火攻劉毅省悟而言曰汝等之言是也卻欲回時忽聽得後面喊聲起望見一派火光繞著隨後兩邊蘆葦中亦著四面八方火勢齊起狂風大作人船自相衝撞死者不計其數劉毅冒煙突火而走後面王得擁趕將來且説韋浩急奔回來只見火光中一軍攔住當先乃秦用也軍兵大亂只得奪路而走劉毅見糧草船一路都著便抄小路走脫走出林前慌忙收拾殘兵上馬棄船奔回去了徐道覆請盧循乘勝後追殺人京都循乃從之卻説劉毅引殘敗之兵連夜奔回見裕説為賊用火攻之事因敗回來裕相視失色欲還潯陽平江陵據二州以抗賊賊即至欲出與戰北伐始還將士傷痍者未復起只有戰士數千人賊有十余萬舳艫輜車千餘裏恐寡不敵衆因之猶豫參軍孟昶諸葛長民進言曰賊人遠來糧草不敷不如保擁天子過江且避其鋒待糧盡然後擊之必取勝也劉裕曰今兵士雖少猶可以一戰吾計決矣時諸將議曰如若不避國公可得把守諸津險隘俾賊不能入也裕曰賊衆我寡若分其兵則賊人測其虛實一處失利則沮三軍之心不如聚衆屯扎石頭則衆力不分言訖領諸將引兵移鎮石頭城至乙丑日探馬報盧循引賊兵大至淮口將近來到諸將皆懼盧循戰士二十余萬舟車百里樓船高十二丈盂昶諸葛長民務要奉乘輿過江裕將聽參軍王仲德言於裕曰明公新建大功威振六合妖賊既聞凱旋自當奔潰若先自逃遁則勢同匹夫匹夫號令何以威物裕甚悅昶固請不已裕曰今重鎮外傾強寇內逼人情危駭莫有固志若一旦遷動便自土崩瓦解江北亦豈可得至設今得至不過延日月耳今兵士雖少自足一戰若其克濟則臣主同休苟厄運必至我當橫尸廟門遂其向來以身許國之志不能草間求活也昶堅意請死裕怒曰卿且一戰死復何晚昶乃抗表曰臣贊北伐之計使狂賊乘間至此謹引咎以謝天下乃仰藥而死孟昶既死諸民皆驚將士憂慮時裕謂將士曰汝等勿驚且看其衆若何進兵賊若於新亭直進其鋒便不可當宜回避之若回泊蔡州西岸可擒耳衆未信之卻説盧循進兵至淮口徐道覆言曰今劉裕北回兵皆傷痍不能復戰其有至者未必滿萬人不如焚舟從新亭殺進則裕成擒循不從言曰大軍未至孟昶望風自裁以大勢言之當計日潰亂今決勝負於一朝既非必克之道且多殺傷士卒不如按兵待之道覆曰我終為盧公所誤事必無成使我得為英雄驅馳天下不足定焉裕登城見循軍引向新亭顧左右失色既而還泊西岸乃悅遂柵石頭淮口修治越城築查浦藥園廷尉三壘皆以兵守之翌日循伏兵南岸使老弱乘舟向白石聲言悉衆自白石步上是日裕聞賊兵至引諸將登石頭城樓上望之望見賊兵從蔡州而來裕悅不自勝謂諸將曰此天助吾成功也言訖下城令軍人堅守四門不許出戰又喚諸將至謂曰吾料徐道覆用謀行兵必然來取查浦斷吾咽喉之路誰可去守參軍徐赤特曰某願往劉裕曰查浦雖小所系有太山之重倘查浦有失吾軍定休矣汝雖有謀此地且無城郭又無險要所守極難赤特曰吾自幼立學到今豈不知兵法量一查浦不能守要我何用劉裕曰查浦正是吾之咽喉若斷不能有氣查浦一失吾兵休矣徐道覆非等間人也況有秦用為前鋒智勇足備恐汝不能敵也赤特曰必不怕若有所失斬首無怨劉裕曰軍中無戲言赤特曰願立軍令狀劉裕曰汝與我文書我與你四千軍撥沈林子與你相助汝等小心在意謀守地面到彼安營方可斷他軍來二人拜辭領軍起行
