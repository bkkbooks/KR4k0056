body:
  text: 第一三九回段匹磾死于忠義卻説後趙王勒使石虎以軍五萬攻匹磾於厭次又使孔長以軍三萬攻其統內諸城諸城悉拔之虎兵至厭次圍之匹磾使弟文鴦領兵出拒與虎交戰自旦至夜連戰一百合鴦力盡被虎執之鴦尤罵賊不已虎使兵人監之次日又攻城匹磾見弟文鴦被執已去右臂心下大懼集諸將商議擬自單騎歸晉邵續之弟邵洎主降不聽復欲執朝廷使人送虎請降匹磾正色謂之曰卿不能以兄之志遏吾不得回朝亦已甚矣復欲執天子使臣我雖夷狄所未聞也邵洎與緝竺等不聽其語乃使人立降旗開城門與石虎之軍而入虎入城召匹磾匹磾曰我受晉恩志在滅汝不幸至此不能為汝敵也虎先素與匹磾結為兄弟見匹磾至即起迎之及見其語令人送匹磾文鴦邵洎緝竺等還襄國去於是幽冀並三州皆人于後趙匹磾等既至後趙後趙王勒以匹磾忠義故不害之而匹磾見勒不為禮常著朝服持晉節久之勒怒乃殺匹磾文鴦邵洎皆殺之
