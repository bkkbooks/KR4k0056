body:
  text: 第二八四回燕王鑿道去伐魏丙申二十一年閏二月燕王垂留范陽王德守中山自將兵十萬出外屯城謂衆將曰前次太子寶以兵鑿山從五原而入至魏人有備今吾以兵虛聲從五原去彼必盡屯兵守五原吾以大兵密登逾青嶺經天門鑿通道直指雲中先攻平城出其不意則圭可擒諸將曰陛下神策正合臣心言訖垂命三軍密逾青嶺鑿山為道直至雲中魏人不知是時陳留王拓跋虔鎮平城不覺垂兵直至城下措手不及被垂身先攻城將士齊登力攻半日攻陷平城虔見燕兵強盛單兵走回是以魏兵敗死燕軍盡收其部落而進時魏王圭聞知震怖欲走諸部皆有二心圭不知所適時垂過參合陂見積骸如山問知是太子寶敗死之兵垂為之設祭軍士慟哭聲震山谷垂慚憤嘔血由是發疾至此愈篤當慕容農至上言曰今懸軍深入其地無城陛下龍體不安倘敵兵擁至何以拒迎後燕王垂曰卿可調六軍築長城西北據而待之可保全也因是農調軍築城完畢後燕王垂疾甚領諸文武大軍還至上穀卻説北魏王拓跋圭聞知燕王垂親提大軍至平城西北乃亦自提軍十五萬來平城西北拒軍至平城燕軍已退卻説後燕王垂其疾愈甚召太子慕容寶遼西王慕容農趙王慕容麟入臥所謂太子寶曰吾命將盡不能復起我死之後不可發喪緩緩而退魏兵不敢追趕又謂農等曰朕今不幸在此而亡汝等公卿大臣都要依吾平日法度行之不可改易吾所用之人不可廢黜汝等善事太子各宜盡忠藎之志休懷不義之心又謂太子寶曰火速還都不宜延滯言訖而薨慕容垂在位十三年壽七十一在此而薨太子慕容寶依垂之言祕喪不發收斂入棺傳令緩緩而退魏王圭疑其無故而退必然有計因此不追引兵而還至四月初旬寶全軍回至中山城始舉哀發喪喪事畢群臣立慕容寶即皇帝大位國號大燕改元永康元年
