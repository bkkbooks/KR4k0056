body:
  text: 第三一三回劉裕遺循續命湯初劉毅未遂大志時嘗為劉敬宣部下參軍時人鹹以雄傑許之敬宣曰非常之才自有調度此君外寬而內忌自伐而矜人若一旦遭遇必當以淩上取禍耳毅聞而恨之毅心懷前言今敬宣為江州使人言於裕曰敬宣不預建議授郡已為過優聞為江州尤用駭惋敬宣竊知不自安使人去裕處請解職裕乃召還為宣城內史時朝廷新定未暇征討聞盧循為亂與百官議以品爵招安於是乃遣人以循為廣州刺史徐道覆為始興相因此二人皆受命遣使貢獻因使人饋劉裕益智粽裕乃笑曰彼謂我無能也亦使人報以續命湯循亦疑未究循初陷番禺也執刺史吳隱之至是裕與循書令遣隱之還京循乃不從長史王誕曰孫伯符豈不欲留華子魚耶但以一境不容二君耳循始悟遣之還京初益州刺史毛璩聞桓振陷江陵率衆三萬順流東下將討之使其弟毛瑗守外水參軍譙縱出涪水蜀人不樂遠征逼縱為主毛璩聞變奔回城都遣兵討之不克營兵反開城門納縱殺璩及環滅其家縱遂自稱成都王於是蜀人大亂漢中空虛氐王楊盛遣其兄子楊先據之
