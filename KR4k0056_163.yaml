body:
  text: 第一六回明帝托孤于王導閏七月明帝疾召右衛將軍虞胤左衛將軍南頓王司馬宗至明帝親任典禁兵直入殿內多聚勇士以為羽翼王導庾亮入內視疾頗以為然帝愈厚宮禁管鑰委之宗等時帝寢疾庾亮夜有所表使人從司馬宗求鑰宗不與叱亮使人曰此汝家門戶耶何敢夜深而入宮使人回告與庾亮亮益忿之及次日帝疾篤群臣無得進者庾亮疑宗胤二人有異謀乃拉王導等排闥入見明帝請黜宗胤帝不納是夜召引太宰西陽王司馬羕司徒王導及尚書令卞壺將軍庾亮郗鑒陸華丹陽令溫嶠並受遺詔輔佐太子王導庾亮卞壺等入宮內臥所帝囑咐曰朕欲與卿等平復天下掃清海內不幸遇此危疾今太子年幼不得不召卿等托以大事也言訖淚流交頤王導亦涕泣曰願陛下萬歲以副天下之望將息龍體臣等少盡犬馬之勞帝又曰卿等早晚看覷幼子勿負朕言乃執太子手付與王導曰可念朕躬勿效王敦導汗流滿身手足無措泣拜於地以頭叩地流血曰臣等安敢不竭盡忠之心效元節之志繼之以死難報今日託付之重耳帝命太子扶起王導又謂庾亮卞壺曰吾死之後褒進大臣又曰諸大臣朕不能一一囑咐皆當保愛言訖而崩在位三年壽二十七諡曰明帝帝敏有機故能以弱制強剪除逆臣克復大業規模宏遠也明帝已崩卞壺等率百官收殮舉哀發喪孝事畢葬於武平陵時太子司馬衍生五年矣群臣扶其即位請太后臨朝稱制是日群臣進玉璽司徒王導辭疾不至卞壺正色於朝曰王公非社稷之臣大行未殯嗣皇未立豈人臣辭疾之時耶導憫之乃即扶病而至上璽太后臨朝命王導録尚書事與卞壺庾亮參輔朝政然事之大要皆決於亮尚書郎樂廣子謨為郡中丞庾瑉子怡為廷尉評二人各稱父命不就卞壺曰人非無父而生職非無事而立有父而有命居職必有悔若父各私其子則王者無民君臣之道廢矣今廣瑉受寵聖世身非已有況後嗣哉謨怡不得已就職太子衍既即大位乃大赦天下改元鹹和廟號顯宗史説葛洪字稚川丹陽句容縣人也少好學家貧躬自伐薪以貨紙墨夜輒寫書通宵以儒學知名性寡欲無所愛玩不知棋局幾道樗蒲齒名為人謹訥不好榮利杜門卻掃未嘗交遊時或尋書問義不遠數千里崎嶇跋涉期於必得遂覽究典籍尤好神仙導養之法先吳時從祖玄學道得仙號曰葛仙公以其煉丹祕術授弟子鄭隱洪就隱學悉得其法焉先司徒王導知其儒名召補州主簿亦有節政時導又選入朝為散騎常侍頗多著作葛洪至入朝朝見帝固辭曰臣今年老不堪重用欲煉丹以祈遐壽聞交趾句漏縣有丹臣請出為其令帝見洪姿高質異乃曰交趾遠隔雖有奇寶朕不舍卿遠行洪曰臣此行非欲為榮以其有丹故求出耳帝見其辭懇始從之洪遂出將子侄俱行行至廣州廣州刺史劉嶽聞知其至欲往交趾使人留之意欲受學其煉丹之術洪不聽而去到了句漏縣遂入浮羅山積年煉丹優遊間養著述不輟著內外丹經一百一十六篇作序曰洪體乏進趨之才偶好無為之業假令奮翅則能淩厲玄霄騁足則能追風躡影猶欲戢徑翮於鷦鷃之群藏逸迹于跛驢之伍豈況大塊稟我以尋常之短羽造化假我以至駑之蹇足自知者審不能者止豈敢效蒼蠅而慕沖霄之舉策跛跋而迫飛兔之軌哉是以身望于榮華之盛而志安乎窮圯之域藜藿有八寶之甘蓬蓽有藻棁之樂也世儒但知服膺周孔莫信神仙之書不但見而笑之又將謗毀真正故餘所著之言黃白之事名曰內經其餘駁難通釋名曰外經內外凡一百一十六篇雖不足藏諸名山且欲緘之金匱以示識者自號抱朴子因以名書洪博聞深洽江左絶倫著述篇章富於班馬又精辨玄賾析理入微年八十有一自知天命試返宅心事外名重當時乃征衍為尚書令廣為河南尹二人談論終日義理愈精言如瓶瀉口若懸河是故朝野之人多慕效之
