body:
  text: 第二八回燕王老叩囊底智癸巳十八年秋七月秦丞相竇沖以衆叛自稱為秦王改元秦秦王登以兵二萬討之沖大驚使人求救于秦王萇萇自將救尹緯言于後秦王萇曰太子仁厚有聞而英略未著請使擊登以顯其威萇從之使興將兵一萬詐言去攻胡空堡登聞知去解沖圍以兵救胡空堡實興以兵暗襲西京大獲而歸復鎮長安自是姚興名亦振十月燕王慕容垂與諸臣議伐西燕諸將曰永未有釁我連年征伐兵卒疲敝未可伐也范陽王德曰永國之枝葉僭舉位號宜先除之以安民心垂曰司徒意正與吾同吾雖老叩囊底智足以取之終不留此賊以遺子孫也遂發兵中山次於鄴時西燕王慕容永聞知以兵分道拒守聚糧台壁遣兵戍之既而垂屯兵於鄴西南月餘不進永疑垂欲詭道由太行人乃悉斂諸軍屯太行口惟留台壁一軍四月垂引大軍出淦口入天井關五月至台壁台壁兵少垂因此破之永召太行兵回自將精兵五萬拒之垂陳兵於台壁之南密計遣輕騎伏澗下自戰偽退永衆追之澗中伏兵大發斷其後諸軍四面俱進大破之永大敗走歸長子城八月垂兵追至圍長子城西燕王永困急使人求救于晉魏兵皆未至西燕將兵皆叛開門納燕兵燕王垂執慕容永斬之得所統八郡七萬餘戶勒兵而還卻説後秦王姚萇夢苻堅砍其頭曰吾待汝不薄如何謀反害朕也今日必砍殺你姚萇寤而驚悸成疾十二月萇疾甚以衆還長安召太尉姚旻仆射尹緯等至長安受遺詔輔政並謂太子興曰有譭謗諸公者慎勿受之汝撫骨肉以恩遇大臣以禮待物以信治民以仁四者不失吾無憂矣萇言訖而卒姚興祕不發喪自稱大將軍欲率衆伐秦
