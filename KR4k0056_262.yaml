body:
  text: 第二五九回安玄圍棋賭別墅安被衆所逼要戰遂邀侄謝玄與親朋王羲之等私遊山墅安謂玄曰吾與汝圍棋玄雖從之與棋然心中憂懼而安之棋常劣于玄是日玄懼軍事便為敵手而又不勝遂不再棋但曰秦兵勢大叔父有何計破敵安曰吾有三勝之方汝休漏泄夫為將者必先觀天文次審地利三察人和料此三者求勝可矣又雲知彼知己百戰百勝今歲星在吳而秦逆天伐吾古雲逆天者亡吾有福德之祥其勝一也吾有長江之限地利佑我故曰得地者昌其師雖強不能渡之其勝二也苻堅集烏合之衆積蟻聚之兵以五胡仇人為將雖多不和吾軍固少而同一心其勝三也此三有勝破秦必矣何惑之有玄曰叔父之言乃神機妙算侄何可及奈主上不安百姓驚恐宜早計以破之使士民得安耳侄懼兵微將寡不能固守安曰晉兵雖微正朔所在君不失道人心所歸將帥調和士卒依附如此長江之險足以固守何憂兵微將寡乎吾觀苻堅志驕氣盈將必有異看其變動乘機破之汝才不在苻堅之下管取成功不須再四玄聞言大悅即還安與王羲之又遊涉至夜乃還卻説姑孰桓沖聞秦王苻堅大舉入境以根本為憂使牙門將劉完領精兵三千入衛京師同城池劉完得令引兵入京來見謝安曰桓君聞秦兵入寇京師使某領精兵三千前來與明公調用護衛建康謝安固卻之曰朝廷處分已定兵甲無缺西藩乃國之屏障其兵宜留預防何必調此你火速領其兵還劉完聞説即引兵還鎮謝玄曰吾兵稀少彼調來增叔父如何遣還謝安謂曰三千人不足以為損益還去無不可吾欲外示間暇是故遣之玄曰叔父神機侄兒不知耳劉完領三千人還鎮桓沖問其故完以謝安之言告之及陳軍前備細之事沖謂左吏等曰謝安石有廟堂之量不嫻將略今大兵垂至方遊談不暇遣諸不經事少年拒之衆又難敵天下盡已知吾其左衽矣
