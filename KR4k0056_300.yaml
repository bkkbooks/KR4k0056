body:
  text: 第二九七回劉裕十騎破孫恩話説謝琰劉牢之二人升帳謂參軍劉裕曰汝可帶十個精壯軍人去觀賊虛實如何回來報知吾好引兵後進裕得令引十人前行行至二十餘裏卻遇孫恩引賊衆五千餘人正來與牢之對陳見了裕等十人指揮擒捉裕無奈只得向十人曰今日我等退走必然被擒若拼死往鬥或可殺賊正好立功各宜竭力言訖各自奮勇殺進正遇孫恩遂與交戰一來一往一上一下戰有三十餘合後賊衆擁來裕料衆不敵且戰且走賊衆追來十人皆死裕猶獨力拒恩裕偶失足墜於岸賊衆臨岸欲下被裕奮勇長刀亂砍殺賊數人賊衆少卻裕乃得登岸賊驚潰走裕乃大呼逐之賊衆皆走裕所殺傷者甚衆卻説劉牢之子劉敬宣因見他父派裕引十人去探賊久不見裕等回營逆料裕等必為賊兵所困乃稟明牢之牢之命敬宣引兵前去探訪敬宣得令領了大隊人馬前來尋裕行至平山陽望見賊衆蜂擁亂竄裕乃一人經電迅雷前往追殺敬宣與衆軍看見無不驚駭歎息敬宣遂揮軍助擊大破之斬獲千餘人追下五十餘裏敬宣方才鳴金收軍與裕一同回營參見牢之敬宣備述其故牢之曰公子神威自古罕有不惟破賊吾一軍皆生色矣遂重賞劉裕犒勞三軍引兵進屯會稽初孫恩聞八郡回應謂其屬曰天下無復事矣當與諸君朝服至建康既而聞牢之引兵濟江今與裕戰不利乃驅其衆復逃入海島去了卻説荊州刺史殷仲堪乃陳郡人能清言善屬文父病經年仲堪衣不解帶執藥揮淚遂眇一目旌表以孝因是孝武帝召為太子中庶子因問仲堪之目曰卿患此者為誰仲堪流涕而起曰臣進退維谷甚為感愧帝謂仲堪曰勿以己才而笑不才帝甚敬之仲堪一日出遊江濱忽見水上流一棺至仲堪以為無主命家人赴水收而取之而歸有日聞門前之溝直起為岸至夕有人來謁仲堪自稱曰吾乃徐伯玄向者感君之恩惠無以報德也仲堪亦以禮待之因問曰仲堪門前之溝又無大水流砂自然填成為岸君乃高土必知其何祥也伯玄對曰水中有岸其名為洲君將為州官耳言終其岸復沒伯玄亦忽不見仲堪心甚疑之次日設朝群臣保奏孝武帝除殷仲堪為荊州刺史命其去鎮江陵仲堪謝恩受職辭帝赴任孝武帝謂曰卿去有日令人酸然常謂汝為廊廟之寶而忽為荊楚之珍良以慨恨使朕憂深仲堪曰臣雖任外無苟取民間一毫以負陛下殊遇之恩伏望陛下善保龍體以重天下之望毋勞懷臣之深仲堪為孝武帝所重為此堪亦盡忠臣之心既至荊州荊州連年水旱百姓飢饉仲堪食常五碗盤無餘肴每食粒落席間輒拾而啖之雖欲惜物亦緣其性直素常語子弟曰人見我受任方州謂我豁平昔時意今吾處之不易貧者士之常焉得登仕而損其本彼其存之矣是時殷仲堪與桓玄不睦恐桓玄起兵跋扈來攻意欲先以兵去擊當有部將紀紳上言曰不可桓玄乃當世之英雄也兼有襄陽之地君與彼戰必不易圖也吾聞江州刺史楊佺期亦乃世之英傑有一女年方十三未曾許配他人今明公亦有長子不曾結姻何不使人求親於佺期期若肯許必然樹黨結姻以後起兵兩相夾攻方可克勝堪曰其計甚善於是從紳之計即日遣使劉贊齎禮物詣江州求親不一日來至江州見了楊佺期稱説殷仲堪敬慕將軍欲與將軍結親特遣小將齎禮前來求令愛為兒媳永契秦晉之歡將軍意下如何佺期聽了沈思半晌乃曰殷先生幾個兒子劉贊答曰有二子此是長子佺期意遂決許之即備筵宴款待使人劉贊贊出外整備財禮送入府堂佺期受其禮物乃留劉贊於館驛安歇至次日備酬禮與劉贊贊星夜歸見仲堪説知允親之事堪乃大喜道曰吾荊州無憂患矣卻説南郡公桓玄先計使人入朝求為廣州刺史晉安帝從之因是起兵謀叛欲取荊州為家遣姦細人前去探訪虛實聞知殷仲堪求親于江州楊佺期為援使人即回將此報知桓玄聽訖大怒即時點起軍馬五萬欲先取荊州懼其有備乃引兵殺奔江州先攻佺期楊佺期未知其來慌忙引兵出城兩下排陳陳完楊佺期乃出陳前言曰吾與公素無仇隙何故起兵侵界玄高叫罵曰爾與殷仲堪結親樹黨其意共欲圖我故我先來圖爾言訖便驟馬挺槍向期直刺期亦舞刀出迎二人戰了三十餘合佺期氣力不多被玄便刺于馬下玄殺敗餘兵收軍入城出榜安民訖安排牛酒賞勞三軍乃下令曰今江州雖破還有荊州殷仲堪在若使他得知必引兵來攻我百姓必危矣不如乘其無備來日便可先以兵攻之諸將不許入舍持三日糧去直殺入城諸將曰諾於是次日引兵一萬星夜殺奔荊州而來卻説殷仲堪果然無備被桓玄揮兵殺入城去仲堪正坐府堂聞左右説玄兵入城遂吃驚不小即時部下兵將持刀殺出正相遇著與玄將馮該交戰不上五合仲堪敗陳而走桓玄揮兵進衙殺其家屬復出府堂出榜安民排宴犒賞諸將玄克荊州差其偏將該以兵追數日生執仲堪殺之玄既殺仲堪遣入朝上表求領荊江二州牧使人得命帶表即行行數日來到朝廷至次日具公服在待漏院伺候忽聽得淨鞭三下響文武兩班齊晉帝設朝使人乃直至丹墀呈上表章帝披覽訖顔色不悅即以玄表示與群臣群臣奏曰桓玄跋扈不可違其請也於是帝降詔命玄為荊州江州二牧使人得領詔旨即還去了珠簾放下文武退班卻説使人回見桓玄具説朝廷詔旨命領荊江二州牧之事玄乃大喜重賞使人不在話下初楊佺期與殷仲堪結為婚姻遺書與仲堪共圖桓玄堪多疑少決苦禁止之參軍羅企生謂其弟遵生曰殷侯仁而無斷必及難也吾蒙知遇義不可以去必將死之是歲荊州大水仲堪竭倉廩以賑飢民玄欲乘其虛而伐之乃發兵西上仲堪部下將士皆出降玄仲堪大懼急引心腹數十人走出被玄所執斬之仲堪奉天師道祈請鬼神不吝財物而嗇于周濟好為小惠以悅人病者自為診脈分藥用計倚仗頰密而短於鑒略故至於敗仲堪之走文武無送者也惟羅企生從之路經家門弟遵生曰今作如此分離何可不一執手企生旋馬授手遵生牽下之曰家有老母去將何之企生揮淚曰今日之事我必死之汝等奉養不失孝道一門之中有忠與孝亦復何恨遵生抱之愈急遂不得去及玄至荊州士人無不詣玄者企生獨不往而管理仲堪葬事玄使人謂企生曰若謝我當釋汝企生曰吾為荊州敗不能救尚何謝焉玄乃收之復問欲何言企生曰從公乞一弟以奉老母玄乃殺企生而赦其弟
