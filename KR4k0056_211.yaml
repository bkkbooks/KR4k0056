body:
  text: 第二八回圖澄葬石歸天竺卻説趙王虎傾心事佛及重佛圖澄百姓因困故多奉佛相競出家真偽混淆多生過愆時著作郎王度奏曰佛乃是外國之神非中華所應奉祀請除革禁季龍弗聽當佛圖澄知石氏將滅乃自啓塋墓於鄴西紫陌因焚香靜坐喚弟子法祚至而謂曰石氏當滅吾及其未亂先從化矣吾死之後可將我棺葬於我所建墓所言訖而卒法祚舉哀吊孝收澄入棺殯葬於鄴西紫陌塋墓于六十日滿變服奏趙王季龍季龍心甚煩惱忽有沙門從雍州入聞趙王奉佛好施因而求見趙王石虎石虎不悅而謂曰朕自圖澄升天之後不勝悲愴欲求再會不得一見正此思憶你可暫退改日設素請你沙門曰我從雍州來見佛圖澄西入關去何故言死趙王石虎大驚即令僧人且退使人去鄴西紫陌掘開塋墓視之惟有一石而無棺尸使人以其事回奏趙王石虎虎心甚惡之虎曰石者朕也借石喻我我將死矣果然疾重四月虎疾甚以子彭城王石遵鎮關右以燕王石斌為丞相張豺為鎮衛大將軍並受遺詔輔政劉太后恐斌為相不利於太子矯詔免斌歸第石遵在幽州聞詔命鎮關右即歸鄴欲入宮省疾劉後詐敕命朝堂受拜遺詔遣之遵涕泣而去虎扶病出西關龍騰中郎三百餘人列拜於前曰聖體不安宜令燕王入宿衛典兵馬虎曰燕王不在內耶可召來然虎不知劉後已廢丞相斌了故命人去召而左右皆劉後之用人當左右對曰燕王病酒不能入虎曰汝等速馳輦迎之當付璽綬亦竟無行者虎再四命人去召斌左右只得行先報于劉後劉後命張豺矯虎詔在內待斌入殺之於是張豺從劉後之計入內至昏使左右人召斌來豺矯稱虎詔誣斌之罪執而殺之斌遇害虎亦卒張豺急扶太子石世即位劉後臨朝稱制時石遵已到河內聞父石虎已喪石世即位及殺石斌之事朝夕痛泣會姚弋仲蒲洪及征虜將軍石閔等討滅梁犢還遇石遵于李城因相見共説其事石閔等曰殿下長而且賢先帝亦有意以為嗣末年惛惑為豺所誤今若明豺之罪鼓行而討之其誰不開門倒戈以迎殿下者遵從之曰汝能努力事成以汝為太子以承大統閔諾遂與姚弋仲率衆還鄴稱暴張豺之罪率衆將欲攻城城中之耆舊將士皆開門出而迎之豺亦惶怖出迎遵命執之擐甲耀兵入升前殿躄踴盡哀斬豺於市夷其三族計假劉後令以遵嗣位封世為譙王以劉後為太妃尋皆殺之遵既即大位以石閔為都督中外諸軍事於是鄴中暴風拔樹震雷雹雨大如盂升太武暉華等殿皆為雹打折破而毀災及諸門觀閣蕩然無餘金石皆盡時沛王石沖鎮薊州聞石遵殺劉後太子而自立乃起兵討遵遵即使石閔等討之於是閔等率兵十萬去討石沖兩軍會戰於薊縣之西五十裏及交鋒沖之士卒皆不敢前進被閔追入陳獲衝殺之又得士卒三萬餘人領衆回都次日入見遵曰沖反吾已獲而殺之而蒲洪人傑也今鎮關中恐秦雍之地非復國家所有宜改圖之遵從之罷洪都督洪大怒悉領家眷私歸枋頭遣人入建康降晉朝議許之
