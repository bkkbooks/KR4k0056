body:
  text: 第二三四回桓溫伐燕大敗還己巳四年初桓溫聞燕太宰慕容恪死請旨與徐兗刺史郗愔江州刺史桓沖江州刺史袁真等伐燕初愔在北府溫常雲京口酒可飲兵可用深不欲愔居之愔遺溫箋欲共獎王室請督所部出河上愔子超為溫參軍取視後毀之更作愔箋自陳非將相才加以老病乞間地自養勸溫並領己所統溫大喜即以愔為會稽內史而自領徐兗二州刺史率步騎五萬發姑孰超曰漕運難通求別道而入溫不從六月至金鄉天旱水絶使將軍毛虎生鑿巨野三百里引汝水會于清水引舟自清水入河舶艫數百里超又曰清水入河難以通運若寇不戰運道必絶因敵為資後無所得此危道也不若舉衆趨鄴彼必望風逃遁北歸遼碣若能出戰則事可立決若恐勝負難必務欲持重則莫若屯兵河濟控引漕運俟資儲充備來夏乃可進也舍此二策而燕軍北上進不速決退必愆之賊因此勢以日月相引漸及秋冬木凋時滯北土早寒三軍裘褐只恐于時所憂非獨無食而已溫又不從曰吾命袁真攻開石門以通水運必無阻滯遣袁真以五千兵攻石門又遣朱序攻胡陸拔之燕王暐使下邳王慕容厲以兵一萬逆戰被鄧遐朱序合兵出擊兩下交鋒未十合厲大敗還前鋒鄧遐朱序又敗燕兵于林渚七月溫至枋頭燕王暐及太傅慕容評大懼暐謂文武曰太原王已喪今國內無有良材晉兵勢大何以迎敵群臣曰太原王臨終之語陛下何故忘記吳王慕容垂有文武之才何不用之以兵拒敵然後使人和好于秦結為唇齒請其以兵來救可破晉兵暐曰其計雖善而今晉兵勢大即分兵而來恐難迎敵不如走奔和龍吳王垂上言曰臣請擊之若其不捷走未晚也何自紛紛自潰乎暐乃使垂率衆五萬以拒溫垂表乞悉羅騰為從軍暐從之又遣樂松請救于秦許賂虎牢以西之地于秦卻説秦王堅與群臣議論國事忽近侍報燕王暐使人至説桓溫以兵犯境敬修國書求結為唇齒請相救應秦王堅曰吾正恨其強欲興兵討之吾不援應王猛密謂秦王堅曰燕雖強大慕容垂非溫之敵也若溫舉山東之衆進屯洛邑收幽冀之兵引並豫之粟觀兵崤澠則陛下大事去矣今不如與煎合兵以退溫溫退燕亦病矣我乘其敝而取之不亦善乎秦王堅曰卿策甚善因此從之即使洛州刺史鄧羌率步騎二萬前來救燕羌領兵起行卻説申胤謂封孚曰以桓溫聲勢似能有為以吾觀之必無成功何則晉室弱衰溫專制其國晉之朝臣未必皆與之同心必將乖阻以敗其事又溫驕而恃衆怯於應變大衆深入值可乘之會反更逍遙中流不出赴敵欲望持久坐取全勝若糧廩愆懸情見勢絀必不戰自敗此自然之數也慕容垂兵至洛謂將士曰公等各宜盡心竭力以報國家言訖急謂范陽王慕容德曰今溫大兵在此漕運要從石門來卿可以重兵前去緊守石門糧食不至則溫兵自潰矣德從之乃以所集之兵出守石門又謂偏將李邦曰溫見石門不通必使人從臯陵運汝可引軍一萬抄山徑埋伏險隘絶其糧道李邽引一軍去訖卻説慕容德至石門謂慕容宙曰汝先率一千兵出戰宙曰晉人輕剽怯於陷敵勇於乘退宜設餌釣之德曰可以二百騎挑戰餘兵分作三處埋伏待其追而擊之於是使宙以二百騎挑戰自將兵分作三處埋伏計議訖宙以二百騎出戰袁真盡以衆與戰宙詐敗便走真揮兵追擊至伏兵之所慕容德當先出攔兩下交鋒真兵大敗走回又被伏兵出截三下夾攻真單騎逃回本營收衆折去五千餘人卻説慕容垂以大兵至襄陽屯扎便差人四門貼起文榜告示居民無問老小火速移往睢城暫居不可自誤晉兵到此不仁必然傷害百姓一連差十數次人催趨使行百姓皆起身後喚諸將聽令先差雲振帶二千人各將布袋去溪河上流頭埋伏用布袋裝上磚土拒住淺河之水到來日三更以後只聞下流頭人馬嘶喊知是桓溫兵敗急取去布袋放水淹之卻順河殺將下來接應雲振聽計去了吳王垂又喚慕容德可引軍二千去博陵邊渡口埋伏晉兵被淹此處水勢緩慢人馬必從此逃命你可乘勢殺來接應德領兵去了垂又喚趙平你可引軍三千先取蘆葦乾柴放在襄城人家屋上各處陌頭襄角上卻暗藏硫黃焰硝引火之物來日昴日雞值黃昏後必有大風起袁真必入城安歇汝將二千軍先用火箭大炮放入城中去火勢大作城外呐喊只留東門外放走你卻在東門外伏定敗軍亂竄不可攔截只顧攻擊他敗軍無心戀戰奔走此乃以寡敵衆之道也必得全功天明會合收軍便回睢城不可違誤趙平聽令去了垂更再喚縻玉劉同你二人可帶二千人一半紅旗一半青旗去野外三十裏虎尾坡前擺開青紅旗號混雜如晉軍到縻玉一支紅旗走在左邊劉同一支青旗走向右邊他疑必不追趕卻分兵去西北角上埋伏只望城中火起便可進兵追趕敗軍然後卻來白河上流頭接應時刻休誤二人去了垂登高望之卻説晉兵袁真自為前部先鋒引大軍一萬戰將數員又有鐵騎軍二千從襄邑進發日當亭午來到虎尾坡附近問向導官前面離城多少路答曰只有三十裏王佃引探馬數十匹先行見坡前人馬擺開王佃拍馬搶前見依山傍嶺一簇人馬盡打青紅旗號不知多少晉將王佃把皂旗一招三千軍一齊向前縻玉劉同為兩隊進青紅旗各居左右二色旗不雜隊伍不亂王佃扯住馬令休趕左右曰為何不趕王佃曰前面必有伏兵你們只就這裏扎住我自去稟先鋒王佃一騎馬來見先鋒袁真曰豈不聞兵法有虛實之論此是疑兵必無埋伏速進兵追之佃再回坡前提兵直入其左遍于林下追尋不見此時紅日冉冉墜西袁真叫去搶襄邑安身軍士四門突入並無阻擋又不見一人袁真曰此乃勢窮尚帶百姓連夜走了衆軍權且安歇來日進兵軍士各自飢餓都去奪屋造飯袁真在縣衙安身初更後狂風忽起把門軍士來城報火起袁真曰火是軍人造飯不小心失火不可驚動説未畢南門西門俱來報火起袁真急令衆人上馬時早已滿城火著上下通紅喊聲大震當夜袁真叫將士冒著煙火探路報説東門無伏兵袁真沖出東門門上火滾煙飛軍士逃出自相踐踏死者無數且説袁真方才脫得火危背後卻有車馬趕殺各軍皆要逃命那裏肯回身廝殺撞著縻玉劉同又殺一陳到四更左右人困馬乏一大半軍破頭爛額卻好走到河邊人馬都下河吃水水不過尺人馬皆在河內鬧起上流許雲振望見襄邑城火起約五更時分已到只聽下流人馬喧鬧催軍一齊掣起布袋水勢望下流一沖人馬皆溺于水袁真望水勢慢處奪路來到博陵渡口喊聲大振一軍攔路慕容德到也當下慕容德引了軍馬從下流頭殺將上來截住袁真掩殺王佃交鬥到三十餘合真不敢戀戰奪路走脫慕容德趕來接著廝殺殺得晉軍大敗殺死晉兵三萬餘人時袁真收拾殘兵來見桓溫稱説失利一事桓溫大怒曰胡賊安敢如此盡起三軍遂至襄邑漫山塞野而來與慕容垂大軍相遇交戰垂將兵馬擺開橫持玉斧立於陳前以待晉兵晉兵陳中先鋒袁真持刀出馬與戰又戰上二十餘合真不能抵敵撥開軍器勒轉馬頭望本陳便走背後慕容垂促兵追殺晉兵又敗一陳走還原屯桓溫見軍戰不利心甚煩惱忽左右報軍中糧盡來日卻無糧草支給於三軍等衆桓溫愈加憂悶又探事軍人報道長安秦王苻堅使鄧羌率軍三萬來救燕參軍郗超曰今吾軍數戰不利糧儲復竭秦兵又至難以進兵不如焚舟車棄輜重鎧仗從陸道奔回本鎮若秦軍一到必為所擒溫曰事已迫矣今夜即行於是桓溫至夜傳令將舟車燒訖及拋棄輜重鎧仗乃領大軍從陸路而走諸軍爭欲追之吳王垂曰溫初敗退必嚴設警備選精鋭於後不如緩之彼幸吾未至晝夜疾趨俟其氣衰擊之無不克矣至是溫果兼道而進數日吳王垂令人探知自率八千騎追之到河南與袁真郗超等交戰又戰上數十合晉兵無心戀戰皆棄甲拋戈望南走潰又被燕軍趕殺一陳慕容德聞晉兵敗走乃以徑卒伏於東關中見桓溫兵至兩下夾攻大破溫衆斬晉兵三萬余人連追殺五十餘裏方始收兵還燕卻説秦將鄧羌聞晉兵敗走使其副將苟池領兵五千抄小路來趕追至譙城袁真見後有追兵喝令軍士擺開自與荀池交戰二人又鬥三十余合袁真大敗而逃又被秦兵大殺一陳又斬一萬餘人秦兵追殺二十餘裏亦收兵還國去訖溫只得收敗卒屯于山陰其時桓溫深恥其敗恐朝廷見罪乃歸過於袁真使人入朝上表雲袁真為將失略致敗三軍宜貶之以為庶人於是晉帝下詔黜袁真為庶人詔使桓溫還國行經王敦墓第讀其碑記歎曰可人可人其心亦若是耳卻説燕王慕容暐謂群臣曰今既與秦結好必得一不辱君命者往謝之方好大傅慕容評曰參軍梁琛有辨才其兄梁奕仕于秦為尚書使其可往暐遂使郝晷梁琛相繼如秦晷與王猛有舊猛接以殊禮問晷東方之事晷知燕將亡陰欲自托頗泄其實琛至長安秦王苻堅方畋於萬年欲引見琛琛曰秦使至燕燕之君臣朝服備禮灑掃宮廷然後敢見今秦王欲野見之使臣不敢聞命尚書郎辛徑謂琛曰天子稱乘輿所至曰行在又何野見之有又春秋亦有遇禮何為不可乎琛曰天子以四海為家故行曰乘輿至曰行在今四海瓜裂天下分崩安得以是為言禮哉不期而見曰遇蓋因事權行其禮簡略豈可居容與之所為哉昔者桓溫窺我王略燕危秦孤是以秦王恤患結好交聘方始謂宜崇禮尚義以固二國之歡而忽慢使臣是卑燕也豈修好之義乎秦王堅乃為設行宮百僚陪臣然後延之琛始入見秦王稱燕王使其謝救危之事堅心大悅命群臣排宴飲之梁琛之從兄粱奕為秦尚書郎秦王堅使奕與客館琛與奕舍琛曰昔諸葛瑾為吳聘蜀諸葛亮惟公相見退無私面今使之即安私室所不敢也於是秦王堅命于別館安下又使奕數問東方之事琛曰兄弟本心各有所在欲言其美恐非所欲問欲言其惡又非使臣所得論之也秦王堅使太子延琛相見秦人欲使琛拜太子先諷之曰鄰國之君猶其君也鄰國之儲君亦何以異乎琛曰天子之子尚不敢臣其父之臣況他國臣之乎禮有往來情豈忘恭但恐降屈為諂耳乃果不拜王猛知梁琛忠貞乃勸秦王堅留梁琛堅不許琛乃還國卻説慕容垂既破大司馬桓溫大有功績威名益振德望日新士民皆憚之時太傅慕容評見其威猛愈忌之垂奏將士功賞皆抑而不行垂怒之評恐為患評乃與太后可足渾氏謀誅太宰格子慕容楷及垂後命奏知燕王啼於是評與燕王暐曰吳王慕容垂威名日振恐不利於國家陛下宜早圖之不然將難制也燕王暐曰叔父可緩圖之於是評出朝整日思想計欲害慕容垂
